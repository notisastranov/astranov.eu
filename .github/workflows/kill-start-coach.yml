# Owner: no SpaceNet first-run / start popup
name: kill-start-coach
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  kill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Disable first-run coach in feature bundles
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          root = Path('.')
          files = [
            Path('js/phase-features.js'),
            Path('js/99-boot-features.js'),
            Path('js/astranov-features.js'),
            Path('astranov-features.js'),
            Path('astranov-continuity.js'),
          ]
          noop = '''  // SPECS / owner: no SpaceNet start popup — coach permanently off
  window.showFirstRunCoach = function showFirstRunCoach() {
    try {
      const el = document.getElementById('first-run-coach');
      if (el) { el.hidden = true; el.style.display = 'none'; el.innerHTML = ''; }
      localStorage.setItem('astranov:coach-v3-os', '1');
      localStorage.setItem('astranov:coach-v4-spacenet', '1');
      localStorage.setItem('astranov:coach-disabled', '1');
    } catch (_) {}
  };
'''
          import re
          re_block = re.compile(
            r"if\s*\(\s*!window\.showFirstRunCoach\s*\)\s*\{[\s\S]*?setTimeout\s*\(\s*\(\)\s*=>\s*\{\s*try\s*\{\s*showFirstRunCoach\?\.\(\);\s*\}\s*catch\s*\(_\)\s*\{\s*\}\s*\}\s*,\s*900\s*\);",
            re.M,
          )
          changed = []
          for p in files:
            if not p.exists():
              continue
            t = p.read_text(encoding='utf-8')
            orig = t
            t2 = re_block.sub(noop, t)
            if t2 == t and 'SpaceNet — the internet on Earth' in t:
              # replace any showFirstRunCoach function body
              t2 = re.sub(
                r"window\.showFirstRunCoach\s*=\s*function showFirstRunCoach\(\)\s*\{[\s\S]*?\n  \};",
                "window.showFirstRunCoach = function showFirstRunCoach() {\n    try {\n      const el = document.getElementById('first-run-coach');\n      if (el) { el.hidden = true; el.style.display = 'none'; el.innerHTML = ''; }\n      localStorage.setItem('astranov:coach-v3-os', '1');\n      localStorage.setItem('astranov:coach-v4-spacenet', '1');\n      localStorage.setItem('astranov:coach-disabled', '1');\n    } catch (_) {}\n  };",
                t,
                count=1,
              )
              t2 = re.sub(
                r"setTimeout\s*\(\s*\(\)\s*=>\s*\{\s*try\s*\{\s*showFirstRunCoach\?\.\(\);\s*\}\s*catch\s*\(_\)\s*\{\s*\}\s*\}\s*,\s*900\s*\);",
                "/* first-run coach disabled */",
                t2,
              )
            if t2 != orig:
              p.write_text(t2, encoding='utf-8')
              changed.append(str(p))
              print('patched', p)
            else:
              print('unchanged', p)
          # continuity kill-switch append if missing
          cont = Path('astranov-continuity.js')
          if cont.exists():
            ct = cont.read_text(encoding='utf-8')
            if 'killFirstRunCoach' not in ct:
              ct += '''
/* SPECS: no SpaceNet start popup */
(function killFirstRunCoach() {
  function hide() {
    try {
      window.showFirstRunCoach = function () {};
      var el = document.getElementById('first-run-coach');
      if (el) {
        el.hidden = true;
        el.style.cssText = 'display:none!important;visibility:hidden!important;pointer-events:none!important';
        el.innerHTML = '';
      }
      try {
        localStorage.setItem('astranov:coach-v3-os', '1');
        localStorage.setItem('astranov:coach-v4-spacenet', '1');
        localStorage.setItem('astranov:coach-disabled', '1');
      } catch (_) {}
    } catch (_) {}
  }
  hide();
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', hide);
  setTimeout(hide, 200);
  setTimeout(hide, 1000);
  setTimeout(hide, 2500);
})();
'''
              cont.write_text(ct, encoding='utf-8')
              changed.append(str(cont))
              print('appended continuity kill')
          print('changed', len(changed), changed)
          if not changed:
            print('nothing to do — already off or pattern mismatch')
          PY
      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/phase-features.js js/99-boot-features.js js/astranov-features.js astranov-features.js astranov-continuity.js || true
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "fix(ux): disable SpaceNet first-run coach popup"
          git push origin HEAD:main
