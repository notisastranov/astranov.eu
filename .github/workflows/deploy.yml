name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  edge-functions:
    runs-on: ubuntu-latest
    name: Deploy edge functions
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy each function (best-effort)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set +e
          FAILED=""
          for fn in aicycle council brain order-intake order-status crawl push-notify vendor-crawler astranov-api ai-router; do
            echo ""
            echo "=== Deploying $fn ==="
            if [ -d "supabase/functions/$fn" ]; then
              supabase functions deploy "$fn" --project-ref lkoatrkhuigdolnjsbie --no-verify-jwt
              if [ $? -ne 0 ]; then FAILED="$FAILED $fn"; fi
            else
              echo "skipped (no source dir)"
            fi
          done
          if [ -n "$FAILED" ]; then
            echo ""
            echo "::warning::Skipped failed function deploys:$FAILED"
            echo "Frontend deployment and cache purge continue; investigate Supabase project state separately."
          fi

  frontend:
    runs-on: ubuntu-latest
    name: Deploy frontend to Vercel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN is not set"
            exit 1
          fi
          npm install -g vercel@50.28.0
          vercel link --yes --project astranov --token "$VERCEL_TOKEN"
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel deploy --prod --force --yes --token "$VERCEL_TOKEN"

  cloudflare:
    runs-on: ubuntu-latest
    name: Purge Cloudflare cache
    needs: [edge-functions, frontend]
    if: always()
    steps:
      - name: Purge cache
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN not set - skipping"
            exit 0
          fi
          ZONE_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=astranov.eu" \
            -H "Authorization: Bearer $CF_TOKEN" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',[{}])[0].get('id','') if d.get('result') else '')")
          if [ -z "$ZONE_ID" ]; then
            echo "Could not resolve zone id for astranov.eu"
            exit 0
          fi
          echo "Zone: $ZONE_ID"
          RESP=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$RESP"
