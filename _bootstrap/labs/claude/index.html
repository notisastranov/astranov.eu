<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#02060d"/>
<link rel="manifest" href="manifest.json"/>
<title>AstranoV · Claude Lab</title>
<link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.122/Build/Cesium/Widgets/widgets.css"/>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.122/Build/Cesium/Cesium.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#02060d;--ink:#dde9ff;--dim:#7a98c0;--accent:#cc785c;--glow:rgba(204,120,92,0.6)}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
  font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif}
#cesiumContainer{position:absolute;inset:0;z-index:0}
#lab-badge{position:fixed;top:max(10px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  z-index:200;padding:6px 18px;border-radius:11px;display:flex;flex-direction:column;align-items:center;
  font-family:'Bahnschrift','DIN Alternate',system-ui,sans-serif;font-weight:800;font-size:15px;
  letter-spacing:0.3em;color:#e6d5cc;line-height:1;
  background:linear-gradient(180deg,rgba(40,20,10,0.7),rgba(20,10,5,0.7));
  border:1.5px solid var(--accent);box-shadow:0 0 12px var(--glow);backdrop-filter:blur(6px)}
#lab-badge .sub{font-size:6px;font-weight:600;letter-spacing:0.3em;color:rgba(204,160,140,0.8);margin-top:3px}
#orb{position:fixed;bottom:24px;right:20px;width:64px;height:64px;border-radius:50%;z-index:300;cursor:pointer;
  border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 35% 30%,rgba(204,120,92,0.5),rgba(6,12,24,0.85) 70%);
  box-shadow:0 0 18px var(--glow);font-weight:700;font-family:'Bahnschrift',sans-serif;color:#e6f4ff;
  animation:pulse 2.8s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
#chat{display:none;position:fixed;bottom:96px;right:16px;width:340px;max-height:33vh;z-index:400;
  background:rgba(8,14,28,0.92);border:1px solid rgba(204,120,92,0.4);border-radius:14px;
  backdrop-filter:blur(8px);overflow:hidden;flex-direction:column}
#chat.open{display:flex}
#chat-log{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch;font-size:13px}
#chat-log .msg{margin:6px 0;padding:6px 10px;border-radius:8px;max-width:85%}
#chat-log .user{background:rgba(204,120,92,0.15);margin-left:auto;text-align:right}
#chat-log .ai{background:rgba(100,140,200,0.12)}
#chat-input{display:flex;border-top:1px solid rgba(204,120,92,0.2);padding:8px}
#chat-input input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(204,120,92,0.3);
  border-radius:8px;padding:8px 12px;color:var(--ink);font-size:14px;outline:none}
#chat-input button{margin-left:6px;padding:8px 14px;border:none;border-radius:8px;cursor:pointer;
  background:var(--accent);color:#fff;font-weight:700;font-size:13px}
</style>
</head><body>

<div id="lab-badge">ASTRANOV<span class="sub">CLAUDE LAB</span></div>
<div id="cesiumContainer"></div>
<div id="orb" onclick="toggleChat()">CLD</div>
<div id="chat">
  <div id="chat-log"></div>
  <div id="chat-input">
    <input id="msg" placeholder="Talk to Astranov..." onkeydown="if(event.key==='Enter')send()"/>
    <button onclick="send()">EMIT</button>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://lkoatrkhuigdolnjsbie.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxrb2F0cmtodWlnZG9sbmpzYmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4ODIwOTIsImV4cCI6MjA5NDQ1ODA5Mn0.qf6Kg93YLJ0coTdVQa4baU0ppOdFY5WkmVzMvEV6ejI';
const CESIUM_TOKEN  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIzYTI0NjM1MC05MTAyLTQ1NjItOGI5Yi1kZTUxMWVlODA0MzQiLCJpZCI6NDMyMzAwLCJzdWIiOiJBc3RyYW5vdiIsImlzcyI6Imh0dHBzOi8vaW9uLmNlc2l1bS5jb20iLCJhdWQiOiJBTENJIiwiaWF0IjoxNzc4OTIwOTU3fQ.HPPdCQ7u_BWDoS7uK5uwqHHtmUivbU82u_bwHLhHkag';

let sb, session;
try {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  sb.auth.getSession().then(({data}) => { session = data?.session || null; });
} catch(e) { console.error('Supabase init failed:', e); }

try {
  Cesium.Ion.defaultAccessToken = CESIUM_TOKEN;
  const viewer = new Cesium.Viewer('cesiumContainer', {
    baseLayerPicker:false, geocoder:false, homeButton:false, sceneModePicker:false,
    navigationHelpButton:false, animation:false, timeline:false, fullscreenButton:false,
    selectionIndicator:false, infoBox:false, creditContainer:document.createElement('div')
  });
  viewer.scene.globe.enableLighting = true;
  viewer.scene.skyAtmosphere.show = true;
} catch(e) { console.error('Cesium init failed:', e); }

function toggleChat() {
  document.getElementById('chat').classList.toggle('open');
  document.getElementById('msg').focus();
}

async function send() {
  const input = document.getElementById('msg');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  appendMsg(text, 'user');
  try {
    const auth = session?.access_token || SUPABASE_ANON;
    const r = await fetch(SUPABASE_URL + '/functions/v1/ai-router', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'apikey':SUPABASE_ANON, 'Authorization':'Bearer '+auth },
      body: JSON.stringify({ text, level:'global', preferred_provider:'astranov' })
    });
    const j = await r.json();
    appendMsg(j.text || j.error || 'No response', 'ai');
  } catch(e) { appendMsg('Connection error: '+e.message, 'ai'); }
}

function appendMsg(text, cls) {
  const log = document.getElementById('chat-log');
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body></html>
