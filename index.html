async function bootImageryGlobeTier() {
  if (!viewer) return;
  // Real day/night terminator — mandatory under Imagery Law §3.
  viewer.scene.globe.enableLighting = true;
  viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#02060d');

  // GUARANTEED BASE — Cesium's bundled Natural Earth II ships with the CDN
  // build, so the globe ALWAYS renders even if NASA GIBS is slow or blocked.
  try {
    const base = await Cesium.TileMapServiceImageryProvider.fromUrl(
      Cesium.buildModuleUrl('Assets/Textures/NaturalEarthII')
    );
    viewer.imageryLayers.addImageryProvider(base);
  } catch (e) { console.warn('[imagery] Natural Earth base failed', e); }

  // DAY: NASA Blue Marble Next Generation via GIBS WMTS (layered on top).
  try {
    const dayProvider = new Cesium.UrlTemplateImageryProvider({
      url: 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/BlueMarble_NextGeneration/default/2004-08-01/GoogleMapsCompatible_Level8/{z}/{y}/{x}.jpeg',
      maximumLevel: 8,
      credit: 'NASA EOSDIS GIBS · Blue Marble Next Generation',
    });
    dayLayer = viewer.imageryLayers.addImageryProvider(dayProvider);
  } catch (e) { console.warn('[imagery] BMNG day failed', e); }

  // NIGHT: NASA Black Marble — layered above day, day-side fully transparent.
  try {
    const nightProvider = new Cesium.UrlTemplateImageryProvider({
      url: 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_Black_Marble/default/2016-01-01/GoogleMapsCompatible_Level8/{z}/{y}/{x}.png',
      maximumLevel: 8,
      credit: 'NASA EOSDIS GIBS · VIIRS Black Marble',
    });
    nightLayer = viewer.imageryLayers.addImageryProvider(nightProvider);
    nightLayer.dayAlpha = 0.0;
    nightLayer.nightAlpha = 1.0;
  } catch (e) { console.warn('[imagery] Black Marble night failed', e); }

  if (viewer) viewer.scene.requestRender();
}

// Live map brightness — controls the city layer if present, else the globe day layer.
window._brightness = 1.45;
function applyBrightness(v) {
  window._brightness = v;
  try {
    if (cityLayer && cityLayer.show) cityLayer.brightness = v;
    else if (dayLayer) dayLayer.brightness = Math.max(0.8, v * 0.85);
    viewer && viewer.scene.requestRender();
  } catch (_) {}
}
(function wireBright() {
  const s = $('bright-slider'); if (!s) return setTimeout(wireBright, 100);
  s.addEventListener('input', e => applyBrightness(parseFloat(e.target.value)));
})();

async function setCityImagery(index) {
  if (!viewer) return;
  if (cityLayer) {
    try { viewer.imageryLayers.remove(cityLayer, true); } catch (_) {}
    cityLayer = null;
  }
  cityProviderIndex = Math.max(0, Math.min(index, CITY_PROVIDERS.length - 1));
  const p = CITY_PROVIDERS[cityProviderIndex];
  try {
    const provider = await p.init();
    cityLayer = viewer.imageryLayers.addImageryProvider(provider);
    // Brightness boost on the inherently-dark CARTO Dark Matter style so
    // streets stay readable while the look stays dark.
    if (p.id === 'carto-dark') {
      cityLayer.brightness = window._brightness ?? 1.45;
      cityLayer.contrast   = 1.15;
      cityLayer.gamma      = 0.85;
      cityLayer.saturation = 1.0;
    } else if (window._brightness != null) {
      cityLayer.brightness = window._brightness;
    }
    // City tiles must sit ON TOP of the NASA globe layers.
    try { viewer.imageryLayers.raiseToTop(cityLayer); } catch (_) {}
    cityLayer.show = currentLevel !== 'global';
    renderLayerSwitch();
    updateImagerySourceBadge();
    if (viewer) viewer.scene.requestRender();
  } catch (e) {
    console.warn('[imagery]', p.id, 'failed, advancing', e);
    if (cityProviderIndex < CITY_PROVIDERS.length - 1) {
      return setCityImagery(cityProviderIndex + 1);
    }
    emitTelemetry('imagery.city_providers_exhausted', 'error', {
      failedProvider: p.id,
      error: normalizeTelemetryError(e),
    });
  }
}

function renderLayerSwitch() {
  const el = $('layer-switch');
  if (!el) return;
  const cur = CITY_PROVIDERS[cityProviderIndex] || CITY_PROVIDERS[0];
  el.innerHTML = `
    <div id="layer-pill" onclick="toggleLayerMenu(event)">
      <span class="pill-emoji">${cur.emoji}</span>
      <span class="pill-lbl">${cur.label}</span>
      <span class="pill-arrow">▼</span>
    </div>
    <div id="layer-menu">
      ${CITY_PROVIDERS.map((p, i) => `
        <div class="layer-opt${i === cityProviderIndex ? ' active' : ''}"
             onclick="setCityImagery(${i});closeLayerMenu()">
          <span class="lo-e">${p.emoji}</span>
          <span class="lo-l">${p.label}</span>
          <span class="lo-dot"></span>
        </div>`).join('')}
    </div>`;
}

function toggleLayerMenu(e) {
  if (e) e.stopPropagation();
  const el = $('layer-switch');
  if (el) el.classList.toggle('open');
}

function closeLayerMenu() {
  const el = $('layer-switch');
  if (el) el.classList.remove('open');
}

function updateLayerSwitchVisibility() {
  const el = $('layer-switch');
  if (!el) return;
  const show = currentLevel !== 'global';
  el.classList.toggle('visible', show);
  if (!show) closeLayerMenu();
  if (cityLayer) cityLayer.show = show;
  updateImagerySourceBadge();
}

function updateImagerySourceBadge() {
  const el = $('imagery-source');
  if (!el) return;
  if (currentLevel === 'global') {
    el.textContent = 'BMNG · BLACK MARBLE';
  } else if (cityLayer && CITY_PROVIDERS[cityProviderIndex]) {
    el.textContent = 'VIA ' + CITY_PROVIDERS[cityProviderIndex].label.toUpperCase();
  } else {
    el.textContent = 'NO LAYER';
  }
  // Visible briefly after each level transition; auto-fades from level badge.
  el.classList.add('visible');
  clearTimeout(updateImagerySourceBadge._t);
  updateImagerySourceBadge._t = setTimeout(() => el.classList.remove('visible'), 2400);
}


/* ==============================================================
   2. Navigation levels — GLOBAL / NATIONAL / PERSONAL
   ============================================================== */
const LEVEL_THRESHOLDS = { global: 5_000_000, national: 500_000 };
let currentLevel = 'global';
let levelTimer;

function deriveLevel(heightMeters) {
  if (heightMeters > LEVEL_THRESHOLDS.global)   return 'global';
  if (heightMeters > LEVEL_THRESHOLDS.national) return 'national';
  return 'personal';
}

function onCameraSettled() {
  const h = viewer.camera.positionCartographic.height;
  const newLevel = deriveLevel(h);
  if (newLevel === currentLevel) return;
  currentLevel = newLevel;

  // Level + back are folded into #g-discover: tint the gadget by zoom level
  const gd = $('g-discover');
  if (gd) {
    gd.classList.toggle('at-personal', newLevel === 'personal');
    gd.classList.toggle('at-national', newLevel === 'national');
  }

  // Globe lighting (day/night terminator) is the GLOBAL aesthetic only.
  // Below global it darkens the street map at night — turn it off so the
  // CARTO street tiles render at full brightness.
  if (viewer) viewer.scene.globe.enableLighting = (newLevel === 'global');

  // City glowing dots: visible at GLOBAL + NATIONAL, hidden at PERSONAL
  cityDotIndex.forEach(e => { e.primitive.show = (newLevel !== 'personal'); });

  updateLayerSwitchVisibility();
  updateCatFilter();
  // Show delivery pins only at NATIONAL / PERSONAL
  const showDeliveries = newLevel !== 'global';
  deliveryIndex.forEach(e => { e.primitive.show = showDeliveries; });
  if (viewer) viewer.scene.requestRender();
}

function ascendLevel() {
  if (!viewer) return;
  const h = viewer.camera.positionCartographic.height;
  const target = h > LEVEL_THRESHOLDS.national ? 12_000_000 : 2_000_000;
  const carto = viewer.camera.positionCartographic;
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromRadians(carto.longitude, carto.latitude, target),
    duration: 1.4,
  });
}

/* ==============================================================
   3. Supabase — auth, signals, realtime
   ============================================================== */
let sb = null;
let session = null;
let profile = null;

function bootSupabase() {
  if (SUPABASE_URL.startsWith('__') || SUPABASE_ANON.startsWith('__')) {
    console.warn('[ASTRANOV] Supabase not configured — running in OFFLINE mode');
    return;
  }
  if (!window.supabase) {
    console.warn('[ASTRANOV] supabase-js failed to load');
    return;
  }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: { persistSession: true, autoRefreshToken: true },
  });

  sb.auth.getSession().then(({ data }) => {
    session = data.session;
    if (session) loadProfile();
    else tryAutoCredentials();
  });

  sb.auth.onAuthStateChange((_evt, s) => {
    session = s;
    if (s) loadProfile(); else { profile = null; updateIdentityOrb(); }
  });

  loadSignals();
  loadDeliveries();
  subscribeRealtime();
  _autoLoadPlaces();
}

async function loadProfile() {
  if (!sb || !session) return;
  const { data, error } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
  if (!error) profile = data;
  subscribeInbox();
  loadDeliveryBadge();
  loadMessageBadge();
  updateIdentityOrb();
  profileSetupIfNeeded();
  subscribePush();
  initDroneStandby();
  restoreSession();
}

async function loadDeliveryBadge() {
  if (!sb || !session) return;
  const { count } = await sb.from('deliveries')
    .select('*', { count: 'exact', head: true })
    .or(`requester_id.eq.${session.user.id},runner_id.eq.${session.user.id}`)
    .in('status', ['requested','accepted','in_transit']);
  _updateMeBadge(count || 0);
}

function _updateMeBadge(n) {
  const badge = $('g-me-badge');
  if (!badge) return;
  badge.textContent = n > 9 ? '9+' : n > 0 ? String(n) : '';
  badge.classList.toggle('visible', n > 0);
}

function updateIdentityOrb() {
  const orbEl = $('g-me');
  const glyphEl = $('g-me-glyph');
  if (!orbEl || !glyphEl) return;
  if (session) {
    const initial = (profile?.display_name || session.user.email || 'U').trim().charAt(0).toUpperCase();
    glyphEl.textContent = initial;
    orbEl.classList.add('signed-in');
    window._gfxSignedIn = true;
  } else {
    glyphEl.textContent = '◉';
    orbEl.classList.remove('signed-in');
    window._gfxSignedIn = false;
  }
}

async function loadMessageBadge() {
  if (!sb || !session) return;
  const { data } = await sb.rpc('unread_message_count');
  const n = Number(data || 0);
  _updateMeBadge(n);
}

async function profileSetupIfNeeded() {
  if (!sb || !session || !profile) return;
  // If display_name looks like an email prefix or is missing, prompt for real name
  const name = profile.display_name || '';
  if (name.includes('@') || name.length < 2) {
    openPanel(`
      <h2>Welcome to Astranov</h2>
      <div class="subtitle">Set your identity to connect with others</div>
      <div class="gadget-orb signed-in" style="margin:16px auto"><div class="glyph">${escapeHtml((name||'?').charAt(0).toUpperCase())}</div></div>
      <div class="gadget-cmd-wrap">
        <input id="setup-name" class="gadget-cmd" type="text" placeholder="Display name" maxlength="40" value="${escapeHtml(name)}" autocomplete="name" />
      </div>
      <div class="gadget-engage" id="setup-engage" onclick="saveDisplayName()">
        <span class="verb-glyph">◈</span><span id="setup-label">Lock identity</span>
      </div>
      <div style="font-size:10px;color:#4a6a8f;text-align:center;margin-top:8px;letter-spacing:0.15em">50 AVC starter balance granted</div>
    `);
    const inp = $('setup-name'), eng = $('setup-engage');
    const refresh = () => eng.classList.toggle('armed', inp.value.trim().length >= 2);
    inp.addEventListener('input', refresh); refresh();
    inp.addEventListener('keydown', e => { if (e.key === 'Enter' && eng.classList.contains('armed')) saveDisplayName(); });
  }
}

window.saveDisplayName = async () => {
  const name = $('setup-name')?.value.trim();
  if (!name || name.length < 2) return;
  const { error } = await sb.from('profiles').update({ display_name: name }).eq('id', session.user.id);
  if (error) return toast(error.message, 'err');
  if (profile) profile.display_name = name;
  updateIdentityOrb();
  toast('Identity locked — welcome, ' + name, 'ok');
  closePanel();
};

/* ==============================================================
   Push / Service Worker / Reliability  (§23)
   ============================================================== */
function urlBase64ToUint8Array(b64u) {
  const pad = '='.repeat((4 - b64u.length % 4) % 4);
  const b64  = (b64u + pad).replace(/-/g, '+').replace(/_/g, '/');
  const raw  = atob(b64);
  return Uint8Array.from(raw, c => c.charCodeAt(0));
}

let _swReg = null;

function bootServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(reg => {
    _swReg = reg;
    // Force an update check on every page load so users always get the freshest SW.
    try { reg.update(); } catch (_) {}
    // When a new SW takes over, reload once so the page runs the new app code.
    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloaded) return; reloaded = true;
      location.reload();
    });
    navigator.serviceWorker.addEventListener('message', e => handleSwMessage(e.data));
  }).catch(err => console.warn('[sw] register failed:', err));
}

async function subscribePush() {
  if (!_swReg || !session || !VAPID_PUBLIC) return;
  try {
    let sub = await _swReg.pushManager.getSubscription();
    if (!sub) {
      sub = await _swReg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC),
      });
    }
    await savePushSubscription(sub);
  } catch (e) {
    console.warn('[push] subscribe failed:', e.message);
  }
}

async function savePushSubscription(sub) {
  if (!sb || !session || !sub) return;
  const j = sub.toJSON();
  await sb.from('push_subscriptions').upsert({
    profile_id:  session.user.id,
    endpoint:    j.endpoint,
    keys_p256dh: j.keys.p256dh,
    keys_auth:   j.keys.auth,
  }, { onConflict: 'endpoint' });
}

async function pushNotify(recipientId, payload) {
  if (!sb || !session || !recipientId || recipientId === session.user.id) return;
  try {
    await sb.functions.invoke('push-notify', { body: { recipient_id: recipientId, payload } });
  } catch (e) {
    console.warn('[push] notify failed:', e.message);
  }
}

function handleSwMessage(msg) {
  if (!msg) return;
  if (msg.type === 'notif-nav') {
    handleNotificationNav(msg.params || {});
  } else if (msg.type === 'call-decline-push') {
    if (currentCall && currentCall.id === msg.callId) declineIncomingCall();
  } else if (msg.type === 'push-resubscribe') {
    if (msg.sub && session) {
      const sub = { toJSON: () => msg.sub };
      savePushSubscription(sub);
    }
  }
}

function handleNotificationNav(p) {
  const type = p.notif;
  if (type === 'call' && p.callId) {
    // Incoming call via push — build a synthetic call state then show UI
    if (!currentCall) {
      currentCall = {
        id:           p.callId,
        peerId:       p.callerId   || '',
        peerName:     p.callerName || 'Caller',
        role:         'callee',
        startedAt:    Date.now(),
        pendingOffer: null, // will arrive via callee-ready handshake
      };
      if ($('call-incoming-name')) $('call-incoming-name').textContent = currentCall.peerName;
      if ($('call-incoming'))      $('call-incoming').classList.add('visible');
      // Subscribe to call channel so we can receive the re-sent offer
      if (sb) {
        callChannel = sb.channel(callChannelName(p.callId));
        callChannel
          .on('broadcast', { event: 'offer'  }, ({ payload }) => {
            if (currentCall) currentCall.pendingOffer = payload.offer;
          })
          .on('broadcast', { event: 'ice' }, ({ payload }) => onIce(payload))
          .on('broadcast', { event: 'bye' }, () => endCall(true))
          .subscribe()
          .then(() => {
            // Signal caller that we're awake and ready for their offer
            callChannel.send({ type: 'broadcast', event: 'callee-ready', payload: { fromId: session?.user.id } });
          });
      }
    }
    if (p.accept === '1') acceptIncomingCall();
  } else if (type === 'message' && p.senderId) {
    openConversation(p.senderId, p.senderName || 'User');
  } else if (type === 'delivery' && p.deliveryId) {
    openDeliveryPanel(Number(p.deliveryId));
  }
}

function saveActiveDelivery(delivery) {
  try { localStorage.setItem('astranov_active_delivery', JSON.stringify(delivery)); } catch (_) {}
}

function clearActiveDelivery() {
  try { localStorage.removeItem('astranov_active_delivery'); } catch (_) {}
}

function _readOAuthError() {
  const q = new URLSearchParams(location.search);
  const h = new URLSearchParams((location.hash || '').replace(/^#/, ''));
  const desc = q.get('error_description') || h.get('error_description');
  const code = q.get('error_code')       || h.get('error_code');
  const err  = q.get('error')            || h.get('error');
  if (!err && !code) return null;
  return decodeURIComponent((desc || code || err).replace(/\+/g, ' '));
}

function restoreSession() {
  // 0. Surface OAuth errors that landed here as ?error=... or #error=...
  const oauthErr = _readOAuthError();
  if (oauthErr) {
    toast('Sign-in failed: ' + oauthErr, 'err');
    history.replaceState(null, '', '/');
  }
  // 1. URL params injected by push-notification click
  const p = new URLSearchParams(location.search);
  if (p.has('notif')) {
    handleNotificationNav(Object.fromEntries(p));
    // Clean URL without reload
    history.replaceState(null, '', '/');
  }
  // 2. Active delivery from localStorage (runner resume)
  try {
    const raw = localStorage.getItem('astranov_active_delivery');
    if (raw) {
      const d = JSON.parse(raw);
      if (d && d.id) {
        toast('Resuming delivery #' + d.id, 'ok');
        setTimeout(() => openDeliveryPanel(d.id), 800);
      }
    }
  } catch (_) {}
}

/* ==============================================================
   Locate — GPS acquire + globe fly-to
   ============================================================== */
function locateUser() {
  const orb = $('locate-orb'); if (!orb) return;
  if (!navigator.geolocation) return toast('Geolocation not available', 'err');
  orb.classList.remove('locked');
  orb.classList.add('acquiring');
  const g = orb.querySelector('.locate-g');
  if (g) g.textContent = '◎';
  navigator.geolocation.getCurrentPosition(
    pos => {
      orb.classList.remove('acquiring');
      orb.classList.add('locked');
      if (g) g.textContent = '⊕';
      const { latitude: lat, longitude: lng } = pos.coords;
      if (viewer) {
        // Drone top-down view at street-readable altitude. 250m + pitch -90°
        // forces Cesium to request the deepest zoom tiles immediately.
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(lng, lat, 250),
          duration: 2.8,
          orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
        });
      }
      window._userLat = lat; window._userLng = lng;
      setUserBeacon(lat, lng);
      fetchOSMNearby(lat, lng, 5000);
      setTimeout(() => orb.classList.remove('locked'), 4000);
      startDriveWatch(); // continuous motion tracking from this point
    },
    err => {
      orb.classList.remove('acquiring');
      if (g) g.textContent = '⊕';
      toast('Location denied — ' + err.message, 'err');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

/* ==============================================================
   Drive mode — continuous motion-aware camera.
   Drone view at rest (pitch -90°, altitude ~600 m). When sustained
   speed > 5 m/s for >3 s → driving view (pitch -25°, altitude ~120 m,
   heading locks to GPS course). When speed < 1 m/s for >5 s → drone.
   ============================================================== */
let _driveWatchId = null;
let _driveMode    = 'drone';      // 'drone' | 'driving'
let _driveBufSpeed = [];          // last speeds, m/s
let _driveLastSwitchAt = 0;
function startDriveWatch() {
  if (_driveWatchId || !navigator.geolocation || !navigator.geolocation.watchPosition) return;
  _driveWatchId = navigator.geolocation.watchPosition(
    pos => _driveTick(pos),
    () => {},
    { enableHighAccuracy: true, maximumAge: 1500, timeout: 15_000 }
  );
}
function stopDriveWatch() {
  if (_driveWatchId) navigator.geolocation.clearWatch(_driveWatchId);
  _driveWatchId = null;
}
function _driveTick(pos) {
  const { latitude: lat, longitude: lng, speed, heading } = pos.coords;
  window._userLat = lat; window._userLng = lng;
  setUserBeacon(lat, lng);
  const sp = (typeof speed === 'number' && isFinite(speed) && speed >= 0) ? speed : 0;
  _driveBufSpeed.push(sp);
  if (_driveBufSpeed.length > 6) _driveBufSpeed.shift();
  const avg = _driveBufSpeed.reduce((a, b) => a + b, 0) / _driveBufSpeed.length;
  const hud = $('drive-hud'), sps = $('dh-sp');
  if (sps) sps.textContent = Math.round(avg * 3.6) + ' km/h';
  if (hud) hud.classList.toggle('visible', _driveMode === 'driving');

  const now = Date.now();
  const dwell = now - _driveLastSwitchAt;
  // Hysteresis: 5 m/s = 18 km/h to enter, 1 m/s = 3.6 km/h to leave
  if (_driveMode === 'drone' && avg > 5 && dwell > 3000) {
    _driveMode = 'driving'; _driveLastSwitchAt = now;
    _enterDriving(lat, lng, heading);
  } else if (_driveMode === 'driving') {
    if (avg < 1 && dwell > 5000) {
      _driveMode = 'drone'; _driveLastSwitchAt = now;
      _enterDrone(lat, lng);
    } else {
      // Continuously follow while driving
      _followDriving(lat, lng, heading);
    }
  }
}
function _enterDriving(lat, lng, heading) {
  if (!viewer) return;
  const h = (typeof heading === 'number' && !isNaN(heading)) ? heading : 0;
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(lng, lat, 120),
    duration: 1.6,
    orientation: { heading: Cesium.Math.toRadians(h), pitch: Cesium.Math.toRadians(-25), roll: 0 },
  });
  toast('Driving view engaged', 'ok');
}
function _enterDrone(lat, lng) {
  if (!viewer) return;
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(lng, lat, 600),
    duration: 1.8,
    orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
  });
  toast('Drone view restored', '');
}
function _followDriving(lat, lng, heading) {
  if (!viewer) return;
  const h = (typeof heading === 'number' && !isNaN(heading)) ? heading : null;
  // Snap camera; cheap each tick, avoids dueling flyTo
  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(lng, lat, 120),
    orientation: { heading: h != null ? Cesium.Math.toRadians(h) : viewer.camera.heading,
                   pitch: Cesium.Math.toRadians(-25), roll: 0 },
  });
}

/* ==============================================================
   Helper drones — WebRTC datachannel scaffold. The Astranov system
   stands ready to pair with companion drones via WebRTC + Supabase
   Realtime signaling (room: 'drone:<userId>'). A drone client
   joins the same room and exchanges SDP offers. Once paired, we
   can stream telemetry + send waypoints over the datachannel.
   ============================================================== */
const droneState = { peers: new Map(), channel: null, ready: false };
function initDroneStandby() {
  if (!sb || !session || droneState.ready) return;
  const room = 'drone:' + session.user.id;
  droneState.channel = sb.channel(room, { config: { broadcast: { ack: true } } })
    .on('broadcast', { event: 'drone-hello' }, ({ payload }) => _onDroneHello(payload))
    .on('broadcast', { event: 'drone-sdp'   }, ({ payload }) => _onDroneSdp(payload))
    .on('broadcast', { event: 'drone-ice'   }, ({ payload }) => _onDroneIce(payload))
    .subscribe();
  droneState.ready = true;
}
function _onDroneHello(p) {
  toast('Drone discovered: ' + (p.callsign || 'unknown'), 'ok');
  // (full handshake elided — drone client initiates with SDP offer)
}
function _onDroneSdp(p) { /* answer with sb.channel send */ }
function _onDroneIce(p) { /* trickle ICE */ }
function sendDroneWaypoint(lat, lng, alt) {
  for (const peer of droneState.peers.values()) {
    try { peer.dc?.send(JSON.stringify({ type: 'waypoint', lat, lng, alt })); } catch (_) {}
  }
}
window.openDronePanel = function() {
  initDroneStandby();
  const room = session ? 'drone:' + session.user.id : null;
  openPanel(`
    <h2>Drones</h2>
    <div class="subtitle">${room ? 'Astranov standby — '+droneState.peers.size+' linked' : 'Sign in to pair'}</div>
    <div style="font-size:12px;color:#a8c8ee;line-height:1.55;margin-top:10px">
      Companion drones pair over WebRTC, signalled through your private

      release to hover, double-tap to return-to-home.
    </div>
    <div class="gadget-engage" onclick="_copyRoom(${JSON.stringify(room||'')})" style="margin-top:14px">
      <span class="verb-glyph">⎘</span><span>Copy pairing room</span>

      <span class="verb-glyph">◫</span><span>Standby</span>

window.openConversation = async (peerId, peerName) => {
  _activePeer = { id: peerId, name: peerName };
  openPanel(`
    <h2>${escapeHtml(peerName)}</h2>
    <div class="msg-thread" id="msg-thread-container"></div>
    <div class="msg-compose">
      <input id="msg-input" class="gadget-cmd" placeholder="Message…" maxlength="4000" style="margin-top:0;flex:1" />
      <div class="send-orb" onclick="sendMessage()" title="Transmit" style="border-radius:50%;width:36px;height:36px;border:1.5px solid rgba(120,180,255,0.4);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:#7eb4ff;flex-shrink:0">◈</div>
    </div>
  `);
  // Mark read
  await sb.rpc('mark_messages_read', { peer: peerId });
  loadMessageBadge();
  // Load thread
  const { data } = await sb.rpc('get_conversation', { peer: peerId, max_results: 60 });
  const thread = $('msg-thread-container'); if (!thread) return;
  (data || []).forEach(m => _appendBubble(thread, m));
  thread.scrollTop = thread.scrollHeight;
  // Send on enter
  const inp = $('msg-input');
  if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }});
};

function _appendBubble(container, m) {
  const isMe = m.sender_id === session?.user.id;
  const div = document.createElement('div');
  div.className = 'msg-bubble ' + (isMe ? 'me' : 'them');
  div.textContent = m.body;
  div.title = formatRelative(m.created_at);
  container.appendChild(div);
}

function _appendIncomingBubble(m) {
  if (m.sender_id !== _activePeer?.id) return;
  const thread = $('msg-thread-container'); if (!thread) return;
  _appendBubble(thread, m);
  thread.scrollTop = thread.scrollHeight;
  sb.rpc('mark_messages_read', { peer: m.sender_id });
}

window.sendMessage = async () => {
  const inp = $('msg-input'); if (!inp || !_activePeer || !sb || !session) return;
  const body = inp.value.trim(); if (!body) return;
  inp.value = '';
  const m = { id: crypto.randomUUID(), sender_id: session.user.id, body, created_at: new Date().toISOString() };
  const thread = $('msg-thread-container');
  if (thread) { _appendBubble(thread, m); thread.scrollTop = thread.scrollHeight; }
  const { error } = await sb.from('messages').insert({ sender_id: session.user.id, recipient_id: _activePeer.id, body });
  if (error) { toast(error.message, 'err'); return; }
  pushNotify(_activePeer.id, {
    type:       'message',
    title:      profile?.display_name || 'Message',
    body:       body.slice(0, 80),
    tag:        'msg-' + session.user.id,
    senderId:   session.user.id,
    senderName: profile?.display_name || '',
  });
};

const _agentState = { open: null, log: { discover: [], me: [], locate: [], ai: [] } };

function openAgentSheet(name) {
  const cfg = AGENTS[name]; if (!cfg) return;
  _agentState.open = name;
  const titleEl = $('agent-title'),
        subEl   = $('agent-sub'),
        glyphEl = $('agent-glyph'),
        actsEl  = $('agent-actions'),
        sheet   = $('agent-sheet'),
        input   = $('agent-input');
  titleEl.textContent = typeof cfg.title === 'function' ? cfg.title() : cfg.title;
  subEl.textContent   = (typeof cfg.sub   === 'function' ? cfg.sub()   : cfg.sub) || 'READY';
  glyphEl.textContent = cfg.glyph;
  // Action rows
  actsEl.innerHTML = '';
  const items = cfg.items();
  items.forEach((it, i) => {
    const row = document.createElement('div');
    row.className = 'agent-action act-' + (it.kind === 'cat' ? 'cat' : it.kind);
    row.innerHTML = '<span class="aa-g">' + (it.glyph || '◌') + '</span><span class="aa-l">' + escapeHtml(it.label || '') + '</span>';
    if (it.isOn && !it.isOn()) row.classList.add('off');
    row.addEventListener('click', e => {
      e.stopPropagation();
      const res = it.fn(row) || {};
      if (!res.keepOpen) closeAgentSheet();

    actsEl.appendChild(row);
  });
  // Restore chat log
  _renderAgentLog();
  // Show the sheet
  sheet.classList.remove('expanded');
  sheet.classList.add('open');
  sheet.setAttribute('aria-hidden', 'false');
  if (input) input.placeholder = 'Ask the ' + (titleEl.textContent.split(' ')[0] || 'agent') + '…';

window.closeAgentSheet = function() {
  _agentState.open = null;

  if (!sheet) return;
  sheet.classList.remove('open', 'expanded', 'dragging');

function _renderAgentLog() {
  const name = _agentState.open; if (!name) return;
  const log = $('agent-chat-log'); if (!log) return;
  const msgs = _agentState.log[name] || [];
  log.innerHTML = msgs.map(m => {
    if (m.role === 'me')  return '<div class="ag-msg me">' + escapeHtml(m.text) + '</div>';
    return '<div class="ag-msg bot">' + (m.via ? '<div class="via">' + escapeHtml(m.via) + '</div>' : '') + escapeHtml(m.text) + '</div>';
  }).join('');
  log.scrollTop = log.scrollHeight;
}

window._agentChatSend = async function() {
  const name = _agentState.open; if (!name || !sb) return;
  const input = $('agent-input'); if (!input) return;
  const text = (input.value || '').trim(); if (!text) return;
  input.value = '';
  const cfg = AGENTS[name];
  _agentState.log[name].push({ role: 'me', text });
  _renderAgentLog();
  $('agent-sheet')?.classList.add('thinking');
  try {
    const messages = [];
    if (cfg.chatSystem) messages.push({ role: 'system', content: cfg.chatSystem });
    for (const m of _agentState.log[name]) {
      messages.push({ role: m.role === 'me' ? 'user' : 'assistant', content: m.text });
    }
    const { data, error } = await sb.functions.invoke('aicycle', { body: { messages } });
    if (error) throw error;
    const resp = (data && (data.response || data.text)) || 'No reply.';
    const via  = (data && (data.via || data.provider)) || '';
    _agentState.log[name].push({ role: 'bot', text: resp, via });
  } catch (e) {
    _agentState.log[name].push({ role: 'bot', text: 'Connection failed: ' + (e.message || e), via: 'system' });
  }
  $('agent-sheet')?.classList.remove('thinking');
  _renderAgentLog();
};

// === Sheet drag-resize ==================================================
(function() {
  const sheet  = () => $('agent-sheet');
  const handle = () => $('agent-handle');
  let st = null;
  function onDown(e) {
    const s = sheet(); if (!s || !s.classList.contains('open')) return;
    st = { y: e.clientY, h: s.getBoundingClientRect().height, vh: window.innerHeight };
    s.classList.add('dragging');
    try { handle().setPointerCapture(e.pointerId); } catch (_) {}
    e.preventDefault();
  }
  function onMove(e) {
    if (!st) return;
    const s = sheet(); if (!s) return;
    const newH = Math.max(0, Math.min(st.vh * 0.96, st.h + (st.y - e.clientY)));
    s.style.height = newH + 'px';
  }
  function onUp(e) {
    if (!st) return;
    const s = sheet(); if (!s) { st = null; return; }
    s.classList.remove('dragging');
    try { handle().releasePointerCapture(e.pointerId); } catch (_) {}
    const h = s.getBoundingClientRect().height;
    const vh = st.vh;
    st = null;
    // Snap: <22vh closes; 22-70vh = open (48vh); >=70vh = expanded (92vh)
    s.style.height = '';
    if (h < vh * 0.22) { closeAgentSheet(); return; }
    if (h >= vh * 0.70) s.classList.add('expanded');
    else                s.classList.remove('expanded');
  }
  // Wire when DOM is ready
  function wire() {
    const h = handle(); if (!h) return setTimeout(wire, 50);
    h.addEventListener('pointerdown', onDown);
    h.addEventListener('pointermove', onMove);
    h.addEventListener('pointerup',   onUp);
    h.addEventListener('pointercancel', onUp);
  }
  wire();
})();

// Agent law: FIRST tap performs the agent's primary action — no drawer, no
// questions. Once engaged, a further tap opens the bottom drawer with only
// the options that make sense. Tapping while the drawer is open closes it.
const _engaged = new Set();
window.gadgetRelease = function(name, e) {
  const s = _gadgetPress[name]; if (!s) return;
  clearTimeout(s.timer);
  const wasLong = s.long;
  delete _gadgetPress[name];
  if (wasLong) return;
  if (_agentState.open === name) { closeAgentSheet(); return; }
  const cfg = AGENTS[name]; if (!cfg) return;
  const engaged = cfg.engaged ? cfg.engaged() : _engaged.has(name);
  if (!engaged) {
    _engaged.add(name);
    if (cfg.primary) { try { cfg.primary(); } catch (_) {} return; }
  }
  openAgentSheet(name);
};

/* ==============================================================
   4. Signals — PointPrimitiveCollection + pulse callback
   ============================================================== */
let signalPoints = null;         // PointPrimitiveCollection
const signalIndex = new Map();   // id -> { primitive, signal }

let userBillboards = null;
let userBillboard  = null;
let _userBeaconRaf = 0;

const CATEGORY_COLORS = {
  news:        Cesium.Color.fromCssColorString('#00d4ff'),
  jobs:        Cesium.Color.fromCssColorString('#7cff7c'),
  commerce:    Cesium.Color.fromCssColorString('#ffaa00'),
  social:      Cesium.Color.fromCssColorString('#ff7edc'),
  dating:      Cesium.Color.fromCssColorString('#ff3a6e'),
  real_estate: Cesium.Color.fromCssColorString('#b48cff'),
  classifieds: Cesium.Color.fromCssColorString('#a0a0a0'),
};

function ensurePointCollection() {
  if (!signalPoints && viewer) {
    signalPoints = viewer.scene.primitives.add(new Cesium.PointPrimitiveCollection());
  }
}

function addSignalPoint(signal) {
  if (!viewer || signal.lng == null || signal.lat == null) return;
  ensurePointCollection();
  if (signalIndex.has(signal.id)) return; // already rendered

  const color = CATEGORY_COLORS[signal.category] || Cesium.Color.WHITE;
  const size = 6 + Math.min(signal.amplitude || 1, 24);
  const primitive = signalPoints.add({
    position: Cesium.Cartesian3.fromDegrees(Number(signal.lng), Number(signal.lat)),
    pixelSize: size,
    color: color.withAlpha(0.85),
    outlineColor: Cesium.Color.WHITE.withAlpha(0.4),
    outlineWidth: 1,
    scaleByDistance: new Cesium.NearFarScalar(1.5e2, 1.4, 1.5e7, 0.6),
  });
  primitive.__signalId = signal.id;
  signalIndex.set(signal.id, { primitive, signal });
  viewer.scene.requestRender();
}

function updateSignalPoint(signal) {
  const entry = signalIndex.get(signal.id);
  if (!entry) return addSignalPoint(signal);
  entry.signal = signal;
  entry.primitive.pixelSize = 6 + Math.min(signal.amplitude || 1, 24);
  if (signal.status !== 'active') removeSignalPoint(signal.id);
  viewer.scene.requestRender();
}

function removeSignalPoint(id) {
  const entry = signalIndex.get(id);
  if (!entry) return;
  signalPoints.remove(entry.primitive);
  signalIndex.delete(id);
  viewer.scene.requestRender();
}

/* ==============================================================
   User location beacon — glowing, hovering "you are here" marker
   ============================================================== */
function _makeUserBeaconCanvas() {
  const sz = 80, cx = sz / 2;
  const c = document.createElement('canvas'); c.width = c.height = sz;
  const ctx = c.getContext('2d');
  // Outer soft glow
  const g = ctx.createRadialGradient(cx, cx, 4, cx, cx, cx);
  g.addColorStop(0, 'rgba(0,212,255,0.8)');
  g.addColorStop(0.45, 'rgba(0,212,255,0.25)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, sz, sz);
  // Dashed orbit ring
  ctx.save(); ctx.setLineDash([3, 4]);
  ctx.beginPath(); ctx.arc(cx, cx, cx - 4, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,212,255,0.45)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();
  // Solid filled circle
  ctx.beginPath(); ctx.arc(cx, cx, cx - 20, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,180,255,0.94)'; ctx.fill();
  ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 16;
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3; ctx.stroke();
  ctx.shadowBlur = 0;
  // White center dot
  ctx.beginPath(); ctx.arc(cx, cx, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
  return c;
}

function setUserBeacon(lat, lng) {
  if (!viewer) return;
  if (!userBillboards) {
    userBillboards = viewer.scene.primitives.add(new Cesium.BillboardCollection({ scene: viewer.scene }));
  }
  if (userBillboard) { userBillboards.remove(userBillboard); userBillboard = null; }
  cancelAnimationFrame(_userBeaconRaf);

  userBillboard = userBillboards.add({
    position: Cesium.Cartesian3.fromDegrees(Number(lng), Number(lat)),
    image: _makeUserBeaconCanvas(),
    width: 58,
    height: 58,
    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
    scaleByDistance: new Cesium.NearFarScalar(100, 2.0, 4e5, 0.2),
    translucencyByDistance: new Cesium.NearFarScalar(3e5, 1.0, 8e5, 0),
    disableDepthTestDistance: Number.POSITIVE_INFINITY,
    eyeOffset: new Cesium.Cartesian3(0, 0, -5),
  });

  let t = 0;
  (function animateBeacon() {
    if (!userBillboard) return;
    t += 0.038;
    userBillboard.scale = 1 + 0.2 * Math.abs(Math.sin(t * 0.75));
    userBillboard.pixelOffset = new Cesium.Cartesian2(0, Math.sin(t) * 5 - 3);
    viewer.scene.requestRender();
    _userBeaconRaf = requestAnimationFrame(animateBeacon);
  })();
}

// Multiple Overpass mirrors — the main one frequently 504s. We race through
// them with a per-request timeout so vendors reliably load.
const OVERPASS_API = 'https://overpass-api.de/api/interpreter';
const OVERPASS_MIRRORS = [
  'https://overpass-api.de/api/interpreter',
  'https://overpass.kumi.systems/api/interpreter',
  'https://maps.mail.ru/osm/tools/overpass/api/interpreter',
  'https://overpass.openstreetmap.fr/api/interpreter',
];
async function _overpassFetch(query) {
  for (const url of OVERPASS_MIRRORS) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 18000);
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'data=' + encodeURIComponent(query),
        signal: ctrl.signal,
      });
      clearTimeout(t);
      if (resp.ok) return await resp.json();
    } catch (_) { /* try next mirror */ }
  }
  return null;
}

  const a = tags.amenity || '', s = tags.shop || '', t = tags.tourism || '';
  if (/restaurant|fast_food|food_court/.test(a)) return 'food';
  if (/cafe/.test(a)) return 'cafe';

  if (/hotel|hostel|motel/.test(a + t)) return 'hotel';
  if (/hospital|clinic|pharmacy|doctors/.test(a)) return 'medical';

  // Outer radial glow
  const grd = ctx.createRadialGradient(cx, cx, 6, cx, cx, cx);
  grd.addColorStop(0, col + '66'); grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, sz, sz);

  // Dashed orbit ring
  ctx.save(); ctx.setLineDash([2, 3]);
  ctx.beginPath(); ctx.arc(cx, cx, cx - 3, 0, Math.PI * 2);
  ctx.strokeStyle = col + '55'; ctx.lineWidth = 1.2; ctx.stroke();
  ctx.restore();

  // Body circle — dark fill + glowing border
  ctx.beginPath(); ctx.arc(cx, cx, cx - 10, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(4, 10, 22, 0.93)'; ctx.fill();
  ctx.shadowColor = col; ctx.shadowBlur = 10;
  ctx.strokeStyle = col; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.shadowBlur = 0;

  // Four HUD tick marks at 45°/135°/225°/315°
  [45, 135, 225, 315].forEach(deg => {
    const rad = deg * Math.PI / 180;
    const r1 = cx - 9, r2 = cx - 4;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(rad) * r1, cx + Math.sin(rad) * r1);
    ctx.lineTo(cx + Math.cos(rad) * r2, cx + Math.sin(rad) * r2);
    ctx.strokeStyle = col + 'cc'; ctx.lineWidth = 2; ctx.stroke();
  });

  // Center emoji — color emoji via OS fonts, 22px
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = '22px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(info.emoji, cx, cx + 1);

  _placeIconCache.set(catKey, c);
  return c;
}

function _ensureBillboardCollection() {
  if (!placeBillboards && viewer) {
    placeBillboards = viewer.scene.primitives.add(new Cesium.BillboardCollection({ scene: viewer.scene }));
  }
}

function addPlacePoint(place) {
  if (!viewer || !place.lat || !place.lon) return;
  const tags = place.tags || {};
  if (!tags.name) return;
  _ensureBillboardCollection();
  const key = 'osm:' + place.id;
  if (placeIndex.has(key)) return;
  const catKey = _catKey(tags);
  const icon = _makePlaceCanvas(catKey);
  const billboard = placeBillboards.add({
    position: Cesium.Cartesian3.fromDegrees(Number(place.lon), Number(place.lat)),
    image: icon,
    width: 54,
    height: 54,
    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
    pixelOffset: new Cesium.Cartesian2(0, 6),
    scaleByDistance: new Cesium.NearFarScalar(300, 1.1, 1.2e6, 0.12),
    translucencyByDistance: new Cesium.NearFarScalar(7e5, 1.0, 1.8e6, 0),
    eyeOffset: new Cesium.Cartesian3(0, 0, -10),
  });
  billboard.__placeId = key;
  placeIndex.set(key, { primitive: billboard, place });
  viewer.scene.requestRender();
}

async function fetchOSMNearby(lat, lng, radiusM) {
  radiusM = radiusM || 6000;
  const zk = Math.round(lat * 10) + ',' + Math.round(lng * 10);
  if (_osmFetchedZones.has(zk)) return;
  _osmFetchedZones.add(zk);
  const q = '[out:json][timeout:25];('
    + 'node["name"]["amenity"~"restaurant|cafe|bar|fast_food|pub|hotel|pharmacy|bank|atm|supermarket|hospital|clinic|cinema|theatre|museum|doctors|convenience"](around:' + radiusM + ',' + lat + ',' + lng + ');'
    + 'node["name"]["shop"](around:' + radiusM + ',' + lat + ',' + lng + ');'
    + 'node["name"]["tourism"~"hotel|hostel|motel|attraction|museum|gallery|viewpoint"](around:' + radiusM + ',' + lat + ',' + lng + ');'
    + ');out 600;';
  const json = await _overpassFetch(q);
  if (!json) { _osmFetchedZones.delete(zk); return; }   // allow retry later
  const elements = json.elements || [];
  elements.forEach(addPlacePoint);
  if (elements.length) toast(elements.length + ' places nearby', '');
}

async function _autoLoadPlaces() {
  if (window._userLat) { fetchOSMNearby(window._userLat, window._userLng, 6000); return; }
  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    if (d && d.latitude) {
      window._userLat = d.latitude; window._userLng = d.longitude;
      fetchOSMNearby(d.latitude, d.longitude, 8000);
      setUserBeacon(d.latitude, d.longitude);
      if (viewer) {
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(d.longitude, d.latitude, 40000),
          duration: 3,
        });
      }
    }
  } catch (_) {}
}

  const vendor_id = window._cartVendorId || _osmIdFor(p);

async function openOrderTrackPanel(orderId) {

async function loadSignals() {
  if (!sb) return;
  const { data, error } = await sb
    .from('signals')
    .select('id, author_id, category, scope, status, title, body, lng, lat, amplitude, created_at, source, source_url, source_name')
    .eq('status', 'active')
    .order('created_at', { ascending: false })
    .limit(2000);
  if (error) {
    emitTelemetry('signals.load_failed', 'error', { error: normalizeTelemetryError(error) });
    console.error('[signals] load failed', error);
    return;
  }
  data.forEach(addSignalPoint);
  buildCatFilter();
  updateCatFilter();
}

function subscribeRealtime() {
  if (!sb) return;
  sb.channel('astranov-signals')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'signals' },
        p => p.new.status === 'active' && addSignalPoint(p.new))
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'signals' },
        p => updateSignalPoint(p.new))
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'signals' },
        p => removeSignalPoint(p.old.id))
    .subscribe();
  sb.channel('astranov-deliveries')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'deliveries' },
        p => { addDeliveryPin(p.new); loadDeliveryBadge(); })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'deliveries' },
        p => {
          if (p.new.status !== 'requested') removeDeliveryPin(p.new.id);
          loadDeliveryBadge();
          if ($('delivery-list')) loadDeliveryTab(_currentDeliveryTab || 'my-requests');
        })
    .subscribe();
  // Messages → badge update
  sb.channel('astranov-messages')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
      if (p.new.recipient_id === session?.user.id) {
        loadMessageBadge();
        if ($('msg-thread-container')) _appendIncomingBubble(p.new);
      }
    })
    .subscribe();
}

/* ==============================================================
   5. Pin click → open signal panel
   ============================================================== */
function onCanvasClick(click) {
  if (!viewer) return;
  const picked = viewer.scene.pick(click.position);
  if (picked?.primitive?.__cityId) {
    flyToCity(cityDotIndex.get(picked.primitive.__cityId)?.city);
    return;
  }
  if (picked?.primitive?.__signalId) {
    const entry = signalIndex.get(picked.primitive.__signalId);
    if (entry) openSignalPanel(entry.signal);
    return;
  }
  if (picked?.primitive?.__deliveryId) {
    const entry = deliveryIndex.get(picked.primitive.__deliveryId);
    if (entry) openDeliveryPanel(entry.delivery.id);
    return;
  }
  if (picked?.primitive?.__placeId) {
    const entry = placeIndex.get(picked.primitive.__placeId);
    if (entry) {
      // Act-first: vendor pin → straight to menu + order. The place panel is
      // briefly shown to set _currentPlace, then the order panel takes over.
      openPlacePanel(entry.place);
      setTimeout(() => { try { _placeOrder(); } catch (_) {} }, 180);
    }
    return;
  }
  // Empty globe tap → descend one navigation level toward the tapped point.
  const ray = viewer.camera.getPickRay(click.position);
  const ground = ray && viewer.scene.globe.pick(ray, viewer.scene);
  if (ground) {
    const carto = Cesium.Cartographic.fromCartesian(ground);
    const lat = Cesium.Math.toDegrees(carto.latitude);
    const lng = Cesium.Math.toDegrees(carto.longitude);
    const h = viewer.camera.positionCartographic.height;
    let target;
    if (h > LEVEL_THRESHOLDS.global)        target = 700_000;   // global → national
    else if (h > LEVEL_THRESHOLDS.national) target = 8_000;     // national → city
    else                                    target = 1_200;     // city → street
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(lng, lat, target),
      duration: 1.6,
      orientation: { heading: 0, pitch: Cesium.Math.toRadians(target < 10_000 ? -65 : -90), roll: 0 },
    });
    return;
  }
  closePanel();
}

async function _acquireRadar() {
  let coords;
  try {
    coords = await getUserLocation();
  } catch (e) {
    const core = $('radar-core');
    if (core) core.classList.remove('acquiring');
    const coordEl = $('radar-coords');
    if (coordEl) coordEl.textContent = 'NO FIX';
    const sig = $('radar-signals');
    if (sig) sig.innerHTML = `<div class="gadget-engage armed" onclick="recalibrateRadar()" style="margin:12px auto;max-width:200px"><span class="verb-glyph"></span><span>Reacquire</span></div>`;
    return;
  }

  const core = $('radar-core');
  if (core) { core.classList.remove('acquiring'); core.classList.add('locked'); core.dataset.lat = coords.lat; core.dataset.lng = coords.lng; }
  const coordEl = $('radar-coords');
  if (coordEl) coordEl.textContent = `${coords.lat.toFixed(3)}° ${coords.lng > 0 ? '+' : ''}${coords.lng.toFixed(3)}°`;

  viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(coords.lng, coords.lat, 12_000), duration: 2.5 });

  const { data, error } = await sb.rpc('nearby_signals', { p_lat: coords.lat, p_lng: coords.lng, radius_meters: 50_000, max_results: 50 });
  if (error) {
    const sig = $('radar-signals');
    if (sig) sig.innerHTML = `<div style="color:#ff9e9e;font-size:12px;text-align:center;padding:8px">signal rpc: ${escapeHtml(error.message)}</div>`;
    return;
  }

  _renderRadarBlips(data || [], coords);
  _renderRadarSignalList(data || [], coords);

  // Populate globe with nearby real-world places from OpenStreetMap
  fetchOSMNearby(coords.lat, coords.lng, 5000);
}

window.recalibrateRadar = async () => {
  const core = $('radar-core');
  if (!core || core.classList.contains('acquiring')) return;
  core.classList.remove('locked');
  core.classList.add('acquiring');
  const coordEl = $('radar-coords');
  if (coordEl) coordEl.textContent = 'ACQUIRING';
  const blips = $('radar-blips');
  if (blips) blips.innerHTML = '';
  const sig = $('radar-signals');
  if (sig) sig.innerHTML = '';
  await _acquireRadar();
};

function _renderRadarBlips(signals, myCoords) {
  const container = $('radar-blips');
  if (!container) return;
  container.innerHTML = '';
  const cx = 110, cy = 110, maxR = 82;
  signals.slice(0, 30).forEach(s => {
    if (!s.lat || !s.lng) return;
    const bearing = Math.atan2(s.lng - myCoords.lng, s.lat - myCoords.lat);
    const dist = Math.min((s.distance_meters || 0) / 50_000, 0.98);
    const blip = document.createElement('div');
    blip.className = 'radar-blip';
    blip.style.left = (cx + maxR * dist * Math.sin(bearing)) + 'px';
    blip.style.top  = (cy - maxR * dist * Math.cos(bearing)) + 'px';
    blip.style.background = RADAR_COLORS[s.category] || '#fff';
    blip.style.boxShadow = `0 0 6px ${RADAR_COLORS[s.category] || '#fff'}`;
    blip.title = s.title;
    blip.addEventListener('click', () => flyToSignal(s.id));
    container.appendChild(blip);
  });
}

function _renderRadarSignalList(data, coords) {
  const container = $('radar-signals');
  if (!container) return;
  const rows = data.map(s => `
    <div class="radar-row" onclick="flyToSignal('${s.id}')">
      <span class="dot" style="background:${RADAR_COLORS[s.category] || '#fff'}"></span>
      <div class="meta">
        <div class="title">${escapeHtml(s.title)}</div>
        <div class="sub">${s.category.replace('_',' ')} · ${formatRelative(s.created_at)}</div>
      </div>
      <div class="dist">${formatDistance(s.distance_meters)}</div>
    </div>
  `).join('');
  container.innerHTML = rows || '<div style="color:#6a8aaf;font-size:12px;text-align:center;padding:10px">nothing within 50 km</div>';
  if (coords && session) {
    container.insertAdjacentHTML('afterbegin', `
      <div class="gadget-engage" onclick="setHomeLocation(${coords.lat},${coords.lng})" style="margin:0 0 10px;font-size:11px;padding:8px 14px">
        <span class="verb-glyph">⌖</span><span>Lock as home</span>
      </div>
    `);
  }
}

async function getUserLocation() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error('Geolocation API not available'));
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
      err => reject(err),
      { timeout: 15_000, enableHighAccuracy: true, maximumAge: 60_000 }
    );
  });
}

async function reverseGeocode(lat, lng) {
  // Nominatim — free, no key, please respect rate limit (1 req/sec)
  const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&zoom=10`;
  const r = await fetch(url, { headers: { 'Accept-Language': navigator.language || 'en' } });
  if (!r.ok) throw new Error('Nominatim ' + r.status);
  const data = await r.json();
  return {
    country_code: data.address?.country_code,
    country: data.address?.country,
    city: data.address?.city || data.address?.town || data.address?.village || data.address?.county,
    display_name: data.display_name,
  };
}

function formatDistance(m) {
  if (m == null) return '';
  if (m < 1000) return `${Math.round(m)} m`;
  if (m < 100_000) return `${(m / 1000).toFixed(1)} km`;
  return `${Math.round(m / 1000)} km`;
}

      target.innerHTML = '<div style="color:#6a8aaf;padding:12px 0;font-size:13px">No orders yet. Tap a vendor on the globe, then ORDER.</div>';

      .select('*').eq('requester_id', session.user.id)
      .order('created_at', { ascending: false }).limit(40));
  } else if (tab === 'my-runs') {
    ({ data, error } = await sb.from('deliveries')
      .select('*').eq('runner_id', session.user.id)
      .order('created_at', { ascending: false }).limit(40));
  } else if (tab === 'nearby') {
    let coords;
    try { coords = await getUserLocation(); }
    catch (e) {
      target.innerHTML = `<div style="color:#ff9e9e">Location needed: ${escapeHtml(e.message || 'denied')}</div>`;
      return;
    }
    ({ data, error } = await sb.rpc('nearby_deliveries', {
      lat: coords.lat, lng: coords.lng, radius_meters: 20_000, max_results: 50,
    }));

    return;
  }

  if (error) {
    target.innerHTML = `<div style="color:#ff9e9e">${escapeHtml(error.message)}</div>`;
    return;
  }
  if (!data || data.length === 0) {
    target.innerHTML = `<div style="color:#6a8aaf;padding:12px 0">${tab === 'nearby' ? 'No open deliveries near you.' : 'Nothing here yet.'}</div>`;

  const { data: d } = await sb.from('deliveries').select('*').eq('id', id).single();

/* ==============================================================
   Delivery globe pins — yellow rings for open delivery requests.
   Visible at NATIONAL / PERSONAL zoom only.
   ============================================================== */
let deliveryPoints = null;
const deliveryIndex = new Map(); // id → { primitive, delivery }

function ensureDeliveryCollection() {
  if (!deliveryPoints && viewer) {
    deliveryPoints = viewer.scene.primitives.add(new Cesium.PointPrimitiveCollection());
  }
}

function addDeliveryPin(d) {
  if (!viewer) return;
  const lat = d.pickup_lat, lng = d.pickup_lng;
  if (lat == null || lng == null) return;
  ensureDeliveryCollection();
  if (deliveryIndex.has(d.id)) return;
  const prim = deliveryPoints.add({
    position: Cesium.Cartesian3.fromDegrees(Number(lng), Number(lat)),
    pixelSize: 14,
    color: Cesium.Color.fromCssColorString('#ffd47e').withAlpha(0.9),
    outlineColor: Cesium.Color.fromCssColorString('#ffaa00').withAlpha(0.7),
    outlineWidth: 3,
    scaleByDistance: new Cesium.NearFarScalar(1.5e3, 1.4, 8e6, 0.4),
    show: currentLevel !== 'global',
  });
  prim.__deliveryId = d.id;
  deliveryIndex.set(d.id, { primitive: prim, delivery: d });
  viewer.scene.requestRender();
}

function removeDeliveryPin(id) {
  const entry = deliveryIndex.get(id);
  if (!entry || !deliveryPoints) return;
  deliveryPoints.remove(entry.primitive);
  deliveryIndex.delete(id);
  if (viewer) viewer.scene.requestRender();
}

  if (!sb) return;
  const { data } = await sb.from('deliveries')

    .eq('status','requested')
    .not('pickup_lat','is',null)
    .limit(200);
  (data || []).forEach(addDeliveryPin);
}

window.flyToSignal = async (id) => {

    const { data } = await sb.from('signals').select('*').eq('id', id).single();
    if (data && data.lat && data.lng) { addSignalPoint(data); entry = signalIndex.get(id); }
  }
  if (!entry) return;
  const { lng, lat } = entry.signal;
  if (viewer && lng != null && lat != null) {
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(Number(lng), Number(lat), 50000),

async function tryAutoCredentials() {
  if (session || !sb) return;
  // Try browser's saved password manager silently (no UI prompt)
  if (navigator.credentials?.get) {
    try {
      const cred = await navigator.credentials.get({ password: true, mediation: 'silent' });
      if (cred?.type === 'password' && cred.id && cred.password) {
        const { error } = await sb.auth.signInWithPassword({ email: cred.id, password: cred.password });
        if (!error) return; // auto signed in
      }
    } catch (_) {}
  }
  // First-visit nudge — show once, non-blocking
  const key = 'av_identity_nudge_v1';
  if (!localStorage.getItem(key)) {
    localStorage.setItem(key, '1');
    setTimeout(() => { if (!session) toast('Tap ME ◉ to connect your identity', ''); }, 3500);
  }
}

let emitState = { category: 'news', amplitude: 1 };

window.openEmitPanel = () => {
  if (!session) return openYouPanel();

  const CATS = [

    { id: 'real_estate', label: 'Estate'  },
    { id: 'classifieds', label: 'Class.'  },
  ];
  // Live category counts from currently-loaded signals on the globe.
  const counts = {};
  for (const { signal } of signalIndex.values()) {
    counts[signal.category] = (counts[signal.category] || 0) + 1;
  }
  emitState = { category: 'news', amplitude: 1 };

  openPanel(`
    <h2>Pulse emitter</h2>
    <div class="subtitle">Drop a signal at the camera's centre point</div>

    <div class="gadget-seg wrap" id="emit-cat-seg">
      ${CATS.map(c => `
        <div class="seg${c.id==='news'?' active':''}" data-cat="${c.id}">
          ${c.label}<span class="count">${counts[c.id] || 0}</span>
        </div>`).join('')}
    </div>

    <div class="gadget-cmd-wrap">
      <input id="emit-title" class="gadget-cmd" type="text" placeholder="signal title…" maxlength="200" />
    </div>
    <div class="gadget-cmd-wrap" style="margin-top:8px">
      <textarea id="emit-body" class="gadget-cmd" placeholder="payload (optional)…" maxlength="5000"></textarea>
    </div>

    <div class="gadget-dial-wrap">
      <div class="gadget-dial" id="emit-dial">
        <div class="track"></div><div class="arc"></div><div class="value">1</div>
      </div>
      <div class="gadget-dial-meta">
        <div class="label">Amplitude · drag vertical</div>
        <div class="gadget-reach" id="emit-reach"></div>
        <div class="gadget-reach-label">
          <span>local</span><span id="emit-reach-label">~ 1 km</span><span>orbital</span>
        </div>
      </div>
    </div>

    <div class="gadget-engage" id="emit-engage" onclick="emitSignal()">
      <span class="verb-glyph"></span><span>Emit signal</span>
    </div>
  `);

  // Segmented selector
  document.querySelectorAll('#emit-cat-seg .seg').forEach(seg => {
    seg.addEventListener('click', () => {
      document.querySelectorAll('#emit-cat-seg .seg').forEach(s => s.classList.remove('active'));
      seg.classList.add('active');
      emitState.category = seg.dataset.cat;
    });
  });

  // Intensity dial — drag-vertical to set amplitude (1..25)
  const dial = $('emit-dial');
  const dialValue = dial.querySelector('.value');
  const reach = $('emit-reach');
  const reachLbl = $('emit-reach-label');
  let dragStart = null, baseValue = emitState.amplitude;
  const setAmp = (a) => {
    a = Math.max(1, Math.min(25, Math.round(a)));
    emitState.amplitude = a;
    const pct = (a / 25) * 100;
    dial.style.setProperty('--pct', pct.toFixed(1));
    dialValue.textContent = a;
    reach.style.setProperty('--pct', pct.toFixed(1) + '%');
    const km = a < 5 ? a : a < 12 ? a * 8 : a < 20 ? a * 40 : 99999;
    reachLbl.textContent = a >= 20 ? 'orbital · global' : a >= 12 ? `national · ~${km} km` : a >= 5 ? `regional · ~${km} km` : `local · ~${km} km`;
  };
  setAmp(emitState.amplitude);
  dial.addEventListener('pointerdown', e => {
    dragStart = e.clientY; baseValue = emitState.amplitude;
    try { dial.setPointerCapture(e.pointerId); } catch (_) {}
  });
  dial.addEventListener('pointermove', e => {
    if (dragStart == null) return;
    setAmp(baseValue + (dragStart - e.clientY) / 6);
  });
  const endDrag = () => { dragStart = null; };
  dial.addEventListener('pointerup', endDrag);
  dial.addEventListener('pointercancel', endDrag);

  // Engage gadget arms when title is non-empty
  const engage = $('emit-engage');
  const title = $('emit-title');
  const refreshArm = () => engage.classList.toggle('armed', !!title.value.trim());
  title.addEventListener('input', refreshArm);
  refreshArm();
};

window.emitSignal = async () => {
  const title = $('emit-title')?.value.trim();
  if (!title) return;
  const center = viewer.camera.pickEllipsoid(
    new Cesium.Cartesian2(window.innerWidth / 2, window.innerHeight / 2),
    viewer.scene.globe.ellipsoid
  );
  if (!center) return toast('Aim the camera at the ground first.');
  const carto = Cesium.Cartographic.fromCartesian(center);
  const lng = Cesium.Math.toDegrees(carto.longitude);
  const lat = Cesium.Math.toDegrees(carto.latitude);

  const engage = $('emit-engage');
  if (engage) { engage.classList.add('armed'); engage.querySelector('span:last-child').textContent = 'Transmitting…'; }

  const { error } = await sb.from('signals').insert({
    author_id: session.user.id,
    category: emitState.category,
    scope: currentLevel === 'global' ? 'global' : (currentLevel === 'national' ? 'national' : 'local'),
    title,
    body: $('emit-body')?.value.trim() || null,
    amplitude: emitState.amplitude,
    location: `SRID=4326;POINT(${lng} ${lat})`,
    lat, lng,
  });
  if (error) {
    if (engage) engage.querySelector('span:last-child').textContent = error.message.slice(0, 40);
    return;
  }
  toast('Signal emitted — broadcasting to the globe', 'ok');
  closePanel();
};

function _renderVerdict(c) {

    <div class="delivery-row" style="cursor:default">

      <div class="meta" style="text-transform:none;letter-spacing:0">${escapeHtml(v.opinion||'')}</div>
    </div>`).join('');
  const t = c.tally || {};
  return `

      <div class="me-sec">The Twelve speak</div>
      ${votes || '<div style="color:#6a8aaf">—</div>'}

window._councilConvene = async (el) => {
  const title = ($('council-title')?.value || '').trim();
  if (!title) return toast('State the case first', 'err');
  const description = ($('council-desc')?.value || '').trim();
  if (el) { el.querySelector('span:last-child').textContent = 'The Council deliberates…'; el.style.pointerEvents = 'none'; }
  try {
    const { data, error } = await sb.functions.invoke('council', { body: { mode: 'convene', title, description } });
    if (error) throw error;
    if (!data?.case) throw new Error(data?.error || 'no verdict');
    const r = $('council-result'); if (r) r.innerHTML = _renderVerdict(data.case);

   8. AICYCLE ring → chat overlay, voice input, provider lock

const aicycleChat = $('aicycle-chat');
const aicycleMessages = $('aicycle-messages');
const aicycleHistory = [];

// Tapping the AICYCLE ring opens Astranov and starts listening + speaking.
// No buttons, no menu — pure automatic voice + type.
$('aicycle-float').addEventListener('click', () => {

function openAstranov() {
  aicycleChat.classList.add('visible');
  aicycleChat.style.height = ''; aicycleChat.style.maxHeight = '';
  try { window.speechSynthesis?.resume(); } catch (_) {}
  startVoiceSession();
}
function closeAstranov() {
  aicycleChat.classList.remove('visible');
  stopVoiceSession();
}
// Tapping the conversation while Astranov is talking interrupts it and listens.
$('aicycle-messages')?.addEventListener('click', () => {
  if (_speaking) { try { window.speechSynthesis?.cancel(); } catch (_) {} _speaking = false; listenTurn(); }

// Drag handle — resize panel between input-bar height and 60vh ceiling
(function() {
  const handle = $('aicycle-drag-handle');
  if (!handle) return;
  let startY = 0, startH = 0;
  handle.addEventListener('pointerdown', e => {
    e.preventDefault();
    handle.setPointerCapture(e.pointerId);
    startY = e.clientY;
    startH = aicycleChat.getBoundingClientRect().height;
    aicycleChat.classList.add('resizing');
  });
  handle.addEventListener('pointermove', e => {
    if (!handle.hasPointerCapture(e.pointerId)) return;
    const delta = startY - e.clientY;
    const minH = 60;
    const maxH = Math.round(window.innerHeight * 0.6);
    const newH = Math.max(minH, Math.min(maxH, startH + delta));
    aicycleChat.style.height = newH + 'px';
    aicycleChat.style.maxHeight = newH + 'px';
  });
  handle.addEventListener('pointerup', e => {
    handle.releasePointerCapture(e.pointerId);
    aicycleChat.classList.remove('resizing');
    // Snap closed if dragged below threshold
    if (aicycleChat.getBoundingClientRect().height < 80) {
      aicycleChat.classList.remove('visible');
      aicycleChat.style.height = '';
      aicycleChat.style.maxHeight = '';
    }
  });
  handle.addEventListener('pointercancel', e => {
    handle.releasePointerCapture(e.pointerId);
    aicycleChat.classList.remove('resizing');
  });
})();
