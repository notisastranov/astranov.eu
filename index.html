<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Astranov</title>
<meta name="astranov-build" content="20260720103000" />
<meta name="theme-color" content="#0a1020" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<style>
html,body{margin:0;height:100%;background:#000;color:#9cf;font:14px/1.4 system-ui,sans-serif}
#boot{position:fixed;inset:0;display:grid;place-items:center;z-index:99998}
#boot b{letter-spacing:.2em}
#boot p{opacity:.7;font-size:12px;margin-top:8px}
</style>
<script>
/* SAME-ORIGIN ONLY — no jsDelivr document.write */
(function(){
  try {
    if (matchMedia('(pointer:coarse)').matches || navigator.maxTouchPoints > 0) {
      window._globePerfLite = true;
      window._spartan = true;
    }
  } catch (e) {}
  var BUILD = '20260720103000';
  var FULL = '/index.full.html?v=' + BUILD;
  function fail(msg) {
    var el = document.getElementById('boot');
    if (el) el.innerHTML = '<div><b>ASTRANOV</b><p>' + msg + '</p></div>';
  }
  fetch(FULL, { cache: 'no-store', credentials: 'same-origin' })
    .then(function (r) {
      if (!r.ok) throw new Error('full ' + r.status);
      return r.text();
    })
    .then(function (html) {
      if (!html || html.length < 50000 || html.indexOf('__ASTRANOV_MANIFEST__') < 0) {
        throw new Error('invalid full shell');
      }
      location.replace(FULL);
    })
    .catch(function () {
      fail('Loading Earth…');
      var three = document.createElement('script');
      three.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
      three.onload = function () {
        window.__ASTRANOV_MANIFEST__ = {
          mode: 'js-phase-bundles',
          critical: ['/js/phase-critical.js'],
          app: ['/js/phase-app.js'],
          features: ['/js/phase-features.js'],
          deferred: ['/astranov-deferred.js']
        };
        window._bootAt = Date.now();
        window._spartan = true;
        window.__ASTRANOV_HARD_BOOT__ = 1;
        function s(src) {
          return new Promise(function (res) {
            var el = document.createElement('script');
            el.src = src + '?v=' + BUILD;
            el.onload = function () { res(); };
            el.onerror = function () { res(); };
            document.head.appendChild(el);
          });
        }
        s('/js/loader.js').then(function () {
          if (window.AstranovLoader && AstranovLoader.run) return AstranovLoader.run();
        }).then(function () {
          return s('/astranov-os-boot.js');
        }).then(function () {
          var b = document.getElementById('boot');
          if (b) b.remove();
        });
      };
      three.onerror = function () { fail('Earth failed — hard refresh'); };
      document.head.appendChild(three);
    });
})();
</script>
</head>
<body>
  <div id="boot"><div><b>ASTRANOV</b><p>Starting OS…</p></div></div>
  <script src="/astranov-continuity.js?v=20260720103000"></script>
</body>
</html>
