<!DOCTYPE html>
<html lang="en" data-skin="spacex" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SpaceNet · Astranov</title>
<meta name="astranov-build" content="20260722210000" />
<meta name="description" content="SpaceNet — multi-device globe OS. Jobs, dating, delivery, search on Earth." />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<style>
  :root {
    --bg: #000;
    --fg: #f2f2f2;
    --muted: rgba(180,180,180,.75);
    --line: rgba(255,255,255,.16);
    --panel: rgba(0,0,0,.82);
    --ok: #6dffb0;
    --err: #ff6b5a;
    --cmd: #fff;
    --dim: rgba(160,160,160,.85);
    --accent: #fff;
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-t: env(safe-area-inset-top, 0px);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    overflow: hidden; background: var(--bg); color: var(--fg);
    font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  #globe { position: fixed; inset: 0; z-index: 1; touch-action: none; }
  #globe canvas { display: block; width: 100% !important; height: 100% !important; cursor: grab; }
  #globe canvas:active { cursor: grabbing; }

  #boot {
    position: fixed; inset: 0; z-index: 50; display: grid; place-items: center;
    background: #000; transition: opacity .35s ease;
  }
  #boot.hide { opacity: 0; pointer-events: none; }
  .boot-card {
    text-align: center; letter-spacing: .28em; text-indent: .28em;
  }
  .boot-card b { display: block; font-size: 13px; font-weight: 600; margin-bottom: 10px; }
  .boot-card p { margin: 0; font-size: 11px; color: var(--muted); letter-spacing: .06em; text-indent: 0; }
  .boot-card .dim { margin-top: 8px; opacity: .6; }

  #topbar {
    position: fixed; top: max(10px, var(--safe-t)); left: 0; right: 0; z-index: 20;
    display: flex; justify-content: center; pointer-events: none;
  }
  #logo {
    pointer-events: auto; border: 1px solid var(--line); background: var(--panel);
    color: #fff; border-radius: 999px; padding: 8px 16px; font-size: 12px; font-weight: 600;
    letter-spacing: .36em; text-indent: .36em; cursor: pointer;
    backdrop-filter: blur(10px); min-height: 38px;
  }
  #logo:active { transform: scale(.97); }
  #hud-line {
    position: fixed; top: max(52px, calc(var(--safe-t) + 44px)); left: 12px; right: 12px;
    z-index: 18; font: 11px/1.3 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: var(--muted); pointer-events: none; text-align: center;
    text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
  }

  #dock {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
    padding: 0 8px max(8px, var(--safe-b));
    pointer-events: none;
  }
  #panel {
    pointer-events: auto;
    max-width: 520px; margin: 0 auto;
    background: var(--panel); border: 1px solid var(--line); border-radius: 16px 16px 14px 14px;
    backdrop-filter: blur(14px);
    box-shadow: 0 -8px 32px rgba(0,0,0,.55);
    overflow: hidden;
    display: flex; flex-direction: column;
    max-height: min(42vh, 360px);
  }
  #cli-preview {
    font: 10px/1.3 ui-monospace, Menlo, Consolas, monospace;
    color: var(--muted); padding: 8px 12px 0; min-height: 22px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #cli-log {
    flex: 1; overflow: auto; padding: 6px 12px 4px;
    font: 11px/1.4 ui-monospace, Menlo, Consolas, monospace;
    min-height: 72px; max-height: 28vh;
    -webkit-overflow-scrolling: touch;
  }
  .cli-line { margin: 2px 0; word-break: break-word; }
  .cli-line.cmd { color: var(--cmd); opacity: .9; }
  .cli-line.ok { color: var(--ok); }
  .cli-line.err { color: var(--err); }
  .cli-line.dim { color: var(--dim); }
  #cli-bar {
    display: flex; gap: 6px; align-items: center; padding: 8px 10px 10px;
    border-top: 1px solid var(--line);
  }
  #cli-bar button {
    width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--line);
    background: rgba(18,18,18,.95); color: #fff; font-size: 14px; cursor: pointer;
    flex-shrink: 0; touch-action: manipulation;
  }
  #cli-bar button:active { transform: scale(.94); }
  #cli-form { flex: 1; display: flex; min-width: 0; }
  #cli-in {
    width: 100%; border: 1px solid var(--line); border-radius: 12px;
    background: rgba(12,12,12,.9); color: var(--fg);
    font: 13px/1.3 ui-monospace, Menlo, Consolas, monospace;
    padding: 10px 12px; outline: none; min-height: 40px;
  }
  #cli-in::placeholder { color: var(--muted); font-size: 11px; }
  #cli-in:focus { border-color: rgba(255,255,255,.35); }

  @media (min-width: 720px) {
    #panel { max-height: min(38vh, 400px); }
    #cli-log { max-height: 22vh; }
  }
</style>
</head>
<body class="skin-spacex">
<div id="boot"><div class="boot-card"><b>SPACENET</b><p>Earth.</p></div></div>
<div id="topbar">
  <button type="button" id="logo" title="Reload SpaceNet">SPACENET</button>
</div>
<div id="hud-line"></div>
<div id="globe" aria-label="Earth globe"></div>
<div id="dock">
  <div id="panel">
    <div id="cli-preview">SpaceNet · loading…</div>
    <div id="cli-log" aria-live="polite"></div>
    <div id="cli-bar">
      <button type="button" id="btn-locate" title="Locate">🎯</button>
      <form id="cli-form" action="#" autocomplete="off">
        <input id="cli-in" name="q" enterkeyhint="send" autocomplete="off" autocapitalize="off"
          spellcheck="false" placeholder="job barman 3h · date coffee · deliver · search · locate" />
      </form>
      <button type="button" id="btn-help" title="Help">?</button>
    </div>
  </div>
</div>
<script>
document.getElementById('logo')?.addEventListener('click', function () {
  location.reload();
});
// Kill old service workers that freeze dead shells
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations?.().then(function (regs) {
    regs.forEach(function (r) { r.unregister().catch(function () {}); });
  }).catch(function () {});
  try {
    caches && caches.keys && caches.keys().then(function (keys) {
      keys.forEach(function (k) { if (/astranov/i.test(k)) caches.delete(k); });
    });
  } catch (e) {}
}
</script>
<script src="/js/spacenet/boot.js?v=20260722210000" defer></script>
</body>
</html>
