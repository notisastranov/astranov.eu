================================================================================
ASTRANOV — MASTER LAW
================================================================================
Single source of truth. Every update to this app updates this block FIRST.

1.  IDENTITY
    Internet Operating System. Globe-first collective reality interface.
    Frontend = THIS FILE only. Backend = Supabase (db + Edge Functions + Realtime).

2.  STACK (frozen)
    Maps      CesiumJS only. Leaflet, globe.gl, raw-Three banned.

3.  IMAGERY LAW — Reality First (binding, all zoom)
    Globe tier (orbital → continental): only real Earth imagery. No procedural
    textures beyond a transient load shimmer. Two layers mandatory, blended
    along the real day/night terminator via Globe.enableLighting=true:
      DAY    NASA Blue Marble Next Generation (BMNG) — public domain.
      NIGHT  NASA Black Marble / Earth at Night — public domain.
    Source via NASA GIBS WMTS (free, no key) or Cesium Ion (allowlisted).

    City tier (regional → street): multiple real-cartography providers,

      1. OpenStreetMap raster — default
      2. CARTO Voyager / Positron / Dark Matter — free tier
      3. Esri World Imagery — free non-commercial
      4. Stadia Alidade Dark — free tier (key)
      5. Protomaps (PMTiles) — when self-hosted
      6. MapTiler — free tier (key)
    Any module rendering map pixels at any zoom sources from this section.

4.  GADGET LAW — Smart Gadgets Only (binding)
    Every interactive element is a smart gadget. Definition (all five hold):
      a. State-aware — visual form reflects current state, not only hover.
      b. Feedback-rich — motion / telemetry / sound on input AND on bg change.
      c. Context-bound — lives in a defined HUD zone; position is semantic.
      d. Affordance beyond click — hold / voice / gesture / chain available.
      e. Aesthetically native — rings, pulses, segmented bars, scopes, dials.
    Forbidden: plain <button> with text-only, native <select> chrome, generic
    OK/Cancel modals, hyperlink-style nav, stacked label-over-input forms,
    any element labeled "Submit". OS verbs: EMIT, LOCK, ENGAGE, ACQUIRE,
    TRANSMIT, BROADCAST. Translation table:
      login         → identity orb (.gadget-orb) with live auth state.
      post signal   → pulse emitter w/ intensity dial + reach indicator.
      category pick → segmented HUD selector (.gadget-seg) w/ live counts.
      layer toggle  → physical switch with active-state glow (#layer-switch).
      locate me     → scope gadget (.gadget-scope) that acquires position.
      modal confirm → engage gadget (.gadget-engage), never a flat button.

5.  NAVIGATION
    One Cesium camera, three altitude bands:  GLOBAL >5,000 km · NATIONAL
    500–5,000 km · PERSONAL <500 km. Back button + level badge auto-fade.

6.  ZERO UI
    Globe always visible. AICYCLE ring (#aicycle-float) is the ONLY always-
    visible UI element. Everything else is transient.

7.  AICYCLE — Collective Intelligence
    Edge Function /aicycle. Owner cycle starts at Claude Opus; free cycle is
    Groq → Gemini → GPT-4o-mini → xAI Grok. Returns {response, provider,
    via, label}. Logged to cic_logs. Provider chips lock/unlock the cycle.

8.  MEMORY LAW
    ai_memory.is_private = true → row NEVER reaches any AI. RLS enforced.

9.  SECURITY LAW
    Secrets live ONLY in Edge Function env. Public client tokens (Supabase
    anon, allowlisted Cesium Ion) may live here. is_owner has client UPDATE
    revoked. RLS on every public table.

10. KRYPTEIA — security only, owner-only
    Watch for stolen code/content, auto-DMCA. Detect abuse: spam, auth
    flooding, exploits, harassment. Threat log = security_events.

11. CRAWLERS — automatic, no human button
    pg_cron triggers /crawl every 30 min. rss, osm_overpass, wikipedia_geo.
    Insert as source='crawler', author_id=null, with expiry.

12. MARKETPLACE
    Deliveries: requester posts pickup+dropoff+description+AVC reward;
    runners claim via accept_delivery RPC; flow requested → accepted →
    in_transit → delivered (or cancelled). Discovery via nearby_deliveries.

13. CALLING
    1:1 WebRTC. Signaling over Supabase Realtime channels:
      astranov:user:<uid>   inbox for invites
      astranov:call:<id>    per-call SDP + ICE
    STUN: Google public. No TURN yet.

14. JS SAFETY
    CDN-dependent init wrapped in try-catch. Inline JS must pass `node --check`
    before commit. Never raw single quotes inside template literals; use
    JSON.stringify() for dynamic onclick strings.

15. EVOLUTION RULE
    This law strives shorter, more inclusive, more precise. If a rule can be
    removed without weakening the constitution, remove it.

<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#000000" />
<title>ASTRANOV</title>
<link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css" />
<style>
  /* ============================================================
     ZERO UI — only the globe and the AICYCLE ring are permanent.
     ============================================================ */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
               background: #000; color: #e6f1ff; font-family: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Display", system-ui, sans-serif;
               -webkit-tap-highlight-color: transparent; user-select: none; }

  /* The Cesium canvas owns the screen. */
  #cesiumContainer { position: fixed; inset: 0; background: #000; }
  .cesium-viewer-bottom { display: none !important; }   /* kill the bottom credit strip */
  .cesium-viewer { background: #000 !important; }

  /* Cold-load veil — fades out once Cesium mounts. */
  #boot {
    position: fixed; inset: 0; background: radial-gradient(ellipse at center, #0a1428 0%, #000 70%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; transition: opacity 0.8s ease;
  }
  #boot.gone { opacity: 0; pointer-events: none; }
  #boot .word { font-size: 14px; letter-spacing: 0.6em; text-indent: 0.6em;
                color: #4a7fb8; font-weight: 300; }
  #boot .pulse { width: 8px; height: 8px; border-radius: 50%; background: #4a7fb8;
                 margin-top: 18px; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); }
                     50%      { opacity: 1;   transform: scale(1.4); } }

  /* ============================================================
     AICYCLE ring — always visible. Bottom-right.
     ============================================================ */
  #aicycle-float {
    position: fixed; bottom: max(20px, env(safe-area-inset-bottom)); right: 20px;
    width: 64px; height: 64px; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  #aicycle-float .ring { position: absolute; inset: 0; border-radius: 50%;
                     border: 1.5px solid rgba(120, 180, 255, 0.4);
                     background: rgba(10, 20, 40, 0.55); backdrop-filter: blur(8px);
                     -webkit-backdrop-filter: blur(8px);
                     transition: border-color 0.3s; }
  #aicycle-float.thinking .ring { animation: ring-pulse 1.2s ease-in-out infinite; }
  @keyframes ring-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(120, 180, 255, 0.4); }
    50%      { box-shadow: 0 0 0 12px rgba(120, 180, 255, 0); }
  }
  #aicycle-float .node { position: relative; width: 12px; height: 12px; border-radius: 50%;
                     background: #7eb4ff; box-shadow: 0 0 12px rgba(120, 180, 255, 0.8);
                     transition: background 0.2s; }
  #aicycle-float .provider {
    position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
    font-size: 9px; letter-spacing: 0.15em; color: rgba(200, 220, 255, 0.6);
    text-transform: uppercase; white-space: nowrap; pointer-events: none;
  }

  /* ============================================================
     Level badge — top, auto-fades.
     ============================================================ */
  #level-badge {
    position: fixed; top: max(16px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    padding: 6px 14px; border-radius: 999px;
    background: rgba(10, 20, 40, 0.6); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(120, 180, 255, 0.2);
    font-size: 10px; letter-spacing: 0.3em; color: #a8c8ee; text-transform: uppercase;
    opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 40;
  }
  #level-badge.visible { opacity: 1; }

  /* Imagery source indicator — only visible when on a fallback provider */
  #imagery-source {
    position: fixed; top: calc(max(16px, env(safe-area-inset-top)) + 28px);
    left: 50%; transform: translateX(-50%);
    padding: 3px 10px; border-radius: 999px;
    background: rgba(40, 20, 10, 0.6); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 180, 100, 0.25);
    font-size: 9px; letter-spacing: 0.25em; color: #ffb464; text-transform: uppercase;
    opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 40;
  }
  #imagery-source.visible { opacity: 1; }

  /* ============================================================
     Back button — top-left, contextual.
     ============================================================ */
  #back-btn {
    position: fixed; top: max(16px, env(safe-area-inset-top)); left: 16px;
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(10, 20, 40, 0.55); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(120, 180, 255, 0.2);
    display: none; align-items: center; justify-content: center;
    cursor: pointer; z-index: 40;
    color: #a8c8ee; font-size: 18px;
  }
  #back-btn.visible { display: flex; }

  /* ============================================================
     Tray — bottom strip, hidden by default.
     ============================================================ */
  #tray-trigger {
    position: fixed; bottom: 0; left: 0; right: 0; height: 8px; z-index: 30;
    background: linear-gradient(to top, rgba(120, 180, 255, 0.1), transparent);
  }
  #tray {
    position: fixed; left: 50%; transform: translate(-50%, 100%);
    bottom: max(12px, env(safe-area-inset-bottom));
    background: rgba(10, 20, 40, 0.75); backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(120, 180, 255, 0.2); border-radius: 22px;
    padding: 8px; display: flex; gap: 4px; z-index: 45;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    opacity: 0; pointer-events: none;
  }
  #tray.visible { transform: translate(-50%, 0); opacity: 1; pointer-events: auto; }
  #tray button {
    background: transparent; border: 0; color: #a8c8ee;
    padding: 8px 16px; font-size: 11px; letter-spacing: 0.12em;
    border-radius: 16px; cursor: pointer; text-transform: uppercase;
    transition: background 0.2s;
  }
  #tray button:hover, #tray button.active { background: rgba(120, 180, 255, 0.12); color: #fff; }

  /* ============================================================
     Panel — slides up from bottom for tasks.
     ============================================================ */
  #panel {
    position: fixed; left: 0; right: 0; bottom: 0;
    max-height: 70vh; overflow-y: auto;
    background: rgba(8, 16, 32, 0.92); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(120, 180, 255, 0.2);
    border-radius: 22px 22px 0 0;
    padding: 22px 22px calc(40px + env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 60;
  }
  #panel.visible { transform: translateY(0); }
  #panel h2 { margin: 0 0 4px; font-size: 13px; letter-spacing: 0.2em;
              color: #7eb4ff; text-transform: uppercase; font-weight: 500; }
  #panel .subtitle { font-size: 11px; color: #6a8aaf; margin-bottom: 16px; }
  #panel .row { display: flex; justify-content: space-between; align-items: center;
                padding: 10px 0; border-bottom: 1px solid rgba(120, 180, 255, 0.08); }
  #panel .row:last-child { border-bottom: 0; }
  #panel button.primary {
    width: 100%; padding: 12px; margin-top: 12px;
    background: rgba(120, 180, 255, 0.15); border: 1px solid rgba(120, 180, 255, 0.3);
    color: #e6f1ff; border-radius: 12px; font-size: 12px;
    letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer;
  }
  #panel input, #panel textarea, #panel select {
    width: 100%; padding: 10px; margin-top: 8px;
    background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(120, 180, 255, 0.2);
    border-radius: 10px; color: #e6f1ff; font-size: 14px; font-family: inherit;
  }
  #panel textarea { min-height: 80px; resize: vertical; }

  /* ============================================================
     AICYCLE chat panel — starts at input bar height, grows to 33vh.
     ============================================================ */
  #aicycle-chat {
    position: fixed; inset: auto 0 0 0;
    height: auto; max-height: 33vh; min-height: 0;
    background: rgba(8, 16, 32, 0.95); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(120, 180, 255, 0.2);
    border-radius: 22px 22px 0 0;
    transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 55; display: flex; flex-direction: column;
    overflow: hidden;
  }
  #aicycle-chat.visible { transform: translateY(0); }
  #aicycle-chat.resizing { transition: none; }
  #aicycle-drag-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: rgba(120, 180, 255, 0.3); margin: 8px auto 2px;
    cursor: ns-resize; flex-shrink: 0; touch-action: none;
  }
  #aicycle-chat .messages {
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 8px 16px 4px; min-height: 0;
  }
  #aicycle-chat .messages:empty { display: none; }
  #aicycle-chat .msg { margin-bottom: 12px; padding: 10px 14px; border-radius: 14px;
                   max-width: 85%; font-size: 14px; line-height: 1.4; }
  #aicycle-chat .msg.user { background: rgba(120, 180, 255, 0.12); margin-left: auto; }
  #aicycle-chat .msg.ai   { background: rgba(255, 255, 255, 0.04); }
  #aicycle-chat .msg .via { font-size: 9px; letter-spacing: 0.15em;
                        color: #6a8aaf; text-transform: uppercase; margin-bottom: 4px; }
  #aicycle-chat form { display: flex; gap: 8px; padding: 12px;
                   border-top: 1px solid rgba(120, 180, 255, 0.1); }
  #aicycle-chat input { flex: 1; padding: 12px; background: rgba(0, 0, 0, 0.4);
                    border: 1px solid rgba(120, 180, 255, 0.2);
                    border-radius: 12px; color: #e6f1ff; font-size: 14px; }
  #aicycle-chat button { padding: 0 16px; background: rgba(120, 180, 255, 0.2);
                     border: 0; border-radius: 12px; color: #fff; cursor: pointer; }

  /* Provider chip strip — header of AICYCLE chat */
  #aicycle-providers {
    display: flex; gap: 6px; padding: 10px 12px; flex-wrap: wrap;
    border-bottom: 1px solid rgba(120, 180, 255, 0.08);
  }
  .provider-chip {
    padding: 4px 10px; border-radius: 999px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(120, 180, 255, 0.15);
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: #a8c8ee; cursor: pointer; transition: all 0.2s;
    user-select: none;
  }
  .provider-chip:hover { background: rgba(120, 180, 255, 0.08); }
  .provider-chip.locked {
    background: rgba(126, 180, 255, 0.2);
    border-color: rgba(126, 180, 255, 0.6);
    color: #fff; font-weight: 500;
  }
  .provider-chip.locked::before { content: '🔒  '; }
  .provider-chip.disabled { opacity: 0.35; cursor: not-allowed; }

  /* Mic recording state (the AICYCLE node pulses red while listening) */
  #aicycle-float.listening .node {
    background: #ff5e5e; box-shadow: 0 0 16px rgba(255, 100, 100, 0.9);
    animation: mic-pulse 1s ease-in-out infinite;
  }
  @keyframes mic-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }

  /* Radar list — distance + category color */
  .radar-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid rgba(120, 180, 255, 0.06);
    cursor: pointer;
  }
  .radar-row:hover { background: rgba(120, 180, 255, 0.04); }
  .radar-row .meta { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .radar-row .title { font-size: 14px; color: #e6f1ff; overflow: hidden; text-overflow: ellipsis;
                       white-space: nowrap; }
  .radar-row .sub   { font-size: 10px; color: #6a8aaf; letter-spacing: 0.1em; text-transform: uppercase; }
  .radar-row .dot   { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
  .radar-row .dist  { font-size: 11px; color: #a8c8ee; margin-left: 12px; white-space: nowrap; }

  /* Memory rows — content + privacy toggle */
  .memory-row {
    padding: 10px 0; border-bottom: 1px solid rgba(120, 180, 255, 0.06);
  }
  .memory-row .body { font-size: 13px; color: #e6f1ff; line-height: 1.4; margin-bottom: 4px; }
  .memory-row .controls {
    display: flex; gap: 8px; align-items: center; font-size: 10px;
    color: #6a8aaf; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .memory-row .privacy-pill {
    padding: 2px 8px; border-radius: 999px; cursor: pointer; user-select: none;
    border: 1px solid rgba(120, 180, 255, 0.2);
  }
  .memory-row .privacy-pill.private {
    background: rgba(255, 100, 100, 0.12); border-color: rgba(255, 100, 100, 0.3); color: #ff9e9e;
  }
  .memory-row .privacy-pill.public {
    background: rgba(120, 255, 180, 0.1); border-color: rgba(120, 255, 180, 0.25); color: #9ee0bd;
  }
  .memory-row .del { cursor: pointer; color: #6a8aaf; }
  .memory-row .del:hover { color: #ff9e9e; }

  /* ============================================================
     Video calling
     ============================================================ */
  #call-incoming {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px); z-index: 80;
  }
  #call-incoming.visible { display: flex; }
  #call-incoming .card {
    background: rgba(15, 25, 45, 0.95); border: 1px solid rgba(120, 180, 255, 0.3);
    border-radius: 24px; padding: 32px; text-align: center; max-width: 320px;
    box-shadow: 0 0 60px rgba(120, 180, 255, 0.2);
  }
  #call-incoming .card .label { font-size: 11px; letter-spacing: 0.3em; color: #7eb4ff;
                                 text-transform: uppercase; margin-bottom: 6px; }
  #call-incoming .card .name { font-size: 22px; color: #fff; font-weight: 300;
                                margin-bottom: 24px; word-break: break-word; }
  #call-incoming .card .buttons { display: flex; gap: 12px; justify-content: center; }
  #call-incoming .card button {
    width: 60px; height: 60px; border-radius: 50%; border: 0; font-size: 24px;
    cursor: pointer; transition: transform 0.15s;
  }
  #call-incoming .card button:active { transform: scale(0.92); }
  #call-accept   { background: #2ecc71; color: #fff; }
  #call-decline  { background: #ff4d4d; color: #fff; }

  /* Active call — PiP style video tile, draggable feel */
  #call-active {
    position: fixed; bottom: 100px; right: 20px;
    width: 280px; height: 360px; display: none;
    background: #000; border: 1px solid rgba(120, 180, 255, 0.3);
    border-radius: 20px; overflow: hidden; z-index: 70;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
  }
  #call-active.visible { display: block; }
  #call-active video { width: 100%; height: 100%; object-fit: cover; background: #111; }
  #call-active #call-local-video {
    position: absolute; bottom: 60px; right: 8px;
    width: 80px; height: 100px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
  }
  #call-active .controls {
    position: absolute; bottom: 0; left: 0; right: 0; padding: 10px;
    display: flex; gap: 8px; justify-content: center;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  }
  #call-active .controls button {
    width: 40px; height: 40px; border-radius: 50%; border: 0; cursor: pointer;
    background: rgba(255, 255, 255, 0.15); color: #fff; font-size: 16px;
  }
  #call-active .controls #call-hangup { background: #ff4d4d; }
  #call-active .status {
    position: absolute; top: 8px; left: 8px;
    font-size: 10px; letter-spacing: 0.2em; color: #fff;
    background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 6px;
    text-transform: uppercase;
  }

  /* ============================================================
     Deliveries
     ============================================================ */
  .delivery-tabs {
    display: flex; gap: 4px; margin: 8px 0 16px;
    border-bottom: 1px solid rgba(120, 180, 255, 0.1);
  }
  .delivery-tabs button {
    background: transparent; border: 0; color: #6a8aaf;
    padding: 8px 12px; font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .delivery-tabs button.active { color: #fff; border-bottom-color: #7eb4ff; }

  .delivery-row {
    padding: 12px 0; border-bottom: 1px solid rgba(120, 180, 255, 0.06);
    cursor: pointer;
  }
  .delivery-row:hover { background: rgba(120, 180, 255, 0.04); }
  .delivery-row .head {
    display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px;
  }
  .delivery-row .desc { font-size: 14px; color: #e6f1ff; flex: 1; min-width: 0;
                        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .delivery-row .reward { font-size: 13px; color: #ffd47e; margin-left: 12px;
                          font-weight: 500; white-space: nowrap; }
  .delivery-row .meta { font-size: 10px; color: #6a8aaf; letter-spacing: 0.08em;
                        text-transform: uppercase; }
  .delivery-row .status {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 9px; letter-spacing: 0.15em; margin-right: 8px;
  }
  .status-requested { background: rgba(120,180,255,0.15); color: #7eb4ff; }
  .status-accepted  { background: rgba(255,200,80,0.15);  color: #ffc850; }
  .status-in_transit { background: rgba(255,150,80,0.15); color: #ff9650; }
  .status-delivered { background: rgba(120,255,180,0.15); color: #7eebb4; }
  .status-cancelled { background: rgba(160,160,160,0.15); color: #a0a0a0; }

  /* ============================================================
     SMART GADGETS — Gadget Law §4
     Vocabulary: orbs, rings, pulses, segmented bars, scopes, dials.
     No plain buttons. No native <select>. No "Submit".
     ============================================================ */

  /* Identity orb — replaces the login form. Lives in the You panel.
     Visual reflects auth state: idle / pending / signed-in / owner. */
  .gadget-orb {
    width: 96px; height: 96px; margin: 4px auto 14px;
    position: relative; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, rgba(120,180,255,0.4), rgba(10,20,40,0.85) 70%);
    border: 1.5px solid rgba(120,180,255,0.45);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: transform 0.2s, border-color 0.3s, background 0.3s;
  }
  .gadget-orb:hover { transform: scale(1.04); }
  .gadget-orb::before {
    content: ''; position: absolute; inset: -6px; border-radius: 50%;
    border: 1px solid rgba(120,180,255,0.22);
    animation: orb-halo 3.2s ease-in-out infinite;
  }
  @keyframes orb-halo {
    0%,100% { transform: scale(1);    opacity: 0.4; }
    50%     { transform: scale(1.08); opacity: 0.9; }
  }
  .gadget-orb.signed-in {
    border-color: rgba(126,235,180,0.7);
    background: radial-gradient(circle at 35% 30%, rgba(126,235,180,0.4), rgba(10,40,20,0.85) 70%);
  }
  .gadget-orb.signed-in::before { border-color: rgba(126,235,180,0.42); }
  .gadget-orb.owner {
    border-color: rgba(255,180,100,0.8);
    background: radial-gradient(circle at 35% 30%, rgba(255,180,100,0.4), rgba(40,20,10,0.85) 70%);
  }
  .gadget-orb.owner::before { border-color: rgba(255,180,100,0.5); }
  .gadget-orb.pending { animation: orb-pending 1.2s ease-in-out infinite; }
  @keyframes orb-pending {
    0%,100% { box-shadow: 0 0 0 0  rgba(120,180,255,0.55); }
    50%     { box-shadow: 0 0 0 16px rgba(120,180,255,0);    }
  }
  .gadget-orb .glyph {
    font-size: 26px; letter-spacing: 0.08em; color: #e6f1ff;
    font-weight: 300; text-transform: uppercase;
  }
  .gadget-orb-readout {
    text-align: center; font-size: 10px; letter-spacing: 0.25em;
    color: #6a8aaf; text-transform: uppercase; margin-bottom: 12px;
    font-family: 'SF Mono', monospace;
  }

  /* Command-line input — replaces label-over-input form rows */
  .gadget-cmd-wrap { position: relative; margin-top: 10px; }
  .gadget-cmd-wrap::before {
    content: '›'; position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%); color: #7eb4ff; font-weight: 700;
    pointer-events: none; font-size: 16px;
  }
  .gadget-cmd {
    width: 100%; padding: 10px 12px 10px 28px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(120,180,255,0.25); border-radius: 10px;
    font-family: 'SF Mono', 'Menlo', monospace; font-size: 13px;
    color: #e6f1ff; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .gadget-cmd:focus {
    border-color: rgba(126,235,180,0.6);
    box-shadow: 0 0 0 2px rgba(126,235,180,0.12);
  }
  textarea.gadget-cmd { min-height: 80px; resize: vertical; line-height: 1.45; }

  /* Engage gadget — replaces "Submit". Sweeping shimmer; verb glyph. */
  .gadget-engage {
    width: 100%; margin-top: 12px; padding: 14px 16px;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    background: linear-gradient(to right, rgba(120,180,255,0.06), rgba(120,180,255,0.18), rgba(120,180,255,0.06));
    border: 1px solid rgba(120,180,255,0.4); border-radius: 999px;
    color: #e6f1ff; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
    cursor: pointer; position: relative; overflow: hidden;
    transition: border-color 0.2s, transform 0.15s, color 0.2s;
    user-select: none;
  }
  .gadget-engage::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to right, transparent, rgba(120,180,255,0.4), transparent);
    transform: translateX(-100%);
    transition: transform 0.7s ease;
  }
  .gadget-engage:hover::before { transform: translateX(100%); }
  .gadget-engage:active { transform: scale(0.98); }
  .gadget-engage .verb-glyph {
    width: 8px; height: 8px; border-radius: 50%;
    background: #7eb4ff; box-shadow: 0 0 10px rgba(120,180,255,0.8);

  .gadget-engage.armed {
    border-color: rgba(126,235,180,0.75); color: #9ee0bd;
    box-shadow: 0 0 22px rgba(126,235,180,0.3);

  .gadget-engage.armed .verb-glyph {
    background: #7eebb4; box-shadow: 0 0 14px rgba(126,235,180,0.9);
    animation: verb-pulse 1.4s ease-in-out infinite;
  }
  @keyframes verb-pulse {
    0%,100% { transform: scale(1);   opacity: 1;   }
    50%     { transform: scale(1.4); opacity: 0.7; }
  }
  .gadget-engage[disabled] {
    opacity: 0.45; pointer-events: none; cursor: not-allowed;
  }

  /* Segmented HUD selector — replaces native <select>.
     Each segment is state-aware (locks active) and shows live counts. */
  .gadget-seg {
    display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;
    gap: 2px; margin: 10px 0; padding: 3px;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(120,180,255,0.18); border-radius: 12px;
    overflow-x: auto; scrollbar-width: none;
  }
  .gadget-seg.wrap { grid-auto-flow: row; grid-template-columns: repeat(auto-fill, minmax(72px,1fr)); }
  .gadget-seg::-webkit-scrollbar { display: none; }
  .gadget-seg .seg {
    padding: 7px 8px; text-align: center; cursor: pointer;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: #6a8aaf; border-radius: 8px;
    transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    position: relative; min-width: 0;
    border: 1px solid transparent;
  }
  .gadget-seg .seg:hover { color: #a8c8ee; background: rgba(120,180,255,0.06); }
  .gadget-seg .seg.active {
    background: rgba(120,180,255,0.22); color: #fff;
    border-color: rgba(120,180,255,0.55);
    box-shadow: inset 0 0 12px rgba(120,180,255,0.15), 0 0 8px rgba(120,180,255,0.2);
  }
  .gadget-seg .seg .count {
    display: block; font-size: 9px; opacity: 0.6;
    margin-top: 2px; font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', monospace;
  }
  .gadget-seg .seg.active .count { opacity: 0.9; color: #7eb4ff; }

  /* Intensity dial — drag vertically to set amplitude.
     Conic-gradient arc shows fill; live tabular number in centre. */
  .gadget-dial-wrap {
    display: flex; gap: 16px; align-items: center; margin: 14px 0 8px;
  }
  .gadget-dial {
    width: 76px; height: 76px; position: relative; flex-shrink: 0;
    cursor: ns-resize; user-select: none; touch-action: none;
  }
  .gadget-dial .track {
    position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid rgba(120,180,255,0.18);
    background: rgba(0,0,0,0.3);
  }
  .gadget-dial .arc {
    position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(from -90deg, rgba(126,235,180,0.92) 0deg, rgba(126,235,180,0.92) calc(var(--pct,0) * 3.6deg), rgba(120,180,255,0.05) 0deg);
    -webkit-mask: radial-gradient(circle at 50% 50%, transparent 28px, #000 29px, #000 36px, transparent 37px);
            mask: radial-gradient(circle at 50% 50%, transparent 28px, #000 29px, #000 36px, transparent 37px);
  }
  .gadget-dial .value {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-size: 20px; font-weight: 300;
    color: #e6f1ff; font-variant-numeric: tabular-nums; pointer-events: none;
    font-family: 'SF Mono', monospace;
  }
  .gadget-dial-meta {
    flex: 1; min-width: 0;
  }
  .gadget-dial-meta .label {
    font-size: 10px; letter-spacing: 0.25em; color: #6a8aaf;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .gadget-reach {
    height: 4px; background: rgba(120,180,255,0.12); border-radius: 4px;
    position: relative; overflow: hidden; margin: 8px 0 4px;
  }
  .gadget-reach::after {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: var(--pct, 30%);
    background: linear-gradient(to right, rgba(120,180,255,0.45), rgba(126,235,180,0.85));
    transition: width 0.2s;
  }
  .gadget-reach-label {
    display: flex; justify-content: space-between;
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    color: #6a8aaf; font-family: 'SF Mono', monospace;
  }

  /* Scope gadget — animated lock-on for locate / acquire actions */
  .gadget-scope {
    width: 110px; height: 110px; margin: 10px auto 6px; position: relative;
    cursor: pointer;
  }
  .gadget-scope::before, .gadget-scope::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    border: 1px solid rgba(120,180,255,0.35);
  }
  .gadget-scope::after {
    inset: 18px; border-style: dashed;
    border-color: rgba(120,180,255,0.5);
  }
  .gadget-scope .ch-h, .gadget-scope .ch-v {
    position: absolute; background: rgba(120,180,255,0.4);
  }
  .gadget-scope .ch-h { left: 4px; right: 4px; top: 50%; height: 1px; }
  .gadget-scope .ch-v { top: 4px; bottom: 4px; left: 50%; width: 1px; }
  .gadget-scope .pip {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 8px; height: 8px; background: #7eb4ff; border-radius: 50%;

    transition: background 0.3s, box-shadow 0.3s;
  }
  .gadget-scope.acquiring::before {
    animation: scope-ping 1.2s ease-out infinite;
  }
  @keyframes scope-ping {
    0%   { transform: scale(0.55); opacity: 1;   border-color: rgba(120,180,255,0.9); }
    100% { transform: scale(1);    opacity: 0;   border-color: rgba(120,180,255,0); }
  }
  .gadget-scope.locked::before, .gadget-scope.locked::after {
    border-color: rgba(126,235,180,0.7);
  }
  .gadget-scope.locked .pip {
    background: #7eebb4;
    box-shadow: 0 0 14px rgba(126,235,180,0.95);
  }
  .gadget-scope-readout {
    text-align: center; font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: #a8c8ee;
    margin-top: 6px; font-family: 'SF Mono', monospace;
  }

  /* Layer-switch gadget — physical-feeling switch for city-tier providers.
     Appears top-right when below GLOBAL altitude. */
  #layer-switch {
    position: fixed;
    top: calc(max(16px, env(safe-area-inset-top)) + 60px); right: 14px;
    z-index: 36;
    background: rgba(10,20,40,0.72); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(120,180,255,0.22); border-radius: 14px;
    padding: 5px;
    display: none; flex-direction: column; gap: 3px;
    min-width: 132px; opacity: 0; transition: opacity 0.3s;
  }
  #layer-switch.visible { display: flex; opacity: 1; }
  #layer-switch .seg {
    padding: 7px 10px; font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; color: #6a8aaf; cursor: pointer;
    border-radius: 9px; transition: all 0.2s;
    border: 1px solid transparent; user-select: none;
    display: flex; align-items: center; gap: 8px;
  }
  #layer-switch .seg::before {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
    border: 1px solid rgba(120,180,255,0.4); flex-shrink: 0;
    transition: all 0.2s;
  }
  #layer-switch .seg:hover { color: #a8c8ee; background: rgba(120,180,255,0.06); }
  #layer-switch .seg.active {
    color: #fff; background: rgba(120,180,255,0.16);
    border-color: rgba(120,180,255,0.45);
    box-shadow: 0 0 14px rgba(120,180,255,0.22);
  }
  #layer-switch .seg.active::before {
    background: #7eb4ff; border-color: #7eb4ff;
    box-shadow: 0 0 8px rgba(120,180,255,0.9);
  }

  /* ============================================================
     Fallback / error
     ============================================================ */
  #fatal {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center; flex-direction: column;
    background: #000; z-index: 200; padding: 40px; text-align: center;
  }
  #fatal.visible { display: flex; }
  #fatal h1 { font-size: 14px; letter-spacing: 0.4em; color: #ff6b6b;
              text-transform: uppercase; margin: 0 0 12px; }
  #fatal p  { font-size: 13px; color: #8aa; max-width: 400px; line-height: 1.5; }
</style>

const CESIUM_ION_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIzYTI0NjM1MC05MTAyLTQ1NjItOGI5Yi1kZTUxMWVlODA0MzQiLCJpZCI6NDMyMzAwLCJzdWIiOiJBc3RyYW5vdiIsImlzcyI6Imh0dHBzOi8vaW9uLmNlc2l1bS5jb20iLCJhdWQiOiJBTENJIiwiaWF0IjoxNzc4OTIwOTU3fQ.HPPdCQ7u_BWDoS7uK5uwqHHtmUivbU82u_bwHLhHkag';

/* ==============================================================
   1. Cesium boot — Photorealistic 3D Tiles, ALL widgets disabled
   ============================================================== */
let viewer;
async function bootCesium() {
  try {
    if (!window.Cesium) throw new Error('Cesium failed to load from CDN');

    // Set Ion token if provided. Missing/placeholder is OK — the imagery cycle
    // will skip Ion-backed providers and fall through to free alternatives.
    if (!CESIUM_ION_TOKEN.startsWith('__')) {
      Cesium.Ion.defaultAccessToken = CESIUM_ION_TOKEN;
    } else {
      console.warn('[ASTRANOV] No Cesium Ion token — using free fallback imagery only');
    }

    viewer = new Cesium.Viewer('cesiumContainer', {
      // Kill EVERY default widget — Zero UI Law §7
      animation: false,
      baseLayerPicker: false,
      fullscreenButton: false,
      vrButton: false,
      geocoder: false,
      homeButton: false,
      infoBox: false,
      sceneModePicker: false,
      selectionIndicator: false,
      timeline: false,
      navigationHelpButton: false,
      navigationInstructionsInitiallyVisible: false,
      // Performance
      requestRenderMode: true,
      maximumRenderTimeChange: Infinity,

      baseLayer: false,
      // Allow both 3D and 2D
      scene3DOnly: false,
      // Skybox + atmosphere look
      skyAtmosphere: new Cesium.SkyAtmosphere(),

    // Hide credit overlay (Ion's required attribution still serves via tile metadata)

    viewer.camera.moveEnd.addEventListener(onCameraSettled);
    onCameraSettled();

    // Pin picking
    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    handler.setInputAction(onCanvasClick, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    // Hide boot veil
    setTimeout(() => $('boot').classList.add('gone'), 400);
  } catch (e) {
    fatal(e.message || String(e));

}

/* ==============================================================
   1b. Imagery — two tiers (Imagery Law §3)
       Globe tier: NASA Blue Marble Next Generation (day) + VIIRS Black
       Marble (night). Layered, blended by Cesium's day/night terminator
       with Globe.enableLighting = true. Source: NASA GIBS WMTS (free, no key).
       City tier: user-switchable real-cartography providers (#layer-switch).
   ============================================================== */
let dayLayer   = null;   // BMNG day — bottom
let nightLayer = null;   // Black Marble — terminator-masked, above day
let cityLayer  = null;   // Current city-tier overlay — hidden at GLOBAL
let cityProviderIndex = 0;

const CITY_PROVIDERS = [
  { id: 'osm',          label: 'OSM',
    init: () => new Cesium.UrlTemplateImageryProvider({
      url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
      credit: '© OpenStreetMap contributors', maximumLevel: 19,
    }) },
  { id: 'carto-voyager', label: 'Voyager',
    init: () => new Cesium.UrlTemplateImageryProvider({
      url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',
      subdomains: ['a','b','c','d'], credit: '© CARTO · © OSM', maximumLevel: 19,
    }) },
  { id: 'carto-dark',   label: 'Dark',
    init: () => new Cesium.UrlTemplateImageryProvider({
      url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
      subdomains: ['a','b','c','d'], credit: '© CARTO · © OSM', maximumLevel: 19,
    }) },
  { id: 'esri',         label: 'Satellite',
    init: () => Cesium.ArcGisMapServerImageryProvider.fromUrl(
      'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer',
      { enablePickFeatures: false }) },
  { id: 'stadia-dark',  label: 'Alidade',
    init: () => new Cesium.UrlTemplateImageryProvider({
      url: 'https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}.png',
      credit: '© Stadia · © OSM', maximumLevel: 18,
    }) },
];

async function bootImageryGlobeTier() {
  if (!viewer) return;
  // Real day/night terminator — mandatory under Imagery Law §3.
  viewer.scene.globe.enableLighting = true;
  viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#02060d');

  // DAY: NASA Blue Marble Next Generation via GIBS WMTS.
  try {
    const dayProvider = new Cesium.UrlTemplateImageryProvider({
      url: 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/BlueMarble_NextGeneration/default/2004-08-01/GoogleMapsCompatible_Level8/{z}/{y}/{x}.jpeg',
      maximumLevel: 8,
      credit: 'NASA EOSDIS GIBS · Blue Marble Next Generation',
    });
    dayLayer = viewer.imageryLayers.addImageryProvider(dayProvider);
  } catch (e) { console.warn('[imagery] BMNG day failed', e); }

  // NIGHT: NASA Black Marble — layered above day, day-side fully transparent.
  try {
    const nightProvider = new Cesium.UrlTemplateImageryProvider({
      url: 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_Black_Marble/default/2016-01-01/GoogleMapsCompatible_Level8/{z}/{y}/{x}.png',
      maximumLevel: 8,
      credit: 'NASA EOSDIS GIBS · VIIRS Black Marble',
    });
    nightLayer = viewer.imageryLayers.addImageryProvider(nightProvider);
    nightLayer.dayAlpha = 0.0;
    nightLayer.nightAlpha = 1.0;
  } catch (e) { console.warn('[imagery] Black Marble night failed', e); }

  if (viewer) viewer.scene.requestRender();
}

async function setCityImagery(index) {
  if (!viewer) return;
  if (cityLayer) {
    try { viewer.imageryLayers.remove(cityLayer, true); } catch (_) {}
    cityLayer = null;
  }
  cityProviderIndex = Math.max(0, Math.min(index, CITY_PROVIDERS.length - 1));
  const p = CITY_PROVIDERS[cityProviderIndex];
  try {
    const provider = await p.init();
    cityLayer = viewer.imageryLayers.addImageryProvider(provider);
    // Hide on global tier; only visible national/personal (Imagery Law §3).
    cityLayer.show = currentLevel !== 'global';
    renderLayerSwitch();
    updateImagerySourceBadge();
    if (viewer) viewer.scene.requestRender();
  } catch (e) {
    console.warn('[imagery]', p.id, 'failed, advancing', e);
    if (cityProviderIndex < CITY_PROVIDERS.length - 1) {
      return setCityImagery(cityProviderIndex + 1);
    }
  }
}

function renderLayerSwitch() {
  const el = $('layer-switch');
  if (!el) return;
  el.innerHTML = CITY_PROVIDERS.map((p, i) =>
    `<div class="seg${i === cityProviderIndex ? ' active' : ''}" data-idx="${i}">${p.label}</div>`
  ).join('');
  el.querySelectorAll('.seg').forEach(seg => {
    seg.addEventListener('click', () => setCityImagery(Number(seg.dataset.idx)));
  });
}

function updateLayerSwitchVisibility() {
  const el = $('layer-switch');
  if (!el) return;
  el.classList.toggle('visible', currentLevel !== 'global');
  if (cityLayer) cityLayer.show = currentLevel !== 'global';
  updateImagerySourceBadge();
}

function updateImagerySourceBadge() {
  const el = $('imagery-source');
  if (!el) return;
  if (currentLevel === 'global') {
    el.textContent = 'BMNG · BLACK MARBLE';
  } else if (cityLayer && CITY_PROVIDERS[cityProviderIndex]) {
    el.textContent = 'VIA ' + CITY_PROVIDERS[cityProviderIndex].label.toUpperCase();
  } else {
    el.textContent = 'NO LAYER';
  }
  // Visible briefly after each level transition; auto-fades from level badge.
  el.classList.add('visible');
  clearTimeout(updateImagerySourceBadge._t);
  updateImagerySourceBadge._t = setTimeout(() => el.classList.remove('visible'), 2400);
}


/* ==============================================================
   2. Navigation levels — GLOBAL / NATIONAL / PERSONAL
   ============================================================== */
const LEVEL_THRESHOLDS = { global: 5_000_000, national: 500_000 };
let currentLevel = 'global';
let levelTimer;

function deriveLevel(heightMeters) {
  if (heightMeters > LEVEL_THRESHOLDS.global)   return 'global';
  if (heightMeters > LEVEL_THRESHOLDS.national) return 'national';
  return 'personal';
}

function onCameraSettled() {
  const h = viewer.camera.positionCartographic.height;
  const newLevel = deriveLevel(h);
  if (newLevel === currentLevel) return;
  currentLevel = newLevel;

  // Show level badge briefly
  const badge = $('level-badge');
  badge.textContent = newLevel;
  badge.classList.add('visible');
  clearTimeout(levelTimer);
  levelTimer = setTimeout(() => badge.classList.remove('visible'), 1800);

  // Back button: visible whenever we're below global
  $('back-btn').classList.toggle('visible', newLevel !== 'global');

  // Imagery Law §3: city-tier provider switcher visible only when below GLOBAL.
  updateLayerSwitchVisibility();
}

$('back-btn').addEventListener('click', () => {
  // Ascend one level
  const h = viewer.camera.positionCartographic.height;
  const target = h > LEVEL_THRESHOLDS.national ? 12_000_000 : 2_000_000;
  const carto = viewer.camera.positionCartographic;
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromRadians(carto.longitude, carto.latitude, target),
    duration: 1.4,
  });
});

/* ==============================================================
   3. Supabase — auth, signals, realtime
   ============================================================== */
let sb = null;
let session = null;
let profile = null;

function bootSupabase() {
  if (SUPABASE_URL.startsWith('__') || SUPABASE_ANON.startsWith('__')) {
    console.warn('[ASTRANOV] Supabase not configured — running in OFFLINE mode');
    return;
  }
  if (!window.supabase) {
    console.warn('[ASTRANOV] supabase-js failed to load');
    return;
  }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: { persistSession: true, autoRefreshToken: true },
  });

  sb.auth.getSession().then(({ data }) => {
    session = data.session;
    if (session) loadProfile();
  });

  sb.auth.onAuthStateChange((_evt, s) => {
    session = s;
    if (s) loadProfile(); else profile = null;
  });

  loadSignals();
  subscribeRealtime();
}

async function loadProfile() {
  if (!sb || !session) return;
  const { data, error } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
  if (!error) profile = data;
  // Subscribe to personal inbox for incoming calls
  subscribeInbox();
}

/* ==============================================================
   4. Signals — PointPrimitiveCollection + pulse callback
   ============================================================== */
let signalPoints = null;         // PointPrimitiveCollection
const signalIndex = new Map();   // id -> { primitive, signal }

const CATEGORY_COLORS = {
  news:        Cesium.Color.fromCssColorString('#00d4ff'),
  jobs:        Cesium.Color.fromCssColorString('#7cff7c'),
  commerce:    Cesium.Color.fromCssColorString('#ffaa00'),
  social:      Cesium.Color.fromCssColorString('#ff7edc'),
  dating:      Cesium.Color.fromCssColorString('#ff3a6e'),
  real_estate: Cesium.Color.fromCssColorString('#b48cff'),
  classifieds: Cesium.Color.fromCssColorString('#a0a0a0'),
};

function ensurePointCollection() {
  if (!signalPoints && viewer) {
    signalPoints = viewer.scene.primitives.add(new Cesium.PointPrimitiveCollection());
  }
}

function addSignalPoint(signal) {
  if (!viewer || signal.lng == null || signal.lat == null) return;
  ensurePointCollection();
  if (signalIndex.has(signal.id)) return; // already rendered

  const color = CATEGORY_COLORS[signal.category] || Cesium.Color.WHITE;
  const size = 6 + Math.min(signal.amplitude || 1, 24);
  const primitive = signalPoints.add({
    position: Cesium.Cartesian3.fromDegrees(Number(signal.lng), Number(signal.lat)),
    pixelSize: size,
    color: color.withAlpha(0.85),
    outlineColor: Cesium.Color.WHITE.withAlpha(0.4),
    outlineWidth: 1,
    scaleByDistance: new Cesium.NearFarScalar(1.5e2, 1.4, 1.5e7, 0.6),
  });
  primitive.__signalId = signal.id;
  signalIndex.set(signal.id, { primitive, signal });
  viewer.scene.requestRender();
}

function updateSignalPoint(signal) {
  const entry = signalIndex.get(signal.id);
  if (!entry) return addSignalPoint(signal);
  entry.signal = signal;
  entry.primitive.pixelSize = 6 + Math.min(signal.amplitude || 1, 24);
  if (signal.status !== 'active') removeSignalPoint(signal.id);
  viewer.scene.requestRender();
}

function removeSignalPoint(id) {
  const entry = signalIndex.get(id);
  if (!entry) return;
  signalPoints.remove(entry.primitive);
  signalIndex.delete(id);
  viewer.scene.requestRender();
}

async function loadSignals() {
  if (!sb) return;
  const { data, error } = await sb
    .from('signals')
    .select('id, author_id, category, scope, status, title, body, lng, lat, amplitude, created_at, source, source_url, source_name')
    .eq('status', 'active')
    .order('created_at', { ascending: false })
    .limit(2000);
  if (error) { console.error('[signals] load failed', error); return; }
  data.forEach(addSignalPoint);
}

function subscribeRealtime() {
  if (!sb) return;
  sb.channel('astranov-signals')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'signals' },
        p => p.new.status === 'active' && addSignalPoint(p.new))
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'signals' },
        p => updateSignalPoint(p.new))
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'signals' },
        p => removeSignalPoint(p.old.id))
    .subscribe();
}

/* ==============================================================
   5. Pin click → open signal panel
   ============================================================== */
function onCanvasClick(click) {
  if (!viewer) return;
  const picked = viewer.scene.pick(click.position);
  if (picked?.primitive && picked.primitive.__signalId) {
    const entry = signalIndex.get(picked.primitive.__signalId);
    if (entry) openSignalPanel(entry.signal);
    return;
  }
  // Clicked empty space → close transient UI
  closePanel();
}

function openSignalPanel(signal) {
  const sourceTag = signal.source === 'crawler' && signal.source_name
    ? `<div class="row"><span>Source</span><span style="color:#a8c8ee">${escapeHtml(signal.source_name)}</span></div>`
    : '';
  const bodyHtml = signal.body
    ? `<div style="font-size:13px; color:#a8c8ee; margin-bottom:12px; line-height:1.5">${escapeHtml(signal.body.slice(0, 400))}${signal.body.length > 400 ? '…' : ''}</div>`
    : '';
  const readLink = signal.source_url
    ? `<a href="${signal.source_url}" target="_blank" rel="noopener" class="primary" style="display:block;text-decoration:none;text-align:center;margin-top:8px">Read full article →</a>`
    : '';
  // Show "Call author" only for human-authored signals that aren't mine
  const canCall = signal.author_id && session && signal.author_id !== session.user.id && signal.source !== 'crawler';
  const callBtn = canCall
    ? `<button class="primary" onclick="startCallTo('${signal.author_id}','signal author')" style="margin-top:8px;background:rgba(120,255,180,0.12);border-color:rgba(120,255,180,0.3)">📞 Call author</button>`
    : '';
  const html = `
    <h2>${escapeHtml(signal.category.replace('_', ' '))}</h2>
    <div class="subtitle">${signal.scope.toUpperCase()} signal${signal.source === 'crawler' ? ' · crawled' : ''}</div>
    <div style="font-size:16px; margin-bottom:12px;">${escapeHtml(signal.title)}</div>
    ${bodyHtml}
    ${sourceTag}
    <div class="row"><span>Amplitude</span><span>${signal.amplitude}</span></div>
    <div class="row"><span>Posted</span><span>${formatRelative(signal.created_at)}</span></div>
    <button class="primary" id="signal-boost">⚡ Boost</button>
    ${callBtn}
    ${readLink}
  `;
  openPanel(html);
  $('signal-boost').onclick = () => boostSignal(signal.id);
}

async function boostSignal(signalId) {
  if (!sb || !session) return alert('Sign in to boost signals.');
  const { error } = await sb.from('signal_reactions')
    .insert({ signal_id: signalId, profile_id: session.user.id, kind: 'boost' });
  if (error && !error.message.includes('duplicate')) console.error(error);
  closePanel();
}

/* ==============================================================
   6. Tray — auto-hide, swipe-up trigger
   ============================================================== */
const tray = $('tray');
let trayHideTimer;
function showTray() {
  tray.classList.add('visible');
  clearTimeout(trayHideTimer);
  trayHideTimer = setTimeout(() => tray.classList.remove('visible'), 5000);
}
function bumpTrayTimer() {
  if (tray.classList.contains('visible')) {
    clearTimeout(trayHideTimer);
    trayHideTimer = setTimeout(() => tray.classList.remove('visible'), 5000);
  }
}
$('tray-trigger').addEventListener('click', showTray);

// Swipe-up from bottom 60px
let touchStartY = null;
window.addEventListener('touchstart', e => {
  const t = e.touches[0];
  if (t && (window.innerHeight - t.clientY) < 60) touchStartY = t.clientY;
}, { passive: true });
window.addEventListener('touchmove', e => {
  if (touchStartY != null) {
    const t = e.touches[0];
    if (touchStartY - t.clientY > 30) { showTray(); touchStartY = null; }
  }
}, { passive: true });
window.addEventListener('touchend', () => { touchStartY = null; }, { passive: true });

tray.addEventListener('click', e => {
  const btn = e.target.closest('button[data-tab]');
  if (!btn) return;
  bumpTrayTimer();
  openTabPanel(btn.dataset.tab);
});

setTimeout(() => {

}, 1800);

const panel = $('panel');

// Tap outside panel → close

function openTabPanel(tab) {

function openFeedPanel() {
  // TODO: render paginated list of recent signals
  const items = [...signalIndex.values()]

    <button class="primary" onclick="openEmitPanel()">+ Emit signal</button>

async function openRadarPanel() {
  if (!sb) {
    openPanel(`<h2>Radar</h2><div class="subtitle">Offline — connect Supabase first</div>`);
    return;
  }
  // Locate-me as a scope gadget (Gadget Law §4 translation).
  openPanel(`
    <h2>Radar</h2>
    <div class="subtitle">Acquiring your position…</div>
    <div class="gadget-scope acquiring" id="locate-scope">
      <div class="ch-h"></div><div class="ch-v"></div><div class="pip"></div>
    </div>
    <div class="gadget-scope-readout" id="locate-readout">scanning · awaiting fix</div>
    <div id="radar-list" style="margin-top:14px;color:#6a8aaf;font-size:13px"></div>
  `);

  let coords;
  try {
    coords = await getUserLocation();
    const scope = $('locate-scope');
    if (scope) { scope.classList.remove('acquiring'); scope.classList.add('locked'); }
    const ro = $('locate-readout');
    if (ro) ro.textContent = `lock · ${coords.lat.toFixed(4)}°, ${coords.lng.toFixed(4)}°`;
  } catch (e) {
    const scope = $('locate-scope');
    if (scope) scope.classList.remove('acquiring');
    const ro = $('locate-readout');
    if (ro) ro.textContent = 'no signal';
    $('radar-list').innerHTML =
      `<div style="color:#ff9e9e">Location unavailable: ${escapeHtml(e.message || 'permission denied')}</div>
       <div class="gadget-engage armed" onclick="openRadarPanel()" style="margin-top:12px">
         <span class="verb-glyph"></span><span>Reacquire</span>
       </div>`;
    return;
  }

  // Fly camera to user location at personal level
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(coords.lng, coords.lat, 12_000),
    duration: 2.5,
  });

  // Query nearby signals via RPC (50km default)
  const { data, error } = await sb.rpc('nearby_signals', {
    lat: coords.lat, lng: coords.lng, radius_meters: 50_000, max_results: 50,
  });
  if (error) {
    $('radar-list').innerHTML = `<div style="color:#ff9e9e">RPC error: ${escapeHtml(error.message)}</div>`;
    return;
  }

  // Render
  const COLORS = {
    news:'#00d4ff', jobs:'#7cff7c', commerce:'#ffaa00', social:'#ff7edc',
    dating:'#ff3a6e', real_estate:'#b48cff', classifieds:'#a0a0a0',
  };
  const rows = (data || []).map(s => `
    <div class="radar-row" onclick="flyToSignal('${s.id}')">
      <span class="dot" style="background:${COLORS[s.category] || '#fff'}"></span>
      <div class="meta">
        <div class="title">${escapeHtml(s.title)}</div>
        <div class="sub">${s.category.replace('_',' ')} · ${formatRelative(s.created_at)}</div>
      </div>
      <div class="dist">${formatDistance(s.distance_meters)}</div>
    </div>
  `).join('');

  openPanel(`
    <h2>Radar</h2>
    <div class="subtitle">${data?.length || 0} signals within 50 km</div>
    ${rows || '<div style="color:#6a8aaf;font-size:13px;margin-top:12px">Nothing nearby. Be the first to emit something here.</div>'}
    <button class="primary" onclick="setHomeLocation(${coords.lat},${coords.lng})" style="margin-top:12px">Set as home location</button>
  `);
}

window.setHomeLocation = async (lat, lng) => {
  if (!sb || !session) return;
  // Best-effort reverse-geo via Nominatim
  let country = null, city = null;
  try {
    const geo = await reverseGeocode(lat, lng);
    country = geo.country_code?.toUpperCase() || null;
    city = geo.city || null;
  } catch (_) {}
  const { error } = await sb.rpc('set_home_location', {
    lat, lng, country: country ? country.slice(0,2) : null, city_name: city,
  });
  if (error) alert('Failed to set home: ' + error.message);
  else closePanel();
  if (!error) loadProfile();
};

async function getUserLocation() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error('Geolocation API not available'));
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
      err => reject(err),
      { timeout: 15_000, enableHighAccuracy: true, maximumAge: 60_000 }
    );
  });
}

async function reverseGeocode(lat, lng) {
  // Nominatim — free, no key, please respect rate limit (1 req/sec)
  const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&zoom=10`;
  const r = await fetch(url, { headers: { 'Accept-Language': navigator.language || 'en' } });
  if (!r.ok) throw new Error('Nominatim ' + r.status);
  const data = await r.json();
  return {
    country_code: data.address?.country_code,
    country: data.address?.country,
    city: data.address?.city || data.address?.town || data.address?.village || data.address?.county,
    display_name: data.display_name,
  };
}

function formatDistance(m) {
  if (m == null) return '';
  if (m < 1000) return `${Math.round(m)} m`;
  if (m < 100_000) return `${(m / 1000).toFixed(1)} km`;
  return `${Math.round(m / 1000)} km`;
}

function openWalletPanel() {
  if (!session) return openYouPanel();
  openPanel(`
    <h2>Wallet</h2>
    <div class="subtitle">AVC balance &amp; delivery marketplace</div>
    <div style="font-size:32px;font-weight:300;margin:16px 0;">${profile?.avc_balance ?? 0} <span style="font-size:12px;color:#6a8aaf">AVC</span></div>

    <div class="delivery-tabs">
      <button class="active" data-tab="my-requests"  onclick="switchDeliveryTab('my-requests',  event)">My requests</button>
      <button             data-tab="my-runs"      onclick="switchDeliveryTab('my-runs',      event)">My runs</button>
      <button             data-tab="nearby"       onclick="switchDeliveryTab('nearby',       event)">Nearby</button>
    </div>
    <div id="delivery-list" style="min-height:80px;color:#6a8aaf;font-size:13px">Loading…</div>

    <button class="primary" style="margin-top:14px" onclick="openRequestDeliveryStep1()">+ Request delivery</button>
  `);
  loadDeliveryTab('my-requests');
}

window.switchDeliveryTab = (tab, evt) => {
  document.querySelectorAll('.delivery-tabs button').forEach(b => b.classList.remove('active'));
  if (evt?.target) evt.target.classList.add('active');
  loadDeliveryTab(tab);
};

async function loadDeliveryTab(tab) {
  const target = $('delivery-list');
  if (!target || !sb) return;
  target.innerHTML = '<div style="color:#6a8aaf">Loading…</div>';

  let data = [], error = null;
  if (tab === 'my-requests') {
    ({ data, error } = await sb.from('deliveries')
      .select('*').eq('requester_id', session.user.id)
      .order('created_at', { ascending: false }).limit(40));
  } else if (tab === 'my-runs') {
    ({ data, error } = await sb.from('deliveries')
      .select('*').eq('runner_id', session.user.id)
      .order('created_at', { ascending: false }).limit(40));
  } else if (tab === 'nearby') {
    let coords;
    try { coords = await getUserLocation(); }
    catch (e) {
      target.innerHTML = `<div style="color:#ff9e9e">Location needed: ${escapeHtml(e.message || 'denied')}</div>`;
      return;
    }
    ({ data, error } = await sb.rpc('nearby_deliveries', {
      lat: coords.lat, lng: coords.lng, radius_meters: 20_000, max_results: 50,
    }));
  }

  if (error) {
    target.innerHTML = `<div style="color:#ff9e9e">${escapeHtml(error.message)}</div>`;
    return;
  }
  if (!data || data.length === 0) {
    target.innerHTML = `<div style="color:#6a8aaf;padding:12px 0">${tab === 'nearby' ? 'No open deliveries near you.' : 'Nothing here yet.'}</div>`;
    return;
  }

  target.innerHTML = data.map(d => renderDeliveryRow(d, tab)).join('');
}

function renderDeliveryRow(d, tab) {
  const dist = d.pickup_distance_meters != null ? formatDistance(d.pickup_distance_meters) : '';
  const trip = d.trip_distance_meters != null ? formatDistance(d.trip_distance_meters) : '';
  const status = d.status || (tab === 'nearby' ? 'requested' : '');
  return `
    <div class="delivery-row" onclick="openDeliveryPanel('${d.id}')">
      <div class="head">
        <span class="desc">${escapeHtml(d.description)}</span>
        <span class="reward">${d.reward_avc ?? 0} AVC</span>
      </div>
      <div class="meta">
        ${status ? `<span class="status status-${status}">${status.replace('_',' ')}</span>` : ''}
        ${dist ? `pickup ${dist} away · ` : ''}${trip ? `trip ${trip}` : ''}
        ${!dist && !trip ? formatRelative(d.created_at) : ''}
      </div>
    </div>
  `;
}

window.openDeliveryPanel = async (id) => {
  const { data: d, error } = await sb.from('deliveries').select('*').eq('id', id).single();
  if (error) return alert(error.message);

  const isRequester = d.requester_id === session.user.id;
  const isRunner    = d.runner_id === session.user.id;
  let actions = '';

  if (d.status === 'requested') {
    if (isRequester) {
      actions = `<button class="primary" onclick="updateDeliveryStatus('${d.id}','cancelled')" style="background:rgba(160,160,160,0.15);border-color:rgba(160,160,160,0.3)">Cancel request</button>`;
    } else {
      actions = `<button class="primary" onclick="acceptDelivery('${d.id}')">Accept delivery</button>`;
    }
  } else if (d.status === 'accepted' && isRunner) {

let deliveryDraft = null;

  if (!session) return openYouPanel();
  deliveryDraft = { step: 'pickup' };
  openPanel(`
    <h2>Request delivery</h2>

    </p>
    <button class="primary" onclick="captureDeliveryPoint('pickup')">Set pickup here</button>
  `);

window.captureDeliveryPoint = (kind) => {
  if (!viewer || !deliveryDraft) return;
  const center = viewer.camera.pickEllipsoid(
    new Cesium.Cartesian2(window.innerWidth / 2, window.innerHeight / 2),
    viewer.scene.globe.ellipsoid
  );
  if (!center) return alert('Aim the camera at the ground first.');
  const carto = Cesium.Cartographic.fromCartesian(center);
  const lng = Cesium.Math.toDegrees(carto.longitude);
  const lat = Cesium.Math.toDegrees(carto.latitude);

  if (kind === 'pickup') {
    deliveryDraft.pickup = { lng, lat };
    deliveryDraft.step = 'dropoff';
    openPanel(`
      <h2>Request delivery</h2>
      <div class="subtitle">Step 2 of 3 — dropoff location</div>
      <p style="color:#a8c8ee;font-size:13px;line-height:1.5">
        Now aim at the <strong>dropoff point</strong>. Pickup is locked at <span style="color:#7eb4ff">${lat.toFixed(3)}, ${lng.toFixed(3)}</span>.
      </p>
      <button class="primary" onclick="captureDeliveryPoint('dropoff')">Set dropoff here</button>
    `);
  } else if (kind === 'dropoff') {
    deliveryDraft.dropoff = { lng, lat };
    deliveryDraft.step = 'details';
    openPanel(`
      <h2>Request delivery</h2>
      <div class="subtitle">Step 3 of 3 — details</div>
      <input id="del-desc" type="text" placeholder="What needs delivering?" maxlength="500" />
      <textarea id="del-notes" placeholder="Notes (optional)" maxlength="500"></textarea>
      <input id="del-reward" type="number" min="0" step="1" placeholder="Reward (AVC)" value="10" />
      <div class="subtitle" style="margin-top:8px">
        Pickup: ${deliveryDraft.pickup.lat.toFixed(3)}, ${deliveryDraft.pickup.lng.toFixed(3)} →
        Dropoff: ${deliveryDraft.dropoff.lat.toFixed(3)}, ${deliveryDraft.dropoff.lng.toFixed(3)}
      </div>
      <button class="primary" onclick="submitDelivery()">Publish request</button>
    `);
  }
};

window.submitDelivery = async () => {
  if (!deliveryDraft?.pickup || !deliveryDraft?.dropoff) return;

    requester_id: session.user.id,

window.sendMagicLink = async () => {
  const cmd = $('email');
  const orb = $('auth-orb');

  if (!sb || !cmd?.value) return;

let emitState = { category: 'news', amplitude: 1 };

window.openEmitPanel = () => {
  if (!session) return openYouPanel();

  const CATS = [
    { id: 'news',        label: 'News'    },
    { id: 'jobs',        label: 'Jobs'    },
    { id: 'commerce',    label: 'Commerce'},
    { id: 'social',      label: 'Social'  },

    { id: 'real_estate', label: 'Estate'  },
    { id: 'classifieds', label: 'Class.'  },
  ];
  // Live category counts from currently-loaded signals on the globe.
  const counts = {};
  for (const { signal } of signalIndex.values()) {
    counts[signal.category] = (counts[signal.category] || 0) + 1;
  }
  emitState = { category: 'news', amplitude: 1 };

  openPanel(`
    <h2>Pulse emitter</h2>
    <div class="subtitle">Drop a signal at the camera's centre point</div>

    <div class="gadget-seg wrap" id="emit-cat-seg">
      ${CATS.map(c => `
        <div class="seg${c.id==='news'?' active':''}" data-cat="${c.id}">
          ${c.label}<span class="count">${counts[c.id] || 0}</span>
        </div>`).join('')}
    </div>

    <div class="gadget-cmd-wrap">
      <input id="emit-title" class="gadget-cmd" type="text" placeholder="signal title…" maxlength="200" />
    </div>
    <div class="gadget-cmd-wrap" style="margin-top:8px">
      <textarea id="emit-body" class="gadget-cmd" placeholder="payload (optional)…" maxlength="5000"></textarea>
    </div>

    <div class="gadget-dial-wrap">
      <div class="gadget-dial" id="emit-dial">
        <div class="track"></div><div class="arc"></div><div class="value">1</div>
      </div>
      <div class="gadget-dial-meta">
        <div class="label">Amplitude · drag vertical</div>
        <div class="gadget-reach" id="emit-reach"></div>
        <div class="gadget-reach-label">
          <span>local</span><span id="emit-reach-label">~ 1 km</span><span>orbital</span>
        </div>
      </div>
    </div>

    <div class="gadget-engage" id="emit-engage" onclick="emitSignal()">
      <span class="verb-glyph"></span><span>Emit signal</span>
    </div>
  `);

  // Segmented selector
  document.querySelectorAll('#emit-cat-seg .seg').forEach(seg => {
    seg.addEventListener('click', () => {
      document.querySelectorAll('#emit-cat-seg .seg').forEach(s => s.classList.remove('active'));
      seg.classList.add('active');
      emitState.category = seg.dataset.cat;
    });
  });

  // Intensity dial — drag-vertical to set amplitude (1..25)
  const dial = $('emit-dial');
  const dialValue = dial.querySelector('.value');
  const reach = $('emit-reach');
  const reachLbl = $('emit-reach-label');
  let dragStart = null, baseValue = emitState.amplitude;
  const setAmp = (a) => {
    a = Math.max(1, Math.min(25, Math.round(a)));
    emitState.amplitude = a;
    const pct = (a / 25) * 100;
    dial.style.setProperty('--pct', pct.toFixed(1));
    dialValue.textContent = a;
    reach.style.setProperty('--pct', pct.toFixed(1) + '%');
    const km = a < 5 ? a : a < 12 ? a * 8 : a < 20 ? a * 40 : 99999;
    reachLbl.textContent = a >= 20 ? 'orbital · global' : a >= 12 ? `national · ~${km} km` : a >= 5 ? `regional · ~${km} km` : `local · ~${km} km`;
  };
  setAmp(emitState.amplitude);
  dial.addEventListener('pointerdown', e => {
    dragStart = e.clientY; baseValue = emitState.amplitude;
    try { dial.setPointerCapture(e.pointerId); } catch (_) {}
  });
  dial.addEventListener('pointermove', e => {
    if (dragStart == null) return;
    setAmp(baseValue + (dragStart - e.clientY) / 6);
  });
  const endDrag = () => { dragStart = null; };
  dial.addEventListener('pointerup', endDrag);
  dial.addEventListener('pointercancel', endDrag);

  // Engage gadget arms when title is non-empty
  const engage = $('emit-engage');
  const title = $('emit-title');
  const refreshArm = () => engage.classList.toggle('armed', !!title.value.trim());
  title.addEventListener('input', refreshArm);
  refreshArm();
};

window.emitSignal = async () => {
  const title = $('emit-title')?.value.trim();
  if (!title) return;
  const center = viewer.camera.pickEllipsoid(
    new Cesium.Cartesian2(window.innerWidth / 2, window.innerHeight / 2),
    viewer.scene.globe.ellipsoid
  );
  if (!center) return alert('Aim the camera at the ground first.');
  const carto = Cesium.Cartographic.fromCartesian(center);
  const lng = Cesium.Math.toDegrees(carto.longitude);
  const lat = Cesium.Math.toDegrees(carto.latitude);

  const engage = $('emit-engage');
  if (engage) { engage.classList.add('armed'); engage.querySelector('span:last-child').textContent = 'Transmitting…'; }

  const { error } = await sb.from('signals').insert({
    author_id: session.user.id,
    category: emitState.category,
    scope: currentLevel === 'global' ? 'global' : (currentLevel === 'national' ? 'national' : 'local'),
    title,
    body: $('emit-body')?.value.trim() || null,
    amplitude: emitState.amplitude,
    location: `SRID=4326;POINT(${lng} ${lat})`,
  });
  if (error) {
    if (engage) engage.querySelector('span:last-child').textContent = error.message.slice(0, 40);
    return;
  }
  closePanel();
};
