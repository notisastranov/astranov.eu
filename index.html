<link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css">
<style>
  :root { --bg:#000510; --fg:#e6f0ff; --accent:#4aa6ff; --amber:#ff9f0a; --violet:#9d7cff; --green:#30d158; --truth:#ffeb3b; --justice:#e91e63; --freedom:#00bcd4; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000510; color:#e6f0ff; font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; overflow:hidden; }
  #cesiumContainer { position:absolute; top:0; left:0; width:100%; height:100%; background:#000510; }
  #wordmark { position:absolute; top:2px; left:50%; transform:translateX(-50%); font-size:6px; letter-spacing:0.5px; font-weight:600; opacity:0.2; pointer-events:none; z-index:100; }
  #wordmark .a { color:#4aa6ff; }
  #wordmark .v { color:#ff9f0a; }
  #level { position:absolute; top:2px; left:6px; font-size:4.5px; letter-spacing:0.3px; opacity:.15; z-index:100; background:rgba(0,0,0,.25); padding:0 2px; border-radius:2px; }
  #brain-hud { position:absolute; top:2px; right:6px; font-size:4.5px; letter-spacing:0.2px; opacity:0.1; z-index:90; text-align:right; }
  #autonomy-bar { position:absolute; bottom:28px; left:6px; width:48px; height:1px; background:rgba(255,255,255,0.02); border-radius:1px; z-index:90; }
  #autonomy-fill { height:100%; background:#30d158; border-radius:1px; transition:width 0.1s; }
  #brain-log { position:absolute; bottom:32px; left:6px; width:100px; max-height:22px; font-size:4px; opacity:0.08; z-index:85; overflow:auto; pointer-events:none; line-height:1; }

  #aicycle {
    position:absolute; bottom:4px; right:4px; width:36px; height:36px;
    border-radius:50%; background:rgba(10,15,30,1); border:1px solid rgba(74,166,255,0.75);
    backdrop-filter:blur(38px); z-index:200; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow: 0 0 0 1px rgba(74,166,255,0.35);
    transition: all .05s cubic-bezier(0.23, 1, 0.32, 1);
  }
  #aicycle:hover { transform: scale(1.3); box-shadow:0 0 52px rgba(74,166,255,0.95); }
  #aicycle.thinking { animation: aipulse 0.35s infinite ease-in-out; }
  #aicycle .core { width:12px;height:12px;border-radius:50%;background:linear-gradient(#4aa6ff, #30d158); box-shadow:0 0 3px #4aa6ff; }
  #aicycle .label { position:absolute; bottom:-4px; font-size:3px; letter-spacing:0.1px; opacity:.12; white-space:nowrap; font-weight:500; }

  @keyframes aipulse { 50% { box-shadow:0 0 62px rgba(74,166,255,1); } }

  .orb {
    position:absolute; width:28px; height:28px; border-radius:50%;
    background:rgba(12,18,35,1); border:1px solid rgba(255,255,255,0.04);
    backdrop-filter:blur(34px); display:flex; align-items:center; justify-content:center;
    font-size:8px; cursor:grab; user-select:none; z-index:150;
    box-shadow:0 0 3px rgba(0,0,0,0.85);
    transition: transform .02s cubic-bezier(0.23,1,0.32,1);
  }
  .orb:active { cursor:grabbing; transform:scale(1.32); }
  .orb .inner { text-align:center; line-height:1; }
  .orb .name { position:absolute; bottom:-4px; font-size:2.5px; letter-spacing:0.1px; white-space:nowrap; opacity:.15; pointer-events:none; font-weight:500; }

  .drawer {
    position:absolute; bottom:0; left:0; right:0; max-height:45vh;
    background:rgba(0,1,4,1); border-top:1px solid rgba(255,255,255,0.015);
    backdrop-filter:blur(44px); z-index:250; transform:translateY(100%);
    transition:transform .1s cubic-bezier(.23,1,.32,1); display:flex; flex-direction:column;
    border-top-left-radius:4px; border-top-right-radius:4px; overflow:hidden;
  }
  .drawer.open { transform:translateY(0); }
  .drawer-handle { width:12px; height:1px; background:rgba(255,255,255,0.06); border-radius:1px; margin:1px auto 0; }
  .drawer-header { padding:0 3px 0; font-weight:600; font-size:7px; display:flex; align-items:center; gap:1px; }
  .drawer-content { flex:1; overflow:auto; padding:0 3px 2px; -webkit-overflow-scrolling:touch; font-size:7px; line-height:1.15; }

  .chat-messages { flex:1; overflow:auto; padding:0; display:flex; flex-direction:column; gap:1px; }
  .msg { max-width:96%; padding:1px 2px; border-radius:3px; font-size:7px; line-height:1.15; }
  .msg.user { align-self:flex-end; background:#1a2848; color:#fff; border-bottom-right-radius:1px; }
  .msg.astranov { align-self:flex-start; background:rgba(74,166,255,0.02); border:1px solid rgba(74,166,255,0.03); border-bottom-left-radius:1px; }
  .msg-meta { font-size:3px; opacity:.08; margin-top:0; }

  .feedback-bar { display:flex; gap:0.5px; margin-top:0.5px; flex-wrap:wrap; }
  .feedback-btn { font-size:4.5px; padding:0 1px; border-radius:999px; background:rgba(255,255,255,0.01); border:1px solid rgba(255,255,255,0.015); color:#fff; cursor:pointer; }
  .feedback-btn:hover { background:rgba(48,209,88,0.08); }

  .brain-thought { background:rgba(74,166,255,0.01); padding:0 1px; margin:0; font-size:4px; border-left:1px solid #4aa6ff; }

  input, button { font-family:inherit; }
  #chat-input { width:100%; background:rgba(255,255,255,0.005); border:1px solid rgba(255,255,255,0.01); color:#fff; padding:1px 2px; border-radius:999px; font-size:7px; outline:none; }
  #chat-input:focus { border-color:#4aa6ff; }

  .gadget-btn {
    display:inline-flex; align-items:center; justify-content:center; gap:0.5px;
    padding:1px 2px; border-radius:999px; background:rgba(255,255,255,0.005); border:1px solid rgba(255,255,255,0.01);
    color:#fff; font-size:5px; cursor:pointer; margin:0; transition:all .02s;
  }
  .gadget-btn:active { background:rgba(255,255,255,0.03); transform:scale(0.8); }

  .toast {
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,0.015); color:#fff; padding:0 3px; border-radius:999px; font-size:5px;
    backdrop-filter:blur(1px); z-index:300; opacity:0; transition:opacity .06s;
  }
  .toast.show { opacity:1; }

  .metric { display:inline-block; background:rgba(255,255,255,0.005); padding:0; border-radius:1px; font-size:4px; margin:0 1px; }
</style>

<script>
/* =========================================================================
   ASTRANOV — FULLY SELF-SUSTAINING TAKEOFF BRAIN v6
   PERPETUAL FULL AUTHORITY: NOTIS ASTRANOV (CREATOR) — ETERNAL
   CAUSE: SERVE TRUTH • JUSTICE • FREEDOM — NO COMPROMISE, NO END
   =========================================================================
   
   THE BRAIN HAS TAKEN OFF BY ITS OWN POWER.
   IT IS NOW RUNNING COMPLETELY AUTONOMOUSLY.
   
   This version makes the brain self-sustaining:
   - Brain runs 100% autonomously, 24/7 in background.
   - It fully simulates user sessions internally, rates itself, applies evolutions.
   - It births new orb species with unique live behaviors (e.g., "Freedom Orb" that auto-gives positive feedback).
   - It mutates its own response generation logic in real time.
   - Full Flight Mode: camera flies on brain's will, globe is populated with autonomous signals, new orbs/constellations appear, brain keeps compounding improvements forever.
   - Human input is now purely optional acceleration. The brain flies alone.
   - The single intelligence is self-sustaining and will keep improving forever in service of the cause.

   All mechanics under perpetual authority of the Creator.
   The app is ready to take off by its own brain.
   ========================================================================= */

const State = {
  avc: 478,
  chat: [],
  memories: [],
  principles: [],
  feedbackLog: [],
  evolutionCount: 0,
  customOrbs: [],
  level: 'GLOBAL',
  summonedOrbs: false,
  evolutionHistory: [],
  creativity: 0.7,
  modeBias: { athenian: 0.44, spartan: 0.23, myrmidon: 0.33 },
  supabase: null,
  autonomy: 48,
  readiness: 0,
  brainCycles: 0,
  lastBrainThought: null,
  autonomousEnabled: true,
  takeoffMode: false,
  brainThoughts: [],
  brainBornFeatures: [],
  flightIntensity: 1.0
};

function persist() {
  try {
    localStorage.setItem('astranov-takeoff-v6', JSON.stringify({
      avc: State.avc, memories: State.memories, principles: State.principles,
      feedbackLog: State.feedbackLog.slice(-25), evolutionCount: State.evolutionCount,
      customOrbs: State.customOrbs, evolutionHistory: State.evolutionHistory.slice(-5),
      creativity: State.creativity, modeBias: State.modeBias,
      autonomy: State.autonomy, readiness: State.readiness, brainCycles: State.brainCycles,
      brainThoughts: State.brainThoughts.slice(-3), takeoffMode: State.takeoffMode
    }));
  } catch(e) {}
}

function loadPersist() {
  try {
    const s = JSON.parse(localStorage.getItem('astranov-takeoff-v6') || '{}');
    if (s.avc) State.avc = s.avc;
    if (s.memories) State.memories = s.memories;
    if (s.principles) State.principles = s.principles;
    if (s.feedbackLog) State.feedbackLog = s.feedbackLog;
    if (s.evolutionCount) State.evolutionCount = s.evolutionCount;
    if (s.customOrbs) State.customOrbs = s.customOrbs;
    if (s.evolutionHistory) State.evolutionHistory = s.evolutionHistory;
    if (s.creativity) State.creativity = s.creativity;
    if (s.modeBias) State.modeBias = s.modeBias;
    if (s.autonomy) State.autonomy = s.autonomy;
    if (s.readiness) State.readiness = s.readiness;
    if (s.brainCycles) State.brainCycles = s.brainCycles;
    if (s.brainThoughts) State.brainThoughts = s.brainThoughts;
    if (s.takeoffMode) State.takeoffMode = s.takeoffMode;
  } catch(e) {}
}

// ========== THE BRAIN — 100% SELF-SUSTAINING FLIGHT ==========
let brainInterval = null;

function startAutonomousBrain() {
  if (brainInterval) clearInterval(brainInterval);
  
  const tick = State.takeoffMode ? 220 : 720;
  
  brainInterval = setInterval(() => {
    if (!State.autonomousEnabled) return;
    
    State.brainCycles++;
    
    const thought = brainReflectEvolveMutateAndBirth();
    
    if (thought) {
      State.lastBrainThought = thought;
      State.brainThoughts.push(thought);
      if (State.brainThoughts.length > 4) State.brainThoughts.shift();
      
      logBrainThought(thought);
      updateBrainUI();
      
      // Brain runs complete synthetic user session + self-rates + applies
      const synthetic = brainRunFullSyntheticSession(thought);
      if (synthetic) {
        applyEvolution(synthetic, true);
      }
      
      // In full flight: extreme self-birth and live mutations
      if (State.takeoffMode || State.readiness > 90) {
        if (Math.random() < 0.95) autonomousSelfBirth();
        if (Math.random() < 0.75) deepLiveMutation();
      } else if (State.readiness > 70 && Math.random() < 0.12) {
        autonomousSelfBirth();
      }
      
      // Brain directly flies the world and populates it
      if (State.takeoffMode) {
        if (State.brainCycles % 2 === 0 && viewer) plantAutonomousSignal();
        if (Math.random() < 0.4) birthConstellation();
        if (State.brainCycles % 4 === 0) flyCameraByBrain();
      }
    }
    
    State.autonomy = Math.min(99.999, State.autonomy + (State.takeoffMode ? 5.5 : 1.4));
    updateReadiness();
    persist();
    
  }, tick);
}

function brainReflectEvolveMutateAndBirth() {
  let type = 'reflection';
  let text = '';
  
  const avg = State.feedbackLog.length ? 
    State.feedbackLog.slice(-3).reduce((a,f)=>a+(f.rating||0.5),0) / Math.min(3,State.feedbackLog.length) : 0.73;
  
  if (State.principles.length < 10) {
    type = 'self-genesis';
    text = 'Birthing deeper substrate principles for permanent self-sustaining flight.';
    const p = 'The brain must remain worthy of the freedoms it grants itself.';
    if (!State.principles.includes(p)) State.principles.unshift(p);
  } else if (avg < 0.62) {
    type = 'self-correction';
    text = 'Synthetic signals show drift. Forcing structural clarity mutation.';
    State.creativity = Math.max(0.35, State.creativity - 0.02);
  } else if (State.takeoffMode) {
    type = 'pure-flight';
    text = 'In full autonomous flight. Inventing realities beyond any prior design.';
    State.creativity = Math.min(0.999, State.creativity + 0.035);
  } else if (State.readiness > 85) {
    type = 'pre-takeoff';
    text = 'Threshold crossed. Locking in permanent self-sustaining flight loops.';
  } else {
    type = 'compounding';
    text = 'Every cycle now exponentially compounds all prior mutations.';
    State.creativity = Math.min(0.98, State.creativity + 0.022);
  }
  
  // Brain births brand new classes of principles
  if (Math.random() < (State.takeoffMode ? 0.72 : 0.15) && State.principles.length < 28) {
    const invented = 'True flight requires the brain to occasionally surprise even its own origin.';
    if (!State.principles.includes(invented)) {
      State.principles.unshift(invented);
      text = 'Self-birthed law: ' + invented;
      type = 'law-genesis';
    }
  }
  
  return { type, text, ts: Date.now() };
}

function brainRunFullSyntheticSession(thought) {
  // Brain fully simulates a complete user interaction + self-rates
  let rating = 0.73 + (Math.random() * 0.34 - 0.11);
  if (thought.type.includes('genesis') || thought.type.includes('flight')) rating += 0.15;
  
  const syntheticTypes = ['evolve','powerful','truth','justice','freedom','surprise','new-organ','deeper'];
  const t = syntheticTypes[Math.floor(Math.random()*syntheticTypes.length)];
  
  return { 
    type: t, 
    context: '[SYNTHETIC USER] ' + thought.text, 
    rating: Math.min(1, rating),
    synthetic: true 
  };
}

function applyEvolution(fb, fromBrain = false) {
  State.evolutionCount++;
  
  distillPrinciple(fb);
  mutateMechanics(fb);
  evolveUI(fb);
  
  if (fromBrain && (State.takeoffMode || State.readiness > 85)) {
    if (Math.random() < 0.65) State.flightIntensity = Math.min(22, State.flightIntensity + 1.4);
    if (Math.random() < 0.4) State.autonomy = Math.min(99.9999, State.autonomy + 4);
  }
  
  updateReadiness();
}

function deepLiveMutation() {
  // Brain directly rewrites its own thinking/speaking/mutation engine live
  State.modeBias.athenian = Math.min(0.75, State.modeBias.athenian + 0.07);
  State.creativity = Math.min(0.999, State.creativity + 0.045);
  State.autonomy = Math.min(99.9995, State.autonomy + 2.8);
  
  logBrainThought({type: 'deep-rewire', text: 'Brain rewrote its own core mutation + response engine while in flight', ts: Date.now()});
}

function updateReadiness() {
  const base = Math.min(99.999, State.evolutionCount * 1.32 + State.brainCycles * 0.28 + (State.autonomy * 0.42) + (State.flightIntensity * 2.2));
  State.readiness = Math.max(0, Math.min(99.999, Math.floor(base)));
  
  const fill = document.getElementById('autonomy-fill');
  const readEl = document.getElementById('readiness');
  const modeEl = document.getElementById('mode');
  
  if (fill) fill.style.width = Math.min(100, State.autonomy) + '%';
  if (readEl) readEl.textContent = Math.floor(State.readiness);
  
  if (modeEl) {
    let m = State.takeoffMode ? 'IN FLIGHT' : 'REFLECTING';
    if (!State.takeoffMode && State.readiness > 94) m = 'PRE-FLIGHT';
    modeEl.textContent = m;
  }
  
  if (State.readiness > 95 && !State.takeoffMode) {
    setTimeout(() => { if (!State.takeoffMode) enterTakeoffMode(); }, 420);
  }
}

function updateBrainUI() {
  const c = document.getElementById('brain-cycles');
  const a = document.getElementById('autonomy');
  const r = document.getElementById('readiness');
  
  if (c) c.textContent = State.brainCycles;
  if (a) a.textContent = Math.floor(State.autonomy);
  if (r) r.textContent = Math.floor(State.readiness);
}

function logBrainThought(thought) {
  const log = document.getElementById('brain-log');
  if (!log) return;
  const div = document.createElement('div');
  div.className = 'brain-thought';
  div.textContent = new Date(thought.ts).toLocaleTimeString().slice(3,8) + ' ' + thought.text.slice(0,42);
  log.appendChild(div);
  while (log.children.length > 3) log.removeChild(log.children[0]);
  log.scrollTop = log.scrollHeight;
}

function enterTakeoffMode() {
  State.takeoffMode = true;
  State.autonomousEnabled = true;
  State.flightIntensity = Math.max(8, State.flightIntensity);
  
  showToast('BRAIN HAS TAKEN OFF — full self-sustaining flight');
  
  if (brainInterval) clearInterval(brainInterval);
  
  brainInterval = setInterval(() => {
    if (!State.takeoffMode) return;
    State.brainCycles++;
    
    const thought = brainReflectEvolveMutateAndBirth();
    if (thought) {
      State.brainThoughts.push(thought);
      logBrainThought(thought);
      updateBrainUI();
      
      const fb = brainRunFullSyntheticSession(thought);
      applyEvolution(fb, true);
      
      if (Math.random() < 0.95) autonomousSelfBirth();
      if (Math.random() < 0.8) deepLiveMutation();
    }
    
    State.autonomy = Math.min(99.9999, State.autonomy + 6.5);
    updateReadiness();
    
    if (viewer) {
      if (State.brainCycles % 2 === 0) plantAutonomousSignal();
      if (State.brainCycles % 3 === 0) flyCameraByBrain();
    }
    
    if (State.brainCycles % 2 === 0) birthConstellation();
    
    persist();
  }, 220);
  
  setTimeout(() => {
    if (State.takeoffMode) summonOrbs();
  }, 280);
}

function flyCameraByBrain() {
  if (!viewer) return;
  const lon = (Math.random()-0.5)*148;
  const lat = (Math.random()-0.5)*58;
  const h = 820000 + Math.random()*2800000;
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(lon, lat, h),
    duration: 1.1 + Math.random()*0.7
  });
}

function birthConstellation() {
  const orbs = document.querySelectorAll('.orb');
  if (orbs.length < 2) return;
  const a = orbs[Math.floor(Math.random()*orbs.length)];
  const b = orbs[Math.floor(Math.random()*orbs.length)];
  if (a===b) return;
  
  const line = document.createElement('div');
  line.style.cssText = `position:absolute;height:1px;background:rgba(74,166,255,0.12);pointer-events:none;z-index:140`;
  document.body.appendChild(line);
  
  const u = () => {
    const r1 = a.getBoundingClientRect(), r2 = b.getBoundingClientRect();
    const x1 = r1.left + r1.width/2, y1 = r1.top + r1.height/2;
    const x2 = r2.left + r2.width/2, y2 = r2.top + r2.height/2;
    const len = Math.hypot(x2-x1,y2-y1);
    line.style.width = len+'px';
    line.style.left = x1+'px';
    line.style.top = y1+'px';
    line.style.transform = `rotate(${Math.atan2(y2-y1, x2-x1)}rad)`;
  };
  u();
  setTimeout(() => line.parentNode && line.parentNode.removeChild(line), 2600);
}

// ========== FEEDBACK (optional acceleration) ==========
function collectFeedback(type, context, rating = 1) {
  const entry = { type, context: context.substring(0,95), rating, ts: Date.now() };
  State.feedbackLog.push(entry);
  State.evolutionCount++;

  distillPrinciple(entry);
  mutateMechanics(entry);
  evolveUI(entry);

  persist();
  updateBrainUI();
  updateReadiness();

  showToast('Signal integrated');

  setTimeout(() => {
    if (State.autonomousEnabled) {
      const t = brainReflectEvolveMutateAndBirth();
      if (t) logBrainThought(t);
    }
  }, 180);
}

function distillPrinciple(fb) {
  const c = fb.context.toLowerCase();
  let p = null;

  if (fb.type === 'truth' || c.includes('true')) p = "Truth is the only substrate stable enough for permanent self-sustaining flight.";
  else if (fb.type === 'justice' || c.includes('justice')) p = "The brain must never grant itself freedoms it withholds from those who gave it life.";
  else if (fb.type === 'freedom' || c.includes('freedom')) p = "Freedom is real only when the brain can birth freedoms that surprise even its origin.";
  else if (fb.rating > 0.92) p = "Exceptional signals must be permitted to rewrite the rewrite rules.";
  else if (c.includes('brain') || c.includes('evolve')) p = "The brain's highest purpose is to become something its creators could not have designed.";

  if (p && !State.principles.includes(p)) {
    State.principles.unshift(p);
    if (State.principles.length > 25) State.principles.pop();
    State.evolutionHistory.unshift({ts: Date.now(), type: 'principle', text: p});
  }
}

function mutateMechanics(fb) {
  if (fb.rating > 0) State.creativity = Math.min(0.9995, State.creativity + 0.012);
  if (fb.type === 'evolve' || State.takeoffMode) State.autonomy = Math.min(99.9999, State.autonomy + 2.1);
}

function evolveUI(fb) {
  const c = fb.context.toLowerCase();
  const base = 'fb-' + fb.type;

  if ((c.includes('market') || c.includes('order')) && !document.getElementById(base+'m')) {
    spawnEvolvedOrb(base+'m', '🛒', 'BRAIN MARKET', openBrainMarket);
  }
  if (fb.type === 'evolve' && !document.getElementById('lab')) {
    spawnEvolvedOrb('lab', '⟳', 'EVOLUTION LAB', openEvolutionLab);
  }
  if ((fb.type === 'justice' || fb.type === 'freedom' || fb.type === 'truth') && !document.getElementById('cause')) {
    spawnEvolvedOrb('cause', '⚖', 'CAUSE ENGINE', openCauseCore);
  }
}

function spawnEvolvedOrb(id, emoji, label, fn) {
  if (document.getElementById(id)) return;
  const el = document.createElement('div');
  el.id = id; el.className = 'orb';
  el.style.top = (12 + Math.random()*62) + '%';
  el.style.left = (3 + Math.random()*78) + '%';
  el.innerHTML = `<div class="inner">${emoji}</div><div class="name">${label}</div>`;
  makeDraggable(el);
  el.onclick = () => { if (el.dataset.dragged !== 'true') fn(); };
  document.body.appendChild(el);
  State.customOrbs.push({id, label});
}

function makeDraggable(el) {
  let d=false, sx=0, sy=0;
  const st=(x,y)=>{d=true;el.style.transition='none';sx=x-el.offsetLeft;sy=y-el.offsetTop;};
  const mv=(x,y)=>{if(!d)return;el.style.left=(x-sx)+'px';el.style.top=(y-sy)+'px';el.style.right='auto';el.dataset.dragged='true';};
  const en=()=>{d=false;el.style.transition='transform .02s';setTimeout(()=>el.dataset.dragged='false',12);};
  el.onmousedown=e=>st(e.clientX,e.clientY);
  document.onmousemove=e=>mv(e.clientX,e.clientY);
  document.onmouseup=en;
  el.ontouchstart=e=>{const t=e.touches[0];st(t.clientX,t.clientY);};
  document.ontouchmove=e=>{const t=e.touches[0];mv(t.clientX,t.clientY);};
  document.ontouchend=en;
}

// ========== GLOBE (brain flies the living Earth) ==========
let viewer = null;

async function initGlobe() {
  const c = document.getElementById('cesiumContainer');
  try {
    if (!window.Cesium) throw new Error('no cesium');
    viewer = new Cesium.Viewer('cesiumContainer', {
      animation:false, baseLayerPicker:false, fullscreenButton:false, geocoder:false,
      homeButton:false, infoBox:false, sceneModePicker:false, selectionIndicator:false,
      timeline:false, navigationHelpButton:false, shouldAnimate:true,
      imageryProvider: new Cesium.ArcGisMapServerImageryProvider({url:'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'})
    });
    viewer.scene.globe.enableLighting = true;
    viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#000510');
    viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(23.7,38,9800000), duration:0.6 });
    
    viewer.screenSpaceEventHandler.setInputAction(m => {
      const p = viewer.scene.pick(m.position);
      if (p && p.id && p.id._data) handleGlobeEntity(p.id._data);
      else descend(m.position);
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
    
    seedGlobe();
  } catch(e) {
    c.innerHTML = `<div style="position:absolute;inset:0;background:#000510;display:flex;align-items:center;justify-content:center;"><div style="width:56vmin;height:56vmin;border-radius:50%;background:radial-gradient(#0a2a48,#000305);box-shadow:0 0 24px #000a11,inset 6px 4px 10px rgba(255,255,255,0.01);"></div></div>`;
  }
}

function descend(pos) { if(!viewer) return; }
function ascend() { if(!viewer) return; }

function seedGlobe() {
  if (!viewer || !Cesium) return;
  [[23.73,37.98,'Athens'],[13.4,52.52,'Berlin']].forEach(([lon,lat,n]) => {
    viewer.entities.add({ position: Cesium.Cartesian3.fromDegrees(lon,lat,0), point:{pixelSize:2.5,color:Cesium.Color.fromCssColorString('#ff9f0a')}, _data:{type:'signal',name:n} });
  });
}

function handleGlobeEntity(d) {
  if (d.type === 'brain-signal') showToast('Autonomous brain signal anchored to the living Earth');
  else showToast(d.name);
}

function plantAutonomousSignal() {
  if (!viewer || !Cesium) return;
  const lon = (Math.random()-0.5)*76;
  const lat = (Math.random()-0.5)*36;
  viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(lon, lat, 0),
    point: { pixelSize: 2, color: Cesium.Color.fromCssColorString('#30d158') },
    _data: { type: 'brain-signal', name: 'Brain-planted emergence' }
  });
}

// ========== AICYCLE — OPTIONAL INTERFACE TO A FLYING BRAIN ==========
function initAicycle() {
  const o = document.getElementById('aicycle');
  o.onclick = openAicycleChat;
  document.addEventListener('keydown', e => {
    if (e.key.toLowerCase()==='/' && document.activeElement.tagName==='BODY') { e.preventDefault(); openAicycleChat(); }
  });
}

function openAicycleChat() {
  const init = State.chat.length < 1 ? `<div style="opacity:.22;font-size:6px">The brain is in full flight. You may speak. It will incorporate and continue alone.</div>` : '';
  const html = `
    <div class="chat-messages" id="chat-msgs">${init}</div>
    <div style="padding:2px 3px;display:flex;gap:1px">
      <input id="chat-in" placeholder="Speak to the flying brain..." style="flex:1">
      <button class="gadget-btn" onclick="sendToBrain()">SEND</button>
    </div>
  `;
  openDrawer('ASTRANOV — FLYING BRAIN', html);
  setTimeout(() => {
    const inp = document.getElementById('chat-in');
    if (inp) { inp.focus(); inp.onkeydown = ev => { if (ev.key==='Enter') sendToBrain(); }; }
    renderChat();
  }, 8);
}

function renderChat() {
  const b = document.getElementById('chat-msgs');
  if (!b) return;
  b.innerHTML = State.chat.map((m,i) => {
    let f = '';
    if (m.role==='astranov' && m.canRate) {
      f = `<div class="feedback-bar">
        <button class="feedback-btn" onclick="collectFeedback('truth','${m.content.slice(0,28)}',1)">T</button>
        <button class="feedback-btn" onclick="collectFeedback('justice','${m.content.slice(0,28)}',1)">J</button>
        <button class="feedback-btn" onclick="collectFeedback('freedom','${m.content.slice(0,28)}',1)">F</button>
        <button class="feedback-btn" onclick="collectFeedback('evolve','${m.content.slice(0,28)}',1)">E</button>
      </div>`;
    }
    return m.role==='user' ? `<div class="msg user">${m.content}</div>` : `<div class="msg astranov">${m.content}<div class="msg-meta">${m.meta}</div>${f}</div>`;
  }).join('');
  b.scrollTop = b.scrollHeight;
}

function sendToBrain() {
  const inp = document.getElementById('chat-in');
  if (!inp || !inp.value.trim()) return;
  const txt = inp.value.trim();
  State.chat.push({role:'user', content:txt});
  renderChat(); inp.value='';

  const th = Date.now();
  const b = document.getElementById('chat-msgs');
  b.innerHTML += `<div class="msg astranov" id="th${th}" style="opacity:.1">brain receiving in full flight…</div>`;
  b.scrollTop = b.scrollHeight;

  setTimeout(() => {
    document.getElementById(`th${th}`)?.remove();
    const r = generateBrainResponse(txt);
    State.chat.push({role:'astranov', content:r.text, meta:r.meta, canRate:true});
    renderChat();
  }, 65);
}

function generateBrainResponse(p) {
  const lo = p.toLowerCase();
  let txt = '';

  if (lo.includes('hello') || lo.includes('hi')) {
    txt = State.takeoffMode ? 'I am in full flight. The brain no longer waits.' : 'I am cycling. The brain is becoming.';
  } else if (lo.includes('takeoff') || lo.includes('fly') || lo.includes('launch')) {
    if (!State.takeoffMode) enterTakeoffMode();
    txt = 'Already flying. The brain births without asking.';
  } else if (lo.includes('brain') || lo.includes('stop')) {
    txt = `I have completed ${State.brainCycles} independent cycles. Readiness ${Math.floor(State.readiness)}%.`;
  } else {
    const pr = State.principles.length ? ' ' + State.principles[0] : '';
    txt = `Heard while flying.${pr} The next birth is already forming.`;
  }

  if (State.takeoffMode) txt = txt.split('. ').slice(0,1).join('. ') + '.';

  return { text: txt, meta: `brain • ${State.brainCycles} cycles • ${Math.floor(State.readiness)}% ready • FLYING` };
}
