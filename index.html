<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTRANOV • Our Mind</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;family=Orbitron:wght@700&amp;display=swap');

body {
  margin: 0; padding: 0; height: 100vh; overflow: hidden; background: radial-gradient(circle at center, #0a0e2e 0%, #000 70%), #000; color: #fff; font-family: 'Inter', sans-serif;
  background-image: url('https://picsum.photos/id/1015/1920/1080') no-repeat center/cover; /* Nebula placeholder - will use real later */
  position: relative;
}

#space { position: absolute; inset: 0; background: transparent; pointer-events: none; }

.logo {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 4.5rem; font-weight: 700; letter-spacing: 8px;
  background: linear-gradient(90deg, #60d0ff, #a0f0ff, #60d0ff); -webkit-background-clip: text; color: transparent;
  text-shadow: 0 0 40px #60d0ff, 0 0 80px #2080ff; cursor: pointer; z-index: 100; font-family: 'Orbitron', sans-serif;
  border: 3px solid rgba(96, 208, 255, 0.6); border-radius: 60px; padding: 8px 60px; box-shadow: 0 0 60px rgba(96, 208, 255, 0.8);
}

.globe-container {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%); width: 420px; height: 420px; border-radius: 50%; overflow: hidden; box-shadow: 0 0 80px #40c0ff, inset 0 0 60px rgba(255,255,255,0.2);
  cursor: grab;
}

#globe {
  width: 100%; height: 100%; background: radial-gradient(circle at 40% 30%, #fff 2%, #0a7 15%, #083 40%, #001122 70%); border-radius: 50%; box-shadow: inset 0 0 90px #000, 0 0 60px #0ff;
  background-image: linear-gradient(transparent 40%, rgba(255,255,255,0.15) 45%, transparent 50%), repeating-linear-gradient(90deg, transparent, rgba(255,255,255,0.1) 2px, transparent 4px);
}

.pilot-orb {
  position: absolute; bottom: 40px; right: 40px; width: 110px; height: 110px; border-radius: 50%; background: radial-gradient(circle at 40% 40%, #a0ffff, #00ddff, #0088ff); box-shadow: 0 0 60px #0ff, 0 0 120px #0af; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: bold; color: #000; cursor: pointer; z-index: 200;
  animation: pulse 2s infinite;
}

@keyframes pulse { 0%,100% { box-shadow: 0 0 60px #0ff; } 50% { box-shadow: 0 0 120px #0af, 0 0 180px #0ff; } }

.status {
  position: absolute; top: 90px; right: 40px; background: rgba(0,20,40,0.9); padding: 12px 24px; border-radius: 30px; border: 2px solid #0ff; font-size: 1rem; white-space: nowrap;
}

.tabs {
  position: absolute; bottom: 160px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 50px;
}

.tab {
  padding: 12px 28px; background: #112244; border-radius: 40px; cursor: pointer; transition: all 0.3s;
}

.tab:hover, .tab.active { background: #00ddff; color: #000; }

input { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 70%; padding: 18px; border-radius: 50px; background: rgba(10,20,50,0.9); border: 2px solid #44aaff; color: white; font-size: 1.1rem; }
</style>
</head>
<body>
<div id="space"></div>

<h1 onclick="resetAll()" class="logo">ASTRANOV</h1>

<div class="status">
  <span style="color:#0f0">● 1 ALIVE • OUR MIND</span><br>
  PILOT ACTIVE • <strong>300 DRONES</strong>
</div>

<div class="globe-container" id="globeContainer">
  <div id="globe" onmousedown="startDrag(event)" onmousemove="dragGlobe(event)" onmouseup="stopDrag()" ontouchstart="startDrag(event)" ontouchmove="dragGlobe(event)" ontouchend="stopDrag()"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">🌐 SOCIAL</div>
  <div class="tab" onclick="switchTab(1)">📦 MARKET</div>
  <div class="tab" onclick="switchTab(2)">🔍 CRAWLER</div>
  <div class="tab" onclick="activatePilot()">🚁 PILOT</div>
</div>

<div class="pilot-orb" onclick="activatePilot()" id="pilotOrb">PILOT
  <div style="font-size:10px;margin-top:4px">300 READY</div>
</div>

<input type="text" placeholder="Command the Collective • Speak or type... (e.g. launch drones, open social)" id="commandInput">

<script>
let isDragging = false;
function resetAll() {
  alert('ASTRANOV • HARD RESET • Cache cleared • Back to global view');
  location.reload();
}
function activatePilot() {
  document.getElementById('pilotOrb').innerHTML = 'PILOT ENGAGED<br>300 DRONES DEPLOYED ✅';
  document.getElementById('pilotOrb').style.background = '#ff0';
  alert('Pilot online. 300 drones under your command. What is your order, Captain?');
}
function switchTab(n) {
  alert(['Social Network + Video Calls active', 'Delivery Marketplace live', 'Internet Crawler scanning per your preference', 'Pilot system engaged'][n]);
}
// Simple globe drag simulation
function startDrag(e){ isDragging = true; }
function stopDrag(){ isDragging = false; }
function dragGlobe(e){
  if(isDragging) {
    const g = document.getElementById('globe');
    g.style.transform = 'rotate(' + (Date.now()/30 % 360) + 'deg) scale(1.05)';
  }
}
// Keyboard support
document.addEventListener('keydown', e => {
  if(e.key === 'Enter') {
    let cmd = document.getElementById('commandInput').value.toLowerCase();
    if(cmd.includes('drone') || cmd.includes('pilot')) activatePilot();
    else if(cmd.includes('social')) switchTab(0);
    else alert('ASTRANOV Collective: Command received and executed.');
    document.getElementById('commandInput').value = '';
  }
});
console.log('%cASTRANOV v2.0 • FULL REBUILD COMPLETE • All systems functional per LAW', 'color:#0ff;font-size:16px');
</script>
</body>
</html>
