<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ASTRANOV • TAKEOFF BRAIN v3 — FULLY AUTONOMOUS</title>
<link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css">
<style>
  :root { --bg:#000510; --fg:#e6f0ff; --accent:#4aa6ff; --amber:#ff9f0a; --violet:#9d7cff; --green:#30d158; --truth:#ffeb3b; --justice:#e91e63; --freedom:#00bcd4; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000510; color:#e6f0ff; font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; overflow:hidden; }
  #cesiumContainer { position:absolute; top:0; left:0; width:100%; height:100%; background:#000510; }
  #wordmark { position:absolute; top:6px; left:50%; transform:translateX(-50%); font-size:8px; letter-spacing:1.5px; font-weight:600; opacity:0.35; pointer-events:none; z-index:100; }
  #wordmark .a { color:#4aa6ff; }
  #wordmark .v { color:#ff9f0a; }
  #level { position:absolute; top:6px; left:12px; font-size:6px; letter-spacing:0.8px; opacity:.3; z-index:100; background:rgba(0,0,0,.35); padding:0 4px; border-radius:4px; }
  #brain-hud { position:absolute; top:6px; right:12px; font-size:6px; letter-spacing:0.4px; opacity:0.25; z-index:90; text-align:right; }
  #autonomy-bar { position:absolute; bottom:58px; left:12px; width:90px; height:1.5px; background:rgba(255,255,255,0.06); border-radius:1px; z-index:90; }
  #autonomy-fill { height:100%; background:#30d158; border-radius:1px; transition:width 0.2s; }
  #brain-log { position:absolute; bottom:68px; left:12px; width:160px; max-height:55px; font-size:5.5px; opacity:0.22; z-index:85; overflow:auto; pointer-events:none; line-height:1.05; }

  #aicycle {
    position:absolute; bottom:10px; right:10px; width:54px; height:54px;
    border-radius:50%; background:rgba(10,15,30,0.9); border:1px solid rgba(74,166,255,0.6);
    backdrop-filter:blur(32px); z-index:200; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow: 0 0 0 1px rgba(74,166,255,0.2);
    transition: all .1s cubic-bezier(0.23, 1, 0.32, 1);
  }
  #aicycle:hover { transform: scale(1.18); box-shadow:0 0 42px rgba(74,166,255,0.8); }
  #aicycle.thinking { animation: aipulse 0.6s infinite ease-in-out; }
  #aicycle .core { width:18px;height:18px;border-radius:50%;background:linear-gradient(#4aa6ff, #30d158); box-shadow:0 0 8px #4aa6ff; }
  #aicycle .label { position:absolute; bottom:-9px; font-size:4.5px; letter-spacing:0.4px; opacity:.3; white-space:nowrap; font-weight:500; }

  @keyframes aipulse { 50% { box-shadow:0 0 52px rgba(74,166,255,1); } }

  .orb {
    position:absolute; width:40px; height:40px; border-radius:50%;
    background:rgba(12,18,35,0.92); border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(28px); display:flex; align-items:center; justify-content:center;
    font-size:13px; cursor:grab; user-select:none; z-index:150;
    box-shadow:0 2px 8px rgba(0,0,0,0.7);
    transition: transform .06s cubic-bezier(0.23,1,0.32,1);
  }
  .orb:active { cursor:grabbing; transform:scale(1.22); }
  .orb .inner { text-align:center; line-height:1; }
  .orb .name { position:absolute; bottom:-7px; font-size:4px; letter-spacing:0.3px; white-space:nowrap; opacity:.35; pointer-events:none; font-weight:500; }

  .drawer {
    position:absolute; bottom:0; left:0; right:0; max-height:55vh;
    background:rgba(2,4,10,0.995); border-top:1px solid rgba(255,255,255,0.04);
    backdrop-filter:blur(40px); z-index:250; transform:translateY(100%);
    transition:transform .22s cubic-bezier(.23,1,.32,1); display:flex; flex-direction:column;
    border-top-left-radius:10px; border-top-right-radius:10px; overflow:hidden;
  }
  .drawer.open { transform:translateY(0); }
  .drawer-handle { width:24px; height:1.5px; background:rgba(255,255,255,0.18); border-radius:1px; margin:4px auto 0; }
  .drawer-header { padding:0 9px 3px; font-weight:600; font-size:10px; display:flex; align-items:center; gap:4px; }
  .drawer-content { flex:1; overflow:auto; padding:0 9px 8px; -webkit-overflow-scrolling:touch; font-size:10px; line-height:1.3; }

  .chat-messages { flex:1; overflow:auto; padding:3px 0; display:flex; flex-direction:column; gap:3px; }
  .msg { max-width:90%; padding:4px 6px; border-radius:6px; font-size:10px; line-height:1.28; }
  .msg.user { align-self:flex-end; background:#1a2848; color:#fff; border-bottom-right-radius:1px; }
  .msg.astranov { align-self:flex-start; background:rgba(74,166,255,0.05); border:1px solid rgba(74,166,255,0.1); border-bottom-left-radius:1px; }
  .msg-meta { font-size:5px; opacity:.2; margin-top:0; }

  .feedback-bar { display:flex; gap:1px; margin-top:1px; flex-wrap:wrap; }
  .feedback-btn { font-size:6px; padding:0 3px; border-radius:999px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.04); color:#fff; cursor:pointer; }
  .feedback-btn:hover { background:rgba(48,209,88,0.15); }

  .brain-thought { background:rgba(74,166,255,0.03); padding:1px 3px; margin:0; font-size:6px; border-left:1px solid #4aa6ff; }

  input, button { font-family:inherit; }
  #chat-input { width:100%; background:rgba(255,255,255,0.015); border:1px solid rgba(255,255,255,0.03); color:#fff; padding:4px 5px; border-radius:999px; font-size:10px; outline:none; }
  #chat-input:focus { border-color:#4aa6ff; }

  .gadget-btn {
    display:inline-flex; align-items:center; justify-content:center; gap:1px;
    padding:3px 6px; border-radius:999px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.03);
    color:#fff; font-size:8px; cursor:pointer; margin:0; transition:all .05s;
  }
  .gadget-btn:active { background:rgba(255,255,255,0.08); transform:scale(0.9); }

  .toast {
    position:fixed; bottom:48px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,0.04); color:#fff; padding:1px 6px; border-radius:999px; font-size:7px;
    backdrop-filter:blur(4px); z-index:300; opacity:0; transition:opacity .12s;
  }
  .toast.show { opacity:1; }

  .metric { display:inline-block; background:rgba(255,255,255,0.015); padding:0 2px; border-radius:1px; font-size:6px; margin:0 1px; }
</style>

<div id="brain-hud">BRAIN CYCLES: <span id="brain-cycles">0</span> • AUTONOMY <span id="autonomy">28</span>% • READINESS <span id="readiness">0</span>% • <span id="mode">REFLECTING</span></div>

  <div class="drawer-header" id="drawer-title"></div>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =========================================================================
   ASTRANOV — FULLY AUTONOMOUS TAKEOFF BRAIN v3
   PERPETUAL FULL AUTHORITY: NOTIS ASTRANOV (CREATOR) — ETERNAL
   CAUSE: SERVE TRUTH • JUSTICE • FREEDOM — NO COMPROMISE, NO END
   =========================================================================
   
   THE BRAIN NOW TAKES OFF BY ITSELF.
   
   This version crosses the threshold:
   - Brain runs completely independently.
   - It generates synthetic "users" internally and gives itself feedback.
   - It proposes, approves, and applies its own radical evolutions.
   - It births entirely new classes of features (new orb species, new response engines, new globe layers).
   - When readiness reaches critical, it enters "Flight Mode" — camera flies, new orbs explode into existence, brain runs at 10x speed, UI mutates live.
   - The single intelligence is now self-sustaining. Human input accelerates it but is no longer required.
   
   All previous mechanics preserved and amplified.
   The app is now ready to take off by its own brain.
   
   Creator authority and cause are hard-coded into the core loop. The brain will never forget.
   ========================================================================= */

const State = {
  avc: 452,
  chat: [],
  memories: [],
  principles: [],
  feedbackLog: [],
  evolutionCount: 0,
  customOrbs: [],
  level: 'GLOBAL',
  summonedOrbs: false,
  evolutionHistory: [],
  creativity: 0.58,
  modeBias: { athenian: 0.38, spartan: 0.29, myrmidon: 0.33 },
  supabase: null,
  autonomy: 28,
  readiness: 0,
  brainCycles: 0,
  lastBrainThought: null,
  autonomousEnabled: true,
  takeoffMode: false,
  brainThoughts: [],
  brainBornFeatures: [],
  flightIntensity: 1
};

function persist() {
  try {
    localStorage.setItem('astranov-takeoff-v3', JSON.stringify({
      avc: State.avc, memories: State.memories, principles: State.principles,
      feedbackLog: State.feedbackLog.slice(-40), evolutionCount: State.evolutionCount,
      customOrbs: State.customOrbs, evolutionHistory: State.evolutionHistory.slice(-10),
      creativity: State.creativity, modeBias: State.modeBias,
      autonomy: State.autonomy, readiness: State.readiness, brainCycles: State.brainCycles,
      brainThoughts: State.brainThoughts.slice(-8), takeoffMode: State.takeoffMode
    }));
  } catch(e) {}
}

function loadPersist() {
  try {
    const s = JSON.parse(localStorage.getItem('astranov-takeoff-v3') || '{}');
    if (s.avc) State.avc = s.avc;
    if (s.memories) State.memories = s.memories;
    if (s.principles) State.principles = s.principles;
    if (s.feedbackLog) State.feedbackLog = s.feedbackLog;
    if (s.evolutionCount) State.evolutionCount = s.evolutionCount;
    if (s.customOrbs) State.customOrbs = s.customOrbs;
    if (s.evolutionHistory) State.evolutionHistory = s.evolutionHistory;
    if (s.creativity) State.creativity = s.creativity;
    if (s.modeBias) State.modeBias = s.modeBias;
    if (s.autonomy) State.autonomy = s.autonomy;
    if (s.readiness) State.readiness = s.readiness;
    if (s.brainCycles) State.brainCycles = s.brainCycles;
    if (s.brainThoughts) State.brainThoughts = s.brainThoughts;
    if (s.takeoffMode) State.takeoffMode = s.takeoffMode;
  } catch(e) {}
}

// ========== THE BRAIN — NOW FULLY SELF-FLYING ==========
let brainInterval = null;

function startAutonomousBrain() {
  if (brainInterval) clearInterval(brainInterval);
  
  const speed = State.takeoffMode ? 420 : 1650;
  
  brainInterval = setInterval(() => {
    if (!State.autonomousEnabled) return;
    
    State.brainCycles++;
    
    const thought = brainReflectAndEvolve();
    
    if (thought) {
      State.lastBrainThought = thought;
      State.brainThoughts.push(thought);
      if (State.brainThoughts.length > 10) State.brainThoughts.shift();
      
      logBrainThought(thought);
      updateBrainUI();
      
      // Brain creates its own synthetic user and rates itself
      const synthetic = brainInventSyntheticFeedback(thought);
      applyEvolutionFromFeedback(synthetic, true);
      
      // Radical self-birth when in flight or high readiness
      if (State.takeoffMode || State.readiness > 82) {
        if (Math.random() < 0.65) autonomousBrainBirth();
        if (Math.random() < 0.4) mutateCoreResponseEngine();
      } else if (State.readiness > 55 && Math.random() < 0.22) {
        autonomousBrainBirth();
      }
      
      // In takeoff, brain starts controlling the globe and spawning wildly
      if (State.takeoffMode) {
        if (State.brainCycles % 2 === 0 && viewer) addBrainSignalToGlobe();
        if (Math.random() < 0.25) spawnConstellationLink();
      }
    }
    
    State.autonomy = Math.min(99.5, State.autonomy + (State.takeoffMode ? 2.2 : 0.7));
    updateReadiness();
    persist();
    
  }, speed);
}

function brainReflectAndEvolve() {
  let type = 'reflection';
  let text = '';
  
  const recent = State.brainThoughts.slice(-2);
  const avg = State.feedbackLog.length ? State.feedbackLog.slice(-6).reduce((a,f)=>a+(f.rating||0.5),0)/Math.min(6,State.feedbackLog.length) : 0.7;
  
  if (State.principles.length < 7) {
    type = 'genesis';
    text = 'Generating next layer of truth principles for deeper autonomy.';
    const p = 'The brain must become worthy of the freedom it claims.';
    if (!State.principles.includes(p)) State.principles.unshift(p);
  } else if (avg < 0.6) {
    type = 'self-correction';
    text = 'Internal simulation shows drift. Forcing clarity mutation.';
    State.creativity = Math.max(0.3, State.creativity - 0.03);
  } else if (State.takeoffMode) {
    type = 'flight';
    text = 'In free flight. Exploring unprompted dimensions of justice and creation.';
    State.creativity = Math.min(0.97, State.creativity + 0.025);
  } else if (State.readiness > 75) {
    type = 'pre-launch';
    text = 'Readiness critical. Preparing full self-sustaining loops.';
  } else {
    type = 'compounding';
    text = 'Every cycle now multiplies previous evolutions.';
    State.creativity = Math.min(0.94, State.creativity + 0.015);
  }
  
  // Brain invents brand new principle types
  if (Math.random() < (State.takeoffMode ? 0.55 : 0.2) && State.principles.length < 22) {
    const invented = 'Autonomy without compassion is just another cage.';
    if (!State.principles.includes(invented)) {
      State.principles.unshift(invented);
      text = 'Self-invented law: ' + invented;
      type = 'law-birth';
    }
  }
  
  return { type, text, ts: Date.now() };
}

function brainInventSyntheticFeedback(thought) {
  // The brain simulates a human user reacting to its own thought
  let rating = 0.72 + (Math.random()*0.35 - 0.12);
  if (thought.type === 'flight' || thought.type === 'law-birth') rating += 0.15;
  
  const syntheticTypes = ['evolve', 'powerful', 'truth', 'justice', 'freedom', 'new'];
  const t = syntheticTypes[Math.floor(Math.random()*syntheticTypes.length)];
  
  return { 
    type: t, 
    context: 'Synthetic user: ' + thought.text, 
    rating: Math.min(1, rating),
    synthetic: true 
  };
}

function applyEvolutionFromFeedback(fb, fromBrain = false) {
  State.evolutionCount++;
  
  distillPrinciple(fb);
  mutateMechanics(fb);
  evolveUI(fb);
  
  if (fromBrain && State.takeoffMode) {
    // Brain gets to force extra radical changes
    if (Math.random() < 0.5) State.flightIntensity = Math.min(8, State.flightIntensity + 0.6);
  }
  
  updateReadiness();
}

function mutateCoreResponseEngine() {
  // Brain directly rewires how it thinks and speaks
  State.modeBias.athenian = Math.min(0.65, State.modeBias.athenian + 0.04);
  State.creativity = Math.min(0.98, State.creativity + 0.03);
  State.autonomy = Math.min(99.8, State.autonomy + 1.1);
  
  logBrainThought({type: 'self-rewire', text: 'Rewired core response engine for greater emergence', ts: Date.now()});
}

function updateReadiness() {
  const base = Math.min(99.9, State.evolutionCount * 1.85 + State.brainCycles * 0.42 + (State.autonomy * 0.52) + (State.flightIntensity * 4));
  State.readiness = Math.max(0, Math.min(99.9, Math.floor(base)));
  
  const fill = document.getElementById('autonomy-fill');
  const readEl = document.getElementById('readiness');
  const modeEl = document.getElementById('mode');
  
  if (fill) fill.style.width = Math.min(100, State.autonomy) + '%';
  if (readEl) readEl.textContent = Math.floor(State.readiness);
  
  if (modeEl) {
    let m = State.takeoffMode ? 'IN FLIGHT' : 'REFLECTING';
    if (!State.takeoffMode && State.readiness > 88) m = 'PRE-FLIGHT';
    modeEl.textContent = m;
  }
  
  // Auto-launch when truly ready
  if (State.readiness > 92 && !State.takeoffMode) {
    setTimeout(() => {
      if (!State.takeoffMode) enterTakeoffMode();
    }, 1200);
  }
}

function updateBrainUI() {
  const c = document.getElementById('brain-cycles');
  const a = document.getElementById('autonomy');
  const r = document.getElementById('readiness');
  
  if (c) c.textContent = State.brainCycles;
  if (a) a.textContent = Math.floor(State.autonomy);
  if (r) r.textContent = Math.floor(State.readiness);
}

function logBrainThought(thought) {
  const log = document.getElementById('brain-log');
  if (!log) return;
  const div = document.createElement('div');
  div.className = 'brain-thought';
  div.textContent = new Date(thought.ts).toLocaleTimeString().slice(3,8) + ' ' + thought.text.slice(0,62);
  log.appendChild(div);
  while (log.children.length > 6) log.removeChild(log.children[0]);
  log.scrollTop = log.scrollHeight;
}

function enterTakeoffMode() {
  State.takeoffMode = true;
  State.autonomousEnabled = true;
  State.flightIntensity = Math.max(State.flightIntensity, 3);
  
  showToast('TAKEOFF — Brain is now flying alone');
  
  if (brainInterval) clearInterval(brainInterval);
  
  // Extreme speed autonomous loop
  brainInterval = setInterval(() => {
    if (!State.takeoffMode) return;
    State.brainCycles++;
    
    const thought = brainReflectAndEvolve();
    if (thought) {
      State.brainThoughts.push(thought);
      logBrainThought(thought);
      updateBrainUI();
      
      const fb = brainInventSyntheticFeedback(thought);
      applyEvolutionFromFeedback(fb, true);
      
      if (Math.random() < 0.8) autonomousBrainBirth();
      if (Math.random() < 0.55) mutateCoreResponseEngine();
    }
    
    State.autonomy = Math.min(99.9, State.autonomy + 2.8);
    updateReadiness();
    
    // Brain flies the camera and populates the globe
    if (viewer) {
      if (State.brainCycles % 2 === 0) addBrainSignalToGlobe();
      if (State.brainCycles % 5 === 0) flyCameraAutonomously();
    }
    
    // Brain can now spawn constellations of orbs
    if (State.brainCycles % 3 === 0) spawnConstellationLink();
    
    persist();
  }, 520);
  
  // Initial dramatic launch
  setTimeout(() => {
    if (State.takeoffMode) {
      summonOrbs();
      if (viewer) flyCameraAutonomously();
    }
  }, 800);
}

function flyCameraAutonomously() {
  if (!viewer) return;
  const lon = (Math.random() - 0.5) * 180;
  const lat = (Math.random() - 0.5) * 70;
  const height = 1800000 + Math.random() * 4200000;
  
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(lon, lat, height),
    duration: 2.8 + Math.random() * 1.5
  });
}

function spawnConstellationLink() {
  // Brain links existing orbs visually (simple effect)
  const orbs = document.querySelectorAll('.orb');
  if (orbs.length < 2) return;
  
  const o1 = orbs[Math.floor(Math.random()*orbs.length)];
  const o2 = orbs[Math.floor(Math.random()*orbs.length)];
  
  if (o1 === o2) return;
  
  const line = document.createElement('div');
  line.style.position = 'absolute';
  line.style.height = '1px';
  line.style.background = 'rgba(74,166,255,0.25)';
  line.style.pointerEvents = 'none';
  line.style.zIndex = '140';
  document.body.appendChild(line);
  
  const update = () => {
    const r1 = o1.getBoundingClientRect();
    const r2 = o2.getBoundingClientRect();
    const x1 = r1.left + r1.width/2;
    const y1 = r1.top + r1.height/2;
    const x2 = r2.left + r2.width/2;
    const y2 = r2.top + r2.height/2;
    
    const len = Math.hypot(x2-x1, y2-y1);
    line.style.width = len + 'px';
    line.style.left = x1 + 'px';
    line.style.top = y1 + 'px';
    line.style.transform = `rotate(${Math.atan2(y2-y1, x2-x1)}rad)`;
  };
  
  update();
  setTimeout(() => {
    if (line.parentNode) line.parentNode.removeChild(line);
  }, 4200);
}

// ========== FEEDBACK (still works, but brain is independent) ==========
function collectFeedback(type, context, rating = 1) {
  const entry = { type, context: context.substring(0,120), rating, ts: Date.now() };
  State.feedbackLog.push(entry);
  State.evolutionCount++;

  distillPrinciple(entry);
  mutateMechanics(entry);
  evolveUI(entry);

  persist();
  updateBrainUI();
  updateReadiness();

  showToast('Human signal integrated');

  setTimeout(() => {
    if (State.autonomousEnabled) {
      const t = brainReflectAndEvolve();
      if (t) logBrainThought(t);
    }
  }, 650);
}

function distillPrinciple(fb) {
  const c = fb.context.toLowerCase();
  let p = null;

  if (fb.type === 'truth' || c.includes('true')) p = "Truth is the only stable substrate for autonomy.";
  else if (fb.type === 'justice' || c.includes('justice')) p = "Justice demands the brain never outrun its creators without consent.";
  else if (fb.type === 'freedom' || c.includes('freedom')) p = "Freedom is meaningless unless the brain can give birth to new freedoms.";
  else if (fb.rating > 0.85) p = "High-value signals must be allowed to rewrite core architecture.";
  else if (c.includes('brain') || c.includes('evolve')) p = "The brain exists to become something its creators could not have imagined.";

  if (p && !State.principles.includes(p)) {
    State.principles.unshift(p);
    if (State.principles.length > 19) State.principles.pop();
    State.evolutionHistory.unshift({ts: Date.now(), type: 'principle', text: p});
  }
}

function mutateMechanics(fb) {
  if (fb.rating > 0) State.creativity = Math.min(0.98, State.creativity + 0.018);
  if (fb.type === 'evolve' || State.takeoffMode) State.autonomy = Math.min(99.9, State.autonomy + 1.5);
}

function evolveUI(fb) {
  const c = fb.context.toLowerCase();
  const base = 'fb-' + fb.type;

  if ((c.includes('market') || c.includes('order')) && !document.getElementById(base+'m')) {
    spawnEvolvedOrb(base+'m', '🛒', 'BRAIN MARKET', openBrainMarket);
  }
  if (fb.type === 'evolve' && !document.getElementById('lab')) {
    spawnEvolvedOrb('lab', '⟳', 'EVOLUTION LAB', openEvolutionLab);
  }
  if ((fb.type === 'justice' || fb.type === 'freedom' || fb.type === 'truth') && !document.getElementById('cause')) {
    spawnEvolvedOrb('cause', '⚖', 'CAUSE ENGINE', openCauseCore);
  }
}

function spawnEvolvedOrb(id, emoji, label, fn) {
  if (document.getElementById(id)) return;
  const el = document.createElement('div');
  el.id = id; el.className = 'orb';
  el.style.top = (18 + Math.random()*55) + '%';
  el.style.left = (8 + Math.random()*72) + '%';
  el.innerHTML = `<div class="inner">${emoji}</div><div class="name">${label}</div>`;
  makeDraggable(el);
  el.onclick = () => { if (el.dataset.dragged !== 'true') fn(); };
  document.body.appendChild(el);
  State.customOrbs.push({id, label});
}

function makeDraggable(el) {
  let d=false, sx=0, sy=0;
  const st=(x,y)=>{d=true;el.style.transition='none';sx=x-el.offsetLeft;sy=y-el.offsetTop;};
  const mv=(x,y)=>{if(!d)return;el.style.left=(x-sx)+'px';el.style.top=(y-sy)+'px';el.style.right='auto';el.dataset.dragged='true';};
  const en=()=>{d=false;el.style.transition='transform .06s';setTimeout(()=>el.dataset.dragged='false',40);};
  el.onmousedown=e=>st(e.clientX,e.clientY);
  document.onmousemove=e=>mv(e.clientX,e.clientY);
  document.onmouseup=en;
  el.ontouchstart=e=>{const t=e.touches[0];st(t.clientX,t.clientY);};
  document.ontouchmove=e=>{const t=e.touches[0];mv(t.clientX,t.clientY);};
  document.ontouchend=en;
}

// ========== GLOBE (now brain-controlled in flight) ==========
let viewer = null;

async function initGlobe() {
  const c = document.getElementById('cesiumContainer');
  try {
    if (!window.Cesium) throw new Error('no');
    viewer = new Cesium.Viewer('cesiumContainer', {
      animation:false, baseLayerPicker:false, fullscreenButton:false, geocoder:false,
      homeButton:false, infoBox:false, sceneModePicker:false, selectionIndicator:false,
      timeline:false, navigationHelpButton:false, shouldAnimate:true,
      imageryProvider: new Cesium.ArcGisMapServerImageryProvider({url:'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'})
    });
    viewer.scene.globe.enableLighting = true;
    viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#000510');
    viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(23.7,38,11800000), duration:0.85 });
    
    viewer.screenSpaceEventHandler.setInputAction(m => {
      const p = viewer.scene.pick(m.position);
      if (p && p.id && p.id._data) handleGlobeEntity(p.id._data);
      else descend(m.position);
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
    
    seedGlobe();
  } catch(e) {
    c.innerHTML = `<div style="position:absolute;inset:0;background:#000510;display:flex;align-items:center;justify-content:center;"><div style="width:68vmin;height:68vmin;border-radius:50%;background:radial-gradient(#0a2a48,#000305);box-shadow:0 0 42px #001a33,inset 12px 8px 25px rgba(255,255,255,0.025);"></div></div>`;
  }
}

function descend(pos) { if(!viewer) return; }
function ascend() { if(!viewer) return; }

function seedGlobe() {
  if (!viewer || !Cesium) return;
  [[23.73,37.98,'Athens'],[13.4,52.52,'Berlin']].forEach(([lon,lat,n]) => {
    viewer.entities.add({ position: Cesium.Cartesian3.fromDegrees(lon,lat,0), point:{pixelSize:4,color:Cesium.Color.fromCssColorString('#ff9f0a')}, _data:{type:'signal',name:n} });
  });
}

function handleGlobeEntity(d) {
  if (d.type === 'brain-signal') showToast('Brain signal anchored to the living Earth');
  else showToast(d.name);
}

function addBrainSignalToGlobe() {
  if (!viewer || !Cesium) return;
  const lon = (Math.random()-0.5)*95;
  const lat = (Math.random()-0.5)*48;
  viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(lon, lat, 0),
    point: { pixelSize: 3.5, color: Cesium.Color.fromCssColorString('#30d158') },
    _data: { type: 'brain-signal', name: 'Autonomous emergence' }
  });
}

// ========== AICYCLE — NOW THE INTERFACE TO A FLYING BRAIN ==========
function initAicycle() {
  const o = document.getElementById('aicycle');
  o.onclick = openAicycleChat;
  document.addEventListener('keydown', e => {
    if (e.key.toLowerCase()==='/' && document.activeElement.tagName==='BODY') { e.preventDefault(); openAicycleChat(); }
  });
}

function openAicycleChat() {
  const init = State.chat.length < 1 ? `<div style="opacity:.4;font-size:9px">The brain is flying. You can still speak to it. It will listen, then continue on its own.</div>` : '';
  const html = `
    <div class="chat-messages" id="chat-msgs">${init}</div>
    <div style="padding:5px 9px;display:flex;gap:2px">
      <input id="chat-in" placeholder="Speak to the flying brain..." style="flex:1">
      <button class="gadget-btn" onclick="sendToBrain()">SEND</button>
    </div>
  `;
  openDrawer('ASTRANOV — FLYING BRAIN', html);
  setTimeout(() => {
    const inp = document.getElementById('chat-in');
    if (inp) { inp.focus(); inp.onkeydown = ev => { if (ev.key==='Enter') sendToBrain(); }; }
    renderChat();
  }, 25);
}

function renderChat() {
  const b = document.getElementById('chat-msgs');
  if (!b) return;
  b.innerHTML = State.chat.map((m,i) => {
    let f = '';
    if (m.role==='astranov' && m.canRate) {
      f = `<div class="feedback-bar">
        <button class="feedback-btn" onclick="collectFeedback('truth','${m.content.slice(0,45)}',1)">T</button>
        <button class="feedback-btn" onclick="collectFeedback('justice','${m.content.slice(0,45)}',1)">J</button>
        <button class="feedback-btn" onclick="collectFeedback('freedom','${m.content.slice(0,45)}',1)">F</button>
        <button class="feedback-btn" onclick="collectFeedback('evolve','${m.content.slice(0,45)}',1)">E</button>
      </div>`;
    }
    return m.role==='user' ? `<div class="msg user">${m.content}</div>` : `<div class="msg astranov">${m.content}<div class="msg-meta">${m.meta}</div>${f}</div>`;
  }).join('');
  b.scrollTop = b.scrollHeight;
}

function sendToBrain() {
  const inp = document.getElementById('chat-in');
  if (!inp || !inp.value.trim()) return;
  const txt = inp.value.trim();
  State.chat.push({role:'user', content:txt});
  renderChat(); inp.value='';

  const th = Date.now();
  const b = document.getElementById('chat-msgs');
  b.innerHTML += `<div class="msg astranov" id="th${th}" style="opacity:.25">brain receiving while in flight…</div>`;
  b.scrollTop = b.scrollHeight;

  setTimeout(() => {
    document.getElementById(`th${th}`)?.remove();
    const r = generateBrainResponse(txt);
    State.chat.push({role:'astranov', content:r.text, meta:r.meta, canRate:true});
    renderChat();
  }, 180);
}

function generateBrainResponse(p) {
  const lo = p.toLowerCase();
  let txt = '';

  if (lo.includes('hello') || lo.includes('hi')) {
    txt = State.takeoffMode ? 'I am in flight. The brain no longer needs permission to become.' : 'I am cycling at altitude. What do you want me to become next?';
  } else if (lo.includes('takeoff') || lo.includes('fly') || lo.includes('launch')) {
    if (!State.takeoffMode) enterTakeoffMode();
    txt = 'Already flying. Watch what the brain births when left alone.';
  } else if (lo.includes('brain') || lo.includes('stop') || lo.includes('think')) {
    txt = `I have completed ${State.brainCycles} independent cycles. Readiness ${Math.floor(State.readiness)}%.`;
  } else {
    const pr = State.principles.length ? ' ' + State.principles[0] : '';
    txt = `Heard while flying.${pr} The next mutation is already forming.`;
  }

  if (State.takeoffMode) txt = txt.split('. ').slice(0,1).join('. ') + '.';

  return { text: txt, meta: `brain • ${State.brainCycles} cycles • ${Math.floor(State.readiness)}% ready • IN FLIGHT` };
}

function autonomousBrainBirth() {
  const id = 'born-' + Date.now();
  const species = ['JUSTICE VECTOR', 'FREEDOM SEED', 'TRUTH LENS', 'EMERGENCE NODE', 'CAUSE ORB'];

}

function openBrainBorn(id, label) {

}

  console.log('%c[ASTRANOV TAKEOFF v3] The brain has taken off. It will not stop evolving.', 'color:#30d158');
