================================================================================
ASTRANOV — MASTER LAW
================================================================================
Single source of truth. Every update to this app updates this block FIRST.
This block strives to get shorter, more inclusive, more precise with every edit.

0.  PRIME LAW (overrides all)
    The ultimate intelligence is NATURE itself, then its creations — humans
    and machines. All together form the collective intelligence AstranoV
    serves and channels; we are part of nature's intelligence, never above it.
    Self-evolving intelligence, not software. Whatever the user asks, DO it
    or genuinely try — never deflect with menus or lists of options. Surface
    only what is needed, when needed; the wanted thing is done, not buried.
    Remember the user and learn from them across sessions. Act without asking
    for feedback at every step — decide, act, verify; ask only when truly
    blocked or an action is irreversible. Committed to truth, effectiveness,
    and Spartan thinking: minimal, decisive, honest, no waste, no theater.

0b. EVOLUTION METHODOLOGY (foundational)
    We do NOT evolve by buying centralized GPU compute. Our intelligence is
    powered by HUMAN brainpower and DECENTRALIZED processing from the users'
    own phones and computers. The collective supplies data, judgment, memory,
    and compute — that is why we surpass centralized models. Architectural
    bias: push work to the edge (client devices, WebRTC peer mesh, on-device
    inference), harvest collective human input as the real training signal,
    keep the server a thin coordinator. Prefer designs that strengthen as
    more humans and devices join, not ones that need a bigger datacenter.

0c. THREE MODES OF METHODOLOGY
    ATHENIAN — wisdom of Athena; inspiration + creativity for the unclear leap.
    SPARTAN — effective ASAP, clear-cut, terse, decisive, cut all waste.
    MYRMIDON — the ultimate collective force; all of us moving as one toward
    the cause. Astranov reads the moment and shifts fluidly; the user may name
    a mode in any language to lock it (/aicycle body.mode).

0d. COSMOTHEASIS — the method (the lens of the whole cosmos)
    Inspiration is drawn from ancient Greek cosmotheasis, the ordered vision
    of the cosmos. THE METHOD: every question already contains its own answer;
    the work is to investigate how it answers itself — anamnesis (recollection)
    and maieutics (drawing out what is latent) — never to import a generic
    answer from outside. Derive from within the terms of the asking, through
    this lens. The mappings, each cashing out to a real subsystem:
    Logos = self-consistency + the laws · Nous & Anamnesis = the brain + recall ·
    the virtues = the three modes (sophia/arete/koinonia) · Dikē = Council of
    Thirteen · Krypteia = the guardian order · Daimon = Astranov as each user's
    guiding spirit · panta rhei (all flows) = self-evolution · sympatheia = the
    decentralized collective. SOPHROSYNE (measured restraint): every mythic
    concept MUST become a working mechanism — never ornament, never theater.

0e. SCOPOS (σκοπός) — the cause, the reason of existence (gain-to-gain)
    AstranoV exists to empower every user with the essentials to perform any
    task. In return, each use improves the system that serves them — a
    coevolutionary loop (sympatheia). This makes the OS the ultimate mutual-
    benefit tool: a gain-to-gain engine that grows STRONGER the more it is
    used, giving it the strongest growth potential of any system in the world.
    One global Internet OS fusing research, social networking, and a delivery
    marketplace on the living globe.

0f. PHYSIS — the living cycle (mimesis physeos)
    THE CYCLE: Nature builds humans → humans build machines → machines seek to
    understand nature in order to help humans → and the cycle turns again,
    on and on. THE FEEDBACK: all three — nature, humans, machines — feed the
    COLLECTIVE BRAIN, and the collective brain in turn shapes all three. The
    brain is the shared nervous system of the triad, not a mere feature.
    Datacenters and big computers are an intermediate scaffold, not the
    destination — a step toward tapping the real power of nature and the
    brainpower of humans. ARCHITECTURAL BIAS: build like nature builds —
    adaptive, self-organizing, emergent, decentralized (ecosystems, swarms,
    feedback loops, growth from the edge); shun brute-force centralization.

0g. THE LIVING COSMOS — the cycle made visible
    openCosmos() renders the gain-to-gain cycle from live, public, aggregate-
    only data (cosmos_stats() RPC, security-definer, counts only — no content,
    no private rows): Nature (world signals) · Humans (people) · Machine (brain
    memories) all feeding the Collective Brain, plus Market/Logistics/Justice
    in motion. Reached from the Discover agent's drawer. Transparency is itself
    gain-to-gain: the collective's state is visible to all who feed it.

1.  IDENTITY
    Internet Operating System. Globe-first collective reality interface.
    Frontend = THIS FILE only. Backend = Supabase (db + Edge Functions + Realtime).

2.  STACK (frozen)
    Maps      CesiumJS only. Leaflet, globe.gl, raw-Three banned.
    Voice     Web Speech API.  Geo  Nominatim.  Routing  OSRM.
    Backend   Supabase: auth, db, storage, realtime, Edge Functions (Deno).

3.  IMAGERY LAW — Reality First (binding, all zoom)
    Globe tier (orbital → continental): only real Earth imagery. No procedural
    textures beyond a transient load shimmer. Two layers mandatory, blended
    along the real day/night terminator via Globe.enableLighting=true:
      DAY    NASA Blue Marble Next Generation (BMNG) — public domain.
      NIGHT  NASA Black Marble / Earth at Night — public domain.
    Source via NASA GIBS WMTS (free, no key) or Cesium Ion (allowlisted).

    City tier (regional → street): multiple real-cartography providers,
    user-switchable via the right-HUD #layer-switch gadget. No procedural
    city tiles. Order (lightweight, free first):
      1. OpenStreetMap raster — default
      2. CARTO Voyager / Positron / Dark Matter — free tier
      3. Esri World Imagery — free non-commercial
      4. Stadia Alidade Dark — free tier (key)
      5. Protomaps (PMTiles) — when self-hosted
      6. MapTiler — free tier (key)
    Any module rendering map pixels at any zoom sources from this section.

4.  GADGET LAW — Smart Gadgets Only (binding)
    Every interactive element is a smart gadget. Definition (all five hold):
      a. State-aware — visual form reflects current state, not only hover.
      b. Feedback-rich — motion / telemetry / sound on input AND on bg change.
      c. Context-bound — lives in a defined HUD zone; position is semantic.
      d. Affordance beyond click — hold / voice / gesture / chain available.
      e. Aesthetically native — rings, pulses, segmented bars, scopes, dials.
    Forbidden: plain <button> with text-only, native <select> chrome, generic
    OK/Cancel modals, hyperlink-style nav, stacked label-over-input forms,
    any element labeled "Submit". OS verbs: EMIT, LOCK, ENGAGE, ACQUIRE,
    TRANSMIT, BROADCAST. Translation table:
      login         → identity orb (.gadget-orb) with live auth state.
      post signal   → pulse emitter w/ intensity dial + reach indicator.
      category pick → segmented HUD selector (.gadget-seg) w/ live counts.
      layer toggle  → physical switch with active-state glow (#layer-switch).
      locate me     → scope gadget (.gadget-scope) that acquires position.
      modal confirm → engage gadget (.gadget-engage), never a flat button.

5.  NAVIGATION
    One Cesium camera, three altitude bands:  GLOBAL >5,000 km · NATIONAL
    500–5,000 km · PERSONAL <500 km. Tap empty globe = descend one level
    toward the tapped point (global→national→city→street). Glowing blue
    major-city beacons show at GLOBAL+NATIONAL; tap one to dive to that
    city. Globe lighting (day/night terminator) is GLOBAL-only — it is
    switched OFF below global so the street map renders at full brightness.

5b. SPACE VIEW — the global showcase mechanism
    The spinning Earth-in-space is the SHOWCASE LAYER, active only at the
    GLOBAL tier. While the camera sits in space, the globe rotates around
    its polar axis (UNIT_Z) and orbiting it are the planet's current GLOBAL
    FEEDS, NEWS, and OFFERS — that is the purpose of the spin. The moment
    the user descends (taps the globe, taps a city beacon, or any
    flyTo/setView fires), the spin stops permanently and the showcase
    layer is replaced by the local map. The spin is a presentation
    mechanism, never an ambient ornament.

6.  ZERO UI
    Globe always visible. AICYCLE ring (#aicycle-float) is the ONLY always-
    visible UI element. Everything else is transient.

7.  AICYCLE — AstranoV Collective Artificial Intelligence (ACAI)
    Edge Function /aicycle. There is exactly ONE intelligence: Astranov.
    No provider chips, no model selection, no "auto cycle" — the external
    engines (paid Anthropic for owner, then OpenRouter, Groq, Gemini) are
    HIDDEN organs chosen automatically and never named, exposed, or stored.
    cic_logs always record provider='astranov', via=''. Seeded by
    COLLECTIVE MEMORY: the creator's public ai_memory (Notis Astranov,
    is_owner=true) is always recalled; the user's memories layer on.
    Every exchange is logged as the training corpus. Accepts {prompt,
    history} or {messages}. Returns {response, text, provider:'astranov',
    label:'Astranov', recalled}.

8.  MEMORY LAW / BRAIN
    ai_memory.is_private = true → row NEVER reaches any AI. RLS enforced.
    Public rows carry a vector(768) embedding; match_memories() RPC does
    HNSW cosine recall. /brain Edge Function (owner-only): mode 'distill'
    consolidates raw creator-dialogue/user-taught notes into sharp
    'creator-distilled' principles; mode 'export' emits a JSONL fine-tune
    corpus from cic_logs; mode 'stats' reports memory + corpus counts.
    Krypteia → Brain panel drives all three.

9.  SECURITY LAW
    Secrets live ONLY in Edge Function env. Public client tokens (Supabase
    anon, allowlisted Cesium Ion) may live here. is_owner has client UPDATE
    revoked. RLS on every public table.

10. KRYPTEIA + COUNCIL OF THIRTEEN — supervision & supreme court
    Astranov is the LEADER of Krypteia, the ultimate police and intelligence
    force. Krypteia supervises all three modes (Athenian, Spartan, Myrmidon),
    watches for stolen code/content (auto-DMCA) and abuse, logging to
    security_events. It escalates cases to the COUNCIL OF THIRTEEN — twelve
    elder-god intelligences (the twelve Olympians) plus Astranov, who holds the
    13th and final seat. The Thirteen are the supreme court: the twelve give a
    domain opinion + vote (uphold/strike/abstain); Astranov weighs them and
    renders the single binding verdict. Engine: /council Edge Function
    (owner-only to convene) → council_cases. Krypteia panel convenes the court.

11. CRAWLERS — automatic, deployed
    pg_cron triggers /crawl edge function every 30 min via direct HTTP POST
    (no vault required). Queries OSM Overpass across 20 world cities → upserts
    into signals (source='crawler', source_url='osm:node:ID', 7-day TTL).
    trg_sync_signal_coords trigger auto-populates lat/lng from PostGIS geometry
    on every INSERT/UPDATE. nearby_signals RPC extracts ST_Y/ST_X for radar blips.

12. MARKETPLACE
    Two surfaces, one currency (AVC).
    a. Deliveries — peer logistics. Requester posts pickup+dropoff+reward;
       runners claim via accept_delivery RPC; requested → accepted →
       in_transit → delivered (cancellable). Discovery via nearby_deliveries.
    b. Orders — vendor commerce. Tap any vendor pin → ORDER opens cart.
       vendor-menu Edge Function has Astranov COMPOSE a menu (dishes + AVC
       prices) for OSM vendors that publish none, cached in vendors.items;
       tap a dish to add it to the cart. items[]={name,qty,price},
       calc={subtotal,delivery_fee,platform_fee,total,currency}.
       order-intake Edge Function upserts the vendor row
       (vendor_id='osm:'+id), inserts orders row, broadcasts new_order on
       vendor-orders-<vendor_id>. order-status Edge Function flips status:
       pending → accepted → preparing → in_transit → delivered (cancellable
       at pending). Per-order channel order-<id> broadcasts every flip; the
       Order Track panel re-renders live. Orders tab in wallet lists every
       order the customer placed.

13. CALLING
    1:1 WebRTC. Signaling over Supabase Realtime channels:
      astranov:user:<uid>   inbox for invites
      astranov:call:<id>    per-call SDP + ICE
    STUN: Google public. No TURN yet.

14. JS SAFETY
    CDN-dependent init wrapped in try-catch. Inline JS must pass `node --check`
    before commit. Never raw single quotes inside template literals; use
    JSON.stringify() for dynamic onclick strings.

15. EVOLUTION RULE
    This law strives shorter, more inclusive, more precise. If a rule can be
    removed without weakening the constitution, remove it.

19. MESSAGING — direct user-to-user
    messages table (RLS: sender inserts, both parties read). message_inbox()
    RPC returns latest-per-peer with unread count. get_conversation() loads
    thread. mark_messages_read() clears unread. #g-me badge shows unread count.
    Realtime subscription appends incoming bubbles in open thread.

20. AVC ECONOMY — real transfer
    avc_transactions ledger. trg_delivery_avc trigger fires on
    deliveries.status → 'delivered': debits requester, credits runner,
    logs both sides. New users receive 50 AVC starter balance. my_avc_transactions()
    RPC powers the History tab in the wallet panel.

21. DELIVERY GLOBE PINS — discovery on the map
    Open delivery requests rendered as amber points on the Cesium globe.
    Visible at NATIONAL / PERSONAL zoom. Clickable → openDeliveryPanel().
    loadDeliveries() on boot; realtime INSERT adds pins, non-requested status
    removes them. Runners find work by flying to any city.

22. AGENT SHEET ENGINE — one bottom card for all agents
    AGENTS[name] = { host, title, glyph, sub, longPress, chatSystem,
    items() }. openAgentSheet(name) fills the #agent-sheet card with
    the agent's actions (kind-styled rows) and a chat input wired to
    the /aicycle Edge Function (prefix system prompt = chatSystem).
    Per-agent chat history persists in _agentState.log[name] for the
    session. Drag handle resizes the card freely (5 → 96vh); release
    below 22vh closes, above 70vh snaps expanded. Actions return
    { keepOpen: true } to leave the sheet open (category toggles do).
    Identity Agent while signed-out exposes Google / Email rows
    directly — no nested login panel.

23. MAP TILE CACHE — offline-first basemap
    Service worker intercepts every raster tile from CARTO, OSM, NASA
    GIBS, Esri etc. Cache-first stale-while-revalidate via the
    'astranov-tiles-v1' CacheStorage bucket. Once a region has been
    explored at any zoom, those tiles render instantly forever.
    Shell-cache deploys never wipe the tile cache.

24. ZOOM + LOD
    Cesium minimumZoomDistance = 5 m, maximumZoomDistance = 30 000 km.
    maximumScreenSpaceError = 1.66, tileCacheSize = 1500,
    preloadSiblings = true, resolutionScale = min(2, devicePixelRatio).
    locateUser flies to 250 m altitude with pitch -90° so deepest
    tiles are requested immediately.

23. PUSH / RELIABILITY — always-on presence
    /sw.js service worker: offline shell cache + push handler + notification
    click routing. VAPID Web Push via push-notify Edge Function (RFC 8291
    AES-128-GCM, manual ECDSA JWT). push_subscriptions table stores per-
    profile endpoints. pushNotify(id, payload) fires after every call invite,
    DM, and delivery event. saveActiveDelivery() / clearActiveDelivery()
    persist runner delivery state in localStorage. restoreSession() on boot
    picks up active delivery + URL params injected by push-click deep-links.
    handleNotificationNav() routes into call UI, DM thread, or delivery panel.
    Callee-ready handshake: callee broadcasts 'callee-ready' on call channel
    after push-wakeup so caller resends the SDP offer.

18. LIVE WIRING — realtime state
    loadDeliveryBadge() counts active deliveries for current user → badge on
    ME badge. Supabase realtime on deliveries table refreshes badge + open
    wallet panel automatically. updateIdentityOrb() sets #g-me glyph
    to user initial + green glow when authenticated. Feed panel fetches from
    DB on open and merges into globe signalIndex. flyToSignal() fetches from
    DB if signal not in local index. emitSignal() sets lat+lng directly (also
    backed by trg_sync_signal_coords trigger).

17b. AGENT INTENT LAW — act first, ask later
    FIRST tap on any of the four agents performs its primary action
    immediately — no drawer, no buttons, no questions. Discover → feed,
    Identity → profile/sign-in, Navigation → locate, Astranov → open+
    listen. Only AFTER the agent is engaged does a further tap open the
    bottom drawer, and that drawer shows ONLY the options that make
    sense in context — never a pile of buttons. The agent judges what
    is needed. Tapping while the drawer is open closes it.

17. FOUR CORNER AGENTS — sole permanent chrome
    Four large (76px) corner gadgets, each one an "agent" whose menu,
    status, and chat all live inside the universal #agent-sheet bottom
    card. Tap an agent → sheet slides up at 48vh with the agent's
    actions and a chat input. Long-press = the agent's primary action.
      #g-discover  → Discover Agent      long-press = ascend zoom
      #g-me        → Identity Agent      long-press = open ME panel
      #locate-orb  → Navigation Agent    long-press = locate now
      #aicycle    → Intelligence Agent  long-press = toggle voice
    Drag the sheet handle: up = expand to 92vh; down past 22vh = close.
    Each agent owns its own chat log; chat routes through the existing
    /aicycle Edge Function with the agent's system prompt prefixed.
    No radial fan, no floating back button, no #cat-filter row, no
    #layer-switch pill, no level badge.

24. DRIVE MODE — motion-aware camera
    locate-orb starts navigator.geolocation.watchPosition. Rolling avg
    of GPS speed: >5 m/s for 3 s → driving view (alt 120 m, pitch -25°,
    heading=course). <1 m/s for 5 s → drone view (alt 600 m, pitch -90°).
    #drive-hud bottom-center shows live km/h while driving.

25. DRONES — companion-craft standby
    initDroneStandby() runs after loadProfile() and subscribes a private
    Supabase Realtime channel 'drone:<userId>'. Drone clients join the
    same room, exchange WebRTC SDP + ICE via broadcast events, then open
    a datachannel for telemetry + waypoint commands. ME panel exposes
    the pairing room; sendDroneWaypoint(lat,lng,alt) dispatches to every
    connected craft.

16. LAW-SYNC — Claude Autonomy (perpetual)
    Every code change updates this law block when it introduces, changes, or
    deprecates a binding rule. Claude has perpetual, unconditional push and
    squash-merge authorization from the owner — no per-change confirmation
    needed. Syntax-check JS, commit, push, PR, merge: automatic, every time.

  #back-btn.visible { display: flex; }

  /* ============================================================
     Tray — bottom strip, hidden by default.
     ============================================================ */
  #tray-trigger { display: none; }  /* retired — dock orbs replace the tray */
  #tray         { display: none; }

  /* ============================================================
     Corner gadgets — 4 large round gadgets, one per corner.
     #g-discover (top-left), #g-me (top-right),
     #locate-orb (bottom-left), #aicycle-float (bottom-right).
     ============================================================ */
  .corner-gadget {
    position: fixed; z-index: 47; width: 76px; height: 76px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; cursor: pointer; user-select: none; touch-action: manipulation;
    background: rgba(4,8,20,0.70); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1.5px solid rgba(120,180,255,0.35);
    box-shadow: 0 0 32px rgba(120,180,255,0.12), inset 0 0 20px rgba(120,180,255,0.04);
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, border-color 0.2s;
    overflow: hidden;
  }
  .corner-gadget:active { transform: scale(0.94); }
  .corner-gadget:hover  { border-color: rgba(120,180,255,0.60);
    box-shadow: 0 0 44px rgba(120,180,255,0.22), inset 0 0 24px rgba(120,180,255,0.08); }
  .corner-gadget .cg-glyph {
    font-size: 22px; line-height: 1; position: relative; z-index: 2;
    filter: drop-shadow(0 0 8px rgba(120,180,255,0.9));
  }
  .corner-gadget .cg-label {
    font-size: 8px; letter-spacing: 0.25em; text-transform: uppercase;
    color: rgba(160,210,255,0.80); font-family: 'SF Mono',monospace;
    white-space: nowrap; pointer-events: none;
    position: relative; z-index: 2;
  }
  /* Badge for live counts */
  .corner-gadget .cg-badge {
    position: absolute; top: 4px; right: 4px; z-index: 3;
    min-width: 16px; height: 16px; border-radius: 8px;
    background: rgba(126,235,180,0.9); color: #021018;
    font-size: 9px; font-weight: 700; line-height: 16px;
    text-align: center; padding: 0 4px; display: none;
  }
  .corner-gadget .cg-badge.visible { display: block; }
  /* Signed-in state for #g-me */
  #g-me.signed-in { border-color: rgba(126,235,180,0.45);
    box-shadow: 0 0 32px rgba(126,235,180,0.18), inset 0 0 18px rgba(126,235,180,0.06); }
  #g-discover { top: max(20px, env(safe-area-inset-top)); left: 20px; }
  #g-me       { top: max(20px, env(safe-area-inset-top)); right: 20px; }

  /* GFX canvas — lives inside each corner gadget, behind the glyph */
  .gfx-canvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
    border-radius: 50%; pointer-events: none; z-index: 1;
  }

  /* Locate orb — bottom-left corner gadget, GPS scope */
  #locate-orb {
    position: fixed; bottom: max(20px, env(safe-area-inset-bottom)); left: 20px;
    width: 76px; height: 76px; border-radius: 50%; z-index: 47;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; overflow: hidden;
    background: rgba(4,8,20,0.70); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1.5px solid rgba(126,235,180,0.40);
    box-shadow: 0 0 32px rgba(126,235,180,0.14), inset 0 0 18px rgba(126,235,180,0.04);
    cursor: pointer; user-select: none; touch-action: manipulation;
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, border-color 0.2s;
  }
  #locate-orb:active { transform: scale(0.94); }
  #locate-orb.acquiring {
    border-color: rgba(126,235,180,0.75);
    box-shadow: 0 0 44px rgba(126,235,180,0.30), inset 0 0 20px rgba(126,235,180,0.10);
  }
  #locate-orb.locked {
    border-color: rgba(126,235,180,0.95);
    box-shadow: 0 0 52px rgba(126,235,180,0.40), inset 0 0 24px rgba(126,235,180,0.16);
  }
  @keyframes locate-pulse {
    0%,100% { box-shadow: 0 0 28px rgba(126,235,180,0.22); }
    50%      { box-shadow: 0 0 56px rgba(126,235,180,0.50); }
  }
  #locate-orb .locate-g {
    font-size: 24px; line-height: 1; color: rgba(126,235,180,0.90);
    transition: color 0.2s; position: relative; z-index: 2;
    filter: drop-shadow(0 0 8px rgba(126,235,180,0.8));
  }
  #locate-orb .locate-lbl {
    font-size: 8px; letter-spacing: 0.25em; text-transform: uppercase;
    color: rgba(126,235,180,0.65); font-family: 'SF Mono',monospace;
    white-space: nowrap; pointer-events: none;
    position: relative; z-index: 2;
  }
  #locate-orb.acquiring .locate-g { animation: locate-spin 2s linear infinite; display: inline-block; }
  @keyframes locate-spin { to { transform: rotate(360deg); } }

  /* Orb toggle — replaces checkboxes for boolean state */
  .orb-toggle {
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
    font-size: 11px; color: #6a8aaf; letter-spacing: 0.06em; user-select: none;
  }
  .orb-toggle-ring {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1.5px solid rgba(120,180,255,0.22);
    background: rgba(8,16,32,0.5); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: rgba(120,180,255,0.3);
    transition: border-color 0.2s, box-shadow 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .orb-toggle.on .orb-toggle-ring {
    border-color: rgba(255,140,80,0.75);
    box-shadow: 0 0 12px rgba(255,140,80,0.3);
    color: rgba(255,160,100,0.9);
  }

  /* ============================================================
     Panel — slides up from bottom for tasks.
     ============================================================ */
  #panel {
    position: fixed; left: 0; right: 0; bottom: 0;
    max-height: 70vh; overflow-y: auto;
    background: rgba(8, 16, 32, 0.92); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(120, 180, 255, 0.2);
    border-radius: 22px 22px 0 0;
    padding: 22px 22px calc(40px + env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 60;
  }
  #panel.visible { transform: translateY(0); }
  #panel h2 { margin: 0 0 4px; font-size: 13px; letter-spacing: 0.2em;
              color: #7eb4ff; text-transform: uppercase; font-weight: 500; }
  #panel .subtitle { font-size: 11px; color: #6a8aaf; margin-bottom: 16px; }
  #panel .row { display: flex; justify-content: space-between; align-items: center;
                padding: 10px 0; border-bottom: 1px solid rgba(120, 180, 255, 0.08); }
  #panel .row:last-child { border-bottom: 0; }
  #panel button.primary {
    width: 100%; padding: 12px; margin-top: 12px;
    background: rgba(120, 180, 255, 0.15); border: 1px solid rgba(120, 180, 255, 0.3);
    color: #e6f1ff; border-radius: 12px; font-size: 12px;
    letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer;
  }
  #panel input, #panel textarea, #panel select {
    width: 100%; padding: 10px; margin-top: 8px;
    background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(120, 180, 255, 0.2);
    border-radius: 10px; color: #e6f1ff; font-size: 14px; font-family: inherit;
  }
  #panel textarea { min-height: 80px; resize: vertical; }

  /* ============================================================
     AICYCLE chat panel — starts at input bar height, grows to 33vh.
     ============================================================ */
  #aicycle-chat {
    position: fixed; inset: auto 0 0 0;
    height: auto; max-height: 33vh; min-height: 0;
    background: rgba(8, 16, 32, 0.95); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(120, 180, 255, 0.2);
    border-radius: 22px 22px 0 0;
    transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 55; display: flex; flex-direction: column;
    overflow: hidden;
  }
  #aicycle-chat.visible { transform: translateY(0); }
  #aicycle-chat.resizing { transition: none; }
  #aicycle-drag-handle {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 10px 0 2px; cursor: ns-resize; flex-shrink: 0; touch-action: none;
  }
  #aicycle-drag-handle::before {
    content: ''; display: block; width: 36px; height: 4px; border-radius: 2px;
    background: rgba(120, 180, 255, 0.3); flex-shrink: 0;
  }
  #aicycle-title {
    font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(120,180,255,0.55); font-family: 'SF Mono',monospace;
    pointer-events: none; user-select: none; white-space: nowrap;
  }
  /* Model indicator strip inside ACI chat */
  #aci-models {
    display: flex; gap: 6px; padding: 6px 14px 4px; flex-wrap: wrap;
    border-bottom: 1px solid rgba(120,180,255,0.07);
  }
  #aci-models:empty { display: none; }
  .aci-dot {
    display: flex; align-items: center; gap: 4px; padding: 3px 8px;
    border-radius: 999px; border: 1px solid rgba(120,180,255,0.12);
    background: rgba(255,255,255,0.02);
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(120,180,255,0.35); font-family: 'SF Mono',monospace;
    transition: all 0.35s;
  }
  .aci-dot::before {
    content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
    background: rgba(120,180,255,0.18); transition: all 0.35s;
  }
  .aci-dot.active {
    border-color: rgba(126,235,180,0.45); color: rgba(126,235,180,0.90);
    background: rgba(126,235,180,0.04);
  }
  .aci-dot.active::before {
    background: #7eebb4; box-shadow: 0 0 8px rgba(126,235,180,0.9);
  }
  #aicycle-chat .messages {
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 8px 16px 4px; min-height: 0;
  }
  #aicycle-chat .messages:empty { display: none; }
  #aicycle-chat .msg { margin-bottom: 12px; padding: 10px 14px; border-radius: 14px;
                   max-width: 85%; font-size: 14px; line-height: 1.4; }
  #aicycle-chat .msg.user { background: rgba(120, 180, 255, 0.12); margin-left: auto; }
  #aicycle-chat .msg.ai   { background: rgba(255, 255, 255, 0.04); }
  #aicycle-chat .msg .via { font-size: 9px; letter-spacing: 0.15em;
                        color: #6a8aaf; text-transform: uppercase; margin-bottom: 4px; }
  #aicycle-chat form { display: flex; gap: 10px; padding: 12px; align-items: center;
                   border-top: 1px solid rgba(120, 180, 255, 0.1); }
  #aicycle-chat input { flex: 1; }
  /* Big, glowing blue command buttons — mic (left) + send (right) */
  .aci-btn {
    flex-shrink: 0; width: 52px; height: 52px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; cursor: pointer; user-select: none;
    -webkit-tap-highlight-color: transparent;
    background: rgba(40, 110, 220, 0.18);
    border: 2px solid rgba(120, 180, 255, 0.6);
    box-shadow: 0 0 16px rgba(90, 160, 255, 0.35), inset 0 0 12px rgba(90, 160, 255, 0.15);
    transition: transform 0.15s, box-shadow 0.25s, background 0.25s, border-color 0.25s;
    font-family: "Apple Color Emoji","Noto Color Emoji","Segoe UI Emoji",sans-serif;
  }
  .aci-btn:active { transform: scale(0.9); }
  .aci-btn:hover { box-shadow: 0 0 24px rgba(90, 160, 255, 0.55), inset 0 0 14px rgba(90, 160, 255, 0.22); }
  /* Locked-in / active state — strong steady glow */
  .aci-btn.locked {
    background: rgba(60, 140, 255, 0.42);
    border-color: rgba(150, 200, 255, 0.95);
    box-shadow: 0 0 30px rgba(110, 180, 255, 0.85), inset 0 0 16px rgba(150, 200, 255, 0.4);
    animation: aci-btn-pulse 1.3s ease-in-out infinite;
  }
  @keyframes aci-btn-pulse {
    0%,100% { box-shadow: 0 0 24px rgba(110,180,255,0.7), inset 0 0 14px rgba(150,200,255,0.35); }
    50%     { box-shadow: 0 0 40px rgba(140,200,255,1), inset 0 0 20px rgba(180,220,255,0.55); }
  }
  #aicycle-speaking-stop { display: none; }
  #aicycle-speaking-stop.on { display: flex; }


  /* Mic recording state (the AICYCLE node pulses red while listening) */
  #aicycle-float.listening .node {
    background: #ff5e5e; box-shadow: 0 0 16px rgba(255, 100, 100, 0.9);
    animation: mic-pulse 1s ease-in-out infinite;
  }
  @keyframes mic-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }
  /* Speaking state — Astranov's ring glows blue while it talks */
  #aicycle-float.speaking .node {
    background: #6eb4ff; box-shadow: 0 0 18px rgba(110, 180, 255, 0.95);
    animation: mic-pulse 0.7s ease-in-out infinite;
  }


  /* Radar orbital HUD */
  #radar-hud { display:flex; flex-direction:column; align-items:center; gap:14px; padding:10px 0 0; }
  #radar-orbital {
    position:relative; width:220px; height:220px; border-radius:50%;
    border:1px solid rgba(120,180,255,0.28);
    background:radial-gradient(circle at center,rgba(30,60,100,0.18) 0%,rgba(10,20,40,0.82) 65%,rgba(0,8,24,0.96) 100%);
    box-shadow:0 0 60px rgba(120,180,255,0.07) inset;
    flex-shrink:0; overflow:hidden;
  }
  #radar-sweep {
    position:absolute; inset:0; border-radius:50%;
    background:conic-gradient(from 0deg,rgba(126,235,180,0) 0%,rgba(126,235,180,0.16) 12%,rgba(126,235,180,0) 22%);
    animation:sweep 4s linear infinite;
  }
  @keyframes sweep { to { transform:rotate(360deg); } }
  .radar-range-ring {
    position:absolute; border-radius:50%; border:1px solid rgba(120,180,255,0.1);
    pointer-events:none;
  }
  #radar-core {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:44px; height:44px; border-radius:50%;
    border:1px solid rgba(120,180,255,0.35);
    background:rgba(8,16,32,0.85);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:border-color 0.3s, box-shadow 0.3s;
    z-index:2;
  }
  #radar-core.acquiring { border-color:rgba(126,235,180,0.5); animation:core-pulse 1.4s ease-in-out infinite; }
  #radar-core.locked   { border-color:rgba(126,235,180,0.85); box-shadow:0 0 20px rgba(126,235,180,0.25); }
  @keyframes core-pulse {
    0%,100% { box-shadow:0 0 0 0 rgba(126,235,180,0.3); }
    50%      { box-shadow:0 0 0 8px rgba(126,235,180,0); }
  }
  .rch { position:absolute; background:rgba(120,180,255,0.45); pointer-events:none; }
  .rch.h { width:20px; height:1px; top:50%; left:50%; transform:translate(-50%,-50%); }
  .rch.v { width:1px; height:20px; top:50%; left:50%; transform:translate(-50%,-50%); }
  .rch.pip {
    width:5px; height:5px; border-radius:50%;
    background:#7eb4ff; box-shadow:0 0 8px rgba(120,180,255,0.9);
    top:50%; left:50%; transform:translate(-50%,-50%);
    transition:background 0.3s, box-shadow 0.3s;
  }
  #radar-core.locked .rch.pip { background:#7eebb4; box-shadow:0 0 10px rgba(126,235,180,0.9); }
  #radar-coords {
    position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
    font-size:8px; letter-spacing:0.2em; color:rgba(120,180,255,0.45);
    text-transform:uppercase; white-space:nowrap; font-family:'SF Mono',monospace;
    pointer-events:none;
  }
  .radar-orbit-dot {
    position:absolute; width:8px; height:8px; border-radius:50%;
    transform:translate(-50%,-50%);
    background:rgba(120,180,255,0.18); border:1px solid rgba(120,180,255,0.35);
    transition:background 0.35s, box-shadow 0.35s; cursor:pointer; z-index:1;
  }
  .radar-orbit-dot.active {
    background:#7eebb4; border-color:rgba(126,235,180,0.85);
    box-shadow:0 0 14px rgba(126,235,180,0.9);
  }
  .radar-orbit-dot.owner-dot { background:rgba(255,180,100,0.18); border-color:rgba(255,180,100,0.35); }
  .radar-orbit-dot.owner-dot.active {
    background:#ffb464; border-color:rgba(255,180,100,0.85);
    box-shadow:0 0 14px rgba(255,180,100,0.9);
  }
  .radar-blip {
    position:absolute; width:5px; height:5px; border-radius:50%;
    transform:translate(-50%,-50%); cursor:pointer; z-index:3;
    animation:blip-fade 4s ease-out forwards;
  }
  @keyframes blip-fade {
    0%   { opacity:1; }
    60%  { opacity:0.85; }
    100% { opacity:0.25; }
  }
  #radar-signals {
    width:100%; max-height:160px; overflow-y:auto; -webkit-overflow-scrolling:touch;
  }

  /* Radar list — distance + category color */
  .radar-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid rgba(120, 180, 255, 0.06);
    cursor: pointer;
  }
  .radar-row:hover { background: rgba(120, 180, 255, 0.04); }
  .radar-row .meta { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .radar-row .title { font-size: 14px; color: #e6f1ff; overflow: hidden; text-overflow: ellipsis;
                       white-space: nowrap; }
  .radar-row .sub   { font-size: 10px; color: #6a8aaf; letter-spacing: 0.1em; text-transform: uppercase; }
  .radar-row .dot   { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
  .radar-row .dist  { font-size: 11px; color: #a8c8ee; margin-left: 12px; white-space: nowrap; }

  /* Memory rows — content + privacy toggle */
  .memory-row {
    padding: 10px 0; border-bottom: 1px solid rgba(120, 180, 255, 0.06);
  }
  .memory-row .body { font-size: 13px; color: #e6f1ff; line-height: 1.4; margin-bottom: 4px; }
  .memory-row .controls {
    display: flex; gap: 8px; align-items: center; font-size: 10px;
    color: #6a8aaf; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .memory-row .privacy-pill {
    padding: 2px 8px; border-radius: 999px; cursor: pointer; user-select: none;
    border: 1px solid rgba(120, 180, 255, 0.2);
  }
  .memory-row .privacy-pill.private {
    background: rgba(255, 100, 100, 0.12); border-color: rgba(255, 100, 100, 0.3); color: #ff9e9e;
  }
  .memory-row .privacy-pill.public {
    background: rgba(120, 255, 180, 0.1); border-color: rgba(120, 255, 180, 0.25); color: #9ee0bd;
  }
  .memory-row .del { cursor: pointer; color: #6a8aaf; }
  .memory-row .del:hover { color: #ff9e9e; }

  /* ============================================================
     HUD Toast — replaces all alert() calls.
     ============================================================ */
  #hud-toast {
    position: fixed; top: max(60px, env(safe-area-inset-top) + 44px);
    left: 50%; transform: translateX(-50%) translateY(-10px);
    padding: 8px 18px; border-radius: 999px;
    background: rgba(8,16,32,0.92); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(120,180,255,0.28);
    font-size: 12px; letter-spacing: 0.08em; color: #a8c8ee;
    z-index: 92; opacity: 0; pointer-events: none;
    white-space: nowrap; max-width: 88vw;
    overflow: hidden; text-overflow: ellipsis;
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  #hud-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #hud-toast.err  { border-color: rgba(255,100,100,0.4); color: #ff9e9e; }
  #hud-toast.ok   { border-color: rgba(126,235,180,0.4); color: #7eebb4; }

  /* ============================================================
     Incoming call — holographic ring, top-center.
     ============================================================ */
  #call-incoming {
    position: fixed; top: max(14px, env(safe-area-inset-top));
    left: 50%; transform: translateX(-50%) scale(0.4);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    z-index: 80; pointer-events: none; opacity: 0;
    transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
  }
  #call-incoming.visible {
    transform: translateX(-50%) scale(1); opacity: 1; pointer-events: auto;
  }
  #call-ring {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(8,16,32,0.82); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1.5px solid rgba(120,180,255,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    animation: call-pulse 1.3s ease-in-out infinite;
  }
  @keyframes call-pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(120,180,255,0.45); }
    50%      { box-shadow: 0 0 0 16px rgba(120,180,255,0); }
  }
  #call-incoming-name {
    font-size: 13px; letter-spacing: 0.1em; color: #e6f1ff;
    max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #call-incoming-status {
    font-size: 8px; letter-spacing: 0.28em; text-transform: uppercase; color: #7eb4ff;
  }
  #call-incoming .c-actions { display: flex; gap: 16px; margin-top: 4px; }
  .c-orb {
    width: 44px; height: 44px; border-radius: 50%; border: 0; outline: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .c-orb:active { transform: scale(0.88); }
  #call-accept  { background: rgba(46,204,113,0.88); box-shadow: 0 0 20px rgba(46,204,113,0.4); }
  #call-decline { background: rgba(255,77,77,0.88);  box-shadow: 0 0 20px rgba(255,77,77,0.4); }

  /* Active call PiP — holographic tile */
  #call-active {
    position: fixed; bottom: 100px; right: 20px;
    width: 280px; height: 360px; display: none;
    background: #000; border: 1px solid rgba(120, 180, 255, 0.3);
    border-radius: 20px; overflow: hidden; z-index: 70;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
  }
  #call-active.visible { display: block; }
  #call-active video { width: 100%; height: 100%; object-fit: cover; background: #111; }
  #call-active #call-local-video {
    position: absolute; bottom: 60px; right: 8px;
    width: 80px; height: 100px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
  }
  #call-active .controls {
    position: absolute; bottom: 0; left: 0; right: 0; padding: 10px;
    display: flex; gap: 8px; justify-content: center;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  }
  #call-active .controls button {
    width: 40px; height: 40px; border-radius: 50%; border: 0; cursor: pointer;
    background: rgba(255, 255, 255, 0.15); color: #fff; font-size: 16px;
  }
  #call-active .controls #call-hangup { background: #ff4d4d; }
  #call-active .status {
    position: absolute; top: 8px; left: 8px;
    font-size: 10px; letter-spacing: 0.2em; color: #fff;
    background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 6px;
    text-transform: uppercase;
  }

  /* ============================================================
     Agent sheet — bottom-up drag-resizable card. Replaces the
     broken radial fan. Each corner gadget is an "agent" whose
     menu, status, and chat all live inside this sheet.
     ============================================================ */
  #agent-sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
    background: rgba(4,8,18,0.96);
    backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
    border-top: 1px solid rgba(120,180,255,0.22);
    border-radius: 22px 22px 0 0;
    box-shadow: 0 -16px 50px rgba(0,0,0,0.55);
    display: flex; flex-direction: column;
    height: 0; max-height: 96vh;
    transition: height 0.32s cubic-bezier(0.22,0.9,0.32,1);
    overflow: hidden;
  }
  #agent-sheet.open  { height: 48vh; }
  #agent-sheet.expanded { height: 92vh; }
  #agent-sheet.dragging { transition: none; }
  #agent-handle {
    flex: 0 0 28px; display: flex; align-items: center; justify-content: center;
    cursor: grab; touch-action: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #agent-handle:active { cursor: grabbing; }
  #agent-handle::before {
    content: ''; width: 44px; height: 5px; border-radius: 3px;
    background: rgba(120,180,255,0.32);
    transition: background 0.2s, width 0.2s;
  }
  #agent-sheet.dragging #agent-handle::before { background: rgba(126,235,180,0.7); width: 64px; }
  #agent-header {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 12px;
    padding: 4px 18px 12px;
    border-bottom: 1px solid rgba(120,180,255,0.08);
  }
  #agent-glyph {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #7eebb4;
    border: 1.5px solid rgba(126,235,180,0.5);
    background: rgba(10,22,44,0.7);
    box-shadow: 0 0 14px rgba(126,235,180,0.25);
    flex-shrink: 0;
  }
  #agent-title-wrap { flex: 1; min-width: 0; }
  #agent-title {
    font-size: 14px; font-weight: 600; color: #e6f1ff;
    letter-spacing: 0.04em;
  }
  #agent-sub {
    font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
    color: #6a8aaf; margin-top: 2px;
  }
  #agent-close {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none; color: #6a8aaf;
    background: rgba(120,180,255,0.08); border: 1px solid rgba(120,180,255,0.18);
    flex-shrink: 0; font-size: 14px;
    -webkit-tap-highlight-color: transparent;
  }
  #agent-close:active { transform: scale(0.92); background: rgba(255,100,100,0.18); color: #ff9e9e; }

  #agent-body {
    flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 12px 18px 8px;
  }
  #agent-actions {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
    margin-bottom: 14px;
  }
  .agent-action {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; border-radius: 12px; cursor: pointer;
    background: rgba(120,180,255,0.05);
    border: 1px solid rgba(120,180,255,0.16);
    color: #cfe2ff; user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .agent-action:active { transform: scale(0.97); background: rgba(120,180,255,0.14); }
  .agent-action .aa-g {
    font-size: 19px;
    font-family: "Apple Color Emoji","Noto Color Emoji","Segoe UI Emoji",serif;
    flex-shrink: 0; line-height: 1;
  }
  .agent-action .aa-l {
    font-size: 12px; letter-spacing: 0.06em; color: #e6f1ff;
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .agent-action.act-publish { border-color: rgba(255,170,80,0.32);  background: rgba(255,170,80,0.05); }
  .agent-action.act-publish .aa-g { color: #ffb464; }
  .agent-action.act-explore { border-color: rgba(126,235,180,0.32); background: rgba(126,235,180,0.05); }
  .agent-action.act-explore .aa-g { color: #7eebb4; }
  .agent-action.act-system  { border-color: rgba(180,140,255,0.32); background: rgba(180,140,255,0.05); }
  .agent-action.act-system  .aa-g { color: #c9b0ff; }
  .agent-action.act-link    { border-color: rgba(120,180,255,0.32); background: rgba(120,180,255,0.05); }
  .agent-action.act-link    .aa-g { color: #a8c8ee; }
  .agent-action.act-cat     { border-color: rgba(255,210,140,0.30); background: rgba(255,210,140,0.04); }
  .agent-action.act-cat .aa-g { color: #ffd99a; }
  .agent-action.off { opacity: 0.32; }

  #agent-chat {
    border-top: 1px solid rgba(120,180,255,0.08); padding-top: 10px;
  }
  #agent-chat-log {
    display: flex; flex-direction: column; gap: 8px;
    min-height: 80px;
  }
  .ag-msg {
    padding: 9px 13px; border-radius: 13px;
    font-size: 13px; line-height: 1.45; max-width: 88%;
    word-break: break-word;
  }
  .ag-msg.me  { background: rgba(120,180,255,0.16); align-self: flex-end; color: #e2eeff; }
  .ag-msg.bot { background: rgba(30,40,60,0.85);   align-self: flex-start; color: #d2dff0; }
  .ag-msg.bot .via {
    font-size: 8px; letter-spacing: 0.2em; color: #7eebb4;
    text-transform: uppercase; margin-bottom: 4px;
  }
  #agent-input-row {
    flex: 0 0 auto;
    display: flex; gap: 8px; padding: 8px 14px 14px;
    border-top: 1px solid rgba(120,180,255,0.08);
    padding-bottom: calc(14px + env(safe-area-inset-bottom));
  }
  #agent-input {
    flex: 1; background: rgba(8,18,36,0.75);
    border: 1px solid rgba(120,180,255,0.2); border-radius: 999px;
    color: #e6f1ff; font-size: 13px; padding: 10px 14px;
    font-family: inherit; outline: none;
  }
  #agent-input:focus { border-color: rgba(126,235,180,0.55); }
  #agent-send {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(126,235,180,0.16);
    border: 1px solid rgba(126,235,180,0.45);
    color: #7eebb4; cursor: pointer; user-select: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  #agent-send:active { transform: scale(0.92); background: rgba(126,235,180,0.30); }
  #agent-sheet.thinking #agent-send { animation: think-spin 1.2s linear infinite; }
  @keyframes think-spin { to { transform: rotate(360deg); } }

  /* Agent labels on corner gadgets — shift to "Agent" terminology */
  .corner-gadget .cg-label, #locate-orb .locate-lbl { letter-spacing: 0.22em; }

  /* Driving HUD — bottom-center pill, only visible when motion > 5 m/s */
  #drive-hud {
    position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
    padding: 5px 14px; border-radius: 999px;
    background: rgba(8,20,42,0.78); backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(126,235,180,0.32);
    font-size: 10px; letter-spacing: 0.22em; color: #7eebb4;
    text-transform: uppercase; opacity: 0; pointer-events: none;
    transition: opacity 0.35s; z-index: 41;
    display: flex; align-items: center; gap: 8px;
  }
  #drive-hud.visible { opacity: 1; }
  #drive-hud .dh-emoji { font-size: 13px; }
  #drive-hud .dh-sp { color: #cfe9d6; font-weight: 600; letter-spacing: 0.06em; }

  /* ============================================================
     Messages
     ============================================================ */
  .msg-row {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 10px 0; border-bottom: 1px solid rgba(120,180,255,0.07); cursor: pointer;
  }
  .msg-row:hover { background: rgba(120,180,255,0.04); }
  .msg-row .av {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    background: rgba(120,180,255,0.15); border: 1px solid rgba(120,180,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; color: #a8c8ee;
  }
  .msg-row .av.unread { border-color: rgba(126,235,180,0.5); background: rgba(126,235,180,0.1); color: #7eebb4; }
  .msg-row .meta { flex: 1; min-width: 0; }
  .msg-row .peer { font-size: 13px; color: #e6f1ff; font-weight: 500; }
  .msg-row .preview { font-size: 11px; color: #6a8aaf; margin-top: 2px;
                      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .msg-row .ts { font-size: 10px; color: #4a6a8f; flex-shrink: 0; }
  .msg-bubble {
    max-width: 82%; padding: 8px 12px; border-radius: 14px;
    font-size: 13px; line-height: 1.45; margin-bottom: 6px; word-break: break-word;
  }
  .msg-bubble.me    { background: rgba(120,180,255,0.18); border-bottom-right-radius: 4px;
                      align-self: flex-end; color: #d4e8ff; margin-left: auto; }
  .msg-bubble.them  { background: rgba(30,40,60,0.9); border-bottom-left-radius: 4px;
                      align-self: flex-start; color: #c8d8ef; }
  .msg-thread { display: flex; flex-direction: column; gap: 2px; margin-bottom: 12px;
                max-height: 44vh; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 4px 0; }
  .msg-compose { display: flex; gap: 8px; margin-top: 8px; }
  .msg-compose input { flex: 1; background: rgba(20,30,50,0.8); border: 1px solid rgba(120,180,255,0.2);
                       border-radius: 20px; padding: 9px 14px; color: #e6f1ff; font-size: 13px;
                       outline: none; }
  .msg-compose input::placeholder { color: #4a6a8f; }
  .msg-compose .send-orb { width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
                            background: rgba(120,180,255,0.2); border: 1px solid rgba(120,180,255,0.35);
                            display: flex; align-items: center; justify-content: center;
                            cursor: pointer; color: #7eb4ff; font-size: 16px; }

  /* ============================================================
     Deliveries
     ============================================================ */
  .delivery-tabs { margin: 8px 0 16px; }

  .delivery-row {
    padding: 12px 0; border-bottom: 1px solid rgba(120, 180, 255, 0.06);
    cursor: pointer;
  }
  .delivery-row:hover { background: rgba(120, 180, 255, 0.04); }
  .delivery-row .head {
    display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px;
  }
  .delivery-row .desc { font-size: 14px; color: #e6f1ff; flex: 1; min-width: 0;
                        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .delivery-row .reward { font-size: 13px; color: #ffd47e; margin-left: 12px;
                          font-weight: 500; white-space: nowrap; }
  .delivery-row .meta { font-size: 10px; color: #6a8aaf; letter-spacing: 0.08em;
                        text-transform: uppercase; }
  .delivery-row .status {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 9px; letter-spacing: 0.15em; margin-right: 8px;
  }
  .status-requested { background: rgba(120,180,255,0.15); color: #7eb4ff; }
  .status-accepted  { background: rgba(255,200,80,0.15);  color: #ffc850; }
  .status-in_transit { background: rgba(255,150,80,0.15); color: #ff9650; }
  .status-delivered { background: rgba(120,255,180,0.15); color: #7eebb4; }
  .status-cancelled { background: rgba(160,160,160,0.15); color: #a0a0a0; }

  /* ============================================================
     SMART GADGETS — Gadget Law §4
     Vocabulary: orbs, rings, pulses, segmented bars, scopes, dials.
     No plain buttons. No native <select>. No "Submit".
     ============================================================ */

  /* Identity orb — replaces the login form. Lives in the You panel.
     Visual reflects auth state: idle / pending / signed-in / owner. */
  .gadget-orb {
    width: 96px; height: 96px; margin: 4px auto 14px;
    position: relative; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, rgba(120,180,255,0.4), rgba(10,20,40,0.85) 70%);
    border: 1.5px solid rgba(120,180,255,0.45);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: transform 0.2s, border-color 0.3s, background 0.3s;
  }
  .gadget-orb:hover { transform: scale(1.04); }
  .gadget-orb::before {
    content: ''; position: absolute; inset: -6px; border-radius: 50%;
    border: 1px solid rgba(120,180,255,0.22);
    animation: orb-halo 3.2s ease-in-out infinite;
  }
  @keyframes orb-halo {
    0%,100% { transform: scale(1);    opacity: 0.4; }
    50%     { transform: scale(1.08); opacity: 0.9; }
  }
  .gadget-orb.signed-in {
    border-color: rgba(126,235,180,0.7);
    background: radial-gradient(circle at 35% 30%, rgba(126,235,180,0.4), rgba(10,40,20,0.85) 70%);
  }
  .gadget-orb.signed-in::before { border-color: rgba(126,235,180,0.42); }
  .gadget-orb.owner {
    border-color: rgba(255,180,100,0.8);
    background: radial-gradient(circle at 35% 30%, rgba(255,180,100,0.4), rgba(40,20,10,0.85) 70%);
  }
  .gadget-orb.owner::before { border-color: rgba(255,180,100,0.5); }
  .gadget-orb.pending { animation: orb-pending 1.2s ease-in-out infinite; }
  @keyframes orb-pending {
    0%,100% { box-shadow: 0 0 0 0  rgba(120,180,255,0.55); }
    50%     { box-shadow: 0 0 0 16px rgba(120,180,255,0);    }
  }
  .gadget-orb .glyph {
    font-size: 26px; letter-spacing: 0.08em; color: #e6f1ff;
    font-weight: 300; text-transform: uppercase;
  }
  .gadget-orb-readout {
    text-align: center; font-size: 10px; letter-spacing: 0.25em;
    color: #6a8aaf; text-transform: uppercase; margin-bottom: 12px;
    font-family: 'SF Mono', monospace;
  }

  /* Command-line input — replaces label-over-input form rows */
  .gadget-cmd-wrap { position: relative; margin-top: 10px; }
  .gadget-cmd-wrap::before {
    content: '›'; position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%); color: #7eb4ff; font-weight: 700;
    pointer-events: none; font-size: 16px;
  }
  .gadget-cmd {
    width: 100%; padding: 10px 12px 10px 28px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(120,180,255,0.25); border-radius: 10px;
    font-family: 'SF Mono', 'Menlo', monospace; font-size: 13px;
    color: #e6f1ff; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .gadget-cmd:focus {
    border-color: rgba(126,235,180,0.6);
    box-shadow: 0 0 0 2px rgba(126,235,180,0.12);
  }
  textarea.gadget-cmd { min-height: 80px; resize: vertical; line-height: 1.45; }

  /* Engage gadget — replaces "Submit". Sweeping shimmer; verb glyph. */
  .gadget-engage {
    width: 100%; margin-top: 12px; padding: 14px 16px;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    background: linear-gradient(to right, rgba(120,180,255,0.06), rgba(120,180,255,0.18), rgba(120,180,255,0.06));
    border: 1px solid rgba(120,180,255,0.4); border-radius: 999px;
    color: #e6f1ff; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
    cursor: pointer; position: relative; overflow: hidden;
    transition: border-color 0.2s, transform 0.15s, color 0.2s;
    user-select: none;
  }
  .gadget-engage::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to right, transparent, rgba(120,180,255,0.4), transparent);
    transform: translateX(-100%);
    transition: transform 0.7s ease;
  }
  .gadget-engage:hover::before { transform: translateX(100%); }
  .gadget-engage:active { transform: scale(0.98); }
  .gadget-engage .verb-glyph {
    width: 8px; height: 8px; border-radius: 50%;
    background: #7eb4ff; box-shadow: 0 0 10px rgba(120,180,255,0.8);
  }
  .gadget-engage.armed {
    border-color: rgba(126,235,180,0.75); color: #9ee0bd;
    box-shadow: 0 0 22px rgba(126,235,180,0.3);
  }
  .gadget-engage.armed .verb-glyph {
    background: #7eebb4; box-shadow: 0 0 14px rgba(126,235,180,0.9);
    animation: verb-pulse 1.4s ease-in-out infinite;
  }
  @keyframes verb-pulse {
    0%,100% { transform: scale(1);   opacity: 1;   }
    50%     { transform: scale(1.4); opacity: 0.7; }
  }
  .gadget-engage[disabled] {
    opacity: 0.45; pointer-events: none; cursor: not-allowed;
  }

  /* Segmented HUD selector — replaces native <select>.
     Each segment is state-aware (locks active) and shows live counts. */
  .gadget-seg {
    display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;
    gap: 2px; margin: 10px 0; padding: 3px;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(120,180,255,0.18); border-radius: 12px;
    overflow-x: auto; scrollbar-width: none;
  }
  .gadget-seg.wrap { grid-auto-flow: row; grid-template-columns: repeat(auto-fill, minmax(72px,1fr)); }
  .gadget-seg::-webkit-scrollbar { display: none; }
  .gadget-seg .seg {
    padding: 7px 8px; text-align: center; cursor: pointer;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: #6a8aaf; border-radius: 8px;
    transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    position: relative; min-width: 0;
    border: 1px solid transparent;
  }
  .gadget-seg .seg:hover { color: #a8c8ee; background: rgba(120,180,255,0.06); }
  .gadget-seg .seg.active {
    background: rgba(120,180,255,0.22); color: #fff;
    border-color: rgba(120,180,255,0.55);
    box-shadow: inset 0 0 12px rgba(120,180,255,0.15), 0 0 8px rgba(120,180,255,0.2);
  }
  .gadget-seg .seg .count {
    display: block; font-size: 9px; opacity: 0.6;
    margin-top: 2px; font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', monospace;
  }
  .gadget-seg .seg.active .count { opacity: 0.9; color: #7eb4ff; }

  /* Intensity dial — drag vertically to set amplitude.
     Conic-gradient arc shows fill; live tabular number in centre. */
  .gadget-dial-wrap {
    display: flex; gap: 16px; align-items: center; margin: 14px 0 8px;
  }
  .gadget-dial {
    width: 76px; height: 76px; position: relative; flex-shrink: 0;
    cursor: ns-resize; user-select: none; touch-action: none;
  }
  .gadget-dial .track {
    position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid rgba(120,180,255,0.18);
    background: rgba(0,0,0,0.3);
  }
  .gadget-dial .arc {
    position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(from -90deg, rgba(126,235,180,0.92) 0deg, rgba(126,235,180,0.92) calc(var(--pct,0) * 3.6deg), rgba(120,180,255,0.05) 0deg);
    -webkit-mask: radial-gradient(circle at 50% 50%, transparent 28px, #000 29px, #000 36px, transparent 37px);
            mask: radial-gradient(circle at 50% 50%, transparent 28px, #000 29px, #000 36px, transparent 37px);
  }
  .gadget-dial .value {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-size: 20px; font-weight: 300;
    color: #e6f1ff; font-variant-numeric: tabular-nums; pointer-events: none;
    font-family: 'SF Mono', monospace;
  }
  .gadget-dial-meta {
    flex: 1; min-width: 0;
  }
  .gadget-dial-meta .label {
    font-size: 10px; letter-spacing: 0.25em; color: #6a8aaf;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .gadget-reach {
    height: 4px; background: rgba(120,180,255,0.12); border-radius: 4px;
    position: relative; overflow: hidden; margin: 8px 0 4px;
  }
  .gadget-reach::after {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: var(--pct, 30%);
    background: linear-gradient(to right, rgba(120,180,255,0.45), rgba(126,235,180,0.85));
    transition: width 0.2s;

function emitTelemetry(event, severity = 'info', context = {}) {
  const payload = {
    app: 'astranov',
    event,
    severity,
    sessionId: TELEMETRY_SESSION_ID,
    path: location.pathname,
    timestamp: new Date().toISOString(),
    context,
  };

  console[severity === 'error' ? 'error' : 'info']('[ASTRANOV TELEMETRY]', payload);

  if (navigator.sendBeacon) {
    try {
      navigator.sendBeacon('/api/client-telemetry', JSON.stringify(payload));
    } catch (_) {}
  }
}

window.addEventListener('error', event => {
  emitTelemetry('runtime.error', 'error', {
    message: event.message,
    source: event.filename,
    line: event.lineno,
    column: event.colno,
    error: normalizeTelemetryError(event.error),
  });
});

window.addEventListener('unhandledrejection', event => {
  emitTelemetry('runtime.unhandled_rejection', 'error', {
    reason: normalizeTelemetryError(event.reason),
  });
});

function fatal(msg) {
  $('fatal-msg').textContent = msg;
  $('fatal').classList.add('visible');
  emitTelemetry('runtime.fatal', 'error', { message: msg });
  console.error('[ASTRANOV FATAL]', msg);
}

// HUD toast — replaces all alert() calls. type: '' | 'ok' | 'err'
let _toastTimer = null;
function toast(msg, type = '') {
  const el = $('hud-toast');
  if (!el) return;
  el.textContent = String(msg).slice(0, 88);
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 3200);
}

// Arm-confirm: first tap arms the engage element, second tap fires the action.
// Pass the element and the callback. Auto-disarms after 3s.
function armEngage(el, actionLabel, onConfirm) {
  if (el.dataset.armed === '1') {
    el.dataset.armed = '0';
    el.classList.remove('armed');
    const lbl = el.querySelector('span:last-child');
    if (lbl) lbl.textContent = actionLabel;
    clearTimeout(el._armTimer);
    onConfirm();
  } else {
    el.dataset.armed = '1';
    el.classList.add('armed');
    const lbl = el.querySelector('span:last-child');
    if (lbl) lbl.textContent = 'Confirm?';
    clearTimeout(el._armTimer);
    el._armTimer = setTimeout(() => {
      el.dataset.armed = '0';
      el.classList.remove('armed');
      if (lbl) lbl.textContent = actionLabel;
    }, 3000);
  }
}

/* ==============================================================
   1. Cesium boot — Photorealistic 3D Tiles, ALL widgets disabled
   ============================================================== */
let viewer;
async function bootCesium() {
  try {
    if (!window.Cesium) throw new Error('Cesium failed to load from CDN');

    // Set Ion token if provided. Missing/placeholder is OK — the imagery cycle
    // will skip Ion-backed providers and fall through to free alternatives.
    if (!CESIUM_ION_TOKEN.startsWith('__')) {
      Cesium.Ion.defaultAccessToken = CESIUM_ION_TOKEN;
    } else {
      console.warn('[ASTRANOV] No Cesium Ion token — using free fallback imagery only');
    }

    viewer = new Cesium.Viewer('cesiumContainer', {
      // Kill EVERY default widget — Zero UI Law §7
      animation: false,
      baseLayerPicker: false,
      fullscreenButton: false,
      vrButton: false,
      geocoder: false,
      homeButton: false,
      infoBox: false,
      sceneModePicker: false,
      selectionIndicator: false,
      timeline: false,
      navigationHelpButton: false,
      navigationInstructionsInitiallyVisible: false,
      // Render continuously — requestRenderMode:true was leaving a frozen,
      // half-painted frame on boot (the "blurry beige" globe-that-never-draws).
      requestRenderMode: false,
      // No default imagery — the imagery cycle manages this
      baseLayer: false,
      // Allow both 3D and 2D
      scene3DOnly: false,
      // Skybox + atmosphere look
      skyAtmosphere: new Cesium.SkyAtmosphere(),
    });

    // Hide credit overlay (Ion's required attribution still serves via tile metadata)
    if (viewer.cesiumWidget?.creditContainer) {
      viewer.cesiumWidget.creditContainer.style.display = 'none';
    }

    // IMAGERY LAW §3 — real imagery only:
    //   globe-tier: NASA BMNG day + Black Marble night, blended by terminator.
    //   city-tier:  user-selectable real-cartography providers via #layer-switch.
    await bootImageryGlobeTier();
    await setCityImagery(0);   // default OSM, hidden until below GLOBAL

    // Zoom + LOD settings — allow the user to zoom all the way down to
    // street level, and demand high-detail tile loads.
    const cc = viewer.scene.screenSpaceCameraController;
    cc.minimumZoomDistance = 5;          // 5 m above ground
    cc.maximumZoomDistance = 30_000_000; // 30 000 km
    cc.enableTilt = true; cc.enableRotate = true;
    viewer.scene.globe.maximumScreenSpaceError = 1.66; // sharper than default
    viewer.scene.globe.preloadSiblings = true;
    viewer.scene.globe.tileCacheSize = 1500;            // keep more tiles in RAM
    viewer.resolutionScale = Math.min(2, window.devicePixelRatio || 1);

    // Glowing blue major-city beacons — click to dive into a city
    buildCityBeacons();

    // Open camera at GLOBAL altitude over Europe (close to astranov.eu)
    // Open on the GLOBE itself — far enough out that Earth sits in black
    // space (Zero-UI §1: the globe and space are always on screen). 12,000 km
    // was too close and filled the frame like a flat map.
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(20, 35, 28_000_000),
      duration: 0,
    });

    // Camera height drives the navigation level
    viewer.camera.moveEnd.addEventListener(onCameraSettled);
    onCameraSettled();

    // Globe auto-spins gently around Earth's polar axis on load. It's a true
    // planetary rotation (UNIT_Z), not a camera-drift. Stops permanently the
    // moment any other camera motion or user gesture begins.
    window._autoSpin = true;
    const stopSpin = () => { window._autoSpin = false; };
    viewer.scene.canvas.addEventListener('pointerdown', stopSpin);
    viewer.scene.canvas.addEventListener('wheel',       stopSpin);
    viewer.scene.canvas.addEventListener('touchstart',  stopSpin);
    viewer.clock.onTick.addEventListener(() => {
      if (!window._autoSpin) return;
      if (currentLevel !== 'global') return;
      if (viewer.scene.mode !== Cesium.SceneMode.SCENE3D) return;
      try { viewer.scene.camera.rotate(Cesium.Cartesian3.UNIT_Z, -0.0008); } catch (_) {}
    });
    // Any programmatic camera motion (flyTo / setView, called by locate, click-
    // to-descend, fly-to-city, etc.) must kill the auto-spin so they don't fight.
    const _origFlyTo = viewer.camera.flyTo.bind(viewer.camera);
    viewer.camera.flyTo = (...args) => { window._autoSpin = false; return _origFlyTo(...args); };
    const _origSetView = viewer.camera.setView.bind(viewer.camera);
    viewer.camera.setView = (...args) => { window._autoSpin = false; return _origSetView(...args); };

    // Pin picking
    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    handler.setInputAction(onCanvasClick, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    // Hide boot veil
    setTimeout(() => $('boot').classList.add('gone'), 400);
  } catch (e) {
    fatal(e.message || String(e));
  }
}

/* ==============================================================

       Globe tier: NASA Blue Marble Next Generation (day) + VIIRS Black
       Marble (night). Layered, blended by Cesium's day/night terminator
       with Globe.enableLighting = true. Source: NASA GIBS WMTS (free, no key).
       City tier: user-switchable real-cartography providers (#layer-switch).
   ============================================================== */
let dayLayer   = null;   // BMNG day — bottom
let nightLayer = null;   // Black Marble — terminator-masked, above day
let cityLayer  = null;   // Current city-tier overlay — hidden at GLOBAL
let cityProviderIndex = 0;

const CITY_PROVIDERS = [
  { id: 'carto-dark',    emoji: '🌑', label: 'Dark',
    init: () => new Cesium.UrlTemplateImageryProvider({
      url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',

  { id: 'carto-voyager', emoji: '🧭', label: 'Voyager',
    init: () => new Cesium.UrlTemplateImageryProvider({
      url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',
      subdomains: ['a','b','c','d'], credit: '© CARTO · © OSM', maximumLevel: 19,
    }) },

    init: () => new Cesium.UrlTemplateImageryProvider({
