<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="description" content="Astranov — SpaceNet Global Internet OS" />
<title>Astranov</title>
<meta name="astranov-build" content="20260723341000" />
<meta name="astranov-mode" content="product-clean" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
<style>
/* ═══════════════════════════════════════════════════════════════
   ASTRANOV SHELL — deep space, not pastel cyan
   Void black · deep navy glass · muted steel text · Grok TUI density
   ═══════════════════════════════════════════════════════════════ */
:root {
  --void: #000000;
  --ink: #02060c;
  --panel: rgba(2, 8, 16, 0.82);
  --panel-solid: #050b14;
  --line: rgba(48, 88, 140, 0.38);
  --line-hot: rgba(72, 120, 180, 0.72);
  --text: #b8c4d4;
  --text-dim: #5a6a7e;
  --text-hot: #dce6f2;
  --accent: #1e4d8c;
  --accent-hot: #3d6eb0;
  --glow: rgba(24, 64, 120, 0.4);
  --ok: #3d9a6a;
  --err: #c44a5a;
  --warn: #b8923a;
  --user: #5a7ab0;
  --mono: ui-monospace, "Cascadia Code", "SF Mono", Menlo, Consolas, monospace;
  --ui: system-ui, "Segoe UI", sans-serif;
  --radius: 12px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}
*, *::before, *::after { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%;
  overflow: hidden; background: var(--void); color: var(--text);
  font-family: var(--ui); -webkit-tap-highlight-color: transparent;
}
/* ── Boot ── */
#boot {
  position: fixed; inset: 0; z-index: 99999;
  display: grid; place-items: center;
  background: var(--void); color: var(--text-dim);
  font: 13px/1.4 var(--mono);
}
#boot b {
  display: block; letter-spacing: 0.35em; text-indent: 0.35em;
  color: var(--accent-hot); font-size: 14px; margin-bottom: 10px;
  text-shadow: 0 0 20px var(--glow);
}
#boot p { margin: 0; opacity: 0.75; font-size: 12px; }
/* ── Globe / map ── */
#globe {
  position: absolute; inset: 0; z-index: 2; touch-action: none; background: var(--void);
}
#globe canvas { display: block; width: 100%; height: 100%; cursor: grab; }
#globe canvas.dragging { cursor: grabbing; }
#globe.city-map-active canvas,
#globe.national-map-active canvas { opacity: 0 !important; pointer-events: none; }
#city-map {
  position: fixed; inset: 0; z-index: 10; opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
}
#city-map.active { z-index: 150; opacity: 1; pointer-events: auto; }
#city-map .leaflet-container { background: var(--ink); width: 100%; height: 100%; font-family: var(--ui); }
/* ── Logo ── */
#astranov-logo {
  position: fixed; top: max(10px, var(--safe-t)); left: 50%; transform: translateX(-50%);
  z-index: 210; margin: 0; padding: 6px 16px; min-height: 36px;
  border-radius: 999px; border: 1px solid var(--line);
  background: rgba(0, 0, 0, 0.55); backdrop-filter: blur(12px);
  color: var(--accent-hot); font: 600 13px/1 var(--ui);
  letter-spacing: 0.32em; text-indent: 0.32em; text-transform: uppercase;
  text-shadow: 0 0 14px var(--glow); box-shadow: 0 2px 16px rgba(0,0,0,0.5);
  cursor: pointer; touch-action: manipulation; user-select: none;
  display: flex; align-items: center; justify-content: center;
}
#astranov-logo:active { transform: translateX(-50%) scale(0.97); }
#astranov-logo-wave { display: none; }
.astranov-logo-label { pointer-events: none; }
/* ── HUD chips ── */
#user-chip, #zoom-label {
  position: fixed; z-index: 40; pointer-events: none;
  font: 10px/1.3 var(--mono); color: var(--text-dim);
}
#user-chip { top: 12px; right: 12px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#zoom-label { top: 12px; left: 12px; max-width: 50vw; }
/* ── Kill unauthorized chrome ── */
#aci-bar, #news-ticker, #resource-monitor, #cosmic-guide, #drive-guide,
#first-run-coach, #os-dock, #app-shortcut-row,
#astranov-hard-error, .astranov-fatal-error, .boot-fatal {
  display: none !important; visibility: hidden !important;
  pointer-events: none !important; height: 0 !important; opacity: 0 !important;
}
/* ── CLI surface (Grok Build fork) ── */
#aci-hud {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 200;
  pointer-events: none; padding-bottom: var(--safe-b);
}
#globe-deck {
  pointer-events: auto !important;
  display: flex; flex-direction: column;
  margin: 0 8px calc(6px + var(--safe-b));
  max-height: min(52vh, 520px);
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow:
    0 0 0 1px rgba(0, 0, 0, 0.4),
    0 8px 32px rgba(0, 0, 0, 0.55),
    0 0 24px var(--glow);
  backdrop-filter: blur(16px) saturate(1.1);
  -webkit-backdrop-filter: blur(16px) saturate(1.1);
  color: var(--text);
  font-family: var(--mono);
  overflow: hidden;
  touch-action: manipulation;
}
#globe-deck.collapsed { max-height: none; height: auto; }
#globe-deck.collapsed #globe-deck-body {
  display: none !important; height: 0; overflow: hidden;
}
#globe-deck.expanded #globe-deck-body,
#globe-deck.size-third #globe-deck-body {
  display: flex !important; flex-direction: column;
  flex: 1 1 auto; min-height: 100px; max-height: 40vh; overflow: hidden;
}
/* Session strip */
#globe-deck-header {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 10px 4px; flex-shrink: 0;
  border-bottom: 1px solid rgba(48, 88, 140, 0.22);
  background: linear-gradient(180deg, rgba(20, 40, 72, 0.25), transparent);
  cursor: grab; user-select: none; touch-action: none;
  font: 11px/1.2 var(--mono);
}
#globe-deck-title {
  color: var(--accent-hot); font-weight: 700; letter-spacing: 0.02em;
  max-width: 48%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
#globe-deck-title::before { content: "◆ "; color: var(--user); font-size: 10px; opacity: 0.9; }
#globe-deck-preview {
  flex: 1; min-width: 0; text-align: right;
  color: var(--text-dim); font-size: 10px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
/* Tool handle */
#super-cli-bar {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 8px; min-height: 36px; flex-shrink: 0;
  border-bottom: 1px solid rgba(48, 88, 140, 0.22);
  background: rgba(0, 0, 0, 0.35);
  touch-action: none; cursor: grab;
  font-family: var(--ui);
}
#cli-ribbon-status {
  flex: 1; min-width: 0;
  font: 10px/1.25 var(--mono); color: var(--text-dim);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
#cli-ribbon-status.thinking { color: var(--accent-hot); }
#cli-ribbon-status.ready { color: var(--ok); }
#cli-ribbon-status.alert { color: var(--err); }
#super-cli-edge-right {
  display: flex; align-items: center; gap: 4px; margin-left: auto; flex-shrink: 0;
}
#super-cli-bar button,
#super-cli-edge-right button {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; padding: 0;
  border-radius: 8px; border: 1px solid var(--line);
  background: rgba(8, 16, 28, 0.7); color: var(--text);
  font: 12px var(--ui); cursor: pointer; flex-shrink: 0;
  box-shadow: none;
}
#super-cli-bar button:active { transform: scale(0.96); border-color: var(--line-hot); }
#aci-login {
  width: 30px; height: 30px; border-radius: 8px;
  font: 700 12px var(--mono); color: var(--text-hot);
  background: rgba(30, 60, 100, 0.45); border-color: var(--line-hot);
}
#globe-deck-send.cli-send-top {
  min-width: 52px; width: auto; height: 30px; padding: 0 12px;
  border-radius: 8px; border: 1px solid var(--line-hot);
  background: rgba(24, 52, 96, 0.65); color: var(--text-hot);
  font: 600 11px var(--mono); letter-spacing: 0.04em; text-transform: uppercase;
}
#aci-handsfree { font-size: 14px; }
#aci-bridge[hidden], #aci-video-call[hidden], #super-add-fab[hidden],
#super-add-fab:not(.offer-plus) {
  display: none !important; width: 0 !important; height: 0 !important;
  margin: 0 !important; padding: 0 !important; border: 0 !important;
  overflow: hidden !important; pointer-events: none !important;
}
body.cli-offer-plus #super-add-fab.offer-plus {
  display: inline-flex !important; width: 30px !important; height: 30px !important;
  pointer-events: auto !important; visibility: visible !important;
  border: 1px solid var(--line-hot) !important;
  background: rgba(24, 52, 96, 0.7) !important;
  font: 700 16px/1 var(--ui) !important; color: var(--text-hot) !important;
}
/* Scrollback */
#globe-deck-log {
  flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain; touch-action: pan-y;
  min-height: 72px; max-height: 36vh;
  padding: 8px 8px 10px 6px;
  font: 12.5px/1.5 var(--mono); color: var(--text);
  scrollbar-width: thin; scrollbar-color: rgba(48, 88, 140, 0.45) transparent;
  pointer-events: auto;
}
#globe-deck-log .deck-line {
  margin: 3px 0; padding: 5px 10px 5px 12px;
  border-left: 3px solid rgba(48, 88, 140, 0.3);
  border-radius: 0 6px 6px 0;
  word-break: break-word; white-space: pre-wrap;
}
#globe-deck-log .deck-cmd {
  color: var(--user); border-left-color: var(--user);
  background: rgba(90, 122, 176, 0.08); font-weight: 600;
}
#globe-deck-log .deck-cmd::before { content: "› "; opacity: 0.85; }
#globe-deck-log .deck-out,
#globe-deck-log .deck-reply {
  color: var(--text-hot); border-left-color: var(--accent-hot);
  background: rgba(30, 77, 140, 0.06);
}
#globe-deck-log .deck-ok { color: var(--ok); border-left-color: var(--ok); }
#globe-deck-log .deck-err { color: var(--err); border-left-color: var(--err); }
#globe-deck-log .deck-warn { color: var(--warn); border-left-color: var(--warn); }
#globe-deck-log .deck-dim {
  color: var(--text-dim); border-left-color: rgba(72, 120, 160, 0.45);
  font-size: 11.5px;
}
/* Cases (compacted past turns) */
#globe-deck-log .deck-case {
  margin: 6px 0; border-left: 3px solid rgba(90, 122, 176, 0.45);
  border-radius: 0 8px 8px 0; background: rgba(8, 14, 24, 0.55); overflow: hidden;
}
#globe-deck-log .deck-case-head {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 7px 10px; margin: 0; border: 0; background: transparent;
  color: var(--text-dim); font: 600 11.5px/1.3 var(--mono);
  text-align: left; cursor: pointer; touch-action: manipulation;
}
#globe-deck-log .deck-case-head .case-title {
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: var(--text);
}
#globe-deck-log .deck-case-head .case-meta { color: var(--text-dim); font-size: 10px; }
#globe-deck-log .deck-case-body { display: none; padding: 2px 8px 8px 10px; }
#globe-deck-log .deck-case.open .deck-case-body { display: block; }
#globe-deck-log .deck-case.open .case-mark::before { content: "▼ "; }
#globe-deck-log .deck-case:not(.open) .case-mark::before { content: "▶ "; }
#globe-deck-stage { flex-shrink: 0; max-height: 30vh; overflow-y: auto; }
#globe-deck-stage > *:not(.deck-active) { display: none !important; }
/* Prompt */
#globe-deck-input-row {
  display: flex; align-items: flex-start; gap: 0;
  padding: 6px 8px 8px; flex-shrink: 0;
  border-top: 1px solid rgba(48, 88, 140, 0.28);
  background: rgba(0, 0, 0, 0.4);
}
#aci-cli-form {
  flex: 1; min-width: 0; display: flex; align-items: flex-start;
  margin: 0; padding: 0; border: 1px solid var(--line); border-radius: 8px;
  background: rgba(0, 4, 12, 0.65); overflow: hidden;
}
#aci-cli-form:focus-within {
  border-color: var(--line-hot);
  box-shadow: 0 0 0 1px rgba(72, 120, 180, 0.2), 0 0 12px var(--glow);
}
#aci-cli-prompt {
  display: flex; align-items: flex-start; justify-content: center;
  flex: 0 0 22px; width: 22px; padding: 9px 0 0; margin: 0;
  color: var(--user); font: 600 14px/1 var(--mono);
  user-select: none; pointer-events: none;
}
#aci-cli-in {
  flex: 1; width: 100%; min-height: 38px; max-height: min(28vh, 140px);
  margin: 0; padding: 8px 10px 8px 2px; resize: none;
  border: 0; border-radius: 0; outline: none;
  background: transparent; color: var(--text-hot);
  font: 13.5px/1.45 var(--mono); box-shadow: none;
}
#aci-cli-in::placeholder { color: var(--text-dim); opacity: 0.9; }
/* Misc product surfaces (hidden until modules open them) */
#vendor-menu, #multi-tile, #field-balance-hud, #menu-profile-post-tile {
  /* modules inject their own open styles */
}
#vendor-menu { display: none; }
</style>
<script>
(function () {
  'use strict';
  try {
    if (matchMedia('(pointer:coarse)').matches || navigator.maxTouchPoints > 0) {
      window._globePerfLite = true;
      window._spartan = true;
    }
  } catch (e) {}
  var BUILD = '20260723341000';
  window._bootAt = Date.now();
  window._spartan = true;
  window.__ASTRANOV_HARD_BOOT__ = 1;
  window.__ASTRANOV_MANIFEST__ = {
    mode: 'js-phase-bundles',
    critical: ['/js/phase-critical.js'],
    app: ['/js/phase-app.js'],
    features: ['/js/phase-features.js'],
    specs: ['/astranov-field-hud.js', '/astranov-mpp-tile.js', '/js/astranov-os-boot.js'],
    deferred: ['/astranov-deferred.js']
  };

  function load(src) {
    return new Promise(function (res, rej) {
      var s = document.createElement('script');
      s.src = src + (src.indexOf('?') >= 0 ? '&' : '?') + 'v=' + BUILD;
      s.onload = function () { res(src); };
      s.onerror = function () { rej(new Error(src)); };
      document.head.appendChild(s);
    });
  }
  function loadSoft(src) {
    return load(src).catch(function (e) {
      console.warn('[astranov soft]', src, e);
      return null;
    });
  }
  function loadFirst(list) {
    return list.reduce(function (p, src) {
      return p.catch(function () { return load(src); });
    }, Promise.reject(new Error('empty')));
  }
  function done() {
    try {
      var b = document.getElementById('boot');
      if (b) b.remove();
    } catch (e) {}
  }
  function fail(m) {
    try {
      var el = document.getElementById('boot');
      if (el) {
        el.innerHTML = '<div><b>ASTRANOV</b><p>' + String(m || 'Boot failed') +
          '</p><p style="opacity:.65;font-size:11px;margin-top:8px">Tap logo to reload</p></div>';
      }
    } catch (e) {}
  }

  /* Never leave black overlay forever */
  setTimeout(function () { if (document.getElementById('boot')) done(); }, 8000);

  load('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js')
    .catch(function () {
      return load('https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js');
    })
    .then(function () { return load('/js/phase-critical.js'); })
    .then(function () {
      try {
        if (typeof __astranovBootCritical === 'function') __astranovBootCritical();
      } catch (e) { console.error('[boot critical]', e); }
      done();
      return loadSoft('https://unpkg.com/leaflet@1.9.4/dist/leaflet.js');
    })
    .then(function () {
      return loadSoft('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js');
    })
    .then(function () { return load('/js/phase-app.js'); })
    .then(function () {
      try {
        if (typeof __astranovBootApp === 'function') __astranovBootApp();
      } catch (e) { console.error('[boot app]', e); }
      return load('/js/phase-features.js');
    })
    .then(function () {
      try {
        if (typeof __astranovBootFeatures === 'function') __astranovBootFeatures();
      } catch (e) { console.error('[boot features]', e); }
      return loadFirst(['/js/astranov-field-hud.js', '/astranov-field-hud.js'])
        .catch(function (e) { console.warn('[field-hud]', e); });
    })
    .then(function () {
      return loadFirst(['/js/astranov-mpp-tile.js', '/astranov-mpp-tile.js'])
        .catch(function (e) { console.warn('[mpp-tile]', e); });
    })
    .then(function () { return loadSoft('/js/62-multi-tile.js'); })
    .then(function () {
      try { if (window.MultiTile && MultiTile.init) MultiTile.init(); } catch (e) {}
      return loadSoft('/js/17-architect-bridge.js');
    })
    .then(function () { return loadSoft('/js/85-delivery-dna.js'); })
    .then(function () { return loadSoft('/js/90-grok-cli-parity.js'); })
    .then(function () { return loadSoft('/js/91-cli-gestures.js'); })
    .then(function () { return loadSoft('/js/92-add-plus-offer.js'); })
    .then(function () {
      try { if (window.ArchitectBridge && ArchitectBridge.init) ArchitectBridge.init(); } catch (e) {}
      try { if (window.MenuProfilePostTile && MenuProfilePostTile.init) MenuProfilePostTile.init(); } catch (e) {}
      try { if (window.FieldHud && FieldHud.boot) FieldHud.boot(); } catch (e) {}
      return loadSoft('/js/astranov-os-boot.js');
    })
    .then(function () { return loadSoft('/js/08-astranov-os.js'); })
    .then(function () { return loadSoft('/js/08-astranov-browser.js'); })
    .then(function () {
      try { if (window.AstranovOS) AstranovOS.init(); } catch (e) {}
      try { if (window.AstranovBrowser) AstranovBrowser.init(); } catch (e) {}
      done();
      var delay = window._globePerfLite ? 5000 : 2200;
      setTimeout(function () {
        if (window.LazyModules && LazyModules.schedule) LazyModules.schedule();
        else {
          var d = document.createElement('script');
          d.src = '/astranov-deferred.js?v=' + BUILD;
          d.async = true;
          document.head.appendChild(d);
        }
      }, delay);
    })
    .catch(function (e) {
      console.error(e);
      fail((e && e.message) || 'Boot failed');
      done();
    });
})();
</script>

<body>
<div id="boot"><div><b>ASTRANOV</b><p>Earth</p></div></div>

<button id="astranov-logo" type="button" title="Hard reset" aria-label="ASTRANOV hard reset reload">
  <canvas id="astranov-logo-wave" aria-hidden="true"></canvas>
  <span class="astranov-logo-label">ASTRANOV</span>
</button>
<div id="globe"></div>
<div id="city-map"></div>
<div id="user-chip"></div>
<div id="zoom-label"></div>
<div id="aci-hud">
  <div id="globe-deck" class="collapsed" data-cli="grok-build-fork">
    <div id="globe-deck-header">
      <span id="globe-deck-title">Astranov · Grok</span>
      <span id="globe-deck-preview">session ready</span>

        <button id="aci-video-call" type="button" title="Video" hidden>▣</button>
        <button id="super-add-fab" type="button" title="Add" hidden aria-hidden="true">+</button>
        <button id="globe-deck-send" class="deck-input-btn cli-send-top" type="submit" form="aci-cli-form" title="Send">Send</button>
        <button id="aci-handsfree" type="button" title="Voice">◉</button>
      </div>

  </div>
  <input id="aci-input" placeholder="" style="display:none" />
  <button id="aci-send" type="button" style="display:none">Send</button>
</div>

  <div id="vm-header"><span id="vm-title">Shops</span><button id="vm-close" type="button">×</button></div>
  <div id="vm-body"><div id="vm-list"></div></div>
</div>

<script>
/* chromeGuard — kill dual bars / coach forever */
(function () {
  function g() {
    ['aci-bar', 'news-ticker', 'resource-monitor', 'first-run-coach', 'os-dock', 'app-shortcut-row'].forEach(function (id) {
      var n = document.getElementById(id);
      if (n) {
        n.style.display = 'none';
        n.hidden = true;
        n.setAttribute('aria-hidden', 'true');
        if (id === 'first-run-coach') try { n.innerHTML = ''; } catch (e) {}
      }
    });
    try {
      localStorage.setItem('astranov:coach-v3-os', '1');
      localStorage.setItem('astranov:coach-disabled', '1');
    } catch (e) {}
    window.showFirstRunCoach = function () {};
  }
  g();
  setTimeout(g, 500);
  setTimeout(g, 2000);
  try {
    if (navigator.serviceWorker) {
      navigator.serviceWorker.getRegistrations().then(function (r) {
        r.forEach(function (x) { x.unregister(); });
      });
    }
  } catch (e) {}
})();
</script>
