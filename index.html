  let country = null, city = null;
  try {
    const geo = await reverseGeocode(lat, lng);
    country = geo.country_code?.toUpperCase() || null;
    city = geo.city || null;
  } catch (_) {}
  const { error } = await sb.rpc('set_home_location', {
    lat, lng, country: country ? country.slice(0,2) : null, city_name: city,
  });
  if (!error) { closePanel(); loadProfile(); }
};

async function getUserLocation() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error('Geolocation API not available'));
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
      err => reject(err),
      { timeout: 15_000, enableHighAccuracy: true, maximumAge: 60_000 }
    );
  });
}

async function reverseGeocode(lat, lng) {
  // Nominatim — free, no key, please respect rate limit (1 req/sec)
  const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&zoom=10`;
  const r = await fetch(url, { headers: { 'Accept-Language': navigator.language || 'en' } });
  if (!r.ok) throw new Error('Nominatim ' + r.status);
  const data = await r.json();
  return {
    country_code: data.address?.country_code,
    country: data.address?.country,
    city: data.address?.city || data.address?.town || data.address?.village || data.address?.county,
    display_name: data.display_name,
  };
}

function formatDistance(m) {
  if (m == null) return '';
  if (m < 1000) return `${Math.round(m)} m`;
  if (m < 100_000) return `${(m / 1000).toFixed(1)} km`;
  return `${Math.round(m / 1000)} km`;
}

async function loadDeliveryTab(tab) {
  const target = $('delivery-list');
  if (!target || !sb) return;
  target.innerHTML = '<div style="color:#6a8aaf">Loading…</div>';

  let data = [], error = null;
  if (tab === 'my-requests') {
    ({ data, error } = await sb.from('deliveries')
      .select('*').eq('requester_id', session.user.id)
      .order('created_at', { ascending: false }).limit(40));
  } else if (tab === 'my-runs') {
    ({ data, error } = await sb.from('deliveries')
      .select('*').eq('runner_id', session.user.id)
      .order('created_at', { ascending: false }).limit(40));
  } else if (tab === 'nearby') {
    let coords;
    try { coords = await getUserLocation(); }
    catch (e) {
      target.innerHTML = `<div style="color:#ff9e9e">Location needed: ${escapeHtml(e.message || 'denied')}</div>`;
      return;
    }
    ({ data, error } = await sb.rpc('nearby_deliveries', {
      lat: coords.lat, lng: coords.lng, radius_meters: 20_000, max_results: 50,
    }));
  } else if (tab === 'history') {
    const { data: txData, error: txErr } = await sb.rpc('my_avc_transactions', { max_results: 40 });
    if (txErr) { target.innerHTML = `<div style="color:#ff9e9e">${escapeHtml(txErr.message)}</div>`; return; }
    target.innerHTML = (txData || []).length ? (txData || []).map(t => `
      <div class="delivery-row">
        <div class="head">
          <span class="desc">${escapeHtml(t.note || t.kind.replace('_',' '))}</span>
          <span style="color:${t.amount>0?'#7eebb4':'#ff9e9e'};font-weight:500">${t.amount>0?'+':''}${Number(t.amount)} AVC</span>
        </div>
        <div class="meta">${t.kind.replace('_',' ')} · ${formatRelative(t.created_at)}</div>
      </div>`).join('')
      : '<div style="color:#6a8aaf;padding:12px 0;font-size:13px">No AVC transactions yet. Complete a delivery to earn.</div>';
    return;
  }

  if (error) {
    target.innerHTML = `<div style="color:#ff9e9e">${escapeHtml(error.message)}</div>`;
    return;
  }
  if (!data || data.length === 0) {
    target.innerHTML = `<div style="color:#6a8aaf;padding:12px 0">${tab === 'nearby' ? 'No open deliveries near you.' : 'Nothing here yet.'}</div>`;
    return;
  }

  target.innerHTML = data.map(d => renderDeliveryRow(d, tab)).join('');
}

function renderDeliveryRow(d, tab) {
  const dist = d.pickup_distance_meters != null ? formatDistance(d.pickup_distance_meters) : '';
  const trip = d.trip_distance_meters != null ? formatDistance(d.trip_distance_meters) : '';
  const status = d.status || (tab === 'nearby' ? 'requested' : '');
  return `
    <div class="delivery-row" onclick="openDeliveryPanel('${d.id}')">
      <div class="head">
        <span class="desc">${escapeHtml(d.description)}</span>
        <span class="reward">${d.reward_avc ?? 0} AVC</span>
      </div>
      <div class="meta">
        ${status ? `<span class="status status-${status}">${status.replace('_',' ')}</span>` : ''}
        ${dist ? `pickup ${dist} away · ` : ''}${trip ? `trip ${trip}` : ''}
        ${!dist && !trip ? formatRelative(d.created_at) : ''}
      </div>
    </div>
  `;
}

window.updateDeliveryStatus = async (id, newStatus) => {
  const { error } = await sb.rpc('update_delivery_status', { delivery_id: id, new_status: newStatus });
  if (error) return toast(error.message, 'err');
  const terminal = newStatus === 'delivered' || newStatus === 'cancelled';
  if (terminal) clearActiveDelivery();
  else {
    const { data: d } = await sb.from('deliveries').select('*').eq('id', id).single();
    if (d) saveActiveDelivery(d);
  }
  // Notify the other party
  const { data: d } = await sb.from('deliveries').select('*').eq('id', id).single();
  if (d) {
    const otherId = d.requester_id === session?.user.id ? d.runner_id : d.requester_id;
    const msgs = { in_transit: 'Runner has picked up your delivery', delivered: 'Your delivery has been completed', cancelled: 'A delivery was cancelled' };
    if (otherId && msgs[newStatus]) {
      pushNotify(otherId, {
        type:       'delivery',
        title:      msgs[newStatus],
        body:       d.description?.slice(0, 80) || '',
        tag:        'delivery-' + id,
        deliveryId: id,

  }
  openDeliveryPanel(id);
};

/* ==============================================================
   Delivery globe pins — yellow rings for open delivery requests.
   Visible at NATIONAL / PERSONAL zoom only.
   ============================================================== */
let deliveryPoints = null;
const deliveryIndex = new Map(); // id → { primitive, delivery }

function ensureDeliveryCollection() {
  if (!deliveryPoints && viewer) {
    deliveryPoints = viewer.scene.primitives.add(new Cesium.PointPrimitiveCollection());
  }
}

function addDeliveryPin(d) {
  if (!viewer) return;
  const lat = d.pickup_lat, lng = d.pickup_lng;
  if (lat == null || lng == null) return;
  ensureDeliveryCollection();
  if (deliveryIndex.has(d.id)) return;
  const prim = deliveryPoints.add({
    position: Cesium.Cartesian3.fromDegrees(Number(lng), Number(lat)),
    pixelSize: 14,
    color: Cesium.Color.fromCssColorString('#ffd47e').withAlpha(0.9),
    outlineColor: Cesium.Color.fromCssColorString('#ffaa00').withAlpha(0.7),
    outlineWidth: 3,
    scaleByDistance: new Cesium.NearFarScalar(1.5e3, 1.4, 8e6, 0.4),
    show: currentLevel !== 'global',
  });
  prim.__deliveryId = d.id;
  deliveryIndex.set(d.id, { primitive: prim, delivery: d });
  viewer.scene.requestRender();
}

function removeDeliveryPin(id) {
  const entry = deliveryIndex.get(id);
  if (!entry || !deliveryPoints) return;
  deliveryPoints.remove(entry.primitive);
  deliveryIndex.delete(id);
  if (viewer) viewer.scene.requestRender();
}

async function loadDeliveries() {
  if (!sb) return;
  const { data } = await sb.from('deliveries')

    .eq('status','requested')
    .not('pickup_lat','is',null)
    .limit(200);
  (data || []).forEach(addDeliveryPin);
}

    duration: 2,

};

let deliveryDraft = null;

window.openRequestDeliveryStep1 = () => {
  if (!session) return openYouPanel();

  openPanel(`

window.captureDeliveryPoint = (kind) => {
  if (!viewer || !deliveryDraft) return;
  const center = viewer.camera.pickEllipsoid(
    new Cesium.Cartesian2(window.innerWidth / 2, window.innerHeight / 2),
    viewer.scene.globe.ellipsoid
  );
  if (!center) return toast('Aim the camera at the ground first.');
  const carto = Cesium.Cartographic.fromCartesian(center);
  const lng = Cesium.Math.toDegrees(carto.longitude);
  const lat = Cesium.Math.toDegrees(carto.latitude);

  if (kind === 'pickup') {
    deliveryDraft.pickup = { lng, lat };
    deliveryDraft.step = 'dropoff';
    openPanel(`
      <h2>Request delivery</h2>
      <div class="subtitle">Step 2 of 3 — dropoff location</div>
      <p style="color:#a8c8ee;font-size:13px;line-height:1.5">
        Now aim at the <strong>dropoff point</strong>. Pickup is locked at <span style="color:#7eb4ff">${lat.toFixed(3)}, ${lng.toFixed(3)}</span>.
      </p>
      <div class="gadget-engage" onclick="captureDeliveryPoint('dropoff')"><span class="verb-glyph">⊕</span><span>Set dropoff here</span></div>
    `);
  } else if (kind === 'dropoff') {
    deliveryDraft.dropoff = { lng, lat };
    deliveryDraft.step = 'details';
    openPanel(`
      <h2>Request delivery</h2>
      <div class="subtitle">Step 3 of 3 — details</div>
      <input id="del-desc" type="text" placeholder="What needs delivering?" maxlength="500" />

        Pickup: ${deliveryDraft.pickup.lat.toFixed(3)}, ${deliveryDraft.pickup.lng.toFixed(3)} →

      <div class="gadget-engage armed" onclick="submitDelivery()"><span class="verb-glyph">⊛</span><span>Broadcast request</span></div>
    `);
  }
};

window.submitDelivery = async () => {

    requester_id: session.user.id,

window.emitSignal = async () => {
  const title = $('emit-title')?.value.trim();
  if (!title) return;
  const center = viewer.camera.pickEllipsoid(
    new Cesium.Cartesian2(window.innerWidth / 2, window.innerHeight / 2),
    viewer.scene.globe.ellipsoid
  );
  if (!center) return toast('Aim the camera at the ground first.');
  const carto = Cesium.Cartographic.fromCartesian(center);
  const lng = Cesium.Math.toDegrees(carto.longitude);
  const lat = Cesium.Math.toDegrees(carto.latitude);

  const engage = $('emit-engage');
  if (engage) { engage.classList.add('armed'); engage.querySelector('span:last-child').textContent = 'Transmitting…'; }

  const { error } = await sb.from('signals').insert({
    author_id: session.user.id,
    category: emitState.category,
    scope: currentLevel === 'global' ? 'global' : (currentLevel === 'national' ? 'national' : 'local'),
    title,
    body: $('emit-body')?.value.trim() || null,
    amplitude: emitState.amplitude,
    location: `SRID=4326;POINT(${lng} ${lat})`,
    lat, lng,
  });
  if (error) {
    if (engage) engage.querySelector('span:last-child').textContent = error.message.slice(0, 40);
    return;
  }
  toast('Signal emitted — broadcasting to the globe', 'ok');
  closePanel();
};

// Drag handle — resize panel between input-bar height and 60vh ceiling
(function() {
  const handle = $('aicycle-drag-handle');
  if (!handle) return;
  let startY = 0, startH = 0;
  handle.addEventListener('pointerdown', e => {
    e.preventDefault();
    handle.setPointerCapture(e.pointerId);
    startY = e.clientY;
    startH = aicycleChat.getBoundingClientRect().height;
    aicycleChat.classList.add('resizing');
  });
  handle.addEventListener('pointermove', e => {
    if (!handle.hasPointerCapture(e.pointerId)) return;
    const delta = startY - e.clientY;
    const minH = 60;
    const maxH = Math.round(window.innerHeight * 0.6);
    const newH = Math.max(minH, Math.min(maxH, startH + delta));
    aicycleChat.style.height = newH + 'px';
    aicycleChat.style.maxHeight = newH + 'px';
  });
  handle.addEventListener('pointerup', e => {
    handle.releasePointerCapture(e.pointerId);
    aicycleChat.classList.remove('resizing');
    // Snap closed if dragged below threshold
    if (aicycleChat.getBoundingClientRect().height < 80) {
      aicycleChat.classList.remove('visible');
      aicycleChat.style.height = '';
      aicycleChat.style.maxHeight = '';
    }
  });
  handle.addEventListener('pointercancel', e => {
    handle.releasePointerCapture(e.pointerId);
    aicycleChat.classList.remove('resizing');
  });
})();

$('aicycle-form').addEventListener('submit', async e => {
  e.preventDefault();
  const input = $('aicycle-input');
  const text = input.value.trim();
  if (!text) return;
  appendAICycleMessage('user', text);
  input.value = '';
  $('aicycle-float').classList.add('thinking');
  window._gfxThinking = true;

  try {
    const resp = await callAICycle(text);
    appendAICycleMessage('ai', resp.response, resp.label || resp.provider, resp.via);
    if (resp.provider) _setAILabel(resp.provider);
  } catch (err) {
    appendAICycleMessage('ai', '(cycle unreachable — /aicycle Edge Function not responding)', 'offline', 'fallback');
  } finally {
    $('aicycle-float').classList.remove('thinking');
    window._gfxThinking = false;
  }
});

async function callAICycle(prompt) {
  if (!sb) throw new Error('offline');
  const history = aicycleHistory.slice(-6);
  const body = { prompt, history };
  const { data, error } = await sb.functions.invoke('aicycle', { body });
  if (error) throw error;
  aicycleHistory.push({ role: 'user', content: prompt });
  aicycleHistory.push({ role: 'assistant', content: data.response || '' });
  return data;
}

function appendAICycleMessage(role, text, provider, via) {

  div.appendChild(t);
  aicycleMessages.appendChild(div);

    _setAILabel(provider);

/* ==============================================================
   8b. Voice input — Web Speech API
   Tap-and-hold the ring (or tap the 🎙 button) to listen once.
   ============================================================== */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let voiceActive = false;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = navigator.language || 'en-US';

  recognition.onresult = (evt) => {
    const transcript = evt.results[0]?.[0]?.transcript;
    if (transcript) {
      $('aicycle-input').value = transcript;
      aicycleChat.classList.add('visible');
      // Auto-submit
      $('aicycle-form').dispatchEvent(new Event('submit', { cancelable: true }));
    }
  };
  recognition.onend = () => {
    voiceActive = false;
    $('aicycle-float').classList.remove('listening');
  };
  recognition.onerror = (e) => {
    voiceActive = false;
    $('aicycle-float').classList.remove('listening');
    console.warn('[voice] error:', e.error);
  };
}

function toggleVoice() {
  if (!recognition) {
    appendAICycleMessage('ai', '(voice input not supported in this browser)', 'system', null);
    aicycleChat.classList.add('visible');
    return;
  }
  if (voiceActive) {
    try { recognition.stop(); } catch (_) {}
    return;
  }
  try {
    recognition.start();
    voiceActive = true;
    $('aicycle-float').classList.add('listening');
  } catch (e) {
    console.warn('[voice] start failed:', e);
  }
}

$('aicycle-mic').addEventListener('click', (e) => {
  e.preventDefault();
  toggleVoice();
});

/* ==============================================================
   8c. Video calling — 1:1 WebRTC over Supabase Realtime signaling
   ============================================================== */
const STUN_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
];

let inboxChannel = null;             // user's personal channel for incoming invites
let callChannel  = null;             // per-call signaling channel
let pc           = null;             // RTCPeerConnection
let localStream  = null;
let currentCall  = null;             // { id, peerId, peerName, role, startedAt }
let callRingTimeout = null;

function userChannelName(uid) { return `astranov:user:${uid}`; }
function callChannelName(callId) { return `astranov:call:${callId}`; }

async function subscribeInbox() {
  if (!sb || !session) return;
  if (inboxChannel) await inboxChannel.unsubscribe().catch(() => {});
  inboxChannel = sb.channel(userChannelName(session.user.id));
  inboxChannel
    .on('broadcast', { event: 'call-invite' }, ({ payload }) => onCallInvite(payload))
    .subscribe();
}

window.startCallTo = async (peerId, peerName) => {
  if (!sb || !session) return toast('Sign in to make calls');
  if (peerId === session.user.id) return;
  if (currentCall) return toast('Already on a call');

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (e) {
    toast('Mic/cam blocked: ' + e.message, 'err');
    return;
  }

  // Create call row
  const { data: row, error } = await sb.from('calls').insert({
    caller_id: session.user.id, callee_id: peerId,
  }).select().single();
  if (error) {
    localStream.getTracks().forEach(t => t.stop()); localStream = null;
    return toast(error.message, 'err');
  }

  currentCall = { id: row.id, peerId, peerName: peerName || 'unknown',
                   role: 'caller', startedAt: Date.now() };

  // Build peer connection
  await buildPeerConnection();

  // Create offer first so we can send it immediately and resend on callee-ready
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  // Subscribe to per-call channel for answer + ICE + callee-ready
  callChannel = sb.channel(callChannelName(row.id));
  callChannel
    .on('broadcast', { event: 'answer'      }, ({ payload }) => onAnswer(payload))
    .on('broadcast', { event: 'ice'         }, ({ payload }) => onIce(payload))
    .on('broadcast', { event: 'bye'         }, () => endCall(true))
    .on('broadcast', { event: 'callee-ready'}, () => {
      // Callee woke up via push — resend offer so they can complete the handshake
      callChannel.send({ type: 'broadcast', event: 'offer', payload: { offer } }).catch(() => {});
    })
    .subscribe();

  // Send invite to peer's Realtime inbox
  const inviteChannel = sb.channel(userChannelName(peerId));
  await inviteChannel.subscribe();
  await inviteChannel.send({
    type: 'broadcast', event: 'call-invite',
    payload: {
      callId: row.id,
      caller: { id: session.user.id, name: profile?.display_name || session.user.email || 'unknown' },
      offer,
    },
  });
  setTimeout(() => inviteChannel.unsubscribe().catch(() => {}), 1000);

  // Push notification so callee is woken even if app is closed
  pushNotify(peerId, {
    type:       'call',
    title:      (profile?.display_name || 'Someone') + ' is calling…',
    body:       'Tap Accept to join the call.',
    tag:        'call-' + row.id,
    callId:     row.id,
    callerId:   session.user.id,
    callerName: profile?.display_name || '',
    requireInteraction: true,
  });

  showActiveCallUI('ringing');

  // 30s ring timeout → mark missed and clean up
  callRingTimeout = setTimeout(() => {
    if (currentCall && currentCall.id === row.id) {
      sb.from('calls').update({ status: 'missed', ended_at: new Date().toISOString() })
        .eq('id', row.id).then(() => {});
      endCall(false);
    }
  }, 30_000);
};

function onCallInvite({ callId, caller, offer }) {
  if (currentCall) return; // already busy; let it ring out
  currentCall = { id: callId, peerId: caller.id, peerName: caller.name,
                   role: 'callee', startedAt: Date.now(), pendingOffer: offer };
  $('call-incoming-name').textContent = caller.name || 'unknown';
  $('call-incoming').classList.add('visible');
}

async function acceptIncomingCall() {
  if (!currentCall || currentCall.role !== 'callee') return;
  $('call-incoming').classList.remove('visible');

  // Push-wakeup path: callChannel already subscribed in handleNotificationNav.
  // If no offer yet, wait up to 8s for the caller to resend via 'offer' event.
  if (!currentCall.pendingOffer) {
    await new Promise(resolve => {
      const maxWait = setTimeout(resolve, 8000);
      const check = setInterval(() => {
        if (currentCall?.pendingOffer) { clearTimeout(maxWait); clearInterval(check); resolve(); }
      }, 200);
    });
  }
  if (!currentCall?.pendingOffer) {
    toast('Call offer not received — try again', 'err');
    declineIncomingCall();
    return;
  }

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (e) {
    toast('Mic/cam blocked: ' + e.message, 'err');
    declineIncomingCall();
    return;
  }

  await buildPeerConnection();
  await pc.setRemoteDescription(new RTCSessionDescription(currentCall.pendingOffer));

  // Subscribe to call channel (skip if already subscribed by push-wakeup path)
  if (!callChannel) {
    callChannel = sb.channel(callChannelName(currentCall.id));
    callChannel
      .on('broadcast', { event: 'ice' }, ({ payload }) => onIce(payload))
      .on('broadcast', { event: 'bye' }, () => endCall(true))
      .subscribe();
  }

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  // Send answer over call channel
  await callChannel.send({
    type: 'broadcast', event: 'answer',
    payload: { fromId: session.user.id, answer },
  });

  await sb.from('calls').update({
    status: 'accepted', accepted_at: new Date().toISOString()
  }).eq('id', currentCall.id);

  showActiveCallUI('connecting');
}

async function declineIncomingCall() {
  if (!currentCall) return;
  await sb.from('calls').update({
    status: 'declined', ended_at: new Date().toISOString()
  }).eq('id', currentCall.id).catch(() => {});
  // Notify caller via call channel
  const ch = sb.channel(callChannelName(currentCall.id));
  await ch.subscribe();
  await ch.send({ type: 'broadcast', event: 'bye', payload: { reason: 'declined' } });
  setTimeout(() => ch.unsubscribe().catch(() => {}), 500);
  cleanupCall();
}

async function buildPeerConnection() {
  pc = new RTCPeerConnection({ iceServers: STUN_SERVERS });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.ontrack = (evt) => {
    const remoteVideo = $('call-remote-video');
    if (remoteVideo.srcObject !== evt.streams[0]) {
      remoteVideo.srcObject = evt.streams[0];
    }
    setCallStatus('CONNECTED');
    sb.from('calls').update({ status: 'connected' }).eq('id', currentCall.id).catch(() => {});
  };
  pc.onicecandidate = (evt) => {
    if (evt.candidate && callChannel) {
      callChannel.send({
        type: 'broadcast', event: 'ice',
        payload: { fromId: session.user.id, candidate: evt.candidate },
      });
    }
  };
  pc.onconnectionstatechange = () => {
    if (pc?.connectionState === 'failed') {
      setCallStatus('FAILED');
      sb.from('calls').update({ status: 'failed', ended_at: new Date().toISOString() })
        .eq('id', currentCall.id).catch(() => {});
      setTimeout(() => endCall(false), 1500);
    }
  };
  $('call-local-video').srcObject = localStream;
}

async function onAnswer({ answer }) {
  if (!pc) return;
  await pc.setRemoteDescription(new RTCSessionDescription(answer));
  clearTimeout(callRingTimeout);
  setCallStatus('CONNECTING');
}

async function onIce({ candidate, fromId }) {
  if (!pc || fromId === session?.user.id) return; // ignore own
  try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); }
  catch (e) { console.warn('[call] addIceCandidate failed:', e); }
}

function showActiveCallUI(statusText) {
  $('call-active').classList.add('visible');
  setCallStatus(statusText || 'CONNECTING');
}
function setCallStatus(s) { $('call-status').textContent = s; }

async function endCall(remote) {
  if (!currentCall) return;
  const callId = currentCall.id;
  const duration = Math.round((Date.now() - currentCall.startedAt) / 1000);

  if (!remote && callChannel) {
    await callChannel.send({ type: 'broadcast', event: 'bye', payload: {} }).catch(() => {});
  }
  if (sb && currentCall.role) {
    await sb.from('calls').update({
      status: 'ended', ended_at: new Date().toISOString(), duration_seconds: duration,
    }).eq('id', callId).catch(() => {});
  }
  cleanupCall();
}

function cleanupCall() {
  clearTimeout(callRingTimeout);
  if (callChannel)  { callChannel.unsubscribe().catch(() => {});  callChannel  = null; }
  if (guestChannel) { guestChannel.unsubscribe().catch(() => {}); guestChannel = null; }
  if (pc) { try { pc.close(); } catch (_) {} pc = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  $('call-local-video').srcObject  = null;
  $('call-remote-video').srcObject = null;
  $('call-active').classList.remove('visible');
  $('call-incoming').classList.remove('visible');
  const inv = document.getElementById('gcall-invite'); if (inv) inv.remove();
  currentCall = null;
}

/* ==============================================================
   Guest video call — shareable room link, no Astranov account needed
   Host (Astranov user) starts the room; guest opens the link in any browser.
   Signaling via Supabase Realtime broadcast; media P2P via STUN.
   ============================================================== */
let guestChannel = null;

async function startGuestCall(label) {
  if (currentCall) return toast('Already in a call');
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (e) {
    toast('Camera / mic blocked: ' + e.message, 'err'); return;
  }
  localStream = stream;

  const roomId = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)).replace(/-/g,'').slice(0,12);
  const callLink = location.origin + '/?gcall=' + roomId;
  currentCall = { id: 'guest:' + roomId, peerId: null, peerName: label || 'guest',
                   role: 'host', startedAt: Date.now() };

  guestChannel = sb.channel('astranov:guest:' + roomId);
  guestChannel
    .on('broadcast', { event: 'guest-offer' }, async ({ payload }) => {
      if (pc) return;
      pc = new RTCPeerConnection({ iceServers: STUN_SERVERS });
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      pc.ontrack = evt => {
        const rv = $('call-remote-video');
        if (rv.srcObject !== evt.streams[0]) rv.srcObject = evt.streams[0];
        setCallStatus('CONNECTED');
      };
      pc.onicecandidate = evt => {
        if (evt.candidate) guestChannel.send({ type: 'broadcast', event: 'host-ice', payload: { candidate: evt.candidate } }).catch(() => {});
      };
      pc.onconnectionstatechange = () => {
        if (pc?.connectionState === 'failed') { setCallStatus('FAILED'); setTimeout(() => endCall(false), 1500); }
      };
      await pc.setRemoteDescription(new RTCSessionDescription(payload.offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      await guestChannel.send({ type: 'broadcast', event: 'host-answer', payload: { answer } });
      const inv = document.getElementById('gcall-invite'); if (inv) inv.style.opacity = '0.25';
    })
    .on('broadcast', { event: 'guest-ice' }, async ({ payload }) => {
      if (pc) await pc.addIceCandidate(new RTCIceCandidate(payload.candidate)).catch(() => {});
    })
    .on('broadcast', { event: 'bye' }, () => endCall(true))
    .subscribe();

  $('call-local-video').srcObject = localStream;
  showActiveCallUI('WAITING FOR GUEST');
  _showGuestInviteOverlay(callLink, label);
}

function _showGuestInviteOverlay(link, label) {
  const old = document.getElementById('gcall-invite'); if (old) old.remove();
  const el = document.createElement('div');
  el.id = 'gcall-invite';
  el.style.cssText = 'position:absolute;top:8px;left:8px;right:8px;background:rgba(5,11,25,0.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(0,212,255,0.35);border-radius:14px;padding:14px;z-index:10';
  el.innerHTML = '<div style="font-size:9px;letter-spacing:0.18em;color:#00d4ff;margin-bottom:8px;text-transform:uppercase">Invite '
    + escapeHtml((label || 'guest').toUpperCase()) + ' to call</div>'
    + '<div style="font-size:10px;color:#7eb4ff;word-break:break-all;background:rgba(0,0,0,0.4);padding:8px;border-radius:8px;margin-bottom:10px;line-height:1.5;font-family:monospace">'
    + escapeHtml(link) + '</div>'
    + '<div style="display:flex;gap:8px">'
    + '<div id="gcall-copy" style="flex:1;text-align:center;padding:8px;border-radius:9px;border:1px solid rgba(0,212,255,0.45);color:#00d4ff;font-size:10px;letter-spacing:0.14em;cursor:pointer;transition:background 0.15s">COPY</div>'
    + '<div id="gcall-share" style="flex:1;text-align:center;padding:8px;border-radius:9px;border:1px solid rgba(126,180,255,0.3);color:#7eb4ff;font-size:10px;letter-spacing:0.14em;cursor:pointer;transition:background 0.15s">SHARE</div>'
    + '</div>';
  $('call-active').appendChild(el);
  document.getElementById('gcall-copy').onclick = () => {
    navigator.clipboard?.writeText(link).then(() => toast('Call link copied', ''));
  };
  document.getElementById('gcall-share').onclick = () => {
    if (navigator.share) navigator.share({ title: 'Astranov Video Call', text: 'Join — no account needed', url: link });
    else navigator.clipboard?.writeText(link).then(() => toast('Call link copied', ''));
  };
}

async function joinGuestCall(roomId) {
  if (currentCall) return toast('Already in a call');
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (e) {
    toast('Camera / mic blocked: ' + e.message, 'err'); return;
  }
  localStream = stream;
  currentCall = { id: 'guest:' + roomId, peerId: null, peerName: 'host', role: 'guest', startedAt: Date.now() };

  $('call-local-video').srcObject = localStream;
  showActiveCallUI('JOINING');

  pc = new RTCPeerConnection({ iceServers: STUN_SERVERS });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.ontrack = evt => {
    const rv = $('call-remote-video');
    if (rv.srcObject !== evt.streams[0]) rv.srcObject = evt.streams[0];
    setCallStatus('CONNECTED');
  };
  pc.onconnectionstatechange = () => {
    if (pc?.connectionState === 'failed') { setCallStatus('FAILED'); setTimeout(() => endCall(false), 1500); }
  };

  guestChannel = sb.channel('astranov:guest:' + roomId);
  guestChannel
    .on('broadcast', { event: 'host-answer' }, async ({ payload }) => {
      if (pc) await pc.setRemoteDescription(new RTCSessionDescription(payload.answer));
    })
    .on('broadcast', { event: 'host-ice' }, async ({ payload }) => {
      if (pc) await pc.addIceCandidate(new RTCIceCandidate(payload.candidate)).catch(() => {});
    })
    .on('broadcast', { event: 'bye' }, () => endCall(true))
    .subscribe(async status => {
      if (status !== 'SUBSCRIBED') return;
      pc.onicecandidate = evt => {
        if (evt.candidate) guestChannel.send({ type: 'broadcast', event: 'guest-ice', payload: { candidate: evt.candidate } }).catch(() => {});
      };
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await guestChannel.send({ type: 'broadcast', event: 'guest-offer', payload: { offer } });
    });
}

function checkGuestCallURL() {
  const roomId = new URLSearchParams(location.search).get('gcall');
  if (roomId && sb) setTimeout(() => joinGuestCall(roomId), 800);
}

/* ==============================================================
   9. Helpers
   ============================================================== */
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function formatRelative(iso) {
  const d = new Date(iso); const s = (Date.now() - d.getTime()) / 1000;
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

/* ==============================================================
   10. GFX — Canvas2D pixel shaders for corner gadgets
   Each gadget runs its own per-pixel animated shader on a shared RAF loop.
   State flags: window._gfxSignedIn, window._gfxThinking
   ============================================================== */
const GFX = (function() {
  'use strict';
  const PI2 = Math.PI * 2;
  const shaders = [];
  let rafId = 0;
  window._gfxSignedIn = false;
  window._gfxThinking = false;

  function register(canvasId, fn) {
    const canvas = $(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d', { willReadFrequently: false });
    const W = canvas.width, H = canvas.height;
    const img = ctx.createImageData(W, H);
    shaders.push({ ctx, W, H, fn, img });
  }

  function frame(ts) {
    const t = ts * 0.001;
    for (let s = 0; s < shaders.length; s++) {
      const sh = shaders[s];
      sh.fn(sh.img.data, sh.W, sh.H, t);
      sh.ctx.putImageData(sh.img, 0, 0);
    }
    rafId = requestAnimationFrame(frame);
  }

  function start() {
    if (!rafId) rafId = requestAnimationFrame(frame);
  }

  // ── DISCOVER shader — interference waves from 3 orbiting sources ──
  function shaderDiscover(d, W, H, t) {
    const cx = W * 0.5, cy = H * 0.5, R = cx * 0.98;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const i4 = (y * W + x) << 2;
        const dx = x - cx, dy = y - cy;
        const dist2 = dx * dx + dy * dy;
        if (dist2 > R * R) { d[i4 + 3] = 0; continue; }
        const dist = Math.sqrt(dist2);
        const nr = dist / R;

        // 3 orbiting sources — interference pattern
        let wave = 0;
        const speed = t * 2.2;
        for (let s = 0; s < 3; s++) {
          const sa = (s / 3) * PI2 + t * (0.38 + s * 0.11);
          const ox = R * 0.52 * Math.cos(sa);
          const oy = R * 0.52 * Math.sin(sa);
          const sd = Math.sqrt((dx - ox) * (dx - ox) + (dy - oy) * (dy - oy));
          wave += Math.sin(sd * 0.32 - speed);
        }
        wave /= 3;

        // Radial standing wave from centre
        const radial = Math.sin(nr * 13 - t * 1.8) * (1.0 - nr * 0.6);
        let v = (wave * 0.55 + radial * 0.45) * 0.5 + 0.5;

        // Edge vignette
        const edge = Math.max(0, 1.0 - nr * nr * nr);
        const alpha = edge * v * 175;

        d[i4]     = Math.floor(v * 8);
        d[i4 + 1] = Math.floor(v * 165);
        d[i4 + 2] = Math.floor(255);
        d[i4 + 3] = Math.floor(alpha);
      }
    }
  }

  // ── ME shader — galaxy spiral, teal signed-in / violet signed-out ──
  function shaderMe(d, W, H, t) {
    const cx = W * 0.5, cy = H * 0.5, R = cx * 0.98;
    const signedIn = window._gfxSignedIn;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const i4 = (y * W + x) << 2;
        const dx = x - cx, dy = y - cy;
        const dist2 = dx * dx + dy * dy;
        if (dist2 > R * R) { d[i4 + 3] = 0; continue; }
        const dist = Math.sqrt(dist2);
        const nr = dist / R;
        const angle = Math.atan2(dy, dx);

        // Spiral vortex: angle twisted by radius and time
        const twist = angle + nr * 4.5 + t * 1.6;
        const spiral = Math.sin(twist * 5) * 0.5 + 0.5;

        // Pulsing distance rings
        const rings = Math.sin(nr * 15 - t * 2.2) * 0.5 + 0.5;

        // Bright central star
        const star = Math.max(0, 1.0 - nr * 4.5);

        let v = spiral * 0.55 + rings * 0.35 + star * 0.10;

        const edge = Math.max(0, 1.0 - nr * nr);
        const alpha = edge * v * 165;

        if (signedIn) {
          d[i4]     = Math.floor(v * 8);
          d[i4 + 1] = Math.floor(v * 230);
          d[i4 + 2] = Math.floor(v * 170);
        } else {
          d[i4]     = Math.floor(v * 90);
          d[i4 + 1] = Math.floor(v * 55);
          d[i4 + 2] = Math.floor(v * 255);
        }
        d[i4 + 3] = Math.floor(alpha);
      }
    }
  }

  // ── LOCATE shader — sweeping radar arm + concentric range rings ──
  function shaderLocate(d, W, H, t) {
    const cx = W * 0.5, cy = H * 0.5, R = cx * 0.98;
    const sweep = (t * 1.5) % PI2;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const i4 = (y * W + x) << 2;
        const dx = x - cx, dy = y - cy;
        const dist2 = dx * dx + dy * dy;
        if (dist2 > R * R) { d[i4 + 3] = 0; continue; }
        const dist = Math.sqrt(dist2);
        const nr = dist / R;
        const angle = Math.atan2(dy, dx);

        // Sweeping arm: trailing glow behind sweep angle
        let diff = angle - sweep;
        diff = ((diff % PI2) + PI2) % PI2;  // 0..2PI
        const arm = diff < 1.9 ? Math.pow(1.0 - diff / 1.9, 2.2) : 0;

        // Terrain grid: concentric rings + faint radial lines
        const rings = Math.pow(Math.max(0, Math.sin(nr * 10 + 0.3)), 4) * 0.55;
        const spokes = Math.pow(Math.max(0, Math.cos(angle * 8)), 10) * 0.12;

        let v = arm * 0.75 + rings * 0.20 + spokes * 0.05;
        v = Math.min(1.0, v);

        const edge = Math.max(0, 1.0 - nr * nr);
        const alpha = edge * v * 210;

        d[i4]     = Math.floor(v * 25);
        d[i4 + 1] = Math.floor(v * 240);
        d[i4 + 2] = Math.floor(v * 95);
        d[i4 + 3] = Math.floor(alpha);
      }
    }
  }

  // ── AI shader — neural field, blue at rest / amber while thinking ──
  function shaderAI(d, W, H, t) {
    const cx = W * 0.5, cy = H * 0.5, R = cx * 0.98;
    const thinking = window._gfxThinking;
    const speed = thinking ? t * 4.5 : t * 1.8;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const i4 = (y * W + x) << 2;
        const dx = x - cx, dy = y - cy;
        const dist2 = dx * dx + dy * dy;
        if (dist2 > R * R) { d[i4 + 3] = 0; continue; }
        const dist = Math.sqrt(dist2);
        const nr = dist / R;
        const angle = Math.atan2(dy, dx);

        // Undulating neural waves
        const w1 = Math.sin(nr * 9 - speed);
        const w2 = Math.sin(angle * 3 + t * (thinking ? 2.5 : 0.9));
        let v = (w1 * 0.55 + w2 * 0.45) * 0.5 + 0.5;

        // Bright edge ring (the "border" visual)
        const edgeRing = Math.exp(-Math.pow((nr - 0.88) * 7, 2)) * 0.9;
        v = Math.min(1.0, v * 0.6 + edgeRing);

        const edge = Math.max(0, 1.0 - nr * 1.08);
        const alpha = edge * v * 150;

        if (thinking) {
          d[i4]     = Math.floor(v * 255);
          d[i4 + 1] = Math.floor(v * 140);
          d[i4 + 2] = Math.floor(v * 20);
        } else {
          d[i4]     = Math.floor(v * 15);
          d[i4 + 1] = Math.floor(v * 125);
          d[i4 + 2] = Math.floor(v * 255);
        }
        d[i4 + 3] = Math.floor(alpha);
      }
    }
  }

  return { register, start, shaderDiscover, shaderMe, shaderLocate, shaderAI };
})();

/* ==============================================================
   11. Boot
   ============================================================== */
window.addEventListener('load', () => {
  bootCesium();          // async, fires-and-forgets; sets viewer when ready
  bootSupabase();        // safe to call before viewer ready
  bootServiceWorker();   // register SW for push + offline shell
  checkGuestCallURL();   // auto-join if opened via ?gcall= invite link

  // Boot canvas shaders
  try {
    GFX.register('gfx-discover', GFX.shaderDiscover);
    GFX.register('gfx-me',       GFX.shaderMe);
    GFX.register('gfx-locate',   GFX.shaderLocate);
    GFX.register('gfx-ai',       GFX.shaderAI);
    GFX.start();
  } catch (e) {
    console.warn('[GFX] shader boot failed:', e);
  }
});

// Pause Cesium render when tab hidden (battery)
document.addEventListener('visibilitychange', () => {
  if (viewer) viewer.useDefaultRenderLoop = !document.hidden;
});
</script>
