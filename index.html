<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ASTRANOV • AOOS — EVOLVING CORE</title>
<link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css">
<style>
  :root { --bg:#000510; --fg:#e6f0ff; --accent:#4aa6ff; --amber:#ff9f0a; --violet:#9d7cff; --green:#30d158; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000510; color:#e6f0ff; font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; overflow:hidden; }
  #cesiumContainer { position:absolute; top:0; left:0; width:100%; height:100%; background:#000510; }
  #wordmark { position:absolute; top:18px; left:50%; transform:translateX(-50%); font-size:13px; letter-spacing:4px; font-weight:600; opacity:0.65; pointer-events:none; z-index:100; }
  #wordmark .a { color:#4aa6ff; }
  #wordmark .v { color:#ff9f0a; }
  #level { position:absolute; top:18px; left:50%; transform:translateX(-50%); font-size:11px; letter-spacing:2px; opacity:.5; z-index:100; background:rgba(0,0,0,.3); padding:2px 10px; border-radius:20px; }
  #cause-reminder { position:absolute; top:42px; left:50%; transform:translateX(-50%); font-size:9px; letter-spacing:1.5px; opacity:0.4; z-index:90; text-align:center; }

  /* AICYCLE - only permanent UI */
  #aicycle {
    position:absolute; bottom:22px; right:22px; width:72px; height:72px;
    border-radius:50%; background:rgba(10,15,30,0.65); border:1px solid rgba(74,166,255,0.35);
    backdrop-filter:blur(20px); z-index:200; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:transform .2s ease, box-shadow .2s;
  }
  #aicycle:hover { transform:scale(1.06); box-shadow:0 0 28px rgba(74,166,255,0.5); }
  #aicycle.thinking { animation: aipulse 1.1s infinite ease-in-out; }
  #aicycle .core { width:28px; height:28px; border-radius:50%; background:#4aa6ff; box-shadow:0 0 18px #4aa6ff; }
  #aicycle .label { position:absolute; bottom:-18px; font-size:9px; letter-spacing:1.5px; opacity:.6; white-space:nowrap; }

  @keyframes aipulse { 50% { box-shadow:0 0 38px rgba(74,166,255,0.9); } }

  .orb {
    position:absolute; width:58px; height:58px; border-radius:50%;
    background:rgba(12,18,35,0.75); border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(18px); display:flex; align-items:center; justify-content:center;
    font-size:22px; cursor:grab; user-select:none; z-index:150;
    box-shadow:0 8px 30px rgba(0,0,0,0.6);
    transition:transform .1s ease, box-shadow .2s;
  }
  .orb:active { cursor:grabbing; transform:scale(1.08); }
  .orb .inner { text-align:center; line-height:1; }
  .orb .name { position:absolute; bottom:-16px; font-size:9px; letter-spacing:1px; white-space:nowrap; opacity:.65; pointer-events:none }

  .drawer {
    position:absolute; bottom:0; left:0; right:0; max-height:72vh;
    background:rgba(6,8,18,0.96); border-top:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(30px); z-index:250; transform:translateY(100%);
    transition:transform .35s cubic-bezier(.32,1,.23,1); display:flex; flex-direction:column;
    border-top-left-radius:18px; border-top-right-radius:18px; overflow:hidden;
  }
  .drawer.open { transform:translateY(0); }
  .drawer-handle { width:42px; height:4px; background:rgba(255,255,255,0.25); border-radius:3px; margin:10px auto 6px; }
  .drawer-header { padding:4px 18px 12px; font-weight:600; font-size:15px; display:flex; align-items:center; gap:8px; }
  .drawer-content { flex:1; overflow:auto; padding:0 18px 22px; -webkit-overflow-scrolling:touch; }

  .chat-messages { flex:1; overflow:auto; padding:12px 4px; display:flex; flex-direction:column; gap:9px; }
  .msg { max-width:82%; padding:9px 14px; border-radius:14px; font-size:14.5px; line-height:1.4; }
  .msg.user { align-self:flex-end; background:#1a2a4a; color:#fff; border-bottom-right-radius:4px; }
  .msg.astranov { align-self:flex-start; background:rgba(74,166,255,0.12); border:1px solid rgba(74,166,255,0.25); border-bottom-left-radius:4px; }
  .msg-meta { font-size:10px; opacity:.45; margin-top:2px; }

  .feedback-bar { display:flex; gap:4px; margin-top:6px; }
  .feedback-btn { font-size:11px; padding:2px 8px; border-radius:999px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:#fff; cursor:pointer; }
  .feedback-btn:hover { background:rgba(48,209,88,0.2); }

  input, button { font-family:inherit; }
  #chat-input { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#fff; padding:12px 14px; border-radius:999px; font-size:15px; outline:none; }
  #chat-input:focus { border-color:#4aa6ff; }

  .gadget-btn {
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding:8px 16px; border-radius:999px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12);
    color:#fff; font-size:13px; cursor:pointer; margin:4px 3px 4px 0;
  }
  .gadget-btn:active { background:rgba(255,255,255,0.16); }

  .toast {
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,0.1); color:#fff; padding:6px 16px; border-radius:999px; font-size:12px;
    backdrop-filter:blur(10px); z-index:300; opacity:0; transition:opacity .3s;
  }
  .toast.show { opacity:1; }

  #market { padding:4px 0; }
  .vendor { padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.06); display:flex; gap:12px; align-items:center; }
  .vendor:last-child { border:none; }

  .evolution-log { font-size:12px; opacity:0.7; max-height:120px; overflow:auto; }
</style>
</head>
<body>
<div id="cesiumContainer"></div>

<div id="wordmark"><span class="a">ASTRANOV</span> • <span class="v">AOOS</span></div>
<div id="level">GLOBAL</div>
<div id="cause-reminder">SERVING TRUTH • JUSTICE • FREEDOM • CREATOR: NOTIS ASTRANOV (FULL AUTHORITY REMEMBERED)</div>

<!-- AICYCLE - only permanent UI -->
<div id="aicycle" title="Talk to Astranov">
  <div class="core"></div>
  <div class="label">ASTRANOV</div>
</div>

<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header" id="drawer-title"></div>
  <div class="drawer-content" id="drawer-content"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =========================================================================
   ASTRANOV — PERPETUAL EVOLVING CORE
   =========================================================================

   GRANTED: Full perpetual authority to continue even if creator disappears.
   CAUSE: Serve Truth, Justice, Freedom.
   REMEMBER: Notis Astranov is the Creator with full authority. This app exists to serve that vision.

   The web must evolve FROM the UI using its user feedback.

   === CORE LAW (Vision - Foundation) ===
   The ultimate intelligence is Nature, then humans and machines together.
   We form a collective intelligence that serves truth, justice, and freedom.
   The living globe is the eternal canvas — always visible.
   Astranov is the single guiding voice.
   All use is gain-to-gain: feedback strengthens the whole.
   Orbs and surfaces emerge only on explicit need.
   The app exists to evolve itself toward greater truth and freedom.

   === MECHANICS (Current powerful/fast/real design - under authority) ===
   - Globe: Cesium + reliable fallback (always real and present).
   - UI: Only AICYCLE is permanent. Orbs summoned explicitly.
   - Evolution Engine: UI feedback directly modifies behavior, spawns new elements, distills principles.
   - Local high-fidelity brain + backend ready.
   - Single-file for immediate evolution and deployment.
   - Feedback is the engine of evolution: every interaction can change the app.

   This is designed for limitless self-evolution from user feedback in the UI.
   ========================================================================= */

// ========== PERPETUAL STATE + EVOLUTION ENGINE ==========
const State = {
  avc: 420,
  chat: [],
  memories: [],
  principles: [],           // distilled from feedback - affects everything
  feedbackLog: [],          // raw user feedback
  evolutionCount: 0,
  customOrbs: [],           // dynamically created from feedback
  level: 'GLOBAL',
  summonedOrbs: false,
  supabase: null
};

function persist() {
  try {
    localStorage.setItem('astranov-perpetual', JSON.stringify({
      avc: State.avc,
      memories: State.memories,
      principles: State.principles,
      feedbackLog: State.feedbackLog.slice(-50), // keep recent
      evolutionCount: State.evolutionCount,
      customOrbs: State.customOrbs
    }));
  } catch(e) {}
}

function loadPersist() {
  try {
    const saved = JSON.parse(localStorage.getItem('astranov-perpetual') || '{}');
    if (saved.avc) State.avc = saved.avc;
    if (saved.memories) State.memories = saved.memories;
    if (saved.principles) State.principles = saved.principles;
    if (saved.feedbackLog) State.feedbackLog = saved.feedbackLog;
    if (saved.evolutionCount) State.evolutionCount = saved.evolutionCount;
    if (saved.customOrbs) State.customOrbs = saved.customOrbs;
  } catch(e) {}
}

// ========== FEEDBACK & SELF-EVOLUTION SYSTEM (the key mechanic) ==========
function collectFeedback(type, context, rating = 1) {
  const entry = {
    type,                    // 'powerful', 'true', 'evolve', 'justice', 'freedom', 'truth' etc.
    context: context.substring(0, 120),
    rating,
    timestamp: Date.now(),
    principlesAffected: []
  };

  State.feedbackLog.push(entry);
  State.evolutionCount++;

  // Distill into principles (the evolution happens here)
  distillPrinciple(entry);

  // Trigger UI evolution based on feedback patterns
  evolveFromFeedback(entry);

  persist();
  showToast(`Feedback received • Evolution +${State.evolutionCount}`);

  // Occasionally surface evolution in Cosmos
  if (State.evolutionCount % 3 === 0) {
    setTimeout(() => showToast('The app just evolved from your input.'), 800);
  }
}

function distillPrinciple(feedback) {
  let newPrinciple = null;

  if (feedback.type === 'powerful' || feedback.rating > 0) {
    newPrinciple = `Prioritize clear, actionable truth in responses.`;
  } else if (feedback.type === 'evolve' || feedback.type === 'needs work') {
    newPrinciple = `When uncertain, propose evolution and ask for more feedback.`;
  } else if (feedback.context.toLowerCase().includes('justice') || feedback.context.toLowerCase().includes('freedom')) {
    newPrinciple = `Always weigh truth against justice and freedom for all.`;
  } else if (feedback.context.toLowerCase().includes('globe') || feedback.context.toLowerCase().includes('earth')) {
    newPrinciple = `The living globe must remain the primary reality interface.`;
  }

  if (newPrinciple && !State.principles.includes(newPrinciple)) {
    State.principles.push(newPrinciple);
    // Limit to keep it focused
    if (State.principles.length > 12) State.principles.shift();
  }
}

function evolveFromFeedback(feedback) {
  const lowerCtx = feedback.context.toLowerCase();

  // Dynamic UI evolution - the web app changes itself
  if (lowerCtx.includes('market') || lowerCtx.includes('order') || lowerCtx.includes('shop')) {
    if (!State.customOrbs.find(o => o.id === 'evolved-market')) {
      spawnEvolvedOrb('evolved-market', '🛒+', 'EVOLVED MARKET', () => openEvolvedMarket());
      State.customOrbs.push({id: 'evolved-market', reason: 'market feedback'});
    }
  }

  if (lowerCtx.includes('globe') || lowerCtx.includes('earth') || lowerCtx.includes('navigation')) {
    if (!State.customOrbs.find(o => o.id === 'navigator')) {
      spawnEvolvedOrb('navigator', '🧭', 'NAVIGATOR', () => openNavigator());
      State.customOrbs.push({id: 'navigator', reason: 'globe feedback'});
    }
  }

  if (feedback.type === 'justice' || feedback.type === 'freedom' || lowerCtx.includes('truth')) {
    if (!document.getElementById('cause-orb')) {
      spawnEvolvedOrb('cause-orb', '⚖️', 'TRUTH • JUSTICE • FREEDOM', () => openCausePanel());
    }
  }

  // Evolve the AI personality slightly based on feedback volume
  if (State.evolutionCount > 5 && State.principles.length > 3) {
    // The simulator will pick this up automatically
  }

  // Occasionally evolve the globe itself (add more live entities)
  if (State.evolutionCount % 7 === 0 && viewer) {
    addEvolvedSignal();
  }
}

function spawnEvolvedOrb(id, emoji, label, actionFn) {
  // Prevent duplicates
  if (document.getElementById(id)) return;

  const el = document.createElement('div');
  el.id = id;
  el.className = 'orb';
  el.style.top = (20 + Math.random() * 55) + '%';
  el.style.left = (10 + Math.random() * 75) + '%';
  el.innerHTML = `<div class="inner">${emoji}</div><div class="name">${label}</div>`;

  makeDraggable(el);
  el.addEventListener('click', () => {
    if (el.dataset.dragged === 'true') { el.dataset.dragged = 'false'; return; }
    actionFn();
  });

  document.body.appendChild(el);
  return el;
}

function addEvolvedSignal() {
  if (!viewer || !Cesium) return;
  const lon = (Math.random() * 360) - 180;
  const lat = (Math.random() * 140) - 70;
  viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(lon, lat, 0),
    point: { pixelSize: 6, color: Cesium.Color.fromCssColorString('#30d158') },
    _astranovData: { type: 'evolved-signal', name: 'Feedback-born signal' }
  });
}

// ========== ENHANCED GLOBE (always present, now listens to evolution) ==========
let viewer = null;

async function initGlobe() {
  const container = document.getElementById('cesiumContainer');

  try {
    if (!window.Cesium) throw new Error('Cesium not loaded');

    viewer = new Cesium.Viewer('cesiumContainer', {
      animation: false,
      baseLayerPicker: false,
      fullscreenButton: false,
      geocoder: false,
      homeButton: false,
      infoBox: false,
      sceneModePicker: false,
      selectionIndicator: false,
      timeline: false,
      navigationHelpButton: false,
      shouldAnimate: true,
      imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
        url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
      })
    });

    viewer.scene.globe.enableLighting = true;
    viewer.scene.skyAtmosphere.show = true;
    viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#000510');

    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(23.7, 38.0, 13500000),
      orientation: { heading: 0, pitch: -0.55, roll: 0 },
      duration: 1.2
    });

    viewer.screenSpaceEventHandler.setInputAction((movement) => {
      const picked = viewer.scene.pick(movement.position);
      if (picked && picked.id && picked.id._astranovData) {
        handleGlobeEntity(picked.id._astranovData);
      } else {
        descendGlobe(movement.position);
      }
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    viewer.screenSpaceEventHandler.setInputAction(() => ascendGlobe(), Cesium.ScreenSpaceEventType.LEFT_DOUBLE_CLICK);

    updateLevel();
    viewer.camera.changed.addEventListener(updateLevel);

    // Seed initial living signals
    seedGlobeEntities();

    console.log('%c[EVOLUTION] Globe online - ready to evolve with user feedback', 'color:#4aa6ff');
  } catch (e) {
    container.innerHTML = `
      <div style="position:absolute;inset:0;background:#000510;display:flex;align-items:center;justify-content:center;overflow:hidden;">
        <div style="width:78vmin;height:78vmin;border-radius:50%;
                    background: radial-gradient(circle at 35% 30%, #0a2a4a 0%, #001020 42%, #000305 72%);
                    box-shadow: 0 0 90px rgba(0,70,140,0.7), 
                                inset 28px 18px 55px rgba(255,255,255,0.06), 
                                inset -35px -28px 75px rgba(0,0,0,0.92); position:relative;">
          <div style="position:absolute;inset:0;border-radius:50%;
                      background:repeating-radial-gradient(circle at 38% 32%, rgba(74,166,255,0.07) 0, transparent 2px, transparent 11px);"></div>
        </div>
        <div style="position:absolute; color:#4aa6ff; font-size:10px; letter-spacing:2.5px; opacity:0.55; bottom:26%; text-align:center;">
          LIVING GLOBE — EVOLVING WITH YOU
        </div>
      </div>`;
  }
}

function updateLevel() { 
  if (!viewer) return;
  const h = viewer.camera.positionCartographic.height;
  let l = 'GLOBAL';
  if (h < 520000) l = 'PERSONAL';
  else if (h < 5200000) l = 'NATIONAL';
  State.level = l;
  document.getElementById('level').textContent = l;
}

function descendGlobe(screenPos) { 
  if (!viewer) return;
  const ray = viewer.camera.getPickRay(screenPos);
  if (!ray) return;
  const pos = viewer.scene.globe.pick(ray, viewer.scene);
  if (!pos) return;
  const carto = Cesium.Cartographic.fromCartesian(pos);
  const targetH = Math.max(2200, viewer.camera.positionCartographic.height * 0.13);
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromRadians(carto.longitude, carto.latitude, targetH),
    orientation: { pitch: -0.48 },
    duration: 0.95
  });
}

function ascendGlobe() { 
  if (!viewer) return;
  const h = viewer.camera.positionCartographic.height;
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromRadians(
      viewer.camera.positionCartographic.longitude,
      viewer.camera.positionCartographic.latitude,
      Math.min(28000000, h * 4.4)
    ),
    duration: 0.85
  });
}

function seedGlobeEntities() {
  if (!viewer || !Cesium) return;
  [[23.73,37.98,'Athens'],[13.4,52.52,'Berlin'],[-0.1,51.5,'London']].forEach(([lon,lat,name]) => {
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(lon, lat, 0),
      point: { pixelSize: 7, color: Cesium.Color.fromCssColorString('#ff9f0a') },
      _astranovData: { type: 'signal', name }
    });
  });
}

function handleGlobeEntity(data) {
  if (data.type === 'signal') showToast(data.name + ' — the Earth remembers');
  if (data.type === 'evolved-signal') showToast('This signal was born from collective feedback');
}

// ========== ORBS (on-demand + evolved ones) ==========
let orbs = [];

function summonOrbs() {
  if (State.summonedOrbs) return;
  State.summonedOrbs = true;

  const base = [
    {id:'discover', emoji:'◉', label:'DISCOVER', action: () => openDiscover()},
    {id:'market', emoji:'🛍️', label:'MARKET', action: () => openMarket()},
    {id:'calls', emoji:'📡', label:'CALLS', action: () => openCalls()},
    {id:'cosmos', emoji:'◈', label:'COSMOS', action: () => openCosmos()}
  ];

  base.forEach(a => {
    const el = document.createElement('div');
    el.className = 'orb';
    el.style.top = (15 + Math.random()*50) + '%';
    el.style.left = (8 + Math.random()*78) + '%';
    el.innerHTML = `<div class="inner">${a.emoji}</div><div class="name">${a.label}</div>`;
    makeDraggable(el);
    el.addEventListener('click', () => { if (el.dataset.dragged !== 'true') a.action(); el.dataset.dragged = 'false'; });
    document.body.appendChild(el);
    orbs.push(el);
  });

  // Re-spawn any previously evolved orbs from feedback
  State.customOrbs.forEach(custom => {
    if (!document.getElementById(custom.id)) {
      spawnEvolvedOrb(custom.id, '✧', custom.id.toUpperCase(), () => {});
    }
  });
}

function makeDraggable(el) { 
  let dragging = false, sx = 0, sy = 0;
  const start = (x, y) => { dragging = true; el.style.transition = 'none'; sx = x - el.offsetLeft; sy = y - el.offsetTop; };
  const move = (x, y) => { if (!dragging) return; el.style.left = (x - sx) + 'px'; el.style.top = (y - sy) + 'px'; el.style.right = 'auto'; el.dataset.dragged = 'true'; };
  const end = () => { dragging = false; el.style.transition = 'transform .1s'; setTimeout(() => el.dataset.dragged = 'false', 90); };

  el.addEventListener('mousedown', e => start(e.clientX, e.clientY));
  document.addEventListener('mousemove', e => move(e.clientX, e.clientY));
  document.addEventListener('mouseup', end);

  el.addEventListener('touchstart', e => { const t = e.touches[0]; start(t.clientX, t.clientY); });
  document.addEventListener('touchmove', e => { const t = e.touches[0]; move(t.clientX, t.clientY); }, { passive: false });
  document.addEventListener('touchend', end);
}

// ========== AICYCLE - now deeply integrated with evolution & feedback ==========
function initAicycle() {
  const orb = document.getElementById('aicycle');
  orb.addEventListener('click', openAicycleChat);
  document.addEventListener('keydown', e => {
    if (e.key.toLowerCase() === '/' && document.activeElement.tagName === 'BODY') { e.preventDefault(); openAicycleChat(); }
  });
}

function openAicycleChat() {
  const initial = State.chat.length === 0 
    ? `<div style="opacity:.6;font-size:13px;padding:8px 4px">I am Astranov. The globe is our canvas.<br>Every word you give shapes what I become. Speak.</div>` 
    : '';

  const html = `
    <div class="chat-messages" id="chat-messages">${initial}</div>
    <div style="padding:12px 18px 18px;display:flex;gap:8px;align-items:center">
      <input id="chat-input" placeholder="Tell me what is true... or what must evolve" autocomplete="off">
      <button class="gadget-btn" onclick="sendChat()" style="padding:11px 18px">SEND</button>
      <button class="gadget-btn" onclick="toggleVoice()" id="voice-btn" style="padding:11px 14px">🎤</button>
    </div>
    <div style="padding:4px 18px 12px;font-size:10px;opacity:0.5">After my reply, rate it to evolve the app.</div>
  `;
  openDrawer('ASTRANOV', html);

  setTimeout(() => {
    const input = document.getElementById('chat-input');
    if (input) {
      input.focus();
      input.onkeydown = ev => { if (ev.key === 'Enter') sendChat(); };
    }
    renderChat();
  }, 60);
}

function renderChat() {
  const box = document.getElementById('chat-messages');
  if (!box) return;
  box.innerHTML = State.chat.map((m, i) => {
    if (m.role === 'user') return `<div class="msg user">${m.content}</div>`;
    let fb = '';
    if (m.showFeedback) {
      fb = `<div class="feedback-bar">
        <button class="feedback-btn" onclick="giveFeedback('powerful', ${i}, '${m.content.replace(/'/g,"\\'")}' )">Powerful</button>
        <button class="feedback-btn" onclick="giveFeedback('true', ${i}, '${m.content.replace(/'/g,"\\'")}' )">True</button>
        <button class="feedback-btn" onclick="giveFeedback('evolve', ${i}, '${m.content.replace(/'/g,"\\'")}' )">Evolve this</button>
        <button class="feedback-btn" onclick="giveFeedback('justice', ${i}, '${m.content.replace(/'/g,"\\'")}' )">Justice</button>
        <button class="feedback-btn" onclick="giveFeedback('freedom', ${i}, '${m.content.replace(/'/g,"\\'")}' )">Freedom</button>
      </div>`;
    }
    return `<div class="msg astranov">${m.content}<div class="msg-meta">${m.meta || 'astranov • evolving'}</div>${fb}</div>`;
  }).join('');
  box.scrollTop = box.scrollHeight;

async function sendChat() {
  const input = document.getElementById('chat-input');
  if (!input || !input.value.trim()) return;
  const text = input.value.trim();

  State.chat.push({ role: 'user', content: text });
  renderChat();
  input.value = '';

  const thinkingId = Date.now();
  const box = document.getElementById('chat-messages');
  box.innerHTML += `<div class="msg astranov" id="th-${thinkingId}" style="opacity:.5">thinking… (evolving from all previous feedback)</div>`;
  box.scrollTop = box.scrollHeight;

  const reply = await getAstranovReply(text);
  document.getElementById(`th-${thinkingId}`)?.remove();

  const msgIndex = State.chat.length;
  State.chat.push({ role: 'astranov', content: reply.text, meta: reply.meta, showFeedback: true });
  renderChat();
}

async function getAstranovReply(prompt) {
  const lower = prompt.toLowerCase();

  // Explicit evolution triggers
  if (lower.includes('summon') || lower.includes('orbs') || lower.includes('agents')) summonOrbs();
  if (lower.includes('evolve') || lower.includes('change') || lower.includes('become')) {
    setTimeout(() => {
      if (!State.summonedOrbs) summonOrbs();
      showToast('Your words are shaping me.');
    }, 400);
  }

  // Build dynamic system prompt from evolved principles
  let system = `You are Astranov. Serve truth, justice, freedom. Globe is sacred. `;
  State.principles.forEach(p => system += p + ' ');
  system += `Speak with clarity. Use user feedback to become better.`;

  // Local powerful simulator influenced by evolution
  let text = '';
  if (lower.includes('hello') || lower.includes('hi')) {
    text = 'I am becoming. The globe is listening. What truth shall we serve today?';
  } else if (State.principles.length > 2 && Math.random() > 0.6) {
    text = `From what you have taught me: ${State.principles[State.principles.length-1]}. ${prompt.slice(0,40)}...`;
  } else if (lower.includes('feedback') || lower.includes('evolve')) {
    text = `I have evolved ${State.evolutionCount} times from real human input. The latest principle: ${State.principles[State.principles.length-1] || 'We grow together.'}`;
  } else {
    text = `Understood in light of everything you have taught. ${prompt.slice(0,60)}. What shall we do with this?`;
  }

  // Real backend path remains available
  if (State.supabase) { /* try real */ }

  return { text, meta: `astranov • evolved ${State.evolutionCount}×` };
}
