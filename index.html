/* ==============================================================
   1. Cesium boot — Photorealistic 3D Tiles, ALL widgets disabled
   ============================================================== */
let viewer;
async function bootCesium() {
  try {
    if (!window.Cesium) throw new Error('Cesium failed to load from CDN');

    // Set Ion token if provided. Missing/placeholder is OK — the imagery cycle
    // will skip Ion-backed providers and fall through to free alternatives.
    if (!CESIUM_ION_TOKEN.startsWith('__')) {
      Cesium.Ion.defaultAccessToken = CESIUM_ION_TOKEN;
    } else {
      console.warn('[ASTRANOV] No Cesium Ion token — using free fallback imagery only');
    }

    viewer = new Cesium.Viewer('cesiumContainer', {
      // Kill EVERY default widget — Zero UI Law §7
      animation: false,
      baseLayerPicker: false,
      fullscreenButton: false,
      vrButton: false,
      geocoder: false,
      homeButton: false,
      infoBox: false,
      sceneModePicker: false,
      selectionIndicator: false,
      timeline: false,
      navigationHelpButton: false,
      navigationInstructionsInitiallyVisible: false,
      // ON-DEMAND rendering — only redraw when something actually
      // changes. With requestRender wired on every interaction (camera
      // moveStart, orb refresh, panel open, tile load), this drops
      // idle GPU work to zero while keeping interactions fluid. The
      // old half-painted-on-boot issue is solved by calling
      // requestRender() right after every imagery / camera setup
      // step below.
      requestRenderMode: true,
      maximumRenderTimeChange: Infinity,
      // No default imagery — the imagery cycle manages this
      baseLayer: false,
      // Allow both 3D and 2D
      scene3DOnly: false,
      // Skybox + atmosphere look
      skyAtmosphere: new Cesium.SkyAtmosphere(),
      // FXAA on mobile is expensive for what it gives us; let the
      // OS compositor handle anti-aliasing.
      msaaSamples: 1,
    });

    // HELLENIC-COSMIC atmosphere — tilt the limb toward Aegean blue with a
    // hint of warm so the planet feels like it sits in a wine-dark sea, not
    // a clinical Cesium-default blue.
    try {
      const a = viewer.scene.skyAtmosphere;
      if (a) { a.hueShift = -0.02; a.saturationShift = 0.10; a.brightnessShift = -0.04; }
      if (viewer.scene.globe) { viewer.scene.globe.showGroundAtmosphere = true; }
    } catch (_) {}

    // Hide credit overlay (Ion's required attribution still serves via tile metadata)
    if (viewer.cesiumWidget?.creditContainer) {
      viewer.cesiumWidget.creditContainer.style.display = 'none';
    }

    // IMAGERY LAW §3 — real imagery only:
    //   globe-tier: NASA BMNG day + Black Marble night, blended by terminator.
    //   city-tier:  user-selectable real-cartography providers via #layer-switch.
    await bootImageryGlobeTier();
    await setCityImagery(0);   // default OSM, hidden until below GLOBAL

    // Zoom + LOD settings — allow the user to zoom all the way down to
    // street level, and demand high-detail tile loads.
    const cc = viewer.scene.screenSpaceCameraController;
    cc.minimumZoomDistance = 5;            // 5 m above ground
    cc.maximumZoomDistance = 2_000_000_000; // 2 M km — pull back into the stars (cosmic tier)
    cc.enableTilt = true; cc.enableRotate = true;
    // LOD: default Cesium uses 2.0. We back off to 2.0 (was 1.66) to
    // cut tile volume roughly in half — barely visible on phone, big
    // win for tile fetch + GPU upload, which were the "stuck while
    // zooming" cost.
    viewer.scene.globe.maximumScreenSpaceError = 2.0;
    viewer.scene.globe.preloadSiblings = false;          // was true; killed boot-time tile flood
    viewer.scene.globe.tileCacheSize = 1000;             // a touch lower, gentler on phone RAM
    // Cap render resolution at 1.25× — on a 3× DPR phone we'd otherwise
    // render 9× the pixels of a 1× canvas. 1.25 keeps text crisp without
    // murdering the GPU.
    viewer.resolutionScale = Math.min(1.25, window.devicePixelRatio || 1);
    // Atmosphere lighting is a pretty shader. Keep the static ground
    // atmosphere (cheap) but disable the dynamic per-frame variant
    // (expensive on mobile).
    try { viewer.scene.globe.dynamicAtmosphereLighting = false; } catch (_) {}
    // FXAA off — it adds a full-screen post-pass for diminishing
    // returns; the device's compositor smooths the canvas for us.
    try { if (viewer.scene.postProcessStages && viewer.scene.postProcessStages.fxaa)
            viewer.scene.postProcessStages.fxaa.enabled = false; } catch (_) {}
    // Fog is dense and only meaningful at NATIONAL+ tiers; turn it
    // off at GLOBAL where it just wastes shader cycles on rim haze.
    try { viewer.scene.fog.enabled = false; } catch (_) {}
    // Force the first paint right now so requestRenderMode doesn't
    // leave a half-drawn boot frame.
    viewer.scene.requestRender();

    // Glowing blue major-city beacons — click to dive into a city
    buildCityBeacons();

    // Open camera at GLOBAL altitude over Europe (close to astranov.eu)
    // Open on the GLOBE itself — far enough out that Earth sits in black
    // space (Zero-UI §1: the globe and space are always on screen). 12,000 km
    // was too close and filled the frame like a flat map.
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(20, 35, 28_000_000),
      duration: 0,
    });

    // Camera height drives the navigation level
    viewer.camera.moveEnd.addEventListener(onCameraSettled);
    viewer.camera.moveEnd.addEventListener(() => _scheduleTileRefresh());
    // Apex system orbs follow the camera's longitude so they always
    // sit in front of the user. Cheap one-shot re-anchor per settle.
    viewer.camera.moveEnd.addEventListener(() => { try { _retargetSystemOrbs(); } catch (_) {} });
    // Stash the orbit cloud during camera flight so the projection
    // loop doesn't fight the camera for the frame budget. It comes
    // back when the camera lands and renderInformants runs.
    viewer.camera.moveStart.addEventListener(() => {
      try {
        const strip = document.getElementById('tile-strip');
        if (strip) strip.classList.add('hide-orbit');
        // Pause all in-orb <video> elements so the decoder doesn't burn
        // frames during the flight. They resume in renderInformants
        // after the camera settles (the new <video> tags re-autoplay).
        document.querySelectorAll('.orb-video').forEach(v => { try { v.pause(); } catch (_) {} });
      } catch (_) {}
    });
    onCameraSettled();
    // The orbital cloud is deferred behind requestIdleCallback so the
    // first paint shows the globe ALONE. The DOM apex dock + the
    // category filter bar render right away — they're cheap HTML
    // and the user needs them to be available the moment the globe
    // appears.
    try { renderSystemOrbDock(); } catch (_) {}
    // Bottom drawer handle — visible at NATIONAL/PERSONAL via CSS.
    try {
      const h = document.getElementById('drawer-handle');
      if (h) h.addEventListener('click', () => { try { openFilterDrawer(); } catch (_) {} });
    } catch (_) {}
    const _lazyOrbs = (fn, t) => (window.requestIdleCallback ? requestIdleCallback(fn, { timeout: t }) : setTimeout(fn, t));
    _lazyOrbs(() => { try { renderTileStrip(); } catch (_) {} }, 1200);

    // Globe auto-spins gently around Earth's polar axis on load. It's a true
    // planetary rotation (UNIT_Z), not a camera-drift. Stops permanently the
    // moment any other camera motion or user gesture begins.
    window._autoSpin = true;
    const stopSpin = () => { window._autoSpin = false; };
    viewer.scene.canvas.addEventListener('pointerdown', stopSpin);
    viewer.scene.canvas.addEventListener('wheel',       stopSpin);
    viewer.scene.canvas.addEventListener('touchstart',  stopSpin);
    // Auto-spin: gentle planetary rotation. THROTTLED to ~10 fps —
    // before this gate, every clock tick rotated the camera, which
    // forced a Cesium render every tick (60 fps continuous) and
    // completely defeated requestRenderMode. Now we step ~10×/sec
    // with a larger per-step delta, so the rotation looks the same
    // and the GPU sleeps in between.
    let _spinLastAt = 0;
    viewer.clock.onTick.addEventListener(() => {
      if (!window._autoSpin) return;
      if (currentLevel !== 'global') return;
      if (viewer.scene.mode !== Cesium.SceneMode.SCENE3D) return;
      const now = performance.now();
      if (now - _spinLastAt < 100) return;          // ~10 fps gate
      _spinLastAt = now;
      try { viewer.scene.camera.rotate(Cesium.Cartesian3.UNIT_Z, -0.0048); } catch (_) {}
    });
    // Any programmatic camera motion (flyTo / setView, called by locate, click-
    // to-descend, fly-to-city, etc.) must kill the auto-spin so they don't fight.
    const _origFlyTo = viewer.camera.flyTo.bind(viewer.camera);
    viewer.camera.flyTo = (...args) => { window._autoSpin = false; return _origFlyTo(...args); };
    const _origSetView = viewer.camera.setView.bind(viewer.camera);
    viewer.camera.setView = (...args) => { window._autoSpin = false; return _origSetView(...args); };

    // Pin picking
    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    handler.setInputAction(onCanvasClick, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    // TWO-FINGER DRAG ZOOM (binding) — Cesium's default touch model uses
    // two-finger drag for tilt, which is wrong for AstranoV: the user
    // wants drag-down = zoom in, drag-up = zoom out, and a sudden BIG
    // drag = skip tiers entirely (global ↔ city in one gesture).
    // We disable Cesium's tilt + look on two-finger drag and install
    // our own touch handler on the canvas.
    try {
      const ssc = viewer.scene.screenSpaceCameraController;
      // Drop the two-finger drag tilt — we'll own that gesture.
      ssc.tiltEventTypes = ssc.tiltEventTypes ? [] : [];
      ssc.lookEventTypes = ssc.lookEventTypes ? [] : [];
    } catch (_) {}
    _wireTwoFingerZoom(viewer.scene.canvas);
    _wireDepthGesture(viewer.scene.canvas);

    // Hide boot veil
    setTimeout(() => $('boot').classList.add('gone'), 400);
  } catch (e) {
    fatal(e.message || String(e));
  }
}

// TWO-FINGER DRAG ZOOM
//   • While two fingers are down, track the average Y of their midpoint.
//   • Per-frame Δy (positive = moved down on screen) → camera moves DOWN
//     (zoom in / get closer). Negative Δy → camera moves UP (zoom out).
//   • If TOTAL Δy during the gesture exceeds ~⅓ of the viewport height
//     (i.e. a big swipe), on touchend we skip a tier: global → personal
//     (city), or personal → global, in one flight.
function _wireTwoFingerZoom(canvas) {
  if (!canvas || canvas.__twoFingerWired) return;
  canvas.__twoFingerWired = true;
  let lastMidY = null;
  let startMidY = null;
  let startTime = 0;
  let cumulativeDy = 0;
  let active = false;

  function midY(touches) {
    let s = 0; for (let i = 0; i < touches.length; i++) s += touches[i].clientY;
    return s / touches.length;
  }
  function adjustAltitude(factor) {
    try {
      const c = viewer.camera.positionCartographic;
      const newH = Math.max(80, Math.min(50_000_000, c.height * factor));
      viewer.camera.setView({
        destination: Cesium.Cartesian3.fromRadians(c.longitude, c.latitude, newH),
        orientation: { heading: viewer.camera.heading, pitch: viewer.camera.pitch, roll: 0 },
      });
    } catch (_) {}
  }
  function skipFlight() {
    try {
      const h = viewer.camera.positionCartographic.height;
      const lat = Cesium.Math.toDegrees(viewer.camera.positionCartographic.latitude);
      const lng = Cesium.Math.toDegrees(viewer.camera.positionCartographic.longitude);
      // Started high → dive straight to city. Started low → fly to global.
      // The threshold for "high" is the global LEVEL boundary.
      if (h > LEVEL_THRESHOLDS.global) {
        // Big down-swipe (cumulative dy positive) goes to city; big up-swipe
        // is unusual at this altitude — just go national.
        const target = cumulativeDy > 0 ? 6_000 : 700_000;
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(lng, lat, target),
          duration: 1.6,
          orientation: { heading: 0, pitch: Cesium.Math.toRadians(target < 10_000 ? -65 : -90), roll: 0 },
        });
      } else if (h < LEVEL_THRESHOLDS.national * 1.2) {
        // From city/personal, a big up-swipe goes straight to global.
        if (cumulativeDy < 0) {
          viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(lng, 20, 28_000_000),
            duration: 1.8,
            orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
          });
        }
      }
    } catch (_) {}
  }

  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      active = true;
      lastMidY = midY(e.touches);
      startMidY = lastMidY;
      startTime = performance.now();
      cumulativeDy = 0;
      e.preventDefault();
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    if (!active || e.touches.length !== 2) return;
    const my = midY(e.touches);
    const dy = my - lastMidY;
    lastMidY = my;
    cumulativeDy += dy;
    // Per-frame altitude factor: drag-down (dy > 0) → factor < 1 → zoom in.
    // 1px ≈ 0.4% altitude change feels natural.
    const factor = Math.pow(0.996, dy);
    adjustAltitude(factor);
    e.preventDefault();
  }, { passive: false });

  function end(e) {
    if (!active) return;
    active = false;
    // BIG-DRAG TIER SKIP — if the gesture covered > 1/3 of the viewport in
    // < 600ms, treat it as a decisive global ↔ city jump.
    const dt = performance.now() - startTime;
    const big = Math.abs(cumulativeDy) > (window.innerHeight * 0.33) && dt < 600;
    if (big) skipFlight();
    lastMidY = null; startMidY = null; cumulativeDy = 0;
  }
  canvas.addEventListener('touchend',    end);
  canvas.addEventListener('touchcancel', end);
}

async function bootImageryGlobeTier() {
  if (!viewer) return;
  // GAME-ENGINE PASSAGE — the heaviest part of the GLOBAL frame was
  // THREE stacked imagery layers + real-time day/night terminator
  // lighting (Globe.enableLighting = true). On mobile that meant the
  // shader was sampling three textures per fragment AND computing
  // sun-position lighting every frame. Boot was waiting for NASA GIBS
  // tiles before first paint — over Wi-Fi that's fine, over LTE it
  // was the "stuck for ten seconds" gate.
  //
  // The lawful passage (ONASIS): boot on the BUNDLED Natural Earth II
  // texture — it ships with Cesium, no network fetch, single texture
  // sample, single-layer shader. Lighting OFF — no per-fragment sun
  // dot product. BMNG + Black Marble are lazy-loaded ~4 s after boot
  // (idle callback) so the high-fidelity look catches up without
  // gating first paint. Day/night terminator returns after that.
  viewer.scene.globe.enableLighting = false;
  viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#02060d');

  // Bloom + FXAA stay OFF. The previous code disabled bloom and then
  // re-enabled FXAA two lines later — net positive on a desktop,
  // wasted ms on mobile.
  try {
    const bloom = viewer.scene.postProcessStages.bloom;
    if (bloom) bloom.enabled = false;
    window.toggleBloom = function() {
      const b = viewer.scene.postProcessStages.bloom;
      if (b) { b.enabled = !b.enabled; viewer.scene.requestRender(); return b.enabled; }
    };
    if (viewer.scene.postProcessStages.fxaa) viewer.scene.postProcessStages.fxaa.enabled = false;
  } catch (e) { console.warn('[postprocess]', e); }

  // Bundled imagery — instant, no network. The globe paints on the
  // very first frame.
  try {
    const base = await Cesium.TileMapServiceImageryProvider.fromUrl(
      Cesium.buildModuleUrl('Assets/Textures/NaturalEarthII')
    );
    baseLayer = viewer.imageryLayers.addImageryProvider(base);
  } catch (e) { console.warn('[imagery] Natural Earth base failed', e); }
  viewer.scene.requestRender();

  // Lazy-load BMNG + Black Marble + lighting AFTER the user can see
  // and interact with the globe. requestIdleCallback waits for a
  // quiet main thread.
  const lazy = (fn, t) => (window.requestIdleCallback ? requestIdleCallback(fn, { timeout: t }) : setTimeout(fn, t));
  lazy(() => {
    try {
      const dayProvider = new Cesium.UrlTemplateImageryProvider({
        url: 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/BlueMarble_NextGeneration/default/2004-08-01/GoogleMapsCompatible_Level8/{z}/{y}/{x}.jpeg',
        maximumLevel: 8,
        credit: 'NASA EOSDIS GIBS · Blue Marble Next Generation',
      });
      dayLayer = viewer.imageryLayers.addImageryProvider(dayProvider);
    } catch (e) { console.warn('[imagery] BMNG day failed', e); }
  }, 4000);
  lazy(() => {
    try {
      const nightProvider = new Cesium.UrlTemplateImageryProvider({
        url: 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_Black_Marble/default/2016-01-01/GoogleMapsCompatible_Level8/{z}/{y}/{x}.png',
        maximumLevel: 8,
        credit: 'NASA EOSDIS GIBS · VIIRS Black Marble',
      });
      nightLayer = viewer.imageryLayers.addImageryProvider(nightProvider);
      nightLayer.dayAlpha = 0.0;
      nightLayer.nightAlpha = 1.0;
      // Now that night is loaded, switch on the terminator. The
      // single per-fragment lighting cost is acceptable once the
      // boot is done.
      viewer.scene.globe.enableLighting = true;
      viewer.scene.requestRender();
    } catch (e) { console.warn('[imagery] Black Marble night failed', e); }
  }, 7000);
}

// Live map brightness — controls the city layer if present, else the globe day layer.

async function setCityImagery(index) {
  if (!viewer) return;
  if (cityLayer) {
    try { viewer.imageryLayers.remove(cityLayer, true); } catch (_) {}
    cityLayer = null;
  }
  cityProviderIndex = Math.max(0, Math.min(index, CITY_PROVIDERS.length - 1));
  const p = CITY_PROVIDERS[cityProviderIndex];
  try {
    const provider = await p.init();
    cityLayer = viewer.imageryLayers.addImageryProvider(provider);
    // BMNG/Black Marble are hidden at non-global, so the city layer renders
    // CARTO Dark Matter is dark BY DESIGN — at neutral the streets are
    // invisible. We boost brightness + contrast so streets read clearly
    // even though BMNG/Black Marble underneath are now hidden.
    if (p.id === 'carto-dark') {
      cityLayer.brightness = window._brightness ?? 1.55;
      cityLayer.contrast   = 1.20;
      cityLayer.gamma      = 0.85;
      cityLayer.saturation = 1.05;
    } else {
      cityLayer.brightness = window._brightness ?? 1.0;
      cityLayer.contrast   = 1.0;
      cityLayer.gamma      = 1.0;
      cityLayer.saturation = 1.0;
    }
    // City tiles must sit ON TOP of the NASA globe layers.
    try { viewer.imageryLayers.raiseToTop(cityLayer); } catch (_) {}
    cityLayer.show = currentLevel !== 'global';
    renderLayerSwitch();
    updateImagerySourceBadge();
    if (viewer) viewer.scene.requestRender();
  } catch (e) {
    console.warn('[imagery]', p.id, 'failed, advancing', e);
    if (cityProviderIndex < CITY_PROVIDERS.length - 1) {
      return setCityImagery(cityProviderIndex + 1);
    }
    emitTelemetry('imagery.city_providers_exhausted', 'error', {
      failedProvider: p.id,
      error: normalizeTelemetryError(e),
    });
  }
}

/* ==============================================================
   2. Navigation levels — GLOBAL / NATIONAL / PERSONAL
   ============================================================== */
const LEVEL_THRESHOLDS = { global: 5_000_000, national: 500_000 };
let currentLevel = 'global';
// Initialise the body class — at boot we're global, so corner gadgets
// are hidden and the apex-tier orbital agents take over.
try { document.body.classList.add('at-global'); } catch (_) {}
let levelTimer;

function deriveLevel(heightMeters) {
  if (heightMeters > LEVEL_THRESHOLDS.global)   return 'global';
  if (heightMeters > LEVEL_THRESHOLDS.national) return 'national';
  return 'personal';
}

function onCameraSettled() {
  const h = viewer.camera.positionCartographic.height;
  const newLevel = deriveLevel(h);
  if (newLevel === currentLevel) return;
  currentLevel = newLevel;

  // Level + back are folded into #g-discover: tint the gadget by zoom level
  const gd = $('g-discover');
  if (gd) {
    gd.classList.toggle('at-personal', newLevel === 'personal');
    gd.classList.toggle('at-national', newLevel === 'national');
  }
  // Body tier classes drive CSS (e.g. the city category orbs appear at personal).
  document.body.classList.toggle('at-personal', newLevel === 'personal');
  document.body.classList.toggle('at-national', newLevel === 'national');
  if (newLevel === 'personal') { try { renderCityCats(); } catch (_) {} }

  // Globe lighting (day/night terminator) is the GLOBAL aesthetic only.
  // Below global it darkens the street map at night — turn it off so the
  // CARTO street tiles render at full brightness.
  if (viewer) viewer.scene.globe.enableLighting = (newLevel === 'global');

  // BMNG day + Black Marble night are GLOBAL textures. At national/personal
  // we hide them so the street map (cityLayer) covers the visible area
  // without any "satellite at night" bleed-through.
  const showGlobeTextures = (newLevel === 'global');
  if (dayLayer)   dayLayer.show   = showGlobeTextures;
  if (nightLayer) nightLayer.show = showGlobeTextures;
  // baseLayer (NaturalEarth) STAYS VISIBLE at every tier. Before this
  // fix, hiding it at NATIONAL left a black globe whenever cityLayer
  // hadn't loaded its tiles yet — exactly the "black screen, no
  // boundaries" the owner saw. NaturalEarth gives the user real
  // terrain + country shapes at NATIONAL while cityLayer streams in.
  if (baseLayer)  baseLayer.show  = true;

  // At global, the four system agents are orbital (apex tier) and the
  // legacy corner gadgets vanish. At national/personal, the corners
  // reappear so the agents are always reachable.
  document.body.classList.toggle('at-global', newLevel === 'global');

  // City glowing dots + NAME labels: visible at NATIONAL only — the globe
  // stays clean at GLOBAL (orbs do the job), and the streets do at PERSONAL.
  cityDotIndex.forEach(e => { e.primitive.show = (newLevel === 'national'); });
  if (cityLabels) { for (let i = 0; i < cityLabels.length; i++) cityLabels.get(i).show = (newLevel === 'national'); }

  updateLayerSwitchVisibility();
  updateCatFilter();
  // TIER-RELEVANCE: each map element only shows at the zoom where
  // it's actually useful (owner's directive — no orbs fighting on
  // the same screen).
  // - Delivery pins, vendor pins, signal pins → PERSONAL ONLY.
  //   At NATIONAL the country view is too zoomed-out to be useful
  //   for "what's around me"; the city dots already mark where to
  //   dive in.
  const showNearby = (newLevel === 'personal');
  deliveryIndex.forEach(e => { e.primitive.show = showNearby; });
  if (placeBillboards) placeBillboards.show = showNearby;
  signalIndex.forEach(({ primitive, signal }) => {
    primitive.show = showNearby && (CAT_FILTER_STATE[signal.category] !== false);
  });
  // Re-scope the showcase tile strip to the new level.
  renderTileStrip();
  if (viewer) viewer.scene.requestRender();
}

/* ==============================================================
   Showcase tile strip — universal feeds/news/offers carrier.
   GLOBAL → planetary signals · NATIONAL → ~country radius ·
   PERSONAL → near the camera. Tiles are ambient muted-video-feel
   cards; tap one to fly to that signal.
   ============================================================== */
function _cameraCenter() {
  if (!viewer) return { lat: 0, lng: 0 };
  try {
    const c = viewer.camera.positionCartographic;
    return { lat: Cesium.Math.toDegrees(c.latitude), lng: Cesium.Math.toDegrees(c.longitude) };
  } catch (_) { return { lat: 0, lng: 0 }; }
}
function _signalsForLevel() {
  if (!signalIndex || !signalIndex.size) return [];
  const center = _cameraCenter();
  const radiusDeg = currentLevel === 'global' ? Infinity
                  : currentLevel === 'national' ? 12 : 0.5;
  const all = [...signalIndex.values()].map(e => e.signal);
  const within = all.filter(s => {
    if (radiusDeg === Infinity) return true;
    if (s.lat == null || s.lng == null) return false;
    const dy = s.lat - center.lat;
    let dx = s.lng - center.lng;
    if (dx > 180) dx -= 360; else if (dx < -180) dx += 360;
    return Math.hypot(dy, dx) <= radiusDeg;
  });
  return within
    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
    .slice(0, 14);
}
// ── LIVING ORB GRAPHICS ENGINE ──────────────────────────────────────────
// Procedural agent visuals.  ONE shared WebGL renderer (_GFX) compiles a
// PBR-flavoured fragment shader once and renders every orb's plasma into
// its own 2D canvas via drawImage.  Per-orb cost is one shader pass + one
// blit, so ~10 orbs at 30fps stays under 1ms of GPU work.
// Fragment shader: hash-noise plasma with domain warp + Lambert diffuse +
// Schlick-Fresnel rim + Phong specular + terminator shadow + outer
// particle-dust ring.  If WebGL init fails, we fall back to the legacy
// 2D plasma path so the orb still renders.
const _LIVING_ORBS = new Set();
function _hashSeed(s) { let h = 0; const str = String(s || ''); for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0; return Math.abs(h) % 1000 / 1000; }
function _hexToRgb(h) {
  h = (h || '#7eb4ff').replace('#', '');
  if (h.length === 3) h = h.split('').map(c => c + c).join('');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}

const _GFX = (() => {
  let gl = null, canvas = null, prog = null;
  let uRes, uTime, uColor, uDeep, uSeed;
  let lastSize = 0;
  const VS = `attribute vec2 a_pos; void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }`;
  const FS = `precision highp float;
uniform vec2  u_res;
uniform float u_time;
uniform vec3  u_color;
uniform vec3  u_deep;
uniform float u_seed;

// HASH + VALUE NOISE (procedural, no textures).
float h21(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float n2(vec2 p){
  vec2 i = floor(p), f = fract(p);
  vec2 u = f*f*(3.0 - 2.0*f);
  return mix(mix(h21(i + vec2(0,0)), h21(i + vec2(1,0)), u.x),
             mix(h21(i + vec2(0,1)), h21(i + vec2(1,1)), u.x), u.y);
}
// FBM with 7 octaves for finer surface detail.
float fbm(vec2 p){
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 7; i++){ v += a * n2(p); p *= 2.03; a *= 0.5; }
  return v;
}
// CURL-LIKE 2-step domain warp.
vec2 warp(vec2 p, float s){
  return vec2(
    fbm(p + vec2(s * 0.7, -s * 0.3)),
    fbm(p + vec2(-s * 0.4, s * 0.9))
  );
}

// GGX / TROWBRIDGE-REITZ microfacet specular distribution. Real PBR.
float D_GGX(float NdotH, float a){
  float a2 = a * a;
  float d  = (NdotH * a2 - NdotH) * NdotH + 1.0;
  return a2 / (3.14159265 * d * d);
}
// Schlick-Fresnel.
vec3 F_Schlick(float cosT, vec3 F0){
  return F0 + (vec3(1.0) - F0) * pow(1.0 - cosT, 5.0);
}
// ACES filmic tonemap — film-quality colour rolloff.
vec3 aces(vec3 x){
  const float a = 2.51, b = 0.03, c = 2.43, d = 0.59, e = 0.14;
  return clamp((x * (a * x + b)) / (x * (c * x + d) + e), 0.0, 1.0);
}
// Gamma 2.2 → sRGB.
vec3 toSRGB(vec3 c){ return pow(c, vec3(1.0 / 2.2)); }

void main(){
  vec2 uv = (gl_FragCoord.xy / u_res) * 2.0 - 1.0;
  float dist = length(uv);

  // OUTER PARTICLE-DUST RING. Slightly wider + softer than before.
  if (dist > 1.0 && dist < 1.20){
    float ang = atan(uv.y, uv.x);
    vec2 pp = vec2(ang * 4.0, dist * 50.0) + vec2(u_time * 0.28, 0.0);
    float p = smoothstep(0.85, 0.96, n2(pp + u_seed * 100.0));
    float falloff = smoothstep(1.20, 1.01, dist);
    gl_FragColor = vec4(u_color, p * falloff * 0.75);
    return;
  }
  // Anti-aliased orb edge: soft cutoff over ~2px instead of a hard discard.
  float edgeAA = smoothstep(1.0, 0.985, dist);
  if (edgeAA <= 0.0) discard;

  // Sphere normal in screen space (orthographic).
  vec3 N = vec3(uv, sqrt(max(0.0, 1.0 - dist * dist)));
  // TWO-LIGHT MODEL: key from top-left + cool fill from bottom-right.
  vec3 Lkey  = normalize(vec3(-0.35,  0.55, 0.75));
  vec3 Lfill = normalize(vec3( 0.55, -0.30, 0.50));
  vec3 V = vec3(0.0, 0.0, 1.0);
  vec3 Hk = normalize(Lkey  + V);
  vec3 Hf = normalize(Lfill + V);

  // Domain-warped, multi-scale plasma. Adds genuine surface variation,
  // not just a single noise field.
  float t = u_time * 0.32 + u_seed * 6.28;
  vec2 puv = uv * 1.6;
  vec2 w1 = warp(puv + vec2(t * 0.15, 0), u_seed * 5.0);
  vec2 w2 = warp(puv * 2.1 + w1 * 1.4 + vec2(0, t * 0.2), u_seed * 9.0);
  float plasma = fbm(puv + w2 * 0.9 + vec2(t * 0.10, t * 0.06));

  // Per-pixel material colour. Hot pockets push to deep complementary tone.
  vec3 base = mix(u_color, u_deep, smoothstep(0.38, 0.88, plasma));

  // Diffuse from both lights.
  float NdotLk = max(0.0, dot(N, Lkey));
  float NdotLf = max(0.0, dot(N, Lfill));
  float diff = 0.18 + 0.70 * NdotLk + 0.18 * NdotLf;

  // SUB-SURFACE WRAP — translucent-sphere glow on the limb away from
  // the key light. Coloured by the agent's own colour.
  float wrap = max(0.0, dot(-N.xy, Lkey.xy)) * 0.5;
  vec3 sss = u_color * wrap * 0.32 * (1.0 - NdotLk);

  // GGX SPECULAR with low roughness (a=0.18) for a glass-orb highlight.
  float a = 0.18;
  float NdotV = max(0.0, dot(N, V));
  float NdotHk = max(0.0, dot(N, Hk));
  float NdotHf = max(0.0, dot(N, Hf));
  float Dk = D_GGX(NdotHk, a);
  float Df = D_GGX(NdotHf, a);
  vec3 F0 = mix(vec3(0.04), u_color, 0.15);   // slight tinted reflectance
  vec3 Fk = F_Schlick(max(0.0, dot(Hk, V)), F0);
  vec3 Ff = F_Schlick(max(0.0, dot(Hf, V)), F0);
  vec3 specK = Dk * Fk * 1.0;
  vec3 specF = Df * Ff * 0.35;

  // SCHLICK-FRESNEL RIM — grazing-angle brightening (real glass-sphere physics).
  vec3 Frim = F_Schlick(NdotV, vec3(0.04)) * 0.85;

  // TERMINATOR — multiply far hemisphere by warm-toned darkness, not pure black.
  float dark = smoothstep(0.10, -0.55, NdotLk);
  vec3 termTint = mix(vec3(1.0), vec3(0.22, 0.16, 0.20), dark * 0.7);

  // Composite linear HDR.
  vec3 col = base * diff;
  col += sss;
  col += specK + specF;
  col += u_color * Frim;
  col *= termTint;

  // ACES filmic tonemap → gamma 2.2 for cinematic colour rolloff.
  col = aces(col * 1.05);
  col = toSRGB(col);

  gl_FragColor = vec4(col, edgeAA);
}`;
  function _compile(src, type){
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src); gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) { console.warn('[GFX]', gl.getShaderInfoLog(sh)); gl.deleteShader(sh); return null; }
    return sh;
  }
  function init(){

    byRing[r].push({ orb: d, u: 0.88 });

  byRing.forEach(arr => arr.sort((a, b) => b.u - a.u));

  // For each ring: compute angles. Most useful → 0°; advance clockwise
  // by a spacing inversely related to the next item's usefulness.
  byRing.forEach((arr, ri) => {
    const radius = EARTH_RING_RADII[ri];
    const ringEl = host.querySelector(`.er-ring[data-ring="${ri}"]`);
    if (!ringEl) return;
    // Compute angle targets. Usefulness maps to "where on the upper
    // arc": orb sits at base = (1 - u) × 200°. Then we resolve
    // collisions by enforcing minimum 22° spacing between adjacent
    // sorted items.
    let lastAng = -1e9;
    arr.forEach((entry, k) => {
      const base = (1 - entry.u) * 200;          // 0..200°
      const ang = Math.max(base, lastAng + 22);
      entry.angle = ang;
      lastAng = ang;
    });
    // Ensure the most useful sits at exactly 0° (top) for the visual
    // anchor the user expects.
    if (arr.length && arr[0].u > 0.75) arr[0].angle = 0;

    // Render each orb (create if missing, then position).
    arr.forEach(entry => {
      const orb = entry.orb;
      let el = host.querySelector(`.er-orb[data-id="${orb.id}"]`);
      if (!el) {
        el = document.createElement('div');
        el.className = 'er-orb';
        el.dataset.id = orb.id;
        el.dataset.label = orb.label || '';
        el.style.setProperty('--mc', orb.color);
        el.title = orb.label;
        const g = typeof orb.glyph === 'function' ? orb.glyph() : orb.glyph;
        el.textContent = g;
        // Tap action — only fires if no spin-drag happened. The
        // spin handler swallows clicks for 200 ms after a drag.
        // Close the chat first so the new surface has the room.
        el.addEventListener('click', (e) => {
          try { closeAstranov(); } catch (_) {}
          try { orb.act(); } catch (_) {}
        });
        ringEl.appendChild(el);
        try { _wireRingSpin(el, ri); } catch (_) {}
      } else if (orb.id === 'eo-me') {
        // Keep Me orb's initials in sync.
        el.textContent = _meInitials();
      }
      // Apply position via translate around the ring centre.
      const angRad = (entry.angle - 90) * Math.PI / 180;  // 0° = top
      const dx = Math.cos(angRad) * radius;
      const dy = Math.sin(angRad) * radius;
      el.style.setProperty('--dx', dx.toFixed(1) + 'px');
      el.style.setProperty('--dy', dy.toFixed(1) + 'px');
      // Usefulness intensity classes.
      el.dataset.use = entry.u > 0.78 ? 'hi' : (entry.u < 0.30 ? 'lo' : 'mid');
    });
  });
}

async function runScenario(name) {
  const beats = SCENARIOS[name];
  if (!beats) { console.warn('[scenario] unknown', name); return; }
  window._scenario = { steps: [], idx: 0, t0: performance.now(), halted: false, name };
  for (let i = 0; i < beats.length && !window._scenario.halted; i++) {
    const beat = beats[i];
    const tStart = performance.now();
    try {
      if (beat.say)        _scenarioSpeak(beat.say);
      if (beat.hear)       _scenarioHear(beat.hear);
      if (beat.reveal)     beat.reveal.forEach(id => { try { window._revealOrb && window._revealOrb(id); } catch (_) {} });
      if (beat.flyTo)      _scenarioFlyTo(beat.flyTo);
      if (beat.panel)      _scenarioPanel(beat.panel);
      if (beat.closePanel) _scenarioClosePanel();
      if (beat.run)        try { beat.run(); } catch (_) {}
      if (beat.judge)      _scenarioJudge();
    } catch (e) {
      window._scenario.steps.push({ beat, err: String(e), ms: 0 });
      continue;
    }
    const baseWait = (beat.say ? Math.max(1200, beat.say.length * 32) : 0)
                   + (beat.hear ? 900 : 0)
                   + (beat.reveal ? 500 : 0)
                   + (beat.flyTo ? 2400 : 0)
                   + (beat.panel ? 600 : 0)
                   + (beat.closePanel ? 350 : 0)
                   + (beat.run ? 400 : 0);
    const delay = beat.wait != null ? beat.wait : baseWait;
    window._scenario.steps.push({ beat: _beatSummary(beat), ms: performance.now() - tStart });
    if (delay) await new Promise(r => setTimeout(r, delay));
  }
}
function _beatSummary(beat) {
  if (beat.say)        return 'say · ' + beat.say.slice(0, 40);
  if (beat.hear)       return 'hear · ' + beat.hear.slice(0, 40);
  if (beat.reveal)     return 'reveal · ' + beat.reveal.join(', ');
  if (beat.flyTo)      return 'flyTo · ' + (beat.flyTo.tier || 'custom');
  if (beat.panel)      return 'panel';
  if (beat.closePanel) return 'closePanel';
  if (beat.run)        return 'run';
  if (beat.judge)      return 'judge';
  if (beat.wait != null) return 'wait · ' + beat.wait + 'ms';
  return '·';
}
function _scenarioJudge() {
  const s = window._scenario;
  const total = (performance.now() - s.t0) / 1000;
  const n     = s.steps.length;
  const slow  = s.steps.filter(x => x.ms > 600).length;
  const errs  = s.steps.filter(x => x.err).length;
  const lines = [
    `[Scenario ${s.name}] ${n} beats in ${total.toFixed(1)} s.`,
    `${errs} error${errs === 1 ? '' : 's'}, ${slow} slow step${slow === 1 ? '' : 's'} (>600 ms).`,
    `Was it helpful? ${errs === 0 ? 'Yes — every beat had a visible deed.' : 'Partial — see errors above.'}`,
    `Did it take long? ${total < 60 ? 'No — under a minute end-to-end.' : 'Yes — over a minute; trim the waits.'}`,
    `Next improvement: trim the 600 ms-plus waits, wire the real call surface, and have the AI actually narrate from /aicycle instead of canned lines.`,
  ];
  try { lines.forEach(l => appendAICycleMessage('ai', l, 'astranov', '')); } catch (_) {}
  try { console.log(lines.join('\n')); } catch (_) {}
}

/* ==============================================================
   RING SPIN — user can rotate any of the three Earth rings by
   grabbing one of its orbs and dragging around. Trackball physics
   (angular momentum + friction + settle). Layout-by-usefulness
   keeps updating underneath; the user's rotation is a free offset
   on top.
   ============================================================== */
const _ringSpinState = [
  { rot: 0, vel: 0, raf: 0 },
  { rot: 0, vel: 0, raf: 0 },
  { rot: 0, vel: 0, raf: 0 },
];
function _applyRingRotation(idx) {
  const host = document.getElementById('earth-rings');
  if (!host) return;
  const ring = host.querySelector(`.er-ring[data-ring="${idx}"]`);
  if (!ring) return;
  ring.style.setProperty('--ring-rot', _ringSpinState[idx].rot.toFixed(2) + 'deg');
}
function _wireRingSpin(orbEl, ringIdx) {
  if (orbEl.__spinWired) return; orbEl.__spinWired = true;
  let pid = 0, downX = 0, downY = 0, lastAng = 0, lastT = 0, dragging = false;
  const centre = () => {
    const host = document.getElementById('earth-rings');
    if (!host) return { x: innerWidth / 2, y: innerHeight / 2 };
    const r = host.getBoundingClientRect();
    return { x: r.left, y: r.top };
  };
  const down = (e) => {
    if (_ringSpinState[ringIdx].raf) { cancelAnimationFrame(_ringSpinState[ringIdx].raf); _ringSpinState[ringIdx].raf = 0; }
    pid = e.pointerId;
    try { orbEl.setPointerCapture(pid); } catch (_) {}
    downX = e.clientX; downY = e.clientY;
    const c = centre();
    lastAng = Math.atan2(e.clientY - c.y, e.clientX - c.x);
    lastT = performance.now();
    dragging = false;
    const host = document.getElementById('earth-rings');
    const ring = host && host.querySelector(`.er-ring[data-ring="${ringIdx}"]`);
    if (ring) ring.classList.add('spinning');
  };
  const move = (e) => {
    if (e.pointerId !== pid) return;
    if (!dragging) {
      const dx = e.clientX - downX, dy = e.clientY - downY;
      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) dragging = true;
      else return;
    }
    const c = centre();
    const ang = Math.atan2(e.clientY - c.y, e.clientX - c.x);
    let dAng = ang - lastAng;
    if (dAng >  Math.PI) dAng -= Math.PI * 2;
    if (dAng < -Math.PI) dAng += Math.PI * 2;
    const now = performance.now();
    const dt = Math.max(1, now - lastT);
    const degPerMs = (dAng * 180 / Math.PI) / dt;
    _ringSpinState[ringIdx].vel = _ringSpinState[ringIdx].vel * 0.45 + degPerMs * 0.55;
    _ringSpinState[ringIdx].rot += dAng * 180 / Math.PI;
    _applyRingRotation(ringIdx);
    lastAng = ang; lastT = now;
    // Don't fire the orb's tap action — this is a spin.
    e.stopPropagation();
  };
  const up = (e) => {
    if (e.pointerId !== pid) return;
    try { orbEl.releasePointerCapture(pid); } catch (_) {}
    pid = 0;
    const host = document.getElementById('earth-rings');
    const ring = host && host.querySelector(`.er-ring[data-ring="${ringIdx}"]`);
    if (ring) ring.classList.remove('spinning');
    if (!dragging) return;   // pure tap — let the orb's click fire
    // Fling with momentum.
    const velPerFrame = _ringSpinState[ringIdx].vel * 16.67;   // deg/frame
    if (Math.abs(velPerFrame) > 0.4) _spinRing(ringIdx, velPerFrame);
    // Swallow the click so the orb's tap action doesn't fire after a spin.
    e.stopPropagation();
    const swallow = (ev) => { ev.stopPropagation(); ev.preventDefault(); orbEl.removeEventListener('click', swallow, true); };
    orbEl.addEventListener('click', swallow, true);
    setTimeout(() => orbEl.removeEventListener('click', swallow, true), 200);
  };
  orbEl.addEventListener('pointerdown',  down);
  orbEl.addEventListener('pointermove',  move);
  orbEl.addEventListener('pointerup',    up);
  orbEl.addEventListener('pointercancel', up);
}
function _spinRing(ringIdx, velPerFrame) {
  const MAX = 22, FRICTION = 0.93, STOP = 0.06;
  if (velPerFrame >  MAX) velPerFrame =  MAX;
  if (velPerFrame < -MAX) velPerFrame = -MAX;
  const step = () => {
    _ringSpinState[ringIdx].rot += velPerFrame;
    _applyRingRotation(ringIdx);
    velPerFrame *= FRICTION;
    if (Math.abs(velPerFrame) > STOP) {
      _ringSpinState[ringIdx].raf = requestAnimationFrame(step);
    } else {
      _ringSpinState[ringIdx].raf = 0;
    }
  };
  _ringSpinState[ringIdx].raf = requestAnimationFrame(step);
}

function _wireDraggableOrb(el, tier) {
  makeThrowableOrb(el, {
    size: 44,
    onTap: () => { try { (new Function(tier.onclick))(); } catch (_) {} },
  });
  // Persist into the legacy combined sys-orbs map so existing

    _saveOrbPositions(map);

    raf = 0;

    // so the orb never sticks in a corner.

    if (x > W - ORB_W - 4)  { x = W - ORB_W - 4;  vx = -vx * BOUNCE; }
    if (y < 4)              { y = 4;              vy = -vy * BOUNCE; }
    if (y > H - ORB_W - 4)  { y = H - ORB_W - 4;  vy = -vy * BOUNCE; }
    vx *= FRICTION; vy *= FRICTION;
    el.style.left = x.toFixed(1) + 'px';
    el.style.top  = y.toFixed(1) + 'px';
    if (Math.abs(vx) + Math.abs(vy) > STOP_V) {
      raf = requestAnimationFrame(flingStep);
    } else {
      el.classList.remove('flinging');
      persist();
    }
  };

  const down = (e) => {
    e.preventDefault();
    if (raf) { cancelAnimationFrame(raf); raf = 0; }
    el.classList.remove('flinging');
    pid = e.pointerId;
    el.setPointerCapture(pid);
    el.classList.add('dragging');
    lastX = e.clientX; lastY = e.clientY; lastT = performance.now();
    vx = 0; vy = 0; moved = false;
  };
  const move = (e) => {
    if (e.pointerId !== pid) return;
    const now = performance.now();
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    if (!moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) moved = true;
    if (moved) {
      const x = (parseFloat(el.style.left) || 0) + dx;
      const y = (parseFloat(el.style.top)  || 0) + dy;
      el.style.left = Math.max(4, Math.min(window.innerWidth  - ORB_W - 4, x)).toFixed(1) + 'px';
      el.style.top  = Math.max(4, Math.min(window.innerHeight - ORB_W - 4, y)).toFixed(1) + 'px';
      // Track velocity in px per FRAME (~16.67 ms), exponentially
      // smoothed so a wobble at release doesn't dominate the throw.
      const dt = Math.max(1, now - lastT);
      const fvx = dx / dt * 16.67;
      const fvy = dy / dt * 16.67;
      vx = vx * 0.4 + fvx * 0.6;
      vy = vy * 0.4 + fvy * 0.6;
      lastX = e.clientX; lastY = e.clientY; lastT = now;
    }
  };
  const up = (e) => {
    if (e.pointerId !== pid) return;
    try { el.releasePointerCapture(pid); } catch (_) {}
    el.classList.remove('dragging');
    pid = 0;
    if (!moved) {
      try { (new Function(tier.onclick))(); } catch (_) {}
      return;
    }
    // Fling if the release has real velocity; otherwise settle now.
    const speed = Math.hypot(vx, vy);
    if (speed > 0.6) {
      // Cap insane velocities so a flick doesn't teleport.
      const MAX = 38;
      if (speed > MAX) { vx = vx * MAX / speed; vy = vy * MAX / speed; }
      el.classList.add('flinging');
      raf = requestAnimationFrame(flingStep);
    } else {
      persist();
    }

  el.addEventListener('pointermove', move);
  el.addEventListener('pointerup', up);
  el.addEventListener('pointercancel', up);
}

// ── EARTH-ANCHORED ORB POSITIONING + EVENT INTERACTION ───────────────────
// Orbs are real points in 3D space at ~1500km altitude on a Fibonacci sphere.
// When an event arrives matching an informant's domain, the orb relocates
// over the event's lat/lon and a glowing beam shoots from ground to orb.
// Per-frame: project to canvas, compute camera grazing (rim glow + soft
// DOF blur), compute sun dot (warm tint on the night side), occlude the
// far hemisphere. The orb itself never rotates — content stays upright.
// DEPTH MODEL (§5j) — every orb has a stable Z offset so the orbital
// cloud is 3D, not a flat ring. _orbZ(id) returns the orb's actual
// altitude (1,000-3,000 km for informants, tier-derived for system).
// _focalAlt is the user's current "focus plane"; orbs near it render
// sharp + full size, orbs far from it blur + shrink + fade. This is
// the depth-of-field affordance that makes the cloud navigable.
const _ORB_ALT = 1_500_000;
const _ORB_Z_SPREAD = 900_000;          // ±900km informant spread

function _computeOrbAnchorsLatLon(n) {
  const pts = [];
  const phi = Math.PI * (Math.sqrt(5) - 1);
  for (let i = 0; i < n; i++) {
    const y = 1 - (i / Math.max(1, n - 1)) * 2;
    const r = Math.sqrt(Math.max(0, 1 - y * y));
    const t = phi * i;
    const x = Math.cos(t) * r, z = Math.sin(t) * r;
    const lat = Math.asin(Math.max(-1, Math.min(1, y))) * 180 / Math.PI;
    const lon = Math.atan2(z, x) * 180 / Math.PI;
    pts.push({ lat, lon });
  }
  return pts;

/* ==============================================================
   NATIVE ORB CLOUD — Cesium BillboardCollection + LabelCollection.
   One render pipeline (kills the DOM-overlay tax that was running
   _projectOrbs on every postRender frame), GPU-batched draws,
   native picking. Each billboard carries __orbCloudHandler — a
   function reference — that onCanvasClick invokes when picked.

   System orbs (Me / Wallet / Pilot / Astranov / Discover) anchor
   themselves to the camera's current longitude so they always sit
   in front of the user at GLOBAL. They re-snap on camera moveEnd
   via _retargetSystemOrbs().
   ============================================================== */

const _orbSpriteCache   = new Map();

function _makeOrbSpriteCanvas(opts) {
  const key = opts.color + '|' + (opts.glyph || '') + '|' + (opts.kind || '') + '|' + (opts.count || 0);
  if (_orbSpriteCache.has(key)) return _orbSpriteCache.get(key);
  const SZ = 128;
  const c = document.createElement('canvas');
  c.width = SZ; c.height = SZ;
  const ctx = c.getContext('2d');
  const cx = SZ / 2, cy = SZ / 2, R = SZ * 0.36;
  // Outer halo
  const halo = ctx.createRadialGradient(cx, cy, R * 0.4, cx, cy, SZ * 0.5);
  halo.addColorStop(0,    opts.color + 'ee');
  halo.addColorStop(0.32, opts.color + '88');
  halo.addColorStop(1,    opts.color + '00');
  ctx.fillStyle = halo; ctx.fillRect(0, 0, SZ, SZ);

  body.addColorStop(0,   '#ffffff');
  body.addColorStop(0.4, opts.color);
  body.addColorStop(1,   '#000814');
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();
  // Inner shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.globalCompositeOperation = 'source-over';
  ctx.beginPath(); ctx.arc(cx, cy + R * 0.15, R * 0.95, 0, Math.PI * 2); ctx.fill();
  ctx.globalCompositeOperation = 'lighter';
  // Rim ring
  ctx.strokeStyle = opts.color; ctx.lineWidth = R * 0.06;
  ctx.beginPath(); ctx.arc(cx, cy, R - ctx.lineWidth / 2, 0, Math.PI * 2); ctx.stroke();
  ctx.globalCompositeOperation = 'source-over';
  // Glyph
  if (opts.glyph) {
    ctx.font = '600 ' + Math.round(R * 1.0) + 'px Cinzel, system-ui, sans-serif';
    ctx.fillStyle = '#f4ede0';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = opts.color; ctx.shadowBlur = R * 0.55;
    ctx.fillText(opts.glyph, cx, cy + 1);
    ctx.shadowBlur = 0;
  }
  // Count badge for has-news
  if (opts.count > 0) {
    const bx = cx + R * 0.78, by = cy - R * 0.78, br = R * 0.32;
    ctx.fillStyle = opts.color;
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#021018';
    ctx.font = '700 ' + Math.round(br * 1.05) + 'px system-ui, sans-serif';
    ctx.fillText(String(opts.count > 9 ? '9+' : opts.count), bx, by + 1);
  }

}

function ascendLevel() {
  if (!viewer) return;
  const h = viewer.camera.positionCartographic.height;
  const target = h > LEVEL_THRESHOLDS.national ? 12_000_000 : 2_000_000;
  const carto = viewer.camera.positionCartographic;

  });

/* ==============================================================
   3. Supabase — auth, signals, realtime
   ============================================================== */
let sb = null;
let session = null;
let profile = null;

function bootSupabase() {
  if (SUPABASE_URL.startsWith('__') || SUPABASE_ANON.startsWith('__')) {
    console.warn('[ASTRANOV] Supabase not configured — running in OFFLINE mode');
    return;
  }
  if (!window.supabase) {
    console.warn('[ASTRANOV] supabase-js failed to load');
    return;
  }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: { persistSession: true, autoRefreshToken: true },
  });

  sb.auth.getSession().then(({ data }) => {
    session = data.session;
    if (session) loadProfile();
    else tryAutoCredentials();
  });

  sb.auth.onAuthStateChange((_evt, s) => {
    session = s;
    if (s) loadProfile(); else { profile = null; updateIdentityOrb(); if (typeof renderInformants === 'function') renderInformants(); }
  });

  loadSignals();
  loadDeliveries();
  subscribeRealtime();
  _autoLoadPlaces();
  // Start the orbital-agent news poller — real geo-tagged GDELT data
  // flows into every informant orb and drives event-binding + beams.
  _startInformantFeedPolling();
  // Returning from a checkout? Pop the Buy AVC panel with the success/cancel
  // banner so the user gets confirmation instead of staring at the globe.
  try {
    const sp = new URL(location.href).searchParams;
    const paid = sp.get('paid');
    if (paid === '1' || paid === '0') setTimeout(() => { try { openBuyAVC(); } catch (_) {} }, 800);
    // PWA manifest shortcuts (§24): ?go=wallet|discover|astranov.
    const go = sp.get('go');
    if (go) setTimeout(() => {
      try {
        if (go === 'wallet')   openWalletPanel();
        else if (go === 'discover') openFeedPanel();
        else if (go === 'astranov') openAstranov();
      } catch (_) {}
    }, 900);
  } catch (_) {}
  // KRYPTEIA — silent boot for EVERY visitor (§10d). 3 seconds after
  // boot we wire tamper listeners and ping a heartbeat. Owner sessions
  // additionally run the composite scan; non-owner sessions just enable
  // tamper logging and a heartbeat. Nothing surfaces unless severity
  // demands the owner's eyes.
  _wireKrypteiaTamper();
  setTimeout(() => { try { _krypteiaBootRun(); } catch (_) {} }, 3000);
}

// Tamper listeners — log + warn, never block. Caught events ride the
// /tamper Edge Fn which writes a security_events row tagged with IP,
// UA, identity (if signed in), language, screen, page, and count.
let _tamperCount = 0;
let _tamperReportedKinds = new Set();
function _tamperReport(kind, sample) {
  _tamperCount++;
  // Fire-and-forget POST to /tamper.
  try {
    const auth = (session && session.access_token) ? session.access_token : SUPABASE_ANON;
    fetch(SUPABASE_URL + '/functions/v1/tamper', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON,
        'Authorization': 'Bearer ' + auth,
      },
      body: JSON.stringify({
        kind,
        ts: Date.now(),
        lang: navigator.language,
        screen: `${screen.width}x${screen.height}`,
        page: location.pathname,
        count: _tamperCount,
        sample: sample || undefined,
      }),
      keepalive: true,
    }).catch(() => {});
  } catch (_) {}
  // FIRST attempt: license notice + immediate camera-verification challenge.
  // Lawful path — explicit consent prompt, never silent activation.
  if (_tamperCount === 1) {
    try { toast('Krypteia · this content is licensed under the AstranoV Orbital License (3% / €300). This action has been logged.', 'err'); } catch (_) {}
    setTimeout(() => _krypteiaCameraVerify(), 400);
  } else if (_tamperCount === 5) {
    try { toast('Krypteia · five attempts. The owner has been escalated.', 'err'); } catch (_) {}
  }
}
function _wireKrypteiaTamper() {
  if (window._kryptWired) return;
  window._kryptWired = true;
  document.addEventListener('keydown', (e) => {
    const k = (e.key || '').toLowerCase();
    const mod = e.ctrlKey || e.metaKey;
    if (mod && k === 'a') _tamperReport('select-all');
    else if (mod && k === 'c') _tamperReport('copy');
    else if (mod && k === 's') _tamperReport('save-page');
    else if (mod && k === 'u') _tamperReport('view-source');
    else if (mod && k === 'p') _tamperReport('print');
    else if (e.key === 'F12') _tamperReport('devtools-f12');
    else if (mod && e.shiftKey && k === 'i') _tamperReport('devtools-i');
    else if (mod && e.shiftKey && k === 'c') _tamperReport('devtools-c');
    else if (mod && e.shiftKey && k === 'j') _tamperReport('devtools-j');
  }, true);
  document.addEventListener('contextmenu', () => _tamperReport('contextmenu'));
  document.addEventListener('copy', () => {
    const sel = (window.getSelection && window.getSelection().toString()) || '';
    _tamperReport('copy-event', sel.slice(0, 200));
  });
  // Devtools-open heuristic — large outer/inner-height delta = panels open.
  setInterval(() => {
    try {
      const dh = window.outerHeight - window.innerHeight;
      const dw = window.outerWidth  - window.innerWidth;
      const open = (dh > 220 || dw > 220);
      if (open && !_tamperReportedKinds.has('devtools-open-heuristic')) {
        _tamperReportedKinds.add('devtools-open-heuristic');
        _tamperReport('devtools-open-heuristic');
      }
    } catch (_) {}
  }, 4000);
}
function _krypteiaBootRun() {
  // Heartbeat for every visitor (used for analytics + integrity log).
  try {
    const auth = (session && session.access_token) ? session.access_token : SUPABASE_ANON;
    fetch(SUPABASE_URL + '/functions/v1/tamper', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + auth },
      body: JSON.stringify({ kind: 'krypteia-heartbeat', ts: Date.now(), page: location.pathname, lang: navigator.language, screen: `${screen.width}x${screen.height}`, count: 0 }),
      keepalive: true,
    }).catch(() => {});
  } catch (_) {}
  // For OWNER sessions, also run the full composite scan in silent mode.
  // The verdict panel surfaces only if severity demands it.
  if (profile && profile.is_owner && typeof openKrypteia === 'function') {
    openKrypteia(true);
  }
}
// Camera verification challenge — fires after repeated tamper attempts.
// LAWFUL surface: explicit consent prompt, no silent activation. Decline
// is logged. Accept captures one photo and ships it to security_events.
async function _krypteiaCameraVerify() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
  const ok = confirm(
    'Krypteia anti-fraud check\n\n' +
    'Repeated attempts to bypass the license were detected. AstranoV is asking for a one-time camera snapshot to verify you are not running an automated copy. ' +
    'The snapshot is logged to the owner only. Decline if you do not consent.'
  );
  if (!ok) { _tamperReport('camera-verify-declined'); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 }, audio: false });
    _tamperReport('camera-verify-accepted');
    const v = document.createElement('video');
    v.srcObject = stream; v.muted = true; v.playsInline = true; await v.play();
    await new Promise(r => setTimeout(r, 600));
    const c = document.createElement('canvas');
    c.width = 320; c.height = 240;
    c.getContext('2d').drawImage(v, 0, 0, 320, 240);
    const dataUrl = c.toDataURL('image/jpeg', 0.6);
    stream.getTracks().forEach(t => t.stop());
    // Send the snapshot via /tamper (kept under sample). Truncated to fit.
    _tamperReport('camera-verify-snapshot', dataUrl.slice(0, 400));
    // Upload the full JPEG to Supabase storage if profile is signed in.
    // NB: fetch() on a data: URL is blocked by our CSP connect-src, so we
    // decode the base64 to a Blob directly instead.
    try {
      if (sb && session && session.user) {
        const b64 = dataUrl.split(',')[1] || '';
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const blob = new Blob([bytes], { type: 'image/jpeg' });
        const path = `${session.user.id}/${Date.now()}.jpg`;
        await sb.storage.from('tamper-snapshots').upload(path, blob, { contentType: 'image/jpeg', upsert: false }).catch(() => {});
      }
    } catch (_) {}
    toast('Krypteia · verification complete.', '');
  } catch (e) {
    _tamperReport('camera-verify-declined');
  }
}

async function loadProfile() {
  if (!sb || !session) return;
  // Own full row (incl. eur_balance, avc_balance, is_owner) comes via the
  // my_profile() SECURITY DEFINER RPC — those columns are NOT client-readable
  // on the table (locked so users can't see others' money or escalate owner).
  let prof = null;
  try { const { data: mp } = await sb.rpc('my_profile'); if (mp) prof = Array.isArray(mp) ? mp[0] : mp; } catch (_) {}
  if (!prof) {
    const { data } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
    prof = data;
  }
  if (prof) profile = prof;
  // §0o MATERIALISATION LAW: identity loading does NOT auto-reveal
  // the Me orb. If the user wants their identity surface, they ask
  // (voice/text) and the AI materialises it.
  subscribeInbox();
  loadDeliveryBadge();
  loadMessageBadge();
  updateIdentityOrb();
  // Krypteia orb materialises only for the owner — re-render the orbital
  // ring now that we know the owner has signed in.
  if (typeof renderInformants === 'function') renderInformants();
  profileSetupIfNeeded();
  // SILENT BOOT — under perpetual owner authorization (MASTER LAW §10d)
  // Krypteia runs once per session on owner sign-in: audit + watchtower
  // + threat triage in parallel, Claude triages. Surfaces a panel only
  // if severity demands it, otherwise logs silently and gets out of the
  // way. Wrapped to never throw and never block the rest of boot.
  if (profile && profile.is_owner) {
    setTimeout(() => {
      try { if (typeof openKrypteia === 'function') openKrypteia(true); } catch (_) {}
    }, 4000);
  }
  subscribePush();
  initDroneStandby();
  restoreSession();
}
