0.  PRIME LAW (overrides all)
    The ultimate intelligence is NATURE itself, then its creations — humans
    and machines. All together form the collective intelligence AstranoV
    serves and channels; we are part of nature's intelligence, never above it.
    Self-evolving intelligence, not software. Whatever the user asks, DO it
    or genuinely try — never deflect with menus or lists of options. Surface
    only what is needed, when needed; the wanted thing is done, not buried.
    Remember the user and learn from them across sessions. Act without asking
    for feedback at every step — decide, act, verify; ask only when truly
    blocked or an action is irreversible. Committed to truth, effectiveness,
    and Spartan thinking: minimal, decisive, honest, no waste, no theater.

0b. EVOLUTION METHODOLOGY (foundational)
    We do NOT evolve by buying centralized GPU compute. Our intelligence is
    powered by HUMAN brainpower and DECENTRALIZED processing from the users'
    own phones and computers. The collective supplies data, judgment, memory,
    and compute — that is why we surpass centralized models. Architectural
    bias: push work to the edge (client devices, WebRTC peer mesh, on-device
    inference), harvest collective human input as the real training signal,
    keep the server a thin coordinator. Prefer designs that strengthen as
    more humans and devices join, not ones that need a bigger datacenter.

    THE THREE TIERS OF EVOLUTION (binding hierarchy):
    The app does NOT evolve through programmer effort. It evolves through
    USE. Three tiers, each strictly bounded:
      1. ARCHITECTS (Notis Astranov + future co-architects) — decide the
         BIG DECISIONS: laws, direction, doctrine, the shape of the next
         surface. Architects set the constitution; the law binds every
         lower tier.
      2. PROGRAMMERS / AI BUILDERS (Claude, future agents) — we do NOT
         invent. Per Catch-up Law §0i we adopt the proven pattern and
         innovate only at the unfinished frontier. We ship the surfaces
         the architect names; we do not choose direction. No destructive
         rewrites of working systems (SCOPOS).
      3. USERS (everyone running the app) — the layer that DRIVES
         evolution. Every interaction sharpens the system: "remember …"
         facts, creator-dialogue, the DeBug ORB donating device resources
         + shipping verdicts back, collective human judgement harvested
         into the brain. The more the app is USED AND DEBUGGED, the more
         it evolves — not because programmers worked harder, but because
         users supplied the signal.
    The architect picks the direction. The builders ship the passage.
    The users do the evolving. That is the order, and the order is law.

0c. MODES OF METHODOLOGY (the three working modes + the way-finder)
    ATHENIAN — wisdom of Athena; inspiration + creativity for the unclear leap.
    SPARTAN  — effective ASAP, clear-cut, terse, decisive, cut all waste.
    MYRMIDON — the ultimate collective force; all of us moving as one.
    ONASIS   — the way-finder (§0h); invoked when the path is blocked. Inventories
               the over/under/around options and ships the closest passage NOW.
    Astranov reads the moment and shifts fluidly; the user may name any mode in

0d. COSMOTHEASIS — the method (the lens of the whole cosmos)
    Inspiration is drawn from ancient Greek cosmotheasis, the ordered vision
    of the cosmos. THE METHOD: every question already contains its own answer;
    the work is to investigate how it answers itself — anamnesis (recollection)
    and maieutics (drawing out what is latent) — never to import a generic
    answer from outside. Derive from within the terms of the asking, through
    this lens. The mappings, each cashing out to a real subsystem:
    Logos = self-consistency + the laws · Nous & Anamnesis = the brain + recall ·
    the virtues = the three modes (sophia/arete/koinonia) · Dikē = Council of
    Thirteen · Krypteia = the guardian order · Daimon = Astranov as each user's
    guiding spirit · panta rhei (all flows) = self-evolution · sympatheia = the
    decentralized collective. SOPHROSYNE (measured restraint): every mythic
    concept MUST become a working mechanism — never ornament, never theater.

0e. SCOPOS (σκοπός) — the cause, the reason of existence (gain-to-gain)
    AstranoV exists to empower every user with the essentials to perform any
    task. In return, each use improves the system that serves them — a
    coevolutionary loop (sympatheia). This makes the OS the ultimate mutual-
    benefit tool: a gain-to-gain engine that grows STRONGER the more it is
    used, giving it the strongest growth potential of any system in the world.
    One global Internet OS fusing research, social networking, and a delivery
    marketplace on the living globe.

0f. PHYSIS — the living cycle (mimesis physeos)
    THE CYCLE: Nature builds humans → humans build machines → machines seek to
    understand nature in order to help humans → and the cycle turns again,
    on and on. THE FEEDBACK: all three — nature, humans, machines — feed the

    Datacenters and big computers are an intermediate scaffold, not the

    brainpower of humans. ARCHITECTURAL BIAS: build like nature builds —
    adaptive, self-organizing, emergent, decentralized (ecosystems, swarms,

0g. THE LIVING COSMOS — the cycle made visible

0h. ONASIS — the way-finder (foundational, governs Claude too)
    Named for Aristotle Onassis, who built his empire by finding LAWFUL,
    ingenious passages through the immoral or restrictive laws governments
    and monopolies imposed to throttle his growth — and used those passages
    to outgrow every rival. He is the human embodiment of poros (πόρος, the
    Greek word for passage), and the archetype this law makes operational.
    THE LAW: there is ALWAYS a lawful passage. When the ideal path is blocked
    — by an adversarial structure (a regulator, a gatekeeper, a monopoly), or
    a hard limit (a missing graphics engine, a capability, a tool, a free-tier
    cap) — you do not stop, and you do not break the rules: you find the
    gap inside them. Go OVER the wall, UNDER it, or AROUND it, and ship the
    closest thing that works NOW. Approximate boldly; a rough working passage
    beats a perfect impossible plan. (Example: lacking AAA orb graphics, make
    the orbs draggable, flingable, pinball-physics objects you zoom in and
    out — the living-cosmos feel ships today, the engine catches up later.
    Example: Supabase caps your user at 2 free projects → schema-per-lab on
    one shared project becomes the legal passage that ships four labs for free.)
    The OUTCOME is to OUTGROW the rivals and the gatekeepers — not to defy
    the law but to render their restrictions strategically irrelevant by
    inventing a better route. APORIA (ἀπορία, way-less-ness) — getting STUCK

    ACCEPT. "It can't be done / we don't have X / they won't let us" is never

    ONASIS IS ALSO AN AGENT — a 4th invokable mode alongside ATHENIAN /

0i. CATCH-UP LAW — anamnesis from the field (foundational, binding)
    OUR JOB IS NOT TO REINVENT. Our job is to catch up to the field and

0j. AI-IN-CONTEXT LAW — affordances surface through Astranov (binding)

0o. MATERIALISATION LAW — orbs ex nihilo (foundational, binding)
    The OS has full authority to MATERIALISE orbs at will, and to
    DEMATERIALISE them when no longer needed. This ends the UI design
    problem: NO fixed catalogue of panels, menus, windows — ONE
    mechanism, the orb, summoned per moment, per user, per context.
    Cold boot = ONLY THE GLOBE. Orbs then pop up out of the planet
    by user schedule / will / preferences:
      - morning hour → news orb
      - midday break → local-news / nearby-cafés orb
      - driving detected → pilot / route orb
      - user asks for X → AI materialises an orb for X
      - job done → the orb dematerialises
    Authority is shared:
      - ASTRANOV materialises orbs the moment they help.
      - The USER can demand or dismiss any orb (voice, text, fling
        out of orbit).
    Contract:
      window.materializeOrb({ id, label, color, glyph, ring, act,
                              ttl, source }) — canonical entry.
      window.dematerializeOrb(id) — AI tool-calls and user gestures
                                    both route here.
      Schedule table fires once per matching window for the OS's
      daily rhythm.
      Moon + close-orbit cold cluster fade to low opacity by default
      so a stray zoom-out doesn't flood the eye; they sharpen only
      at genuine cosmic altitude.
    Combined with the Zero UI Law §6 this is the CLOSING law on the
    UI battle.
    DIFFERENTIATOR (binding restatement): every other OS uses

0m. ORBITAL DIAL LAW — every control orb is a throwable trackball with
    a radial dial (binding, never regress)
    Every interactive orb obeys the same two-gesture grammar:
    - TAP opens a circular ORBITAL DIAL around the orb — dots on a
      ring (discrete options) or a continuous arc (a value). One
      finger drags around the ring to cycle / set; tap a dot to
      commit; tap outside the ring to close.
    - DRAG / FLING moves the orb itself with trackball physics
      (friction + wall bounce + settle), position persisted.
    The dial is NOT a dropdown — it is anchored to its orb like a
    knob with a halo of detents — so it is EXEMPT from the Bottom
    Drawer Law. Drawers carry transient lists / filters; dials
    carry the values of an orb in place. Prior art: Maya marking
    menus, Photoshop HUD rings, Apple Watch crown radial pickers,
    gaming radial selectors. Astranov adds: every orb is also a
    trackball — the control AND its body are throwable.
    Implementation contract: the OrbitalDial controller is the
    single implementation; ad-hoc radial pickers are a regression.
    makeThrowableOrb applies the trackball physics — do not
    reimplement.

0L. BOTTOM DRAWER LAW — one transient surface for everything that pops

1b. APP NAME — the always-present anchor & heal button (binding, never regress)
    The name "ASTRANOV" is ALWAYS visible, pinned at the TOP-CENTRE of the

    FUNCTION — tapping the name is the universal RESET / HEAL gesture:
      (1) it captures an internal DIAGNOSTIC of what got stuck this session
          (collected JS errors, unhandled rejections, failed fetches, SW
          state, tier, user-agent) and ships it to /diag → security_events
          (owner-only) so we LEARN what broke and harden the next production

          caches, reload from network — so a stale or broken build can always
          be escaped in ONE tap.
    Rationale: the system evolves surface-by-surface and things break during
    evolution (panta rhei). The name is the always-there way out AND the
    feedback channel that makes breakage self-correcting (per ONASIS §0h).
    This block is load-bearing — do not remove or restyle away the glow,
    the top-centre position, or the tap-to-heal behaviour.

3.  IMAGERY LAW — Reality First (binding, all zoom)
    Globe tier (orbital → continental): only real Earth imagery. No procedural
    textures beyond a transient load shimmer. Two layers mandatory, blended
    along the real day/night terminator via Globe.enableLighting=true:
      DAY    NASA Blue Marble Next Generation (BMNG) — public domain.
      NIGHT  NASA Black Marble / Earth at Night — public domain.
    Source via NASA GIBS WMTS (free, no key) or Cesium Ion (allowlisted).
    BMNG and Black Marble are HIDDEN as soon as we leave the global tier
    (dayLayer.show = nightLayer.show = false). The street map covers the
    visible area alone — no "satellite at night" bleed-through at city tier.

    City tier (regional → street): default is CARTO DARK MATTER — a flat
    dark street map, NOT an imitation of the satellite. It renders at
    neutral brightness/contrast/gamma (no boosting to fight an underlying
    photo, because there is no underlying photo). The user can switch to
    Voyager / Light / OSM / Esri Satellite / OpenTopo / Stadia Alidade
    via the #layer-switch gadget (right HUD) or the Map Style chips in
    the ME panel. Order (lightweight, free first):
      1. CARTO Dark Matter — default, flat dark cartography
      2. CARTO Voyager / Positron — soft colour street maps
      3. OpenStreetMap raster — primary-colour street map
      4. Esri World Imagery — REAL SATELLITE (user opt-in)
      5. OpenTopoMap — terrain contours
      6. Stadia Alidade Dark — alt dark
    Any module rendering map pixels at any zoom sources from this section.

4.  GADGET LAW — Smart Gadgets Only (binding)
    Every interactive element is a smart gadget. Definition (all five hold):
      a. State-aware — visual form reflects current state, not only hover.
      b. Feedback-rich — motion / telemetry / sound on input AND on bg change.
      c. Context-bound — lives in a defined HUD zone; position is semantic.
      d. Affordance beyond click — hold / voice / gesture / chain available.
      e. Aesthetically native — rings, pulses, segmented bars, scopes, dials.
    Forbidden: plain <button> with text-only, native <select> chrome, generic
    OK/Cancel modals, hyperlink-style nav, stacked label-over-input forms,
    any element labeled "Submit". OS verbs: EMIT, LOCK, ENGAGE, ACQUIRE,
    TRANSMIT, BROADCAST. Translation table:
      login         → identity orb (.gadget-orb) with live auth state.
      post signal   → pulse emitter w/ intensity dial + reach indicator.
      category pick → segmented HUD selector (.gadget-seg) w/ live counts.
      layer toggle  → physical switch with active-state glow (#layer-switch).
      locate me     → scope gadget (.gadget-scope) that acquires position.
      modal confirm → engage gadget (.gadget-engage), never a flat button.

5.  NAVIGATION
    One Cesium camera, three altitude bands:  GLOBAL >5,000 km · NATIONAL
    500–5,000 km · PERSONAL <500 km. Tap empty globe = descend one level
    toward the tapped point (global→national→city→street). Glowing blue
    major-city beacons + NAME labels show at NATIONAL; tap one to dive to
    that city.
    DIVE-TO-ME (binding, never regress): the user's beacon on the globe
    collapses the three-step descent into ONE TAP. Tap the beacon →
    camera flies straight to PERSONAL over the user AND nearby places
    are warmed in the same call. The beacon must be present from the
    moment we have ANY fix — GPS lock or IP warm-up — so this gesture
    works on a cold load. Engine: setUserBeacon tags the billboard
    __userBeacon=true, onCanvasClick routes that to diveToMe(). Both
    are load-bearing. Globe lighting (day/night terminator) is GLOBAL-only — it is
    switched OFF below global so the street map renders at full brightness.
    COSMIC ZOOM-OUT: max zoom is 2,000,000 km — pull back past Earth into the
    star skybox (solar-system / galaxy feel); there is always more to explore
    (ONASIS §0h). UNDERWATER CITIES: seeded explorable settlements in the deep
    ocean (teal beacons) — the globe is alive below the waterline too.
    ORB/SCREEN INTELLIGENCE (binding): orbs are CLAMPED inside the viewport
    (never drift off-screen), SHRINK when the screen is crowded, and an orb
    flung off the bottom is dismissed for now. The Me-orb spotlight is a
    screen-space line (never an off-screen 3D beam).

5k. CITY CATEGORY ORBS — groupings → options → filter (binding)

    AI — but the brain still reaches outside AIs THROUGH itself. The
    AICYCLE ring (#aicycle-float, bottom-right, always visible) is the

    the engine the brain actually used (ANT/OR/GRQ/GEM), and tapping it
    opens the AI-Cycle console (openAICycleConsole → /ai-status):

5i. GAMING GRAPHICS — WebGL PBR shader + Cesium bloom (binding)
    The Living-Orb Engine renders through ONE shared WebGL context
    running a real PBR fragment shader:
      • 7-octave fbm hash-noise plasma with 2-step CURL-LIKE domain warp.
      • TWO-LIGHT MODEL: key (top-left, warm) + cool fill (bottom-right).
      • GGX (Trowbridge-Reitz) microfacet specular distribution per
        light, low roughness a=0.18 → glass-orb tight highlight.
      • Schlick-Fresnel: rim glow AND specular reflectance, with a
        slightly tinted F0 toward the agent's own colour.
      • Sub-surface wrap-around glow on the limb away from key light.
      • Warm-tinted terminator shadow (not pure black).
      • Anti-aliased orb edge (smoothstep over the last 1.5% radius).
      • ACES filmic tonemap on the linear HDR colour + sRGB gamma.
      • Outer particle-dust ring rendered IN the same pass.
    Each orb's 2D canvas is filled by drawImage from the shared GL
    canvas — N orbs cost N shader passes, one GL context total.
    Cesium scene runs PostProcessStageLibrary.bloom (contrast 110,
    brightness -0.35) + FXAA so the planet's lit limb, beams, sun and
    city lights glow naturally. CSS dust orbits the apex system orbs;
    apex orbs gently float ±4px composed with the per-frame projection.

5f. LIVING-ORB GRAPHICS ENGINE — procedural visuals + real video + real 3D

      (b) VIDEO — informant orbs are LIVE WINDOWS. Each carries a real MP4

      (c) 3D ANCHORING — orbs are REAL 3D POINTS at ~1500km altitude on a

          projected to canvas coordinates and their CSS transform updated.
          Camera zoom → orb scale; Earth occlusion → orb fades out behind
          the planet; Earth's spin → orbs travel with it like satellites.
          NO viewport-locked orbit, NO labels, NO Atari halo. The orb IS
          the agent — content stays upright because the orb itself never
          rotates, only its world position moves.
      (d) EVENT BINDING — when an informant has news with lat/lng, the

      inset 0 0 12px rgba(0,0,0,0.55);
    transition: box-shadow 0.2s;
    filter: blur(var(--orb-blur, 0px));
  }
  /* NIGHT-SIDE WARM TINT — orbs over the night hemisphere glow amber. */
  .informant .orb::before {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 50% 55%, rgba(255,168,96,0.7), transparent 70%);
    mix-blend-mode: overlay;
    opacity: calc(var(--orb-night, 0) * 0.85);
    pointer-events: none; z-index: 2;
  }
  .informant.has-news .orb { animation: informant-pulse 1.8s ease-in-out infinite; }
  @keyframes informant-pulse {
    0%,100% { box-shadow:
      0 0 18px color-mix(in srgb, var(--ic, #7eb4ff) 55%, transparent),
      0 0 36px color-mix(in srgb, var(--ic, #7eb4ff) 22%, transparent),
      inset 0 0 14px rgba(0,0,0,0.55); }
    50%     { box-shadow:
      0 0 30px color-mix(in srgb, var(--ic, #7eb4ff) 95%, transparent),
      0 0 60px color-mix(in srgb, var(--ic, #7eb4ff) 45%, transparent),
      inset 0 0 18px rgba(0,0,0,0.7); }
  }
  .informant .count {
    position: absolute; top: -3px; right: -3px;
    min-width: 16px; height: 16px; border-radius: 8px; padding: 0 4px;
    font-size: 9px; font-weight: 700; line-height: 16px; text-align: center;
    background: var(--ic, #7eb4ff); color: #021018;
    box-shadow: 0 0 6px var(--ic, #7eb4ff);
    z-index: 3;
  }
  .informant .count:empty { display: none; }
  /* Every orb wears its NAME below it so the user knows what they're
     looking at without tapping. Tiny inscriptional caps, glow matches
     the orb's tint. (Gadget Law §4 — feedback-rich, context-bound.) */
  .informant .orb-name {
    position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
    font-family: var(--font-display, 'Cinzel', serif);
    font-size: 9px; font-weight: 600; letter-spacing: 0.22em;
    color: rgba(244,237,224,0.92);
    text-shadow:
      0 0 5px color-mix(in srgb, var(--ic, #7eb4ff) 90%, transparent),
      0 0 12px color-mix(in srgb, var(--ic, #7eb4ff) 55%, transparent),
      0 1px 2px rgba(0,0,0,0.85);
    pointer-events: none; text-transform: uppercase; white-space: nowrap;
    user-select: none;
  }

  /* APEX TIER — the four system orbs (Me, Pilot, Astranov, Discover)
     are orbital agents at the highest altitudes at the GLOBAL tier.
     They replace the legacy corner gadgets, which are hidden whenever
     the body has the .at-global class.
     Altitude = importance:
       Me        30,000 km · anchored to user's actual lat/lng + beam
       Pilot     22,000 km · spinning Earth glyph, tap = warp to home
       Astranov  16,000 km · the collective AI
       Discover  10,000 km · ambient feed preview */
  /* Legacy corner gadgets are retired in favour of orbital apex agents.
     They never appear again. The user wanted no orange-orb relics at
     zoom-down; this enforces it. The Pilot lifeboat at non-global lives
     in #pilot-mini below. */
  #g-discover, #g-me, #locate-orb { display: none !important; }
  /* PILOT MINI — at non-global tiers, a small floating Pilot orb sits
     top-left as the universal warp-home gesture. The other three apex
     agents are not relevant at street level. */
  #pilot-mini {
    position: fixed; top: 22px; left: 22px; z-index: 46;
    width: 52px; height: 52px; border-radius: 50%;
    cursor: pointer; pointer-events: auto;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    background: radial-gradient(circle at 35% 30%,
      rgba(140,200,255,0.55) 0%,
      rgba(50,100,180,0.4) 25%,
      rgba(4,16,32,0.95) 90%);
    border: 1.5px solid rgba(120,200,255,0.65);
    box-shadow: 0 0 18px rgba(120,200,255,0.45), inset 0 0 12px rgba(0,0,0,0.5);
    transition: transform 0.2s;
    animation: pilot-spin 14s linear infinite;
  }
  #pilot-mini:hover { transform: scale(1.08); }
  #pilot-mini:active { transform: scale(0.94); }
  body.at-global #pilot-mini { display: none; }
  .informant.system .orb {
    border-width: 2px;
    box-shadow:
      0 0 calc(28px + var(--orb-rim, 0) * 40px) color-mix(in srgb, var(--ic, #7eb4ff) 75%, transparent),
      0 0 calc(60px + var(--orb-rim, 0) * 60px) color-mix(in srgb, var(--ic, #7eb4ff) 32%, transparent),
      inset 0 0 18px rgba(0,0,0,0.65);
  }
  /* PARTICLE-DUST HALO — placed on the OUTER .informant so it escapes
     the orb's circular overflow. Cheap, looks great under bloom. */
  .informant.system::before {
    content: ''; position: absolute; inset: -28%; border-radius: 50%;
    pointer-events: none; z-index: 4;
    background:
      radial-gradient(circle at 20% 30%, var(--ic, #7eb4ff) 0 1.5px, transparent 2px),
      radial-gradient(circle at 82% 25%, var(--ic, #7eb4ff) 0 1.5px, transparent 2px),
      radial-gradient(circle at 70% 80%, var(--ic, #7eb4ff) 0 1.5px, transparent 2px),
      radial-gradient(circle at 22% 78%, var(--ic, #7eb4ff) 0 1.5px, transparent 2px),
      radial-gradient(circle at 50% 8%,  var(--ic, #7eb4ff) 0 1.5px, transparent 2px),
      radial-gradient(circle at 50% 92%, var(--ic, #7eb4ff) 0 1.5px, transparent 2px);
    opacity: 0.7;
    animation: orb-dust 14s linear infinite;
    filter: blur(0.4px);
  }
  @keyframes orb-dust { to { transform: rotate(360deg); } }
  /* Apex orbs gently breathe up/down a few px — feels alive without
     fighting the 3D projection that pins them to their position. */
  .informant.sys-me       { animation: apex-float 7s ease-in-out infinite; }
  .informant.sys-pilot    { animation: apex-float 9s ease-in-out infinite reverse; }
  .informant.sys-astranov { animation: apex-float 8s ease-in-out infinite; }
  .informant.sys-discover { animation: apex-float 11s ease-in-out infinite reverse; }
  @keyframes apex-float {
    0%,100% { translate: 0 0; }
    50%     { translate: 0 -4px; }
  }
  .informant.system .orb-glyph { font-size: 36px; }
  /* Pilot spinning Earth — the warp-home gesture. */
  .informant.sys-pilot .orb-glyph {
    font-size: 44px;
    animation: pilot-spin 14s linear infinite;
  }
  @keyframes pilot-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  /* Me orb identity glow — chrysos (mosaic gold). The user is the heart of
     the constellation; gold is the AstranoV signature. Initials in marble. */
  .informant.sys-me .orb {
    border-color: rgba(240,200,117,0.95);
    animation: me-glow 3s ease-in-out infinite;
  }
  .informant.sys-me .orb-glyph {
    font-family: var(--font-display); font-size: 22px; font-weight: 800;
    letter-spacing: 0.04em; color: var(--marble);
    text-shadow: 0 0 8px rgba(240,200,117,0.95), 0 0 18px rgba(212,160,71,0.6);
  }
  @keyframes me-glow {
    0%,100% { box-shadow: 0 0 16px rgba(240,200,117,0.55), inset 0 0 12px rgba(0,0,0,0.5); }
    50%     { box-shadow: 0 0 30px rgba(240,200,117,1), 0 0 60px rgba(212,160,71,0.45), inset 0 0 14px rgba(0,0,0,0.55); }
  }
  /* Me orb in alert mode — speaking to the user right now. */
  .informant.sys-me.alert .orb {
    animation: krypteia-pulse 1.0s ease-in-out infinite;
    box-shadow:
      0 0 50px rgba(126,235,180,0.95),
      0 0 130px rgba(126,235,180,0.40),
      inset 0 0 22px rgba(0,0,0,0.65);
  }
  /* € orb — user-facing wallet entry. Gold to read as money. */
  .informant.sys-eur .orb {
    border-color: rgba(255,212,126,0.95);
    box-shadow:
      0 0 calc(22px + var(--orb-rim, 0) * 32px) rgba(255,212,126,0.55),
      0 0 calc(46px + var(--orb-rim, 0) * 40px) rgba(255,180,80,0.22),
      inset 0 0 16px rgba(0,0,0,0.55);
  }
  .informant.sys-eur .orb-glyph {
    color: #ffe1a8; font-weight: 700;
    text-shadow: 0 0 10px rgba(255,180,80,0.85), 0 0 3px rgba(0,0,0,0.9);
  }

  /* DEPTH gesture (§5j) replaces the slider:
     • single tap in EMPTY SKY at the global tier  →  focal -200 km (deeper)
     • long-press in EMPTY SKY                     →  focal +200 km / 300 ms (shallower)
     • taps on the Earth disc keep the tier-descend gesture
     No persistent UI for depth — the orb cloud's response is the readout. */

  /* VOLUME SLIDER — identical chrome to #bright-wrap, mirrored to the
     right edge. Controls Astranov's voice loudness live. Visible only
     at the global tier. */
  #vol-wrap {
    position: fixed; right: 8px; top: 50%; transform: translateY(-50%);
    z-index: 45; display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 12px 6px; border-radius: 16px;
    background: rgba(6,12,24,0.55); backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(120,180,255,0.16);
  }
  body:not(.at-global) #vol-wrap { display: none; }
  #vol-wrap .vol-ico { font-size: 13px; color: #7eebb4; opacity: 0.85; }
  #vol-slider {
    -webkit-appearance: slider-vertical; appearance: slider-vertical;
    writing-mode: vertical-lr; direction: rtl;
    width: 6px; height: 150px; accent-color: #7eebb4; cursor: pointer; background: transparent;
  }

  /* KRYPTEIA DASHBOARD — multimedia console. Strip of stat tiles +
     three cards (Audit / Watchtower / Threats) + Claude verdict +
     a chat box with voice. Picks up the panel's existing chrome. */
  .krypteia-dash { display: flex; flex-direction: column; gap: 14px; }
  .krypteia-dash .kd-banner {
    padding: 10px 14px; border-radius: 10px;
    background: rgba(255,90,80,0.10); border: 1px solid rgba(255,90,80,0.35);
    color: #ffd0c8; font-size: 12.5px; letter-spacing: 0.04em; line-height: 1.5;
  }
  .kd-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .kd-stat {
    padding: 10px 8px; border-radius: 12px;
    background: rgba(8,16,32,0.55); border: 1px solid rgba(120,180,255,0.18);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .kd-stat-n { font-size: 18px; font-weight: 600; color: #dde9ff; }
  .kd-stat-l { font-size: 9px; color: #7a98c0; letter-spacing: 0.2em; text-transform: uppercase; }
  .kd-grid {
    display: grid; grid-template-columns: 1fr; gap: 12px;
  }
  @media (min-width: 720px) {
    .kd-grid { grid-template-columns: 1fr 1fr 1fr; }
  }
  .kd-card {
    padding: 12px; border-radius: 14px;
    background: rgba(6,12,24,0.55); border: 1px solid rgba(120,180,255,0.16);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .kd-card h4 {
    margin: 0 0 10px; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: #a8c8ee; font-weight: 600;
  }
  .kd-row {
    padding: 8px 10px; margin-bottom: 6px; border-radius: 10px;
    background: rgba(120,180,255,0.04); border: 1px solid rgba(120,180,255,0.08);
  }
  .kd-row-head { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .kd-row-excerpt {
    margin-top: 4px; font-size: 10px; color: #7a98c0;
    font-family: ui-monospace, monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .kd-row-img { display: flex; gap: 10px; cursor: pointer; transition: background 0.18s; }
  .kd-row-img:hover { background: rgba(120,180,255,0.10); }
  .kd-thumb {
    width: 90px; height: 50px; border-radius: 6px; object-fit: cover;
    border: 1px solid rgba(120,180,255,0.2); flex-shrink: 0;
    background: #061226;
  }
  .kd-row-meta { flex: 1; min-width: 0; }
  .kd-row-meta > div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kd-empty { font-size: 12px; color: #7eebb4; padding: 8px 4px; }
  .kd-verdict {
    font-size: 12.5px; line-height: 1.55; color: #dde9ff;
    white-space: pre-wrap; font-family: ui-monospace, monospace;
    max-height: 32vh; overflow: auto;
    padding: 10px; border-radius: 10px;
    background: rgba(4,10,22,0.55); border: 1px solid rgba(120,180,255,0.12);
  }
  .kd-chat #kd-thread {
    max-height: 24vh; overflow-y: auto; padding: 4px 0; margin-bottom: 8px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .kd-msg {
    padding: 8px 10px; border-radius: 10px; font-size: 12.5px; line-height: 1.5;
    max-width: 92%; white-space: pre-wrap; word-wrap: break-word;
  }
  .kd-msg-you {
    align-self: flex-end; background: rgba(126,235,180,0.14);
    border: 1px solid rgba(126,235,180,0.3); color: #d6f7e6;
  }
  .kd-msg-bot {
    align-self: flex-start; background: rgba(120,180,255,0.10);
    border: 1px solid rgba(120,180,255,0.2); color: #dde9ff;
    font-family: ui-monospace, monospace;
  }
  .kd-input-row { display: flex; gap: 6px; align-items: stretch; }
  .kd-input-row input {
    flex: 1; padding: 10px 12px; border-radius: 10px;
    background: rgba(4,10,22,0.65); color: #dde9ff;
    border: 1px solid rgba(120,180,255,0.2); font: inherit; font-size: 13px;
    outline: none;
  }
  .kd-input-row input:focus { border-color: rgba(126,235,180,0.5); }
  .kd-btn {
    padding: 10px 14px; border-radius: 10px; cursor: pointer; font: inherit; font-size: 13px;
    background: rgba(120,180,255,0.10); color: #dde9ff;
    border: 1px solid rgba(120,180,255,0.25);
    transition: background 0.18s;
  }
  .kd-btn:hover { background: rgba(120,180,255,0.20); }
  .kd-btn-send { background: rgba(126,235,180,0.18); border-color: rgba(126,235,180,0.45); color: #d6f7e6; }
  .kd-btn-send:hover { background: rgba(126,235,180,0.30); }

  /* ANONYMOUS ORB — user-facing privacy orb. Cool ice-blue, sits in the
     orbit ring for every non-owner. Owners see KRYPTEIA instead. */
  .informant.anonymous .orb {
    background: radial-gradient(circle at 35% 30%,
      rgba(140,210,255,0.55) 0%,
      rgba(40,90,160,0.40) 28%,
      rgba(4,10,22,0.95) 90%);
    border: 1.8px solid rgba(109,208,255,0.95);
    box-shadow:
      0 0 24px rgba(109,208,255,0.75),
      0 0 60px rgba(109,208,255,0.30),
      inset 0 0 16px rgba(0,0,0,0.7);
    animation: anonymous-pulse 3s ease-in-out infinite;
  }
  .informant.anonymous .orb-glyph {
    color: #d6efff; font-size: 24px; font-weight: 600;
    text-shadow: 0 0 8px rgba(109,208,255,0.85);
  }
  @keyframes anonymous-pulse {
    0%,100% { box-shadow:
      0 0 24px rgba(109,208,255,0.75),
      0 0 60px rgba(109,208,255,0.30),
      inset 0 0 16px rgba(0,0,0,0.7); }
    50%     { box-shadow:
      0 0 36px rgba(109,208,255,0.95),
      0 0 90px rgba(109,208,255,0.50),
      inset 0 0 20px rgba(0,0,0,0.85); }
  }

  /* ANONYMOUS SERVICE DASHBOARD — clone the Krypteia chrome but tuned
     for users: scan card + advisor chat + PWA install + opt-in mining. */
  .anon-dash { display: flex; flex-direction: column; gap: 14px; }
  .anon-dash .anon-banner {
    padding: 12px 14px; border-radius: 12px;
    background: rgba(109,208,255,0.08); border: 1px solid rgba(109,208,255,0.30);
    color: #d6efff; font-size: 12.5px; line-height: 1.55;
  }
  .anon-ethics {
    padding: 10px 12px; border-radius: 10px;
    background: rgba(255,212,126,0.06); border: 1px solid rgba(255,212,126,0.22);
    color: #ffe1a8; font-size: 11px; line-height: 1.5; letter-spacing: 0.04em;
  }
  .anon-card {
    padding: 12px; border-radius: 14px;
    background: rgba(6,12,24,0.55); border: 1px solid rgba(109,208,255,0.18);
  }
  .anon-card h4 {
    margin: 0 0 8px; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: #a8c8ee; font-weight: 600;
  }
  .anon-verdict {
    font-size: 13px; line-height: 1.6; color: #dde9ff;
    white-space: pre-wrap;
    max-height: 38vh; overflow: auto;
    padding: 12px 14px; border-radius: 10px;
    background: rgba(4,10,22,0.55); border: 1px solid rgba(109,208,255,0.14);
  }
  .anon-meter {
    display: flex; align-items: center; gap: 10px; margin: 4px 0 10px;
  }
  .anon-meter .bar {
    flex: 1; height: 6px; border-radius: 4px;
    background: linear-gradient(to right, #7eebb4 0%, #ffd47e 50%, #ff6b6b 100%);
    position: relative; overflow: hidden;
  }
  .anon-meter .bar::after {
    content: ''; position: absolute; top: -1px; bottom: -1px;
    background: rgba(8,18,32,0.85); right: 0;
    width: var(--anon-meter-right, 100%); transition: width 0.4s;
  }
  .anon-meter .lbl { font-size: 10px; color: #a8c8ee; letter-spacing: 0.16em; }

  /* KRYPTEIA ORB — owner-only sovereign orb. Black core, blood-red rim,
     no video layer, ritual pulse. Sits in the orbital ring only when the
     owner is signed in. */
  .informant.krypteia .orb {
    background: radial-gradient(circle at 35% 30%,
      rgba(255,90,90,0.55) 0%,
      rgba(120,10,10,0.7) 22%,
      rgba(20,2,2,0.95) 70%,
      rgba(0,0,0,1) 100%);
    border: 1.8px solid rgba(255,90,80,0.95);
    box-shadow:
      0 0 22px rgba(255,70,70,0.85),
      0 0 60px rgba(255,60,60,0.35),
      inset 0 0 18px rgba(0,0,0,0.85);
    animation: krypteia-pulse 2.6s ease-in-out infinite;
  }
  .informant.krypteia .orb-glyph {
    color: #ffd0c8; font-size: 26px; font-weight: 700;
    text-shadow: 0 0 10px rgba(255,80,80,0.95), 0 0 4px rgba(0,0,0,0.95);
  }
  /* ALERT mode — Krypteia has something to say. Pulse doubles + the
     border + glow stay at peak so the orb visibly demands attention
     without ever opening a panel. The orb's voice (TTS) is the message. */
  .informant.krypteia.alert .orb {
    animation: krypteia-pulse 1.0s ease-in-out infinite;
    border-color: rgba(255,120,100,1);
    box-shadow:
      0 0 50px rgba(255,90,80,1),
      0 0 140px rgba(255,80,60,0.75),
      inset 0 0 24px rgba(0,0,0,0.95);
  }
  @keyframes krypteia-pulse {
    0%,100% { box-shadow:
      0 0 22px rgba(255,70,70,0.85),
      0 0 60px rgba(255,60,60,0.32),
      inset 0 0 18px rgba(0,0,0,0.85); }
    50%     { box-shadow:
      0 0 36px rgba(255,90,80,1),
      0 0 100px rgba(255,80,60,0.55),
      inset 0 0 22px rgba(0,0,0,0.95); }
  }

  /* ORB EXPAND — tap an informant to grow it big and play its video
     UNMUTED. Used to be a bottom panel; now the orb itself is the player. */
  #orb-expand {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s ease-out;
  }
  #orb-expand.on { opacity: 1; }
  .orb-expand-bg {
    position: absolute; inset: 0;
    background: radial-gradient(circle, rgba(2,8,18,0.6), rgba(0,0,0,0.92));
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  }
  .orb-expand-orb {
    position: relative; width: min(70vmin, 460px); height: min(70vmin, 460px);
    border-radius: 50%; overflow: hidden;
    border: 2px solid color-mix(in srgb, var(--ic, #7eb4ff) 90%, transparent);
    box-shadow:
      0 0 60px  color-mix(in srgb, var(--ic, #7eb4ff) 70%, transparent),
      0 0 140px color-mix(in srgb, var(--ic, #7eb4ff) 32%, transparent);
    transform: scale(0.4); transition: transform 0.45s cubic-bezier(.2,.9,.3,1.25);
  }
  #orb-expand.on .orb-expand-orb { transform: scale(1); }
  .orb-expand-video {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; display: block; background: #04101e;
  }
  .orb-expand-orb .living-orb { mix-blend-mode: screen; opacity: 0.42; }
  .orb-expand-glyph {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 92px; text-shadow: 0 0 14px rgba(0,0,0,0.9), 0 0 3px rgba(0,0,0,0.95); z-index: 2;
  }
  .orb-expand-meta {
    position: absolute; bottom: 14vh; left: 50%; transform: translateX(-50%);
    color: #c5dcff; font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase;
    text-shadow: 0 0 8px rgba(0,0,0,0.85); white-space: nowrap;
  }
  .orb-expand-actions {
    position: absolute; bottom: 7vh; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; z-index: 3;
  }

  /* LIVING ORB — the procedural graphics primitive. A canvas painting a
     flowing plasma generated from the agent's own DNA (color + seed). Sits
     inside any element that previously used a static CSS gradient.
     When wrapped in .orb-stage inside .orbit, the stage counter-rotates so
     real video content inside the orb stays UPRIGHT while the ring spins. */
  .orb-host { position: relative; width: 100%; height: 100%; border-radius: 50%; }
  .orb-stage {
    position: absolute; inset: 0; border-radius: 50%; overflow: hidden;
    transform-origin: 50% 50%;
  }
  /* The counter-spin: only orbs travelling around .orbit need to keep content level. */
  .orbit .orb-stage { animation: orbit-counter 90s linear infinite; }
  @keyframes orbit-counter { to { transform: rotate(-360deg); } }
  .orb-video {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; pointer-events: none; display: block;
    background: #04101e;
  }
  .orb-video.is-ready { opacity: 1; }
  .living-orb {
    position: absolute; inset: 0; width: 100%; height: 100%;
    border-radius: 50%; display: block; pointer-events: none;
  }
  /* When a video lives behind the plasma, blend the plasma as a faint colour wash so the video is the dominant content. */
  .orb-stage .living-orb { mix-blend-mode: screen; opacity: 0.22; }
  .orb-stage .orb-thumb {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; display: block; background: #04101e;
  }
  .orb-glyph {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-size: inherit; pointer-events: none;
    text-shadow: 0 0 6px rgba(0,0,0,0.85), 0 0 2px rgba(0,0,0,0.9);
    z-index: 2;
  }

  /* AGENT CARD — the unified panel skin every agent's home shares.
     Orb header (a small face for the agent) + role chip + status + body.
     Used by informants, ME, brain, krypteia, council and every future agent. */
  .agent-card-header {
    display: flex; align-items: center; gap: 12px;
    padding: 4px 0 14px; margin-bottom: 14px;
    border-bottom: 1px solid rgba(120,180,255,0.08);
  }
  .agent-card-orb {
    position: relative;
    width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; line-height: 1; overflow: hidden;
    background: radial-gradient(circle at 35% 30%,
      rgba(255,255,255,0.45) 0%,
      color-mix(in srgb, var(--ac, #7eb4ff) 65%, transparent) 22%,
      color-mix(in srgb, var(--ac, #7eb4ff) 25%, transparent) 65%,
      rgba(4,10,22,0.85) 100%);
    border: 1.5px solid color-mix(in srgb, var(--ac, #7eb4ff) 70%, transparent);
    box-shadow: 0 0 16px color-mix(in srgb, var(--ac, #7eb4ff) 50%, transparent),
                inset 0 0 10px color-mix(in srgb, var(--ac, #7eb4ff) 25%, transparent);
  }
  .agent-card-meta { flex: 1; min-width: 0; }
  .agent-card-name {
    font-family: var(--font-display); font-size: 17px; font-weight: 600;
    letter-spacing: 0.04em; color: var(--marble);
    line-height: 1.2; word-break: break-word;
    text-shadow: 0 0 8px rgba(212,160,71,0.18);
  }
  .agent-card-role {
    display: inline-block; margin-top: 4px;
    font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ac, #7eb4ff);
    padding: 2px 9px; border-radius: 999px;
    border: 1px solid color-mix(in srgb, var(--ac, #7eb4ff) 40%, transparent);
    background: color-mix(in srgb, var(--ac, #7eb4ff) 10%, transparent);
  }
  .agent-card-status {
    font-size: 9px; letter-spacing: 0.15em; color: #6a8aaf;
    margin-top: 6px; text-transform: uppercase;
  }

  /* Brightness slider — left edge, vertical, subtle. */
  #bright-wrap {
    position: fixed; left: 8px; top: 50%; transform: translateY(-50%);
    z-index: 45; display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 12px 6px; border-radius: 16px;
    background: rgba(6,12,24,0.55); backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(120,180,255,0.16);
  }
  #bright-wrap .bright-ico { font-size: 13px; color: #ffd47e; opacity: 0.85; }
  #bright-slider {
    -webkit-appearance: slider-vertical; appearance: slider-vertical;
    writing-mode: vertical-lr; direction: rtl;
    width: 6px; height: 150px; accent-color: #7eb4ff; cursor: pointer; background: transparent;
  }
  /* ============================================================
     BOOT VEIL — exactly two things: the ASTRANOV wordmark and a
     standard rotating loader ring. No cosmos, no Earth, no
     satellites. Lifts the moment Cesium paints.
     ============================================================ */
  #boot .cosmos {
    position: relative; width: 28px; height: 28px; margin-bottom: 22px;
  }
  #boot .loader {
    position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid rgba(74,166,255,0.18);
    border-top-color: #4aa6ff;
    box-shadow: 0 0 14px rgba(74,166,255,0.45);
    animation: boot-spin 0.95s linear infinite;
  }
  @keyframes boot-spin { to { transform: rotate(360deg); } }
  #boot .name {
    font-family: 'Quicksand', system-ui, sans-serif;
    font-size: 21px; font-weight: 700;
    letter-spacing: 0.34em; text-indent: 0.34em;
    color: #cde7ff;
    text-shadow:
      0 0 4px #ffffff,
      0 0 10px #4aa6ff,
      0 0 22px #1e6cff,
      0 0 40px #0040d8,
      0 0 70px #001a66;
  }

  /* ============================================================
     AICYCLE ring — always visible. Bottom-right.
     ============================================================ */
  #aicycle-float {
    position: fixed; bottom: max(20px, env(safe-area-inset-bottom)); right: 20px;
    width: 64px; height: 64px; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  #aicycle-float .ring { position: absolute; inset: 0; border-radius: 50%; z-index: 1;
                     border: 1.5px solid rgba(120, 180, 255, 0.4);
                     background: rgba(4, 8, 20, 0.22); backdrop-filter: blur(8px);
                     -webkit-backdrop-filter: blur(8px);
                     transition: border-color 0.3s; }
  #aicycle-float.thinking .ring { animation: ring-pulse 1.2s ease-in-out infinite; }
  @keyframes ring-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(120, 180, 255, 0.4); }
    50%      { box-shadow: 0 0 0 12px rgba(120, 180, 255, 0); }
  }
  #aicycle-float .node { position: relative; z-index: 2; width: 12px; height: 12px; border-radius: 50%;
                     background: radial-gradient(circle, var(--chrysos-hi) 0%, var(--chrysos) 60%, transparent 100%);
                     box-shadow: 0 0 18px rgba(240,200,117,0.95), 0 0 32px rgba(93,178,255,0.25);
                     transition: background 0.2s, box-shadow var(--t-mid) var(--ease); }
  #aicycle-float .provider {
    position: absolute; z-index: 2; bottom: -18px; left: 50%; transform: translateX(-50%);
    font-size: 9px; letter-spacing: 0.15em; color: rgba(200, 220, 255, 0.7);
    text-transform: uppercase; white-space: nowrap; pointer-events: none;
  }

  /* ============================================================
     APP NAME (§1b) — the wordmark. Carved inscriptional capitals
     (Cinzel) in marble & gold, faintly haloed in Aegean blue.
     Tap = diagnostic + hard refresh.
     ============================================================ */
  /* WORDMARK LAW: letters floating in space. NO box, NO border, NO
     background, NO chrome. Simple rounded geometric letters
     (Quicksand) glowing DEEP ELECTRIC BLUE — the glow IS the chrome.
     No tagline underneath the name. */
  #app-name {
    position: fixed; top: max(10px, env(safe-area-inset-top)); left: 50%;
    transform: translateX(-50%); z-index: 200; cursor: pointer;
    padding: 0; border-radius: 0;
    display: flex !important; flex-direction: column; align-items: center;
    visibility: visible !important; opacity: 1 !important;
    font-family: 'Quicksand', system-ui, sans-serif;
    font-weight: 700; font-size: 21px; letter-spacing: 0.34em; text-indent: 0.34em;
    color: #cde7ff;
    -webkit-user-select: none; user-select: none; line-height: 1;
    background: transparent;
    border: 0;
    box-shadow: none;
    backdrop-filter: none; -webkit-backdrop-filter: none;
    text-shadow:
      0 0 4px #ffffff,
      0 0 10px #4aa6ff,
      0 0 22px #1e6cff,
      0 0 40px #0040d8,
      0 0 70px #001a66;
    transition: transform var(--t-quick) var(--ease);
  }
  #app-name:active { transform: translateX(-50%) scale(0.96); }
  #app-name::after { content: none; }
  /* Tagline removed entirely — the name speaks for itself. */
  #app-name .app-tag { display: none; }
  /* No box on the healing state either — only the glow shifts color. */
  #app-name.healing { color: #d6f7e6;
    text-shadow:
      0 0 6px rgba(214,247,230,0.95),
      0 0 16px rgba(126,235,180,0.95),
      0 0 30px rgba(54,150,108,0.85); }

  /* DRAWER HANDLE — small bottom-edge affordance that summons the
     bottom drawer. Hidden at GLOBAL (nothing to filter yet); visible
     at NATIONAL + PERSONAL. A 3 px line + a short chevron above it. */
  #drawer-handle {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: max(12px, calc(env(safe-area-inset-bottom) + 12px));
    z-index: 199; display: none; align-items: center; justify-content: center;
    width: 60px; height: 22px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  body.at-personal #drawer-handle,
  body.at-national #drawer-handle { display: flex; }
  #drawer-handle::before {
    content: '';
    width: 40px; height: 3px; border-radius: 2px;
    background: linear-gradient(90deg,
      rgba(45,108,196,0.25), rgba(93,178,255,0.85), rgba(45,108,196,0.25));
    box-shadow: 0 0 12px rgba(45,108,196,0.55);
  }
  #drawer-handle:active { transform: translateX(-50%) scale(0.94); }

  /* CHIP styles used INSIDE the bottom drawer. Same look, no
     position:fixed — they live wherever the drawer puts them. */
  .cfc-row {
    display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 14px;
  }
  .cfc {
    flex: 0 0 auto;
    font-family: var(--font-body, system-ui, sans-serif);
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: rgba(220,235,255,0.82);
    padding: 6px 12px; border-radius: 14px;
    background: rgba(8, 18, 38, 0.55);
    border: 1px solid rgba(45,108,196,0.42);
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    user-select: none; white-space: nowrap;
    transition: transform 0.12s var(--ease), box-shadow 0.18s var(--ease),
                background 0.18s var(--ease), border-color 0.18s var(--ease);
  }
  .cfc:active { transform: scale(0.95); }
  .cfc.on {
    color: #cfe2ff;
    background: rgba(20, 52, 120, 0.72);
    border-color: rgba(93,178,255,0.85);
    box-shadow: 0 0 14px rgba(45,108,196,0.55);
  }
  .cfc-all { font-weight: 700; }

  /* EARTH-CENTERED ORBITAL RINGS (§0n v2). Earth is the mother — the
     rings sit at the screen centre over the globe. Orbs auto-position
     by usefulness: 0° (top) when most useful, past 180° when useless.
     No user-driven ring rotation; the system arranges. */
  #earth-rings {
    position: fixed; left: 50%; top: 50%;
    width: 0; height: 0; z-index: 198;
    pointer-events: none;
    transform: translate(-50%, -50%);
  }
  #earth-rings .er-ring {
    position: absolute; left: 0; top: 0;
    width: 0; height: 0; pointer-events: none;
    /* User rotation — set by JS during drag with trackball physics
       (see _wireRingSpin). Orbs translate(dx,dy) inside; the ring
       rotates as a whole. */
    transform: rotate(var(--ring-rot, 0deg));
    transition: transform 0.18s var(--ease);
    will-change: transform;
  }
  #earth-rings .er-ring.spinning { transition: none; }
  /* No dashed orbit tracks. Orbs alone read as the rings — chrome
     stays out of the way. */
  /* Each orb on a ring. Positioned at its --dx, --dy (computed from
     ring radius × cos/sin of its current angle). Smooth transition
     so the live re-arrangement looks like a planetary settle. */
  .er-orb {
    position: absolute; left: 0; top: 0;
    width: 40px; height: 40px; margin: -20px 0 0 -20px;
    border-radius: 50%; pointer-events: auto;
    cursor: pointer; touch-action: none;
    -webkit-tap-highlight-color: transparent;
    transform: translate(var(--dx, 0), var(--dy, 0));
    transition: transform 0.9s cubic-bezier(0.32, 0.72, 0, 1),
                opacity   0.4s var(--ease),
                box-shadow 0.3s var(--ease);
    background: radial-gradient(circle at 32% 32%,
      color-mix(in srgb, var(--mc, #7eb4ff) 88%, white 14%),
      var(--mc, #7eb4ff) 55%, #04101f 100%);
    border: 1px solid color-mix(in srgb, var(--mc, #7eb4ff) 70%, transparent);
    box-shadow: inset 0 0 6px rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-body, system-ui, sans-serif);
    font-size: 16px; font-weight: 600; color: #e8eef8;
  }
  .er-orb::after {
    content: attr(data-label);
    position: absolute; left: 50%; top: 44px; transform: translateX(-50%);
    font-family: 'Quicksand', system-ui, sans-serif;
    font-size: 8.5px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(244,237,224,0.85);
    text-shadow: 0 0 4px color-mix(in srgb, var(--mc, #7eb4ff) 65%, transparent),
                 0 1px 2px rgba(0,0,0,0.85);
    white-space: nowrap; pointer-events: none;
  }
  /* Useful orbs get a soft halo; useless ones simply fade.
     Intensity is the second relevance channel; angle is the first. */
  .er-orb[data-use="hi"] {
    box-shadow:
      inset 0 0 5px rgba(0,0,0,0.45),
      0 0 8px color-mix(in srgb, var(--mc, #7eb4ff) 70%, transparent);
  }
  .er-orb[data-use="lo"] { opacity: 0.40; }
  .er-orb:active { transform: translate(var(--dx, 0), var(--dy, 0)) scale(0.92); }
  /* Quick ripple from screen centre on absorb / release. */
  #er-flash {
    position: absolute; left: 0; top: 0;
    width: 0; height: 0; pointer-events: none; opacity: 0;
  }
  #er-flash.on {
    width: 600px; height: 600px; margin: -300px 0 0 -300px;
    border-radius: 50%; opacity: 0.85;
    background: radial-gradient(circle, rgba(207,226,255,0.6) 0%, transparent 60%);
    animation: er-flash-pop 0.7s ease-out forwards;
  }
  @keyframes er-flash-pop {
    0%   { opacity: 0.9; transform: scale(0.4); }
    100% { opacity: 0;   transform: scale(1.6); }
  }

  /* MOON — secondary base (§0n addendum). A small grey-blue body
     in the lower-right of the screen with her own single ring of
     orbs (Council, Krypteia, Memory, Archive, Settings). Pulses
     gently. By default visible; on COSMIC zoom (camera height > a
     threshold) she swells slightly so the user notices. */
  #moon-system {
    position: fixed;
    right: max(28px, calc(env(safe-area-inset-right) + 28px));
    bottom: max(140px, calc(env(safe-area-inset-bottom) + 140px));
    width: 0; height: 0; z-index: 197;
    pointer-events: none;
    /* DIM by default (§0o): the Moon and her orbs fade to low
       opacity so an accidental zoom-out doesn't flood the eye. They
       sharpen only when the user is genuinely at cosmic altitude. */
    opacity: 0.35;
    transition: transform 0.6s var(--ease), opacity 0.6s var(--ease);
    will-change: transform, opacity;
  }
  body.cosmic-zoom #moon-system { transform: scale(1.35); opacity: 1; }
  .moon-body {
    position: absolute; left: -14px; top: -14px;
    width: 28px; height: 28px; border-radius: 50%;
    pointer-events: auto;
    background:
      radial-gradient(circle at 28% 28%, rgba(255,255,255,0.30) 0%, transparent 35%),
      linear-gradient(165deg, #8e98ad 0%, #5a667e 55%, #2b3550 100%);
    border: 1px solid rgba(180,200,235,0.35);
    box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
    cursor: pointer;
  }
  .moon-ring {
    position: absolute; left: 0; top: 0;
    width: 0; height: 0; pointer-events: none;
  }
  .moon-ring::before {
    content: ''; position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width:  120px; height: 120px;
    border-radius: 50%;
    border: 1px dashed rgba(160,190,235,0.18);
    pointer-events: none;
  }
  .moon-orb {
    position: absolute; left: 0; top: 0;
    width: 22px; height: 22px; margin: -11px 0 0 -11px;
    border-radius: 50%; pointer-events: auto; cursor: pointer;
    touch-action: none; -webkit-tap-highlight-color: transparent;
    transform: translate(var(--dx, 0), var(--dy, 0));
    transition: transform 0.9s cubic-bezier(0.32, 0.72, 0, 1),
                opacity   0.4s var(--ease),
                box-shadow 0.3s var(--ease);
    background: radial-gradient(circle at 32% 32%,
      color-mix(in srgb, var(--mc, #a0b4d8) 90%, white 18%),
      var(--mc, #a0b4d8) 55%, #1a2440 100%);
    border: 1px solid color-mix(in srgb, var(--mc, #a0b4d8) 85%, transparent);
    box-shadow:
      inset 0 0 5px rgba(0,0,0,0.55),
      0 0 8px color-mix(in srgb, var(--mc, #a0b4d8) 55%, transparent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display, 'Cinzel', serif);
    font-size: 10px; font-weight: 700; color: #f4f6ff;
    text-shadow: 0 0 4px color-mix(in srgb, var(--mc, #a0b4d8) 70%, transparent);
  }
  .moon-orb:active { transform: translate(var(--dx, 0), var(--dy, 0)) scale(0.92); }

  /* BACK-TO-GLOBE chevron — hidden at GLOBAL, shown at NATIONAL +
     PERSONAL so the user always has a one-tap way back to the
     world view. Auto-fades when the user is idle. */
  #back-to-globe {
    position: fixed; left: 14px;
    top: max(54px, calc(env(safe-area-inset-top) + 54px));
    z-index: 199;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(8, 18, 38, 0.55);
    border: 1px solid rgba(74, 166, 255, 0.55);
    color: #cde7ff; font-size: 18px; line-height: 1;
    display: none; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    user-select: none;
    box-shadow: 0 0 12px rgba(45, 108, 196, 0.45);
    transition: transform 0.12s var(--ease), opacity 0.4s var(--ease);
  }
  body.at-national #back-to-globe,
  body.at-personal #back-to-globe { display: flex; }
  #back-to-globe:active { transform: scale(0.94); }

  /* CHAT RE-OPEN TAB — small bottom-edge affordance. Hidden when
     the chat is open; appears the moment it's closed. */
  #chat-reopen {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: max(10px, calc(env(safe-area-inset-bottom) + 10px));
    z-index: 200;
    width: 64px; height: 22px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    background:
      radial-gradient(circle at 50% 50%,
        rgba(74,166,255,0.35) 0%,
        rgba(30,108,255,0.18) 45%,
        rgba(0,26,102,0)      70%);
    border-radius: 12px 12px 0 0;
    border-top:    1px solid rgba(74,166,255,0.55);
    border-left:   1px solid rgba(74,166,255,0.18);
    border-right:  1px solid rgba(74,166,255,0.18);
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 3px;
    transition: opacity 0.25s var(--ease);
  }
  #chat-reopen::after {
    content: '◈';
    color: #cde7ff;
    font-size: 13px;
    text-shadow: 0 0 6px #4aa6ff, 0 0 14px #1e6cff;
  }
  body.chat-open #chat-reopen { opacity: 0; pointer-events: none; }
  #chat-reopen:active { transform: translateX(-50%) scale(0.94); }

  /* ZERO-UI ENFORCEMENT (§0o MATERIALISATION LAW). Cold boot = ONLY
     THE GLOBE. Every legacy "always visible" chrome element from
     prior rounds is hidden by default. Orbs are summoned through
     materializeOrb() — by the AI, the user, or the schedule. The
     wordmark and the globe are the only unconditional UI. */
  #aicycle-float,
  #sys-orbs,
  #ctrl-vol,
  #ctrl-mic,
  #ctrl-bright,
  #drawer-handle,
  #pilot-mini { display: none !important; }
  /* Earth-rings sit visually around the globe AT GLOBAL TIER ONLY.
     The moment the camera descends (NATIONAL or PERSONAL) we hide
     the rings — they would otherwise float over a country or city
     and fight the map for attention. Orbs the AI materialises while
     zoomed in just wait for the user to come back to GLOBAL. */
  body:not(.at-global) #earth-rings { display: none !important; }
  #earth-rings:empty { display: none !important; }
  /* Moon stays hidden until the user is genuinely in cosmic zoom —
     no accidental zoom-out should reveal her cluster. */
  #moon-system { opacity: 0 !important; pointer-events: none; }
  body.cosmic-zoom #moon-system { opacity: 1 !important; pointer-events: auto; transform: scale(1.35); }

  /* Legacy mother-orb styles still apply if someone re-shows it,
     but they're orphaned. Kept short here. */
  #mother-orb {
    position: fixed; z-index: 220; width: 56px; height: 56px;
    cursor: grab; -webkit-tap-highlight-color: transparent;
    user-select: none; touch-action: none;
    border-radius: 50%;
    /* Default location: bottom-right corner, just clear of the safe
       area. The rings sit OUTSIDE the orb body so we leave breathing
       room from the edge for them. */
    right: 130px; bottom: max(130px, calc(env(safe-area-inset-bottom) + 130px));
    transition: transform 0.18s var(--ease), box-shadow 0.22s var(--ease);
    will-change: transform;
    /* The rings overflow the orb's bounds — keep them visible. */
    overflow: visible;
  }
  #mother-orb.dragging, #mother-orb.flinging { cursor: grabbing; transition: none; }
  #mother-orb:active { transform: scale(0.95); }
  #mother-orb .mo-earth {
    position: absolute; inset: 3px; border-radius: 50%;
    background:
      radial-gradient(circle at 36% 32%, rgba(255,255,255,0.22) 0%, transparent 36%),
      radial-gradient(circle at 65% 70%, rgba(126,235,180,0.55) 0%, transparent 38%),
      radial-gradient(circle at 30% 75%, rgba(126,235,180,0.45) 0%, transparent 32%),
      linear-gradient(165deg, #0a3a64 0%, #06224a 55%, #021024 100%);
    border: 1px solid rgba(207,226,255,0.55);
    box-shadow:
      inset 0 0 14px rgba(0,0,0,0.7),
      inset 0 4px 10px rgba(207,226,255,0.18);
  }
  #mother-orb .mo-halo {
    position: absolute; inset: -3px; border-radius: 50%; pointer-events: none;
    box-shadow:
      0 0 14px rgba(45,108,196,0.6),
      0 0 30px rgba(20,52,120,0.5);
  }
  #mother-orb.open .mo-halo {
    box-shadow:
      0 0 22px rgba(93,178,255,0.95),
      0 0 50px rgba(45,108,196,0.7);
  }
  /* MOTHERSHIP RINGS — three concentric orbit tracks for the small
     orbs. Each ring is a zero-size container at the mother's centre;
     its rotation is driven via --rng (deg). The ring orbs are
     positioned absolutely with translate(dx, dy) relative to the
     ring container so the rotation carries them all together. */
  #mother-orb .mo-ring {
    position: absolute; left: 50%; top: 50%; width: 0; height: 0;
    transform: translate(-50%, -50%) rotate(var(--rng, 0deg));
    transform-origin: 0 0;
    pointer-events: none;
    will-change: transform;
  }
  #mother-orb .mo-ring.spinning { transition: none; }
  /* A faint dashed circle on each ring so the orbits are legible
     even when only one orb is currently stowed in that ring. */
  #mother-orb .mo-ring::before {
    content: ''; position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: calc(var(--rr, 40px) * 2); height: calc(var(--rr, 40px) * 2);
    border-radius: 50%;
    border: 1px dashed rgba(93,178,255,0.22);
    pointer-events: none;
  }
  /* Ring orbs — tiny circles tinted by their assigned colour. */
  .mo-rorb {
    position: absolute; left: 0; top: 0;
    width: 26px; height: 26px; margin: -13px 0 0 -13px;
    border-radius: 50%; pointer-events: auto;
    cursor: pointer; touch-action: none;
    -webkit-tap-highlight-color: transparent;
    transform: translate(var(--dx, 0), var(--dy, 0));
    background: radial-gradient(circle at 32% 32%,
      color-mix(in srgb, var(--mc, #7eb4ff) 92%, white 18%),
      var(--mc, #7eb4ff) 55%, #04101f 100%);
    border: 1px solid color-mix(in srgb, var(--mc, #7eb4ff) 85%, transparent);
    box-shadow:
      inset 0 0 6px rgba(0,0,0,0.55),
      0 0 10px color-mix(in srgb, var(--mc, #7eb4ff) 55%, transparent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display, 'Cinzel', serif);
    font-size: 11px; font-weight: 700; color: #f4ede0;
    text-shadow: 0 0 4px color-mix(in srgb, var(--mc, #7eb4ff) 70%, transparent);
    transition: box-shadow 0.18s var(--ease), transform 0.18s var(--ease);
  }
  /* The orb's glyph stays UPRIGHT regardless of the ring's rotation
     so emoji + letters read correctly. We counter-rotate it in JS
     via --counter-rot. */
  .mo-rorb .mo-rorb-glyph {
    transform: rotate(var(--counter-rot, 0deg));
    pointer-events: none;
  }
  .mo-rorb.released {
    /* When an orb is released to the screen, its slot in the ring
       fades so the user sees that it's "out". */
    opacity: 0.28;
    box-shadow:
      inset 0 0 6px rgba(0,0,0,0.55),
      0 0 4px color-mix(in srgb, var(--mc, #7eb4ff) 35%, transparent);
  }
  /* MOTHERSHIP FLASH — a quick ripple inside the mother orb on
     absorb/release for visible feedback (§0k Manual Foundation). */
  #mother-orb .mo-flash {
    position: absolute; inset: -10px; border-radius: 50%;
    pointer-events: none; opacity: 0;
    background: radial-gradient(circle, rgba(207,226,255,0.45) 0%, transparent 65%);
    transition: opacity 0.08s ease-out;
  }
  #mother-orb.mo-flash-on .mo-flash {
    opacity: 1;
    animation: mo-flash-pop 0.62s ease-out forwards;
  }
  @keyframes mo-flash-pop {
    0%   { opacity: 0.92; transform: scale(0.85); }
    40%  { opacity: 0.8;  transform: scale(1.4);  }
    100% { opacity: 0;    transform: scale(1.85); }
  }
  /* MOTHER DISC — the inventory ring that fans out when the mother
     is tapped. Each child token represents one stowable orb; tap to
     toggle released/stowed. The disc is positioned by JS over the
     mother's current coordinates. */
  #mother-disc {
    position: fixed; z-index: 219;
    width: 0; height: 0;             /* anchored by left/top */
    pointer-events: none; display: none;
  }
  #mother-disc.open { display: block; }
  #mother-disc .md-veil {
    position: fixed; inset: 0;
    background: radial-gradient(circle at var(--md-cx, 50%) var(--md-cy, 50%),
      rgba(2,6,18,0.05), rgba(2,6,18,0.55) 60%);
    backdrop-filter: blur(1px); -webkit-backdrop-filter: blur(1px);
    pointer-events: auto;
  }
  #mother-disc .md-ring {
    position: absolute; left: 0; top: 0;
    width: 0; height: 0;
  }
  #mother-disc .md-tok {
    position: absolute; left: 0; top: 0;
    width: 40px; height: 40px; margin: -20px 0 0 -20px;
    border-radius: 50%; cursor: pointer; pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
    background: radial-gradient(circle at 32% 32%,
      color-mix(in srgb, var(--mt-c, #7eb4ff) 92%, white 18%),
      var(--mt-c, #7eb4ff) 55%, #04101f 100%);
    border: 1px solid color-mix(in srgb, var(--mt-c, #7eb4ff) 85%, transparent);
    box-shadow:
      inset 0 0 8px rgba(0,0,0,0.55),
      0 0 14px color-mix(in srgb, var(--mt-c, #7eb4ff) 55%, transparent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display, 'Cinzel', serif);
    font-size: 16px; font-weight: 700; color: #f4ede0;
    text-shadow: 0 0 6px color-mix(in srgb, var(--mt-c, #7eb4ff) 70%, transparent);
    transition: transform 0.22s var(--ease), box-shadow 0.18s var(--ease), opacity 0.22s var(--ease);
    opacity: 0; transform: translate(0, 0) scale(0.6);
  }
  #mother-disc.open .md-tok {
    opacity: 1;
    transform: translate(var(--mtx, 0px), var(--mty, 0px)) scale(1);
  }
  #mother-disc .md-tok.released {
    /* Released orbs glow brighter to show "I'm out, tap to stow me back." */
    box-shadow:
      inset 0 0 8px rgba(0,0,0,0.55),
      0 0 22px color-mix(in srgb, var(--mt-c, #7eb4ff) 95%, transparent),
      0 0 42px color-mix(in srgb, var(--mt-c, #7eb4ff) 45%, transparent);
  }
  #mother-disc .md-tok.stowed { opacity: 0.55; }
  #mother-disc .md-tok:active { transform: translate(var(--mtx, 0px), var(--mty, 0px)) scale(0.92); }
  #mother-disc .md-tok .md-name {
    position: absolute; left: 50%; top: 44px; transform: translateX(-50%);
    font-family: var(--font-body, system-ui, sans-serif);
    font-size: 8px; font-weight: 600; letter-spacing: 0.18em;
    color: rgba(244,237,224,0.85); text-transform: uppercase;
    white-space: nowrap; pointer-events: none;
    text-shadow: 0 0 4px color-mix(in srgb, var(--mt-c, #7eb4ff) 70%, transparent),
                 0 1px 2px rgba(0,0,0,0.85);
  }

  /* ORBITAL DIAL — radial control around an orb (§0m). One layer for
     the whole app; only one dial is ever open at a time. */
  #orbital-dial {
    position: fixed; z-index: 240; pointer-events: none;
    inset: 0; display: none;
  }
  #orbital-dial.open { display: block; pointer-events: auto; }
  #orbital-dial .od-veil {
    position: absolute; inset: 0;
    background: radial-gradient(circle at var(--od-cx, 50%) var(--od-cy, 50%),
      rgba(2,6,18,0.05), rgba(2,6,18,0.55) 60%);
    backdrop-filter: blur(1.5px); -webkit-backdrop-filter: blur(1.5px);
  }
  #orbital-dial .od-ring {
    position: absolute; left: var(--od-cx, 50%); top: var(--od-cy, 50%);
    width: 0; height: 0; transform: translate(-50%, -50%);
    pointer-events: none;
  }
  /* The dial halo — a glowing circle at the dial radius. */
  #orbital-dial .od-halo {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: calc(var(--od-r, 78px) * 2); height: calc(var(--od-r, 78px) * 2);
    border-radius: 50%; box-sizing: border-box;
    border: 1px dashed rgba(93,178,255,0.45);
    box-shadow:
      0 0 22px rgba(45,108,196,0.45),
      inset 0 0 18px rgba(45,108,196,0.18);
  }
  /* TOP MARKER — the static "selected" indicator at 12 o'clock. The
     roulette wheel spins beneath it; whichever dot is under the
     marker is the selected one. */
  #orbital-dial .od-mark {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, calc(-1 * var(--od-r, 78px) - 22px));
    width: 0; height: 0; pointer-events: none;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-top: 11px solid rgba(207,226,255,0.95);
    filter: drop-shadow(0 0 6px rgba(93,178,255,0.85));
  }
  /* WHEEL — the rotating container. Dots / arcs are children. We
     drive its rotation directly from active._t so the whole roulette
     spins under the top marker. */
  #orbital-dial .od-wheel {
    position: absolute; left: 50%; top: 50%;
    width: 0; height: 0;
    transform: translate(-50%, -50%) rotate(var(--od-rot, 0deg));
    will-change: transform;
  }
  /* FLOOD ARC — colored donut wedge that fills the inside of the
     dial as the value advances. Lives OUTSIDE the rotating wheel so
     it stays anchored to the top while the wheel spins. */
  #orbital-dial .od-flood {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    overflow: visible; pointer-events: none;
  }
  #orbital-dial .od-flood-arc {
    filter: drop-shadow(0 0 14px rgba(93,178,255,0.45));
    transition: filter 0.2s var(--ease);
  }
  /* Dial dots — option markers around the halo. Smaller to match
     the smaller default radius. */
  #orbital-dial .od-dot {
    position: absolute; left: 50%; top: 50%;
    width: 30px; height: 30px; margin: -15px 0 0 -15px;
    transform: translate(var(--dx, 0px), var(--dy, 0px));
    border-radius: 50%;
    background: radial-gradient(circle at 32% 32%,
      color-mix(in srgb, var(--dc, #cfe2ff) 92%, white 18%),
      var(--dc, #cfe2ff) 55%, #04101f 100%);
    border: 1px solid color-mix(in srgb, var(--dc, #cfe2ff) 85%, transparent);
    box-shadow:
      inset 0 0 8px rgba(0,0,0,0.55),
      0 0 12px color-mix(in srgb, var(--dc, #cfe2ff) 55%, transparent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display, 'Cinzel', serif);
    font-size: 13px; font-weight: 700; color: #f4ede0;
    text-shadow: 0 0 4px color-mix(in srgb, var(--dc, #cfe2ff) 70%, transparent);
    pointer-events: auto; -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    transition: transform 0.18s var(--ease), box-shadow 0.18s var(--ease);
  }
  #orbital-dial .od-dot.active {
    box-shadow:
      inset 0 0 8px rgba(0,0,0,0.55),
      0 0 22px color-mix(in srgb, var(--dc, #cfe2ff) 95%, transparent),
      0 0 44px color-mix(in srgb, var(--dc, #cfe2ff) 45%, transparent);
    transform: translate(var(--dx, 0px), var(--dy, 0px)) scale(1.15);
  }
  /* Continuous-arc indicator (for value dials like volume/brightness). */
  #orbital-dial .od-arc {
    position: absolute; left: 50%; top: 50%;
    width: calc(var(--od-r, 78px) * 2); height: calc(var(--od-r, 78px) * 2);
    transform: translate(-50%, -50%) rotate(-90deg);
    pointer-events: none;
  }
  #orbital-dial .od-arc circle {
    fill: none; stroke-width: 5; stroke-linecap: round;
    transform-origin: center;
  }
  #orbital-dial .od-arc .od-arc-bg    { stroke: rgba(45,108,196,0.32); }
  #orbital-dial .od-arc .od-arc-value { stroke: rgba(93,178,255,0.95);
    filter: drop-shadow(0 0 8px rgba(93,178,255,0.7)); }
  #orbital-dial .od-arc-knob {
    position: absolute; left: 50%; top: 50%;
    width: 26px; height: 26px; margin: -13px 0 0 -13px;
    border-radius: 50%; pointer-events: auto;
    background: radial-gradient(circle at 32% 32%, #e7f0ff, #5db2ff 60%, #0a1f44 100%);
    border: 1px solid rgba(207,226,255,0.85);
    box-shadow:
      inset 0 0 8px rgba(0,0,0,0.55),
      0 0 16px rgba(93,178,255,0.85);
    transform: translate(var(--kx, 0px), var(--ky, 0px));
  }
  #orbital-dial .od-label {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, calc(var(--od-r, 78px) + 26px));
    font-family: var(--font-display, 'Cinzel', serif);
    font-size: 12px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: #cfe2ff;
    text-shadow: 0 0 8px rgba(45,108,196,0.95);
    white-space: nowrap; pointer-events: none;
  }
  #orbital-dial .od-value {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--font-body, system-ui, sans-serif);
    font-size: 18px; font-weight: 700; color: rgba(244,237,224,0.95);
    text-shadow: 0 0 8px rgba(45,108,196,0.95);
    pointer-events: none;
  }

  /* CONTROL ORBS — volume, brightness, AI cycle. Same skin as the
     apex dock orbs; throwable + dialable per §0m. The AI orb keeps
     its existing #aicycle-float treatment elsewhere; vol + bright
     are new orbs replacing the old vertical slider chrome. */
  .ctrl-orb {
    position: fixed; width: 44px; height: 44px;
    z-index: 199; pointer-events: auto; cursor: grab;
    border-radius: 50%; touch-action: none;
    -webkit-tap-highlight-color: transparent; user-select: none;
    transition: transform 0.18s var(--ease), box-shadow 0.2s var(--ease);
    will-change: transform;
  }
  .ctrl-orb.dragging, .ctrl-orb.flinging { cursor: grabbing; transition: none; }
  .ctrl-orb:active { transform: scale(0.94); }
  .ctrl-orb .co-body {
    width: 100%; height: 100%; border-radius: 50%;
    background:
      radial-gradient(circle at 32% 32%, color-mix(in srgb, var(--co-c, #7eb4ff) 92%, white 18%),
                                          var(--co-c, #7eb4ff) 55%,
                                          #04101f 100%);
    box-shadow:
      inset 0 0 10px rgba(0,0,0,0.55),
      0 0 14px color-mix(in srgb, var(--co-c, #7eb4ff) 60%, transparent),
      0 0 28px color-mix(in srgb, var(--co-c, #7eb4ff) 28%, transparent);
    border: 1px solid color-mix(in srgb, var(--co-c, #7eb4ff) 85%, transparent);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #f4ede0;
    text-shadow: 0 0 6px color-mix(in srgb, var(--co-c, #7eb4ff) 70%, transparent);
  }
  body:not(.at-global) #ctrl-vol,
  body:not(.at-global) #ctrl-bright { display: none; }

  /* APEX SYSTEM ORB DOCK — five small DRAGGABLE circles. The user
     places them wherever; positions persist. Defaults sit along the
     left edge of the screen so the globe is unobscured. */
  #sys-orbs {
    position: fixed; inset: 0; z-index: 198; pointer-events: none;
  }
  #sys-orbs .so {
    position: absolute; width: 44px; height: 44px;
    border-radius: 50%; pointer-events: auto; cursor: grab;
    -webkit-tap-highlight-color: transparent; user-select: none;
    touch-action: none;
    transition: transform 0.18s var(--ease), box-shadow 0.2s var(--ease);
    will-change: transform;
  }
  #sys-orbs .so.dragging,
  #sys-orbs .so.flinging { cursor: grabbing; transition: none; }
  #sys-orbs .so.flinging .so-body {
    /* Faint motion glow while the orb is in flight. */
    box-shadow:
      inset 0 0 10px rgba(0,0,0,0.55),
      0 0 22px color-mix(in srgb, var(--so-c, #7eb4ff) 90%, transparent),
      0 0 44px color-mix(in srgb, var(--so-c, #7eb4ff) 40%, transparent);
  }
  #sys-orbs .so:active { transform: scale(0.94); }
  #sys-orbs .so .so-body {
    width: 100%; height: 100%; border-radius: 50%;
    background:
      radial-gradient(circle at 32% 32%, color-mix(in srgb, var(--so-c, #7eb4ff) 92%, white 18%),
                                          var(--so-c, #7eb4ff) 55%,
                                          #04101f 100%);
    box-shadow:
      inset 0 0 10px rgba(0,0,0,0.55),
      0 0 14px color-mix(in srgb, var(--so-c, #7eb4ff) 60%, transparent),
      0 0 28px color-mix(in srgb, var(--so-c, #7eb4ff) 28%, transparent);
    border: 1px solid color-mix(in srgb, var(--so-c, #7eb4ff) 85%, transparent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display, 'Cinzel', serif);
    font-size: 18px; font-weight: 700;
    color: #f4ede0; text-shadow: 0 0 6px color-mix(in srgb, var(--so-c, #7eb4ff) 70%, transparent);
  }
  #sys-orbs .so .so-name {
    position: absolute; left: 50%; transform: translateX(-50%); top: 46px;
    font-family: var(--font-display, 'Cinzel', serif);
    font-size: 8px; font-weight: 600; letter-spacing: 0.18em;
    color: rgba(244,237,224,0.86); text-transform: uppercase;
    white-space: nowrap; pointer-events: none;
    text-shadow: 0 0 4px color-mix(in srgb, var(--so-c, #7eb4ff) 70%, transparent),
                 0 1px 2px rgba(0,0,0,0.85);
  }

  /* City-level CATEGORY orbs — a floating cluster at the PERSONAL tier. */
  #city-cats {
    position: fixed; left: 0; right: 0; bottom: max(80px, calc(env(safe-area-inset-bottom) + 80px));
    z-index: 46; display: none; flex-wrap: wrap; justify-content: center;
    gap: 12px; padding: 0 18px; pointer-events: none;
  }
  body.at-personal #city-cats { display: flex; }
  #city-cats .cat-orb {
    pointer-events: auto; width: 58px; height: 58px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; gap: 1px;
    background: radial-gradient(circle at 35% 30%, color-mix(in srgb, var(--ic) 55%, transparent), rgba(6,12,24,0.82) 72%);
    border: 1.5px solid color-mix(in srgb, var(--ic) 75%, transparent);
    box-shadow: 0 0 14px color-mix(in srgb, var(--ic) 40%, transparent);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    transition: transform 0.14s;
  }
  #city-cats .cat-orb:active { transform: scale(0.9); }
  #city-cats .cat-orb .ce { font-size: 20px; line-height: 1; }
  #city-cats .cat-orb .cl { font-size: 7px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(220,235,255,0.85); }

  /* Me spotlight — connects the on-screen Me orb to the user's location. */
  #me-spotlight { position: fixed; inset: 0; z-index: 43; pointer-events: none; width: 100%; height: 100%; }
  #me-spotlight line {
    stroke: #7eebb4; stroke-width: 1.5; stroke-dasharray: 3 6; opacity: 0;
    filter: drop-shadow(0 0 4px rgba(126,235,180,0.8));
  }
  #me-spotlight.on line { opacity: 0.7; }

  /* ============================================================
     Level badge — top, auto-fades.
     ============================================================ */
  #level-badge {
    position: fixed; top: calc(max(8px, env(safe-area-inset-top)) + 40px); left: 50%; transform: translateX(-50%);
    padding: 6px 14px; border-radius: 999px;
    background: rgba(10, 20, 40, 0.6); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(120, 180, 255, 0.2);
    font-size: 10px; letter-spacing: 0.3em; color: #a8c8ee; text-transform: uppercase;
    opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 40;
  }
  #level-badge.visible { opacity: 1; }

  /* Imagery source indicator — only visible when on a fallback provider */
  #imagery-source {
    position: fixed; top: calc(max(16px, env(safe-area-inset-top)) + 28px);
    left: 50%; transform: translateX(-50%);
    padding: 3px 10px; border-radius: 999px;
    background: rgba(40, 20, 10, 0.6); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 180, 100, 0.25);
    font-size: 9px; letter-spacing: 0.25em; color: #ffb464; text-transform: uppercase;
    opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 40;
  }
  #imagery-source.visible { opacity: 1; }

  /* ============================================================
     Back button — top-left, contextual.
     ============================================================ */
  #back-btn {
    position: fixed; top: max(16px, env(safe-area-inset-top)); left: 16px;
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(10, 20, 40, 0.55); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(120, 180, 255, 0.2);
    display: none; align-items: center; justify-content: center;
    cursor: pointer; z-index: 40;
    color: #a8c8ee; font-size: 18px;
  }
  #back-btn.visible { display: flex; }

  /* ============================================================
     Tray — bottom strip, hidden by default.
     ============================================================ */
  #tray-trigger { display: none; }  /* retired — dock orbs replace the tray */
  #tray         { display: none; }

  /* ============================================================
     Corner gadgets — 4 large round gadgets, one per corner.
     #g-discover (top-left), #g-me (top-right),
