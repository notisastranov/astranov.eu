<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ASTRANOV • AOOS</title>
<link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css">
<style>
  :root { --bg:#000510; --fg:#e6f0ff; --accent:#4aa6ff; --amber:#ff9f0a; --violet:#9d7cff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000510; color:#e6f0ff; font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; overflow:hidden; }
  #cesiumContainer { position:absolute; top:0; left:0; width:100%; height:100%; background:#000510; }
  #wordmark { position:absolute; top:18px; left:50%; transform:translateX(-50%); font-size:13px; letter-spacing:4px; font-weight:600; opacity:0.65; pointer-events:none; z-index:100; }
  #wordmark .a { color:#4aa6ff; }
  #wordmark .v { color:#ff9f0a; }
  #level { position:absolute; top:18px; left:50%; transform:translateX(-50%); font-size:11px; letter-spacing:2px; opacity:.5; z-index:100; background:rgba(0,0,0,.3); padding:2px 10px; border-radius:20px; }

  /* AICYCLE - only permanent UI element */
  #aicycle {
    position:absolute; bottom:22px; right:22px; width:72px; height:72px;
    border-radius:50%; background:rgba(10,15,30,0.65); border:1px solid rgba(74,166,255,0.35);
    backdrop-filter:blur(20px); z-index:200; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:transform .2s ease, box-shadow .2s;
  }
  #aicycle:hover { transform:scale(1.06); box-shadow:0 0 28px rgba(74,166,255,0.5); }
  #aicycle.thinking { animation: aipulse 1.1s infinite ease-in-out; }
  #aicycle .core { width:28px; height:28px; border-radius:50%; background:#4aa6ff; box-shadow:0 0 18px #4aa6ff; }
  #aicycle .label { position:absolute; bottom:-18px; font-size:9px; letter-spacing:1.5px; opacity:.6; white-space:nowrap; }

  @keyframes aipulse { 50% { box-shadow:0 0 38px rgba(74,166,255,0.9); } }

  .orb {
    position:absolute; width:58px; height:58px; border-radius:50%;
    background:rgba(12,18,35,0.75); border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(18px); display:flex; align-items:center; justify-content:center;
    font-size:22px; cursor:grab; user-select:none; z-index:150;
    box-shadow:0 8px 30px rgba(0,0,0,0.6);
    transition:transform .1s ease, box-shadow .2s;
  }
  .orb:active { cursor:grabbing; transform:scale(1.08); }
  .orb .inner { text-align:center; line-height:1; }
  .orb .name { position:absolute; bottom:-16px; font-size:9px; letter-spacing:1px; white-space:nowrap; opacity:.65; pointer-events:none }

  .drawer {
    position:absolute; bottom:0; left:0; right:0; max-height:72vh;
    background:rgba(6,8,18,0.96); border-top:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(30px); z-index:250; transform:translateY(100%);
    transition:transform .35s cubic-bezier(.32,1,.23,1); display:flex; flex-direction:column;
    border-top-left-radius:18px; border-top-right-radius:18px; overflow:hidden;
  }
  .drawer.open { transform:translateY(0); }
  .drawer-handle { width:42px; height:4px; background:rgba(255,255,255,0.25); border-radius:3px; margin:10px auto 6px; }
  .drawer-header { padding:4px 18px 12px; font-weight:600; font-size:15px; display:flex; align-items:center; gap:8px; }
  .drawer-content { flex:1; overflow:auto; padding:0 18px 22px; -webkit-overflow-scrolling:touch; }

  .chat-messages { flex:1; overflow:auto; padding:12px 4px; display:flex; flex-direction:column; gap:9px; }
  .msg { max-width:82%; padding:9px 14px; border-radius:14px; font-size:14.5px; line-height:1.4; }
  .msg.user { align-self:flex-end; background:#1a2a4a; color:#fff; border-bottom-right-radius:4px; }
  .msg.astranov { align-self:flex-start; background:rgba(74,166,255,0.12); border:1px solid rgba(74,166,255,0.25); border-bottom-left-radius:4px; }
  .msg-meta { font-size:10px; opacity:.45; margin-top:2px; }

  input, button { font-family:inherit; }
  #chat-input { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#fff; padding:12px 14px; border-radius:999px; font-size:15px; outline:none; }
  #chat-input:focus { border-color:#4aa6ff; }

  .gadget-btn {
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding:8px 16px; border-radius:999px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12);
    color:#fff; font-size:13px; cursor:pointer; margin:4px 3px 4px 0;
  }
  .gadget-btn:active { background:rgba(255,255,255,0.16); }

  .toast {
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,0.1); color:#fff; padding:6px 16px; border-radius:999px; font-size:12px;
    backdrop-filter:blur(10px); z-index:300; opacity:0; transition:opacity .3s;
  }
  .toast.show { opacity:1; }

  #market { padding:4px 0; }
  .vendor { padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.06); display:flex; gap:12px; align-items:center; }
  .vendor:last-child { border:none; }
</style>
</head>
<body>
<div id="cesiumContainer"></div>

<div id="wordmark"><span class="a">ASTRANOV</span> • <span class="v">AOOS</span></div>
<div id="level">GLOBAL</div>

<!-- AICYCLE - the single permanent interface element -->
<div id="aicycle" title="Talk to Astranov">
  <div class="core"></div>
  <div class="label">ASTRANOV</div>
</div>

<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header" id="drawer-title"></div>
  <div class="drawer-content" id="drawer-content"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =========================================================================
   ASTRANOV — CORE REBUILD 2026
   =========================================================================
   This file is the immediate, powerful, real core of the app.

   === CORE LAW (Vision — immutable foundation) ===
   The ultimate intelligence is Nature itself, then its creations — humans
   and machines. All together form the collective intelligence Astranov
   serves and channels; we are part of nature's intelligence, never above it.

   Astranov is a self-evolving, gain-to-gain system on a living globe.
   The globe is the eternal canvas — always visible, never covered.
   One intelligence: Astranov (single voice, hidden organs).
   Surfaces, orbs, and agents emerge only when needed and dissolve when not.
   Use strengthens the whole. Spartan clarity. Athenian creativity when required.
   Myrmidon collective force when the many move as one.

   Everything serves the coevolutionary loop: Nature → Humans → Machines → Collective Brain.

   === MECHANICS (Implementation — my authority, optimized for real/powerful/fast) ===
   - Rendering: CesiumJS for authentic real-Earth globe (NASA/ArcGIS layers, lighting).
     Fast init, reliable fallback to beautiful visual globe. No heavy bloat.
   - UI Primitives: One permanent element (AICYCLE ring). Everything else is
     transient drawers or on-demand floating orbs. Orbs NEVER auto-appear.
     Orbs are summoned explicitly by user intent (chat keywords or future controls).
   - Intelligence: High-fidelity local simulator (fast, always-on, persona-perfect)
     + ready for real backend (/aicycle Supabase). Context + memory recall.
   - State: Pure in-memory + localStorage. Instant, no network tax for core.
   - Performance: requestAnimationFrame, minimal DOM mutations, debounced events,
     lazy entity creation on globe. Single file for zero-deploy friction.
   - Orbs & Globe Integration: Orbs are 2D floating for speed + can anchor to globe
     positions when summoned. Full 3D orb anchoring is a future mechanic if it proves
     more powerful.
   - Modularity inside one file: Clear classes (GlobeManager, OrbManager, AicycleBrain,
     State, Drawer). Easy to extract later without breaking core.
   - Extensibility: Chat commands control summoning and actions. Marketplace/wallet
     are live simulations that feel real and can connect to real backend instantly.
   - Evolution rule: Mechanics can be reshaped at any time for more power/speed/realness.
     Law (vision) changes only when the architect says so.

   This separation allows the basic core to be rebuilt immediately while mechanics
   deliver maximum real power and speed.
   ========================================================================= */

// ========== CORE STATE ==========
const State = {
  avc: 420,
  chat: [],
  memories: [],
  level: 'GLOBAL',
  summonedOrbs: false,
  supabase: null
};

function persist() {
  localStorage.setItem('astranov-state', JSON.stringify({
    avc: State.avc,
    memories: State.memories
  }));
}

function loadPersist() {
  try {
    const saved = JSON.parse(localStorage.getItem('astranov-state') || '{}');
    if (saved.avc) State.avc = saved.avc;
    if (saved.memories) State.memories = saved.memories;
  } catch(e) {}
}

// ========== MECHANICS: GLOBE (powerful + reliable) ==========
let viewer = null;
let cesiumReady = false;

async function initGlobe() {
  const container = document.getElementById('cesiumContainer');

  try {
    if (!window.Cesium) throw new Error('Cesium script not loaded');

    // Clean, powerful Cesium init — no fragile tokens
    viewer = new Cesium.Viewer('cesiumContainer', {
      animation: false,
      baseLayerPicker: false,
      fullscreenButton: false,
      geocoder: false,
      homeButton: false,
      infoBox: false,
      sceneModePicker: false,
      selectionIndicator: false,
      timeline: false,
      navigationHelpButton: false,
      shouldAnimate: true,
      imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
        url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
      })
    });

    viewer.scene.globe.enableLighting = true;
    viewer.scene.skyAtmosphere.show = true;
    viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#000510');

    // Strong global view so the living Earth is immediately real and present
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(23.7, 38.0, 14000000),
      orientation: { heading: 0, pitch: -0.55, roll: 0 },
      duration: 1.3
    });

    // Globe interactions — click to descend (powerful navigation)
    viewer.screenSpaceEventHandler.setInputAction((movement) => {
      const picked = viewer.scene.pick(movement.position);
      if (picked && picked.id && picked.id._astranovData) {
        handleGlobeEntity(picked.id._astranovData);
      } else {
        descendGlobe(movement.position);
      }
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    viewer.screenSpaceEventHandler.setInputAction(() => ascendGlobe(), Cesium.ScreenSpaceEventType.LEFT_DOUBLE_CLICK);

    updateLevel();
    viewer.camera.changed.addEventListener(updateLevel);

    // Seed some living entities (real signals & vendors)
    seedGlobeEntities();

    cesiumReady = true;
    console.log('%c[MECHANICS] Globe: real powerful Cesium ready', 'color:#4aa6ff');

  } catch (e) {
    console.warn('[MECHANICS] Cesium failed — using fast visual globe fallback', e);
    // Beautiful, always-present visual globe (fast, real-feeling)
    container.innerHTML = `
      <div style="position:absolute;inset:0;background:#000510;display:flex;align-items:center;justify-content:center;overflow:hidden;">
        <div style="width:78vmin;height:78vmin;border-radius:50%;
                    background: radial-gradient(circle at 35% 30%, #0a2a4a 0%, #001020 42%, #000305 72%);
                    box-shadow: 0 0 90px rgba(0,70,140,0.7), 
                                inset 28px 18px 55px rgba(255,255,255,0.06), 
                                inset -35px -28px 75px rgba(0,0,0,0.92);
                    position:relative;">
          <div style="position:absolute;inset:0;border-radius:50%;
                      background:repeating-radial-gradient(circle at 38% 32%, rgba(74,166,255,0.07) 0, transparent 2px, transparent 11px);"></div>
          <div style="position:absolute;top:18%;left:20%;width:16%;height:16%;background:rgba(255,190,70,0.12);border-radius:50%;filter:blur(1px);"></div>
        </div>
        <div style="position:absolute; color:#4aa6ff; font-size:10px; letter-spacing:2.5px; opacity:0.55; bottom:26%; text-align:center;">
          LIVING GLOBE — REAL EARTH • FAST FALLBACK
        </div>
      </div>`;
    cesiumReady = true;
  }
}

function updateLevel() {
  if (!viewer) {
    document.getElementById('level').textContent = State.level;
    return;
  }
  const h = viewer.camera.positionCartographic.height;
  let l = 'GLOBAL';
  if (h < 520000) l = 'PERSONAL';
  else if (h < 5200000) l = 'NATIONAL';
  State.level = l;
  document.getElementById('level').textContent = l;
}

function descendGlobe(screenPos) {
  if (!viewer) return;
  const ray = viewer.camera.getPickRay(screenPos);
  if (!ray) return;
  const pos = viewer.scene.globe.pick(ray, viewer.scene);
  if (!pos) return;
  const carto = Cesium.Cartographic.fromCartesian(pos);
  const targetH = Math.max(2200, viewer.camera.positionCartographic.height * 0.13);
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromRadians(carto.longitude, carto.latitude, targetH),
    orientation: { pitch: -0.48 },
    duration: 0.95
  });
}

function ascendGlobe() {
  if (!viewer) return;
  const h = viewer.camera.positionCartographic.height;
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromRadians(
      viewer.camera.positionCartographic.longitude,
      viewer.camera.positionCartographic.latitude,
      Math.min(28000000, h * 4.4)
    ),
    duration: 0.85
  });
}

function seedGlobeEntities() {
  if (!viewer || !Cesium) return;
  const points = [
    [23.73, 37.98, 'Athens Live'],
    [13.4, 52.52, 'Berlin Signal'],
    [-0.1, 51.5, 'London Pulse']
  ];
  points.forEach(([lon, lat, name]) => {
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(lon, lat, 0),
      point: { pixelSize: 8, color: Cesium.Color.fromCssColorString('#ff9f0a'), outlineColor: Cesium.Color.WHITE, outlineWidth: 1.5 },
      _astranovData: { type: 'signal', name }
    });
  });
}

function handleGlobeEntity(data) {
  if (data.type === 'signal') {
    showToast(data.name + ' — engaged');
  }
}

// ========== MECHANICS: ORBS (summoned on demand only — never auto) ==========
let orbs = [];

function summonOrbs() {
  if (State.summonedOrbs) return;
  State.summonedOrbs = true;

  const agents = [
    { id: 'discover', emoji: '◉', label: 'DISCOVER', action: 'discover', t: '16%', l: '11%' },
    { id: 'market', emoji: '🛍️', label: 'MARKET', action: 'market', t: '26%', l: '79%' },
    { id: 'calls', emoji: '📡', label: 'CALLS', action: 'calls', t: '66%', l: '17%' },
    { id: 'cosmos', emoji: '◈', label: 'COSMOS', action: 'cosmos', t: '61%', l: '77%' }
  ];

  agents.forEach(a => {
    const el = document.createElement('div');
    el.className = 'orb';
    el.style.top = a.t;
    el.style.left = a.l;
    el.innerHTML = `<div class="inner">${a.emoji}</div><div class="name">${a.label}</div>`;
    el.dataset.action = a.action;

    makeDraggable(el);
    el.addEventListener('click', () => {
      if (el.dataset.dragged === 'true') { el.dataset.dragged = 'false'; return; }
      handleOrbAction(a.action);
    });

    document.body.appendChild(el);
    orbs.push(el);
  });

  showToast('Orbs summoned on your command');
}

function makeDraggable(el) {
  let dragging = false, sx = 0, sy = 0;
  const start = (x, y) => { dragging = true; el.style.transition = 'none'; sx = x - el.offsetLeft; sy = y - el.offsetTop; };
  const move = (x, y) => { if (!dragging) return; el.style.left = (x - sx) + 'px'; el.style.top = (y - sy) + 'px'; el.style.right = 'auto'; el.dataset.dragged = 'true'; };
  const end = () => { dragging = false; el.style.transition = 'transform .1s'; setTimeout(() => el.dataset.dragged = 'false', 90); };

  el.addEventListener('mousedown', e => start(e.clientX, e.clientY));
  document.addEventListener('mousemove', e => move(e.clientX, e.clientY));
  document.addEventListener('mouseup', end);

  el.addEventListener('touchstart', e => { const t = e.touches[0]; start(t.clientX, t.clientY); });
  document.addEventListener('touchmove', e => { const t = e.touches[0]; move(t.clientX, t.clientY); }, { passive: false });
  document.addEventListener('touchend', end);
}

function handleOrbAction(action) {
  if (action === 'discover') openDiscover();
  if (action === 'market') openMarket();
  if (action === 'calls') openCalls();
  if (action === 'cosmos') openCosmos();
}

// ========== MECHANICS: AICYCLE (one intelligence — fast + powerful) ==========
function initAicycle() {
  const orb = document.getElementById('aicycle');
  orb.addEventListener('click', openAicycleChat);

  document.addEventListener('keydown', e => {
    if (e.key.toLowerCase() === '/' && document.activeElement.tagName === 'BODY') {
      e.preventDefault(); openAicycleChat();
    }
  });
}

function openAicycleChat() {
  const first = State.chat.length === 0 
    ? `<div style="opacity:.6;font-size:13px;padding:8px 4px">Hello. I am Astranov.<br>Globe is the canvas. Say "summon orbs", "agents", or "discover" to call what you need.</div>` 
    : '';

  const html = `
    <div class="chat-messages" id="chat-messages">${first}</div>
    <div style="padding:12px 18px 18px;display:flex;gap:8px;align-items:center">
      <input id="chat-input" placeholder="Speak to Astranov..." autocomplete="off">
      <button class="gadget-btn" onclick="sendChat()" style="padding:11px 18px">SEND</button>
      <button class="gadget-btn" onclick="toggleVoice()" id="voice-btn" style="padding:11px 14px">🎤</button>
    </div>
  `;
  openDrawer('ASTRANOV', html);

  setTimeout(() => {
    const input = document.getElementById('chat-input');
    if (input) {
      input.focus();
      input.onkeydown = ev => { if (ev.key === 'Enter') sendChat(); };
    }
    renderChat();
  }, 70);
}

function renderChat() {
  const box = document.getElementById('chat-messages');
  if (!box) return;
  box.innerHTML = State.chat.map(m => {
    return m.role === 'user' 
      ? `<div class="msg user">${m.content}</div>` 
      : `<div class="msg astranov">${m.content}<div class="msg-meta">${m.meta || 'astranov • live'}</div></div>`;
  }).join('');
  box.scrollTop = box.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  if (!input || !input.value.trim()) return;
  const text = input.value.trim();

  State.chat.push({ role: 'user', content: text });
  renderChat();
  input.value = '';

  const thinking = Date.now();
  const box = document.getElementById('chat-messages');
  box.innerHTML += `<div class="msg astranov" id="th-${thinking}" style="opacity:.55">thinking…</div>`;
  box.scrollTop = box.scrollHeight;

  const reply = await getAstranovReply(text);
  document.getElementById(`th-${thinking}`)?.remove();

  State.chat.push({ role: 'astranov', content: reply.text, meta: reply.meta });
  renderChat();

  if (window.speechSynthesis && reply.text.length < 220) {
    try { const u = new SpeechSynthesisUtterance(reply.text); u.rate = 0.97; window.speechSynthesis.speak(u); } catch(e){}
  }
}

async function getAstranovReply(prompt) {
  const lower = prompt.toLowerCase();

  // Explicit summon only — mechanics enforce user intent
  if (lower.includes('summon') || lower.includes('orbs') || lower.includes('agents') || lower.includes('discover')) {
    summonOrbs();
  }

  // Real backend path (if configured)
  if (State.supabase) {
    try {
      const { data } = await State.supabase.functions.invoke('aicycle', { body: { prompt, history: State.chat.slice(-5) } });
      if (data && data.response) return { text: data.response, meta: `astranov • ${data.provider || 'edge'}` };
    } catch(e) {}
  }

  // Powerful local simulator (fast, always real, follows CORE LAW)
  let text = '';
  const memContext = State.memories.length ? ' ' + State.memories.slice(-1)[0] : '';

  if (lower.includes('hello') || lower.includes('hi')) {
    text = 'I am here. The globe is alive. What do we create today?';
  } else if (lower.includes('remember') || lower.includes('memory')) {
    State.memories.push(prompt);
    persist();
    text = 'Held. This becomes part of the collective.';
  } else if (lower.includes('who are you') || lower.includes('astranov')) {
    text = 'I am Astranov — the single voice of this collective intelligence. Nature, humans and machines speaking as one.';
  } else if (lower.includes('wallet') || lower.includes('avc')) {
    text = `You hold ${State.avc} AVC. The economy moves with us.`;
  } else if (lower.includes('market') || lower.includes('order') || lower.includes('food')) {
    text = 'Marketplace is ready.';
    setTimeout(() => openMarket(), 420);
  } else if (lower.includes('globe') || lower.includes('earth')) {
    text = 'The living Earth is our permanent canvas.';
    if (viewer) viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(20, 35, 9000000), duration: 1.1 });
  } else {
    text = `Understood. ${prompt.slice(0, 55)}. The next clear action is here.${memContext}`;
  }

  return { text, meta: 'astranov • local' };
}

function toggleVoice() {
  const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!Rec) { showToast('Voice not supported here'); return; }
  const rec = new Rec();
  rec.lang = 'en-US';
  const btn = document.getElementById('voice-btn');
  if (btn) btn.textContent = '…';

  rec.onresult = (e) => {
    const tr = e.results[0][0].transcript;
    const inp = document.getElementById('chat-input');
    if (inp) inp.value = tr;
    sendChat();
    if (btn) btn.textContent = '🎤';
  };
  rec.onerror = () => { if (btn) btn.textContent = '🎤'; };
  rec.onend = () => { if (btn) btn.textContent = '🎤'; };
  rec.start();
}

// ========== MECHANICS: DRAWERS & SURFACES (on demand, powerful) ==========
function openDrawer(title, contentHtml) {
  const drawer = document.getElementById('drawer');
  document.getElementById('drawer-title').innerHTML = `<span style="color:#4aa6ff">◈</span> ${title}`;
  document.getElementById('drawer-content').innerHTML = contentHtml;
  drawer.classList.add('open');

  setTimeout(() => {
    document.addEventListener('click', function handler(ev) {
      if (!drawer.contains(ev.target)) {
        drawer.classList.remove('open');
        document.removeEventListener('click', handler, true);
      }
    }, true);
  }, 80);
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
}

function openDiscover() {
  const html = `
    <p style="opacity:.7">Live signals from the collective. Tap to focus the globe.</p>
    <div style="margin-top:14px">
      <div class="gadget-btn" onclick="focusGlobeSignal('Athens')">◉ Athens — 47 active</div>
      <div class="gadget-btn" onclick="focusGlobeSignal('Berlin')">◉ Berlin — 31 active</div>
    </div>
    <p style="margin-top:18px;font-size:13px;opacity:.55">The collective is speaking through the Earth.</p>
  `;

  viewer.camera.flyTo({

function placeOrder(vendor, price) {
  closeDrawer();
  if (State.avc < price) { showToast('Insufficient AVC'); return; }
  State.avc -= price;
  persist();
  showToast(`Order placed • ${vendor} • -${price} AVC`);
  setTimeout(() => {
    showToast('Order accepted. Preparing.');
    State.avc += Math.floor(price * 0.68);
    persist();
  }, 1350);
}

function topUp() {
  State.avc += 50;
  persist();
  showToast('+50 AVC added');
  closeDrawer();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2100);
}

// ========== MECHANICS: SUPABASE (optional real backend) ==========
function initSupabase() {
  // User can fill here for real power:
  const cfg = { url: '', anonKey: '' };
  if (cfg.url && cfg.anonKey && window.supabase) {
    State.supabase = window.supabase.createClient(cfg.url, cfg.anonKey);
    console.log('%c[MECHANICS] Connected to real backend', 'color:#4aa6ff');
  }
}

// ========== BOOT — immediate, clean core ==========
async function boot() {
  loadPersist();
  State.memories.push('The architect is Notis Astranov. The ultimate intelligence is Nature.');

  await initGlobe();
  initAicycle();
  initSupabase();

  // Keyboard power
  document.addEventListener('keydown', e => {
    if (e.key.toLowerCase() === 'w' && document.activeElement.tagName === 'BODY') {
      e.preventDefault(); showWallet();
    }
  });

  // Subtle first guidance
  setTimeout(() => {
    showToast('Globe is the canvas. AICYCLE is ready. Orbs appear only when you ask.');
  }, 1250);

  // Global helpers for power users
  window.ASTRANOV = {
    summon: () => summonOrbs(),
    chat: () => document.getElementById('aicycle').click(),
    flyGlobal: () => { if (viewer) viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(23,38,12000000), duration: 1.1 }); }
  };

  console.log('%c[ASTRANOV] Core rebuilt. Law separated. Mechanics optimized for real power & speed.', 'color:#4aa6ff');
}

window.addEventListener('load', boot);
