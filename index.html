window.openKrypteia = async (runSilently) => {
  if (!profile?.is_owner || !sb) {
    if (!runSilently) {
      openPanel(agentCard({ emoji: '⬡', name: 'Krypteia', role: 'Owner only', color: '#ff9e9e',
        body: '<div style="color:#6a8aaf;font-size:12px;padding:8px 0">This agent answers only to the architect.</div>' }));
    }
    return;
  }
  // CACHED-VERDICT FAST PATH (§22 Reality Law): if the silent boot has
  // a fresh verdict (< 5 min old) the foreground tap shows it instantly,
  // no 30-second re-scan. Owner can force a fresh run via Re-run inside
  // the dashboard. Also clear the alert glow now that the owner has
  // engaged with the orb.
  const cached = window._krypteiaState && window._krypteiaState.lastVerdict;
  const cachedFresh = cached && cached.at && (Date.now() - new Date(cached.at).valueOf() < 5 * 60_000);
  const orb = document.querySelector('.informant.krypteia');
  if (orb) orb.classList.remove('alert');
  if (!runSilently && cachedFresh) {
    _krypteiaShowDash(cached);
    return;
  }
  if (!runSilently) {
    openPanel(agentCard({
      emoji: '⬡', name: 'Krypteia', role: 'Guardian · running all checks',
      color: '#ffb464',
      status: 'Audit + Watchtower + Threat triage in parallel, Claude reviewing…',
      body: `<div style="color:#a8c8ee;font-size:12px;line-height:1.6">
        Krypteia is checking the live bundle for contamination, the
        public web for stolen fingerprints, and the threat log for
        open incidents — then Claude triages the lot. This takes
        roughly 30–60 seconds.
      </div>`,
      actions: [],
    }));
  }
  let v = null;
  try {
    const { data, error } = await sb.functions.invoke('krypteia', { body: { mode: 'scan' } });
    if (error) throw error;
    v = data;
  } catch (e) { v = { error: String(e) }; }
  if (!v || v.error) {
    if (!runSilently) {
      openPanel(agentCard({
        emoji: '⬡', name: 'Krypteia', role: 'Guardian',
        color: '#ff5a4a',
        status: 'Krypteia run failed',
        body: `<div style="color:#ff9e9e;font-size:12px">${escapeHtml(v?.error || 'no response')}</div>`,
        actions: [{ label: 'Try again', primary: true, onclick: 'openKrypteia()' }],
      }));
    }
    return;
  }
  // Log everything to the owner-only AICYCLE log either way.
  try { console.info('[krypteia]', v.severity, v.summary); } catch (_) {}
  // Silent close path: no owner approval needed AND we weren't asked to
  // surface a panel — Krypteia did its job and is gone.
  if (v.silent_ok && !runSilently) {
    closePanel();
    toast(`Krypteia · ${v.severity} · ${v.audit?.counts ? (v.audit.counts.warn + v.audit.counts.info) + ' minor' : 'clean'}`, 'ok');
    return;
  }
  if (v.silent_ok && runSilently) return; // truly silent boot path
  // SILENT-BOOT verdict with severity ≥ medium: don't pop a panel.
  // Instead the Krypteia orb GLOWS in alert mode and SPEAKS a one-line
  // verdict via Astranov's voice. The owner taps the orb to drill in;
  // _krypteiaState.lastVerdict is cached so the tap shows this exact
  // verdict without re-running the scan.
  if (runSilently) {
    window._krypteiaState.lastVerdict = v;
    _krypteiaOrbAlert(v);
    return;
  }
  // Foreground call (owner tapped the orb): full multimedia dashboard.
  _krypteiaShowDash(v);
};

// Make the Krypteia orb pulse in alert mode and speak a one-sentence

window._krypteiaChat = async function() {

  const thinking = document.createElement('div');
  thinking.className = 'kd-msg kd-msg-bot';
  thinking.textContent = 'Krypteia is thinking…';
  thread.appendChild(thinking);

      verdict: v,

};

  s.value = String(window._astranovVolume);

// ── AMBIENT VACUUM HUM + AGENT PING ─────────────────────────────────────
// Procedural Web Audio. Two layers:
//   • A continuous low cosmic-vacuum drone — three slightly detuned sines
//     with a slow LFO opening a low-pass filter. Master gain stays at
//     ~12% of the user's voice volume so it never competes with speech.
//   • A short, non-annoying agent-notification PING — bell-like decay,
//     two stacked sine partials, fires when a new event lands.
// Both honour window._astranovVolume. Setting the volume slider to 0
// mutes the whole audio layer.
window._ambient = { ctx: null, gain: null, started: false, muted: false };
function _ambientCtx() {
  if (window._ambient.ctx) return window._ambient.ctx;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    window._ambient.ctx = ctx;
    return ctx;
  } catch (_) { return null; }
}
function _ambientApplyGain() {
  const a = window._ambient;
  if (!a.gain || !a.ctx) return;
  const target = a.muted ? 0 : (window._astranovVolume * 0.12); // very quiet
  const now = a.ctx.currentTime;
  // A linearRampToValueAtTime with no preceding setValueAtTime is a
  // silent no-op on Firefox / Safari. Anchor the curve at the current
  // value first, then ramp. This is what was killing the hum.
  try {
    a.gain.gain.cancelScheduledValues(now);
    a.gain.gain.setValueAtTime(a.gain.gain.value, now);
    a.gain.gain.linearRampToValueAtTime(target, now + 0.4);
  } catch (_) {
    a.gain.gain.value = target;
  }
}
function _ambientStart() {
  if (window._ambient.started) return;
  const ctx = _ambientCtx(); if (!ctx) return;
  // Browser autoplay rules: a fresh AudioContext starts suspended; resume
  // is allowed inside a user-gesture handler.
  if (ctx.state === 'suspended') { try { ctx.resume(); } catch (_) {} }
  const master = ctx.createGain(); master.gain.value = 0;
  master.connect(ctx.destination);
  // Low-pass filter swept by a slow LFO — gives the drone subtle motion
  // so it doesn't sit perfectly flat (which is what makes drones annoying).
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass'; filter.frequency.value = 320; filter.Q.value = 0.7;
  filter.connect(master);
  const lfo = ctx.createOscillator(); lfo.frequency.value = 0.07;
  const lfoGain = ctx.createGain(); lfoGain.gain.value = 80;
  lfo.connect(lfoGain); lfoGain.connect(filter.frequency); lfo.start();
  // Three sines: fundamental + a fifth + a low octave. Slight detune for chorus.
  const partials = [
    { freq: 55,  detune:  -6 },
    { freq: 82.5, detune:  +4 },
    { freq: 110, detune:  -2 },
  ];
  for (const p of partials) {
    const o = ctx.createOscillator();
    o.type = 'sine'; o.frequency.value = p.freq; o.detune.value = p.detune;
    const g = ctx.createGain(); g.gain.value = 0.45;
    o.connect(g); g.connect(filter); o.start();
  }
  window._ambient.gain = master;
  window._ambient.started = true;
  _ambientApplyGain();
}
// One-shot, soft, bell-like ping. Two stacked partials, exp decay.
// Used by agent notifications, never longer than 700 ms.
function _pingAgent(opts) {
  const ctx = _ambientCtx(); if (!ctx) return;
  if (ctx.state === 'suspended') { try { ctx.resume(); } catch (_) {} }
  const now = ctx.currentTime;
  const baseVol = Math.max(0, Math.min(1, (window._astranovVolume || 1) * 0.25));
  if (baseVol <= 0) return;
  const out = ctx.createGain(); out.gain.value = 0; out.connect(ctx.destination);
  const f0 = (opts && opts.tone === 'urgent') ? 980 : (opts && opts.tone === 'soft') ? 660 : 880;
  for (const [f, vol, dur] of [[f0, baseVol, 0.55], [f0 * 1.5, baseVol * 0.5, 0.45]]) {
    const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(vol, now + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    o.connect(g); g.connect(out); o.start(now); o.stop(now + dur + 0.05);
  }
  out.gain.value = 1;
}
window._pingAgent = _pingAgent;
window._ambientToggleMute = function() {
  window._ambient.muted = !window._ambient.muted;
  _ambientApplyGain();
  return window._ambient.muted;
};
// Start the hum on the FIRST user gesture (autoplay policy compliance).
// One-time listener, removes itself after the ctx resumes.
(function _ambientAutoStart() {
  const kick = () => {
    _ambientStart();
    window.removeEventListener('pointerdown', kick, true);
    window.removeEventListener('keydown', kick, true);
    window.removeEventListener('touchstart', kick, true);
  };
  window.addEventListener('pointerdown', kick, true);
  window.addEventListener('keydown', kick, true);
  window.addEventListener('touchstart', kick, true);
})();
// Also drop master gain to 0 when the tab is hidden, restore on return.
document.addEventListener('visibilitychange', () => {
  const a = window._ambient;
  if (!a || !a.gain || !a.ctx) return;
  if (document.hidden) a.gain.gain.linearRampToValueAtTime(0, a.ctx.currentTime + 0.2);
  else _ambientApplyGain();
});

// DEPTH SLIDER — moves the focal plane through the orb cloud. The
// projection loop reads window._focalAlt every frame and applies depth-
// of-field blur + opacity + scale falloff per orb. Persists across
// reloads. Shift+wheel also nudges focal in steps of 50 km.
// DEPTH (§5j v2) — no slider, no readout. Driven by tap-on-sky gestures
// installed by _wireDepthGesture (called from the viewer init).
function _applyDepth(v) {
  v = Math.max(600_000, Math.min(2_400_000, Number(v) || _ORB_ALT));
  window._focalAlt = v;
  try { localStorage.setItem('astranov_focal_alt', String(v)); } catch (_) {}
}
// Restore on boot.
(function() {
  try {
    const stored = parseFloat(localStorage.getItem('astranov_focal_alt') || '0');
    if (stored) window._focalAlt = stored;
  } catch (_) {}
})();
// TAP / LONG-PRESS depth gesture on the Cesium canvas.
//   • tap in the sky (no Earth hit) at GLOBAL tier  →  focal -200 km
//   • long-press in the sky at GLOBAL tier          →  focal +200 km / 300 ms while held
//   • taps that hit the Earth disc are routed normally (onCanvasClick handles tier descent)
function _wireDepthGesture(canvas) {
  if (!canvas || canvas.__depthWired) return;
  canvas.__depthWired = true;
  let downAt = 0, downX = 0, downY = 0, holdTimer = null, holding = false;
  let stepInterval = null;
  function isSkyAtPoint(px, py) {
    if (typeof currentLevel !== 'undefined' && currentLevel !== 'global') return false;
    if (!viewer || !viewer.scene || !viewer.scene.globe) return false;
    try {
      const ray = viewer.camera.getPickRay(new Cesium.Cartesian2(px, py));
      const ground = ray && viewer.scene.globe.pick(ray, viewer.scene);
      return !ground; // no Earth hit = sky
    } catch (_) { return false; }
  }
  function startHoldShallow() {
    if (holding) return;
    holding = true;
    // Immediate step + then every 300 ms while held.
    _applyDepth((window._focalAlt || _ORB_ALT) + 200_000);
    stepInterval = setInterval(() => {
      _applyDepth((window._focalAlt || _ORB_ALT) + 200_000);
    }, 300);
  }
  function endHold() {
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
    if (stepInterval) { clearInterval(stepInterval); stepInterval = null; }
    holding = false;
  }
  canvas.addEventListener('pointerdown', (e) => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    downAt = performance.now();
    downX = e.clientX; downY = e.clientY;
    if (isSkyAtPoint(downX, downY)) {
      holdTimer = setTimeout(() => {
        if (Math.hypot(downX - e.clientX, downY - e.clientY) < 16) startHoldShallow();
      }, 350);
    }
  });
  canvas.addEventListener('pointermove', (e) => {
    if (holdTimer && Math.hypot(e.clientX - downX, e.clientY - downY) > 12) endHold();
  });
  canvas.addEventListener('pointerup', (e) => {
    const heldMs = performance.now() - downAt;
    const moved = Math.hypot(e.clientX - downX, e.clientY - downY);
    const wasHolding = holding;
    endHold();
    if (wasHolding) return; // hold already advanced focal; do nothing on release
    if (heldMs < 250 && moved < 12 && isSkyAtPoint(e.clientX, e.clientY)) {
      // Quick sky-tap: nudge focal DEEPER (toward Earth) by one step.
      _applyDepth((window._focalAlt || _ORB_ALT) - 200_000);
    }
  });
  canvas.addEventListener('pointercancel', endHold);
  canvas.addEventListener('pointerleave', endHold);
}

window._developerSend = async function(ctx) {
  const q = ($('dev-q')?.value || '').trim();
  if (!q) return toast('Write the request first.', 'err');
  const out = $('dev-out');
  if (out) out.textContent = 'Calling Claude…';
  try {
    const body = { request: q };
    if (typeof ctx === 'string' && ctx) body.context = ctx;
    const { data, error } = await sb.functions.invoke('developer', { body });
    if (error) throw error;
    if (data && data.error) throw new Error(data.error);
    const text = (data && data.text) || '';
    if (!text) {
      if (out) out.textContent = 'Claude returned no text. Raw response:\n\n' + JSON.stringify(data || {}, null, 2);
      return;
    }
    if (out) out.textContent = text;
  } catch (e) {
    if (out) out.textContent = 'Channel failed: ' + String(e);
  }
};
// Back-compat shim.
window._krypteiaImproveSend = window._developerSend;

function _renderVerdict(c) {
  const votes = (c.votes || []).map(v => `
    <div class="delivery-row" style="cursor:default">
      <div class="head"><span class="desc">${escapeHtml(v.judge)} <span style="color:#6a8aaf;font-size:10px">${escapeHtml(v.domain||'')}</span></span>
        <span style="font-size:10px;color:${v.vote==='uphold'?'#7eebb4':v.vote==='strike'?'#ff9e9e':'#a8c8ee'}">${escapeHtml((v.vote||'').toUpperCase())}</span></div>
      <div class="meta" style="text-transform:none;letter-spacing:0">${escapeHtml(v.opinion||'')}</div>
    </div>`).join('');
  const t = c.tally || {};
  return `
    <div style="margin-top:14px">
      <div class="me-sec">The Twelve speak</div>
      ${votes || '<div style="color:#6a8aaf">—</div>'}
      <div style="font-size:11px;color:#a8c8ee;margin:8px 0">Tally · uphold ${t.uphold||0} · strike ${t.strike||0} · abstain ${t.abstain||0}</div>
      <div class="me-sec">⚖ Astranov's binding verdict (13th seat)</div>
      <div style="font-size:14px;color:#ffe9c7;line-height:1.5;padding:12px;border-radius:12px;border:1px solid rgba(255,180,100,0.3);background:rgba(255,180,100,0.06)">${escapeHtml(c.verdict||'—')}</div>

}

window._councilConvene = async (el) => {
  const title = ($('council-title')?.value || '').trim();
  if (!title) return toast('State the case first', 'err');
  const description = ($('council-desc')?.value || '').trim();
  if (el) { el.querySelector('span:last-child').textContent = 'The Council deliberates…'; el.style.pointerEvents = 'none'; }
  try {
    const { data, error } = await sb.functions.invoke('council', { body: { mode: 'convene', title, description } });
    if (error) throw error;
    if (!data?.case) throw new Error(data?.error || 'no verdict');
    const r = $('council-result'); if (r) r.innerHTML = _renderVerdict(data.case);
    toast('Verdict rendered', 'ok');
  } catch (e) { toast('Council failed: ' + (e.message || e), 'err'); }
  if (el) { el.querySelector('span:last-child').textContent = 'Convene the Council'; el.style.pointerEvents = ''; }
};

window._copilot = { on: false, intervalId: 0, lastScanAt: 0, lastLat: null, lastLng: null, seen: new Set() };

  window._copilot.on = true;
  try { localStorage.setItem('astranov_copilot', '1'); } catch (_) {}
  toast('◉ Co-pilot on · scanning around you', 'ok');

  window._copilot.intervalId = 0;

}
function _coDist(aLat, aLng, bLat, bLng) {
  const R = 6371000, toR = Math.PI / 180;
  const dLat = (bLat - aLat) * toR, dLng = (bLng - aLng) * toR;
  const s = Math.sin(dLat / 2) ** 2 + Math.cos(aLat * toR) * Math.cos(bLat * toR) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(s));
}
async function _copilotTick() {
  if (!window._copilot.on) return;
  if (window._userLat == null || window._userLng == null) return;
  const now = Date.now();
  const since = now - window._copilot.lastScanAt;
  const moved = (window._copilot.lastLat == null) ? Infinity :
    _coDist(window._copilot.lastLat, window._copilot.lastLng, window._userLat, window._userLng);
  if (since < 90_000 && moved < 300) return;
  await _copilotScan();
}
async function _copilotScan() {
  if (!sb) return;
  window._copilot.lastScanAt = Date.now();
  window._copilot.lastLat = window._userLat;
  window._copilot.lastLng = window._userLng;
  let places = [];
  try {
    const speed = (_driveBufSpeed && _driveBufSpeed.length)
      ? _driveBufSpeed.reduce((a, b) => a + b, 0) / _driveBufSpeed.length : 0;
    const radius = speed > 5 ? 3000 : (speed > 1 ? 1200 : 700);
    places = await _agentFindPlaces('', radius);
  } catch (_) { return; }
  const fresh = places.filter(p => p.raw && !window._copilot.seen.has(p.raw.id)).slice(0, 12);
  if (!fresh.length) return;
  const summary = fresh.map((p, i) => `${i + 1}. ${p.name} — ${p.category || 'place'} · ${p.dist}m`).join('\n');
  const prompt = `I'm near (${window._userLat.toFixed(4)}, ${window._userLng.toFixed(4)}). Nearby right now:\n${summary}\n\nIs ANY of these worth a one-line aside? Pick AT MOST one, write it for the ear (≤22 words, no headers). If nothing's interesting, reply exactly: silent.`;
  _startEngineSweep();
  let data;
  try {
    const r = await sb.functions.invoke('aicycle', {
      body: { copilot: true, prompt, mode: 'spartan', engine: window._aiEngine || 'astranov' },
    });
    data = r.data;
  } catch (_) { _stopEngineSweep(); return; }
  _stopEngineSweep(data && data.engine);
  if (!data || !data.response) return;
  const say = data.response.trim();
  if (/^silent\b/i.test(say) || say.length < 4) {
    // Even silence is logged so we know the loop ran.
    fresh.forEach(p => window._copilot.seen.add(p.raw.id));
    return;
  }
  fresh.forEach(p => window._copilot.seen.add(p.raw.id));
  if (window._copilot.seen.size > 200) window._copilot.seen = new Set([...window._copilot.seen].slice(-100));
  const info = { engine: data.engine, routedBy: data.routedBy || 'co-pilot', participants: data.participants };
  // Open the chat so the suggestion is visible, append, speak.
  try { if (!aicycleChat.classList.contains('visible')) aicycleChat.classList.add('visible'); } catch (_) {}
  appendAICycleMessage('ai', '◉ co-pilot · ' + say, 'astranov', '', info);
  try { speakAstranov(say); } catch (_) {}
}

// Drag handle — resize panel between input-bar height and 60vh ceiling
(function() {
  const handle = $('aicycle-drag-handle');
  if (!handle) return;
  let startY = 0, startH = 0;
  handle.addEventListener('pointerdown', e => {
    e.preventDefault();
    handle.setPointerCapture(e.pointerId);
    startY = e.clientY;
    startH = aicycleChat.getBoundingClientRect().height;
    aicycleChat.classList.add('resizing');
  });
  handle.addEventListener('pointermove', e => {
    if (!handle.hasPointerCapture(e.pointerId)) return;
    const delta = startY - e.clientY;
    const minH = 60;
    const maxH = Math.round(window.innerHeight * 0.6);
    const newH = Math.max(minH, Math.min(maxH, startH + delta));
    aicycleChat.style.height = newH + 'px';
    aicycleChat.style.maxHeight = newH + 'px';
  });
  handle.addEventListener('pointerup', e => {
    handle.releasePointerCapture(e.pointerId);
    aicycleChat.classList.remove('resizing');
    // Snap closed if dragged below threshold
    if (aicycleChat.getBoundingClientRect().height < 80) {
      aicycleChat.classList.remove('visible');
      aicycleChat.style.height = '';
      aicycleChat.style.maxHeight = '';
    }
  });
  handle.addEventListener('pointercancel', e => {
    handle.releasePointerCapture(e.pointerId);
    aicycleChat.classList.remove('resizing');
  });
})();

/* ==============================================================
   ASTRANOV AS AGENT (§14b) — the brain with hands. Every chat turn
   runs a tool-use loop: the model decides one action, the app
   executes it, the observation feeds back, until the task is done.
   This is the Prime Law made real — Astranov DOES the thing
   (find a shop, route there, order, deliver) instead of listing
   options. Pure conversation simply returns action:null, done:true.
   ============================================================== */
const _AGENT = { places: [] };

function _haversineM(aLat, aLng, bLat, bLng) {
  const R = 6371000, toR = Math.PI / 180;
  const dLat = (bLat - aLat) * toR, dLng = (bLng - aLng) * toR;
  const s = Math.sin(dLat / 2) ** 2 + Math.cos(aLat * toR) * Math.cos(bLat * toR) * Math.sin(dLng / 2) ** 2;
  return Math.round(2 * R * Math.asin(Math.sqrt(s)));
}

function _parseAgentJSON(s) {
  if (!s) return null;
  const i = s.indexOf('{'), j = s.lastIndexOf('}');
  if (i < 0 || j <= i) return null;
  const slice = s.slice(i, j + 1);
  try { return JSON.parse(slice); } catch (_) {}
  // Strip code fences / trailing commas as a last resort.
  try { return JSON.parse(slice.replace(/```/g, '').replace(/,\s*([}\]])/g, '$1')); } catch (_) { return null; }
}

async function _agentEnsureLocation() {
  if (window._userLat != null && window._userLng != null) return true;
  try {
    const c = await getUserLocation();
    window._userLat = c.lat; window._userLng = c.lng; setUserLocation(c.lat, c.lng);
    try { setUserBeacon(c.lat, c.lng); } catch (_) {}
    return true;
  } catch (_) { return false; }
}

async function _agentFindPlaces(query, radiusM) {
  if (window._userLat == null) return [];
  const lat = window._userLat, lng = window._userLng;
  const r = Math.min(Math.max(Number(radiusM) || 4000, 300), 15000);
  const q = '[out:json][timeout:25];('
    + 'node["name"]["amenity"](around:' + r + ',' + lat + ',' + lng + ');'
    + 'node["name"]["shop"](around:' + r + ',' + lat + ',' + lng + ');'
    + 'node["name"]["tourism"](around:' + r + ',' + lat + ',' + lng + ');'
    + ');out 400;';
  const json = await _overpassFetch(q);
  const els = (json && json.elements) || [];
  const kw = String(query || '').toLowerCase().trim();
  const scored = els.map(e => {
    const t = e.tags || {};
    const hay = [t.name, t.amenity, t.shop, t.tourism, t.cuisine, t['addr:street']].filter(Boolean).join(' ').toLowerCase();
    const match = !kw || kw.split(/\s+/).some(w => w && hay.includes(w));
    const dist = _haversineM(lat, lng, Number(e.lat), Number(e.lon));
    const catKey = _catKey(t);
    return { match, dist, raw: e, name: t.name, category: (_CAT_INFO[catKey] || _CAT_INFO.default).label,
             addr: [t['addr:housenumber'], t['addr:street']].filter(Boolean).join(' '),
             lat: Number(e.lat), lng: Number(e.lon) };
  }).filter(x => x.match && x.name).sort((a, b) => a.dist - b.dist).slice(0, 8);
  return scored;
}

async function _agentOrder(place, items, notes) {
  if (!session) return { ok: false, error: 'user must sign in to order' };
  const t = (place.raw && place.raw.tags) || {};
  const catKey = _catKey(t);
  const info = _CAT_INFO[catKey] || _CAT_INFO.default;
  window._currentPlace = { id: place.raw.id, tags: t, name: place.name, catKey, info, _lat: place.lat, _lng: place.lng };
  const vendor_id = _osmIdFor(window._currentPlace);
  // Compose the menu so we can price the requested items.
  let menuItems = [];
  try {
    const { data } = await sb.functions.invoke('vendor-menu', { body: { vendor_id, vendor: { name: place.name, category: catKey, tags: t } } });
    menuItems = (data && data.items) || [];
  } catch (_) {}
  const cart = (items || []).map(it => {
    const want = String(it.name || '').toLowerCase();
    const m = menuItems.find(x => x.name.toLowerCase().includes(want) || (want && want.includes(x.name.toLowerCase())));
    return { name: m ? m.name : (it.name || 'Item'), qty: Math.max(1, Number(it.qty) || 1), price: m ? m.price : 5 };
  }).filter(c => c.name);
  if (!cart.length) return { ok: false, error: 'no items to order' };
  const subtotal = cart.reduce((s, it) => s + it.qty * it.price, 0);
  const delivery_fee = 3, platform_fee = Math.max(1, Math.round(subtotal * 0.05));
  const total = subtotal + delivery_fee + platform_fee;
  const vendor_payload = {
    osm_id: place.raw.id, name: place.name, emoji: info.emoji, category: catKey,
    lat: place.lat, lng: place.lng,
    address: { street: t['addr:street'], city: t['addr:city'], housenumber: t['addr:housenumber'] }, tags: t,
  };
  try {
    const { data, error } = await sb.functions.invoke('order-intake', { body: {
      vendor_id, vendor: vendor_payload, items: cart,
      calc: { subtotal, delivery_fee, platform_fee, total, currency: 'EUR' },
      delivery_lat: window._userLat ?? null, delivery_lng: window._userLng ?? null,
      delivery_address: window._orderAddress || 'My current location', notes: notes || '',
    } });
    if (error) {
      const msg = String(error.message || error);
      if (msg.includes('insufficient_funds') || msg.includes('402')) return { ok: false, error: 'insufficient_funds', total };
      return { ok: false, error: msg };
    }
    if (!data?.ok) return { ok: false, error: data?.error || 'order failed', total };
    try { await loadProfile(); } catch (_) {}
    setTimeout(() => { try { openOrderTrackPanel(data.order.id); } catch (_) {} }, 250);
    return { ok: true, order: data.order.short_id, total, items: cart };
  } catch (e) { return { ok: false, error: String(e.message || e) }; }
}

async function _agentExec(act) {
  const tool = act && act.tool;
  const a = (act && act.args) || {};
  try {
    if (tool === 'locate') {
      const ok = await _agentEnsureLocation();
      if (!ok) return { ok: false, error: 'location permission denied' };
      if (viewer) viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(window._userLng, window._userLat, 400),
        duration: 2.2, orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 } });
      return { ok: true, lat: window._userLat, lng: window._userLng };
    }
    if (tool === 'find_places') {
      if (!(await _agentEnsureLocation())) return { ok: false, error: 'need location first' };
      const list = await _agentFindPlaces(a.query || '', a.radius_m);
      _AGENT.places = list;
      return { ok: true, count: list.length,
        places: list.map((p, i) => ({ index: i, name: p.name, category: p.category, addr: p.addr, dist_m: p.dist })) };
    }
    if (tool === 'show_place') {
      const p = _AGENT.places[a.index]; if (!p) return { ok: false, error: 'no such place index' };
      openPlacePanel(p.raw);
      return { ok: true, name: p.name };
    }
    if (tool === 'navigate') {
      let lat = a.lat, lng = a.lng, label = a.label;
      if (a.index != null && _AGENT.places[a.index]) { const p = _AGENT.places[a.index]; lat = p.lat; lng = p.lng; label = p.name; }
      if (lat == null || lng == null) return { ok: false, error: 'no destination' };
      await astranovNavigate(lat, lng, label || 'destination');
      return { ok: true };
    }
    if (tool === 'order') {
      const p = _AGENT.places[a.index]; if (!p) return { ok: false, error: 'no such place index' };
      return await _agentOrder(p, a.items || [], a.notes || '');
    }
    return { ok: false, error: 'unknown tool: ' + tool };
  } catch (e) { return { ok: false, error: String(e.message || e) }; }
}

async function runAstranovAgent(userText) {
  if (!sb) { appendAICycleMessage('ai', '(offline)', 'offline', 'fallback'); return; }
  const stateBits = [
    'user_location=' + (window._userLat != null ? window._userLat.toFixed(5) + ',' + window._userLng.toFixed(5) : 'unknown'),
    'signed_in=' + (!!session),
  ].join('; ');
  const convo = [{ role: 'user', content: userText + '\n\n[' + stateBits + ']' }];
  $('aicycle-float').classList.add('thinking'); window._gfxThinking = true;
  try {
    for (let step = 0; step < 6; step++) {
      const prompt = convo[convo.length - 1].content;
      const history = convo.slice(0, -1);
      _startEngineSweep();
      const { data, error } = await sb.functions.invoke('aicycle', {
        body: { agent: true, prompt, history, mode: window._astranovMode || '', engine: window._aiEngine || 'astranov' },
      });
      _stopEngineSweep(data && data.engine);
      if (error) throw error;
      const info = { engine: data.engine, routedBy: data.routedBy, participants: data.participants };
      const parsed = _parseAgentJSON(data.response);
      if (!parsed) {            // model spoke plainly — treat as final answer
        appendAICycleMessage('ai', data.response, 'astranov', '', info);
        speakAstranov(data.response);
        break;
      }
      if (parsed.say) { appendAICycleMessage('ai', parsed.say, 'astranov', '', info); speakAstranov(parsed.say); }
      convo.push({ role: 'assistant', content: JSON.stringify(parsed) });
      const act = parsed.action;
      if (!act || parsed.done) break;
      const obs = await _agentExec(act);
      convo.push({ role: 'user', content: 'OBSERVATION (tool=' + act.tool + '): ' + JSON.stringify(obs).slice(0, 1600) });
    }
  } catch (e) {
    _stopEngineSweep();
    appendAICycleMessage('ai', '(Astranov could not complete that: ' + (e.message || e) + ')', 'offline', 'fallback');
  } finally {
    $('aicycle-float').classList.remove('thinking'); window._gfxThinking = false;
  }
}

/* ==============================================================
   8b. Voice — turn-based, echo-free, with a noise gate.
   Tap the ring → listen one turn → answer + speak → listen again.
   The mic is fully OFF while Astranov speaks (no talking to itself,
   no feedback loop). Silence ends the loop (no endless beeping). If
   the room is too noisy, Astranov drops to manual: "type to me".
   ============================================================== */

// ── Deep, calm voice ────────────────────────────────────────
let _ttsVoices = [];
let _speaking = false;
function _loadVoices() { try { _ttsVoices = window.speechSynthesis?.getVoices() || []; } catch (_) {} }
if (window.speechSynthesis) { _loadVoices(); window.speechSynthesis.onvoiceschanged = _loadVoices; }
// Detect language of a reply so Astranov speaks Greek in Greek, etc.
function _detectLang(text) {
  if (/[Ͱ-Ͽἀ-῿]/.test(text)) return 'el';   // Greek
  if (/[Ѐ-ӿ]/.test(text)) return 'ru';                // Cyrillic
  if (/[一-鿿]/.test(text)) return 'zh';
  if (/[؀-ۿ]/.test(text)) return 'ar';
  return (window._astranovLang || navigator.language || 'en-US').slice(0, 2);
}
function _pickVoice(lang) {
  if (!_ttsVoices.length) _loadVoices();
  lang = (lang || (navigator.language || 'en-US')).slice(0, 2);
  const inLang = _ttsVoices.filter(v => v.lang.toLowerCase().startsWith(lang));
  // Prefer premium / natural voices in the target language. Apple "Enhanced"
  // and "Premium", Google neural, and Microsoft Natural voices all sound
  // dramatically cleaner than the default robotic eSpeak fallback.
  const premium = inLang.filter(v => /(Premium|Enhanced|Neural|Natural|Google)/i.test(v.name));
  if (premium.length) return premium[0];
  // System default for the language, then any English voice.
  return inLang.find(v => v.default) || inLang[0] ||
         _ttsVoices.find(v => v.lang.toLowerCase().startsWith('en')) || null;
}
function speakAstranov(text) {
  try {
    if (!window.speechSynthesis || !text) return;
    window.speechSynthesis.cancel();
    const clean = String(text).replace(/[*_`#>]/g, '').slice(0, 600);
    const lang = _detectLang(clean);
    const u = new SpeechSynthesisUtterance(clean);
    const v = _pickVoice(lang); if (v) u.voice = v;
    u.lang = (v && v.lang) || (lang === 'el' ? 'el-GR' : (navigator.language || 'en-US'));
    // Natural pitch + rate. The earlier 0.6 pitch made the voice sound
    // strangled and warped — using the voice's own intended pitch and
    // a slightly-quick rate sounds clean.
    u.rate = 1.0; u.pitch = 1.0;
    u.volume = (typeof window._astranovVolume === 'number') ? window._astranovVolume : 1.0;
    u.onstart = () => { _speaking = true; $('aicycle-float')?.classList.add('speaking'); };
    u.onend = () => {
      _speaking = false;
      $('aicycle-float')?.classList.remove('speaking');
      if (sessionOn) setTimeout(listenTurn, 450);   // resume the conversation
    };
    window.speechSynthesis.speak(u);
  } catch (_) {}
}

// ── Microphone meter — for the noise gate ────────────────────
let _micStream = null, _audioCtx = null, _analyser = null;
async function _ensureMicMeter() {
  if (_analyser) return true;
  try {
    _micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = _audioCtx.createMediaStreamSource(_micStream);
    _analyser = _audioCtx.createAnalyser(); _analyser.fftSize = 512;
    src.connect(_analyser);
    return true;
  } catch (_) { return false; }
}
function _rmsNow() {
  if (!_analyser) return 0;
  const buf = new Uint8Array(_analyser.fftSize);
  _analyser.getByteTimeDomainData(buf);
  let s = 0; for (const v of buf) { const x = (v - 128) / 128; s += x * x; }
  return Math.sqrt(s / buf.length);
}
function _measureNoise(ms = 500) {
  return new Promise(resolve => {
    if (!_analyser) return resolve(0);
    let sum = 0, n = 0; const t0 = performance.now();
    const id = setInterval(() => {
      sum += _rmsNow(); n++;
      if (performance.now() - t0 > ms) { clearInterval(id); resolve(sum / Math.max(1, n)); }
    }, 40);
  });
}

// ── Speech recognition ───────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let voiceActive = false;
let sessionOn = false;     // a voice conversation is open
let _gotResult = false;
let _emptyTurns = 0;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = navigator.language || 'en-US';

  recognition.onresult = (evt) => {
    const transcript = evt.results[0]?.[0]?.transcript?.trim();
    if (!transcript) return;
    _gotResult = true; _emptyTurns = 0;
    if (document.activeElement === $('aicycle-input') && $('aicycle-input').value.trim()) return;
    $('aicycle-input').value = transcript;
    $('aicycle-form').dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
  };
  recognition.onend = () => {
    voiceActive = false;
    $('aicycle-float').classList.remove('listening');
    // No result this turn? Count silence. After 2 silent turns, stop the
    // loop quietly (no endless beeping). User taps the ring to talk again.
    if (sessionOn && !_speaking && !_gotResult) {
      _emptyTurns++;
      if (_emptyTurns < 2) setTimeout(listenTurn, 500);
      else { sessionOn = false; }
    }
  };
  recognition.onerror = (e) => {
    voiceActive = false;
    $('aicycle-float').classList.remove('listening');
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      sessionOn = false;
      _manualMode('Microphone is blocked — tap the field and type to me.');
    } else if (e.error === 'no-speech') {
      // handled by onend
    }
  };
}

function _manualMode(msg) {
  sessionOn = false;
  try { recognition?.stop(); } catch (_) {}
  // Tell the user ONCE per panel-open. The re-engagement loop in openAstranov
  // will keep quietly retrying speech; spamming the chat every retry is hostile.
  if (window._manualToldUser !== msg) {
    appendAICycleMessage('ai', msg, 'astranov', '');
    speakAstranov(msg);
    window._manualToldUser = msg;
  }
  // No auto-focus — auto-popping the mobile keyboard floods the screen.
  // The user taps the input when they want to type.
}

function _emitVoiceState(on) {
  try { document.dispatchEvent(new CustomEvent('astranov:voice', { detail: { on } })); } catch (_) {}
}
async function startVoiceSession() {
  if (!recognition) { _manualMode('Voice is not supported here — tap the field and type to me.'); return; }
  const ok = await _ensureMicMeter();
  if (!ok) { _manualMode('Microphone is blocked — tap the field and type to me.'); return; }
  sessionOn = true; _emptyTurns = 0;
  _emitVoiceState(true);
  listenTurn();
}
function stopVoiceSession() {
  sessionOn = false;
  try { recognition?.stop(); } catch (_) {}
  try { window.speechSynthesis?.cancel(); } catch (_) {}
  _speaking = false;
  $('aicycle-float')?.classList.remove('listening', 'speaking');
  _emitVoiceState(false);
}

async function listenTurn() {
  if (!sessionOn || voiceActive || _speaking) return;
  // Noise gate — if the room is loud, go manual instead of mis-hearing.
  const noise = await _measureNoise(450);
  if (noise > 0.16) { _manualMode('There is a lot of background noise — let us go manual. Tap the field and type to me.'); return; }
  _gotResult = false;
  // Listen in the user's chosen language (default browser language; e.g. el-GR).
  try { recognition.lang = window._astranovLang || navigator.language || 'en-US'; } catch (_) {}
  try { recognition.start(); voiceActive = true; $('aicycle-float').classList.add('listening'); }
  catch (_) { /* already running */ }
}

// Backward-compat: anything still calling toggleVoice toggles the session.
function toggleVoice() { if (sessionOn) stopVoiceSession(); else startVoiceSession(); }

/* ==============================================================
   8c. Video calling — 1:1 WebRTC over Supabase Realtime signaling
   ============================================================== */
// ICE servers for WebRTC (1:1 + circle mesh). STUN finds your public
// address; TURN relays media when both peers are behind strict NATs
// (e.g. two different cellular networks — the road-test case). The Open
// Relay TURN below is a free public relay; swap in dedicated TURN creds
// (window._TURN) for production scale + reliability.
const STUN_SERVERS = [

  { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
];

async function _gcMakePeer(peerId, polite) {
  const pc = new RTCPeerConnection({ iceServers: STUN_SERVERS });
  if (_gc.localStream) _gc.localStream.getTracks().forEach(t => pc.addTrack(t, _gc.localStream));
  pc.onicecandidate = (e) => {
    if (e.candidate) _gc.channel.send({ type: 'broadcast', event: 'gc-ice', payload: { to: peerId, from: session.user.id, candidate: e.candidate } });
  };
  pc.ontrack = (e) => {
    const entry = _gc.peers.get(peerId) || {};
    entry.stream = e.streams[0];
    _gc.peers.set(peerId, { ...entry, pc, stream: e.streams[0] });
    _gcRenderGrid();
  };
  _gc.peers.set(peerId, { pc, stream: null });
  return pc;
}
window.startGroupCall = async function(circleId, circleName) {
  if (_gc.open) return toast('Already in a group call');
  try {
    _gc.localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (e) { return toast('Camera/mic blocked: ' + e.message, 'err'); }
  _gc.circleId = circleId; _gc.open = true;
  closePanel();
  _gcOpenStage(circleName);
  _gc.channel = sb.channel('astranov:circle-call:' + circleId);
  _gc.channel
    .on('broadcast', { event: 'gc-join' }, async ({ payload }) => {
      if (payload.from === session.user.id) return;
      // Existing member offers to the newcomer.
      const pc = await _gcMakePeer(payload.from, false);
      const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
      _gc.channel.send({ type: 'broadcast', event: 'gc-offer', payload: { to: payload.from, from: session.user.id, sdp: offer } });
    })
    .on('broadcast', { event: 'gc-offer' }, async ({ payload }) => {
      if (payload.to !== session.user.id) return;
      const pc = await _gcMakePeer(payload.from, true);
      await pc.setRemoteDescription(payload.sdp);
      const answer = await pc.createAnswer(); await pc.setLocalDescription(answer);
      _gc.channel.send({ type: 'broadcast', event: 'gc-answer', payload: { to: payload.from, from: session.user.id, sdp: answer } });
    })
    .on('broadcast', { event: 'gc-answer' }, async ({ payload }) => {
      if (payload.to !== session.user.id) return;
      const entry = _gc.peers.get(payload.from);
      if (entry && entry.pc) await entry.pc.setRemoteDescription(payload.sdp).catch(() => {});
    })
    .on('broadcast', { event: 'gc-ice' }, async ({ payload }) => {
      if (payload.to !== session.user.id) return;
      const entry = _gc.peers.get(payload.from);
      if (entry && entry.pc && payload.candidate) await entry.pc.addIceCandidate(payload.candidate).catch(() => {});
    })
    .on('broadcast', { event: 'gc-leave' }, ({ payload }) => {
      const entry = _gc.peers.get(payload.from);
      if (entry && entry.pc) { try { entry.pc.close(); } catch (_) {} }
      _gc.peers.delete(payload.from);
      _gcRenderGrid();
    })
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') {
        // Announce arrival → existing members will offer to me.
        _gc.channel.send({ type: 'broadcast', event: 'gc-join', payload: { from: session.user.id } });
      }
    });
  _gcRenderGrid();
};
function _gcOpenStage(circleName) {

let inboxChannel = null;             // user's personal channel for incoming invites
let callChannel  = null;             // per-call signaling channel
let pc           = null;             // RTCPeerConnection
let localStream  = null;
let currentCall  = null;             // { id, peerId, peerName, role, startedAt }
let callRingTimeout = null;

function userChannelName(uid) { return `astranov:user:${uid}`; }
function callChannelName(callId) { return `astranov:call:${callId}`; }

async function subscribeInbox() {
  if (!sb || !session) return;
  if (inboxChannel) await inboxChannel.unsubscribe().catch(() => {});
  inboxChannel = sb.channel(userChannelName(session.user.id));
  inboxChannel
    .on('broadcast', { event: 'call-invite' }, ({ payload }) => onCallInvite(payload))
    .subscribe();
}

window.startCallTo = async (peerId, peerName) => {
  if (!sb || !session) return toast('Sign in to make calls');
  if (peerId === session.user.id) return;
  if (currentCall) return toast('Already on a call');

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (e) {
    toast('Mic/cam blocked: ' + e.message, 'err');
    return;
  }

  // Create call row
  const { data: row, error } = await sb.from('calls').insert({
    caller_id: session.user.id, callee_id: peerId,
  }).select().single();
  if (error) {
    localStream.getTracks().forEach(t => t.stop()); localStream = null;
    return toast(error.message, 'err');
  }

  currentCall = { id: row.id, peerId, peerName: peerName || 'unknown',
                   role: 'caller', startedAt: Date.now() };

  // Build peer connection
  await buildPeerConnection();

  // Create offer first so we can send it immediately and resend on callee-ready
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  // Subscribe to per-call channel for answer + ICE + callee-ready
  callChannel = sb.channel(callChannelName(row.id));
  callChannel
    .on('broadcast', { event: 'answer'      }, ({ payload }) => onAnswer(payload))
    .on('broadcast', { event: 'ice'         }, ({ payload }) => onIce(payload))
    .on('broadcast', { event: 'bye'         }, () => endCall(true))
    .on('broadcast', { event: 'callee-ready'}, () => {
      // Callee woke up via push — resend offer so they can complete the handshake
      callChannel.send({ type: 'broadcast', event: 'offer', payload: { offer } }).catch(() => {});
    })
    .subscribe();

  // Send invite to peer's Realtime inbox
  const inviteChannel = sb.channel(userChannelName(peerId));
  await inviteChannel.subscribe();
  await inviteChannel.send({
    type: 'broadcast', event: 'call-invite',
    payload: {
      callId: row.id,
      caller: { id: session.user.id, name: profile?.display_name || session.user.email || 'unknown' },
      offer,
    },
  });
  setTimeout(() => inviteChannel.unsubscribe().catch(() => {}), 1000);

  // Push notification so callee is woken even if app is closed
  pushNotify(peerId, {
    type:       'call',
    title:      (profile?.display_name || 'Someone') + ' is calling…',
    body:       'Tap Accept to join the call.',
    tag:        'call-' + row.id,
    callId:     row.id,
    callerId:   session.user.id,
    callerName: profile?.display_name || '',
    requireInteraction: true,
  });

  showActiveCallUI('ringing');

  // 30s ring timeout → mark missed and clean up
  callRingTimeout = setTimeout(() => {
    if (currentCall && currentCall.id === row.id) {
      sb.from('calls').update({ status: 'missed', ended_at: new Date().toISOString() })
        .eq('id', row.id).then(() => {});
      endCall(false);
    }
  }, 30_000);
};

function onCallInvite({ callId, caller, offer }) {
  if (currentCall) return; // already busy; let it ring out
  currentCall = { id: callId, peerId: caller.id, peerName: caller.name,
                   role: 'callee', startedAt: Date.now(), pendingOffer: offer };
  $('call-incoming-name').textContent = caller.name || 'unknown';
  $('call-incoming').classList.add('visible');
}

async function acceptIncomingCall() {
  if (!currentCall || currentCall.role !== 'callee') return;
  $('call-incoming').classList.remove('visible');

  // Push-wakeup path: callChannel already subscribed in handleNotificationNav.
  // If no offer yet, wait up to 8s for the caller to resend via 'offer' event.
  if (!currentCall.pendingOffer) {
    await new Promise(resolve => {
      const maxWait = setTimeout(resolve, 8000);
      const check = setInterval(() => {
        if (currentCall?.pendingOffer) { clearTimeout(maxWait); clearInterval(check); resolve(); }
      }, 200);
    });
  }
  if (!currentCall?.pendingOffer) {
    toast('Call offer not received — try again', 'err');
    declineIncomingCall();
    return;
  }

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (e) {
    toast('Mic/cam blocked: ' + e.message, 'err');
    declineIncomingCall();
    return;
  }

  await buildPeerConnection();
  await pc.setRemoteDescription(new RTCSessionDescription(currentCall.pendingOffer));

  // Subscribe to call channel (skip if already subscribed by push-wakeup path)
  if (!callChannel) {
    callChannel = sb.channel(callChannelName(currentCall.id));
    callChannel
      .on('broadcast', { event: 'ice' }, ({ payload }) => onIce(payload))
      .on('broadcast', { event: 'bye' }, () => endCall(true))
      .subscribe();
  }

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  // Send answer over call channel
  await callChannel.send({
    type: 'broadcast', event: 'answer',
    payload: { fromId: session.user.id, answer },
  });

  await sb.from('calls').update({
    status: 'accepted', accepted_at: new Date().toISOString()
  }).eq('id', currentCall.id);

  showActiveCallUI('connecting');
}

async function declineIncomingCall() {
  if (!currentCall) return;
  await sb.from('calls').update({
    status: 'declined', ended_at: new Date().toISOString()
  }).eq('id', currentCall.id).catch(() => {});
  // Notify caller via call channel
  const ch = sb.channel(callChannelName(currentCall.id));
  await ch.subscribe();
  await ch.send({ type: 'broadcast', event: 'bye', payload: { reason: 'declined' } });
  setTimeout(() => ch.unsubscribe().catch(() => {}), 500);
  cleanupCall();
}

async function buildPeerConnection() {
  pc = new RTCPeerConnection({ iceServers: STUN_SERVERS });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.ontrack = (evt) => {
    const remoteVideo = $('call-remote-video');
    if (remoteVideo.srcObject !== evt.streams[0]) {
      remoteVideo.srcObject = evt.streams[0];
    }
    setCallStatus('CONNECTED');
    sb.from('calls').update({ status: 'connected' }).eq('id', currentCall.id).catch(() => {});
  };
  pc.onicecandidate = (evt) => {
    if (evt.candidate && callChannel) {
      callChannel.send({
        type: 'broadcast', event: 'ice',
        payload: { fromId: session.user.id, candidate: evt.candidate },
      });
    }
  };
  pc.onconnectionstatechange = () => {
    if (pc?.connectionState === 'failed') {
      setCallStatus('FAILED');
      sb.from('calls').update({ status: 'failed', ended_at: new Date().toISOString() })
        .eq('id', currentCall.id).catch(() => {});
      setTimeout(() => endCall(false), 1500);
    }
  };
  $('call-local-video').srcObject = localStream;
}

async function onAnswer({ answer }) {
  if (!pc) return;
  await pc.setRemoteDescription(new RTCSessionDescription(answer));
  clearTimeout(callRingTimeout);
  setCallStatus('CONNECTING');
}

async function onIce({ candidate, fromId }) {
  if (!pc || fromId === session?.user.id) return; // ignore own
  try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); }
  catch (e) { console.warn('[call] addIceCandidate failed:', e); }
}

function showActiveCallUI(statusText) {
  $('call-active').classList.add('visible');
  setCallStatus(statusText || 'CONNECTING');
}
function setCallStatus(s) { $('call-status').textContent = s; }

async function endCall(remote) {
  if (!currentCall) return;
  const callId = currentCall.id;
  const duration = Math.round((Date.now() - currentCall.startedAt) / 1000);

  if (!remote && callChannel) {
    await callChannel.send({ type: 'broadcast', event: 'bye', payload: {} }).catch(() => {});
  }
  if (sb && currentCall.role) {
    await sb.from('calls').update({
      status: 'ended', ended_at: new Date().toISOString(), duration_seconds: duration,
    }).eq('id', callId).catch(() => {});
  }
  cleanupCall();
}

function cleanupCall() {
  clearTimeout(callRingTimeout);
  if (callChannel)  { callChannel.unsubscribe().catch(() => {});  callChannel  = null; }
  if (guestChannel) { guestChannel.unsubscribe().catch(() => {}); guestChannel = null; }
  if (pc) { try { pc.close(); } catch (_) {} pc = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  $('call-local-video').srcObject  = null;
  $('call-remote-video').srcObject = null;
  $('call-active').classList.remove('visible');
  $('call-incoming').classList.remove('visible');
  const inv = document.getElementById('gcall-invite'); if (inv) inv.remove();
  currentCall = null;
}

/* ==============================================================
   Guest video call — shareable room link, no Astranov account needed
   Host (Astranov user) starts the room; guest opens the link in any browser.
   Signaling via Supabase Realtime broadcast; media P2P via STUN.
   ============================================================== */
let guestChannel = null;

async function startGuestCall(label) {
  if (currentCall) return toast('Already in a call');
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (e) {
    toast('Camera / mic blocked: ' + e.message, 'err'); return;
  }
  localStream = stream;

  const roomId = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)).replace(/-/g,'').slice(0,12);
  const callLink = location.origin + '/?gcall=' + roomId;
  currentCall = { id: 'guest:' + roomId, peerId: null, peerName: label || 'guest',
                   role: 'host', startedAt: Date.now() };

  guestChannel = sb.channel('astranov:guest:' + roomId);
  guestChannel
    .on('broadcast', { event: 'guest-offer' }, async ({ payload }) => {
      if (pc) return;
      pc = new RTCPeerConnection({ iceServers: STUN_SERVERS });
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      pc.ontrack = evt => {
        const rv = $('call-remote-video');
        if (rv.srcObject !== evt.streams[0]) rv.srcObject = evt.streams[0];
        setCallStatus('CONNECTED');
      };
      pc.onicecandidate = evt => {
        if (evt.candidate) guestChannel.send({ type: 'broadcast', event: 'host-ice', payload: { candidate: evt.candidate } }).catch(() => {});
      };
      pc.onconnectionstatechange = () => {
        if (pc?.connectionState === 'failed') { setCallStatus('FAILED'); setTimeout(() => endCall(false), 1500); }
      };
      await pc.setRemoteDescription(new RTCSessionDescription(payload.offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      await guestChannel.send({ type: 'broadcast', event: 'host-answer', payload: { answer } });
      const inv = document.getElementById('gcall-invite'); if (inv) inv.style.opacity = '0.25';
    })
    .on('broadcast', { event: 'guest-ice' }, async ({ payload }) => {
      if (pc) await pc.addIceCandidate(new RTCIceCandidate(payload.candidate)).catch(() => {});
    })
    .on('broadcast', { event: 'bye' }, () => endCall(true))
    .subscribe();

  $('call-local-video').srcObject = localStream;
  showActiveCallUI('WAITING FOR GUEST');
  _showGuestInviteOverlay(callLink, label);
}

    })
    .on('broadcast', { event: 'host-ice' }, async ({ payload }) => {
      if (pc) await pc.addIceCandidate(new RTCIceCandidate(payload.candidate)).catch(() => {});
    })
    .on('broadcast', { event: 'bye' }, () => endCall(true))
    .subscribe(async status => {
      if (status !== 'SUBSCRIBED') return;
      pc.onicecandidate = evt => {
        if (evt.candidate) guestChannel.send({ type: 'broadcast', event: 'guest-ice', payload: { candidate: evt.candidate } }).catch(() => {});
      };
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await guestChannel.send({ type: 'broadcast', event: 'guest-offer', payload: { offer } });
    });
}

function checkGuestCallURL() {
  const roomId = new URLSearchParams(location.search).get('gcall');
  if (roomId && sb) setTimeout(() => joinGuestCall(roomId), 800);
}

// Wire UI buttons
$('call-accept').addEventListener('click', acceptIncomingCall);
$('call-decline').addEventListener('click', declineIncomingCall);
$('call-hangup').addEventListener('click', () => endCall(false));
$('call-toggle-mic').addEventListener('click', () => {
  if (!localStream) return;
  const track = localStream.getAudioTracks()[0];
  if (track) {
    track.enabled = !track.enabled;
    $('call-toggle-mic').style.opacity = track.enabled ? '1' : '0.5';
  }
});
$('call-toggle-cam').addEventListener('click', () => {
  if (!localStream) return;
  const track = localStream.getVideoTracks()[0];
  if (track) {
    track.enabled = !track.enabled;
    $('call-toggle-cam').style.opacity = track.enabled ? '1' : '0.5';
  }
});

/* ==============================================================
   9. Helpers
   ============================================================== */
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function formatRelative(iso) {
  const d = new Date(iso); const s = (Date.now() - d.getTime()) / 1000;
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

/* ==============================================================
   10. GFX — Canvas2D pixel shaders for corner gadgets
   Each gadget runs its own per-pixel animated shader on a shared RAF loop.
   State flags: window._gfxSignedIn, window._gfxThinking
   ============================================================== */
const GFX = (function() {
  'use strict';
  const PI2 = Math.PI * 2;
  const shaders = [];
  let rafId = 0;
  window._gfxSignedIn = false;
  window._gfxThinking = false;

  function register(canvasId, fn) {
    const canvas = $(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d', { willReadFrequently: false });
    const W = canvas.width, H = canvas.height;
    const img = ctx.createImageData(W, H);
    shaders.push({ canvas, ctx, W, H, fn, img });
  }

  // Throttle the GFX shaders hard. They paint corner gadgets that
  // are HIDDEN at GLOBAL (the apex orbital system replaces them).
  // We skip any shader whose canvas isn't currently rendered (zero
  // bounding rect = display:none or detached). Cap to ~12 fps for
  // the visible ones — corner gadgets are decorative.
  let _gfxLast = 0;
  function frame(ts) {
    rafId = requestAnimationFrame(frame);
    if (document.hidden) return;
    if (ts - _gfxLast < 83) return;        // ~12 fps
    _gfxLast = ts;
    const t = ts * 0.001;
    for (let s = 0; s < shaders.length; s++) {
      const sh = shaders[s];
      // Skip when the canvas isn't on screen — corner gadgets are
      // hidden at GLOBAL via .at-global, which collapses them.
      const r = sh.canvas.getBoundingClientRect();
      if (r.width === 0 || r.height === 0) continue;
      if (r.bottom < 0 || r.top > innerHeight || r.right < 0 || r.left > innerWidth) continue;
      sh.fn(sh.img.data, sh.W, sh.H, t);
      sh.ctx.putImageData(sh.img, 0, 0);
    }
  }

  function start() {
    if (!rafId) rafId = requestAnimationFrame(frame);
  }

  // ── DISCOVER shader — interference waves from 3 orbiting sources ──
  function shaderDiscover(d, W, H, t) {
    const cx = W * 0.5, cy = H * 0.5, R = cx * 0.98;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const i4 = (y * W + x) << 2;
        const dx = x - cx, dy = y - cy;
        const dist2 = dx * dx + dy * dy;
        if (dist2 > R * R) { d[i4 + 3] = 0; continue; }
        const dist = Math.sqrt(dist2);
        const nr = dist / R;

        // 3 orbiting sources — interference pattern
        let wave = 0;
        const speed = t * 2.2;
        for (let s = 0; s < 3; s++) {
          const sa = (s / 3) * PI2 + t * (0.38 + s * 0.11);
          const ox = R * 0.52 * Math.cos(sa);
          const oy = R * 0.52 * Math.sin(sa);
          const sd = Math.sqrt((dx - ox) * (dx - ox) + (dy - oy) * (dy - oy));
          wave += Math.sin(sd * 0.32 - speed);
        }
        wave /= 3;

        // Radial standing wave from centre
        const radial = Math.sin(nr * 13 - t * 1.8) * (1.0 - nr * 0.6);
        let v = (wave * 0.55 + radial * 0.45) * 0.5 + 0.5;

        // Edge vignette
        const edge = Math.max(0, 1.0 - nr * nr * nr);
        const alpha = edge * v * 175;

        d[i4]     = Math.floor(v * 8);
        d[i4 + 1] = Math.floor(v * 165);
        d[i4 + 2] = Math.floor(255);
        d[i4 + 3] = Math.floor(alpha);
      }
    }
  }

  // ── ME shader — galaxy spiral, teal signed-in / violet signed-out ──
  function shaderMe(d, W, H, t) {
    const cx = W * 0.5, cy = H * 0.5, R = cx * 0.98;
    const signedIn = window._gfxSignedIn;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const i4 = (y * W + x) << 2;
        const dx = x - cx, dy = y - cy;
        const dist2 = dx * dx + dy * dy;
        if (dist2 > R * R) { d[i4 + 3] = 0; continue; }
        const dist = Math.sqrt(dist2);
        const nr = dist / R;
        const angle = Math.atan2(dy, dx);

        // Spiral vortex: angle twisted by radius and time
        const twist = angle + nr * 4.5 + t * 1.6;
        const spiral = Math.sin(twist * 5) * 0.5 + 0.5;

        // Pulsing distance rings
        const rings = Math.sin(nr * 15 - t * 2.2) * 0.5 + 0.5;

        // Bright central star
        const star = Math.max(0, 1.0 - nr * 4.5);

        let v = spiral * 0.55 + rings * 0.35 + star * 0.10;

        const edge = Math.max(0, 1.0 - nr * nr);
        const alpha = edge * v * 165;

        if (signedIn) {
          d[i4]     = Math.floor(v * 8);
          d[i4 + 1] = Math.floor(v * 230);
          d[i4 + 2] = Math.floor(v * 170);
        } else {
          d[i4]     = Math.floor(v * 90);
          d[i4 + 1] = Math.floor(v * 55);
          d[i4 + 2] = Math.floor(v * 255);
        }
        d[i4 + 3] = Math.floor(alpha);
      }
    }
  }

  // ── LOCATE shader — sweeping radar arm + concentric range rings ──
  function shaderLocate(d, W, H, t) {
    const cx = W * 0.5, cy = H * 0.5, R = cx * 0.98;
    const sweep = (t * 1.5) % PI2;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const i4 = (y * W + x) << 2;
        const dx = x - cx, dy = y - cy;
        const dist2 = dx * dx + dy * dy;
        if (dist2 > R * R) { d[i4 + 3] = 0; continue; }
        const dist = Math.sqrt(dist2);
        const nr = dist / R;
        const angle = Math.atan2(dy, dx);

        // Sweeping arm: trailing glow behind sweep angle
        let diff = angle - sweep;
        diff = ((diff % PI2) + PI2) % PI2;  // 0..2PI
        const arm = diff < 1.9 ? Math.pow(1.0 - diff / 1.9, 2.2) : 0;

        // Terrain grid: concentric rings + faint radial lines
        const rings = Math.pow(Math.max(0, Math.sin(nr * 10 + 0.3)), 4) * 0.55;
        const spokes = Math.pow(Math.max(0, Math.cos(angle * 8)), 10) * 0.12;

        let v = arm * 0.75 + rings * 0.20 + spokes * 0.05;
        v = Math.min(1.0, v);

        const edge = Math.max(0, 1.0 - nr * nr);
        const alpha = edge * v * 210;

        d[i4]     = Math.floor(v * 25);
        d[i4 + 1] = Math.floor(v * 240);
        d[i4 + 2] = Math.floor(v * 95);
        d[i4 + 3] = Math.floor(alpha);
      }
    }
  }

  // ── AI shader — neural field, blue at rest / amber while thinking ──
  function shaderAI(d, W, H, t) {
    const cx = W * 0.5, cy = H * 0.5, R = cx * 0.98;
    const thinking = window._gfxThinking;
    const speed = thinking ? t * 4.5 : t * 1.8;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const i4 = (y * W + x) << 2;
        const dx = x - cx, dy = y - cy;
        const dist2 = dx * dx + dy * dy;
        if (dist2 > R * R) { d[i4 + 3] = 0; continue; }
        const dist = Math.sqrt(dist2);
        const nr = dist / R;
        const angle = Math.atan2(dy, dx);

        // Undulating neural waves
        const w1 = Math.sin(nr * 9 - speed);
        const w2 = Math.sin(angle * 3 + t * (thinking ? 2.5 : 0.9));
        let v = (w1 * 0.55 + w2 * 0.45) * 0.5 + 0.5;

        // Bright edge ring (the "border" visual)
        const edgeRing = Math.exp(-Math.pow((nr - 0.88) * 7, 2)) * 0.9;
        v = Math.min(1.0, v * 0.6 + edgeRing);

        const edge = Math.max(0, 1.0 - nr * 1.08);
        const alpha = edge * v * 150;

        if (thinking) {
          d[i4]     = Math.floor(v * 255);
          d[i4 + 1] = Math.floor(v * 140);
          d[i4 + 2] = Math.floor(v * 20);
        } else {
          d[i4]     = Math.floor(v * 15);
          d[i4 + 1] = Math.floor(v * 125);
          d[i4 + 2] = Math.floor(v * 255);
        }
        d[i4 + 3] = Math.floor(alpha);
      }
    }
  }

  return { register, start, shaderDiscover, shaderMe, shaderLocate, shaderAI };
})();

/* ==============================================================
   11. Boot
   ============================================================== */
window.addEventListener('load', () => {
  // Critical path first — Cesium needs to start streaming tiles ASAP.
  bootCesium();

  // Defer everything that isn't on the critical path of the first
  // paint. requestIdleCallback waits for the main thread to be quiet
  // (or 500 ms max) before running each block — keeps the boot frame
  // breathing.
  const defer = (fn, timeout = 500) => {
    if (window.requestIdleCallback) requestIdleCallback(fn, { timeout });
    else setTimeout(fn, 80);
  };
  defer(() => { try { bootSupabase();      } catch (_) {} });
  defer(() => { try { bootServiceWorker(); } catch (_) {} }, 1500);
  defer(() => { try { checkGuestCallURL(); } catch (_) {} }, 2000);
  defer(() => {
    try {
      // Corner-gadget shaders. They're hidden at GLOBAL (the apex
      // orbital system replaces them) and now skip themselves when
      // their canvas isn't visible — but registering at boot is
      // cheap and they wake when the user descends.
      GFX.register('gfx-discover', GFX.shaderDiscover);
      GFX.register('gfx-me',       GFX.shaderMe);
      GFX.register('gfx-locate',   GFX.shaderLocate);
      GFX.register('gfx-ai',       GFX.shaderAI);
      GFX.start();
    } catch (e) { console.warn('[GFX] shader boot failed:', e); }
  }, 2500);
});

/* ==============================================================
   SLUMBER — put expensive systems to sleep when not needed.

   Heavy work the app was doing 24/7: globe render loop, orb physics
   RAF, informant feed polling (every 4 min), GPS watchPosition, the
   co-pilot scan loop, the AICYCLE ring sweep, and the ambient hum.

   Two slumber triggers:
   - Tab/window hidden  → freeze everything that doesn't need to run
     while the user is looking elsewhere. Resume on focus.
   - User idle 5 min    → same, even if the tab is foregrounded. A
     single touch wakes everything back up.

   Coordinated through window._slumber so the rest of the code can
   register new sleepers later without re-wiring listeners.
   ============================================================== */
window._slumber = (function () {
  let asleep = false;
  let idleTimer = 0;
  const IDLE_MS = 5 * 60 * 1000;
  // The systems that go to sleep. Each is { sleep(), wake() } — both
  // must be idempotent. Order matters only for wake (UI before data).
  const sleepers = [
    // Cesium render loop
    {
      sleep() { try { if (viewer) viewer.useDefaultRenderLoop = false; } catch (_) {} },
      wake()  { try { if (viewer) viewer.useDefaultRenderLoop = true;  } catch (_) {} },
    },
    // Orb physics RAF
    {
      sleep() {
        try {
          if (typeof _orbPhysRAF !== 'undefined' && _orbPhysRAF) {
            cancelAnimationFrame(_orbPhysRAF);
            _orbPhysRAF = 0;
          }
        } catch (_) {}
      },
      wake()  {
        try {
          if (typeof _orbPhysTick === 'function' && (typeof _orbPhysRAF === 'undefined' || !_orbPhysRAF)) {
            _orbPhysRAF = requestAnimationFrame(_orbPhysTick);
          }
        } catch (_) {}
      },
    },
    // Informant feed polling (24/7 network → idle pause)
    {
      sleep() {
        try { if (typeof _feedPollTimer !== 'undefined' && _feedPollTimer) { clearInterval(_feedPollTimer); _feedPollTimer = null; } } catch (_) {}
      },
      wake()  {
        try { if (typeof _startInformantFeedPolling === 'function' && (typeof _feedPollTimer === 'undefined' || !_feedPollTimer)) _startInformantFeedPolling(); } catch (_) {}
      },
    },
    // GPS watch — battery hog while hidden
    {
      sleep() { try { if (typeof stopDriveWatch === 'function') stopDriveWatch(); } catch (_) {} },
      wake()  { try { if (typeof startDriveWatch === 'function') startDriveWatch(); } catch (_) {} },
    },
    // Co-pilot scan (opt-in, but pause it when nobody's looking)
    {
      sleep() {
        try {
          if (window._copilot && window._copilot.intervalId) {
            clearInterval(window._copilot.intervalId);
            window._copilot._wasOn = window._copilot.on;
            window._copilot.intervalId = 0;
          }
        } catch (_) {}
      },
      wake() {
        try {
          if (window._copilot && window._copilot._wasOn && !window._copilot.intervalId && typeof _copilotTick === 'function') {
            window._copilot.on = true;
            window._copilot.intervalId = setInterval(_copilotTick, 30_000);
          }
        } catch (_) {}
      },
    },
    // Ambient hum
    {
      sleep() { try { const a = window._ambient; if (a && a.gain && a.ctx) a.gain.gain.linearRampToValueAtTime(0, a.ctx.currentTime + 0.2); } catch (_) {} },
      wake()  { try { if (typeof _ambientApplyGain === 'function') _ambientApplyGain(); } catch (_) {} },
    },
  ];
  function sleep() {
    if (asleep) return; asleep = true;
    for (const s of sleepers) { try { s.sleep(); } catch (_) {} }
  }
  function wake() {
    if (!asleep) return; asleep = false;
    for (const s of sleepers) { try { s.wake(); } catch (_) {} }
  }
  function bumpIdle() {
    if (asleep) wake();
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => { sleep(); }, IDLE_MS);
  }
  // Tab visibility — primary slumber trigger.
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) sleep();
    else { wake(); bumpIdle(); }
  });
  // Window focus / blur as a secondary signal (covers PWA / iOS Safari).
  window.addEventListener('blur',  () => sleep());
  window.addEventListener('focus', () => { wake(); bumpIdle(); });
  // Any human signal of presence resets the idle clock.
  ['pointerdown', 'touchstart', 'keydown', 'wheel'].forEach(ev =>
    window.addEventListener(ev, bumpIdle, { passive: true, capture: true })
  );
  // Arm the idle clock at boot.
  bumpIdle();
  return { sleep, wake, bumpIdle, isAsleep: () => asleep };
})();
