  #chat-handle::before { content: ''; width: 36px; height: 4px; border-radius: 2px;

  #chat-msgs { flex: 1; min-height: 0; overflow-y: auto; padding: 4px 16px 8px;

  .msg { margin-bottom: 10px; padding: 9px 13px; border-radius: 14px;

function formatRelative(ts) {
  if (!ts) return '';

// Haversine — meters between (lat1,lng1) and (lat2,lng2).
function distMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000, toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;

/* ============================== Cesium — trackball globe ============================== */
let viewer = null;
let _userLat = null, _userLng = null;

async function bootCesium() {
  try {
    viewer = new Cesium.Viewer('cesiumContainer', {
      animation: false, baseLayerPicker: false, fullscreenButton: false,
      vrButton: false, geocoder: false, homeButton: false, infoBox: false,
      sceneModePicker: false, selectionIndicator: false, timeline: false,
      navigationHelpButton: false, requestRenderMode: false,
      baseLayer: false, scene3DOnly: false,
      skyAtmosphere: new Cesium.SkyAtmosphere(), msaaSamples: 1,
    });
    if (viewer.cesiumWidget?.creditContainer) viewer.cesiumWidget.creditContainer.style.display = 'none';
    viewer.scene.globe.enableLighting = false;
    viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#02060d');
    try { viewer.scene.globe.dynamicAtmosphereLighting = false; } catch (_) {}
    try { viewer.scene.fog.enabled = false; } catch (_) {}
    // TRACKBALL — every Cesium input enabled. Touch devices sometimes
    // silently disable inputs; we re-assert here on every boot.
    const cc = viewer.scene.screenSpaceCameraController;
    cc.enableInputs = true; cc.enableZoom = true; cc.enableRotate = true;
    cc.enableTilt = true; cc.enableLook = true; cc.enableTranslate = true;
    cc.minimumZoomDistance = 5; cc.maximumZoomDistance = 2_000_000_000;
    viewer.resolutionScale = Math.min(1.25, window.devicePixelRatio || 1);
    viewer.scene.globe.maximumScreenSpaceError = 2.0;
    viewer.scene.globe.preloadSiblings = false;
    // REAL Earth — Esri World Imagery
    const base = new Cesium.UrlTemplateImageryProvider({
      url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      maximumLevel: 19, credit: 'Esri',
    });
    viewer.imageryLayers.addImageryProvider(base);
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(20, 35, 28_000_000),
      duration: 0,
    });
    // Click & gesture handlers
    const h = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    h.setInputAction(onCanvasClick, Cesium.ScreenSpaceEventType.LEFT_CLICK);
    h.setInputAction(onDoubleClickZoom, Cesium.ScreenSpaceEventType.LEFT_DOUBLE_CLICK);
    _bindTouchGestures(viewer.scene.canvas);
    viewer.camera.changed.addEventListener(_updatePilotOrb);
    viewer.camera.changed.raiseEventThreshold = 0.05;
    // Dismiss boot on first paint
    let hidden = false;
    const hide = () => { if (hidden) return; hidden = true; $('boot').classList.add('gone'); };
    try {
      const off = viewer.scene.postRender.addEventListener(() => {
        hide(); try { viewer.scene.postRender.removeEventListener(off); } catch (_) {}
      });
    } catch (_) { hide(); }
    setTimeout(hide, 1500);
  } catch (e) {
    console.error('[Cesium]', e);
    $('boot').classList.add('gone');
  }
}

function _cameraAlt() { return viewer ? viewer.camera.positionCartographic.height : 0; }
function _cameraLngLat() {
  if (!viewer) return [0, 0];
  const c = viewer.camera.positionCartographic;
  return [Cesium.Math.toDegrees(c.longitude), Cesium.Math.toDegrees(c.latitude)];
}

function onDoubleClickZoom(click) {
  if (!viewer) return;
  const picked = viewer.scene.pick(click.position);
  if (picked?.id?.__peerOrb || picked?.id?.__callOrb || picked?.id?.__circle || picked?.primitive?.__vendorId) return;
  const ray = viewer.camera.getPickRay(click.position);
  const cart = ray && viewer.scene.globe.pick(ray, viewer.scene);
  let lng, lat;
  if (cart) {
    const c = Cesium.Cartographic.fromCartesian(cart);
    lng = Cesium.Math.toDegrees(c.longitude); lat = Cesium.Math.toDegrees(c.latitude);
  } else { [lng, lat] = _cameraLngLat(); }
  const newAlt = Math.max(400, _cameraAlt() * 0.35);
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(lng, lat, newAlt),
    duration: 0.7,
    orientation: { heading: 0, pitch: Cesium.Math.toRadians(-65), roll: 0 },
  });
}

function zoomOutOneStep() {
  if (!viewer) return;
  const [lng, lat] = _cameraLngLat();
  const newAlt = Math.min(28_000_000, _cameraAlt() * 2.8);
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(lng, lat, newAlt),
    duration: 0.6,
  });
}

function _bindTouchGestures(canvas) {
  let t0 = 0, sy1 = 0, sy2 = 0, sx1 = 0, sx2 = 0, moved = false;
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      t0 = Date.now(); moved = false;
      sx1 = e.touches[0].clientX; sy1 = e.touches[0].clientY;
      sx2 = e.touches[1].clientX; sy2 = e.touches[1].clientY;
    }
  }, { passive: true });
  canvas.addEventListener('touchmove', (e) => {
    if (e.touches.length !== 2 || !t0) return;
    const dy = ((e.touches[0].clientY - sy1) + (e.touches[1].clientY - sy2)) / 2;
    const dx = ((e.touches[0].clientX - sx1) + (e.touches[1].clientX - sx2)) / 2;
    if (Math.abs(dy) < 6 && Math.abs(dx) < 6) return;
    moved = true;
    // Vertical-dominant drag → zoom (down = IN, up = OUT)
    if (Math.abs(dy) > Math.abs(dx) * 1.5) {
      const factor = Math.exp(-dy / 220);
      const [lng, lat] = _cameraLngLat();
      const newAlt = Math.max(400, Math.min(28_000_000, _cameraAlt() * factor));
      viewer.camera.setView({ destination: Cesium.Cartesian3.fromDegrees(lng, lat, newAlt) });
      sy1 = e.touches[0].clientY; sy2 = e.touches[1].clientY;
    }
  }, { passive: true });
  canvas.addEventListener('touchend', (e) => {
    if (t0 && !moved && e.touches.length === 0 && (Date.now() - t0) < 280) zoomOutOneStep();
    t0 = 0;
  }, { passive: true });
}

function onCanvasClick(click) {
  if (!viewer) return;
  const picked = viewer.scene.pick(click.position);
  if (picked?.id?.__callOrb) { acceptIncoming(); return; }
  if (picked?.id?.__peerOrb) {
    const p = picked.id.__peerOrb;
    if (p.is_agent) startAgentCall(p);
    else            startCall(p.id, p.display_name);
    return;
  }
  if (picked?.id?.__circle) { openCirclePanel(picked.id.__circle); return; }
  if (picked?.primitive?.__vendorId) {
    const p = vendorIndex.get(picked.primitive.__vendorId);
    if (p) openVendorPanel(p);
  }
}

async function locateMe() {
  if (!navigator.geolocation) return ipWarmup();
  return new Promise((resolve) => {
    navigator.geolocation.getCurrentPosition(
      pos => {
        _userLat = pos.coords.latitude; _userLng = pos.coords.longitude;
        maybePinMyselfHere(); maybeMoveTestPeerHere();
        resolve({ lat: _userLat, lng: _userLng });
      },
      () => ipWarmup().then((r) => { maybePinMyselfHere(); maybeMoveTestPeerHere(); resolve(r); }),
      { enableHighAccuracy: true, timeout: 10_000 }
    );
  });
}

async function ipWarmup() {
  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    if (d?.latitude) {
      _userLat = d.latitude; _userLng = d.longitude;
      return { lat: _userLat, lng: _userLng };

}

      orientation: { heading: 0, pitch: Cesium.Math.toRadians(pitchDeg), roll: 0 },
      complete: resolve, cancel: resolve,

  });

function _pushOrbsAboveDrawers() {
  let bottom = 12;
  const panel = $('panel'), chat = $('chat');
  if (panel?.classList.contains('open')) bottom = Math.max(bottom, panel.offsetHeight + 18);
  if (chat?.classList.contains('open'))  bottom = Math.max(bottom, chat.offsetHeight + 14);
  document.documentElement.style.setProperty('--orb-bottom', bottom + 'px');
}

function _bindOrbDrag(el, key) {
  if (!el) return;
  try {
    const pos = JSON.parse(localStorage.getItem(key) || 'null');
    if (pos && Number.isFinite(pos.left) && Number.isFinite(pos.top)) _applyAbsPos(el, pos.left, pos.top);
  } catch (_) {}
  let dragging = false, dx = 0, dy = 0, ox = 0, oy = 0;
  el.addEventListener('pointerdown', (e) => {
    dragging = false; dx = e.clientX; dy = e.clientY;
    const r = el.getBoundingClientRect(); ox = e.clientX - r.left; oy = e.clientY - r.top;
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove', (e) => {
    if (!el.hasPointerCapture(e.pointerId)) return;
    if (!dragging && ((e.clientX - dx)**2 + (e.clientY - dy)**2) < 36) return;
    dragging = true;
    const left = Math.max(4, Math.min(window.innerWidth  - el.offsetWidth  - 4, e.clientX - ox));
    const top  = Math.max(4, Math.min(window.innerHeight - el.offsetHeight - 4, e.clientY - oy));
    _applyAbsPos(el, left, top);
  });
  el.addEventListener('pointerup', (e) => {
    try { el.releasePointerCapture(e.pointerId); } catch (_) {}
    if (dragging) {
      try { localStorage.setItem(key, JSON.stringify({ left: el.offsetLeft, top: el.offsetTop })); } catch (_) {}
      el._suppressClick = Date.now();
    }
  });
  el.addEventListener('click', (e) => {
    if (el._suppressClick && (Date.now() - el._suppressClick) < 300) {
      e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation();
    }
  }, true);
}
function _applyAbsPos(el, left, top) {
  el.classList.add('dragged'); el.style.left = left + 'px'; el.style.top = top + 'px';
  el.style.right = 'auto'; el.style.bottom = 'auto';
}

function _bindPanelDragHandle() {
  const h = $('panel-handle'), p = $('panel'); if (!h || !p) return;
  let startY = 0, dy = 0, dragging = false;
  h.addEventListener('pointerdown', (e) => { h.setPointerCapture(e.pointerId); startY = e.clientY; dy = 0; dragging = true; p.style.transition = 'none'; });
  h.addEventListener('pointermove', (e) => { if (!dragging) return; dy = Math.max(0, e.clientY - startY); p.style.transform = `translateY(${dy}px)`; _pushOrbsAboveDrawers(); });
  h.addEventListener('pointerup', (e) => {
    dragging = false; try { h.releasePointerCapture(e.pointerId); } catch (_) {}
    p.style.transition = ''; p.style.transform = '';
    if (dy > 80) closePanel();
    setTimeout(_pushOrbsAboveDrawers, 360);
  });
}
function _bindChatDragHandle() {
  const h = $('chat-handle'); if (!h) return;
  let startY = 0, startH = 0, dragging = false;
  h.addEventListener('pointerdown', (e) => { h.setPointerCapture(e.pointerId); startY = e.clientY; startH = $('chat').getBoundingClientRect().height; dragging = true; });
  h.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const delta = startY - e.clientY;
    const newH = Math.max(60, Math.min(window.innerHeight * 0.6, startH + delta));
    $('chat').style.maxHeight = newH + 'px';
  });
  h.addEventListener('pointerup', (e) => {
    dragging = false; try { h.releasePointerCapture(e.pointerId); } catch (_) {}
    if ($('chat').getBoundingClientRect().height < 80) closeChat();
  });
}

   (a) the fallback for devices without WebGPU and (b) the deep-thinking
   escalation path. */
const LOCAL_MODEL = 'Qwen2.5-3B-Instruct-q4f16_1-MLC';
let _localEngine = null, _localLoading = false, _localReady = false;

function localBrainSupported() { return typeof navigator !== 'undefined' && 'gpu' in navigator; }

async function enableLocalBrain(auto) {
  if (_localReady)   { if (!auto) toast('Own mind already active on this device', 'ok'); return; }
  if (_localLoading) { if (!auto) toast('Own mind still loading…'); return; }
  if (!localBrainSupported()) {
    if (!auto) appendMsg('ai', 'This device has no WebGPU, so my own mind cannot run here yet. I keep answering through my organs (aicycle). Try Chrome or Edge on a computer, or iOS 18+ / Android Chrome.');

  }

  try {
    const webllm = await import('https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm/+esm');
    let lastPct = -1;
    _localEngine = await webllm.CreateMLCEngine(LOCAL_MODEL, {
      initProgressCallback: (p) => {
        const pct = Math.round((p.progress || 0) * 100);
        if (pct !== lastPct && pct % 10 === 0) { lastPct = pct; toast('Own mind: ' + pct + '%'); }
      },
    });
    _localReady = true;
    localStorage.setItem('astranov.ownmind', '1');
    appendMsg('ai', '◈ I am fully local now. My mind runs on YOUR device — no external AI in this conversation. (Deep thinking still escalates to my collective organs when you ask for it.)');

}

async function localBrainReply(prompt, opts) {
  const persona = opts?.persona;
  const sys = persona ? (LOCAL_PERSONA + '\n\n=== COUNCIL SEAT — keep the seven foundations intact ===\n' + persona) : LOCAL_PERSONA;
  const history = (opts?.history || aicycleHistory.slice(-6)).map(m => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: String(m.content).slice(0, 1200) }));
  const messages = [{ role: 'system', content: sys }, ...history, { role: 'user', content: String(prompt).slice(0, 2000) }];
  const t0 = Date.now();
  const out = await _localEngine.chat.completions.create({ messages, max_tokens: 260, temperature: 0.7 });
  const reply = (out.choices?.[0]?.message?.content || '').trim();
  if (!reply) throw new Error('empty local reply');
  return { reply, meta: `via Astranov · own mind on-device · ${((Date.now()-t0)/1000).toFixed(1)}s` };
}

function appendMsg(role, text, meta) {

  msgs.scrollTop = msgs.scrollHeight;
  return div;
}
function appendThinking() {
  const div = document.createElement('div');

  const msgs = $('chat-msgs');

async function callBrain(prompt, opts) {
  // LAW: OUR OWN MIND first — on-device weights, no external AI. The
  // aicycle Edge fn (collective organs) is the fallback for devices
  // without WebGPU and the escalation path for deep thinking.
  if (_localReady && !opts?.escalate) {
    try {
      const out = await localBrainReply(prompt, opts);
      if (!opts?.persona) {
        aicycleHistory.push({ role: 'user', content: prompt });
        aicycleHistory.push({ role: 'assistant', content: out.reply });
      }
      return out;
    } catch (e) { console.warn('[own mind] fell back to organs:', e.message || e); }
  }
  if (!sb) return { reply: '◈ Supabase SDK did not load. Reload will not fix this — network or CDN block.', meta: '', failed: true };
  const history = opts?.history || aicycleHistory.slice(-6);
  const persona = opts?.persona;
  const body = persona
    ? { prompt, history, engine: 'astranov', persona }
    : { prompt, history, engine: 'astranov' };
  if (opts?.escalate) body.escalate = true;
  try {
    const t0 = Date.now();
    const { data, error } = await sb.functions.invoke('aicycle', { body });
    if (error) throw error;
    if (data && data.error) throw new Error(data.error);
    const reply = (data && (data.response || data.text)) || '(no reply)';
    const ms    = Number(data?.latencyMs) || (Date.now() - t0);
    const label = data?.engineLabel || data?.engine || 'brain';
    const model = data?.model ? String(data.model).split('/').pop() : '';
    const meta  = `via ${label}${model ? ' · ' + model : ''} · ${(ms/1000).toFixed(1)}s`;
    if (!persona) {
      aicycleHistory.push({ role: 'user', content: prompt });
      aicycleHistory.push({ role: 'assistant', content: reply });
    }
    return { reply, meta, raw: data };
  } catch (e) {
    return { reply: '◈ Brain unreachable — ' + (e.message || e), meta: '', failed: true };
  }
}

  if (!sb || !viewer) return;
  try {
    const { data } = await sb.rpc('discoverable_peers');
    const peers = Array.isArray(data) ? data : [];
    const seen = new Set();
    for (const p of peers) {

      const ent = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(p.lng, p.lat),
        point: {

          color: c,
          outlineColor: new Cesium.CallbackProperty(() => c.withAlpha(0.25 + 0.45 * (0.5 + 0.5 * Math.sin(Date.now() / 380))), false),
          outlineWidth: new Cesium.CallbackProperty(() => 4 + 6 * (0.5 + 0.5 * Math.sin(Date.now() / 380)), false),

        label: {
          text: labelText, font: '600 12px Quicksand, sans-serif',

            position: Cesium.Cartesian3.fromDegrees(memberPts[0].lng, memberPts[0].lat),

              hierarchy: new Cesium.PolygonHierarchy(Cesium.Cartesian3.fromDegreesArray(positions)),
              material: Cesium.Color.fromCssColorString('#a98cff').withAlpha(0.18),
              outline: true,
              outlineColor: Cesium.Color.fromCssColorString('#a98cff'),
              height: 0,

            label: { text: '◈ ' + (c.name || 'Circle') + ' · ' + shape, font: '600 11px Quicksand', fillColor: Cesium.Color.fromCssColorString('#e8e0ff'), outlineColor: Cesium.Color.BLACK, outlineWidth: 2, style: Cesium.LabelStyle.FILL_AND_OUTLINE, position: Cesium.Cartesian3.fromDegrees(memberPts[0].lng, memberPts[0].lat), pixelOffset: new Cesium.Cartesian2(0, -20), showBackground: true, backgroundColor: Cesium.Color.fromCssColorString('#1a1530').withAlpha(0.7), backgroundPadding: new Cesium.Cartesian2(6, 3), distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 5_000_000), disableDepthTestDistance: Number.POSITIVE_INFINITY },
            position: Cesium.Cartesian3.fromDegrees(memberPts[0].lng, memberPts[0].lat),

let pc = null, localStream = null, callChannel = null, currentCall = null;
let _pendingIncoming = null, _inboxChannel = null;

function _spawnCallOrb(lat, lng, name) {
  _killCallOrb();
  if (!viewer || lat == null || lng == null) return false;
  _callOrb = viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(lng, lat),
    point: {
      pixelSize: new Cesium.CallbackProperty(() => 22 + 10 * (0.5 + 0.5 * Math.sin(Date.now() / 220)), false),
      color: Cesium.Color.fromCssColorString('#7eebb4'),
      outlineColor: new Cesium.CallbackProperty(() => Cesium.Color.fromCssColorString('#7eebb4').withAlpha(0.25 + 0.55 * (0.5 + 0.5 * Math.sin(Date.now() / 220))), false),
      outlineWidth: new Cesium.CallbackProperty(() => 6 + 8 * (0.5 + 0.5 * Math.sin(Date.now() / 220)), false),
      disableDepthTestDistance: Number.POSITIVE_INFINITY,
    },
    label: { text: '◈ ' + (name || 'Caller'), font: '600 14px Quicksand', fillColor: Cesium.Color.fromCssColorString('#cde7ff'), outlineColor: Cesium.Color.fromCssColorString('#020a1c'), outlineWidth: 3, style: Cesium.LabelStyle.FILL_AND_OUTLINE, pixelOffset: new Cesium.Cartesian2(0, -42), showBackground: true, backgroundColor: Cesium.Color.fromCssColorString('#020a1c').withAlpha(0.55), backgroundPadding: new Cesium.Cartesian2(8, 4), disableDepthTestDistance: Number.POSITIVE_INFINITY },
  });

function _killCallOrb() {
  if (_callOrb && viewer) { try { viewer.entities.remove(_callOrb); } catch (_) {} }
  _callOrb = null;
  clearTimeout(_callOrbTimeout); _callOrbTimeout = 0;

function onIncomingInvite(p) {
  if (currentCall) return;
  _pendingIncoming = p;
  try { closePanel(); closeChat(); } catch (_) {}
  $('inc-name').textContent = p.fromName || 'Caller';
  $('incoming').classList.add('on');
  _spawnCallOrb(p.callerLat, p.callerLng, p.fromName);
  _callOrbTimeout = setTimeout(() => { if (_pendingIncoming === p) declineIncoming(); }, 30_000);
}

async function acceptIncoming() {
  if (!_pendingIncoming) return;
  const p = _pendingIncoming; _pendingIncoming = null;
  $('incoming').classList.remove('on'); _killCallOrb();
  try { localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); }
  catch (e) { toast('Mic/cam blocked', 'err'); return; }
  currentCall = { id: p.callId, peerId: p.fromId, peerName: p.fromName, role: 'callee' };
  $('call-peer').textContent = p.fromName || 'Caller';
  $('call-status').textContent = 'connecting…';
  buildPC();
  await pc.setRemoteDescription(p.offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  callChannel = sb.channel('call:' + p.callId, { config: { broadcast: { ack: false } } });
  callChannel.on('broadcast', { event: 'ice' }, ({ payload }) => onRemoteIce(payload));
  callChannel.on('broadcast', { event: 'bye' }, () => endCall());
  callChannel.subscribe();
  await callChannel.send({ type: 'broadcast', event: 'answer', payload: answer });
  try { await sb.from('calls').update({ status: 'accepted', accepted_at: new Date().toISOString() }).eq('id', p.callId); } catch (_) {}
  showCallStage();
}
async function declineIncoming() {
  if (!_pendingIncoming) return;
  const p = _pendingIncoming; _pendingIncoming = null;
  $('incoming').classList.remove('on'); _killCallOrb();
  try {
    const ch = sb.channel('call:' + p.callId); await ch.subscribe();
    await ch.send({ type: 'broadcast', event: 'bye', payload: { reason: 'declined' } });
    ch.unsubscribe();
    await sb.from('calls').update({ status: 'declined', ended_at: new Date().toISOString() }).eq('id', p.callId);
  } catch (_) {}
}

async function startCall(peerId, peerName) {
  if (!session) return openAuthPanel();
  if (currentCall) return toast('Already on a call', 'err');
  if (peerId === session.user.id) return toast("Can't call yourself", 'err');
  try { localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); }
  catch (e) { toast('Mic/cam blocked: ' + e.message, 'err'); return; }
  let row;
  try {
    const r = await sb.from('calls').insert({ caller_id: session.user.id, callee_id: peerId }).select().single();
    if (r.error) throw r.error; row = r.data;
  } catch (e) { stopLocalStream(); return toast('Call create failed: ' + e.message, 'err'); }
  currentCall = { id: row.id, peerId, peerName, role: 'caller' };
  $('call-peer').textContent = peerName || 'Calling…';
  $('call-status').textContent = 'ringing…';
  buildPC();
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  callChannel = sb.channel('call:' + row.id, { config: { broadcast: { ack: false } } });
  callChannel.on('broadcast', { event: 'answer' }, ({ payload }) => onRemoteAnswer(payload));
  callChannel.on('broadcast', { event: 'ice' }, ({ payload }) => onRemoteIce(payload));
  callChannel.on('broadcast', { event: 'bye' }, () => endCall());
  callChannel.subscribe();
  if (_userLat == null) { try { await locateMe(); } catch (_) {} }
  const userCh = sb.channel('user:' + peerId);
  await userCh.subscribe();
  await userCh.send({
    type: 'broadcast', event: 'incoming-call',
    payload: { callId: row.id, fromId: session.user.id, fromName: (profile?.display_name || session.user.email || 'Caller'), callerLat: _userLat, callerLng: _userLng, offer },
  });
  userCh.unsubscribe();
  try { await sb.functions.invoke('push-notify', { body: { target_profile_id: peerId, type: 'call', callId: row.id, title: 'Incoming call', body: (profile?.display_name || 'Friend') + ' is calling' } }); } catch (_) {}
  clearTimeout(_outgoingTimer);
  _outgoingTimer = setTimeout(() => {
    if (currentCall && currentCall.id === row.id && pc?.connectionState !== 'connected') {
      toast('No answer from ' + (peerName || 'peer'), 'err'); endCall();
    }
  }, 30_000);
  showCallStage();
}

function buildPC() {
  pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.ontrack = (e) => {
    const r = $('call-remote'); if (r.srcObject !== e.streams[0]) r.srcObject = e.streams[0];
    $('call-status').textContent = 'connected';
  };
  pc.onicecandidate = (e) => {
    if (e.candidate && callChannel) {
      try { callChannel.send({ type: 'broadcast', event: 'ice', payload: e.candidate.toJSON() }); } catch (_) {}
    }
  };
  pc.onconnectionstatechange = () => {
    const st = pc.connectionState;
    if (st === 'connected') $('call-status').textContent = 'connected';
    else if (st === 'disconnected' || st === 'failed' || st === 'closed') endCall();
  };
  $('call-local').srcObject = localStream;
}

async function onRemoteAnswer(answer) { try { await pc.setRemoteDescription(answer); $('call-status').textContent = 'connecting…'; } catch (_) {} }
async function onRemoteIce(c) { if (!c) return; try { await pc.addIceCandidate(c); } catch (_) {} }
function showCallStage() { $('call-stage').classList.add('on'); }
function hideCallStage() { $('call-stage').classList.remove('on'); }

function endCall() {
  if (!currentCall && !pc) return;
  clearTimeout(_outgoingTimer); _outgoingTimer = 0;
  try { if (callChannel) callChannel.send({ type: 'broadcast', event: 'bye', payload: {} }); } catch (_) {}
  try { callChannel?.unsubscribe(); } catch (_) {} callChannel = null;
  try { pc?.close(); } catch (_) {} pc = null;
  stopLocalStream();
  try { _agentStream?.getTracks().forEach(t => t.stop()); } catch (_) {}
  _agentStream = null; _agentCanvas = null; _agentCtx = null; _agentCaption = '';
  $('agent-input-wrap')?.classList.remove('on');
  try { speechSynthesis.cancel(); } catch (_) {}
  if (currentCall && currentCall.role !== 'agent' && currentCall.id !== 'self-test') {
    try { sb.from('calls').update({ status: 'ended', ended_at: new Date().toISOString() }).eq('id', currentCall.id); } catch (_) {}
  }
  currentCall = null;
  _killCallOrb(); hideCallStage();
}
function stopLocalStream() {
  try { localStream?.getTracks().forEach(t => t.stop()); } catch (_) {}
  localStream = null;
  try { $('call-local').srcObject = null; } catch (_) {}
  try { $('call-remote').srcObject = null; } catch (_) {}
}

$('btn-end').addEventListener('click', endCall);
$('btn-mute').addEventListener('click', () => {

async function startAgentCall(agent) {

function _drawAgentFrame() {
  if (!currentCall || currentCall.role !== 'agent' || !_agentCtx) return;
  _agentAnim += 0.025;
  const c = _agentCanvas, ctx = _agentCtx, persona = currentCall.persona;
  const w = c.width, h = c.height;
  const g = ctx.createRadialGradient(w/2, h*0.45, 30, w/2, h*0.45, Math.max(w, h));
  g.addColorStop(0, '#0a1730'); g.addColorStop(1, '#020613');
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
  ctx.lineWidth = 2.5; ctx.shadowColor = persona.color; ctx.shadowBlur = 14;
  for (let band = 0; band < 3; band++) {
    ctx.beginPath();
    const off = band * 0.7;
    for (let x = 0; x <= w; x += 4) {
      const y = h*0.5 + Math.sin(x/40 + _agentAnim + off) * 60 * (1 - band*0.15) + Math.cos(x/26 + _agentAnim*1.3 + off) * 30;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = persona.color + (band === 0 ? '' : band === 1 ? 'aa' : '55');
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#cde7ff'; ctx.font = '700 38px Quicksand, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('◈ ' + currentCall.peerName, w/2, 110);
  ctx.font = '500 14px Quicksand, sans-serif'; ctx.fillStyle = persona.color;
  ctx.fillText(persona.remit, w/2, 140);
  if (_agentCaption) {
    ctx.fillStyle = 'rgba(207,226,255,0.92)';
    ctx.font = '500 22px Quicksand, sans-serif';
    _wrapText(ctx, _agentCaption, w/2, h*0.78, w - 80, 30);
  }
  requestAnimationFrame(_drawAgentFrame);
}
function _wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = String(text).split(/\s+/);
  let line = '', lines = [];
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  lines = lines.slice(-6);
  const top = y - (lines.length - 1) * lineHeight / 2;
  for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], x, top + i * lineHeight);
}

let _ttsPrimed = false;
function onAgentFormSubmit(e) {
  e.preventDefault();
  if (!_ttsPrimed && 'speechSynthesis' in window) {
    try { speechSynthesis.cancel(); speechSynthesis.speak(new SpeechSynthesisUtterance(' ')); } catch (_) {}
    _ttsPrimed = true;

function _pickVoice() {
  if (!('speechSynthesis' in window)) return null;
  const all = speechSynthesis.getVoices() || []; if (!all.length) return null;
  const en = all.filter(v => /^en[-_]/i.test(v.lang));
  const pool = en.length ? en : all;
  const score = (v) => {
    const n = String(v.name || ''); let s = 0;
    if (/premium|enhanced|neural|natural/i.test(n)) s += 10;
    if (/siri/i.test(n)) s += 8; if (/google/i.test(n)) s += 6;
    if (/samantha|alex|daniel|karen|tessa/i.test(n)) s += 4;
    return s;
  };
  pool.sort((a,b) => score(b) - score(a));
  return pool[0];
}

async function agentSend(rawText) {
  if (!currentCall || currentCall.role !== 'agent') return;

}

let vendorPins = null;
const vendorIndex = new Map();
let _currentVendor = null, _menu = [], _cart = [];

// Pricing — base €1/km + multipliers (LAW §11) and 3% royalty (architect's order).
const PRICING = {
  base_per_km: 1.0,     // €1/km floor
  min_fee:     3.0,     // €3 minimum delivery fee
  night_multiplier:    1.30,   // 22:00 – 06:00
  long_haul_multiplier:1.15,   // > 5 km
  platform_fee_pct:    0.03,   // 3% on every transaction — the architect's royalty
};

function _isNightLocal() {
  const h = new Date().getHours();
  return h >= 22 || h < 6;
}

// Delivery fee — Haversine × €1/km × multipliers. Returns { km, fee, breakdown }
function computeDeliveryFee(pickup, dropoff) {
  if (!pickup || !dropoff || pickup.lat == null || dropoff.lat == null) return { km: 0, fee: PRICING.min_fee, breakdown: ['min'] };
  const km = distMeters(pickup.lat, pickup.lng, dropoff.lat, dropoff.lng) / 1000;
  let fee = Math.max(PRICING.min_fee, km * PRICING.base_per_km);
  const breakdown = [`${km.toFixed(2)} km × €${PRICING.base_per_km}/km`];
  if (_isNightLocal())    { fee *= PRICING.night_multiplier;     breakdown.push('night ×' + PRICING.night_multiplier); }
  if (km > 5)             { fee *= PRICING.long_haul_multiplier; breakdown.push('long-haul ×' + PRICING.long_haul_multiplier); }
  return { km, fee: Math.round(fee * 100) / 100, breakdown };
}

function _pinColor(cat) {
  const c = String(cat || '').toLowerCase();
  if (/restaurant|cafe|fast_food|bakery|ice_cream|food/.test(c)) return '#ffaa33';
  if (/bar|pub|drink/.test(c))                                    return '#d96e6e';
  if (/pharmacy|hospital|health/.test(c))                         return '#7eebb4';
  if (/hotel|fitness|service|hairdresser/.test(c))                return '#a98cff';
  if (/shop|supermarket|grocery|convenience|store/.test(c))       return '#4aa6ff';
  return '#cde7ff';
}
function _pinEmoji(p) {
  if (p?.emoji && p.emoji !== '🎪') return p.emoji;
  const c = String(p?.category || '').toLowerCase();
  if (/cafe/.test(c))                       return '☕';
  if (/bar|pub|drink/.test(c))              return '🍷';
  if (/bakery/.test(c))                     return '🥐';
  if (/pharmacy|hospital|health/.test(c))   return '✚';
  if (/fast_food/.test(c))                  return '🍔';
  if (/restaurant|food/.test(c))            return '🍴';
  if (/supermarket|grocery|convenience|shop|store/.test(c)) return '🛒';
  if (/hotel/.test(c))                      return '🏨';
  return '◍';
}
function _makePinCanvas(emoji, color) {
  const c = document.createElement('canvas'); c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(32, 28, 4, 32, 32, 28);
  g.addColorStop(0, '#fff'); g.addColorStop(0.45, color); g.addColorStop(1, '#08163c');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(32, 32, 26, 0, Math.PI * 2); ctx.fill();
  ctx.font = '24px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(emoji, 32, 34);
  return c;
}

async function fetchNearbyVendors(lat, lng, keyword) {
  try {
    const r = await sb.from('vendors').select('*').eq('is_active', true).limit(400);
    if (r.error) throw r.error;
    // LAW: vendors with PRICE + PHOTO only. Useless listings waste map
    // space and confuse users — architect's order. The crawler can still
    // populate vendors with empty items; they simply do not render until
    // they publish a real menu with photos.
    let list = (r.data || []).filter(v =>
      v.lat && v.lng && Array.isArray(v.items) &&
      v.items.some(i => Number(i?.price) > 0 && (i?.photo || i?.image_url))
    );
    if (lat != null && lng != null) {
      list = list.map(v => ({ ...v, _dist: distMeters(lat, lng, v.lat, v.lng) }))
        .filter(v => v._dist <= 5000)
        .sort((a, b) => a._dist - b._dist);
    }
    if (keyword) {
      const k = keyword.toLowerCase();
      list.sort((a, b) => {
        const ah = JSON.stringify(a).toLowerCase().includes(k) ? 0 : 1;
        const bh = JSON.stringify(b).toLowerCase().includes(k) ? 0 : 1;
        return ah - bh;
      });
    }
    return list;
  } catch (e) { console.error('[vendors]', e); return []; }
}

function renderVendorPins(places) {
  if (!viewer) return;
  if (!vendorPins) vendorPins = viewer.scene.primitives.add(new Cesium.BillboardCollection({ scene: viewer.scene }));
  vendorPins.removeAll(); vendorIndex.clear();
  for (const p of places) {
    if (!p.lat || !p.lng) continue;
    const bb = vendorPins.add({
      position: Cesium.Cartesian3.fromDegrees(p.lng, p.lat),
      image: _makePinCanvas(_pinEmoji(p), _pinColor(p.category)),
      width: 30, height: 30,
      // Only published-with-photos reach this code path — render bright.
      scaleByDistance: new Cesium.NearFarScalar(200, 1.0, 1.2e6, 0.2),
      translucencyByDistance: new Cesium.NearFarScalar(7e5, 1.0, 1.8e6, 0),
      disableDepthTestDistance: Number.POSITIVE_INFINITY,
    });
    bb.__vendorId = p.id; vendorIndex.set(p.id, p);
  }
  viewer.scene.requestRender();
}

// LAW: crawlers evolve the system through OUR brain. The user names a

}
function renderMenu() {
  if (!_menu.length) { $('vendor-menu').textContent = 'No menu items.'; return; }
  $('vendor-menu').innerHTML = _menu.map((m, i) => {
    const photo = m.photo || m.image_url || '';
    return `
    <div class="mi" onclick="addToCart(${i})">
      ${photo ? `<img src="${escapeHtml(photo)}" style="width:54px;height:54px;border-radius:8px;object-fit:cover;flex:0 0 auto" loading="lazy" onerror="this.style.display='none'">` : ''}

function addToCart(i) {
  const m = _menu[i]; if (!m) return;
  const ex = _cart.find(x => x.name === m.name);
  if (ex) ex.qty++; else _cart.push({ name: m.name, qty: 1, price: m.price });
  renderCart();
}
function removeFromCart(i) { _cart.splice(i, 1); renderCart(); }

function renderCart() {
  const c = $('vendor-cart'), t = $('vendor-total'), b = $('btn-place');
  if (!c) return;
  if (!_cart.length) { c.innerHTML = '<p>Tap menu items to add.</p>'; t.innerHTML = ''; b.disabled = true; return; }
  c.innerHTML = _cart.map((it, i) => `
    <div class="cart-row">
      <span>${escapeHtml(it.name)} ×${it.qty}</span>
      <span>€${(it.qty * it.price).toFixed(2)} <span class="cart-x" onclick="removeFromCart(${i})">✕</span></span>
    </div>
  `).join('');
  const sub  = _cart.reduce((s, it) => s + it.qty * it.price, 0);
  const plat = Math.max(1, Math.round(sub * PRICING.platform_fee_pct));
  const pickup  = { lat: _currentVendor.lat, lng: _currentVendor.lng };
  const dropoff = { lat: _userLat, lng: _userLng };
  const fee = computeDeliveryFee(pickup, dropoff);
  const total = sub + fee.fee + plat;
  const bal = Number(profile?.eur_balance || 0);
  t.innerHTML = `
    <div class="row"><span>Subtotal</span><span>€${sub.toFixed(2)}</span></div>
    <div class="row"><span>Delivery</span><span>€${fee.fee.toFixed(2)}</span></div>
    <div class="row" style="color:rgba(168,200,238,0.6);font-size:11px"><span>${escapeHtml(fee.breakdown.join(' · '))}</span><span></span></div>
    <div class="row"><span>Platform fee</span><span>€${plat}</span></div>
    <div class="row" style="font-weight:700"><span>Total</span><span>€${total.toFixed(2)}</span></div>
    <div class="row" style="color:${bal >= total ? '#7eebb4' : '#ff9e9e'}"><span>Your balance</span><span>€${bal.toFixed(2)}</span></div>
  `;
  b.disabled = false;
  b.textContent = bal >= total ? 'Place order' : 'Top up & order';
}

async function placeOrder() {
  if (!session) return openAuthPanel();
  if (!_currentVendor || !_cart.length) return;
  const p = _currentVendor;
  const sub  = _cart.reduce((s, it) => s + it.qty * it.price, 0);
  const plat = Math.max(1, Math.round(sub * PRICING.platform_fee_pct));
  const fee  = computeDeliveryFee({ lat: p.lat, lng: p.lng }, { lat: _userLat, lng: _userLng });
  const total = sub + fee.fee + plat;
  toast('Sending order…');
  try {
    const { data, error } = await sb.functions.invoke('order-intake', { body: {
      vendor_id: p.id,
      vendor: { id: p.id, osm_id: p.osm_id || null, name: p.name, category: p.category || 'shop', lat: p.lat, lng: p.lng, address: p.address || {}, tags: p.tags || {} },
      items: _cart,
      calc: { subtotal: sub, delivery_fee: fee.fee, platform_fee: plat, total, currency: 'EUR', km: fee.km, breakdown: fee.breakdown },
      delivery_lat: _userLat, delivery_lng: _userLng, delivery_address: '', notes: '',
    }});
    if (error) throw error;
    if (!data?.ok) throw new Error(data?.error || 'order failed');
    toast('Order placed · ' + data.order.short_id, 'ok');
    _cart = [];
    try { await loadProfile(); } catch (_) {}
    setTimeout(() => openOrderTrack(data.order.id), 250);
  } catch (e) {
    const msg = String(e.message || e);
    if (msg.includes('insufficient_funds') || msg.includes('402')) {
      toast('Not enough euros — top up to order', 'err');
      try { await loadProfile(); } catch (_) {}
      setTimeout(openWalletPanel, 400);
      return;
    }
    toast('Order failed: ' + msg, 'err');
  }
}

async function openOrderTrack(orderId) {
  if (!sb || !session) return;
  const { data: o } = await sb.from('orders').select('*').eq('id', orderId).single();
  if (!o) return toast('Order not found', 'err');
  _renderOrder(o);
  const ch = sb.channel('order-' + orderId).on('broadcast', { event: 'status' }, ({ payload }) => {
    if (payload?.order_id === orderId) sb.from('orders').select('*').eq('id', orderId).single().then(({ data }) => data && _renderOrder(data));
  });
  ch.subscribe();
}
function _renderOrder(o) {

  const idx = Math.max(0, steps.indexOf(o.status));
  openPanel(`

    <div style="display:flex;gap:6px;margin:10px 0">

  const topic = ($('agora-search').value || '').trim();

  let subject = 'history';
  try {
    const out = await callBrain('Classify the topic "' + topic + '" as ONE of: gods, mythology, philosophy, science, history. Reply with ONLY that word.', { history: [] });
    const m = (out.reply || '').toLowerCase().match(/\b(gods|mythology|philosophy|science|history)\b/);

  } catch (_) {}
  toast('Crawling the agora for ' + topic + '…');

  const stub = appendThinking();
  const out = await callBrain('Tell me about ' + topic + ' in one short paragraph, faithful to the ancient sources.');
  stub.classList.remove('thinking-stub'); stub.textContent = out.reply;
  if (out.meta) { const m = document.createElement('div'); m.className = 'msg-meta'; m.textContent = out.meta; stub.appendChild(m); }

function _routedFire(line, fn) {
  appendMsg('ai', line);
  try { fn(); } catch (e) { console.error(e); }
  setTimeout(closeChat, 800);
}

function routeLocal(raw) {
  const t = (raw || '').toLowerCase().trim();
  if (/\b(news|headlines|feed|νέα|ειδήσεις)\b/.test(t))                           { _routedFire('Opening the news.', openNewsPanel); return true; }
  if (/\b(wallet|balance|money|euros|πορτοφόλι)\b/.test(t))                       { _routedFire(session ? 'Opening wallet.' : 'Sign in first.', () => session ? openWalletPanel() : openAuthPanel()); return true; }
  if (/\b(top\s*up|add money|αγορά ευρώ)\b/.test(t))                              { _routedFire(session ? 'Top up.' : 'Sign in first.', () => session ? openBuyPanel() : openAuthPanel()); return true; }
  if (/\b(drive|delivery|deliver|driver|courier|οδηγός|παράδοση)\b/.test(t))      { _routedFire(session ? 'Opening driver.' : 'Sign in first.', () => session ? openDriverPanel() : openAuthPanel()); return true; }
  if (/\b(home|globe|world|earth|σπίτι|κόσμος)\b/.test(t))                         { _routedFire('Warping home.', pilotHome); return true; }
  if (/\b(sign\s*in|log\s*in|sign\s*up|register|εγγραφή|σύνδεση)\b/.test(t))      { _routedFire('Sign-in.', openAuthPanel); return true; }
  if (/\b(sign\s*out|log\s*out|αποσύνδεση)\b/.test(t) && session)                  { _routedFire('Signing out.', signOut); return true; }
  if (/\b(people|everyone|peers?|κόσμος)\b/.test(t))                              { _routedFire('Showing everyone.', openPeoplePanel); return true; }
  if (/\b(circles?|κύκλος|κύκλοι)\b/.test(t))                                     { _routedFire('Opening circles.', openCirclesPanel); return true; }
  if (/\b(council|agents?|σύμβουλιο|πράκτορες)\b/.test(t)) {
    _routedFire('Showing the council.', () => {
      if (!viewer) return;
      viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(23.5, 38.4, 800_000), duration: 1.6, orientation: { heading: 0, pitch: Cesium.Math.toRadians(-80), roll: 0 } });
      refreshPeerOrbs();
    });
    return true;
  }
  if (/\b(diag|diagnose|status|smoke|τεστ)\b/.test(t))                            { _routedFire('Probing the pillars…', runDiag); return true; }
  if (/\b(own\s*mind|own\s*brain|local\s*brain|μυαλό)\b/.test(t))                  { enableLocalBrain(false); return true; }
  if (/\b(crawl|sweep|grow|populate|σάρωσ)\b/.test(t))                              { _routedFire('Brain steering the crawler…', () => brainCrawl(raw)); return true; }
  if (/\b(develop|roadmap|queue|build next|ανάπτυξη)\b/.test(t))                    { _routedFire('Opening the development queue.', openDevelopPanel); return true; }
  // AGORA — Foundation #2: ancient Greek gods, mythology, philosophy, science.
  if (/\b(agora|gods?|θεοί|θεός|mythology|μυθολογ|philosophy|φιλοσοφ|αρχαί|αγορά|hellenic|ελλην)\b/.test(t)) {
    const m = t.match(/\b(?:about|on|for|tell me about|πες μου για|για)\s+([a-zà-ÿα-ω][a-zà-ÿα-ω\s]{1,40})$/i);
    const q = m ? m[1].trim() : '';
    _routedFire('Opening the agora.', () => openAgoraPanel(q));
    return true;
  }
  const callMatch = t.match(/\b(?:call|ring|video|κάλεσε)\s+([a-zà-ÿα-ω][a-zà-ÿα-ω\s']{1,40}?)(?:[.,!?]|$)/i);
  if (callMatch) {
    const name = callMatch[1].trim();
    _routedFire('Calling ' + name + '.', async () => {
      if (!session) { openAuthPanel(); return; }
      const { data } = await sb.rpc('find_peer', { q: name });
      const peer = (data || [])[0];
      if (peer) {
        if (peer.is_agent) startAgentCall({ id: peer.id, display_name: peer.display_name, is_agent: true });
        else               startCall(peer.id, peer.display_name);
      } else toast('Not found', 'err');
    });
    return true;
  }
  const agentName = t.match(/\b(leonidas|onasis|athena|myrmidons?|spartans?|krypteia)\b/i);
  if (agentName) {
    const q = agentName[1];
    _routedFire('Summoning ' + q + '.', async () => {
      if (!session) { openAuthPanel(); return; }
      const { data } = await sb.rpc('find_peer', { q });
      const peer = (data || []).find(p => p.is_agent) || (data || [])[0];
      if (peer) startAgentCall({ id: peer.id, display_name: peer.display_name, is_agent: true });
      else toast('Agent not found', 'err');
    });
    return true;
  }
  const foodMatch = t.match(/\b(pizza|burger|sushi|kebab|gyros|souvlaki|coffee|tea|wine|beer|food|eat|hungry|order|drink|πίτσα|σουβλάκι|καφέ|μπύρα|φαγητ|πεινάω)\b/);
  if (foodMatch) { _routedFire('Looking for ' + foodMatch[1] + ' nearby.', () => diveToVendors(foodMatch[1])); return true; }
  if (/\b(help|commands|τι μπορείς)\b/.test(t)) {
    _routedFire('Try: news · pizza · people · circles · council · call NAME · wallet · drive · diag.', () => {});
    return true;
  }
  return false;
}

/* ============================== Voice (manual opt-in) ============================== */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null, listening = false;
if (SR) {
  recognition = new SR();
  recognition.continuous = false; recognition.interimResults = false;
  recognition.lang = navigator.language || 'en-US';
  recognition.onresult = (evt) => {
    const t = evt.results?.[0]?.[0]?.transcript?.trim();
    if (t) { $('chat-input').value = t; $('chat-form').dispatchEvent(new Event('submit', { cancelable: true, bubbles: true })); }
  };
  recognition.onend = () => { listening = false; $('btn-mic').classList.remove('listening'); };
  recognition.onerror = () => { listening = false; $('btn-mic').classList.remove('listening'); };
}
$('btn-mic').addEventListener('click', () => {
  if (!recognition) return toast('Voice not supported on this device', 'err');
  if (listening) { try { recognition.stop(); } catch (_) {} listening = false; $('btn-mic').classList.remove('listening'); return; }
  try { recognition.start(); listening = true; $('btn-mic').classList.add('listening'); } catch (_) {}
});

/* ============================== Alive at boot — senses + voice ============================== */
// Ask for the app's SENSES up front (architect's order): microphone +
// camera permission warm at boot so calls and voice start instantly
// later. Tracks are stopped immediately — we take no audio/video until
// a call actually begins.
async function warmPermissions() {
  if (!navigator.mediaDevices?.getUserMedia) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
    stream.getTracks().forEach(t => t.stop());
    toast('Mic + camera ready', 'ok');
  } catch (e) {
    // Audio-only second chance — some devices have no camera.
    try {
      const a = await navigator.mediaDevices.getUserMedia({ audio: true });
      a.getTracks().forEach(t => t.stop());
      toast('Mic ready (no camera)', 'ok');
    } catch (_) {
      toast('Mic/camera blocked — tap 🔴 or start a call to grant', 'err');
    }
  }
}

// Speak the greeting aloud. Mobile browsers may block TTS before the
// first user gesture — if blocked, we re-arm on the first tap anywhere
// so the voice still arrives. Honest behaviour, no silent failure.
let _greetSpoken = false;
function speakAloud(text) {
  if (!('speechSynthesis' in window)) return false;
  try {
    const u = new SpeechSynthesisUtterance(text);
    const v = _pickVoice(); if (v) u.voice = v;
    u.rate = 1.0; u.pitch = 1.0; u.volume = 1.0;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
    return true;
  } catch (_) { return false; }
}
function speakGreeting(text) {
  if (_greetSpoken) return;
  // Voices may not be loaded yet on first call — retry once they are.
  const tryNow = () => {
    if (_greetSpoken) return;
    const ok = speakAloud(text);
    // speechSynthesis.speak() never throws on mobile even when muted by
    // policy — verify it actually started; if not, re-arm on first tap.
    setTimeout(() => {
      if (_greetSpoken) return;
      if (speechSynthesis.speaking || speechSynthesis.pending) { _greetSpoken = true; return; }
      const once = () => {
        if (_greetSpoken) return;
        _greetSpoken = true;
        speakAloud(text);
        window.removeEventListener('pointerdown', once);
      };
      window.addEventListener('pointerdown', once, { once: true });
    }, 600);
    if (ok && (speechSynthesis.speaking || speechSynthesis.pending)) _greetSpoken = true;
  };
  if (speechSynthesis.getVoices().length) tryNow();
  else {
    speechSynthesis.onvoiceschanged = () => { tryNow(); speechSynthesis.onvoiceschanged = null; };
    setTimeout(tryNow, 800);   // fallback if onvoiceschanged never fires
  }
}

/* ============================== Boot ============================== */
window.addEventListener('load', () => {
  bootCesium();
  bootSupabase();
  ipWarmup();
  // Senses + voice — the app is ALIVE from the first second.
  setTimeout(warmPermissions, 900);
  _bindOrbDrag($('login-orb'), 'astranov.orb.login');
  _bindOrbDrag($('pilot-orb'), 'astranov.orb.pilot');
  _bindPanelDragHandle();
  _bindChatDragHandle();
  _pushOrbsAboveDrawers();
  window.addEventListener('resize', _pushOrbsAboveDrawers);
  setTimeout(refreshPeerOrbs, 1800);
  setTimeout(refreshCircleShapes, 2200);
  setInterval(refreshPeerOrbs, 25_000);
  setInterval(refreshCircleShapes, 60_000);
  setTimeout(_brainHeartbeat, 2500);
  // Own mind: resume automatically if the user enabled it before (weights
  // are already in the browser cache, so this is fast on revisit).
  if (localStorage.getItem('astranov.ownmind') === '1' && localBrainSupported()) {
    setTimeout(() => enableLocalBrain(true), 3500);
  }
  setTimeout(() => {
    openChat();
    const h = new Date().getHours();
    const tod = h < 5 ? 'Up late' : h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
    const greeting = tod + ". I'm Astranov.";
    appendMsg('ai', greeting + " Try: news · pizza · people · circles · council · call NAME · drive · diag.");
    speakGreeting(greeting + ' How can I help?');
    if (localBrainSupported() && localStorage.getItem('astranov.ownmind') !== '1') {
      appendMsg('ai', 'This device can run my OWN MIND — no external AI at all. Type "own mind" to bring me fully local (~2 GB · bilingual EN + EL one-time).');
    }
  }, 1400);
  try {
    const paid = new URL(location.href).searchParams.get('paid');
    if (paid === '1') setTimeout(() => { loadProfile().then(openWalletPanel); toast('Payment received', 'ok'); }, 900);
    if (paid === '0') setTimeout(() => toast('Payment cancelled', 'err'), 900);
  } catch (_) {}
});

window.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  if (document.activeElement?.tagName === 'INPUT' || document.activeElement?.tagName === 'TEXTAREA') { document.activeElement.blur(); return; }
  if ($('panel').classList.contains('open')) { closePanel(); return; }
  if ($('chat').classList.contains('open')) closeChat();
});

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(reg => {
    reg.update().catch(()=>{});
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (currentCall) { window._swReloadPending = true; return; }
      location.reload();
    });
  }).catch(() => {});
}
