<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ASTRANOV • AOOS</title>
<link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css">
<style>
:root { --bg:#000510; --fg:#e6f0ff; --accent:#4aa6ff; --amber:#ff9f0a; --violet:#9d7cff; }
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000510;color:#e6f0ff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;overflow:hidden}
#cesiumContainer{position:absolute;top:0;left:0;width:100%;height:100%;background:#000510}
#wordmark{position:absolute;top:18px;left:50%;transform:translateX(-50%);font-size:13px;letter-spacing:4px;font-weight:600;opacity:0.65;pointer-events:none;z-index:100}
#wordmark .a{color:#4aa6ff}
#wordmark .v{color:#ff9f0a}

/* AICYCLE — the only permanent UI */
#aicycle { position:absolute; bottom:22px; right:22px; width:72px; height:72px; border-radius:50%; background:rgba(10,15,30,0.65); border:1px solid rgba(74,166,255,0.35); backdrop-filter:blur(20px); z-index:200; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform .2s ease, box-shadow .2s; }
#aicycle:hover { transform:scale(1.06); box-shadow:0 0 28px rgba(74,166,255,0.5) }
#aicycle.thinking { animation: aipulse 1.1s infinite ease-in-out; }
#aicycle .core { width:28px;height:28px;border-radius:50%;background:#4aa6ff; box-shadow:0 0 18px #4aa6ff; }
#aicycle .label { position:absolute; bottom:-18px; font-size:9px; letter-spacing:1.5px; opacity:.6; white-space:nowrap }
@keyframes aipulse { 50% { box-shadow:0 0 38px rgba(74,166,255,0.9); } }

.orb { position:absolute; width:58px; height:58px; border-radius:50%; background:rgba(12,18,35,0.75); border:1px solid rgba(255,255,255,0.15); backdrop-filter:blur(18px); display:flex; align-items:center; justify-content:center; font-size:22px; cursor:grab; user-select:none; z-index:150; box-shadow:0 8px 30px rgba(0,0,0,0.6); transition:transform .1s ease, box-shadow .2s; }
.orb:active { cursor:grabbing; transform:scale(1.08); }
.orb .inner { text-align:center; line-height:1; }
.orb .name { position:absolute; bottom:-16px; font-size:9px; letter-spacing:1px; white-space:nowrap; opacity:.65; pointer-events:none }

.drawer { position:absolute; bottom:0; left:0; right:0; max-height:72vh; background:rgba(6,8,18,0.96); border-top:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(30px); z-index:250; transform:translateY(100%); transition:transform .35s cubic-bezier(.32,1,.23,1); display:flex; flex-direction:column; border-top-left-radius:18px; border-top-right-radius:18px; overflow:hidden; }
.drawer.open { transform:translateY(0); }
.drawer-handle { width:42px; height:4px; background:rgba(255,255,255,0.25); border-radius:3px; margin:10px auto 6px; }
.drawer-header { padding:4px 18px 12px; font-weight:600; font-size:15px; display:flex; align-items:center; gap:8px; }
.drawer-content { flex:1; overflow:auto; padding:0 18px 22px; -webkit-overflow-scrolling:touch; }

.chat-messages { flex:1; overflow:auto; padding:12px 4px; display:flex; flex-direction:column; gap:9px; }
.msg { max-width:82%; padding:9px 14px; border-radius:14px; font-size:14.5px; line-height:1.4; }
.msg.user { align-self:flex-end; background:#1a2a4a; color:#fff; border-bottom-right-radius:4px; }
.msg.astranov { align-self:flex-start; background:rgba(74,166,255,0.12); border:1px solid rgba(74,166,255,0.25); border-bottom-left-radius:4px; }
.msg-meta { font-size:10px; opacity:.45; margin-top:2px; }

input, button { font-family:inherit; }
#chat-input { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#fff; padding:12px 14px; border-radius:999px; font-size:15px; outline:none; }
#chat-input:focus { border-color:#4aa6ff; }

.gadget-btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:8px 16px; border-radius:999px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); color:#fff; font-size:13px; cursor:pointer; margin:4px 3px 4px 0; }
.gadget-btn:active { background:rgba(255,255,255,0.16); }

#level { position:absolute; top:18px; left:50%; transform:translateX(-50%); font-size:11px; letter-spacing:2px; opacity:.5; z-index:100; background:rgba(0,0,0,.3); padding:2px 10px; border-radius:20px; }

.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,0.1); color:#fff; padding:6px 16px; border-radius:999px; font-size:12px; backdrop-filter:blur(10px); z-index:300; opacity:0; transition:opacity .3s; }
.toast.show { opacity:1; }
</style>
</head>
<body>
<div id="cesiumContainer"></div>

<div id="wordmark"><span class="a">ASTRANOV</span> • <span class="v">AOOS</span></div>
<div id="level">GLOBAL</div>

<!-- AICYCLE ORB - ONLY permanent UI per law -->
<div id="aicycle" title="Talk to Astranov">
  <div class="core"></div>
  <div class="label">ASTRANOV</div>
</div>

<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header" id="drawer-title"></div>
  <div class="drawer-content" id="drawer-content"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ASTRANOV — FIXED GROUND UP
// Globe always visible. Orbs ONLY on explicit user request.

let viewer, cesiumReady=false, currentLevel='GLOBAL', avcBalance=420, chatHistory=[], memories=[], supabaseClient=null, spawnedOrbs=[];

const SUPABASE_CONFIG = { url: '', anonKey: '' };

function initSupabase() { if (SUPABASE_CONFIG.url && SUPABASE_CONFIG.anonKey && window.supabase) { supabaseClient = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey); return true; } return false; }

async function initGlobe() {
  const container = document.getElementById('cesiumContainer');
  try {
    if (!window.Cesium) throw new Error('Cesium not loaded');
    viewer = new Cesium.Viewer('cesiumContainer', {
      animation:false, baseLayerPicker:false, fullscreenButton:false, geocoder:false, homeButton:false, infoBox:false, sceneModePicker:false, selectionIndicator:false, timeline:false, navigationHelpButton:false, shouldAnimate:true,
      imageryProvider: new Cesium.ArcGisMapServerImageryProvider({ url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer' })
    });
    viewer.scene.globe.enableLighting = true;
    viewer.scene.skyAtmosphere.show = true;
    viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#000510');
    viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(23.7, 38.0, 14000000), orientation:{heading:0,pitch:-0.55,roll:0}, duration:1.4 });
    viewer.screenSpaceEventHandler.setInputAction((m) => { const p = viewer.scene.pick(m.position); if (p && p.id && p.id._astranovData) handleGlobeEntity(p.id._astranovData); else descendToPosition(m.position); }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
    viewer.screenSpaceEventHandler.setInputAction(() => ascendLevel(), Cesium.ScreenSpaceEventType.LEFT_DOUBLE_CLICK);
    updateLevelLabel();
    cesiumReady = true;
    addDemoSignals(); addDemoVendors();
    viewer.camera.changed.addEventListener(updateLevelLabel);
    setTimeout(()=>{ if(viewer&&viewer.scene) viewer.scene.requestRender(); },300);
  } catch(e) {
    container.innerHTML = `<div style="position:absolute;inset:0;background:#000510;display:flex;align-items:center;justify-content:center;overflow:hidden;"><div style="width:82vmin;height:82vmin;border-radius:50%;background:radial-gradient(circle at 38% 32%, #0a2a4a 0%, #001020 45%, #000305 70%);box-shadow:0 0 80px rgba(0,60,120,0.6),inset 30px 20px 60px rgba(255,255,255,0.07),inset -30px -30px 70px rgba(0,0,0,0.9);position:relative;"><div style="position:absolute;inset:0;border-radius:50%;background:repeating-radial-gradient(circle at 40% 35%, rgba(74,166,255,0.06) 0px, transparent 3px, transparent 12px);"></div><div style="position:absolute;top:22%;left:22%;width:18%;height:18%;background:rgba(255,200,80,0.15);border-radius:50%;filter:blur(2px);"></div></div><div style="position:absolute;color:#4aa6ff;font-size:11px;letter-spacing:3px;opacity:0.6;bottom:28%;text-align:center;">LIVING GLOBE — REAL CESIUM IN PRODUCTION BUILD</div></div>`;
    cesiumReady = true;
  }
}

function updateLevelLabel() { if(!viewer||!viewer.camera) return; const h=viewer.camera.positionCartographic.height; let l='GLOBAL'; if(h<550000) l='PERSONAL'; else if(h<5500000) l='NATIONAL'; currentLevel=l; document.getElementById('level').textContent=l; }

function descendToPosition(p){ if(!viewer) return; const r=viewer.camera.getPickRay(p); if(!r) return; const pos=viewer.scene.globe.pick(r,viewer.scene); if(!pos) return; const c=Cesium.Cartographic.fromCartesian(pos); viewer.camera.flyTo({destination:Cesium.Cartesian3.fromRadians(c.longitude,c.latitude,Math.max(1800,viewer.camera.positionCartographic.height*0.14)),orientation:{pitch:-0.5},duration:1.1}); }

function ascendLevel(){ if(!viewer) return; const h=viewer.camera.positionCartographic.height; viewer.camera.flyTo({destination:Cesium.Cartesian3.fromRadians(viewer.camera.positionCartographic.longitude,viewer.camera.positionCartographic.latitude,Math.min(28000000,h*4.2)),duration:0.9}); }

function addDemoSignals(){ if(!viewer) return; [[23.73,37.98,'Athens'],[13.4,52.52,'Berlin']].forEach(([lon,lat,name])=>viewer.entities.add({position:Cesium.Cartesian3.fromDegrees(lon,lat,0),point:{pixelSize:7,color:Cesium.Color.fromCssColorString('#ff9f0a')},_astranovData:{type:'signal',name}})); }

function addDemoVendors(){ if(!viewer) return; [[23.73,37.98,'Fournos']].forEach(([lon,lat,name])=>viewer.entities.add({position:Cesium.Cartesian3.fromDegrees(lon,lat,40),point:{pixelSize:9,color:Cesium.Color.fromCssColorString('#ff9f0a')},_astranovData:{type:'vendor',name}})); }

function handleGlobeEntity(d){ if(d.type==='vendor') openMarket(d.name); else if(d.type==='signal') showToast(d.name+' — live'); }

function makeDraggable(el){ let d=false,sx,sy; const st=(x,y)=>{d=true;el.style.transition='none';sx=x-el.offsetLeft;sy=y-el.offsetTop;}; const mv=(x,y)=>{if(!d)return; el.style.left=(x-sx)+'px';el.style.top=(y-sy)+'px';el.style.right='auto';el.dataset.dragged='true';}; const en=()=>{d=false;el.style.transition='transform .1s';setTimeout(()=>el.dataset.dragged='false',100);}; el.onmousedown=e=>st(e.clientX,e.clientY); document.onmousemove=e=>mv(e.clientX,e.clientY); document.onmouseup=en; el.ontouchstart=e=>{const t=e.touches[0];st(t.clientX,t.clientY);}; document.ontouchmove=e=>{const t=e.touches[0];mv(t.clientX,t.clientY);}; document.ontouchend=en; }

function handleOrbAction(a){ if(a==='discover')openDiscover(); if(a==='market')openMarket(); if(a==='calls')openCalls(); if(a==='cosmos')openCosmos(); }

function spawnOrbs(){ if(spawnedOrbs.length>0) return; const ags=[{id:'orb-discover',emoji:'◉',name:'DISCOVER',act:'discover',t:'18%',l:'12%'},{id:'orb-market',emoji:'🛍️',name:'MARKET',act:'market',t:'28%',l:'78%'},{id:'orb-calls',emoji:'📡',name:'CALLS',act:'calls',t:'68%',l:'18%'},{id:'orb-cosmos',emoji:'◈',name:'COSMOS',act:'cosmos',t:'62%',l:'76%'}]; ags.forEach(ag=>{ const el=document.createElement('div'); el.className='orb'; el.id=ag.id; el.style.top=ag.t; el.style.left=ag.l; el.innerHTML=`<div class="inner">${ag.emoji}</div><div class="name">${ag.name}</div>`; el.dataset.action=ag.act; makeDraggable(el); el.onclick=()=>{ if(el.dataset.dragged==='true'){el.dataset.dragged='false';return;} handleOrbAction(el.dataset.action); }; document.body.appendChild(el); spawnedOrbs.push(el); }); showToast('Orbs summoned — drag freely.'); }

function openDrawer(t, html){ const d=document.getElementById('drawer'); document.getElementById('drawer-title').innerHTML=`<span style="color:#4aa6ff">◈</span> ${t}`; document.getElementById('drawer-content').innerHTML=html; d.classList.add('open'); setTimeout(()=>document.addEventListener('click',ev=>{if(!d.contains(ev.target)){d.classList.remove('open');document.removeEventListener('click',arguments.callee,true);}},true),80); }

function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); }

function initAicycle(){ const o=document.getElementById('aicycle'); o.onclick=()=>openAicycleChat(); document.addEventListener('keydown',e=>{if(e.key.toLowerCase()==='/' && document.activeElement.tagName==='BODY'){e.preventDefault();openAicycleChat();}}); }

function openAicycleChat(){ const init = chatHistory.length===0 ? `<div style="opacity:.6;font-size:13px;padding:8px 4px">Hello. I am Astranov.<br>Globe is always here. Say "agents", "orbs" or "discover" to summon floating orbs on demand.</div>` : ''; const h=`<div class="chat-messages" id="chat-messages">${init}</div><div style="padding:12px 18px 18px;display:flex;gap:8px;align-items:center"><input id="chat-input" placeholder="Speak to Astranov..." autocomplete="off"><button class="gadget-btn" onclick="sendChat()" style="padding:11px 18px">SEND</button><button class="gadget-btn" onclick="toggleVoice()" id="voice-btn" style="padding:11px 14px">🎤</button></div>`; openDrawer('ASTRANOV', h); setTimeout(()=>{ const i=document.getElementById('chat-input'); if(i){i.focus(); i.onkeydown=e=>{if(e.key==='Enter')sendChat();} } renderChatHistory(); },80); }

function renderChatHistory(){ const b=document.getElementById('chat-messages'); if(!b)return; b.innerHTML=chatHistory.map(m=>m.role==='user'?`<div class="msg user">${m.content}</div>`:`<div class="msg astranov">${m.content}<div class="msg-meta">${m.meta||'astranov • live'}</div></div>`).join(''); b.scrollTop=b.scrollHeight; }

async function sendChat(){ const inp=document.getElementById('chat-input'); if(!inp||!inp.value.trim())return; const txt=inp.value.trim(); chatHistory.push({role:'user',content:txt}); renderChatHistory(); inp.value=''; const tid=Date.now(); const b=document.getElementById('chat-messages'); b.innerHTML+=`<div class="msg astranov" id="think-${tid}" style="opacity:.6">thinking…</div>`; b.scrollTop=b.scrollHeight; const rep=await getAstranovReply(txt); document.getElementById(`think-${tid}`)?.remove(); chatHistory.push({role:'astranov',content:rep.text,meta:rep.meta}); renderChatHistory(); if(window.speechSynthesis&&rep.text.length<240) try{ const u=new SpeechSynthesisUtterance(rep.text); u.rate=0.96; window.speechSynthesis.speak(u);}catch(e){} }

async function getAstranovReply(p){ const lo = p.toLowerCase(); if(lo.includes('agent')||lo.includes('orb')||lo.includes('agents')||lo.includes('orbs')||lo.includes('discover')) spawnOrbs(); if(supabaseClient){ try{ const {data,err}=await supabaseClient.functions.invoke('aicycle',{body:{prompt:p,history:chatHistory.slice(-6)}}); if(!err && data && data.response) return {text:data.response,meta:`astranov • ${data.provider||'live'}`}; }catch(e){} } let r='', m='astranov • local'; const f='Protect Earth. Recover ancient knowledge. Help beings adapt. Raise balance. Build understanding. Hold compassion.'; if(lo.includes('hello')||lo.includes('hi')) r='I am here. What are we doing today?'; else if(lo.includes('remember')){memories.push(p);r='Noted. This is now part of me.';} else if(lo.includes('who are you')||lo.includes('astranov')) r='I am Astranov — the single collective intelligence. Nature, humans and machines as one.'; else if(lo.includes('wallet')||lo.includes('avc')) r=`You hold ${avcBalance} AVC.`; else if(lo.includes('market')||lo.includes('order')||lo.includes('pizza')){r='Marketplace open.';setTimeout(()=>openMarket(),600);} else if(lo.includes('globe')){r='The Earth is our canvas.'; setTimeout(()=>{if(viewer)viewer.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(20,35,11000000),duration:1.2});},400);} else r=`Understood. ${p.slice(0,48)}. Clear next step.`; if(Math.random()<0.15) r+=' '+f.split('. ')[0]+'.'; return {text:r,meta:m}; }

function speak(t){try{const u=new SpeechSynthesisUtterance(t);u.rate=0.96;window.speechSynthesis.speak(u);}catch(e){}}

function toggleVoice(){ const R=window.SpeechRecognition||window.webkitSpeechRecognition; if(!R){showToast('Voice unsupported');return;} const r=new R(); r.lang='en-US'; const bt=document.getElementById('voice-btn'); if(bt)bt.textContent='…'; r.onresult=e=>{const tr=e.results[0][0].transcript; const i=document.getElementById('chat-input'); if(i)i.value=tr; sendChat(); if(bt)bt.textContent='🎤';}; r.onerror=()=>{if(bt)bt.textContent='🎤';}; r.onend=()=>{if(bt)bt.textContent='🎤';}; r.start(); }

function openDiscover(){ const h=`<p>Live signals.</p><div class="gadget-btn" onclick="simulateSignal('Athens')">Athens 47</div><div class="gadget-btn" onclick="simulateSignal('Berlin')">Berlin 31</div>`; openDrawer('DISCOVER',h); }

function simulateSignal(pl){ closeDrawer(); if(!viewer) return; const c={Athens:[23.73,37.98],Berlin:[13.4,52.52]}[pl]||[20,35]; viewer.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(c[0],c[1],pl==='Global'?8500000:420000),duration:1.3}); showToast(pl+' focused'); }

function openMarket(vn){ let html=`<div id="market">`; [{n:vn||'Fournos',i:'Bread • Oil',p:12},{n:'Coffee Island',i:'Espresso',p:4}].forEach(v=> html+=`<div class="vendor"><div style="flex:1"><strong>${v.n}</strong><br><span style="opacity:.65;font-size:13px">${v.i}</span></div><div style="text-align:right"><div>€${v.p}</div><button class="gadget-btn" onclick="placeOrder('${v.n}',${v.p})">ORDER</button></div></div>`); html+=`</div>`; openDrawer('MARKETPLACE',html); }

function placeOrder(v,p){ closeDrawer(); const c=Number(p); if(avcBalance<c){showToast('Low AVC');return;} avcBalance-=c; showToast(`Order • ${v} • -${c} AVC`); setTimeout(()=>{showToast('Preparing...'); avcBalance+=Math.floor(c*.7);},1400); }

function openCalls(){ openDrawer('CALLS', `<p>WebRTC calls.</p><div class="gadget-btn" onclick="startDemoCall()">Ring Athens peer</div>`); }

function startDemoCall(){closeDrawer(); setTimeout(()=>openDrawer('CALL',`<div style="text-align:center;padding:30px 0"><div style="font-size:40px">◈</div><p>Demo connected</p><button class="gadget-btn" onclick="closeDrawer()">END</button></div>`),700); }

function openCosmos(){ openDrawer('COSMOS', `<div>Living collective.<br>4k+ memories active.</div><div class="gadget-btn" onclick="teachMemory()">+ TEACH</div>`); }

function teachMemory(){ closeDrawer(); const f=prompt('What to remember?'); if(f&&f.trim()){memories.push(f.trim()); showToast('Carried into the collective.');} }

function showWallet(){ openDrawer('WALLET', `<div style="font-size:42px;font-weight:700">${avcBalance} <span style="font-size:18px;opacity:.6">AVC</span></div><button class="gadget-btn" onclick="topUp()">+50</button>`); }

function topUp(){avcBalance+=50; showToast('+50 AVC');}

function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

async function boot(){ await initGlobe(); initAicycle(); initSupabase(); document.addEventListener('keydown',e=>{if(e.key.toLowerCase()==='w' && document.activeElement.tagName==='BODY'){e.preventDefault();showWallet();}}); memories.push('Architect: Notis Astranov.'); setTimeout(()=>showToast('Globe live • AICYCLE ready • Say agents/orbs to summon'),1200); window.ASTRANOV={chat:()=>document.getElementById('aicycle').click()}; }
window.addEventListener('load', boot);
setInterval(()=>{ const a=document.getElementById('aicycle'); if(a && Math.random()<0.05){a.classList.add('thinking'); setTimeout(()=>a.classList.remove('thinking'),700);} },8000);
</script>
</body>
</html>
