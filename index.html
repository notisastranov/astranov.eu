<style>
  :root { --t-quick: 0.18s; --ease: cubic-bezier(0.32, 0.72, 0, 1); --aegean: #4aa6ff; --deep: #1e6cff; }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #010615; overflow: hidden;
    color: #cde7ff; font-family: 'Quicksand', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { position: fixed; inset: 0; }
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; }

  #cesiumContainer { position: absolute; inset: 0; }
  .cesium-widget-credits, .cesium-viewer-bottom { display: none !important; }

  /* WORDMARK */
  #app-name {
    position: fixed; top: max(10px, env(safe-area-inset-top)); left: 50%;
    transform: translateX(-50%); z-index: 200; cursor: pointer;
    font-weight: 700; font-size: 21px; letter-spacing: 0.34em; text-indent: 0.34em;
    color: #cde7ff; user-select: none;
    text-shadow: 0 0 4px #ffffff, 0 0 10px #4aa6ff, 0 0 22px #1e6cff,
                 0 0 40px #0040d8, 0 0 70px #001a66;
    transition: transform var(--t-quick) var(--ease);
  }
  #app-name:active { transform: translateX(-50%) scale(0.96); }

  /* BOOT */
  #boot { position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(ellipse at 50% 45%, #04122e 0%, #020a1c 55%, #010615 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.6s ease; }
  #boot.gone { opacity: 0; pointer-events: none; display: none !important; }
  #boot .loader { width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid rgba(74,166,255,0.18); border-top-color: #4aa6ff;
    box-shadow: 0 0 14px rgba(74,166,255,0.45);
    animation: spin 0.95s linear infinite; margin-bottom: 22px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #boot .name { font-weight: 700; font-size: 21px; letter-spacing: 0.34em; text-indent: 0.34em;
    color: #cde7ff; text-shadow: 0 0 4px #ffffff, 0 0 10px #4aa6ff, 0 0 22px #1e6cff,
                                  0 0 40px #0040d8, 0 0 70px #001a66; }

  /* CHAT */
  #chat { position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
    max-height: 60vh; display: flex; flex-direction: column;
    background: linear-gradient(180deg, rgba(8,18,38,0.42), rgba(2,6,18,0.56));
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-top: 1px solid rgba(93,178,255,0.55); border-radius: 22px 22px 0 0;
    box-shadow: 0 -10px 28px rgba(45,108,196,0.18), inset 0 1px 0 rgba(207,226,255,0.18);
    transform: translateY(100%); transition: transform 0.4s var(--ease);
    overflow: hidden; }
  #chat.open { transform: translateY(0); }
  #chat-handle { padding: 8px 14px; display: flex; align-items: center; justify-content: center;
    gap: 10px; cursor: grab; user-select: none; position: relative; }
  #chat-handle::before { content: ''; width: 36px; height: 4px; border-radius: 2px;
    background: rgba(120,180,255,0.35); }
  #chat.thinking #chat-handle::after { content: ''; position: absolute; left: 50%; top: 0;
    transform: translateX(-50%); width: 60%; height: 2px;
    background: linear-gradient(90deg, transparent, #4aa6ff, transparent);
    animation: think 1.4s linear infinite; }
  @keyframes think { 0%{transform:translateX(-50%) translateX(-30%);opacity:0} 50%{transform:translateX(-50%);opacity:1} 100%{transform:translateX(-50%) translateX(30%);opacity:0} }
  #chat-msgs { flex: 1; min-height: 0; overflow-y: auto; padding: 4px 16px 8px;
    -webkit-overflow-scrolling: touch; }
  #chat-msgs:empty { display: none; }
  .msg { margin-bottom: 10px; padding: 9px 13px; border-radius: 14px;
    max-width: 85%; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
  .msg.ai   { background: rgba(255,255,255,0.04); }
  .msg.user { background: rgba(120,180,255,0.12); margin-left: auto; }

  .msg-meta { margin-top: 6px; font-size: 10px; letter-spacing: 0.06em;

  /* PANEL — bottom drawer for content surfaces */
  #panel { position: fixed; left: 0; right: 0; bottom: 0; z-index: 70;
    max-height: 75vh; overflow-y: auto; padding: 18px 18px calc(28px + env(safe-area-inset-bottom));

  #panel input:focus, #panel textarea:focus { border-color: rgba(93,178,255,0.85); }
  #panel .pbtn { display: inline-flex; align-items: center; justify-content: center;
    padding: 10px 16px; margin: 4px 4px 4px 0; cursor: pointer; font-size: 13px; font-weight: 600;
    background: rgba(20,52,120,0.65); border: 1px solid rgba(93,178,255,0.6);

    -webkit-tap-highlight-color: transparent; transition: transform 0.12s var(--ease); }
  #panel .pbtn:active { transform: scale(0.96); }
  #panel .pbtn.ok { background: rgba(20,80,40,0.65); border-color: rgba(126,235,180,0.7); color: #d6f7e6; }
  #panel .pbtn.danger { background: rgba(80,20,20,0.65); border-color: rgba(255,120,120,0.7); color: #ffd6d6; }
  #panel .pbtn.muted { background: rgba(40,52,72,0.55); border-color: rgba(120,140,180,0.45); color: #b8c8e0; }
  #panel .row { display: flex; align-items: center; justify-content: space-between;

  #panel .row:last-child { border-bottom: 0; }
  #panel .card { padding: 10px 12px; margin: 6px 0; border-radius: 12px;

  #panel .card .ct { font-size: 14px; color: #cfe2ff; line-height: 1.35; }

  #call-controls .btn { width: 56px; height: 56px; font-size: 22px; }
  #incoming { position: fixed; top: max(16px, env(safe-area-inset-top));
    left: 16px; right: 16px; z-index: 400;
    background: rgba(8,18,38,0.92); backdrop-filter: blur(10px);
    border: 1px solid rgba(126,235,180,0.7); border-radius: 14px;
    padding: 14px 18px; color: #cde7ff; display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); animation: ringPulse 1.2s ease infinite; }
  #incoming.on { display: block; }
  @keyframes ringPulse { 0%,100%{box-shadow:0 0 0 0 rgba(126,235,180,0.4)} 50%{box-shadow:0 0 0 12px rgba(126,235,180,0)} }
  #incoming .title { font-size: 14px; margin-bottom: 10px; }
  #incoming .name { font-weight: 700; color: #7eebb4; }
  #incoming .acts { display: flex; gap: 10px; }
  #incoming .pbtn { padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 13px;
    border: 1px solid; flex: 1; text-align: center; }
  #incoming .accept { background: rgba(20,80,40,0.85); border-color: #7eebb4; color: #d6f7e6; }
  #incoming .decline { background: rgba(80,20,20,0.85); border-color: #ff7878; color: #ffd6d6; }

  /* TOAST */
  #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: rgba(8,18,38,0.92); color: #cde7ff; padding: 10px 16px;
    border-radius: 22px; border: 1px solid rgba(93,178,255,0.55);
    font-size: 13px; z-index: 600; opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease; }
  #toast.show { opacity: 1; }
  #toast.err  { border-color: rgba(255,120,120,0.7); color: #ffd6d6; }
  #toast.ok   { border-color: rgba(126,235,180,0.7); color: #d6f7e6; }

  /* MENU items in vendor panel */
  .mi { display: flex; align-items: center; gap: 10px; padding: 10px;
    background: rgba(8,18,38,0.45); border: 1px solid rgba(93,178,255,0.18);
    border-radius: 12px; margin: 6px 0; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: border-color 0.18s var(--ease); }
  .mi:hover { border-color: rgba(93,178,255,0.55); }
  .mi .mi-name { flex: 1; font-size: 14px; color: #cfe2ff; }

  .cart-row { display: flex; align-items: center; justify-content: space-between;

  .cart-x { color: rgba(255,120,120,0.8); cursor: pointer; padding: 0 6px; }
</style>

<script>
'use strict';

const SUPABASE_URL = 'https://lkoatrkhuigdolnjsbie.supabase.co';

const $ = (id) => document.getElementById(id);
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let toastTimer = 0;
function toast(msg, kind = '') {
  const t = $('toast'); t.textContent = String(msg).slice(0, 100);
  t.className = 'show ' + (kind || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3200);

function formatRelative(ts) {
  if (!ts) return '';
  const s = Math.max(1, Math.round((Date.now() - new Date(ts).getTime()) / 1000));
  if (s < 60) return s + 's';
  const m = Math.round(s / 60); if (m < 60) return m + 'm';
  const h = Math.round(m / 60); if (h < 24) return h + 'h';
  return Math.round(h / 24) + 'd';
}

/* ============================== Cesium ============================== */
let viewer = null;
let _userLat = null, _userLng = null;

async function bootCesium() {
  try {
    viewer = new Cesium.Viewer('cesiumContainer', {
      animation: false, baseLayerPicker: false, fullscreenButton: false,
      vrButton: false, geocoder: false, homeButton: false, infoBox: false,
      sceneModePicker: false, selectionIndicator: false, timeline: false,
      navigationHelpButton: false,
      // requestRenderMode off — tiles paint in as they arrive (no "fake
      // static" feel) and pin animations / drags stay smooth on mobile.
      requestRenderMode: false,
      baseLayer: false, scene3DOnly: false,
      skyAtmosphere: new Cesium.SkyAtmosphere(), msaaSamples: 1,
    });
    if (viewer.cesiumWidget?.creditContainer) viewer.cesiumWidget.creditContainer.style.display = 'none';
    viewer.scene.globe.enableLighting = false;
    viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#02060d');
    try { viewer.scene.globe.dynamicAtmosphereLighting = false; } catch (_) {}
    try { if (viewer.scene.postProcessStages.fxaa) viewer.scene.postProcessStages.fxaa.enabled = false; } catch (_) {}
    try { viewer.scene.fog.enabled = false; } catch (_) {}
    const cc = viewer.scene.screenSpaceCameraController;
    cc.minimumZoomDistance = 5; cc.maximumZoomDistance = 2_000_000_000;
    viewer.resolutionScale = Math.min(1.25, window.devicePixelRatio || 1);
    viewer.scene.globe.maximumScreenSpaceError = 2.0;
    viewer.scene.globe.preloadSiblings = false;
    // REAL Earth — Esri World Imagery (free public service, no token,
    // served over HTTPS; tile host already in sw.js TILE_HOSTS so it
    // gets cached for offline). Replaces the cartoon Natural Earth II.
    const base = new Cesium.UrlTemplateImageryProvider({
      url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      maximumLevel: 19, credit: 'Esri',
    });
    viewer.imageryLayers.addImageryProvider(base);
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(20, 35, 28_000_000),
      duration: 0,
    });
    // Click handler for vendor pins
    const h = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    h.setInputAction(onCanvasClick, Cesium.ScreenSpaceEventType.LEFT_CLICK);
    // Dismiss boot on first paint
    let hidden = false;
    const hide = () => { if (hidden) return; hidden = true; $('boot').classList.add('gone'); };
    try {
      const off = viewer.scene.postRender.addEventListener(() => {
        hide(); try { viewer.scene.postRender.removeEventListener(off); } catch (_) {}
      });
    } catch (_) { hide(); }
    setTimeout(hide, 1500);
  } catch (e) {
    console.error('[Cesium]', e);
    $('boot').classList.add('gone');
  }
}

async function locateMe() {
  if (!navigator.geolocation) return null;
  return new Promise((resolve) => {
    navigator.geolocation.getCurrentPosition(
      pos => {
        _userLat = pos.coords.latitude; _userLng = pos.coords.longitude;
        resolve({ lat: _userLat, lng: _userLng });
      },
      () => { ipWarmup().then(resolve); },
      { enableHighAccuracy: true, timeout: 10_000 }
    );
  });
}

async function ipWarmup() {
  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    if (d?.latitude) {
      _userLat = d.latitude; _userLng = d.longitude;
      return { lat: _userLat, lng: _userLng };
    }
  } catch (_) {}
  return null;
}

async function diveToMe() {
  if (_userLat == null) {
    toast('Locating…');
    await locateMe();
    if (_userLat == null) { toast('Need your location', 'err'); return false; }
  }
  if (viewer) {
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(_userLng, _userLat, 1_200),
      duration: 1.4,
      orientation: { heading: 0, pitch: Cesium.Math.toRadians(-65), roll: 0 },
    });
  }
  return true;
}

async function pilotHome() {
  if (!viewer) return;
  const lng = _userLng ?? 20, lat = _userLat ?? 35;
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(lng, lat, 12_000_000),
    duration: 1.8,

/* ============================== Video Calling (WebRTC) ============================== */
const ICE_SERVERS = [
  { urls: ['stun:stun.l.google.com:19302'] },
  { urls: ['stun:stun1.l.google.com:19302'] },
  { urls: ['stun:global.stun.twilio.com:3478'] },
  // Open Relay TURN (free fallback)
  { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
];

let pc = null, localStream = null, callChannel = null, currentCall = null;
let _pendingIncoming = null, _inboxChannel = null;

function listenForIncomingCalls() {
  if (!sb || !session) return;
  try { _inboxChannel?.unsubscribe(); } catch (_) {}
  _inboxChannel = sb.channel('user:' + session.user.id, { config: { broadcast: { ack: false } } });
  _inboxChannel.on('broadcast', { event: 'incoming-call' }, ({ payload }) => onIncomingInvite(payload));
  _inboxChannel.subscribe();
}

function onIncomingInvite(p) {
  if (currentCall) return;   // ignore if already on a call
  _pendingIncoming = p;
  $('inc-name').textContent = p.fromName || 'Caller';
  $('incoming').classList.add('on');
}

async function acceptIncoming() {
  if (!_pendingIncoming) return;
  const p = _pendingIncoming; _pendingIncoming = null;
  $('incoming').classList.remove('on');
  try { localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); }
  catch (e) { toast('Mic/cam blocked', 'err'); return; }
  currentCall = { id: p.callId, peerId: p.fromId, peerName: p.fromName, role: 'callee' };
  $('call-peer').textContent = p.fromName || 'Caller';
  $('call-status').textContent = 'connecting…';
  buildPC();
  await pc.setRemoteDescription(p.offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  callChannel = sb.channel('call:' + p.callId, { config: { broadcast: { ack: false } } });
  callChannel.on('broadcast', { event: 'ice' }, ({ payload }) => onRemoteIce(payload));
  callChannel.on('broadcast', { event: 'bye' }, () => endCall());
  callChannel.subscribe();
  await callChannel.send({ type: 'broadcast', event: 'answer', payload: answer });
  try {
    await sb.from('calls').update({ status: 'accepted', accepted_at: new Date().toISOString() }).eq('id', p.callId);
  } catch (_) {}
  showCallStage();
}

async function declineIncoming() {
  if (!_pendingIncoming) return;
  const p = _pendingIncoming; _pendingIncoming = null;
  $('incoming').classList.remove('on');
  try {
    const ch = sb.channel('call:' + p.callId);
    await ch.subscribe();
    await ch.send({ type: 'broadcast', event: 'bye', payload: { reason: 'declined' } });
    ch.unsubscribe();
    await sb.from('calls').update({ status: 'declined', ended_at: new Date().toISOString() }).eq('id', p.callId);
  } catch (_) {}
}

async function startCall(peerId, peerName) {
  if (!session) return openAuthPanel();
  if (currentCall) return toast('Already on a call', 'err');
  if (peerId === session.user.id) return toast("Can't call yourself", 'err');
  try { localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); }
  catch (e) { toast('Mic/cam blocked: ' + e.message, 'err'); return; }
  let row;
  try {
    const r = await sb.from('calls').insert({ caller_id: session.user.id, callee_id: peerId }).select().single();
    if (r.error) throw r.error;
    row = r.data;
  } catch (e) {
    stopLocalStream();
    return toast('Call create failed: ' + e.message, 'err');
  }
  currentCall = { id: row.id, peerId, peerName, role: 'caller' };
  $('call-peer').textContent = peerName || 'Calling…';
  $('call-status').textContent = 'ringing…';
  buildPC();
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  callChannel = sb.channel('call:' + row.id, { config: { broadcast: { ack: false } } });
  callChannel.on('broadcast', { event: 'answer' }, ({ payload }) => onRemoteAnswer(payload));
  callChannel.on('broadcast', { event: 'ice' }, ({ payload }) => onRemoteIce(payload));
  callChannel.on('broadcast', { event: 'bye' }, () => endCall());
  callChannel.subscribe();
  // Tell the callee via their user channel + push notification
  const userCh = sb.channel('user:' + peerId);
  await userCh.subscribe();
  await userCh.send({
    type: 'broadcast', event: 'incoming-call',
    payload: { callId: row.id, fromId: session.user.id,
      fromName: (profile?.display_name || session.user.email || 'Caller'), offer },
  });
  userCh.unsubscribe();
  try {
    await sb.functions.invoke('push-notify', { body: {
      target_profile_id: peerId, type: 'call', callId: row.id,
      title: 'Incoming call', body: (profile?.display_name || 'Friend') + ' is calling you',
    }});
  } catch (_) {}
  showCallStage();
}

function buildPC() {
  pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.ontrack = (e) => {
    const r = $('call-remote');
    if (r.srcObject !== e.streams[0]) r.srcObject = e.streams[0];
    $('call-status').textContent = 'connected';
  };
  pc.onicecandidate = (e) => {
    if (e.candidate && callChannel) {
      try { callChannel.send({ type: 'broadcast', event: 'ice', payload: e.candidate.toJSON() }); } catch (_) {}
    }
  };
  pc.onconnectionstatechange = () => {
    const st = pc.connectionState;
    if (st === 'connected') $('call-status').textContent = 'connected';
    else if (st === 'disconnected' || st === 'failed' || st === 'closed') endCall();
  };
  $('call-local').srcObject = localStream;
}

async function onRemoteAnswer(answer) {
  try { await pc.setRemoteDescription(answer); $('call-status').textContent = 'connecting…'; } catch (_) {}
}

async function onRemoteIce(c) {
  if (!c) return;
  try { await pc.addIceCandidate(c); } catch (_) {}
}

function showCallStage() { $('call-stage').classList.add('on'); }
function hideCallStage() { $('call-stage').classList.remove('on'); }

function endCall() {
  if (!currentCall && !pc) return;
  try { if (callChannel) callChannel.send({ type: 'broadcast', event: 'bye', payload: {} }); } catch (_) {}
  try { callChannel?.unsubscribe(); } catch (_) {}
  callChannel = null;
  try { pc?.close(); } catch (_) {}
  pc = null;
  stopLocalStream();
  if (currentCall) {
    try { sb.from('calls').update({ status: 'ended', ended_at: new Date().toISOString() }).eq('id', currentCall.id); } catch (_) {}
  }
  currentCall = null;
  hideCallStage();
}

function stopLocalStream() {
  try { localStream?.getTracks().forEach(t => t.stop()); } catch (_) {}
  localStream = null;
  try { $('call-local').srcObject = null; } catch (_) {}
  try { $('call-remote').srcObject = null; } catch (_) {}
}

$('btn-end').addEventListener('click', endCall);
$('btn-mute').addEventListener('click', () => {
  if (!localStream) return;
  const a = localStream.getAudioTracks()[0]; if (!a) return;
  a.enabled = !a.enabled;
  $('btn-mute').classList.toggle('danger', !a.enabled);

$('btn-cam').addEventListener('click', () => {
  if (!localStream) return;

  v.enabled = !v.enabled;
  $('btn-cam').classList.toggle('danger', !v.enabled);
});

let vendorPins = null;
const vendorIndex = new Map();
let _currentVendor = null, _menu = [], _cart = [];

function _makePinCanvas(emoji, color) {
  const c = document.createElement('canvas'); c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(32, 28, 4, 32, 32, 28);
  g.addColorStop(0, '#ffffff'); g.addColorStop(0.45, color); g.addColorStop(1, '#08163c');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(32, 32, 26, 0, Math.PI * 2); ctx.fill();
  ctx.font = '22px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(emoji, 32, 34);
  return c;
}

function _distMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000, toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

// Pull from OUR vendors table, only those that published a menu with
// prices. Vendors without items don't appear — the architect's law.
async function fetchNearbyVendors(lat, lng, keyword) {
  try {
    const r = await sb.from('vendors').select('*')
      .eq('is_active', true).neq('items', '[]').limit(200);
    if (r.error) throw r.error;
    let list = (r.data || []).filter(v =>
      v.lat && v.lng && Array.isArray(v.items) && v.items.some(i => Number(i?.price) > 0)
    );
    if (lat != null && lng != null) {
      list = list
        .map(v => ({ ...v, _dist: _distMeters(lat, lng, v.lat, v.lng) }))
        .filter(v => v._dist <= 5000)
        .sort((a, b) => a._dist - b._dist);
    }
    if (keyword) {
      const k = keyword.toLowerCase();
      list.sort((a, b) => {
        const ah = JSON.stringify(a).toLowerCase().includes(k) ? 0 : 1;
        const bh = JSON.stringify(b).toLowerCase().includes(k) ? 0 : 1;
        return ah - bh;
      });
    }
    return list;
  } catch (e) { console.error('[vendors]', e); return []; }
}

function renderVendorPins(places) {
  if (!viewer) return;
  if (!vendorPins) vendorPins = viewer.scene.primitives.add(new Cesium.BillboardCollection({ scene: viewer.scene }));
  vendorPins.removeAll(); vendorIndex.clear();
  for (const p of places) {
    if (!p.lat || !p.lng) continue;
    const bb = vendorPins.add({
      position: Cesium.Cartesian3.fromDegrees(p.lng, p.lat),
      image: _makePinCanvas(p.emoji || '◍', '#ffaa33'),
      width: 30, height: 30,
      scaleByDistance: new Cesium.NearFarScalar(200, 1.0, 1.2e6, 0.2),
      translucencyByDistance: new Cesium.NearFarScalar(7e5, 1.0, 1.8e6, 0),
      disableDepthTestDistance: Number.POSITIVE_INFINITY,
    });
    bb.__vendorId = p.id;
    vendorIndex.set(p.id, p);
  }
  viewer.scene.requestRender();
}

async function seedNearbyVendors() {
  if (_userLat == null) await locateMe();
  if (_userLat == null) return toast('Need your location to seed', 'err');

  try {
    const { data, error } = await sb.functions.invoke('vendor-crawler', {

function _pubRow(it, i) {

function pubAdd() {

async function pubSave(vendorId) {

function renderMenu() {
  if (!_menu.length) { $('vendor-menu').textContent = 'No menu items.'; return; }
  $('vendor-menu').innerHTML = _menu.map((m, i) => `
    <div class="mi" onclick="addToCart(${i})">
      <div class="mi-name">${escapeHtml(m.name)}${m.desc ? '<br><span style="font-size:11px;color:rgba(168,200,238,0.55)">' + escapeHtml(m.desc) + '</span>' : ''}</div>
      <div class="mi-price">€${m.price}</div>
      <div class="mi-add">＋</div>
    </div>
  `).join('');
}

function addToCart(i) {
  const m = _menu[i]; if (!m) return;
  const ex = _cart.find(x => x.name === m.name);
  if (ex) ex.qty++; else _cart.push({ name: m.name, qty: 1, price: m.price });
  renderCart();
}

function removeFromCart(i) { _cart.splice(i, 1); renderCart(); }

function renderCart() {
  const c = $('vendor-cart'); const t = $('vendor-total'); const b = $('btn-place');
  if (!c) return;
  if (!_cart.length) {
    c.innerHTML = '<p>Tap menu items to add.</p>';
    t.innerHTML = ''; b.disabled = true; return;
  }
  c.innerHTML = _cart.map((it, i) => `
    <div class="cart-row">
      <span>${escapeHtml(it.name)} ×${it.qty}</span>
      <span>€${(it.qty * it.price).toFixed(2)} <span class="cart-x" onclick="removeFromCart(${i})">✕</span></span>
    </div>
  `).join('');
  const sub = _cart.reduce((s, it) => s + it.qty * it.price, 0);
  const del = 3, plat = Math.max(1, Math.round(sub * 0.05));
  const total = sub + del + plat;
  const bal = Number(profile?.eur_balance || 0);
  t.innerHTML = `
    <div class="row"><span>Subtotal</span><span>€${sub.toFixed(2)}</span></div>
    <div class="row"><span>Delivery</span><span>€${del}</span></div>
    <div class="row"><span>Platform fee</span><span>€${plat}</span></div>
    <div class="row" style="font-weight:700"><span>Total</span><span>€${total.toFixed(2)}</span></div>
    <div class="row" style="color:${bal >= total ? '#7eebb4' : '#ff9e9e'}"><span>Your balance</span><span>€${bal.toFixed(2)}</span></div>
  `;
  b.disabled = false;
  b.textContent = bal >= total ? 'Place order' : 'Top up & order';
}

async function placeOrder() {
  if (!session) return openAuthPanel();
  if (!_currentVendor || !_cart.length) return;
  const p = _currentVendor;
  const sub = _cart.reduce((s, it) => s + it.qty * it.price, 0);
  const del = 3, plat = Math.max(1, Math.round(sub * 0.05));
  const total = sub + del + plat;
  toast('Sending order…');
  try {
    const { data, error } = await sb.functions.invoke('order-intake', { body: {
      vendor_id: p.id,
      vendor: { id: p.id, osm_id: p.osm_id || null, name: p.name,
        emoji: p.emoji || '◍', category: p.category || 'shop',
        lat: p.lat, lng: p.lng, address: p.address || {}, tags: p.tags || {} },
      items: _cart,
      calc: { subtotal: sub, delivery_fee: del, platform_fee: plat, total, currency: 'EUR' },
      delivery_lat: _userLat, delivery_lng: _userLng,
      delivery_address: '', notes: '',
    }});
    if (error) throw error;
    if (!data?.ok) throw new Error(data?.error || 'order failed');
    toast('Order placed · ' + data.order.short_id, 'ok');
    _cart = [];
    try { await loadProfile(); } catch (_) {}
    setTimeout(() => openOrderTrack(data.order.id), 250);
  } catch (e) {
    const msg = String(e.message || e);
    if (msg.includes('insufficient_funds') || msg.includes('402')) {
      toast('Not enough euros — top up to order', 'err');
      try { await loadProfile(); } catch (_) {}
      setTimeout(openBuyPanel, 400);
      return;
    }
    toast('Order failed: ' + msg, 'err');
  }
}

async function openOrderTrack(orderId) {
  if (!sb || !session) return;
  const { data: o } = await sb.from('orders').select('*').eq('id', orderId).single();
  if (!o) return toast('Order not found', 'err');
  _renderOrder(o);
  const ch = sb.channel('order-' + orderId).on('broadcast', { event: 'status' }, ({ payload }) => {
    if (payload?.order_id === orderId) {
      sb.from('orders').select('*').eq('id', orderId).single().then(({ data }) => data && _renderOrder(data));
    }
  });
  ch.subscribe();
}

function _renderOrder(o) {
  const steps = ['pending', 'accepted', 'preparing', 'in_transit', 'delivered'];
  const idx = Math.max(0, steps.indexOf(o.status));
  const items = (o.items || []).map(it => `<div class="row"><span>${escapeHtml(it.name)} ×${it.qty}</span><span>€${(it.qty * it.price).toFixed(2)}</span></div>`).join('');
  openPanel(`
    <h2>Order ${escapeHtml(o.short_id || '')}</h2>
    <p>${escapeHtml(o.status.toUpperCase().replace('_', ' '))}</p>
    <div style="display:flex;gap:6px;margin:10px 0">
      ${steps.map((s, i) => `<div style="flex:1;height:6px;border-radius:3px;background:${i <= idx ? '#7eebb4' : 'rgba(93,178,255,0.18)'}" title="${s}"></div>`).join('')}
    </div>
    <h3>Items</h3>
    ${items}
    <h3>Total</h3>
    <div class="row"><span>Paid</span><span>€${Number(o.calc?.total ?? 0).toFixed(2)}</span></div>
    <p style="margin-top:14px;font-size:11px;color:rgba(168,200,238,0.55)">Updates live as the vendor and driver advance the order.</p>
  `);
}

async function payProvider(provider) {
  const eur = parseFloat($('buy-amt').value) || 10;
  const amount_cents = Math.round(eur * 100);
  const success_url = location.origin + '/?paid=1';
  const cancel_url  = location.origin + '/?paid=0';
  const item_name   = `AstranoV top-up €${eur}`;
  // Stripe is fronted by the unified `payments` Edge fn; the others are
  // named after their provider. Body params differ per provider.
  const slug = provider === 'stripe' ? 'payments' : provider;
  const body = provider === 'stripe'
    ? { mode: 'payment', amount_cents, currency: 'eur', item_name, success_url, cancel_url }
    : { amount_cents, currency: 'EUR', item_name, return_url: success_url, cancel_url };
  try {
    const { data, error } = await sb.functions.invoke(slug, { body });
    if (error) throw error;
    if (data?.url) { location.href = data.url; return; }
    toast('Payment session failed: ' + (data?.error || 'no url'), 'err');
  } catch (e) { toast(e.message || String(e), 'err'); }
}

/* ============================== Chat router ============================== */
function openChat() { $('chat').classList.add('open'); document.body.classList.add('chat-open'); }
function closeChat() { $('chat').classList.remove('open'); document.body.classList.remove('chat-open'); }

const aicycleHistory = [];
function appendMsg(role, text) {
  const div = document.createElement('div'); div.className = 'msg ' + role; div.textContent = text;
  const msgs = $('chat-msgs');
  const nearBottom = (msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight) < 80;
  msgs.appendChild(div);
  if (nearBottom) msgs.scrollTop = msgs.scrollHeight;
}

function _routedFire(line, fn) {
  appendMsg('ai', line);
  try { fn(); } catch (e) { console.error(e); }
  setTimeout(closeChat, 800);
}

function routeLocal(raw) {
  const t = (raw || '').toLowerCase().trim();
  if (/\b(news|headlines|feed|νέα|ειδήσεις)\b/.test(t))                              { _routedFire('Opening the news.', openNewsPanel); return true; }
  if (/\b(messages?|inbox|dm|chats?|μηνύματα|μήνυμ)\b/.test(t))                        { _routedFire(session ? 'Opening your messages.' : 'Sign in first.', () => session ? openMessagesPanel() : openAuthPanel()); return true; }
  if (/\b(wallet|balance|money|euros|πορτοφόλι|λεφτά|ευρώ)\b/.test(t))                 { _routedFire(session ? 'Opening your wallet.' : 'Sign in first.', () => session ? openWalletPanel() : openAuthPanel()); return true; }
  if (/\b(top\s*up|add money|buy euros|αγορά ευρώ)\b/.test(t))                         { _routedFire(session ? 'Opening top-up.' : 'Sign in first.', () => session ? openBuyPanel() : openAuthPanel()); return true; }
  if (/\b(drive|delivery|deliver|driver|courier|οδηγός|παράδοση)\b/.test(t))           { _routedFire(session ? 'Opening driver dashboard.' : 'Sign in to drive.', () => session ? openDriverPanel() : openAuthPanel()); return true; }
  if (/\b(vendor|my orders|incoming orders|παραγγελίες μου)\b/.test(t))                { _routedFire(session ? 'Opening your vendor orders.' : 'Sign in first.', () => session ? openVendorOrdersPanel() : openAuthPanel()); return true; }
  if (/\b(home|globe|world|earth|σπίτι|κόσμος)\b/.test(t))                              { _routedFire('Warping home.', pilotHome); return true; }
  if (/\b(sign\s*in|log\s*in|sign\s*up|register|εγγραφή|σύνδεση)\b/.test(t))           { _routedFire('Sign-in panel.', openAuthPanel); return true; }
  if (/\b(sign\s*out|log\s*out|αποσύνδεση)\b/.test(t) && session)                       { _routedFire('Signing you out.', signOut); return true; }
  // Call NAME / video NAME
  const callMatch = t.match(/\b(?:call|ring|video|videocall|κάλεσε)\s+([a-zà-ÿα-ω][a-zà-ÿα-ω\s']{1,40}?)(?:[.,!?]|$)/i);
  if (callMatch) {
    const name = callMatch[1].trim();
    _routedFire('Calling ' + name + '.', async () => {
      if (!session) { openAuthPanel(); return; }
      const { data } = await sb.rpc('find_peer', { q: name });
      const peer = (data || [])[0];
      if (peer) startCall(peer.id, peer.display_name);
      else openCallPicker();
    });
    return true;
  }
  if (/\b(call|ring|κάλεσε)\b/.test(t)) { _routedFire(session ? 'Opening contacts.' : 'Sign in first.', () => session ? openCallPicker() : openAuthPanel()); return true; }
  // Message NAME body
  const msgMatch = t.match(/\b(?:message|text|dm|talk to|tell|γράψε)\s+([a-zà-ÿα-ω][a-zà-ÿα-ω\s']{1,40}?)(?:\s+(.+))?$/i);
  if (msgMatch) {
    const name = msgMatch[1].trim();
    const body = (msgMatch[2] || '').trim();
    _routedFire('Looking for ' + name + '.', async () => {
      if (!session) { openAuthPanel(); return; }
      const { data } = await sb.rpc('find_peer', { q: name });
      const peer = (data || [])[0];
      if (peer) {
        openConversation(peer.id, peer.display_name);
        if (body) setTimeout(() => {
          const inp = document.getElementById('msg-body');
          if (inp) { inp.value = body; $('msg-send-form')?.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true })); }
        }, 500);
      } else { openMessagesPanel(); }
    });
    return true;
  }
  // Food / order
  const foodMatch = t.match(/\b(pizza|burger|sushi|kebab|gyros|souvlaki|coffee|tea|wine|beer|food|eat|hungry|order|delivery|deliver|drink|πίτσα|σουβλάκι|καφέ|μπύρα|παραγγελ|φαγητ|πεινάω)\b/);
  if (foodMatch) {
    const kw = foodMatch[1];
    _routedFire('Looking for ' + kw + ' nearby.', () => diveToVendors(kw));
    return true;
  }
  if (/\b(help|commands|τι μπορείς|βοήθεια)\b/.test(t)) {
    _routedFire('Try one word: news · pizza · messages · call · call NAME · wallet · drive · home · sign in.', () => {});
    return true;
  }
  return false;
}

function appendThinking() {
  const div = document.createElement('div');
  div.className = 'msg ai thinking-stub';
  div.textContent = '…';
  const msgs = $('chat-msgs');
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function callBrain(prompt, stub) {
  if (!sb) return { reply: 'AstranoV is offline. Reload the page.', meta: '' };
  const history = aicycleHistory.slice(-6);
  try {
    $('chat').classList.add('thinking');
    const t0 = Date.now();
    const { data, error } = await sb.functions.invoke('aicycle', {
      body: { prompt, history, engine: 'astranov' },
    });
    if (error) throw error;
    const reply = (data && (data.response || data.text)) || '(no reply)';
    const ms   = Number(data?.latencyMs) || (Date.now() - t0);
    const label= data?.engineLabel || data?.engine || 'brain';
    const model= data?.model ? String(data.model).split('/').pop() : '';
    const meta = `via ${label}${model ? ' · ' + model : ''} · ${(ms/1000).toFixed(1)}s`;
    aicycleHistory.push({ role: 'user', content: prompt });
    aicycleHistory.push({ role: 'assistant', content: reply });
    return { reply, meta };
  } catch (e) {
    return { reply: 'Brain unreachable: ' + (e.message || e) + '. Try again in a moment.', meta: '' };
  } finally {
    $('chat').classList.remove('thinking');
    if (stub) stub.classList.remove('thinking-stub');
  }
}

$('chat-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const input = $('chat-input');
  const text = input.value.trim();
  if (!text) return;
  appendMsg('user', text);
  input.value = '';
  if (routeLocal(text)) return;
  // Show a thinking stub the user can SEE so silence never reads as a
  // dead app. Replace its text with the actual reply when it lands.
  const stub = appendThinking();
  const { reply, meta } = await callBrain(text, stub);
  stub.textContent = reply;
  if (meta) {
    const m = document.createElement('div');
    m.className = 'msg-meta';
    m.textContent = meta;
    stub.appendChild(m);
  }
  const msgs = $('chat-msgs'); msgs.scrollTop = msgs.scrollHeight;
});

$('chat-reopen').addEventListener('click', openChat);

/* ---------- Voice (manual opt-in) ---------- */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null, listening = false;
if (SR) {
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = navigator.language || 'en-US';
  recognition.onresult = (evt) => {
    const t = evt.results?.[0]?.[0]?.transcript?.trim();
    if (t) { $('chat-input').value = t; $('chat-form').dispatchEvent(new Event('submit', { cancelable: true, bubbles: true })); }
  };
  recognition.onend = () => { listening = false; $('btn-mic').classList.remove('listening'); };
  recognition.onerror = () => { listening = false; $('btn-mic').classList.remove('listening'); };
}
$('btn-mic').addEventListener('click', () => {
  if (!recognition) return toast('Voice not supported here', 'err');
  if (listening) { try { recognition.stop(); } catch (_) {} listening = false; $('btn-mic').classList.remove('listening'); return; }
  try { recognition.start(); listening = true; $('btn-mic').classList.add('listening'); } catch (_) {}
});

/* ---------- Chat drag handle ---------- */
(function () {
  const h = $('chat-handle'); if (!h) return;
  let startY = 0, startH = 0, dragging = false;
  h.addEventListener('pointerdown', (e) => {
    h.setPointerCapture(e.pointerId);
    startY = e.clientY; startH = $('chat').getBoundingClientRect().height; dragging = true;
  });
  h.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const delta = startY - e.clientY;
    const newH = Math.max(60, Math.min(window.innerHeight * 0.6, startH + delta));
    $('chat').style.maxHeight = newH + 'px';
  });
  h.addEventListener('pointerup', (e) => {
    dragging = false; try { h.releasePointerCapture(e.pointerId); } catch (_) {}
    if ($('chat').getBoundingClientRect().height < 80) closeChat();
  });
})();

/* ---------- Boot ---------- */
window.addEventListener('load', () => {
  bootCesium();
  bootSupabase();
  ipWarmup();
  // Greet after a short pause.
  setTimeout(() => {
    openChat();
    const h = new Date().getHours();
    const tod = h < 5 ? 'Up late' : h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
    appendMsg('ai', tod + ". I'm Astranov. Try: news · pizza · messages · call NAME · wallet · drive.");
  }, 1400);
  // Handle ?paid=1 from a payment provider redirect.
  try {
    const paid = new URL(location.href).searchParams.get('paid');
    if (paid === '1') setTimeout(() => { loadProfile().then(openWalletPanel); toast('Payment received — balance updates shortly', 'ok'); }, 900);
    if (paid === '0') setTimeout(() => toast('Payment cancelled', 'err'), 900);
  } catch (_) {}
});

// Escape closes chat / panel.
window.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  if (document.activeElement?.tagName === 'INPUT' || document.activeElement?.tagName === 'TEXTAREA') {
    document.activeElement.blur(); return;
  }
  if ($('panel').classList.contains('open')) { closePanel(); return; }
  if ($('chat').classList.contains('open')) closeChat();
});

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(reg => {
    reg.update().catch(()=>{});
    navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
  }).catch(() => {});
}
</script>
