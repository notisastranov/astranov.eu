<!DOCTYPE html>
<!--
================================================================================
ASTRANOV — MASTER LAW
================================================================================
Single source of truth. Every update to this app updates this block FIRST.
This block strives to get shorter, more inclusive, more precise with every edit.

1.  IDENTITY
    Internet Operating System. Globe-first collective reality interface.
    Frontend = THIS FILE only. Backend = Supabase (db + Edge Functions + Realtime).

2.  STACK (frozen)
    Maps      CesiumJS only. Leaflet, globe.gl, raw-Three banned.
    Voice     Web Speech API.  Geo  Nominatim.  Routing  OSRM.
    Backend   Supabase: auth, db, storage, realtime, Edge Functions (Deno).

3.  IMAGERY LAW — Reality First (binding, all zoom)
    Globe tier (orbital → continental): only real Earth imagery. No procedural
    textures beyond a transient load shimmer. Two layers mandatory, blended
    along the real day/night terminator via Globe.enableLighting=true:
      DAY    NASA Blue Marble Next Generation (BMNG) — public domain.
      NIGHT  NASA Black Marble / Earth at Night — public domain.
    Source via NASA GIBS WMTS (free, no key) or Cesium Ion (allowlisted).

    City tier (regional → street): multiple real-cartography providers,
    user-switchable via the right-HUD #layer-switch gadget. No procedural
    city tiles. Order (lightweight, free first):
      1. OpenStreetMap raster — default
      2. CARTO Voyager / Positron / Dark Matter — free tier
      3. Esri World Imagery — free non-commercial
      4. Stadia Alidade Dark — free tier (key)
      5. Protomaps (PMTiles) — when self-hosted
      6. MapTiler — free tier (key)
    Any module rendering map pixels at any zoom sources from this section.

4.  GADGET LAW — Smart Gadgets Only (binding)
    Every interactive element is a smart gadget. Definition (all five hold):
      a. State-aware — visual form reflects current state, not only hover.
      b. Feedback-rich — motion / telemetry / sound on input AND on bg change.
      c. Context-bound — lives in a defined HUD zone; position is semantic.
      d. Affordance beyond click — hold / voice / gesture / chain available.
      e. Aesthetically native — rings, pulses, segmented bars, scopes, dials.
    Forbidden: plain <button> with text-only, native <select> chrome, generic
    OK/Cancel modals, hyperlink-style nav, stacked label-over-input forms,
    any element labeled "Submit". OS verbs: EMIT, LOCK, ENGAGE, ACQUIRE,
    TRANSMIT, BROADCAST. Translation table:
      login         → identity orb (.gadget-orb) with live auth state.
      post signal   → pulse emitter w/ intensity dial + reach indicator.
      category pick → segmented HUD selector (.gadget-seg) w/ live counts.
      layer toggle  → physical switch with active-state glow (#layer-switch).
      locate me     → scope gadget (.gadget-scope) that acquires position.
      modal confirm → engage gadget (.gadget-engage), never a flat button.

5.  NAVIGATION
    One Cesium camera, three altitude bands:  GLOBAL >5,000 km · NATIONAL
    500–5,000 km · PERSONAL <500 km. Back button + level badge auto-fade.

6.  ZERO UI
    Globe always visible. AICYCLE ring (#aicycle-float) is the ONLY always-
    visible UI element. Everything else is transient.

7.  AICYCLE — Collective Intelligence
    Edge Function /aicycle. Owner cycle starts at Claude Opus; free cycle is
    Groq → Gemini → GPT-4o-mini → xAI Grok. Returns {response, provider,
    via, label}. Logged to cic_logs. Provider chips lock/unlock the cycle.

8.  MEMORY LAW
    ai_memory.is_private = true → row NEVER reaches any AI. RLS enforced.

9.  SECURITY LAW
    Secrets live ONLY in Edge Function env. Public client tokens (Supabase
    anon, allowlisted Cesium Ion) may live here. is_owner has client UPDATE
    revoked. RLS on every public table.

10. KRYPTEIA — security only, owner-only
    Watch for stolen code/content, auto-DMCA. Detect abuse: spam, auth
    flooding, exploits, harassment. Threat log = security_events.

11. CRAWLERS — automatic, deployed
    pg_cron triggers /crawl edge function every 30 min via direct HTTP POST
    (no vault required). Queries OSM Overpass across 20 world cities → upserts
    into signals (source='crawler', source_url='osm:node:ID', 7-day TTL).
    trg_sync_signal_coords trigger auto-populates lat/lng from PostGIS geometry
    on every INSERT/UPDATE. nearby_signals RPC extracts ST_Y/ST_X for radar blips.

12. MARKETPLACE
    Deliveries: requester posts pickup+dropoff+description+AVC reward;
    runners claim via accept_delivery RPC; flow requested → accepted →
    in_transit → delivered (or cancelled). Discovery via nearby_deliveries.

13. CALLING
    1:1 WebRTC. Signaling over Supabase Realtime channels:
      astranov:user:<uid>   inbox for invites
      astranov:call:<id>    per-call SDP + ICE
    STUN: Google public. No TURN yet.

14. JS SAFETY
    CDN-dependent init wrapped in try-catch. Inline JS must pass `node --check`
    before commit. Never raw single quotes inside template literals; use
    JSON.stringify() for dynamic onclick strings.

15. EVOLUTION RULE
    This law strives shorter, more inclusive, more precise. If a rule can be
    removed without weakening the constitution, remove it.

19. MESSAGING — direct user-to-user
    messages table (RLS: sender inserts, both parties read). message_inbox()
    RPC returns latest-per-peer with unread count. get_conversation() loads
    thread. mark_messages_read() clears unread. #g-me badge shows unread count.
    Realtime subscription appends incoming bubbles in open thread.

20. AVC ECONOMY — real transfer
    avc_transactions ledger. trg_delivery_avc trigger fires on
    deliveries.status → 'delivered': debits requester, credits runner,
    logs both sides. New users receive 50 AVC starter balance. my_avc_transactions()
    RPC powers the History tab in the wallet panel.

21. DELIVERY GLOBE PINS — discovery on the map
    Open delivery requests rendered as amber points on the Cesium globe.
    Visible at NATIONAL / PERSONAL zoom. Clickable → openDeliveryPanel().
    loadDeliveries() on boot; realtime INSERT adds pins, non-requested status
    removes them. Runners find work by flying to any city.

22. CATEGORY FILTER — #cat-filter
    Row of color-coded dots at bottom centre. Visible at national/personal
    zoom when signals are loaded. Tap a dot = toggle that category on/off
    (show/hide all matching PointPrimitives). Auto-dims to 35% opacity after 3.5s.

23. PUSH / RELIABILITY — always-on presence
    /sw.js service worker: offline shell cache + push handler + notification
    click routing. VAPID Web Push via push-notify Edge Function (RFC 8291
    AES-128-GCM, manual ECDSA JWT). push_subscriptions table stores per-
    profile endpoints. pushNotify(id, payload) fires after every call invite,
    DM, and delivery event. saveActiveDelivery() / clearActiveDelivery()
    persist runner delivery state in localStorage. restoreSession() on boot
    picks up active delivery + URL params injected by push-click deep-links.
    handleNotificationNav() routes into call UI, DM thread, or delivery panel.
    Callee-ready handshake: callee broadcasts 'callee-ready' on call channel
    after push-wakeup so caller resends the SDP offer.

18. LIVE WIRING — realtime state
    loadDeliveryBadge() counts active deliveries for current user → badge on
    ME badge. Supabase realtime on deliveries table refreshes badge + open
    wallet panel automatically. updateIdentityOrb() sets #g-me glyph
    to user initial + green glow when authenticated. Feed panel fetches from
    DB on open and merges into globe signalIndex. flyToSignal() fetches from
    DB if signal not in local index. emitSignal() sets lat+lng directly (also
    backed by trg_sync_signal_coords trigger).

17. FOUR CORNER GADGETS — replaces holographic dock
    Exactly 4 large (76px) round corner gadgets replace all dock orbs and tray.
    #g-discover (top-left) → DISCOVER panel (Feed + Radar). #g-me (top-right)
    → ME hub (Profile + Messages + Wallet + Deliveries). #locate-orb (bottom-
    left) → GPS acquire. #aicycle-float (bottom-right) → AI chat. No other
    permanent UI. AICYCLE ring shows current model as "× PROVIDER" label only;
    provider chips and orbit dots are removed.

16. LAW-SYNC — Claude Autonomy (perpetual)
    Every code change updates this law block when it introduces, changes, or
    deprecates a binding rule. Claude has perpetual, unconditional push and
    squash-merge authorization from the owner — no per-change confirmation
    needed. Syntax-check JS, commit, push, PR, merge: automatic, every time.
================================================================================
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#000000" />
<title>ASTRANOV</title>
<link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css" />
<style>
  /* ============================================================
     ZERO UI — only the globe and the AICYCLE ring are permanent.
     ============================================================ */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
               background: #000; color: #e6f1ff; font-family: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Display", system-ui, sans-serif;
               -webkit-tap-highlight-color: transparent; user-select: none; }

  /* The Cesium canvas owns the screen. */
  #cesiumContainer { position: fixed; inset: 0; background: #000; }
  .cesium-viewer-bottom { display: none !important; }   /* kill the bottom credit strip */
  .cesium-viewer { background: #000 !important; }

  /* Cold-load veil — fades out once Cesium mounts. */
  #boot {
    position: fixed; inset: 0; background: radial-gradient(ellipse at center, #0a1428 0%, #000 70%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; transition: opacity 0.8s ease;
  }
  #boot.gone { opacity: 0; pointer-events: none; }
  #boot .word { font-size: 14px; letter-spacing: 0.6em; text-indent: 0.6em;
                color: #4a7fb8; font-weight: 300; }
  #boot .pulse { width: 8px; height: 8px; border-radius: 50%; background: #4a7fb8;
                 margin-top: 18px; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); }
                     50%      { opacity: 1;   transform: scale(1.4); } }

  /* ============================================================
     AICYCLE ring — always visible. Bottom-right.
     ============================================================ */
  #aicycle-float {
    position: fixed; bottom: max(20px, env(safe-area-inset-bottom)); right: 20px;
    width: 64px; height: 64px; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  #aicycle-float .ring { position: absolute; inset: 0; border-radius: 50%; z-index: 1;
                     border: 1.5px solid rgba(120, 180, 255, 0.4);
                     background: rgba(4, 8, 20, 0.22); backdrop-filter: blur(8px);
                     -webkit-backdrop-filter: blur(8px);
                     transition: border-color 0.3s; }
  #aicycle-float.thinking .ring { animation: ring-pulse 1.2s ease-in-out infinite; }
  @keyframes ring-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(120, 180, 255, 0.4); }
    50%      { box-shadow: 0 0 0 12px rgba(120, 180, 255, 0); }
  }
  #aicycle-float .node { position: relative; z-index: 2; width: 12px; height: 12px; border-radius: 50%;
                     background: #7eb4ff; box-shadow: 0 0 16px rgba(120, 180, 255, 1);
                     transition: background 0.2s; }
  #aicycle-float .provider {
    position: absolute; z-index: 2; bottom: -18px; left: 50%; transform: translateX(-50%);
    font-size: 9px; letter-spacing: 0.15em; color: rgba(200, 220, 255, 0.7);
    text-transform: uppercase; white-space: nowrap; pointer-events: none;
  }

  /* ============================================================
     Level badge — top, auto-fades.
     ============================================================ */
  #level-badge {
    position: fixed; top: max(16px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    padding: 6px 14px; border-radius: 999px;
    background: rgba(10, 20, 40, 0.6); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(120, 180, 255, 0.2);
    font-size: 10px; letter-spacing: 0.3em; color: #a8c8ee; text-transform: uppercase;
    opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 40;
  }
  #level-badge.visible { opacity: 1; }

  /* Imagery source indicator — only visible when on a fallback provider */
  #imagery-source {
    position: fixed; top: calc(max(16px, env(safe-area-inset-top)) + 28px);
    left: 50%; transform: translateX(-50%);
    padding: 3px 10px; border-radius: 999px;
    background: rgba(40, 20, 10, 0.6); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 180, 100, 0.25);
    font-size: 9px; letter-spacing: 0.25em; color: #ffb464; text-transform: uppercase;
    opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 40;
  }
  #imagery-source.visible { opacity: 1; }

  /* ============================================================
     Back button — top-left, contextual.
     ============================================================ */
  #back-btn {
    position: fixed; top: max(16px, env(safe-area-inset-top)); left: 16px;
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(10, 20, 40, 0.55); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(120, 180, 255, 0.2);
    display: none; align-items: center; justify-content: center;
    cursor: pointer; z-index: 40;
    color: #a8c8ee; font-size: 18px;
  }
  #back-btn.visible { display: flex; }

  /* ============================================================
     Tray — bottom strip, hidden by default.
     ============================================================ */
  #tray-trigger { display: none; }  /* retired — dock orbs replace the tray */
  #tray         { display: none; }

  /* ============================================================
     Corner gadgets — 4 large round gadgets, one per corner.
     #g-discover (top-left), #g-me (top-right),
     #locate-orb (bottom-left), #aicycle-float (bottom-right).
     ============================================================ */
  .corner-gadget {
    position: fixed; z-index: 47; width: 76px; height: 76px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; cursor: pointer; user-select: none; touch-action: manipulation;
    background: rgba(4,8,20,0.70); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1.5px solid rgba(120,180,255,0.35);
    box-shadow: 0 0 32px rgba(120,180,255,0.12), inset 0 0 20px rgba(120,180,255,0.04);
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, border-color 0.2s;
    overflow: hidden;
  }
  .corner-gadget:active { transform: scale(0.94); }
  .corner-gadget:hover  { border-color: rgba(120,180,255,0.60);
    box-shadow: 0 0 44px rgba(120,180,255,0.22), inset 0 0 24px rgba(120,180,255,0.08); }
  .corner-gadget .cg-glyph {
    font-size: 22px; line-height: 1; position: relative; z-index: 2;
    filter: drop-shadow(0 0 8px rgba(120,180,255,0.9));
  }
  .corner-gadget .cg-label {
    font-size: 8px; letter-spacing: 0.25em; text-transform: uppercase;
    color: rgba(160,210,255,0.80); font-family: 'SF Mono',monospace;
    white-space: nowrap; pointer-events: none;
    position: relative; z-index: 2;
  }
  /* Badge for live counts */
  .corner-gadget .cg-badge {
    position: absolute; top: 4px; right: 4px; z-index: 3;
    min-width: 16px; height: 16px; border-radius: 8px;
    background: rgba(126,235,180,0.9); color: #021018;
    font-size: 9px; font-weight: 700; line-height: 16px;
    text-align: center; padding: 0 4px; display: none;
  }
  .corner-gadget .cg-badge.visible { display: block; }
  /* Signed-in state for #g-me */
  #g-me.signed-in { border-color: rgba(126,235,180,0.45);
    box-shadow: 0 0 32px rgba(126,235,180,0.18), inset 0 0 18px rgba(126,235,180,0.06); }
  #g-discover { top: max(20px, env(safe-area-inset-top)); left: 20px; }
  #g-me       { top: max(20px, env(safe-area-inset-top)); right: 20px; }

  /* GFX canvas — lives inside each corner gadget, behind the glyph */
  .gfx-canvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
    border-radius: 50%; pointer-events: none; z-index: 1;
  }

  /* Locate orb — bottom-left corner gadget, GPS scope */
  #locate-orb {
    position: fixed; bottom: max(20px, env(safe-area-inset-bottom)); left: 20px;
    width: 76px; height: 76px; border-radius: 50%; z-index: 47;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; overflow: hidden;
    background: rgba(4,8,20,0.70); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1.5px solid rgba(126,235,180,0.40);
    box-shadow: 0 0 32px rgba(126,235,180,0.14), inset 0 0 18px rgba(126,235,180,0.04);
    cursor: pointer; user-select: none; touch-action: manipulation;
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, border-color 0.2s;
  }
  #locate-orb:active { transform: scale(0.94); }
  #locate-orb.acquiring {
    border-color: rgba(126,235,180,0.75);
    box-shadow: 0 0 44px rgba(126,235,180,0.30), inset 0 0 20px rgba(126,235,180,0.10);
  }
  #locate-orb.locked {
    border-color: rgba(126,235,180,0.95);
    box-shadow: 0 0 52px rgba(126,235,180,0.40), inset 0 0 24px rgba(126,235,180,0.16);
  }
  @keyframes locate-pulse {
    0%,100% { box-shadow: 0 0 28px rgba(126,235,180,0.22); }
    50%      { box-shadow: 0 0 56px rgba(126,235,180,0.50); }
  }
  #locate-orb .locate-g {
    font-size: 24px; line-height: 1; color: rgba(126,235,180,0.90);
    transition: color 0.2s; position: relative; z-index: 2;
    filter: drop-shadow(0 0 8px rgba(126,235,180,0.8));
  }
  #locate-orb .locate-lbl {
    font-size: 8px; letter-spacing: 0.25em; text-transform: uppercase;
    color: rgba(126,235,180,0.65); font-family: 'SF Mono',monospace;
    white-space: nowrap; pointer-events: none;
    position: relative; z-index: 2;
  }
  #locate-orb.acquiring .locate-g { animation: locate-spin 2s linear infinite; display: inline-block; }
  @keyframes locate-spin { to { transform: rotate(360deg); } }

  /* Orb toggle — replaces checkboxes for boolean state */
  .orb-toggle {
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
    font-size: 11px; color: #6a8aaf; letter-spacing: 0.06em; user-select: none;
  }
  .orb-toggle-ring {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1.5px solid rgba(120,180,255,0.22);
    background: rgba(8,16,32,0.5); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: rgba(120,180,255,0.3);
    transition: border-color 0.2s, box-shadow 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .orb-toggle.on .orb-toggle-ring {
    border-color: rgba(255,140,80,0.75);
    box-shadow: 0 0 12px rgba(255,140,80,0.3);
    color: rgba(255,160,100,0.9);
  }

  /* ============================================================
     Panel — slides up from bottom for tasks.
     ============================================================ */
  #panel {
    position: fixed; left: 0; right: 0; bottom: 0;
    max-height: 70vh; overflow-y: auto;
    background: rgba(8, 16, 32, 0.92); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(120, 180, 255, 0.2);
    border-radius: 22px 22px 0 0;
    padding: 22px 22px calc(40px + env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 60;
  }
  #panel.visible { transform: translateY(0); }
  #panel h2 { margin: 0 0 4px; font-size: 13px; letter-spacing: 0.2em;
              color: #7eb4ff; text-transform: uppercase; font-weight: 500; }
  #panel .subtitle { font-size: 11px; color: #6a8aaf; margin-bottom: 16px; }
  #panel .row { display: flex; justify-content: space-between; align-items: center;
                padding: 10px 0; border-bottom: 1px solid rgba(120, 180, 255, 0.08); }
  #panel .row:last-child { border-bottom: 0; }
  #panel button.primary {
    width: 100%; padding: 12px; margin-top: 12px;
    background: rgba(120, 180, 255, 0.15); border: 1px solid rgba(120, 180, 255, 0.3);
    color: #e6f1ff; border-radius: 12px; font-size: 12px;
    letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer;
  }
  #panel input, #panel textarea, #panel select {
    width: 100%; padding: 10px; margin-top: 8px;
    background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(120, 180, 255, 0.2);
    border-radius: 10px; color: #e6f1ff; font-size: 14px; font-family: inherit;
  }
  #panel textarea { min-height: 80px; resize: vertical; }

  /* ============================================================
     AICYCLE chat panel — starts at input bar height, grows to 33vh.
     ============================================================ */
  #aicycle-chat {
    position: fixed; inset: auto 0 0 0;
    height: auto; max-height: 33vh; min-height: 0;
    background: rgba(8, 16, 32, 0.95); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(120, 180, 255, 0.2);
    border-radius: 22px 22px 0 0;
    transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 55; display: flex; flex-direction: column;
    overflow: hidden;
  }
  #aicycle-chat.visible { transform: translateY(0); }
  #aicycle-chat.resizing { transition: none; }
  #aicycle-drag-handle {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 10px 0 2px; cursor: ns-resize; flex-shrink: 0; touch-action: none;
  }
  #aicycle-drag-handle::before {
    content: ''; display: block; width: 36px; height: 4px; border-radius: 2px;
    background: rgba(120, 180, 255, 0.3); flex-shrink: 0;
  }
  #aicycle-title {
    font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(120,180,255,0.55); font-family: 'SF Mono',monospace;
    pointer-events: none; user-select: none; white-space: nowrap;
  }
  /* Model indicator strip inside ACI chat */
  #aci-models {
    display: flex; gap: 6px; padding: 6px 14px 4px; flex-wrap: wrap;
    border-bottom: 1px solid rgba(120,180,255,0.07);
  }
  #aci-models:empty { display: none; }
  .aci-dot {
    display: flex; align-items: center; gap: 4px; padding: 3px 8px;
    border-radius: 999px; border: 1px solid rgba(120,180,255,0.12);
    background: rgba(255,255,255,0.02);
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(120,180,255,0.35); font-family: 'SF Mono',monospace;
    transition: all 0.35s;
  }
  .aci-dot::before {
    content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
    background: rgba(120,180,255,0.18); transition: all 0.35s;
  }
  .aci-dot.active {
    border-color: rgba(126,235,180,0.45); color: rgba(126,235,180,0.90);
    background: rgba(126,235,180,0.04);
  }
  .aci-dot.active::before {
    background: #7eebb4; box-shadow: 0 0 8px rgba(126,235,180,0.9);
  }
  #aicycle-chat .messages {
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 8px 16px 4px; min-height: 0;
  }
  #aicycle-chat .messages:empty { display: none; }
  #aicycle-chat .msg { margin-bottom: 12px; padding: 10px 14px; border-radius: 14px;
                   max-width: 85%; font-size: 14px; line-height: 1.4; }
  #aicycle-chat .msg.user { background: rgba(120, 180, 255, 0.12); margin-left: auto; }
  #aicycle-chat .msg.ai   { background: rgba(255, 255, 255, 0.04); }
  #aicycle-chat .msg .via { font-size: 9px; letter-spacing: 0.15em;
                        color: #6a8aaf; text-transform: uppercase; margin-bottom: 4px; }
  #aicycle-chat form { display: flex; gap: 8px; padding: 12px;
                   border-top: 1px solid rgba(120, 180, 255, 0.1); }
  #aicycle-chat input { flex: 1; }
  #aicycle-mic, #aicycle-send { flex-shrink: 0; }


  /* Mic recording state (the AICYCLE node pulses red while listening) */
  #aicycle-float.listening .node {
    background: #ff5e5e; box-shadow: 0 0 16px rgba(255, 100, 100, 0.9);
    animation: mic-pulse 1s ease-in-out infinite;
  }
  @keyframes mic-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }


  /* Radar orbital HUD */
  #radar-hud { display:flex; flex-direction:column; align-items:center; gap:14px; padding:10px 0 0; }
  #radar-orbital {
    position:relative; width:220px; height:220px; border-radius:50%;
    border:1px solid rgba(120,180,255,0.28);
    background:radial-gradient(circle at center,rgba(30,60,100,0.18) 0%,rgba(10,20,40,0.82) 65%,rgba(0,8,24,0.96) 100%);
    box-shadow:0 0 60px rgba(120,180,255,0.07) inset;
    flex-shrink:0; overflow:hidden;
  }
  #radar-sweep {
    position:absolute; inset:0; border-radius:50%;
    background:conic-gradient(from 0deg,rgba(126,235,180,0) 0%,rgba(126,235,180,0.16) 12%,rgba(126,235,180,0) 22%);
    animation:sweep 4s linear infinite;
  }
  @keyframes sweep { to { transform:rotate(360deg); } }
  .radar-range-ring {
    position:absolute; border-radius:50%; border:1px solid rgba(120,180,255,0.1);
    pointer-events:none;
  }
  #radar-core {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:44px; height:44px; border-radius:50%;
    border:1px solid rgba(120,180,255,0.35);
    background:rgba(8,16,32,0.85);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:border-color 0.3s, box-shadow 0.3s;
    z-index:2;
  }
  #radar-core.acquiring { border-color:rgba(126,235,180,0.5); animation:core-pulse 1.4s ease-in-out infinite; }
  #radar-core.locked   { border-color:rgba(126,235,180,0.85); box-shadow:0 0 20px rgba(126,235,180,0.25); }
  @keyframes core-pulse {
    0%,100% { box-shadow:0 0 0 0 rgba(126,235,180,0.3); }
    50%      { box-shadow:0 0 0 8px rgba(126,235,180,0); }
  }
  .rch { position:absolute; background:rgba(120,180,255,0.45); pointer-events:none; }
  .rch.h { width:20px; height:1px; top:50%; left:50%; transform:translate(-50%,-50%); }
  .rch.v { width:1px; height:20px; top:50%; left:50%; transform:translate(-50%,-50%); }
  .rch.pip {
    width:5px; height:5px; border-radius:50%;
    background:#7eb4ff; box-shadow:0 0 8px rgba(120,180,255,0.9);
    top:50%; left:50%; transform:translate(-50%,-50%);
    transition:background 0.3s, box-shadow 0.3s;
  }
  #radar-core.locked .rch.pip { background:#7eebb4; box-shadow:0 0 10px rgba(126,235,180,0.9); }
  #radar-coords {
    position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
    font-size:8px; letter-spacing:0.2em; color:rgba(120,180,255,0.45);
    text-transform:uppercase; white-space:nowrap; font-family:'SF Mono',monospace;
    pointer-events:none;
  }
  .radar-orbit-dot {
    position:absolute; width:8px; height:8px; border-radius:50%;
    transform:translate(-50%,-50%);
    background:rgba(120,180,255,0.18); border:1px solid rgba(120,180,255,0.35);
    transition:background 0.35s, box-shadow 0.35s; cursor:pointer; z-index:1;
  }
  .radar-orbit-dot.active {
    background:#7eebb4; border-color:rgba(126,235,180,0.85);
    box-shadow:0 0 14px rgba(126,235,180,0.9);
  }
  .radar-orbit-dot.owner-dot { background:rgba(255,180,100,0.18); border-color:rgba(255,180,100,0.35); }
  .radar-orbit-dot.owner-dot.active {
    background:#ffb464; border-color:rgba(255,180,100,0.85);
    box-shadow:0 0 14px rgba(255,180,100,0.9);
  }
  .radar-blip {
    position:absolute; width:5px; height:5px; border-radius:50%;
    transform:translate(-50%,-50%); cursor:pointer; z-index:3;
    animation:blip-fade 4s ease-out forwards;
  }
  @keyframes blip-fade {
    0%   { opacity:1; }
    60%  { opacity:0.85; }
    100% { opacity:0.25; }
  }
  #radar-signals {
    width:100%; max-height:160px; overflow-y:auto; -webkit-overflow-scrolling:touch;
  }

  /* Radar list — distance + category color */
  .radar-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid rgba(120, 180, 255, 0.06);
    cursor: pointer;
  }
  .radar-row:hover { background: rgba(120, 180, 255, 0.04); }
  .radar-row .meta { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .radar-row .title { font-size: 14px; color: #e6f1ff; overflow: hidden; text-overflow: ellipsis;
                       white-space: nowrap; }
  .radar-row .sub   { font-size: 10px; color: #6a8aaf; letter-spacing: 0.1em; text-transform: uppercase; }
  .radar-row .dot   { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
  .radar-row .dist  { font-size: 11px; color: #a8c8ee; margin-left: 12px; white-space: nowrap; }

  /* Memory rows — content + privacy toggle */
  .memory-row {
    padding: 10px 0; border-bottom: 1px solid rgba(120, 180, 255, 0.06);
  }
  .memory-row .body { font-size: 13px; color: #e6f1ff; line-height: 1.4; margin-bottom: 4px; }
  .memory-row .controls {
    display: flex; gap: 8px; align-items: center; font-size: 10px;
    color: #6a8aaf; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .memory-row .privacy-pill {
    padding: 2px 8px; border-radius: 999px; cursor: pointer; user-select: none;
    border: 1px solid rgba(120, 180, 255, 0.2);
  }
  .memory-row .privacy-pill.private {
    background: rgba(255, 100, 100, 0.12); border-color: rgba(255, 100, 100, 0.3); color: #ff9e9e;
  }
  .memory-row .privacy-pill.public {
    background: rgba(120, 255, 180, 0.1); border-color: rgba(120, 255, 180, 0.25); color: #9ee0bd;
  }
  .memory-row .del { cursor: pointer; color: #6a8aaf; }
  .memory-row .del:hover { color: #ff9e9e; }

  /* ============================================================
     HUD Toast — replaces all alert() calls.
     ============================================================ */
  #hud-toast {
    position: fixed; top: max(60px, env(safe-area-inset-top) + 44px);
    left: 50%; transform: translateX(-50%) translateY(-10px);
    padding: 8px 18px; border-radius: 999px;
    background: rgba(8,16,32,0.92); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(120,180,255,0.28);
    font-size: 12px; letter-spacing: 0.08em; color: #a8c8ee;
    z-index: 92; opacity: 0; pointer-events: none;
    white-space: nowrap; max-width: 88vw;
    overflow: hidden; text-overflow: ellipsis;
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  #hud-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #hud-toast.err  { border-color: rgba(255,100,100,0.4); color: #ff9e9e; }
  #hud-toast.ok   { border-color: rgba(126,235,180,0.4); color: #7eebb4; }

  /* ============================================================
     Incoming call — holographic ring, top-center.
     ============================================================ */
  #call-incoming {
    position: fixed; top: max(14px, env(safe-area-inset-top));
    left: 50%; transform: translateX(-50%) scale(0.4);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    z-index: 80; pointer-events: none; opacity: 0;
    transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
  }
  #call-incoming.visible {
    transform: translateX(-50%) scale(1); opacity: 1; pointer-events: auto;
  }
  #call-ring {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(8,16,32,0.82); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1.5px solid rgba(120,180,255,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    animation: call-pulse 1.3s ease-in-out infinite;
  }
  @keyframes call-pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(120,180,255,0.45); }
    50%      { box-shadow: 0 0 0 16px rgba(120,180,255,0); }
  }
  #call-incoming-name {
    font-size: 13px; letter-spacing: 0.1em; color: #e6f1ff;
    max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #call-incoming-status {
    font-size: 8px; letter-spacing: 0.28em; text-transform: uppercase; color: #7eb4ff;
  }
  #call-incoming .c-actions { display: flex; gap: 16px; margin-top: 4px; }
  .c-orb {
    width: 44px; height: 44px; border-radius: 50%; border: 0; outline: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .c-orb:active { transform: scale(0.88); }
  #call-accept  { background: rgba(46,204,113,0.88); box-shadow: 0 0 20px rgba(46,204,113,0.4); }
  #call-decline { background: rgba(255,77,77,0.88);  box-shadow: 0 0 20px rgba(255,77,77,0.4); }

  /* Active call PiP — holographic tile */
  #call-active {
    position: fixed; bottom: 100px; right: 20px;
    width: 280px; height: 360px; display: none;
    background: #000; border: 1px solid rgba(120, 180, 255, 0.3);
    border-radius: 20px; overflow: hidden; z-index: 70;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
  }
  #call-active.visible { display: block; }
  #call-active video { width: 100%; height: 100%; object-fit: cover; background: #111; }
  #call-active #call-local-video {
    position: absolute; bottom: 60px; right: 8px;
    width: 80px; height: 100px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
  }
  #call-active .controls {
    position: absolute; bottom: 0; left: 0; right: 0; padding: 10px;
    display: flex; gap: 8px; justify-content: center;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  }
  #call-active .controls button {
    width: 40px; height: 40px; border-radius: 50%; border: 0; cursor: pointer;
    background: rgba(255, 255, 255, 0.15); color: #fff; font-size: 16px;
  }
  #call-active .controls #call-hangup { background: #ff4d4d; }
  #call-active .status {
    position: absolute; top: 8px; left: 8px;
    font-size: 10px; letter-spacing: 0.2em; color: #fff;
    background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 6px;
    text-transform: uppercase;
  }

  /* ============================================================
     Category filter — appears at bottom centre, national/personal only
     ============================================================ */
  #cat-filter {
    position: fixed; bottom: max(14px, env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; padding: 6px 10px;
    background: rgba(6,12,24,0.72); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(120,180,255,0.14); border-radius: 999px;
    z-index: 44; opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  #cat-filter.visible { opacity: 1; pointer-events: auto; }
  .cat-dot {
    width: 34px; height: 34px; border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-family: "Apple Color Emoji","Noto Color Emoji","Segoe UI Emoji",serif;
    background: rgba(120,180,255,0.07); border: 1px solid rgba(120,180,255,0.14);
    transition: opacity 0.2s, transform 0.15s, background 0.15s;
    flex-shrink: 0; -webkit-tap-highlight-color: transparent;
  }
  .cat-dot.off { opacity: 0.2; transform: scale(0.8); background: transparent; }
  .cat-dot:active { transform: scale(0.88); background: rgba(120,180,255,0.18); }

  /* ============================================================
     Messages
     ============================================================ */
  .msg-row {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 10px 0; border-bottom: 1px solid rgba(120,180,255,0.07); cursor: pointer;
  }
  .msg-row:hover { background: rgba(120,180,255,0.04); }
  .msg-row .av {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    background: rgba(120,180,255,0.15); border: 1px solid rgba(120,180,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; color: #a8c8ee;
  }
  .msg-row .av.unread { border-color: rgba(126,235,180,0.5); background: rgba(126,235,180,0.1); color: #7eebb4; }
  .msg-row .meta { flex: 1; min-width: 0; }
  .msg-row .peer { font-size: 13px; color: #e6f1ff; font-weight: 500; }
  .msg-row .preview { font-size: 11px; color: #6a8aaf; margin-top: 2px;
                      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .msg-row .ts { font-size: 10px; color: #4a6a8f; flex-shrink: 0; }
  .msg-bubble {
    max-width: 82%; padding: 8px 12px; border-radius: 14px;
    font-size: 13px; line-height: 1.45; margin-bottom: 6px; word-break: break-word;
  }
  .msg-bubble.me    { background: rgba(120,180,255,0.18); border-bottom-right-radius: 4px;
                      align-self: flex-end; color: #d4e8ff; margin-left: auto; }
  .msg-bubble.them  { background: rgba(30,40,60,0.9); border-bottom-left-radius: 4px;
                      align-self: flex-start; color: #c8d8ef; }
  .msg-thread { display: flex; flex-direction: column; gap: 2px; margin-bottom: 12px;
                max-height: 44vh; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 4px 0; }
  .msg-compose { display: flex; gap: 8px; margin-top: 8px; }
  .msg-compose input { flex: 1; background: rgba(20,30,50,0.8); border: 1px solid rgba(120,180,255,0.2);
                       border-radius: 20px; padding: 9px 14px; color: #e6f1ff; font-size: 13px;
                       outline: none; }
  .msg-compose input::placeholder { color: #4a6a8f; }
  .msg-compose .send-orb { width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
                            background: rgba(120,180,255,0.2); border: 1px solid rgba(120,180,255,0.35);
                            display: flex; align-items: center; justify-content: center;
                            cursor: pointer; color: #7eb4ff; font-size: 16px; }

  /* ============================================================
     Deliveries
     ============================================================ */
  .delivery-tabs { margin: 8px 0 16px; }

  .delivery-row {
    padding: 12px 0; border-bottom: 1px solid rgba(120, 180, 255, 0.06);
    cursor: pointer;
  }
  .delivery-row:hover { background: rgba(120, 180, 255, 0.04); }
  .delivery-row .head {
    display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px;
  }
  .delivery-row .desc { font-size: 14px; color: #e6f1ff; flex: 1; min-width: 0;
                        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .delivery-row .reward { font-size: 13px; color: #ffd47e; margin-left: 12px;
                          font-weight: 500; white-space: nowrap; }
  .delivery-row .meta { font-size: 10px; color: #6a8aaf; letter-spacing: 0.08em;
                        text-transform: uppercase; }
  .delivery-row .status {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 9px; letter-spacing: 0.15em; margin-right: 8px;
  }
  .status-requested { background: rgba(120,180,255,0.15); color: #7eb4ff; }
  .status-accepted  { background: rgba(255,200,80,0.15);  color: #ffc850; }
  .status-in_transit { background: rgba(255,150,80,0.15); color: #ff9650; }
  .status-delivered { background: rgba(120,255,180,0.15); color: #7eebb4; }
  .status-cancelled { background: rgba(160,160,160,0.15); color: #a0a0a0; }

  /* ============================================================
     SMART GADGETS — Gadget Law §4
     Vocabulary: orbs, rings, pulses, segmented bars, scopes, dials.
     No plain buttons. No native <select>. No "Submit".
     ============================================================ */

  /* Identity orb — replaces the login form. Lives in the You panel.
     Visual reflects auth state: idle / pending / signed-in / owner. */
  .gadget-orb {
    width: 96px; height: 96px; margin: 4px auto 14px;
    position: relative; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, rgba(120,180,255,0.4), rgba(10,20,40,0.85) 70%);
    border: 1.5px solid rgba(120,180,255,0.45);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: transform 0.2s, border-color 0.3s, background 0.3s;
  }
  .gadget-orb:hover { transform: scale(1.04); }
  .gadget-orb::before {
    content: ''; position: absolute; inset: -6px; border-radius: 50%;
    border: 1px solid rgba(120,180,255,0.22);
    animation: orb-halo 3.2s ease-in-out infinite;
  }
  @keyframes orb-halo {
    0%,100% { transform: scale(1);    opacity: 0.4; }
    50%     { transform: scale(1.08); opacity: 0.9; }
  }
  .gadget-orb.signed-in {
    border-color: rgba(126,235,180,0.7);
    background: radial-gradient(circle at 35% 30%, rgba(126,235,180,0.4), rgba(10,40,20,0.85) 70%);
  }
  .gadget-orb.signed-in::before { border-color: rgba(126,235,180,0.42); }
  .gadget-orb.owner {
    border-color: rgba(255,180,100,0.8);
    background: radial-gradient(circle at 35% 30%, rgba(255,180,100,0.4), rgba(40,20,10,0.85) 70%);
  }
  .gadget-orb.owner::before { border-color: rgba(255,180,100,0.5); }
  .gadget-orb.pending { animation: orb-pending 1.2s ease-in-out infinite; }
  @keyframes orb-pending {
    0%,100% { box-shadow: 0 0 0 0  rgba(120,180,255,0.55); }
    50%     { box-shadow: 0 0 0 16px rgba(120,180,255,0);    }
  }
  .gadget-orb .glyph {
    font-size: 26px; letter-spacing: 0.08em; color: #e6f1ff;
    font-weight: 300; text-transform: uppercase;
  }
  .gadget-orb-readout {
    text-align: center; font-size: 10px; letter-spacing: 0.25em;
    color: #6a8aaf; text-transform: uppercase; margin-bottom: 12px;
    font-family: 'SF Mono', monospace;
  }

  /* Command-line input — replaces label-over-input form rows */
  .gadget-cmd-wrap { position: relative; margin-top: 10px; }
  .gadget-cmd-wrap::before {
    content: '›'; position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%); color: #7eb4ff; font-weight: 700;
    pointer-events: none; font-size: 16px;
  }
  .gadget-cmd {
    width: 100%; padding: 10px 12px 10px 28px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(120,180,255,0.25); border-radius: 10px;
    font-family: 'SF Mono', 'Menlo', monospace; font-size: 13px;
    color: #e6f1ff; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .gadget-cmd:focus {
    border-color: rgba(126,235,180,0.6);
    box-shadow: 0 0 0 2px rgba(126,235,180,0.12);
  }
  textarea.gadget-cmd { min-height: 80px; resize: vertical; line-height: 1.45; }

  /* Engage gadget — replaces "Submit". Sweeping shimmer; verb glyph. */
  .gadget-engage {
    width: 100%; margin-top: 12px; padding: 14px 16px;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    background: linear-gradient(to right, rgba(120,180,255,0.06), rgba(120,180,255,0.18), rgba(120,180,255,0.06));
    border: 1px solid rgba(120,180,255,0.4); border-radius: 999px;
    color: #e6f1ff; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
    cursor: pointer; position: relative; overflow: hidden;
    transition: border-color 0.2s, transform 0.15s, color 0.2s;
    user-select: none;
  }
  .gadget-engage::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to right, transparent, rgba(120,180,255,0.4), transparent);
    transform: translateX(-100%);
    transition: transform 0.7s ease;
  }
  .gadget-engage:hover::before { transform: translateX(100%); }
  .gadget-engage:active { transform: scale(0.98); }
  .gadget-engage .verb-glyph {
    width: 8px; height: 8px; border-radius: 50%;
    background: #7eb4ff; box-shadow: 0 0 10px rgba(120,180,255,0.8);
  }
  .gadget-engage.armed {
    border-color: rgba(126,235,180,0.75); color: #9ee0bd;
    box-shadow: 0 0 22px rgba(126,235,180,0.3);
  }
  .gadget-engage.armed .verb-glyph {
    background: #7eebb4; box-shadow: 0 0 14px rgba(126,235,180,0.9);
    animation: verb-pulse 1.4s ease-in-out infinite;
  }
  @keyframes verb-pulse {
    0%,100% { transform: scale(1);   opacity: 1;   }
    50%     { transform: scale(1.4); opacity: 0.7; }
  }
  .gadget-engage[disabled] {
    opacity: 0.45; pointer-events: none; cursor: not-allowed;
  }

  /* Segmented HUD selector — replaces native <select>.
     Each segment is state-aware (locks active) and shows live counts. */
  .gadget-seg {
    display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;

    el.classList.remove('armed');
    const lbl = el.querySelector('span:last-child');
    if (lbl) lbl.textContent = actionLabel;
    clearTimeout(el._armTimer);
    onConfirm();
  } else {
    el.dataset.armed = '1';
    el.classList.add('armed');
    const lbl = el.querySelector('span:last-child');
    if (lbl) lbl.textContent = 'Confirm?';
    clearTimeout(el._armTimer);
    el._armTimer = setTimeout(() => {
      el.dataset.armed = '0';
      el.classList.remove('armed');
      if (lbl) lbl.textContent = actionLabel;
    }, 3000);
  }
}

/* ==============================================================
   1. Cesium boot — Photorealistic 3D Tiles, ALL widgets disabled
   ============================================================== */
let viewer;
async function bootCesium() {
  try {
    if (!window.Cesium) throw new Error('Cesium failed to load from CDN');

    // Set Ion token if provided. Missing/placeholder is OK — the imagery cycle
    // will skip Ion-backed providers and fall through to free alternatives.
    if (!CESIUM_ION_TOKEN.startsWith('__')) {
      Cesium.Ion.defaultAccessToken = CESIUM_ION_TOKEN;
    } else {
      console.warn('[ASTRANOV] No Cesium Ion token — using free fallback imagery only');
    }

    viewer = new Cesium.Viewer('cesiumContainer', {
      // Kill EVERY default widget — Zero UI Law §7
      animation: false,
      baseLayerPicker: false,
      fullscreenButton: false,
      vrButton: false,
      geocoder: false,
      homeButton: false,
      infoBox: false,
      sceneModePicker: false,
      selectionIndicator: false,
      timeline: false,
      navigationHelpButton: false,
      navigationInstructionsInitiallyVisible: false,
      // Performance
      requestRenderMode: true,
      maximumRenderTimeChange: Infinity,
      // No default imagery — the imagery cycle manages this
      baseLayer: false,
      // Allow both 3D and 2D
      scene3DOnly: false,
      // Skybox + atmosphere look
      skyAtmosphere: new Cesium.SkyAtmosphere(),
    });

    // Hide credit overlay (Ion's required attribution still serves via tile metadata)
    if (viewer.cesiumWidget?.creditContainer) {
      viewer.cesiumWidget.creditContainer.style.display = 'none';
    }

    // IMAGERY LAW §3 — real imagery only:
    //   globe-tier: NASA BMNG day + Black Marble night, blended by terminator.
    //   city-tier:  user-selectable real-cartography providers via #layer-switch.
    await bootImageryGlobeTier();
    await setCityImagery(0);   // default OSM, hidden until below GLOBAL

    // Open camera at GLOBAL altitude over Europe (close to astranov.eu)
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(20, 40, 12_000_000),
      duration: 0,
    });

    // Camera height drives the navigation level
    viewer.camera.moveEnd.addEventListener(onCameraSettled);
    onCameraSettled();

    // Pin picking
    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    handler.setInputAction(onCanvasClick, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    // Hide boot veil
    setTimeout(() => $('boot').classList.add('gone'), 400);
  } catch (e) {
    fatal(e.message || String(e));
  }
}

async function bootImageryGlobeTier() {
  if (!viewer) return;
  // Real day/night terminator — mandatory under Imagery Law §3.
  viewer.scene.globe.enableLighting = true;
  viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#02060d');

  // DAY: NASA Blue Marble Next Generation via GIBS WMTS.
  try {
    const dayProvider = new Cesium.UrlTemplateImageryProvider({
      url: 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/BlueMarble_NextGeneration/default/2004-08-01/GoogleMapsCompatible_Level8/{z}/{y}/{x}.jpeg',
      maximumLevel: 8,
      credit: 'NASA EOSDIS GIBS · Blue Marble Next Generation',
    });
    dayLayer = viewer.imageryLayers.addImageryProvider(dayProvider);
  } catch (e) { console.warn('[imagery] BMNG day failed', e); }

  // NIGHT: NASA Black Marble — layered above day, day-side fully transparent.
  try {
    const nightProvider = new Cesium.UrlTemplateImageryProvider({
      url: 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_Black_Marble/default/2016-01-01/GoogleMapsCompatible_Level8/{z}/{y}/{x}.png',
      maximumLevel: 8,
      credit: 'NASA EOSDIS GIBS · VIIRS Black Marble',
    });
    nightLayer = viewer.imageryLayers.addImageryProvider(nightProvider);
    nightLayer.dayAlpha = 0.0;
    nightLayer.nightAlpha = 1.0;
  } catch (e) { console.warn('[imagery] Black Marble night failed', e); }

  if (viewer) viewer.scene.requestRender();
}

async function setCityImagery(index) {
  if (!viewer) return;
  if (cityLayer) {
    try { viewer.imageryLayers.remove(cityLayer, true); } catch (_) {}
    cityLayer = null;
  }
  cityProviderIndex = Math.max(0, Math.min(index, CITY_PROVIDERS.length - 1));
  const p = CITY_PROVIDERS[cityProviderIndex];
  try {
    const provider = await p.init();
    cityLayer = viewer.imageryLayers.addImageryProvider(provider);
    // Hide on global tier; only visible national/personal (Imagery Law §3).
    cityLayer.show = currentLevel !== 'global';
    renderLayerSwitch();
    updateImagerySourceBadge();
    if (viewer) viewer.scene.requestRender();
  } catch (e) {
    console.warn('[imagery]', p.id, 'failed, advancing', e);
    if (cityProviderIndex < CITY_PROVIDERS.length - 1) {
      return setCityImagery(cityProviderIndex + 1);
    }
  }
}

function renderLayerSwitch() {
  const el = $('layer-switch');

/* ==============================================================
   2. Navigation levels — GLOBAL / NATIONAL / PERSONAL
   ============================================================== */
const LEVEL_THRESHOLDS = { global: 5_000_000, national: 500_000 };
let currentLevel = 'global';
let levelTimer;

function deriveLevel(heightMeters) {
  if (heightMeters > LEVEL_THRESHOLDS.global)   return 'global';
  if (heightMeters > LEVEL_THRESHOLDS.national) return 'national';
  return 'personal';
}

function onCameraSettled() {
  const h = viewer.camera.positionCartographic.height;
  const newLevel = deriveLevel(h);
  if (newLevel === currentLevel) return;
  currentLevel = newLevel;

  // Show level badge briefly
  const badge = $('level-badge');
  badge.textContent = newLevel;
  badge.classList.add('visible');
  clearTimeout(levelTimer);
  levelTimer = setTimeout(() => badge.classList.remove('visible'), 1800);

  // Back button: visible whenever we're below global
  $('back-btn').classList.toggle('visible', newLevel !== 'global');

  updateLayerSwitchVisibility();
  updateCatFilter();
  // Show delivery pins only at NATIONAL / PERSONAL
  const showDeliveries = newLevel !== 'global';
  deliveryIndex.forEach(e => { e.primitive.show = showDeliveries; });
  if (viewer) viewer.scene.requestRender();
}

$('back-btn').addEventListener('click', () => {
  // Ascend one level
  const h = viewer.camera.positionCartographic.height;
  const target = h > LEVEL_THRESHOLDS.national ? 12_000_000 : 2_000_000;
  const carto = viewer.camera.positionCartographic;
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromRadians(carto.longitude, carto.latitude, target),
    duration: 1.4,
  });
});

/* ==============================================================
   Push / Service Worker / Reliability  (§23)
   ============================================================== */
function urlBase64ToUint8Array(b64u) {
  const pad = '='.repeat((4 - b64u.length % 4) % 4);
  const b64  = (b64u + pad).replace(/-/g, '+').replace(/_/g, '/');
  const raw  = atob(b64);
  return Uint8Array.from(raw, c => c.charCodeAt(0));
}

let _swReg = null;

function bootServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('/sw.js').then(reg => {
    _swReg = reg;
    navigator.serviceWorker.addEventListener('message', e => handleSwMessage(e.data));
  }).catch(err => console.warn('[sw] register failed:', err));
}

async function subscribePush() {
  if (!_swReg || !session || !VAPID_PUBLIC) return;
  try {
    let sub = await _swReg.pushManager.getSubscription();
    if (!sub) {
      sub = await _swReg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC),
      });
    }
    await savePushSubscription(sub);
  } catch (e) {
    console.warn('[push] subscribe failed:', e.message);
  }
}

async function savePushSubscription(sub) {
  if (!sb || !session || !sub) return;
  const j = sub.toJSON();
  await sb.from('push_subscriptions').upsert({
    profile_id:  session.user.id,
    endpoint:    j.endpoint,
    keys_p256dh: j.keys.p256dh,
    keys_auth:   j.keys.auth,
  }, { onConflict: 'endpoint' });
}

async function pushNotify(recipientId, payload) {
  if (!sb || !session || !recipientId || recipientId === session.user.id) return;
  try {
    await sb.functions.invoke('push-notify', { body: { recipient_id: recipientId, payload } });
  } catch (e) {
    console.warn('[push] notify failed:', e.message);
  }
}

function handleSwMessage(msg) {
  if (!msg) return;
  if (msg.type === 'notif-nav') {
    handleNotificationNav(msg.params || {});
  } else if (msg.type === 'call-decline-push') {
    if (currentCall && currentCall.id === msg.callId) declineIncomingCall();
  } else if (msg.type === 'push-resubscribe') {
    if (msg.sub && session) {
      const sub = { toJSON: () => msg.sub };
      savePushSubscription(sub);
    }
  }
}

function handleNotificationNav(p) {
  const type = p.notif;
  if (type === 'call' && p.callId) {
    // Incoming call via push — build a synthetic call state then show UI
    if (!currentCall) {
      currentCall = {
        id:           p.callId,
        peerId:       p.callerId   || '',
        peerName:     p.callerName || 'Caller',
        role:         'callee',
        startedAt:    Date.now(),
        pendingOffer: null, // will arrive via callee-ready handshake
      };
      if ($('call-incoming-name')) $('call-incoming-name').textContent = currentCall.peerName;
      if ($('call-incoming'))      $('call-incoming').classList.add('visible');
      // Subscribe to call channel so we can receive the re-sent offer
      if (sb) {
        callChannel = sb.channel(callChannelName(p.callId));
        callChannel
          .on('broadcast', { event: 'offer'  }, ({ payload }) => {
            if (currentCall) currentCall.pendingOffer = payload.offer;
          })
          .on('broadcast', { event: 'ice' }, ({ payload }) => onIce(payload))
          .on('broadcast', { event: 'bye' }, () => endCall(true))
          .subscribe()
          .then(() => {
            // Signal caller that we're awake and ready for their offer
            callChannel.send({ type: 'broadcast', event: 'callee-ready', payload: { fromId: session?.user.id } });
          });
      }
    }
    if (p.accept === '1') acceptIncomingCall();
  } else if (type === 'message' && p.senderId) {
    openConversation(p.senderId, p.senderName || 'User');
  } else if (type === 'delivery' && p.deliveryId) {
    openDeliveryPanel(Number(p.deliveryId));
  }
}

function saveActiveDelivery(delivery) {
  try { localStorage.setItem('astranov_active_delivery', JSON.stringify(delivery)); } catch (_) {}
}

function clearActiveDelivery() {
  try { localStorage.removeItem('astranov_active_delivery'); } catch (_) {}
}

function restoreSession() {
  // 1. URL params injected by push-notification click
  const p = new URLSearchParams(location.search);
  if (p.has('notif')) {
    handleNotificationNav(Object.fromEntries(p));
    // Clean URL without reload
    history.replaceState(null, '', '/');
  }
  // 2. Active delivery from localStorage (runner resume)
  try {
    const raw = localStorage.getItem('astranov_active_delivery');
    if (raw) {
      const d = JSON.parse(raw);
      if (d && d.id) {
        toast('Resuming delivery #' + d.id, 'ok');
        setTimeout(() => openDeliveryPanel(d.id), 800);
      }
    }
  } catch (_) {}
}

/* ==============================================================
   Locate — GPS acquire + globe fly-to
   ============================================================== */
function locateUser() {
  const orb = $('locate-orb'); if (!orb) return;
  if (!navigator.geolocation) return toast('Geolocation not available', 'err');
  orb.classList.remove('locked');
  orb.classList.add('acquiring');
  const g = orb.querySelector('.locate-g');
  if (g) g.textContent = '◎';
  navigator.geolocation.getCurrentPosition(
    pos => {
      orb.classList.remove('acquiring');
      orb.classList.add('locked');
      if (g) g.textContent = '⊕';
      const { latitude: lat, longitude: lng } = pos.coords;
      if (viewer) {
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(lng, lat, 420),
          duration: 3.5,
          orientation: { heading: 0, pitch: Cesium.Math.toRadians(-55), roll: 0 },
        });
      }
      // Store for radar and signal emit
      window._userLat = lat; window._userLng = lng;
      // Place glowing user beacon on globe
      setUserBeacon(lat, lng);
      // Populate globe with real-world POIs from OpenStreetMap
      fetchOSMNearby(lat, lng, 5000);
      setTimeout(() => orb.classList.remove('locked'), 4000);
    },
    err => {
      orb.classList.remove('acquiring');
      if (g) g.textContent = '⊕';
      toast('Location denied — ' + err.message, 'err');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

    : '<div style="color:#6a8aaf;font-size:13px;padding:16px 0">No messages yet. Call someone from a signal to start.</div>';
}

window.openConversation = async (peerId, peerName) => {
  _activePeer = { id: peerId, name: peerName };
  openPanel(`
    <h2>${escapeHtml(peerName)}</h2>
    <div class="msg-thread" id="msg-thread-container"></div>
    <div class="msg-compose">
      <input id="msg-input" class="gadget-cmd" placeholder="Message…" maxlength="4000" style="margin-top:0;flex:1" />
      <div class="send-orb" onclick="sendMessage()" title="Transmit" style="border-radius:50%;width:36px;height:36px;border:1.5px solid rgba(120,180,255,0.4);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:#7eb4ff;flex-shrink:0">◈</div>
    </div>
  `);
  // Mark read
  await sb.rpc('mark_messages_read', { peer: peerId });
  loadMessageBadge();
  // Load thread
  const { data } = await sb.rpc('get_conversation', { peer: peerId, max_results: 60 });
  const thread = $('msg-thread-container'); if (!thread) return;
  (data || []).forEach(m => _appendBubble(thread, m));
  thread.scrollTop = thread.scrollHeight;
  // Send on enter
  const inp = $('msg-input');
  if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }});
};

function _appendBubble(container, m) {
  const isMe = m.sender_id === session?.user.id;
  const div = document.createElement('div');
  div.className = 'msg-bubble ' + (isMe ? 'me' : 'them');
  div.textContent = m.body;
  div.title = formatRelative(m.created_at);
  container.appendChild(div);
}

function _appendIncomingBubble(m) {
  if (m.sender_id !== _activePeer?.id) return;
  const thread = $('msg-thread-container'); if (!thread) return;
  _appendBubble(thread, m);
  thread.scrollTop = thread.scrollHeight;
  sb.rpc('mark_messages_read', { peer: m.sender_id });
}

window.sendMessage = async () => {
  const inp = $('msg-input'); if (!inp || !_activePeer || !sb || !session) return;
  const body = inp.value.trim(); if (!body) return;
  inp.value = '';
  const m = { id: crypto.randomUUID(), sender_id: session.user.id, body, created_at: new Date().toISOString() };
  const thread = $('msg-thread-container');
  if (thread) { _appendBubble(thread, m); thread.scrollTop = thread.scrollHeight; }
  const { error } = await sb.from('messages').insert({ sender_id: session.user.id, recipient_id: _activePeer.id, body });
  if (error) { toast(error.message, 'err'); return; }
  pushNotify(_activePeer.id, {
    type:       'message',
    title:      profile?.display_name || 'Message',
    body:       body.slice(0, 80),
    tag:        'msg-' + session.user.id,
    senderId:   session.user.id,
    senderName: profile?.display_name || '',
  });
};

window.startDM = (peerId, peerName) => {
  closePanel();
  setTimeout(() => openConversation(peerId, peerName), 120);
};

/* ==============================================================
   4. Signals — PointPrimitiveCollection + pulse callback
   ============================================================== */
let signalPoints = null;         // PointPrimitiveCollection
const signalIndex = new Map();   // id -> { primitive, signal }

let userBillboards = null;
let userBillboard  = null;
let _userBeaconRaf = 0;

const CATEGORY_COLORS = {
  news:        Cesium.Color.fromCssColorString('#00d4ff'),
  jobs:        Cesium.Color.fromCssColorString('#7cff7c'),
  commerce:    Cesium.Color.fromCssColorString('#ffaa00'),
  social:      Cesium.Color.fromCssColorString('#ff7edc'),
  dating:      Cesium.Color.fromCssColorString('#ff3a6e'),
  real_estate: Cesium.Color.fromCssColorString('#b48cff'),
  classifieds: Cesium.Color.fromCssColorString('#a0a0a0'),
};

function ensurePointCollection() {
  if (!signalPoints && viewer) {
    signalPoints = viewer.scene.primitives.add(new Cesium.PointPrimitiveCollection());
  }
}

function addSignalPoint(signal) {
  if (!viewer || signal.lng == null || signal.lat == null) return;
  ensurePointCollection();
  if (signalIndex.has(signal.id)) return; // already rendered

  const color = CATEGORY_COLORS[signal.category] || Cesium.Color.WHITE;
  const size = 6 + Math.min(signal.amplitude || 1, 24);
  const primitive = signalPoints.add({
    position: Cesium.Cartesian3.fromDegrees(Number(signal.lng), Number(signal.lat)),
    pixelSize: size,
    color: color.withAlpha(0.85),
    outlineColor: Cesium.Color.WHITE.withAlpha(0.4),
    outlineWidth: 1,
    scaleByDistance: new Cesium.NearFarScalar(1.5e2, 1.4, 1.5e7, 0.6),
  });
  primitive.__signalId = signal.id;
  signalIndex.set(signal.id, { primitive, signal });
  viewer.scene.requestRender();
}

function updateSignalPoint(signal) {
  const entry = signalIndex.get(signal.id);
  if (!entry) return addSignalPoint(signal);
  entry.signal = signal;
  entry.primitive.pixelSize = 6 + Math.min(signal.amplitude || 1, 24);
  if (signal.status !== 'active') removeSignalPoint(signal.id);
  viewer.scene.requestRender();
}

function removeSignalPoint(id) {
  const entry = signalIndex.get(id);
  if (!entry) return;
  signalPoints.remove(entry.primitive);
  signalIndex.delete(id);
  viewer.scene.requestRender();
}

/* ==============================================================
   User location beacon — glowing, hovering "you are here" marker
   ============================================================== */
function _makeUserBeaconCanvas() {
  const sz = 80, cx = sz / 2;
  const c = document.createElement('canvas'); c.width = c.height = sz;
  const ctx = c.getContext('2d');
  // Outer soft glow
  const g = ctx.createRadialGradient(cx, cx, 4, cx, cx, cx);
  g.addColorStop(0, 'rgba(0,212,255,0.8)');
  g.addColorStop(0.45, 'rgba(0,212,255,0.25)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, sz, sz);
  // Dashed orbit ring
  ctx.save(); ctx.setLineDash([3, 4]);
  ctx.beginPath(); ctx.arc(cx, cx, cx - 4, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,212,255,0.45)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();
  // Solid filled circle
  ctx.beginPath(); ctx.arc(cx, cx, cx - 20, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,180,255,0.94)'; ctx.fill();
  ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 16;
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3; ctx.stroke();
  ctx.shadowBlur = 0;
  // White center dot
  ctx.beginPath(); ctx.arc(cx, cx, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
  return c;
}

function setUserBeacon(lat, lng) {
  if (!viewer) return;
  if (!userBillboards) {
    userBillboards = viewer.scene.primitives.add(new Cesium.BillboardCollection({ scene: viewer.scene }));
  }
  if (userBillboard) { userBillboards.remove(userBillboard); userBillboard = null; }
  cancelAnimationFrame(_userBeaconRaf);

  userBillboard = userBillboards.add({
    position: Cesium.Cartesian3.fromDegrees(Number(lng), Number(lat)),
    image: _makeUserBeaconCanvas(),
    width: 58,
    height: 58,
    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
    scaleByDistance: new Cesium.NearFarScalar(100, 2.0, 4e5, 0.2),
    translucencyByDistance: new Cesium.NearFarScalar(3e5, 1.0, 8e5, 0),
    disableDepthTestDistance: Number.POSITIVE_INFINITY,
    eyeOffset: new Cesium.Cartesian3(0, 0, -5),
  });

  let t = 0;
  (function animateBeacon() {
    if (!userBillboard) return;
    t += 0.038;
    userBillboard.scale = 1 + 0.2 * Math.abs(Math.sin(t * 0.75));
    userBillboard.pixelOffset = new Cesium.Cartesian2(0, Math.sin(t) * 5 - 3);
    viewer.scene.requestRender();
    _userBeaconRaf = requestAnimationFrame(animateBeacon);
  })();
}

/* ==============================================================
   OSM / Overpass — vendor billboard dots on the globe
   ============================================================== */
const OVERPASS_API = 'https://overpass-api.de/api/interpreter';
let placeBillboards = null;
const placeIndex = new Map();
const _osmFetchedZones = new Set();

const _CAT_INFO = {
  food:        { color: '#ff9944', emoji: '🍽', label: 'Food & Drink' },
  cafe:        { color: '#ffcc55', emoji: '☕', label: 'Café' },
  bar:         { color: '#ff5577', emoji: '🍺', label: 'Bar / Pub' },
  hotel:       { color: '#b48cff', emoji: '🛏', label: 'Hotel' },
  shop:        { color: '#ffaa33', emoji: '🛍', label: 'Shop' },
  medical:     { color: '#ff4466', emoji: '💊', label: 'Medical' },
  bank:        { color: '#44ddaa', emoji: '🏦', label: 'Bank' },
  museum:      { color: '#ffdd55', emoji: '🏛', label: 'Culture' },
  attraction:  { color: '#00d4ff', emoji: '⭐', label: 'Attraction' },
  supermarket: { color: '#88ee44', emoji: '🛒', label: 'Grocery' },
  default:     { color: '#8899bb', emoji: '📍', label: 'Place' },
};

function _catKey(tags) {
  const a = tags.amenity || '', s = tags.shop || '', t = tags.tourism || '';
  if (/restaurant|fast_food|food_court/.test(a)) return 'food';
  if (/cafe/.test(a)) return 'cafe';
  if (/bar|pub/.test(a)) return 'bar';
  if (/hotel|hostel|motel/.test(a + t)) return 'hotel';
  if (/hospital|clinic|pharmacy|doctors/.test(a)) return 'medical';
  if (/bank|atm/.test(a)) return 'bank';
  if (/museum|gallery|theatre|cinema/.test(a + t)) return 'museum';
  if (/attraction|viewpoint/.test(t)) return 'attraction';
  if (/supermarket|convenience/.test(a + s)) return 'supermarket';
  if (s) return 'shop';
  return 'default';
}

const _placeIconCache = new Map();

function _makePlaceCanvas(catKey) {
  if (_placeIconCache.has(catKey)) return _placeIconCache.get(catKey);
  const sz = 72, cx = sz / 2;
  const c = document.createElement('canvas'); c.width = c.height = sz;
  const ctx = c.getContext('2d');
  const info = _CAT_INFO[catKey] || _CAT_INFO.default;
  const col = info.color;

  // Outer radial glow
  const grd = ctx.createRadialGradient(cx, cx, 6, cx, cx, cx);
  grd.addColorStop(0, col + '66'); grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, sz, sz);

  // Dashed orbit ring
  ctx.save(); ctx.setLineDash([2, 3]);
  ctx.beginPath(); ctx.arc(cx, cx, cx - 3, 0, Math.PI * 2);
  ctx.strokeStyle = col + '55'; ctx.lineWidth = 1.2; ctx.stroke();
  ctx.restore();

  // Body circle — dark fill + glowing border
  ctx.beginPath(); ctx.arc(cx, cx, cx - 10, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(4, 10, 22, 0.93)'; ctx.fill();
  ctx.shadowColor = col; ctx.shadowBlur = 10;
  ctx.strokeStyle = col; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.shadowBlur = 0;

  // Four HUD tick marks at 45°/135°/225°/315°
  [45, 135, 225, 315].forEach(deg => {
    const rad = deg * Math.PI / 180;
    const r1 = cx - 9, r2 = cx - 4;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(rad) * r1, cx + Math.sin(rad) * r1);
    ctx.lineTo(cx + Math.cos(rad) * r2, cx + Math.sin(rad) * r2);
    ctx.strokeStyle = col + 'cc'; ctx.lineWidth = 2; ctx.stroke();
  });

  // Center emoji — color emoji via OS fonts, 22px
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = '22px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(info.emoji, cx, cx + 1);

  _placeIconCache.set(catKey, c);
  return c;
}

function _ensureBillboardCollection() {
  if (!placeBillboards && viewer) {
    placeBillboards = viewer.scene.primitives.add(new Cesium.BillboardCollection({ scene: viewer.scene }));
  }
}

function addPlacePoint(place) {
  if (!viewer || !place.lat || !place.lon) return;
  const tags = place.tags || {};
  if (!tags.name) return;
  _ensureBillboardCollection();
  const key = 'osm:' + place.id;
  if (placeIndex.has(key)) return;
  const catKey = _catKey(tags);
  const icon = _makePlaceCanvas(catKey);
  const billboard = placeBillboards.add({
    position: Cesium.Cartesian3.fromDegrees(Number(place.lon), Number(place.lat)),
    image: icon,
    width: 54,
    height: 54,
    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
    pixelOffset: new Cesium.Cartesian2(0, 6),
    scaleByDistance: new Cesium.NearFarScalar(300, 1.1, 1.2e6, 0.12),
    translucencyByDistance: new Cesium.NearFarScalar(7e5, 1.0, 1.8e6, 0),
    eyeOffset: new Cesium.Cartesian3(0, 0, -10),
  });
  billboard.__placeId = key;
  placeIndex.set(key, { primitive: billboard, place });
  viewer.scene.requestRender();
}

async function fetchOSMNearby(lat, lng, radiusM) {
  radiusM = radiusM || 6000;
  const zk = Math.round(lat * 10) + ',' + Math.round(lng * 10);
  if (_osmFetchedZones.has(zk)) return;
  _osmFetchedZones.add(zk);
  const q = '[out:json][timeout:25];('
    + 'node["name"]["amenity"~"restaurant|cafe|bar|fast_food|pub|hotel|pharmacy|bank|atm|supermarket|hospital|clinic|cinema|theatre|museum|doctors|convenience"](around:' + radiusM + ',' + lat + ',' + lng + ');'
    + 'node["name"]["shop"](around:' + radiusM + ',' + lat + ',' + lng + ');'
    + 'node["name"]["tourism"~"hotel|hostel|motel|attraction|museum|gallery|viewpoint"](around:' + radiusM + ',' + lat + ',' + lng + ');'
    + ');out 600;';
  try {
    const resp = await fetch(OVERPASS_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'data=' + encodeURIComponent(q)
    });
    if (!resp.ok) return;
    const json = await resp.json();
    const elements = json.elements || [];
    elements.forEach(addPlacePoint);
    if (elements.length) toast(elements.length + ' vendors on globe', '');
  } catch (e) { console.warn('[OSM]', e); }
}

async function _autoLoadPlaces() {
  if (window._userLat) { fetchOSMNearby(window._userLat, window._userLng, 6000); return; }
  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    if (d && d.latitude) {
      window._userLat = d.latitude; window._userLng = d.longitude;
      fetchOSMNearby(d.latitude, d.longitude, 8000);
      setUserBeacon(d.latitude, d.longitude);
      if (viewer) {
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(d.longitude, d.latitude, 40000),
          duration: 3,
        });
      }
    }
  } catch (_) {}
}

    .eq('status', 'active')
    .order('created_at', { ascending: false })

  if (error) { console.error('[signals] load failed', error); return; }
  data.forEach(addSignalPoint);
  buildCatFilter();

function subscribeRealtime() {
  if (!sb) return;
  sb.channel('astranov-signals')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'signals' },
        p => p.new.status === 'active' && addSignalPoint(p.new))
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'signals' },
        p => updateSignalPoint(p.new))
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'signals' },
        p => removeSignalPoint(p.old.id))
    .subscribe();
  sb.channel('astranov-deliveries')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'deliveries' },
        p => { addDeliveryPin(p.new); loadDeliveryBadge(); })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'deliveries' },
        p => {
          if (p.new.status !== 'requested') removeDeliveryPin(p.new.id);
          loadDeliveryBadge();
          if ($('delivery-list')) loadDeliveryTab(_currentDeliveryTab || 'my-requests');
        })
    .subscribe();
  // Messages → badge update
  sb.channel('astranov-messages')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
      if (p.new.recipient_id === session?.user.id) {
        loadMessageBadge();
        if ($('msg-thread-container')) _appendIncomingBubble(p.new);
      }
    })
    .subscribe();
}

function onCanvasClick(click) {

  const picked = viewer.scene.pick(click.position);
  if (picked?.primitive?.__signalId) {
    const entry = signalIndex.get(picked.primitive.__signalId);
    if (entry) openSignalPanel(entry.signal);

    const entry = deliveryIndex.get(picked.primitive.__deliveryId);

  }

function _buildRadarOrbitDots() {
  const container = $('radar-orbit-dots');
  if (!container) return;
  const cx = 110, cy = 110, r = 90;
  const providers = ['claude','groq','gemini','openai','xai'];
  providers.forEach((name, i) => {
    const angle = (i / providers.length) * 2 * Math.PI - Math.PI / 2;
    const dot = document.createElement('div');
    dot.className = 'radar-orbit-dot' + (name === 'claude' ? ' owner-dot' : '');
    dot.dataset.provider = name;
    dot.style.left = (cx + r * Math.cos(angle)) + 'px';
    dot.style.top  = (cy + r * Math.sin(angle)) + 'px';
    if (lastActiveProvider === name) dot.classList.add('active');
    container.appendChild(dot);
  });
}

async function _acquireRadar() {
  let coords;
  try {
    coords = await getUserLocation();
  } catch (e) {
    const core = $('radar-core');
    if (core) core.classList.remove('acquiring');
    const coordEl = $('radar-coords');
    if (coordEl) coordEl.textContent = 'NO FIX';
    const sig = $('radar-signals');
    if (sig) sig.innerHTML = `<div class="gadget-engage armed" onclick="recalibrateRadar()" style="margin:12px auto;max-width:200px"><span class="verb-glyph"></span><span>Reacquire</span></div>`;
    return;
  }

  const core = $('radar-core');
  if (core) { core.classList.remove('acquiring'); core.classList.add('locked'); core.dataset.lat = coords.lat; core.dataset.lng = coords.lng; }
  const coordEl = $('radar-coords');
  if (coordEl) coordEl.textContent = `${coords.lat.toFixed(3)}° ${coords.lng > 0 ? '+' : ''}${coords.lng.toFixed(3)}°`;

  viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(coords.lng, coords.lat, 12_000), duration: 2.5 });

  const { data, error } = await sb.rpc('nearby_signals', { p_lat: coords.lat, p_lng: coords.lng, radius_meters: 50_000, max_results: 50 });
  if (error) {
    const sig = $('radar-signals');
    if (sig) sig.innerHTML = `<div style="color:#ff9e9e;font-size:12px;text-align:center;padding:8px">signal rpc: ${escapeHtml(error.message)}</div>`;
    return;
  }

  _renderRadarBlips(data || [], coords);
  _renderRadarSignalList(data || [], coords);

  // Populate globe with nearby real-world places from OpenStreetMap
  fetchOSMNearby(coords.lat, coords.lng, 5000);
}

window.recalibrateRadar = async () => {
  const core = $('radar-core');
  if (!core || core.classList.contains('acquiring')) return;
  core.classList.remove('locked');
  core.classList.add('acquiring');
  const coordEl = $('radar-coords');
  if (coordEl) coordEl.textContent = 'ACQUIRING';
  const blips = $('radar-blips');
  if (blips) blips.innerHTML = '';
  const sig = $('radar-signals');
  if (sig) sig.innerHTML = '';
  await _acquireRadar();
};

function _renderRadarBlips(signals, myCoords) {
  const container = $('radar-blips');
  if (!container) return;
  container.innerHTML = '';
  const cx = 110, cy = 110, maxR = 82;
  signals.slice(0, 30).forEach(s => {
    if (!s.lat || !s.lng) return;
    const bearing = Math.atan2(s.lng - myCoords.lng, s.lat - myCoords.lat);
    const dist = Math.min((s.distance_meters || 0) / 50_000, 0.98);
    const blip = document.createElement('div');
    blip.className = 'radar-blip';
    blip.style.left = (cx + maxR * dist * Math.sin(bearing)) + 'px';
    blip.style.top  = (cy - maxR * dist * Math.cos(bearing)) + 'px';
    blip.style.background = RADAR_COLORS[s.category] || '#fff';
    blip.style.boxShadow = `0 0 6px ${RADAR_COLORS[s.category] || '#fff'}`;
    blip.title = s.title;
    blip.addEventListener('click', () => flyToSignal(s.id));
    container.appendChild(blip);
  });
}

function _renderRadarSignalList(data, coords) {
  const container = $('radar-signals');
  if (!container) return;
  const rows = data.map(s => `
    <div class="radar-row" onclick="flyToSignal('${s.id}')">
      <span class="dot" style="background:${RADAR_COLORS[s.category] || '#fff'}"></span>
      <div class="meta">
        <div class="title">${escapeHtml(s.title)}</div>
        <div class="sub">${s.category.replace('_',' ')} · ${formatRelative(s.created_at)}</div>
      </div>
      <div class="dist">${formatDistance(s.distance_meters)}</div>

  `).join('');

window.setHomeLocation = async (lat, lng) => {
