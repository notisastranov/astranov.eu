/* ==============================================================
   Push / Service Worker / Reliability  (§23)
   ============================================================== */
function urlBase64ToUint8Array(b64u) {
  const pad = '='.repeat((4 - b64u.length % 4) % 4);
  const b64  = (b64u + pad).replace(/-/g, '+').replace(/_/g, '/');
  const raw  = atob(b64);
  return Uint8Array.from(raw, c => c.charCodeAt(0));
}

let _swReg = null;

function bootServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(reg => {
    _swReg = reg;
    // Force an update check on every page load so users always get the freshest SW.
    try { reg.update(); } catch (_) {}
    // When a new SW takes over, reload once so the page runs the new app code.
    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloaded) return; reloaded = true;
      location.reload();
    });
    navigator.serviceWorker.addEventListener('message', e => handleSwMessage(e.data));
  }).catch(err => console.warn('[sw] register failed:', err));
}

async function subscribePush() {
  if (!_swReg || !session || !VAPID_PUBLIC) return;
  try {
    let sub = await _swReg.pushManager.getSubscription();
    if (!sub) {
      sub = await _swReg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC),
      });
    }
    await savePushSubscription(sub);
  } catch (e) {
    console.warn('[push] subscribe failed:', e.message);
  }
}

async function savePushSubscription(sub) {
  if (!sb || !session || !sub) return;
  const j = sub.toJSON();
  await sb.from('push_subscriptions').upsert({
    profile_id:  session.user.id,
    endpoint:    j.endpoint,
    keys_p256dh: j.keys.p256dh,
    keys_auth:   j.keys.auth,
  }, { onConflict: 'endpoint' });
}

async function pushNotify(recipientId, payload) {
  if (!sb || !session || !recipientId || recipientId === session.user.id) return;
  try {
    await sb.functions.invoke('push-notify', { body: { recipient_id: recipientId, payload } });
  } catch (e) {
    console.warn('[push] notify failed:', e.message);
  }
}

function handleSwMessage(msg) {
  if (!msg) return;
  if (msg.type === 'sw-activated') {
    // A new Service Worker just took over — force-reload so this tab
    // runs the fresh HTML + JS, not the cached shell from the previous
    // deploy. Belt-and-braces alongside the controllerchange handler.
    if (!window.__swReloadedFor || window.__swReloadedFor !== msg.version) {
      window.__swReloadedFor = msg.version;
      setTimeout(() => { try { location.reload(); } catch (_) {} }, 200);
    }
    return;
  }
  if (msg.type === 'notif-nav') {
    handleNotificationNav(msg.params || {});
  } else if (msg.type === 'call-decline-push') {
    if (currentCall && currentCall.id === msg.callId) declineIncomingCall();
  } else if (msg.type === 'push-resubscribe') {
    if (msg.sub && session) {
      const sub = { toJSON: () => msg.sub };
      savePushSubscription(sub);
    }
  }
}

function handleNotificationNav(p) {
  const type = p.notif;
  if (type === 'call' && p.callId) {
    // Incoming call via push — build a synthetic call state then show UI
    if (!currentCall) {
      currentCall = {
        id:           p.callId,
        peerId:       p.callerId   || '',
        peerName:     p.callerName || 'Caller',
        role:         'callee',
        startedAt:    Date.now(),
        pendingOffer: null, // will arrive via callee-ready handshake
      };
      if ($('call-incoming-name')) $('call-incoming-name').textContent = currentCall.peerName;
      if ($('call-incoming'))      $('call-incoming').classList.add('visible');
      // Subscribe to call channel so we can receive the re-sent offer
      if (sb) {
        callChannel = sb.channel(callChannelName(p.callId));
        callChannel
          .on('broadcast', { event: 'offer'  }, ({ payload }) => {
            if (currentCall) currentCall.pendingOffer = payload.offer;
          })
          .on('broadcast', { event: 'ice' }, ({ payload }) => onIce(payload))
          .on('broadcast', { event: 'bye' }, () => endCall(true))
          .subscribe()
          .then(() => {
            // Signal caller that we're awake and ready for their offer
            callChannel.send({ type: 'broadcast', event: 'callee-ready', payload: { fromId: session?.user.id } });
          });
      }
    }
    if (p.accept === '1') acceptIncomingCall();
  } else if (type === 'message' && p.senderId) {
    openConversation(p.senderId, p.senderName || 'User');
  } else if (type === 'delivery' && p.deliveryId) {
    openDeliveryPanel(Number(p.deliveryId));
  }
}

function saveActiveDelivery(delivery) {
  try { localStorage.setItem('astranov_active_delivery', JSON.stringify(delivery)); } catch (_) {}
}

function clearActiveDelivery() {
  try { localStorage.removeItem('astranov_active_delivery'); } catch (_) {}
}

function _readOAuthError() {
  const q = new URLSearchParams(location.search);
  const h = new URLSearchParams((location.hash || '').replace(/^#/, ''));
  const desc = q.get('error_description') || h.get('error_description');
  const code = q.get('error_code')       || h.get('error_code');
  const err  = q.get('error')            || h.get('error');
  if (!err && !code) return null;
  return decodeURIComponent((desc || code || err).replace(/\+/g, ' '));
}

function restoreSession() {
  // 0. Surface OAuth errors that landed here as ?error=... or #error=...
  const oauthErr = _readOAuthError();
  if (oauthErr) {
    toast('Sign-in failed: ' + oauthErr, 'err');
    history.replaceState(null, '', '/');
  }
  // 1. URL params injected by push-notification click
  const p = new URLSearchParams(location.search);
  if (p.has('notif')) {
    handleNotificationNav(Object.fromEntries(p));
    // Clean URL without reload
    history.replaceState(null, '', '/');
  }
  // 2. Active delivery from localStorage (runner resume)
  try {
    const raw = localStorage.getItem('astranov_active_delivery');
    if (raw) {
      const d = JSON.parse(raw);
      if (d && d.id) {
        toast('Resuming delivery #' + d.id, 'ok');
        setTimeout(() => openDeliveryPanel(d.id), 800);
      }
    }
  } catch (_) {}
}

/* ==============================================================
   Locate — GPS acquire + globe fly-to
   ============================================================== */
function locateUser() {
  const orb = $('locate-orb'); if (!orb) return;
  if (!navigator.geolocation) return toast('Geolocation not available', 'err');
  orb.classList.remove('locked');
  orb.classList.add('acquiring');
  const g = orb.querySelector('.locate-g');
  if (g) g.textContent = '◎';
  navigator.geolocation.getCurrentPosition(
    pos => {
      orb.classList.remove('acquiring');
      orb.classList.add('locked');
      if (g) g.textContent = '⊕';
      const { latitude: lat, longitude: lng } = pos.coords;
      if (viewer) {
        // Drone top-down view at street-readable altitude. 250m + pitch -90°
        // forces Cesium to request the deepest zoom tiles immediately.
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(lng, lat, 250),
          duration: 2.8,
          orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
        });
      }
      window._userLat = lat; window._userLng = lng; setUserLocation(lat, lng);
      setUserBeacon(lat, lng);
      fetchOSMNearby(lat, lng, 5000);
      setTimeout(() => orb.classList.remove('locked'), 4000);
      startDriveWatch(); // continuous motion tracking from this point
    },
    err => {
      orb.classList.remove('acquiring');
      if (g) g.textContent = '⊕';
      toast('Location denied — ' + err.message, 'err');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

/* ==============================================================
   Slumber / wake — motion-aware camera that knows when you start
   moving and when you stop.

   Three states, by the law (GLOBAL → NATIONAL → PERSONAL):
   - DRIVING  → personal tier, pitch -25°, ~150 m, heading locks
                to GPS course. Triggered by sustained > 2.5 m/s
                (~9 km/h) for 1.5 s.
   - SETTLED  → drone, pitch -90°, ~500 m. The moment we slow below
                0.6 m/s for 6 s.
   - SLUMBER  → the architecture's home tier (GLOBAL). After 90 s
                stationary at SETTLED, lift back to the world view.

   Speed: pos.coords.speed is unreliable on most phones (often null
   or 0). We compute it from haversine deltas between fixes when the
   browser doesn't give us one.
   ============================================================== */
let _driveWatchId = null;
let _driveMode    = 'drone';      // 'drone' | 'driving'
let _driveBufSpeed = [];          // last speeds, m/s (smoothed)
let _driveLastSwitchAt = 0;
let _driveLastFix = null;         // { lat, lng, t }
let _settledSince  = 0;           // ms timestamp the user went still
let _slumberedAt   = 0;           // last time we lifted to global
function startDriveWatch() {
  if (_driveWatchId || !navigator.geolocation || !navigator.geolocation.watchPosition) return;
  _driveWatchId = navigator.geolocation.watchPosition(
    pos => _driveTick(pos),
    () => {},
    { enableHighAccuracy: true, maximumAge: 1500, timeout: 15_000 }
  );
}
function stopDriveWatch() {
  if (_driveWatchId) navigator.geolocation.clearWatch(_driveWatchId);
  _driveWatchId = null;
}
function _haversineMeters(aLat, aLng, bLat, bLng) {
  const R = 6371000, toR = Math.PI / 180;
  const dLat = (bLat - aLat) * toR, dLng = (bLng - aLng) * toR;
  const s = Math.sin(dLat/2)**2 + Math.cos(aLat*toR)*Math.cos(bLat*toR)*Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
}
function _driveTick(pos) {
  const { latitude: lat, longitude: lng, speed, heading, accuracy } = pos.coords;
  window._userLat = lat; window._userLng = lng;
  try { setUserLocation(lat, lng); setUserBeacon(lat, lng); } catch (_) {}
  const now = Date.now();
  // Real speed: trust the browser if it gives us a sane number; else
  // compute from the delta. (Ignore deltas with poor accuracy so a
  // bouncy GPS fix doesn't fake motion while we sit still.)
  let sp = (typeof speed === 'number' && isFinite(speed) && speed >= 0) ? speed : NaN;
  if (!isFinite(sp) && _driveLastFix) {
    const dt = (now - _driveLastFix.t) / 1000;
    if (dt > 0 && dt < 30 && (accuracy == null || accuracy < 50)) {
      sp = _haversineMeters(_driveLastFix.lat, _driveLastFix.lng, lat, lng) / dt;
      // GPS jitter inflation: sub-1 m/s readings while idle = noise.
      if (sp < 0.4) sp = 0;
    }
  }
  if (!isFinite(sp)) sp = 0;
  _driveLastFix = { lat, lng, t: now };
  _driveBufSpeed.push(sp);
  if (_driveBufSpeed.length > 5) _driveBufSpeed.shift();
  const avg = _driveBufSpeed.reduce((a, b) => a + b, 0) / _driveBufSpeed.length;
  const hud = $('drive-hud'), sps = $('dh-sp');
  if (sps) sps.textContent = Math.round(avg * 3.6) + ' km/h';
  if (hud) hud.classList.toggle('visible', _driveMode === 'driving');

  const dwell = now - _driveLastSwitchAt;
  if (_driveMode === 'drone' && avg > 2.5 && dwell > 1500) {
    _driveMode = 'driving'; _driveLastSwitchAt = now;
    _settledSince = 0;
    _enterDriving(lat, lng, heading);
  } else if (_driveMode === 'driving') {
    if (avg < 0.6) {
      // Start a settled-since clock; only switch back after 6 s still.
      if (!_settledSince) _settledSince = now;
      if (now - _settledSince > 6000 && dwell > 2000) {
        _driveMode = 'drone'; _driveLastSwitchAt = now;
        _settledSince = now;
        _enterDrone(lat, lng);
      } else {
        _followDriving(lat, lng, heading);
      }
    } else {
      _settledSince = 0;
      _followDriving(lat, lng, heading);
    }
  } else if (_driveMode === 'drone') {
    // Slumber: still for 90 s → lift to the world tier. The user keeps
    // a clear pin on themselves but reclaims the bigger view.
    if (avg < 0.6) {
      if (!_settledSince) _settledSince = now;
      const stillFor = now - _settledSince;
      const sinceLift = now - _slumberedAt;
      if (stillFor > 90_000 && sinceLift > 60_000 && (typeof currentLevel === 'undefined' || currentLevel !== 'global')) {
        _slumberedAt = now;
        _enterSlumber();
      }
    } else {
      _settledSince = 0;
    }
  }
}
function _enterDriving(lat, lng, heading) {
  if (!viewer) return;
  const h = (typeof heading === 'number' && !isNaN(heading)) ? heading : 0;
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(lng, lat, 150),
    duration: 1.4,
    orientation: { heading: Cesium.Math.toRadians(h), pitch: Cesium.Math.toRadians(-25), roll: 0 },
  });
}
function _enterDrone(lat, lng) {
  if (!viewer) return;
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(lng, lat, 500),
    duration: 1.6,
    orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
  });
}
function _enterSlumber() {
  if (!viewer) return;
  // Lift back to the home tier — GLOBAL — over the user's last fix so
  // the pin stays directly below the camera.
  const lat = window._userLat ?? 20, lng = window._userLng ?? 0;
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(lng, lat, 12_000_000),
    duration: 2.4,
    orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
  });
}
function _followDriving(lat, lng, heading) {
  if (!viewer) return;
  const h = (typeof heading === 'number' && !isNaN(heading)) ? heading : null;
  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(lng, lat, 150),
    orientation: { heading: h != null ? Cesium.Math.toRadians(h) : viewer.camera.heading,
                   pitch: Cesium.Math.toRadians(-25), roll: 0 },
  });
}
// Auto-arm the slumber/wake watch on boot if geolocation permission was
// already granted in a previous session. The user shouldn't have to tap
// "Locate" before the camera starts paying attention.
(function _armDriveWatchOnBoot() {
  try {
    if (!navigator.geolocation || !navigator.permissions || !navigator.permissions.query) return;
    navigator.permissions.query({ name: 'geolocation' }).then(p => {
      if (p && p.state === 'granted') {
        setTimeout(() => { try { startDriveWatch(); } catch (_) {} }, 1200);
      }
    }).catch(() => {});
  } catch (_) {}
})();

/* ==============================================================
   ROUTING (§13b) — real OSRM driving routes, drawn on the globe.
   The driving profile is built from OSM and RESPECTS one-way tags
   and turn restrictions, so a returned route never sends the user
   the wrong way down a one-way street. We draw the geometry clamped
   to the ground (follows the actual streets on the CARTO layer) and
   surface distance + duration + turn-by-turn. No wrong-way risk is
   introduced client-side: we only render what the profile returns.
   ============================================================== */
const _route = { entities: [], steps: [], dest: null, label: '' };
const OSRM_BASE = 'https://router.project-osrm.org/route/v1/driving/';

function _fmtDist(m) {
  return m >= 1000 ? (m / 1000).toFixed(m >= 10000 ? 0 : 1) + ' km' : Math.round(m) + ' m';
}
function _fmtDur(s) {
  const min = Math.round(s / 60);
  if (min < 60) return min + ' min';
  return Math.floor(min / 60) + ' h ' + (min % 60) + ' min';
}

async function _fetchOSRM(fromLat, fromLng, toLat, toLng) {
  const url = OSRM_BASE
    + fromLng + ',' + fromLat + ';' + toLng + ',' + toLat
    + '?overview=full&geometries=geojson&steps=true&annotations=false';
  const r = await fetch(url);
  if (!r.ok) throw new Error('routing service ' + r.status);
  const j = await r.json();
  if (j.code !== 'Ok' || !j.routes || !j.routes.length) throw new Error(j.message || 'no route found');
  return j.routes[0];
}

function _clearRoute() {
  if (!viewer) return;
  _route.entities.forEach(e => { try { viewer.entities.remove(e); } catch (_) {} });
  _route.entities = [];
  _route.steps = [];
  _route.dest = null;
  try { viewer.scene.requestRender(); } catch (_) {}
}

function _drawRoute(route, fromLat, fromLng, toLat, toLng) {
  if (!viewer) return;
  _clearRoute();
  const coords = route.geometry.coordinates;            // [[lng,lat], ...]
  const flat = [];
  coords.forEach(c => { flat.push(c[0], c[1]); });
  // Glowing line that hugs the street grid on the CARTO layer.
  const line = viewer.entities.add({
    polyline: {
      positions: Cesium.Cartesian3.fromDegreesArray(flat),
      width: 9,
      clampToGround: true,
      material: new Cesium.PolylineGlowMaterialProperty({
        glowPower: 0.22,
        color: Cesium.Color.fromCssColorString('#39e0ff'),
      }),
      zIndex: 999,
    },
  });
  const start = viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(fromLng, fromLat),
    point: { pixelSize: 13, color: Cesium.Color.fromCssColorString('#7eebb4'),
             outlineColor: Cesium.Color.BLACK, outlineWidth: 2,
             heightReference: Cesium.HeightReference.CLAMP_TO_GROUND },
  });
  const end = viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(toLng, toLat),
    point: { pixelSize: 13, color: Cesium.Color.fromCssColorString('#ff5577'),
             outlineColor: Cesium.Color.BLACK, outlineWidth: 2,
             heightReference: Cesium.HeightReference.CLAMP_TO_GROUND },
  });
  _route.entities = [line, start, end];
  _route.dest = { lat: toLat, lng: toLng };
  try { viewer.flyTo(line, { duration: 1.4 }).catch(() => {}); } catch (_) {}
  try { viewer.scene.requestRender(); } catch (_) {}
}

// Public entry — route from the user's position (or IP fix) to a destination.
window.astranovNavigate = async function(toLat, toLng, label) {
  if (!viewer) return;
  toLat = Number(toLat); toLng = Number(toLng);
  if (!isFinite(toLat) || !isFinite(toLng)) return toast('No destination coordinates', 'err');
  let fromLat = window._userLat, fromLng = window._userLng;
  if (fromLat == null || fromLng == null) {
    toast('Locating you…');
    try { const c = await getUserLocation(); fromLat = c.lat; fromLng = c.lng;
          window._userLat = c.lat; window._userLng = c.lng; setUserLocation(c.lat, c.lng); }
    catch (_) { return toast('Need your location to route. Tap the Pilot to locate.', 'err'); }
  }
  toast('Charting route…');
  try {
    const route = await _fetchOSRM(fromLat, fromLng, toLat, toLng);
    _route.steps = (route.legs && route.legs[0] && route.legs[0].steps) || [];
    _route.label = label || 'Destination';
    _drawRoute(route, fromLat, fromLng, toLat, toLng);
    _openRoutePanel(route, label || 'Destination');
  } catch (e) {
    toast('Routing failed: ' + (e.message || e), 'err');
  }
};

function _maneuverText(step) {
  const m = step.maneuver || {};
  const road = step.name ? ' onto ' + escapeHtml(step.name) : '';
  const type = m.type || 'continue';
  const mod = m.modifier ? ' ' + m.modifier : '';
  if (type === 'depart')  return 'Head out' + (step.name ? ' on ' + escapeHtml(step.name) : '');
  if (type === 'arrive')  return 'Arrive at destination';
  if (type === 'roundabout' || type === 'rotary') return 'Take the roundabout' + road;
  if (type === 'turn')    return 'Turn' + mod + road;
  if (type === 'merge')   return 'Merge' + mod + road;
  if (type === 'fork')    return 'Keep' + mod + road;
  if (type === 'on ramp' || type === 'off ramp') return (type === 'on ramp' ? 'Take the ramp' : 'Exit') + road;
  if (type === 'new name') return 'Continue' + road;
  return (type.charAt(0).toUpperCase() + type.slice(1)) + mod + road;
}

function _openRoutePanel(route, label) {
  const steps = (route.legs && route.legs[0] && route.legs[0].steps) || [];
  const turns = steps.map(s => `
    <div class="ord-line">
      <span>${_maneuverText(s)}</span>
      <span style="color:#7a98c0;flex-shrink:0">${s.distance ? _fmtDist(s.distance) : ''}</span>
    </div>`).join('');
  openPanel(`
    <h2>Route</h2>
    <div class="subtitle">to ${escapeHtml(label)}</div>
    <div style="display:flex;gap:18px;margin:14px 0;align-items:baseline">
      <div><div style="font-size:24px;color:#39e0ff;font-weight:300">${_fmtDur(route.duration)}</div>
        <div style="font-size:9px;color:#7a98c0;letter-spacing:0.2em;text-transform:uppercase">drive time</div></div>
      <div><div style="font-size:24px;color:#cfe1ff;font-weight:300">${_fmtDist(route.distance)}</div>
        <div style="font-size:9px;color:#7a98c0;letter-spacing:0.2em;text-transform:uppercase">distance</div></div>
    </div>
    <div style="font-size:10px;color:#6a8aaf;letter-spacing:0.06em;margin-bottom:6px">One-way streets &amp; turn restrictions are honoured by the driving engine.</div>
    <div class="gadget-engage" onclick="_startRouteDriving()" style="border-color:rgba(57,224,255,0.4);color:#aef0ff">
      <span class="verb-glyph">◈</span><span>Start driving</span>
    </div>
    <div class="me-sec">Turn by turn</div>
    <div>${turns || '<div style="color:#6a8aaf;font-size:12px">Direct line.</div>'}</div>
    <div class="gadget-engage" onclick="_clearRoute();closePanel()" style="margin-top:12px;border-color:rgba(255,100,100,0.3);color:#ff9e9e">
      <span class="verb-glyph">✕</span><span>Clear route</span>
    </div>
  `);
}

window._startRouteDriving = function() {
  closePanel();
  if (window._userLat == null) return toast('Locate first', 'err');
  // Engage live driving view + GPS follow; the drawn route stays on the map.
  try { if (typeof startDriveWatch === 'function') startDriveWatch(); } catch (_) {}
  _enterDriving(window._userLat, window._userLng, 0);
  toast('Navigation started · follow the cyan line', 'ok');
};


/* ==============================================================
   Helper drones — WebRTC datachannel scaffold. The Astranov system
   stands ready to pair with companion drones via WebRTC + Supabase
   Realtime signaling (room: 'drone:<userId>'). A drone client
   joins the same room and exchanges SDP offers. Once paired, we
   can stream telemetry + send waypoints over the datachannel.
   ============================================================== */
const droneState = { peers: new Map(), channel: null, ready: false };
function initDroneStandby() {
  if (!sb || !session || droneState.ready) return;
  const room = 'drone:' + session.user.id;
  droneState.channel = sb.channel(room, { config: { broadcast: { ack: true } } })
    .on('broadcast', { event: 'drone-hello' }, ({ payload }) => _onDroneHello(payload))
    .on('broadcast', { event: 'drone-sdp'   }, ({ payload }) => _onDroneSdp(payload))
    .on('broadcast', { event: 'drone-ice'   }, ({ payload }) => _onDroneIce(payload))
    .subscribe();
  droneState.ready = true;
}
function _onDroneHello(p) {
  toast('Drone discovered: ' + (p.callsign || 'unknown'), 'ok');
  // (full handshake elided — drone client initiates with SDP offer)
}
function _onDroneSdp(p) { /* answer with sb.channel send */ }
function _onDroneIce(p) { /* trickle ICE */ }
function sendDroneWaypoint(lat, lng, alt) {
  for (const peer of droneState.peers.values()) {
    try { peer.dc?.send(JSON.stringify({ type: 'waypoint', lat, lng, alt })); } catch (_) {}
  }
}
window.openDronePanel = function() {
  initDroneStandby();
  const room = session ? 'drone:' + session.user.id : null;
  openPanel(`

// Peer search — fires on input, debounced lightly. Uses a public
// projection of the profiles table (id + display_name) via the
// SECURITY DEFINER RPC if available, else a direct profiles read.
window._findPeer = (function () {
  let timer = 0;
  return function (q) {
    clearTimeout(timer);
    timer = setTimeout(() => _doFindPeer(q), 280);
  };
})();
async function _doFindPeer(q) {
  const out = document.getElementById('msg-find-results');
  if (!out) return;
  q = (q || '').trim();
  if (q.length < 2) { out.innerHTML = ''; return; }
  out.innerHTML = '<div style="color:#7eb4ff;font-size:11px;padding:6px 0">Searching…</div>';
  if (!sb) { out.innerHTML = '<div style="color:#ff9e9e">Offline.</div>'; return; }
  let rows = [];
  // Try the safe RPC first; fall back to a direct read filtered by
  // display_name. Both surfaces are RLS-protected on the server.
  try {
    const r = await sb.rpc('find_peer', { q });
    if (!r.error && Array.isArray(r.data)) rows = r.data;
  } catch (_) {}
  if (!rows.length) {
    try {
      const r = await sb.from('profiles')
        .select('id, display_name')
        .ilike('display_name', '%' + q + '%')
        .limit(8);
      if (!r.error && Array.isArray(r.data)) rows = r.data;
    } catch (_) {}
  }
  rows = (rows || []).filter(r => r && r.id && r.id !== session.user.id);
  if (!rows.length) {
    out.innerHTML = '<div style="color:#6a8aaf;font-size:12px;padding:6px 0">No one with that name yet.</div>';
    return;
  }
  out.innerHTML = rows.map(r => `
    <div class="msg-row" onclick="openConversation(${JSON.stringify(r.id)},${JSON.stringify(r.display_name||'Friend')})">
      <div class="av">${escapeHtml((r.display_name||'?').charAt(0).toUpperCase())}</div>
      <div class="meta"><div class="peer">${escapeHtml(r.display_name||'Friend')}</div>
        <div class="preview" style="color:#7eebb4">Tap to write</div></div>
    </div>`).join('');
}
window._doFindPeer = _doFindPeer;

window.openConversation = async (peerId, peerName) => {
  _activePeer = { id: peerId, name: peerName };
  openPanel(`
    <h2>${escapeHtml(peerName)}</h2>
    <div class="msg-thread" id="msg-thread-container"></div>
    <div class="msg-compose">
      <input id="msg-input" class="gadget-cmd" placeholder="Message…" maxlength="4000" style="margin-top:0;flex:1" />
      <div class="send-orb" onclick="sendMessage()" title="Transmit" style="border-radius:50%;width:36px;height:36px;border:1.5px solid rgba(120,180,255,0.4);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:#7eb4ff;flex-shrink:0">◈</div>
    </div>
  `);
  // Mark read
  await sb.rpc('mark_messages_read', { peer: peerId });
  loadMessageBadge();
  // Load thread
  const { data } = await sb.rpc('get_conversation', { peer: peerId, max_results: 60 });
  const thread = $('msg-thread-container'); if (!thread) return;
  (data || []).forEach(m => _appendBubble(thread, m));
  thread.scrollTop = thread.scrollHeight;
  // Send on enter
  const inp = $('msg-input');
  if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }});
};

function _appendBubble(container, m) {
  const isMe = m.sender_id === session?.user.id;
  const div = document.createElement('div');
  div.className = 'msg-bubble ' + (isMe ? 'me' : 'them');
  div.textContent = m.body;
  div.title = formatRelative(m.created_at);
  container.appendChild(div);
}

function _appendIncomingBubble(m) {
  if (m.sender_id !== _activePeer?.id) return;
  const thread = $('msg-thread-container'); if (!thread) return;
  _appendBubble(thread, m);
  thread.scrollTop = thread.scrollHeight;
  sb.rpc('mark_messages_read', { peer: m.sender_id });
}

window.sendMessage = async () => {
  const inp = $('msg-input'); if (!inp || !_activePeer || !sb || !session) return;
  const body = inp.value.trim(); if (!body) return;
  inp.value = '';
  const m = { id: crypto.randomUUID(), sender_id: session.user.id, body, created_at: new Date().toISOString() };
  const thread = $('msg-thread-container');
  if (thread) { _appendBubble(thread, m); thread.scrollTop = thread.scrollHeight; }
  const { error } = await sb.from('messages').insert({ sender_id: session.user.id, recipient_id: _activePeer.id, body });
  if (error) { toast(error.message, 'err'); return; }
  pushNotify(_activePeer.id, {
    type:       'message',
    title:      profile?.display_name || 'Message',
    body:       body.slice(0, 80),
    tag:        'msg-' + session.user.id,
    senderId:   session.user.id,
    senderName: profile?.display_name || '',
  });
};

window._agentChatSend = async function() {
  const name = _agentState.open; if (!name || !sb) return;
  const input = $('agent-input'); if (!input) return;
  const text = (input.value || '').trim(); if (!text) return;
  input.value = '';
  const cfg = AGENTS[name];
  _agentState.log[name].push({ role: 'me', text });
  _renderAgentLog();
  $('agent-sheet')?.classList.add('thinking');
  try {
    const messages = [];
    if (cfg.chatSystem) messages.push({ role: 'system', content: cfg.chatSystem });
    for (const m of _agentState.log[name]) {
      messages.push({ role: m.role === 'me' ? 'user' : 'assistant', content: m.text });
    }
    const { data, error } = await sb.functions.invoke('aicycle', { body: { messages } });
    if (error) throw error;
    const resp = (data && (data.response || data.text)) || 'No reply.';
    const via  = (data && (data.via || data.provider)) || '';
    _agentState.log[name].push({ role: 'bot', text: resp, via });
  } catch (e) {
    _agentState.log[name].push({ role: 'bot', text: 'Connection failed: ' + (e.message || e), via: 'system' });
  }
  $('agent-sheet')?.classList.remove('thinking');
  _renderAgentLog();
};

// === Sheet drag-resize ==================================================
(function() {
  const sheet  = () => $('agent-sheet');
  const handle = () => $('agent-handle');
  let st = null;
  function onDown(e) {
    const s = sheet(); if (!s || !s.classList.contains('open')) return;
    st = { y: e.clientY, h: s.getBoundingClientRect().height, vh: window.innerHeight };
    s.classList.add('dragging');
    try { handle().setPointerCapture(e.pointerId); } catch (_) {}
    e.preventDefault();
  }
  function onMove(e) {
    if (!st) return;
    const s = sheet(); if (!s) return;
    const newH = Math.max(0, Math.min(st.vh * 0.96, st.h + (st.y - e.clientY)));
    s.style.height = newH + 'px';
  }
  function onUp(e) {
    if (!st) return;
    const s = sheet(); if (!s) { st = null; return; }
    s.classList.remove('dragging');
    try { handle().releasePointerCapture(e.pointerId); } catch (_) {}
    const h = s.getBoundingClientRect().height;
    const vh = st.vh;
    st = null;
    // Snap: <22vh closes; 22-70vh = open (48vh); >=70vh = expanded (92vh)
    s.style.height = '';
    if (h < vh * 0.22) { closeAgentSheet(); return; }
    if (h >= vh * 0.70) s.classList.add('expanded');
    else                s.classList.remove('expanded');
  }
  // Wire when DOM is ready
  function wire() {
    const h = handle(); if (!h) return setTimeout(wire, 50);
    h.addEventListener('pointerdown', onDown);
    h.addEventListener('pointermove', onMove);
    h.addEventListener('pointerup',   onUp);
    h.addEventListener('pointercancel', onUp);
  }
  wire();
})();

   4. Signals — PointPrimitiveCollection + pulse callback
   ============================================================== */
let signalPoints = null;         // PointPrimitiveCollection
const signalIndex = new Map();   // id -> { primitive, signal }

let userBillboards = null;
let userBillboard  = null;
let _userBeaconRaf = 0;

const CATEGORY_COLORS = {
  news:        Cesium.Color.fromCssColorString('#00d4ff'),
  jobs:        Cesium.Color.fromCssColorString('#7cff7c'),
  commerce:    Cesium.Color.fromCssColorString('#ffaa00'),
  social:      Cesium.Color.fromCssColorString('#ff7edc'),
  dating:      Cesium.Color.fromCssColorString('#ff3a6e'),
  real_estate: Cesium.Color.fromCssColorString('#b48cff'),
  classifieds: Cesium.Color.fromCssColorString('#a0a0a0'),
};

function ensurePointCollection() {
  if (!signalPoints && viewer) {
    signalPoints = viewer.scene.primitives.add(new Cesium.PointPrimitiveCollection());
  }
}

function addSignalPoint(signal) {
  if (!viewer || signal.lng == null || signal.lat == null) return;
  ensurePointCollection();
  if (signalIndex.has(signal.id)) return; // already rendered

  const color = CATEGORY_COLORS[signal.category] || Cesium.Color.WHITE;
  const size = 6 + Math.min(signal.amplitude || 1, 24);
  const primitive = signalPoints.add({
    position: Cesium.Cartesian3.fromDegrees(Number(signal.lng), Number(signal.lat)),
    pixelSize: size,
    color: color.withAlpha(0.85),
    outlineColor: Cesium.Color.WHITE.withAlpha(0.4),
    outlineWidth: 1,
    scaleByDistance: new Cesium.NearFarScalar(1.5e2, 1.4, 1.5e7, 0.6),
    show: (currentLevel !== 'global') && (CAT_FILTER_STATE[signal.category] !== false),
  });
  primitive.__signalId = signal.id;
  signalIndex.set(signal.id, { primitive, signal });
  viewer.scene.requestRender();
}

function updateSignalPoint(signal) {
  const entry = signalIndex.get(signal.id);
  if (!entry) return addSignalPoint(signal);
  entry.signal = signal;
  entry.primitive.pixelSize = 6 + Math.min(signal.amplitude || 1, 24);
  if (signal.status !== 'active') removeSignalPoint(signal.id);
  viewer.scene.requestRender();
}

function removeSignalPoint(id) {
  const entry = signalIndex.get(id);
  if (!entry) return;
  signalPoints.remove(entry.primitive);
  signalIndex.delete(id);
  viewer.scene.requestRender();
}

function _makeUserBeaconCanvas() {
  const sz = 80, cx = sz / 2;
  const c = document.createElement('canvas'); c.width = c.height = sz;
  const ctx = c.getContext('2d');
  // Outer soft glow
  const g = ctx.createRadialGradient(cx, cx, 4, cx, cx, cx);
  g.addColorStop(0, 'rgba(0,212,255,0.8)');
  g.addColorStop(0.45, 'rgba(0,212,255,0.25)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, sz, sz);
  // Dashed orbit ring
  ctx.save(); ctx.setLineDash([3, 4]);
  ctx.beginPath(); ctx.arc(cx, cx, cx - 4, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,212,255,0.45)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();
  // Solid filled circle
  ctx.beginPath(); ctx.arc(cx, cx, cx - 20, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,180,255,0.94)'; ctx.fill();
  ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 16;
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3; ctx.stroke();
  ctx.shadowBlur = 0;
  // White center dot
  ctx.beginPath(); ctx.arc(cx, cx, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
  return c;
}

function setUserBeacon(lat, lng) {
  if (!viewer) return;

  if (userBillboard) { userBillboards.remove(userBillboard); userBillboard = null; }
  cancelAnimationFrame(_userBeaconRaf);

  userBillboard = userBillboards.add({
    position: Cesium.Cartesian3.fromDegrees(Number(lng), Number(lat)),
    image: _makeUserBeaconCanvas(),
    width: 58,
    height: 58,
    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
    scaleByDistance: new Cesium.NearFarScalar(100, 2.0, 4e5, 0.2),

  userBillboard.scale = 1.0;
}

// Tier-aware city-dot flight. NEVER skip a level: from GLOBAL we land at
// NATIONAL altitude over the city's country; only from NATIONAL do we
// descend into the city itself. From PERSONAL we stay personal (recenter).
function flyToCity(city) {
  if (!city || !viewer) return;
  const h = viewer.camera.positionCartographic.height;
  let alt, pitchDeg;
  if (h > LEVEL_THRESHOLDS.global) {
    // Global → National. Park above the country, do not yet descend to city.
    alt = 700_000;
    pitchDeg = -90;
  } else if (h > LEVEL_THRESHOLDS.national) {
    // National → City. Now actually enter the city.
    alt = 6_000;
    pitchDeg = -72;
  } else {
    // Already personal — just recenter on the city.
    alt = h;
    pitchDeg = -65;
  }
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(city.lng, city.lat, alt),
    duration: 2.0,
    orientation: { heading: 0, pitch: Cesium.Math.toRadians(pitchDeg), roll: 0 },
  });
  // Only warm up OSM at city tier or lower — at national altitude we'd be
  // querying a sub-5km radius that the camera can't even see.
  if (alt <= LEVEL_THRESHOLDS.national) fetchOSMNearby(city.lat, city.lng, 5000);
}

// Multiple Overpass mirrors — the main one frequently 504s. We race through
// them with a per-request timeout so vendors reliably load.
const OVERPASS_API = 'https://overpass-api.de/api/interpreter';
const OVERPASS_MIRRORS = [
  'https://overpass-api.de/api/interpreter',
  'https://overpass.kumi.systems/api/interpreter',
  'https://maps.mail.ru/osm/tools/overpass/api/interpreter',
  'https://overpass.openstreetmap.fr/api/interpreter',
];
async function _overpassFetch(query) {
  for (const url of OVERPASS_MIRRORS) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 18000);
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'data=' + encodeURIComponent(query),
        signal: ctrl.signal,
      });
      clearTimeout(t);
      if (resp.ok) return await resp.json();
    } catch (_) { /* try next mirror */ }
  }
  return null;
}

  if (_placeIconCache.has(catKey)) return _placeIconCache.get(catKey);
  // PLACE AGENT ORB — visual language matches informant orbs and corner
  // agents. Soft radial glow, glassy orb body, faint orbit ring, centre
  // emoji. No boxy badges, no tick marks. Every place on the map is an
  // agent of itself.
  const sz = 80, cx = sz / 2;
  const c = document.createElement('canvas'); c.width = c.height = sz;
  const ctx = c.getContext('2d');
  const info = _CAT_INFO[catKey] || _CAT_INFO.default;
  const col = info.color;

  // Outer aura
  const aura = ctx.createRadialGradient(cx, cx, 6, cx, cx, cx);
  aura.addColorStop(0, col + 'aa');
  aura.addColorStop(0.45, col + '40');
  aura.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = aura; ctx.fillRect(0, 0, sz, sz);

  // Faint orbit ring (the agent is alive in its own sphere)
  ctx.beginPath(); ctx.arc(cx, cx, cx - 4, 0, Math.PI * 2);
  ctx.strokeStyle = col + '55'; ctx.lineWidth = 1; ctx.stroke();

  // Glassy orb body — top-left highlight to mid-tone to deep
  const r = cx - 11;
  const body = ctx.createRadialGradient(cx - r * 0.4, cx - r * 0.4, 1, cx, cx, r);
  body.addColorStop(0,    'rgba(255,255,255,0.55)');
  body.addColorStop(0.18, col + 'cc');
  body.addColorStop(0.7,  col + '44');
  body.addColorStop(1,    'rgba(4,10,22,0.95)');
  ctx.beginPath(); ctx.arc(cx, cx, r, 0, Math.PI * 2);
  ctx.fillStyle = body; ctx.fill();
  ctx.shadowColor = col; ctx.shadowBlur = 8;
  ctx.strokeStyle = col + 'dd'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.shadowBlur = 0;

  // Centre emoji — the agent's face
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = '23px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(info.emoji, cx, cx + 2);

  _placeIconCache.set(catKey, c);
  return c;
}

function _ensureBillboardCollection() {
  if (!placeBillboards && viewer) {
    placeBillboards = viewer.scene.primitives.add(new Cesium.BillboardCollection({ scene: viewer.scene }));
  }
}

function addPlacePoint(place) {
  if (!viewer || !place.lat || !place.lon) return;
  const tags = place.tags || {};
  if (!tags.name) return;
  _ensureBillboardCollection();
  const key = 'osm:' + place.id;
  if (placeIndex.has(key)) return;
  const catKey = _catKey(tags);
  const icon = _makePlaceCanvas(catKey);
  const billboard = placeBillboards.add({
    position: Cesium.Cartesian3.fromDegrees(Number(place.lon), Number(place.lat)),
    image: icon,
    // Tiny, per the owner: vendor pins flooded the city. 22 px max
    // up close, shrinks further as you pull back. Clustering at
    // NATIONAL is the next surface; for now these just fade.
    width: 22,
    height: 22,
    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
    pixelOffset: new Cesium.Cartesian2(0, 4),
    scaleByDistance: new Cesium.NearFarScalar(200, 1.0, 1.2e6, 0.18),
    translucencyByDistance: new Cesium.NearFarScalar(7e5, 1.0, 1.8e6, 0),
    eyeOffset: new Cesium.Cartesian3(0, 0, -10),
  });
  billboard.__placeId = key;
  placeIndex.set(key, { primitive: billboard, place });
  viewer.scene.requestRender();
}

async function fetchOSMNearby(lat, lng, radiusM) {
  radiusM = radiusM || 6000;
  const zk = Math.round(lat * 10) + ',' + Math.round(lng * 10);
  if (_osmFetchedZones.has(zk)) return;
  _osmFetchedZones.add(zk);
  const q = '[out:json][timeout:25];('
    + 'node["name"]["amenity"~"restaurant|cafe|bar|fast_food|pub|hotel|pharmacy|bank|atm|supermarket|hospital|clinic|cinema|theatre|museum|doctors|convenience"](around:' + radiusM + ',' + lat + ',' + lng + ');'
    + 'node["name"]["shop"](around:' + radiusM + ',' + lat + ',' + lng + ');'
    + 'node["name"]["tourism"~"hotel|hostel|motel|attraction|museum|gallery|viewpoint"](around:' + radiusM + ',' + lat + ',' + lng + ');'
    + ');out 600;';
  const json = await _overpassFetch(q);
  if (!json) { _osmFetchedZones.delete(zk); return; }   // allow retry later
  const elements = json.elements || [];
  elements.forEach(addPlacePoint);
  if (elements.length) toast(elements.length + ' places nearby', '');
}

async function _autoLoadPlaces() {
  // Pre-warm nearby places by IP and DROP the user beacon so the user
  // can dive-to-me with a single tap from the global view. Camera does
  // NOT move (Zero-UI §1, Space View §5b) — the beacon is the affordance,
  // tapping it triggers the descent.
  if (window._userLat) {
    fetchOSMNearby(window._userLat, window._userLng, 6000);
    try { setUserBeacon(window._userLat, window._userLng); } catch (_) {}
    return;
  }
  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    if (d && d.latitude) {
      window._userLat = d.latitude; window._userLng = d.longitude;
      setUserLocation(d.latitude, d.longitude);
      try { setUserBeacon(d.latitude, d.longitude); } catch (_) {}
      fetchOSMNearby(d.latitude, d.longitude, 8000);
    }
  } catch (_) {}
}

window._cartEdit = function(i, field, val) {
  if (!window._cart[i]) return;
  if (field === 'qty' || field === 'price') val = Number(val) || 0;
  window._cart[i][field] = val;
  // recompute totals — re-render but preserve focus
  const focus = document.activeElement;
  const focusKey = focus && focus.dataset && focus.dataset.i;
  const focusClass = focus && focus.className;
  _renderOrderPanel();
  if (focusKey != null) {
    const sel = document.querySelector(`input[data-i="${focusKey}"].${focusClass.split(' ').pop()}`);
    if (sel) { sel.focus(); sel.setSelectionRange(sel.value.length, sel.value.length); }
  }
};

window._submitOrder = async function() {
  const p = window._currentPlace;
  const cart = (window._cart || []).filter(it => it.name && Number(it.qty) > 0 && Number(it.price) >= 0);
  if (!cart.length) return toast('Cart is empty', 'err');
  const subtotal = cart.reduce((s, it) => s + (Number(it.qty)||0) * (Number(it.price)||0), 0);
  const delivery_fee = 3;
  const platform_fee = Math.max(1, Math.round(subtotal * 0.05));
  const total = subtotal + delivery_fee + platform_fee;
  const addr = ($('ord-addr')?.value || '').trim();
  const notes = ($('ord-notes')?.value || '').trim();
  window._orderNotes = notes;

  const vendor_id = window._cartVendorId || _osmIdFor(p);
  const t = p.tags || {};
  const vendor_payload = {
    osm_id: p.id || (vendor_id.startsWith('osm:') ? vendor_id.slice(4) : null),
    name: p.name, emoji: p.info.emoji, category: p.catKey,
    lat: p._lat ?? null, lng: p._lng ?? null,
    address: { street: t['addr:street'], city: t['addr:city'], housenumber: t['addr:housenumber'] },
    tags: t,
  };

  const lat = window._orderLat ?? window._userLat ?? null;
  const lng = window._orderLng ?? window._userLng ?? null;

  toast('Transmitting order…');
  try {
    const { data, error } = await sb.functions.invoke('order-intake', {
      body: {
        vendor_id, vendor: vendor_payload,
        items: cart, calc: { subtotal, delivery_fee, platform_fee, total, currency: 'EUR' },
        delivery_lat: lat, delivery_lng: lng, delivery_address: addr, notes,
      }
    });
    if (error) throw error;
    if (!data?.ok) throw new Error(data?.error || 'order failed');
    window._cart = []; window._cartVendorId = null;
    toast('Order placed · ' + data.order.short_id, 'ok');
    try { await loadProfile(); } catch (_) {}   // euros were debited server-side
    closePanel();
    setTimeout(() => openOrderTrackPanel(data.order.id), 250);
  } catch (e) {
    const msg = String(e.message || e);
    if (msg.includes('insufficient_funds') || msg.includes('402')) {
      toast('Not enough euros — top up to order', 'err');
      try { await loadProfile(); } catch (_) {}
      setTimeout(() => { try { openBuyAVC(); } catch (_) {} }, 400);
      return;
    }
    toast('Order failed: ' + msg, 'err');
  }
};

async function openOrderTrackPanel(orderId) {
  if (!sb || !session) return;
  const { data: o } = await sb.from('orders').select('*').eq('id', orderId).single();
  if (!o) return toast('Order not found', 'err');
  _renderOrderTrack(o);
  // subscribe to live status
  const ch = sb.channel('order-' + orderId)
    .on('broadcast', { event: 'status' }, ({ payload }) => {
      if (payload.order_id === orderId) {
        sb.from('orders').select('*').eq('id', orderId).single().then(({ data }) => data && _renderOrderTrack(data));
      }
    });
  ch.subscribe();
  window._orderChannel && sb.removeChannel(window._orderChannel);
  window._orderChannel = ch;
}

function _renderOrderTrack(o) {
  const steps = ['pending','accepted','preparing','in_transit','delivered'];
  const idx = Math.max(0, steps.indexOf(o.status));

function subscribeRealtime() {
  if (!sb) return;
  sb.channel('astranov-signals')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'signals' },
        p => p.new.status === 'active' && addSignalPoint(p.new))
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'signals' },
        p => updateSignalPoint(p.new))
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'signals' },
        p => removeSignalPoint(p.old.id))
    .subscribe();
  sb.channel('astranov-deliveries')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'deliveries' },
        p => { addDeliveryPin(p.new); loadDeliveryBadge(); })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'deliveries' },
        p => {
          if (p.new.status !== 'requested') removeDeliveryPin(p.new.id);
          loadDeliveryBadge();
          if ($('delivery-list')) loadDeliveryTab(_currentDeliveryTab || 'my-requests');
        })
    .subscribe();
  // Messages → badge update
  sb.channel('astranov-messages')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
      if (p.new.recipient_id === session?.user.id) {
        loadMessageBadge();
        if ($('msg-thread-container')) _appendIncomingBubble(p.new);
      }
    })
    .subscribe();
}

/* ==============================================================
   5. Pin click → open signal panel
   ============================================================== */
function onCanvasClick(click) {
  if (!viewer) return;
  const picked = viewer.scene.pick(click.position);
  // DIVE-TO-ME (one tap to where you are). The user's beacon is the
  // shortest path from any tier to PERSONAL: tap it and the camera
  // flies straight to street level over the user's fix and the
  // nearby vendors are warmed and rendered.
  if (picked?.primitive?.__userBeacon) {
    try { diveToMe(); } catch (_) {}
    return;
  }
  // Native orb cloud — every orbital agent / system orb carries its
  // own handler reference; native picking routes it. One render
  // pipeline, no DOM transforms per frame.
  if (picked?.primitive?.__orbCloudHandler) {
    try { picked.primitive.__orbCloudHandler(); } catch (_) {}
    return;
  }
  if (picked?.primitive?.__cityId) {
    flyToCity(cityDotIndex.get(picked.primitive.__cityId)?.city);
    return;
  }
  if (picked?.primitive?.__signalId) {
    const entry = signalIndex.get(picked.primitive.__signalId);
    if (entry) openSignalPanel(entry.signal);
    return;
  }
  if (picked?.primitive?.__deliveryId) {
    const entry = deliveryIndex.get(picked.primitive.__deliveryId);
    if (entry) openDeliveryPanel(entry.delivery.id);
    return;
  }
  if (picked?.primitive?.__placeId) {
    const entry = placeIndex.get(picked.primitive.__placeId);
    if (entry) {
      // 5-click order path: globe → national → city → vendor → + → Order.
      // Tap vendor jumps straight to the ORDER panel (menu + cart),
      // skipping the info card. _placeOrder seeds _currentPlace and
      // auto-loads the menu so the user can tap + immediately.
      try {
        // Seed _currentPlace from the pin so _placeOrder has its info.
        const p = entry.place;
        const t = p.tags || {};
        const catKey = _catKey(t);
        const info = _CAT_INFO[catKey] || _CAT_INFO.default;
        window._currentPlace = { id: p.id, tags: t, name: t.name || 'Unknown',
          catKey, info, phone: t.phone || '', website: t.website || '',
          hours: t.opening_hours || '', cuisine: t.cuisine || '',
          _lat: Number(p.lat), _lng: Number(p.lon) };
      } catch (_) {}
      try { _placeOrder(); } catch (_) {}
      // Compose the menu in the background so + buttons appear without
      // a second tap.
      setTimeout(() => { try { if (window._menu == null) _loadMenu(); } catch (_) {} }, 240);
    }
    return;
  }
  // Empty globe tap → descend one navigation level toward the tapped point.
  const ray = viewer.camera.getPickRay(click.position);
  const ground = ray && viewer.scene.globe.pick(ray, viewer.scene);
  if (ground) {
    const carto = Cesium.Cartographic.fromCartesian(ground);
    const lat = Cesium.Math.toDegrees(carto.latitude);
    const lng = Cesium.Math.toDegrees(carto.longitude);
    const h = viewer.camera.positionCartographic.height;
    let target;
    if (h > LEVEL_THRESHOLDS.global)        target = 700_000;   // global → national
    else if (h > LEVEL_THRESHOLDS.national) target = 8_000;     // national → city
    else                                    target = 1_200;     // city → street
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(lng, lat, target),
      duration: 1.6,
      orientation: { heading: 0, pitch: Cesium.Math.toRadians(target < 10_000 ? -65 : -90), roll: 0 },
    });
    return;
  }
  closePanel();
}

/* DIVE-TO-ME — one-tap descent from anywhere to PERSONAL over the
   user's location. Warms the nearby places so "what I can do around
   me" is live the moment the camera lands. */
function diveToMe() {
  if (!viewer) return;
  const lat = window._userLat, lng = window._userLng;
  if (lat == null || lng == null) {
    try { if (typeof startLocate === 'function') startLocate(); } catch (_) {}
    return;
  }
  try {
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(lng, lat, 1_200),
      duration: 1.4,
      orientation: { heading: 0, pitch: Cesium.Math.toRadians(-65), roll: 0 },
    });
  } catch (_) {}
  try { fetchOSMNearby(lat, lng, 1500); } catch (_) {}
}
window.diveToMe = diveToMe;

// Combine local signals (user-emitted, on the globe) with the LIVE
// world news the informant-feed Edge function has pulled into
// _externalFindings. A cold-start user with no signals of their own
// still sees real headlines, sports, science, market — the GDELT
// seed informants are doing their job.
function _allFeedItems() {
  const items = [];
  // Local signals from the globe index.
  for (const e of signalIndex.values()) {
    const s = e.signal;
    items.push({
      id: 'sig:' + s.id,
      title: s.title,
      category: s.category || 'news',
      source_name: s.source_name || '',
      source_url: s.source_url || '',
      created_at: s.created_at,
      _signal: s,
    });
  }
  // External findings from the informant feeds (real news, GDELT etc.).
  try {
    if (typeof _externalFindings !== 'undefined' && _externalFindings) {
      for (const [infId, arr] of _externalFindings) {
        const inf = (typeof _loadInformants === 'function') ? (_loadInformants().find(x => x.id === infId) || {}) : {};
        (arr || []).forEach((f, i) => {
          items.push({
            id: 'ext:' + infId + ':' + i,
            title: f.title || '(untitled)',
            category: inf.category || 'news',
            source_name: f.source || inf.name || '',
            source_url: f.source_url || f.url || '',
            created_at: f.published_at || f.created_at || new Date().toISOString(),
            _external: f,
          });
        });
      }
    }
  } catch (_) {}
  // Newest first.
  items.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  return items;
}

async function openFeedPanel() {
  const items = _allFeedItems().slice(0, 60);
  // Map back to signal shape for _renderFeedCards which expects that.
  const cards = items.map(it => it._signal || ({
    id: it.id, title: it.title, category: it.category,
    source_name: it.source_name, source_url: it.source_url,
    created_at: it.created_at, scope: 'global', amplitude: 1, source: 'crawler',
  }));

  openPanel(`
    <h2>Feed</h2>
    <div class="subtitle" id="feed-subtitle">${items.length} items · live</div>
    <div id="feed-list">${_renderFeedCards(cards)}</div>
    <div class="gadget-engage" onclick="openEmitPanel()" style="margin-top:14px"><span class="verb-glyph">⊕</span><span>Emit signal</span></div>
  `);

  // Kick a fresh poll so the informant feed catches up if it's been
  // a while since last refresh — and re-fetch DB signals.
  try { if (typeof pollInformantFeeds === 'function') pollInformantFeeds().catch(() => {}); } catch (_) {}

  if (!sb) return;
  const { data } = await sb.from('signals')
    .select('id,author_id,category,scope,title,body,lng,lat,amplitude,created_at,source,source_url,source_name')
    .eq('status','active').order('created_at',{ascending:false}).limit(80);
  if (!data) return;
  data.forEach(s => { if (s.lat && s.lng) addSignalPoint(s); });
  const items2 = _allFeedItems().slice(0, 60);
  const cards2 = items2.map(it => it._signal || ({
    id: it.id, title: it.title, category: it.category,
    source_name: it.source_name, source_url: it.source_url,
    created_at: it.created_at, scope: 'global', amplitude: 1, source: 'crawler',
  }));
  const feedList = $('feed-list');
  const feedSub  = $('feed-subtitle');
  if (feedList) feedList.innerHTML = _renderFeedCards(cards2);
  if (feedSub)  feedSub.textContent = items2.length + ' items · live';
}

async function _acquireRadar() {
  let coords;
  try {
    coords = await getUserLocation();
  } catch (e) {
    const core = $('radar-core');
    if (core) core.classList.remove('acquiring');
    const coordEl = $('radar-coords');
    if (coordEl) coordEl.textContent = 'NO FIX';
    const sig = $('radar-signals');
    if (sig) sig.innerHTML = `<div class="gadget-engage armed" onclick="recalibrateRadar()" style="margin:12px auto;max-width:200px"><span class="verb-glyph"></span><span>Reacquire</span></div>`;
    return;
  }

  const core = $('radar-core');
  if (core) { core.classList.remove('acquiring'); core.classList.add('locked'); core.dataset.lat = coords.lat; core.dataset.lng = coords.lng; }
  const coordEl = $('radar-coords');
  if (coordEl) coordEl.textContent = `${coords.lat.toFixed(3)}° ${coords.lng > 0 ? '+' : ''}${coords.lng.toFixed(3)}°`;

  viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(coords.lng, coords.lat, 12_000), duration: 2.5 });

  const { data, error } = await sb.rpc('nearby_signals', { p_lat: coords.lat, p_lng: coords.lng, radius_meters: 50_000, max_results: 50 });
  if (error) {
    const sig = $('radar-signals');
    if (sig) sig.innerHTML = `<div style="color:#ff9e9e;font-size:12px;text-align:center;padding:8px">signal rpc: ${escapeHtml(error.message)}</div>`;
    return;
  }

  _renderRadarBlips(data || [], coords);
  _renderRadarSignalList(data || [], coords);

  // Populate globe with nearby real-world places from OpenStreetMap
  fetchOSMNearby(coords.lat, coords.lng, 5000);
}

window.recalibrateRadar = async () => {
  const core = $('radar-core');
  if (!core || core.classList.contains('acquiring')) return;
  core.classList.remove('locked');
  core.classList.add('acquiring');
  const coordEl = $('radar-coords');
  if (coordEl) coordEl.textContent = 'ACQUIRING';
  const blips = $('radar-blips');
  if (blips) blips.innerHTML = '';
  const sig = $('radar-signals');
  if (sig) sig.innerHTML = '';
  await _acquireRadar();
};

function _renderRadarBlips(signals, myCoords) {
  const container = $('radar-blips');
  if (!container) return;
  container.innerHTML = '';
  const cx = 110, cy = 110, maxR = 82;
  signals.slice(0, 30).forEach(s => {
    if (!s.lat || !s.lng) return;
    const bearing = Math.atan2(s.lng - myCoords.lng, s.lat - myCoords.lat);
    const dist = Math.min((s.distance_meters || 0) / 50_000, 0.98);
    const blip = document.createElement('div');
    blip.className = 'radar-blip';
    blip.style.left = (cx + maxR * dist * Math.sin(bearing)) + 'px';
    blip.style.top  = (cy - maxR * dist * Math.cos(bearing)) + 'px';
    blip.style.background = RADAR_COLORS[s.category] || '#fff';
    blip.style.boxShadow = `0 0 6px ${RADAR_COLORS[s.category] || '#fff'}`;
    blip.title = s.title;
    blip.addEventListener('click', () => flyToSignal(s.id));
    container.appendChild(blip);
  });
}

function _renderRadarSignalList(data, coords) {
  const container = $('radar-signals');

    <div class="radar-row" onclick="flyToSignal('${s.id}')">

async function getUserLocation() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error('Geolocation API not available'));
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
      err => reject(err),
      { timeout: 15_000, enableHighAccuracy: true, maximumAge: 60_000 }
    );
  });
}

async function reverseGeocode(lat, lng) {
  // Nominatim — free, no key, please respect rate limit (1 req/sec)
  const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&zoom=10`;
  const r = await fetch(url, { headers: { 'Accept-Language': navigator.language || 'en' } });
  if (!r.ok) throw new Error('Nominatim ' + r.status);
  const data = await r.json();
  return {
    country_code: data.address?.country_code,
    country: data.address?.country,
    city: data.address?.city || data.address?.town || data.address?.village || data.address?.county,
    display_name: data.display_name,
  };
}

function formatDistance(m) {
  if (m == null) return '';
  if (m < 1000) return `${Math.round(m)} m`;
  if (m < 100_000) return `${(m / 1000).toFixed(1)} km`;
  return `${Math.round(m / 1000)} km`;
}

// Owner-only: transfer AVC from the owner's reserve into any user's EUR
// balance. Wraps the admin_transfer_avc_to_eur RPC (which double-checks
// is_owner server-side, so even if a non-owner crafts this call directly
// the RPC refuses).
window._adminTransferAvcToEur = async function() {
  const status = document.getElementById('avc-transfer-status');
  const target = (document.getElementById('avc-target')?.value || '').trim();
  const amount = parseFloat(document.getElementById('avc-amount')?.value || '0');
  if (!target || !amount || amount <= 0) { if (status) status.textContent = 'target id + positive amount required'; return; }
  // Accept either a profile_id (uuid) or an email. Email path looks up profile_id.
  let targetId = target;
  if (target.includes('@')) {
    try {
      const { data } = await sb.from('profiles').select('id').eq('email', target).single();
      if (!data?.id) { if (status) status.textContent = 'no profile found for that email'; return; }
      targetId = data.id;
    } catch (_) { if (status) status.textContent = 'lookup failed'; return; }
  }
  try {
    const { data, error } = await sb.rpc('admin_transfer_avc_to_eur', {
      p_target_profile: targetId, p_amount: amount,
    });
    if (error) throw error;
    if (status) status.textContent = `Transferred €${amount.toFixed(2)} to ${targetId.slice(0,8)}…`;
    // Refresh balances (own private row via SECURITY DEFINER RPC).
    try { const { data: mp } = await sb.rpc('my_profile'); const p = Array.isArray(mp) ? mp[0] : mp; if (p) profile = p; } catch (_) {}
    setTimeout(openWalletPanel, 900);
  } catch (e) {
    if (status) status.textContent = 'Failed: ' + (e?.message || String(e));
  }
};

          <span style="color:${t.amount>0?'#7eebb4':'#ff9e9e'};font-weight:500">${t.amount>0?'+':''}${Number(t.amount)} AVC</span>
        </div>
        <div class="meta">${t.kind.replace('_',' ')} · ${formatRelative(t.created_at)}</div>
      </div>`).join('')
      : '<div style="color:#6a8aaf;padding:12px 0;font-size:13px">No AVC transactions yet. Complete a delivery to earn.</div>';
    return;
  }

  if (error) {
    target.innerHTML = `<div style="color:#ff9e9e">${escapeHtml(error.message)}</div>`;
    return;
  }
  if (!data || data.length === 0) {
    target.innerHTML = `<div style="color:#6a8aaf;padding:12px 0">${tab === 'nearby' ? 'No open deliveries near you.' : 'Nothing here yet.'}</div>`;
    return;
  }

  target.innerHTML = data.map(d => renderDeliveryRow(d, tab)).join('');
}

function renderDeliveryRow(d, tab) {
  const dist = d.pickup_distance_meters != null ? formatDistance(d.pickup_distance_meters) : '';
  const trip = d.trip_distance_meters != null ? formatDistance(d.trip_distance_meters) : '';
  const status = d.status || (tab === 'nearby' ? 'requested' : '');
  return `
    <div class="delivery-row" onclick="openDeliveryPanel('${d.id}')">
      <div class="head">
        <span class="desc">${escapeHtml(d.description)}</span>
        <span class="reward">€${d.reward_avc ?? 0}</span>
      </div>
      <div class="meta">
        ${status ? `<span class="status status-${status}">${status.replace('_',' ')}</span>` : ''}
        ${dist ? `pickup ${dist} away · ` : ''}${trip ? `trip ${trip}` : ''}
        ${!dist && !trip ? formatRelative(d.created_at) : ''}
      </div>
    </div>
  `;
}

  const { error } = await sb.rpc('update_delivery_status', { delivery_id: id, new_status: newStatus });
  if (error) return toast(error.message, 'err');
  const terminal = newStatus === 'delivered' || newStatus === 'cancelled';

/* ==============================================================
   Delivery globe pins — yellow rings for open delivery requests.
   Visible at NATIONAL / PERSONAL zoom only.
   ============================================================== */
let deliveryPoints = null;
const deliveryIndex = new Map(); // id → { primitive, delivery }

function ensureDeliveryCollection() {
  if (!deliveryPoints && viewer) {
    deliveryPoints = viewer.scene.primitives.add(new Cesium.PointPrimitiveCollection());
  }
}

function addDeliveryPin(d) {
  if (!viewer) return;
  const lat = d.pickup_lat, lng = d.pickup_lng;
  if (lat == null || lng == null) return;
  ensureDeliveryCollection();
  if (deliveryIndex.has(d.id)) return;
  const prim = deliveryPoints.add({
    position: Cesium.Cartesian3.fromDegrees(Number(lng), Number(lat)),
    pixelSize: 14,
    color: Cesium.Color.fromCssColorString('#ffd47e').withAlpha(0.9),
    outlineColor: Cesium.Color.fromCssColorString('#ffaa00').withAlpha(0.7),
    outlineWidth: 3,
    scaleByDistance: new Cesium.NearFarScalar(1.5e3, 1.4, 8e6, 0.4),
    show: currentLevel !== 'global',
  });
  prim.__deliveryId = d.id;
  deliveryIndex.set(d.id, { primitive: prim, delivery: d });
  viewer.scene.requestRender();
}

function removeDeliveryPin(id) {
  const entry = deliveryIndex.get(id);
  if (!entry || !deliveryPoints) return;
  deliveryPoints.remove(entry.primitive);
  deliveryIndex.delete(id);
  if (viewer) viewer.scene.requestRender();
}

async function loadDeliveries() {
  if (!sb) return;
  const { data } = await sb.from('deliveries')
    .select('id,description,reward_avc,status,pickup_lat,pickup_lng,requester_id')
    .eq('status','requested')
    .not('pickup_lat','is',null)
    .limit(200);
  (data || []).forEach(addDeliveryPin);
}

window.captureDeliveryPoint = (kind) => {
  if (!viewer || !deliveryDraft) return;
  const center = viewer.camera.pickEllipsoid(
    new Cesium.Cartesian2(window.innerWidth / 2, window.innerHeight / 2),
    viewer.scene.globe.ellipsoid
  );
  if (!center) return toast('Aim the camera at the ground first.');
  const carto = Cesium.Cartographic.fromCartesian(center);
  const lng = Cesium.Math.toDegrees(carto.longitude);
  const lat = Cesium.Math.toDegrees(carto.latitude);

  if (kind === 'pickup') {
    deliveryDraft.pickup = { lng, lat };
    deliveryDraft.step = 'dropoff';
    openPanel(`
      <h2>Request delivery</h2>
      <div class="subtitle">Step 2 of 3 — dropoff location</div>
      <p style="color:#a8c8ee;font-size:13px;line-height:1.5">
        Now aim at the <strong>dropoff point</strong>. Pickup is locked at <span style="color:#7eb4ff">${lat.toFixed(3)}, ${lng.toFixed(3)}</span>.
      </p>
      <div class="gadget-engage" onclick="captureDeliveryPoint('dropoff')"><span class="verb-glyph">⊕</span><span>Set dropoff here</span></div>
    `);
  } else if (kind === 'dropoff') {
    deliveryDraft.dropoff = { lng, lat };
    deliveryDraft.step = 'details';
    openPanel(`
      <h2>Request delivery</h2>
      <div class="subtitle">Step 3 of 3 — details</div>
      <input id="del-desc" type="text" placeholder="What needs delivering?" maxlength="500" />

      <div class="subtitle" style="margin-top:8px">
        Pickup: ${deliveryDraft.pickup.lat.toFixed(3)}, ${deliveryDraft.pickup.lng.toFixed(3)} →
        Dropoff: ${deliveryDraft.dropoff.lat.toFixed(3)}, ${deliveryDraft.dropoff.lng.toFixed(3)}
      </div>
      <div class="gadget-engage armed" onclick="submitDelivery()"><span class="verb-glyph">⊛</span><span>Broadcast request</span></div>
    `);
  }
};

window.submitDelivery = async () => {
  if (!deliveryDraft?.pickup || !deliveryDraft?.dropoff) return;
  const desc = $('del-desc').value.trim();
  if (!desc) return toast('Description required');
  const reward = parseFloat($('del-reward').value || '0');
  const notes = $('del-notes').value.trim() || null;

  const { error } = await sb.from('deliveries').insert({
    requester_id: session.user.id,
    pickup_location:  `SRID=4326;POINT(${deliveryDraft.pickup.lng} ${deliveryDraft.pickup.lat})`,
    dropoff_location: `SRID=4326;POINT(${deliveryDraft.dropoff.lng} ${deliveryDraft.dropoff.lat})`,
    description: desc,
    reward_avc: reward,
    notes,
  });
  if (error) {
    const msg = String(error.message || error);
    if (msg.includes('insufficient_funds')) {
      toast('Not enough euros to escrow the reward — top up first', 'err');
      try { await loadProfile(); } catch (_) {}
      setTimeout(() => { try { openBuyAVC(); } catch (_) {} }, 400);
      return;
    }
    return toast(msg, 'err');
  }
  deliveryDraft = null;
  try { await loadProfile(); } catch (_) {}   // reward was escrowed
  toast('Delivery posted · €' + reward + ' held in escrow', 'ok');
  openWalletPanel();
};

async function tryAutoCredentials() {
  if (session || !sb) return;
  // Try browser's saved password manager silently (no UI prompt)
  if (navigator.credentials?.get) {
    try {
      const cred = await navigator.credentials.get({ password: true, mediation: 'silent' });
      if (cred?.type === 'password' && cred.id && cred.password) {
        const { error } = await sb.auth.signInWithPassword({ email: cred.id, password: cred.password });
        if (!error) return; // auto signed in
      }
    } catch (_) {}
  }
  // First-visit nudge — show once, non-blocking
  const key = 'av_identity_nudge_v1';
  if (!localStorage.getItem(key)) {
    localStorage.setItem(key, '1');
    setTimeout(() => { if (!session) toast('Tap ME ◉ to connect your identity', ''); }, 3500);
  }
}

window.openEmitPanel = () => {
  if (!session) return openYouPanel();

  const CATS = [
    { id: 'news',        label: 'News'    },
    { id: 'jobs',        label: 'Jobs'    },
    { id: 'commerce',    label: 'Commerce'},
    { id: 'social',      label: 'Social'  },
    { id: 'dating',      label: 'Dating'  },
    { id: 'real_estate', label: 'Estate'  },
    { id: 'classifieds', label: 'Class.'  },
  ];
  // Live category counts from currently-loaded signals on the globe.
  const counts = {};
  for (const { signal } of signalIndex.values()) {
    counts[signal.category] = (counts[signal.category] || 0) + 1;
  }
  emitState = { category: 'news', amplitude: 1 };

  openPanel(`
    <h2>Pulse emitter</h2>
    <div class="subtitle">Drop a signal at the camera's centre point</div>

    <div class="gadget-seg wrap" id="emit-cat-seg">
      ${CATS.map(c => `
        <div class="seg${c.id==='news'?' active':''}" data-cat="${c.id}">
          ${c.label}<span class="count">${counts[c.id] || 0}</span>
        </div>`).join('')}
    </div>

    <div class="gadget-cmd-wrap">
      <input id="emit-title" class="gadget-cmd" type="text" placeholder="signal title…" maxlength="200" />
    </div>
    <div class="gadget-cmd-wrap" style="margin-top:8px">
      <textarea id="emit-body" class="gadget-cmd" placeholder="payload (optional)…" maxlength="5000"></textarea>
    </div>

    <div class="gadget-dial-wrap">
      <div class="gadget-dial" id="emit-dial">
        <div class="track"></div><div class="arc"></div><div class="value">1</div>
      </div>
      <div class="gadget-dial-meta">
        <div class="label">Amplitude · drag vertical</div>
        <div class="gadget-reach" id="emit-reach"></div>
        <div class="gadget-reach-label">
          <span>local</span><span id="emit-reach-label">~ 1 km</span><span>orbital</span>
        </div>
      </div>
    </div>

    <div class="gadget-engage" id="emit-engage" onclick="emitSignal()">
      <span class="verb-glyph"></span><span>Emit signal</span>
    </div>
  `);

  // Segmented selector
  document.querySelectorAll('#emit-cat-seg .seg').forEach(seg => {
    seg.addEventListener('click', () => {
      document.querySelectorAll('#emit-cat-seg .seg').forEach(s => s.classList.remove('active'));
      seg.classList.add('active');
      emitState.category = seg.dataset.cat;
    });
  });

  // Intensity dial — drag-vertical to set amplitude (1..25)
  const dial = $('emit-dial');
  const dialValue = dial.querySelector('.value');
  const reach = $('emit-reach');
  const reachLbl = $('emit-reach-label');
  let dragStart = null, baseValue = emitState.amplitude;
  const setAmp = (a) => {
    a = Math.max(1, Math.min(25, Math.round(a)));
    emitState.amplitude = a;
    const pct = (a / 25) * 100;
    dial.style.setProperty('--pct', pct.toFixed(1));
    dialValue.textContent = a;
    reach.style.setProperty('--pct', pct.toFixed(1) + '%');
    const km = a < 5 ? a : a < 12 ? a * 8 : a < 20 ? a * 40 : 99999;
    reachLbl.textContent = a >= 20 ? 'orbital · global' : a >= 12 ? `national · ~${km} km` : a >= 5 ? `regional · ~${km} km` : `local · ~${km} km`;
  };
  setAmp(emitState.amplitude);
  dial.addEventListener('pointerdown', e => {
    dragStart = e.clientY; baseValue = emitState.amplitude;
    try { dial.setPointerCapture(e.pointerId); } catch (_) {}
  });
  dial.addEventListener('pointermove', e => {
    if (dragStart == null) return;
    setAmp(baseValue + (dragStart - e.clientY) / 6);
  });
  const endDrag = () => { dragStart = null; };
  dial.addEventListener('pointerup', endDrag);
  dial.addEventListener('pointercancel', endDrag);

  // Engage gadget arms when title is non-empty
  const engage = $('emit-engage');
  const title = $('emit-title');
  const refreshArm = () => engage.classList.toggle('armed', !!title.value.trim());
  title.addEventListener('input', refreshArm);
  refreshArm();
};

window.emitSignal = async () => {
  const title = $('emit-title')?.value.trim();
  if (!title) return;
  const center = viewer.camera.pickEllipsoid(
    new Cesium.Cartesian2(window.innerWidth / 2, window.innerHeight / 2),
    viewer.scene.globe.ellipsoid
  );
  if (!center) return toast('Aim the camera at the ground first.');
  const carto = Cesium.Cartographic.fromCartesian(center);
  const lng = Cesium.Math.toDegrees(carto.longitude);
  const lat = Cesium.Math.toDegrees(carto.latitude);

  const engage = $('emit-engage');
  if (engage) { engage.classList.add('armed'); engage.querySelector('span:last-child').textContent = 'Transmitting…'; }

  const { error } = await sb.from('signals').insert({
    author_id: session.user.id,
    category: emitState.category,
    scope: currentLevel === 'global' ? 'global' : (currentLevel === 'national' ? 'national' : 'local'),
    title,
    body: $('emit-body')?.value.trim() || null,
    amplitude: emitState.amplitude,
    location: `SRID=4326;POINT(${lng} ${lat})`,
    lat, lng,
  });
  if (error) {
    if (engage) engage.querySelector('span:last-child').textContent = error.message.slice(0, 40);
    return;
  }
  toast('Signal emitted — broadcasting to the globe', 'ok');
  closePanel();
};

function _fingerprintBundle() {
  try {
    const c = document.createElement('canvas');
    let glRenderer = '', glVendor = '';
    try {
      const gl = c.getContext('webgl');
      const ext = gl && gl.getExtension('WEBGL_debug_renderer_info');
      if (ext) {
        glRenderer = gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) || '';
        glVendor   = gl.getParameter(ext.UNMASKED_VENDOR_WEBGL) || '';
      }
    } catch (_) {}
    return {
      user_agent:     navigator.userAgent,
      languages:      (navigator.languages || []).slice(0, 6),
      platform:       navigator.platform || '',
      hardware_cores: navigator.hardwareConcurrency || 0,
      memory_gb:      navigator.deviceMemory || 0,
      webdriver:      !!navigator.webdriver,
      timezone:       Intl.DateTimeFormat().resolvedOptions().timeZone || '',
      screen:         `${screen.width}x${screen.height}@${window.devicePixelRatio || 1}`,
      viewport:       `${window.innerWidth}x${window.innerHeight}`,
      online:         !!navigator.onLine,
      cookies:        !!navigator.cookieEnabled,
      do_not_track:   navigator.doNotTrack || '',
      gl_vendor:      glVendor,
      gl_renderer:    glRenderer,

async function _anonMineStart() {
  if (window._anonState.mining) return;
  let wu = { target: 'astranov', difficulty: 200_000 };
  try { const { data } = await sb.functions.invoke('contribute', { body: { mode: 'workunit' } });
        if (data && data.target) wu = data; } catch (_) {}
  const w = new Worker('/contribute-worker.js');
  w.onmessage = (e) => {
    const m = e.data || {};
    if (m.type === 'tick') {
      window._anonState.cycles = m.cycles;
      const st = document.getElementById('anon-mine-stat');
      if (st) st.textContent = `${m.cycles.toLocaleString()} cycles · ${(m.duration_ms/1000).toFixed(0)}s · est. ${(m.cycles/5_000_000).toFixed(4)} AVC`;
      const now = Date.now();
      if (!window._anonState.lastPing || now - window._anonState.lastPing > 10_000) {
        window._anonState.lastPing = now;
        const anonId = (function() {
          let id = localStorage.getItem('astranov_anon_id');
          if (!id) { id = crypto.randomUUID(); localStorage.setItem('astranov_anon_id', id); }
          return id;
        })();
        sb.functions.invoke('contribute', { body: { mode: 'ping', cycles: m.cycles, duration_ms: m.duration_ms, anon_id: anonId } }).catch(() => {});
      }
    }
  };
  w.postMessage({ type: 'start', workUnit: wu });
  window._anonState.worker = w;
  window._anonState.mining = true;
  window._anonState.cycles = 0;
  window._anonState.started = Date.now();
  try { localStorage.setItem('astranov_mining_opt_in', '1'); } catch (_) {}
  _anonMineCardUpdate();
}
function _anonMineStop() {
  if (!window._anonState.mining) return;
  try { window._anonState.worker && window._anonState.worker.postMessage({ type: 'stop' }); } catch (_) {}
  try { window._anonState.worker && window._anonState.worker.terminate(); } catch (_) {}
  window._anonState.worker = null;
  window._anonState.mining = false;
  try { localStorage.removeItem('astranov_mining_opt_in'); } catch (_) {}
  _anonMineCardUpdate();
}
window._anonMineToggle = async function() {
  if (window._anonState.mining) return _anonMineStop();
  try { await _anonMineStart(); } catch (e) { toast('Could not start contributing: ' + String(e), 'err'); }
};
// Resume mining on page load IF the user previously opted in. Honors
// the §17b anti-coercion guardrail: only auto-resumes a choice the user

(function _anonMineResume() {

      setTimeout(() => { try { _anonMineStart(); } catch (_) {} }, 4500);
