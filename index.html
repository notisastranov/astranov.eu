<script>
// Nuke broken service workers that freeze dead shells
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations?.().then(function(regs) {
    regs.forEach(function(r) { r.unregister().catch(function(){}); });
  }).catch(function(){});
  try {
    caches && caches.keys && caches.keys().then(function(keys) {
      keys.forEach(function(k) { if (/astranov/i.test(k)) caches.delete(k); });
    });
  } catch (e) {}
}
</script>
<script>
// Boot full shell from last known-good monorepo HTML, rewrite assets to origin,
// then ensure loader + Astranov OS/Browser are present.
(function () {
  var BUILD = '20260720085209';
  var GOOD = 'https://cdn.jsdelivr.net/gh/notisastranov/astranov.eu@d80e26a60efa9f341b5b692fb85076bae77ef573/index.html';
  function inject(html) {
    if (!html) return html;
    // Prefer same-origin assets for auth / API / local modules
    html = html.replace(/https:\/\/cdn\.jsdelivr\.net\/gh\/notisastranov\/astranov\.eu@[^/]+\//g, '/');
    html = html.replace(/astranov-build" content="[^"]+"/, 'astranov-build" content="' + BUILD + '"');
    if (html.indexOf('window.__ASTRANOV_HARD_BOOT__') < 0) {
      html = html.replace('window._spartan=true;', 'window._spartan=true;window.__ASTRANOV_HARD_BOOT__=1;');
    }
    if (html.indexOf('src="/js/loader.js') < 0) {
      html = html.replace(
        '<script src="/js/phase-critical.js',
        '<script src="/js/loader.js?v=' + BUILD + '"><\/script>\n<script src="/js/phase-critical.js'
      );
    }
    if (html.indexOf('src="/js/08-astranov-os.js') < 0) {
      html = html.replace(
        '</body>',
        '<script src="/js/08-astranov-os.js?v=' + BUILD + '"><\/script>\n' +
        '<script src="/js/08-astranov-browser.js?v=' + BUILD + '"><\/script>\n' +
        '<script>(function(){function bootOs(){try{if(window.AstranovOS)AstranovOS.init();if(window.AstranovBrowser)AstranovBrowser.init();}catch(e){console.warn("[os boot]",e);}}window.addEventListener("load",function(){setTimeout(bootOs,300);});setTimeout(bootOs,2500);})();<\/script>\n</body>'
      );
    }
    return html;
  }
  function fail(m) {
    try {
      document.body.innerHTML = '<pre style="color:#fcc;background:#100;padding:16px;font:13px system-ui">' + m + '</pre>';
    } catch (e) {}
  }
  fetch(GOOD, { cache: 'no-store' })
    .then(function (r) {
      if (!r.ok) throw new Error('shell fetch ' + r.status);
      return r.text();
    })
    .then(function (html) {
      if (!html || html.length < 40000 || html.indexOf('__ASTRANOV_MANIFEST__') < 0) {
        throw new Error('shell payload incomplete');
      }
      html = inject(html);
      document.open();
      document.write(html);
      document.close();
    })
    .catch(function (e) {
      fail('Astranov boot: ' + (e && e.message || e) + ' — hard refresh astranov.eu');
    });
})();
</script>
